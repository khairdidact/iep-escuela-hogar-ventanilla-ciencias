<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conocimientos Fundamentales - IEP Escuela Hogar Ventanilla</title>
    <style>
        :root {
            --matematica: #2563eb;
            --matematica-light: #dbeafe;
            --matematica-dark: #1e40af;
            --ciencia: #16a34a;
            --ciencia-light: #dcfce7;
            --ciencia-dark: #15803d;
            --metodo: #8b5cf6;
            --metodo-light: #ede9fe;
            --metodo-dark: #6d28d9;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }
        .breadcrumb span {
            cursor: pointer;
            transition: color var(--transition);
        }
        .breadcrumb span:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
        .breadcrumb .sep {
            color: #cbd5e1;
            cursor: default;
        }
        .breadcrumb .current {
            font-weight: 600;
            color: var(--text);
            cursor: default;
        }
        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 80vh;
        }
        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--text);
        }
        .page-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .area-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .area-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 1.5rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .area-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .area-card.matematica {
            border-left: 5px solid var(--matematica);
        }
        .area-card.matematica:hover {
            border-color: var(--matematica);
            background: #fafbff;
        }
        .area-card.ciencia {
            border-left: 5px solid var(--ciencia);
        }
        .area-card.ciencia:hover {
            border-color: var(--ciencia);
            background: #fafdfb;
        }
        .area-card.metodo-highlight {
            border-left: 5px solid var(--metodo);
            background: linear-gradient(135deg, #faf5ff 0%, #ede9fe 100%);
            border: 2px solid var(--metodo);
        }
        .area-card.metodo-highlight:hover {
            border-color: var(--metodo-dark);
            background: linear-gradient(135deg, #f5f0ff 0%, #e0d9fc 100%);
        }
        .area-card .icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        .area-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }
        .area-card .count {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .area-card .featured-badge {
            display: inline-block;
            background: var(--metodo);
            color: #fff;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
        .level-group {
            margin-bottom: 2.5rem;
        }
        .level-group-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .level-badge {
            display: inline-block;
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .level-badge.primaria {
            background: #fef3c7;
            color: #92400e;
        }
        .level-badge.secundaria {
            background: #dbeafe;
            color: #1e40af;
        }
        .ciclo-tag {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.85rem;
        }
        .lesson-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1.25rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .lesson-card:hover {
            border-color: #6366f1;
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .lesson-card.metodo-card {
            border-left: 4px solid var(--metodo);
            background: #fdfbff;
        }
        .lesson-card.metodo-card:hover {
            border-color: var(--metodo);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
        }
        .lesson-card .lesson-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }
        .lesson-card .lesson-meta {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .lesson-card .lesson-preview {
            font-size: 0.8rem;
            color: #94a3b8;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .lesson-card .arrow {
            align-self: flex-end;
            color: #6366f1;
            font-weight: 700;
            transition: transform var(--transition);
        }
        .lesson-card:hover .arrow {
            transform: translateX(4px);
        }
        .metodo-icon-small {
            display: inline-block;
            background: var(--metodo-light);
            color: var(--metodo-dark);
            border-radius: 4px;
            padding: 0.15rem 0.4rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .lesson-detail {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .lesson-header-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        .lesson-header-card.metodo-header {
            border-left: 5px solid var(--metodo);
            background: linear-gradient(135deg, #fff 0%, #fdfbff 100%);
        }
        .lesson-header-card h1 {
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
        }
        .lesson-header-card .meta-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .lesson-header-card .knowledge-tag {
            display: inline-block;
            background: #f1f5f9;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.78rem;
            color: #475569;
            margin-top: 0.4rem;
        }
        .phase-accordion {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .phase-item {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .phase-item.open {
            border-color: #6366f1;
            box-shadow: var(--shadow-md);
        }
        .phase-header {
            padding: 0.85rem 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            user-select: none;
            transition: background var(--transition);
        }
        .phase-header:hover {
            background: #f8fafc;
        }
        .phase-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .phase-0 .phase-number {
            background: #fef3c7;
            color: #92400e;
        }
        .phase-1 .phase-number {
            background: #fce7f3;
            color: #9d174d;
        }
        .phase-2 .phase-number {
            background: #ede9fe;
            color: #5b21b6;
        }
        .phase-3 .phase-number {
            background: #dbeafe;
            color: #1e40af;
        }
        .phase-4 .phase-number {
            background: #dcfce7;
            color: #166534;
        }
        .phase-5 .phase-number {
            background: #ffedd5;
            color: #9a3412;
        }
        .phase-6 .phase-number {
            background: #e0e7ff;
            color: #3730a3;
        }
        .phase-7 .phase-number {
            background: #fce7f3;
            color: #831843;
        }
        .phase-title-text {
            flex: 1;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .phase-subtitle {
            font-weight: 400;
            font-size: 0.73rem;
            color: var(--text-secondary);
            display: block;
        }
        .phase-chevron {
            font-size: 1.1rem;
            color: #94a3b8;
            transition: transform var(--transition);
            flex-shrink: 0;
        }
        .phase-item.open .phase-chevron {
            transform: rotate(180deg);
            color: #6366f1;
        }
        .phase-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            padding: 0 1.1rem;
            border-top: 0px solid transparent;
        }
        .phase-item.open .phase-body {
            max-height: 2000px;
            padding: 0.85rem 1.1rem;
            border-top: 1px solid #e2e8f0;
        }
        .phase-body .editable-area {
            width: 100%;
            min-height: 80px;
            border: 1px dashed #d1d5db;
            border-radius: 6px;
            padding: 0.7rem;
            font-family: inherit;
            font-size: 0.85rem;
            resize: vertical;
            background: #fafafa;
            color: var(--text);
            line-height: 1.5;
        }
        .phase-body .editable-area:focus {
            outline: 2px solid #6366f1;
            border-color: transparent;
            background: #fff;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.9rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            transition: all var(--transition);
            margin-bottom: 1rem;
        }
        .btn-back:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: flex-start;
            }
            .main-container {
                padding: 1rem;
            }
            .area-cards {
                grid-template-columns: 1fr;
            }
            .lesson-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

          0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 1° y 2° de secundaria las competencias científicas relacionadas con la estructura atómica, la organización de la tabla periódica, los enlaces químicos, las reacciones químicas y los compuestos inorgánicos, fomentando la curiosidad por el mundo microscópico, la observación sistemática y el razonamiento lógico para explicar los fenómenos químicos de la vida cotidiana.\n\n🎯 OBJETIVOS PARTICULARES:\n• Conocer la evolución de los modelos atómicos (Dalton, Thomson, Rutherford, Bohr, modelo cuántico básico) y describir la estructura del átomo actual (protón, neutrón, electrón, niveles de energía, orbitales introductorios).\n• Calcular el número atómico (Z), número másico (A) y cantidad de neutrones, e interpretar la notación isotópica.\n• Identificar los criterios de ordenamiento de la tabla periódica moderna (grupos, periodos, bloques) y reconocer las propiedades periódicas principales: radio atómico, electronegatividad, energía de ionización y afinidad electrónica.\n• Explicar la formación de enlaces iónicos, covalentes (apolar/polar) y metálicos mediante la regla del octeto y la diferencia de electronegatividad.\n• Nombrar y formular compuestos inorgánicos siguiendo las nomenclaturas tradicional, Stock y sistemática (IUPAC) para óxidos, hidróxidos, ácidos y sales.\n• Clasificar y balancear ecuaciones químicas sencillas y reconocer los tipos de reacciones (síntesis, descomposición, desplazamiento simple y doble, combustión, neutralización).\n\n📌 NOCIONES PRINCIPALES:\n• Átomo, partículas subatómicas, número atómico, número másico, isótopo.\n• Modelos atómicos de Thomson, Rutherford, Bohr; niveles y subniveles de energía.\n• Tabla periódica: grupos, periodos, familias químicas.\n• Propiedades periódicas: radio atómico, electronegatividad, energía de ionización.\n• Enlace químico: iónico, covalente (polar y apolar), metálico.\n• Compuestos inorgánicos: óxidos básicos y ácidos, hidróxidos, ácidos oxácidos e hidrácidos, sales.\n• Reacciones químicas: reactivos, productos, ecuación química, balanceo (tanteo y Redox simple).\n\n📌 NOCIONES SECUNDARIAS:\n• Espectros atómicos y su relación con los niveles de energía.\n• Regla de Hund y principio de exclusión de Pauli (nociones básicas).\n• Número de oxidación y reglas de asignación.\n• pH y su relación con los ácidos y bases.\n• Catálisis y factores que afectan la velocidad de reacción.\n\n🌍 INTERESES SOCIETALES:\n• La química explica la composición de todo lo que nos rodea: desde el aire que respiramos hasta los dispositivos electrónicos que usamos.\n• La tabla periódica es una de las herramientas más poderosas de la ciencia; organiza los "ladrillos" con los que está construido el universo.\n• La minería peruana extrae elementos como cobre, plata, oro, zinc, hierro; conocer su química ayuda a entender los procesos de refinación y sus impactos ambientales.\n• Las reacciones químicas están en la cocción de alimentos, la oxidación de metales, la producción de energía y la fabricación de medicamentos.`,
          1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Detectives del mundo atómico y químico"\n\n🧩 MATERIALES: Bolas de tecnopor o plastilina de colores, alambre, cartulinas, fichas de la tabla periódica, vinagre, bicarbonato de sodio, limón, lana de acero (viruta fina), vinagre, cinta de magnesio (si hay campana extractora), vasos de precipitado, agua, jabón, indicador de repollo morado, limpiador de horno (base), jugo de limón (ácido), papel tornasol.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Construye tu átomo": Con plastilina de colores (protones rojos, neutrones azules, electrones amarillos), los estudiantes representan átomos de los primeros 20 elementos según el modelo de Bohr (capas K, L, M). Deben colocar los electrones correctamente y calcular Z, A y neutrones.\n\nESTACIÓN 2: "La tabla periódica viva": Se reparten fichas con símbolos de elementos a cada estudiante. Se les pide que se agrupen físicamente según sean metales, no metales o gases nobles. Luego, se forman en columnas según el grupo (alcalinos, halógenos, etc.) y en filas según el periodo. Reflexionan: ¿por qué algunos elementos se parecen en su comportamiento?\n\nESTACIÓN 3: "Reacciones mágicas": En un vaso con vinagre, agregan bicarbonato de sodio → efervescencia (producción de CO₂). En un plato, colocan un trozo de lana de acero humedecida con vinagre y observan al día siguiente la oxidación. Preguntan: ¿Qué gas se desprendió? ¿La oxidación es un cambio físico o químico?\n\nESTACIÓN 4: "Arcoíris químico": Usan el indicador de repollo morado para medir el pH de varias sustancias (limón, jabón, bicarbonato disuelto, vinagre). Ordenan de más ácido a más básico según el color. Relacionan con los conceptos de ácido y base.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Cómo sabemos que ocurrió una reacción química? ¿Qué hace que un átomo sea diferente de otro? ¿Por qué los elementos de un mismo grupo tienen propiedades parecidas?`,
          2: `🧠 ACTIVIDAD INDUCTIVA: "De lo observable a lo conceptual"\n\n📊 OBSERVACIÓN GUIADA: TENDENCIAS EN LA TABLA PERIÓDICA\nSe entrega una tabla periódica simplificada con los valores de radio atómico, electronegatividad y energía de ionización. Los estudiantes colorean los valores: rojo para los más altos y azul para los más bajos. Observan patrones:\n• El radio atómico aumenta hacia abajo en un grupo y hacia la izquierda en un periodo.\n• La electronegatividad y la energía de ionización aumentan hacia la derecha en un periodo y hacia arriba en un grupo.\nDiscusión guiada: ¿Por qué el flúor (F) es el elemento más electronegativo? ¿Por qué el francio (Fr) tiene el mayor radio atómico? Conclusión: las propiedades periódicas están determinadas por la carga nuclear efectiva y el número de capas electrónicas.\n\n📊 OBSERVACIÓN GUIADA: TIPOS DE ENLACE\nSe presentan tarjetas con parejas de elementos y sus valores de electronegatividad (Na-Cl, H-O, Fe-Fe, C-H). Los estudiantes calculan la diferencia de electronegatividad (ΔEN) y clasifican el enlace:\n• ΔEN > 1.7 → Iónico\n• 0.5 ≤ ΔEN ≤ 1.7 → Covalente polar\n• ΔEN < 0.5 → Covalente apolar\n• Metal-metal → Metálico\nLuego, dibujan esquemas de Lewis sencillos para representar la transferencia o compartición de electrones.\n\n📊 OBSERVACIÓN GUIADA: CLASIFICACIÓN DE COMPUESTOS\nSe dan tarjetas con fórmulas químicas (Na₂O, SO₂, Ca(OH)₂, HCl, HNO₃, NaCl, CaSO₄). Los estudiantes los clasifican en: óxido básico, óxido ácido, hidróxido, hidrácido, oxácido, sal. Mediante lluvia de ideas, deducen las reglas de nomenclatura a partir de los ejemplos.\n\n📝 REGISTRO: Cada estudiante elabora un mapa conceptual que relacione ÁTOMO → TABLA PERIÓDICA → PROPIEDADES → ENLACE → COMPUESTO.`,
          3: `📐 TRANSMISIÓN CONCEPTUAL: Química de secundaria – Ciclo VI\n\n🔬 1. ESTRUCTURA ATÓMICA\n\n📏 PARTÍCULAS SUBATÓMICAS:\n• PROTÓN (p⁺): Carga +1, masa ≈ 1 uma. Ubicado en el núcleo. Determina Z.\n• NEUTRÓN (n⁰): Carga 0, masa ≈ 1 uma. En el núcleo. Aporta estabilidad nuclear.\n• ELECTRÓN (e⁻): Carga -1, masa ≈ 1/1836 uma. Orbita alrededor del núcleo en niveles y subniveles de energía.\n\n📏 MODELOS ATÓMICOS:\n• Dalton (1808): Átomo esférico indivisible.\n• Thomson (1897): "Budín de pasas". Electrones incrustados en una masa positiva.\n• Rutherford (1911): Experimento de la lámina de oro. Núcleo pequeño, denso y positivo; electrones girando en órbitas.\n• Bohr (1913): Niveles de energía cuantizados (K, L, M…). Los electrones saltan entre niveles absorbiendo/emitiendo fotones.\n• Modelo cuántico (actual): Orbitales (s, p, d, f), nube de probabilidad electrónica.\n\n📏 NÚMERO ATÓMICO (Z) = número de protones.\nNÚMERO MÁSICO (A) = Z + número de neutrones.\nISÓTOPOS: Mismo Z, diferente A (ej: C-12 y C-14).\n\n📏 CONFIGURACIÓN ELECTRÓNICA BÁSICA (primeros 20 elementos): Principio de Aufbau, regla de Hund, exclusión de Pauli. Ej: Na (Z=11): 1s² 2s² 2p⁶ 3s¹.\n\n🧪 2. TABLA PERIÓDICA Y PROPIEDADES PERIÓDICAS\n\nLa tabla periódica moderna ordena los elementos por Z creciente. Estructura:\n• PERIODOS: filas horizontales (7). Indican el número de niveles de energía.\n• GRUPOS/FAMILIAS: columnas verticales (18). Mismo número de electrones de valencia, propiedades químicas similares.\n\nFamilias principales:\n• Grupo 1 (IA): Alcalinos (Li, Na, K…). Muy reactivos.\n• Grupo 2 (IIA): Alcalinotérreos.\n• Grupo 17 (VIIA): Halógenos (F, Cl, Br…). Muy electronegativos.\n• Grupo 18 (VIIIA): Gases nobles. Inertes.\n\nPROPIEDADES PERIÓDICAS:\n• RADIO ATÓMICO: Tamaño del átomo. Aumenta ↓ (más capas), disminuye → (mayor carga nuclear atrae electrones).\n• ELECTRONEGATIVIDAD (Pauling): Capacidad de atraer electrones. Aumenta → y ↑.\n• ENERGÍA DE IONIZACIÓN: Energía para quitar un electrón. Aumenta → y ↑.\n• AFINIDAD ELECTRÓNICA: Energía liberada al ganar un electrón.\n\n🔗 3. ENLACES QUÍMICOS\n\nLos átomos se unen para completar 8 electrones en su capa de valencia (regla del octeto).\n\n📏 ENLACE IÓNICO:\nTransferencia de electrones entre un metal (cede) y un no metal (gana). Formación de iones positivos (cationes) y negativos (aniones). Fuerza electrostática. Ej: NaCl (Na⁺ y Cl⁻). Propiedades: sólidos cristalinos, altos puntos de fusión, solubles en agua, conducen la electricidad fundidos o en disolución.\n\n📏 ENLACE COVALENTE:\nCompartición de electrones entre no metales.\n• APOLAR: Misma electronegatividad o ΔEN < 0.5. Ej: H₂, Cl₂, CH₄.\n• POLAR: Diferencia de electronegatividad entre 0.5 y 1.7. Ej: H₂O, HCl.\n• COORDINADO/DATIVO: Un átomo aporta el par de electrones.\nEstructuras de Lewis: representación de electrones de valencia.\n\n📏 ENLACE METÁLICO:\nEntre metales. "Mar de electrones": cationes metálicos fijos y electrones deslocalizados. Explica la conductividad eléctrica y térmica, maleabilidad y ductilidad.\n\n⚗️ 4. REACCIONES Y COMPUESTOS INORGÁNICOS\n\n📏 TIPOS DE REACCIONES:\n• SÍNTESIS: A + B → AB. (2Mg + O₂ → 2MgO)\n• DESCOMPOSICIÓN: AB → A + B. (2H₂O₂ → 2H₂O + O₂)\n• DESPLAZAMIENTO SIMPLE: A + BC → AC + B. (Zn + 2HCl → ZnCl₂ + H₂)\n• DOBLE DESPLAZAMIENTO: AB + CD → AD + CB. (AgNO₃ + NaCl → AgCl↓ + NaNO₃)\n• COMBUSTIÓN: HC + O₂ → CO₂ + H₂O\n• NEUTRALIZACIÓN: Ácido + Base → Sal + Agua\n\n📏 BALANCEO DE ECUACIONES: Método de tanteo (inspección) y método Redox (para reacciones con cambio en el número de oxidación).\n\n📏 COMPUESTOS INORGÁNICOS Y NOMENCLATURA:\n• ÓXIDOS BÁSICOS: Metal + O₂. Ej: Óxido de sodio (Na₂O).\n• ÓXIDOS ÁCIDOS (anhídridos): No metal + O₂. Ej: Dióxido de azufre (SO₂).\n• HIDRÓXIDOS: Óxido básico + H₂O. Ej: Hidróxido de sodio (NaOH).\n• ÁCIDOS HIDRÁCIDOS: H + No metal (sin O). Ej: Ácido clorhídrico (HCl).\n• ÁCIDOS OXÁCIDOS: Óxido ácido + H₂O. Ej: Ácido sulfúrico (H₂SO₄).\n• SALES: Ácido + Base. Ej: Cloruro de sodio (NaCl), Sulfato de calcio (CaSO₄).\n\nNomenclaturas: Tradicional (oso/ico), Stock (número de oxidación en romanos), IUPAC sistemática (prefijos mono, di, tri).\n\n⚠️ ERRORES COMUNES:\n• Confundir número másico con masa atómica promedio ponderada.\n• Pensar que los electrones giran en órbitas fijas como planetas (modelo de Bohr es simplificado; el modelo cuántico habla de orbitales).\n• Decir que el enlace iónico es "más fuerte" que el covalente sin especificar condiciones (redes iónicas vs. moléculas discretas).\n• Asignar números de oxidación sin considerar las reglas (H: +1 excepto hidruros metálicos -1, O: -2 excepto peróxidos).`,
          4: `✏️ TRABAJOS DIRIGIDOS: Química Ciclo VI\n\n📝 BLOQUE 1: Estructura atómica\n1. Completa: Elemento; Símbolo; Z; A; Protones; Neutrones; Electrones; Configuración electrónica\n   - Sodio: Na; 11; 23; 11; 12; 11; 1s²2s²2p⁶3s¹\n   - Calcio: Ca; 20; 40; 20; 20; 20; 1s²2s²2p⁶3s²3p⁶4s²\n   - Cloro: Cl; 17; 35; 17; 18; 17; 1s²2s²2p⁶3s²3p⁵\n\n2. ¿Qué son los isótopos? Da un ejemplo y señala sus aplicaciones. (Isótopos: átomos de un mismo elemento con diferente número de neutrones. Ej: Carbono-14 para datación arqueológica).\n\n📝 BLOQUE 2: Tabla periódica\n3. Ordena de menor a mayor radio atómico: Na, Mg, Cl, K. (Cl < Mg < Na < K). Justifica según posición en la tabla.\n4. ¿Por qué el flúor es el elemento más electronegativo? (Está en la parte superior derecha, pequeño radio, alta carga nuclear efectiva, atrae fuertemente los electrones).\n\n📝 BLOQUE 3: Enlace químico\n5. Indica el tipo de enlace predominante: NaCl (iónico), H₂O (covalente polar), O₂ (covalente apolar), Fe (metálico).\n6. Dibuja la estructura de Lewis del agua (H₂O) y del dióxido de carbono (CO₂). ¿Cuál tiene geometría angular y cuál lineal?\n\n📝 BLOQUE 4: Reacciones y nomenclatura\n7. Nombra los siguientes compuestos: Fe₂O₃ (óxido férrico / óxido de hierro(III) / trióxido de dihierro), H₂SO₄ (ácido sulfúrico / tetraoxosulfato(VI) de hidrógeno), NaOH (hidróxido de sodio).\n8. Escribe y balancea la reacción de neutralización entre ácido clorhídrico e hidróxido de calcio: 2HCl + Ca(OH)₂ → CaCl₂ + 2H₂O.\n9. Clasifica las reacciones:\n   - 2KClO₃ → 2KCl + 3O₂ (descomposición).\n   - CH₄ + 2O₂ → CO₂ + 2H₂O (combustión).\n   - Zn + CuSO₄ → ZnSO₄ + Cu (desplazamiento simple).\n\n📝 BLOQUE 5: Problema integrado\n10. En la industria peruana del cobre, el mineral calcosina (Cu₂S) se tuesta con oxígeno para obtener cobre metálico: Cu₂S + O₂ → 2Cu + SO₂. ¿Qué tipo de reacción es? (Desplazamiento / Redox). Balancea y determina la masa de Cu obtenida a partir de 159 g de Cu₂S (Masa molar Cu₂S = 159 g/mol). (Se obtienen 127 g de Cu).\n\n⏱️ Tiempo: 90 min. ✅ Revisión con participación en pizarra.`,
          5: `🔗 CORRELACIONES INTERNAS: Química con Biología y Física\n\n🔬 CON BIOLOGÍA:\n• Los bioelementos (C, H, O, N, S, P) estudiados en Química conforman las biomoléculas (carbohidratos, lípidos, proteínas, ácidos nucleicos).\n• Las reacciones enzimáticas en Biología son reacciones químicas catalizadas biológicamente.\n• El pH de la sangre (7.35-7.45) es mantenido por sistemas buffer (amortiguadores), concepto químico aplicado.\n• La fotosíntesis y la respiración celular son reacciones Redox.\n\n⚡ CON FÍSICA:\n• El espectro electromagnético (Física) es fundamental para entender los espectros atómicos y los saltos cuánticos.\n• La electrostática (ley de Coulomb) explica la fuerza de atracción entre iones en el enlace iónico.\n• La estructura del átomo de Bohr se basa en niveles de energía, concepto físico de cuantización.\n\n🧩 ACTIVIDAD INTEGRADORA: "La cocina como laboratorio químico": Los estudiantes cocinan un queque simple y analizan las reacciones químicas ocurridas: acción del polvo de hornear (bicarbonato + ácido → CO₂ que esponja), desnaturalización de proteínas del huevo, caramelización del azúcar.`,
          6: `🌍 CORRELACIONES EXTERNAS: La química en la industria, la salud y el ambiente del Perú\n\n🏭 MINERÍA Y METALURGIA:\n• Perú es el segundo productor mundial de cobre. La obtención de cobre a partir de minerales como la calcopirita (CuFeS₂) implica tostación, fundición y refinación electrolítica (procesos químicos Redox).\n• La minería informal usa mercurio (Hg) para amalgamar oro, generando graves problemas de contaminación. Comprender la toxicidad del mercurio y sus compuestos es vital para la salud pública.\n\n💊 SALUD:\n• El hidróxido de magnesio (Mg(OH)₂) y el bicarbonato de sodio (NaHCO₃) son antiácidos de venta libre (neutralización).\n• El yodo (I) es esencial para la tiroides; su deficiencia causa bocio. La sal yodada es un ejemplo de química aplicada a la salud pública.\n• La química farmacéutica diseña moléculas para tratar enfermedades; entender los grupos funcionales y enlaces es la base.\n\n🌱 AMBIENTE:\n• La lluvia ácida (H₂SO₄ y HNO₃) se forma por la reacción de óxidos de azufre y nitrógeno (de fábricas y autos) con el agua atmosférica. Daña bosques, lagos y monumentos.\n• El dióxido de carbono (CO₂) es un gas de efecto invernadero. La química del carbono está en el centro del debate sobre el cambio climático.\n\n🧠 REFLEXIÓN: "Desde el cobre de los cables que llevan electricidad a tu casa hasta el calcio de tus huesos, la química explica la materia. Conocerla es comprender de qué está hecho el mundo."`,
          7: `👥 MÓDULO DE PROYECTO GRUPAL: "Feria 'Química en Acción'"\n\n🎯 OBJETIVO: Cada equipo diseña y ejecuta un experimento químico seguro y lo explica con rigor científico, integrando los conceptos de estructura atómica, enlace, reacción y nomenclatura.\n\n📋 FASES:\n\n1. FORMACIÓN Y ELECCIÓN (1 sesión)\n- 5 equipos:\n  - Equipo A: "Volcán químico" (descomposición del dicromato de amonio – simulación con bicarbonato/vinagre).\n  - Equipo B: "Pila de limón/galvanizado" (Redox y enlace iónico).\n  - Equipo C: "Indicadores de pH caseros" (repollo morado, cúrcuma) y medición de productos cotidianos.\n  - Equipo D: "Formación de cristales" (sulfato de cobre o sal común) – enlace iónico y estructura cristalina.\n  - Equipo E: "Globo que se infla solo" (reacción ácido-base con bicarbonato/vinagre en botella).\n\n2. INVESTIGACIÓN Y PREPARACIÓN (1-2 sesiones)\n- Cada equipo investiga la teoría, redacta los objetivos, hipótesis, procedimiento y explicación química.\n- Preparan un cartel con: título, materiales, reacción balanceada, tipo de enlace involucrado y aplicación en la vida real.\n\n3. FERIA (1 sesión)\n- Invitan a otros salones. Los equipos exponen su experimento y responden preguntas.\n\n4. EVALUACIÓN (1 sesión)\n- Rúbrica: rigor científico (40%), creatividad y seguridad (25%), claridad expositiva (25%), trabajo en equipo (10%).\n- Cierre con entrega de diplomas "Químico Junior" y reflexión sobre la importancia de la química.`

        const leccionExtensaBioVI = {
          0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 1° y 2° de secundaria las competencias científicas para comprender la organización y funcionamiento de los seres vivos a nivel celular y ecosistémico, integrando la citología, la bioquímica básica, la fisiología vegetal y animal, la genética mendeliana y la ecología, promoviendo la indagación, el respeto por la vida y la conciencia ambiental.\n\n🎯 OBJETIVOS PARTICULARES:\n• Describir la estructura y función de los organelos celulares (membrana, citoplasma, núcleo, mitocondrias, cloroplastos, retículo endoplasmático, aparato de Golgi, lisosomas, ribosomas) y diferenciar célula animal de vegetal.\n• Explicar los procesos de transporte celular: difusión simple, ósmosis y transporte activo.\n• Identificar las biomoléculas orgánicas (carbohidratos, lípidos, proteínas, ácidos nucleicos) con sus funciones.\n• Describir los procesos de fotosíntesis (fase lumínica y ciclo de Calvin) y respiración celular (glucólisis, ciclo de Krebs, cadena respiratoria) como pilares del metabolismo energético.\n• Comparar la fisiología vegetal (transporte de savia, fotosíntesis, transpiración) con la animal (digestión, respiración, circulación, excreción).\n• Aplicar las leyes de Mendel para resolver problemas de herencia monohíbrida y dihíbrida, y construir cuadros de Punnett.\n• Comprender los niveles de organización ecológica (individuo, población, comunidad, ecosistema, bioma, biosfera) y el flujo de energía y materia (cadenas y redes tróficas, pirámides ecológicas, ciclos biogeoquímicos).\n\n📌 NOCIONES PRINCIPALES:\n• Célula procariota y eucariota (animal y vegetal). Organelos y funciones.\n• Transporte pasivo (difusión, ósmosis) y activo.\n• Biomoléculas: carbohidratos, lípidos, proteínas, ácidos nucleicos.\n• Fotosíntesis: ecuación general, fases, importancia.\n• Respiración celular: aerobia y anaerobia (fermentación).\n• Fisiología animal: sistemas digestivo, respiratorio, circulatorio, excretor.\n• Fisiología vegetal: nutrición autótrofa, transporte xilema/floema, transpiración.\n• Genética mendeliana: genes, alelos, homocigoto, heterocigoto, dominante/recesivo, leyes de Mendel, cuadro de Punnett.\n• Ecología: niveles tróficos (productores, consumidores, descomponedores), cadenas y redes alimenticias, flujo de energía, ciclos del carbono y nitrógeno.\n\n📌 NOCIONES SECUNDARIAS:\n• Teoría endosimbiótica (origen de mitocondrias y cloroplastos).\n• Enzimas: función, especificidad, factores que afectan su actividad (pH, temperatura).\n• Fermentación láctica y alcohólica.\n• Grupos sanguíneos (sistema ABO y Rh) como ejemplo de alelos múltiples.\n• Relaciones interespecíficas (depredación, competencia, mutualismo, etc.).\n\n🌍 INTERESES SOCIETALES:\n• El conocimiento de la célula y la genética ha revolucionado la medicina (terapias génicas, vacunas, diagnóstico de enfermedades).\n• La biotecnología peruana aprovecha la biodiversidad para desarrollar nuevos productos.\n• La ecología nos ayuda a gestionar sosteniblemente nuestros recursos: bosques, pesquerías, agua.\n• Entender la herencia permite romper mitos y tomar decisiones informadas sobre salud reproductiva.`,
          1: `🔍 ACTIVIDAD DE DESCUBIERTA: "La vida bajo el microscopio y en el ecosistema"\n\n🧩 MATERIALES: Microscopios, láminas de células vegetales (cebolla, elodea), hisopos, azul de metileno, portas y cubreobjetos, reactivo de Lugol, papa, plátano, aceite, papel kraft, agua, frasco de vidrio, levadura, globos, termómetro, semillas de frijol, algodón, macetas, cartulinas, fichas de organismos peruanos.\n\n🎲 ESTACIONES:\n\nESTACIÓN 1: "El universo celular": Preparan una muestra de epidermis de cebolla y la tiñen con Lugol; observan al microscopio: pared celular, núcleo. También toman una muestra de mucosa bucal (mejilla), tiñen con azul de metileno y observan células animales. Dibujan ambas y etiquetan.\n\nESTACIÓN 2: "Ósmosis en acción": Colocan una papa cruda en dos vasos: uno con agua y otro con agua salada concentrada. Al cabo de 30 min observan: la papa en agua salada está blanda (perdió agua por ósmosis), la otra turgente. Discuten dirección del flujo de agua.\n\nESTACIÓN 3: "Fotosíntesis en vivo": Colocan una ramita de elodea en un frasco con agua y bicarbonato, lo exponen a luz intensa. Observan las burbujas de oxígeno desprendidas. Cuentan burbujas por minuto. Luego cubren el frasco con papel aluminio y verifica que cesan las burbujas. Conclusión: la luz es necesaria para la fotosíntesis. Capturan el gas en un tubo y comprueban que aviva una brasa (oxígeno).\n\nESTACIÓN 4: "El bosque en un frasco": Con un frasco grande de vidrio, construyen un terrario cerrado con tierra, piedras, una plantita pequeña y agua. Lo sellan. Discuten cómo se mantendrá la vida (ciclo del agua, CO₂ / O₂, nutrientes) como un mini ecosistema.\n\n💬 REFLEXIÓN: ¿En qué se diferencian las células vegetales de las animales? ¿Cómo entra y sale el agua de las células? ¿De dónde obtienen energía las plantas y los animales?`,
          2: `🧠 ACTIVIDAD INDUCTIVA: "Patrones de la vida"\n\n📊 OBSERVACIÓN GUIADA: HERENCIA MENDELIANA\nSe presentan los resultados de los experimentos de Mendel con arvejas:\n• Cruce de plantas de semilla amarilla pura (AA) con verde (aa): F1 100% amarilla (Aa).\n• Cruce F1 x F1: 3/4 amarillas, 1/4 verdes.\nLos estudiantes cuentan y establecen la proporción 3:1. Deductivamente infieren la segregación de factores. Construyen cuadros de Punnett.\n\n📊 OBSERVACIÓN GUIADA: FLUJO DE ENERGÍA\nSe entrega una lista con organismos peruanos: fitoplancton, anchoveta, atún, lobo marino, bacterias descomponedoras. Los estudiantes los organizan en una cadena trófica. Luego, asignan valores de energía (10,000 kcal → 1,000 kcal → 100 kcal → 10 kcal) usando la regla del 10%. Discuten por qué el número de niveles tróficos es limitado.\n\n📝 REGISTRO: Diagrama de los organelos celulares con sus funciones, pirámide de energía, cuadro de Punnett de cruce monohíbrido.`,
          3: `📐 TRANSMISIÓN CONCEPTUAL: Biología de secundaria – Ciclo VI\n\n🔬 1. CITOLOGÍA\n\nLa célula es la unidad estructural y funcional de los seres vivos.\n\n📏 CÉLULA PROCARIOTA: Sin núcleo definido, ADN circular en el citoplasma. Sin organelos membranosos. Ej: bacterias.\n\n📏 CÉLULA EUCARIOTA ANIMAL: Membrana celular, citoplasma, núcleo (con envoltura nuclear y nucléolo), mitocondrias, retículo endoplasmático liso y rugoso, ribosomas, aparato de Golgi, lisosomas, centriolos.\n\n📏 CÉLULA EUCARIOTA VEGETAL: Además de lo anterior (excepto centriolos en plantas superiores), posee pared celular de celulosa, cloroplastos y grandes vacuolas.\n\n📏 TRANSPORTE CELULAR:\n• DIFUSIÓN SIMPLE: Moléculas pequeñas (O₂, CO₂) pasan libremente por la membrana a favor del gradiente.\n• ÓSMOSIS: Paso de agua a través de una membrana semipermeable hacia la solución más concentrada.\n• TRANSPORTE ACTIVO: Requiere energía (ATP) y proteínas transportadoras. Contra gradiente de concentración. Ej: bomba Na⁺/K⁺.\n\n🧬 2. BIOQUÍMICA BÁSICA\n\n📏 CARBOHIDRATOS: Formados por C, H, O (1:2:1). Monosacáridos (glucosa, fructosa), disacáridos (sacarosa, lactosa), polisacáridos (almidón, celulosa, glucógeno). Fuente principal de energía.\n\n📏 LÍPIDOS: Triglicéridos (grasas y aceites), fosfolípidos (membranas), esteroides (colesterol, hormonas). Reserva energética, aislante térmico, estructural.\n\n📏 PROTEÍNAS: Cadenas de aminoácidos (20 tipos). Funciones: estructural (colágeno), enzimática, transporte (hemoglobina), defensa (anticuerpos), movimiento (actina/miosina).\n\n📏 ÁCIDOS NUCLEICOS: ADN (doble hélice, almacena información genética: A-T, C-G) y ARN (mensajero, ribosómico, transferencia).\n\n📏 ENZIMAS: Catalizadores biológicos. Disminuyen la energía de activación. Modelo llave-cerradura. Afectadas por temperatura y pH.\n\n🌿 3. FISIOLOGÍA VEGETAL Y ANIMAL\n\n📏 FOTOSÍNTESIS: 6CO₂ + 6H₂O + luz → C₆H₁₂O₆ + 6O₂. Ocurre en los cloroplastos. Fase lumínica (tilacoides) y fase oscura/Ciclo de Calvin (estroma).\n\n📏 RESPIRACIÓN CELULAR: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + 36-38 ATP. Ocurre en mitocondrias. Etapas: glucólisis (citoplasma), ciclo de Krebs (matriz mitocondrial), cadena respiratoria (crestas mitocondriales).\n\n📏 NUTRICIÓN Y TRANSPORTE EN PLANTAS:\n• Xilema: Transporta agua y sales minerales del suelo a las hojas (savia bruta). Asenso por capilaridad y transpiración.\n• Floema: Transporta azúcares producidos en la fotosíntesis a toda la planta (savia elaborada).\n\n📏 SISTEMAS ANIMALES:\n• Digestivo: Ingestión, digestión (mecánica y química), absorción, egestión.\n• Respiratorio: Intercambio de gases (O₂/CO₂) en pulmones, branquias o tráqueas.\n• Circulatorio: Transporte de nutrientes, gases, desechos; puede ser abierto (insectos) o cerrado (vertebrados). El corazón impulsa la sangre.\n• Excretor: Eliminación de desechos nitrogenados (orina, sudor). Riñones como filtros.\n\n🧬 4. GENÉTICA MENDELIANA\n\n📏 CONCEPTOS BÁSICOS:\n• Gen: Segmento de ADN que determina una característica.\n• Alelo: Variante de un gen (ej: A = amarillo, a = verde).\n• Homocigoto (AA o aa), Heterocigoto (Aa).\n• Fenotipo: rasgo observable. Genotipo: constitución genética.\n\n📏 LEYES DE MENDEL:\n1. Primera ley (Uniformidad): Cruce de dos líneas puras → F1 todos iguales (heterocigotos, fenotipo dominante).\n2. Segunda ley (Segregación): Los alelos se separan en la formación de gametos.\n3. Tercera ley (Distribución independiente): Genes para diferentes caracteres se heredan independientemente (si están en cromosomas distintos).\n\n📏 CUADRO DE PUNNETT: Herramienta para predecir proporciones genotípicas y fenotípicas.\n\n🌎 5. ECOLOGÍA\n\n📏 NIVELES DE ORGANIZACIÓN: Individuo → Población → Comunidad → Ecosistema → Bioma → Biosfera.\n\n📏 CADENAS Y REDES TRÓFICAS:\n• Productores (autótrofos).\n• Consumidores primarios, secundarios, terciarios (heterótrofos).\n• Descomponedores (bacterias, hongos).\n\n📏 FLUJO DE ENERGÍA: Unidireccional. La energía solar es captada por productores y transferida con pérdida (~10% por nivel) en cada nivel trófico. Pirámides ecológicas: de energía, biomasa o número.\n\n📏 CICLOS BIOGEOQUÍMICOS:\n• Ciclo del carbono: Fotosíntesis, respiración, combustión, sedimentación.\n• Ciclo del nitrógeno: Fijación, nitrificación, asimilación, desnitrificación.\n• Ciclo del agua: Evaporación, condensación, precipitación, escorrentía, infiltración.\n\n📏 RELACIONES ECOLÓGICAS: Intraespecíficas (cooperación, competencia) e interespecíficas (depredación, mutualismo, comensalismo, parasitismo, competencia).\n\n⚠️ ERRORES COMUNES:\n• Pensar que solo las plantas realizan respiración celular (todos los seres vivos la realizan).\n• Confundir fotosíntesis con respiración.\n• Creer que en la herencia los rasgos se "mezclan" como pintura (herencia mendeliana es particulada).\n• Suponer que el organismo dominante es siempre el más frecuente en la población.\n• Decir que las pirámides ecológicas de número siempre tienen base ancha (en bosques, un árbol puede sostener muchos consumidores; la pirámide de número se invierte pero la de energía siempre es normal).`,
          4: `✏️ TRABAJOS DIRIGIDOS: Biología Ciclo VI\n\n📝 BLOQUE 1: Citología\n1. Relaciona organelo con función: Mitocondria (respiración), Cloroplasto (fotosíntesis), Ribosoma (síntesis de proteínas), Aparato de Golgi (secreción y empaque), Núcleo (control genético).\n2. ¿Qué sucede si colocas una célula animal en agua destilada? (Se hincha y puede estallar por ósmosis, entra agua). ¿Y una célula vegetal? (Se hincha pero la pared celular le da soporte).\n\n📝 BLOQUE 2: Bioquímica\n3. Indica la biomolécula principal: Almidón (carbohidrato), insulina (proteína), mantequilla (lípido), ADN (ácido nucleico).\n4. ¿Por qué las enzimas pierden actividad a altas temperaturas? (Se desnaturalizan, pierden su forma tridimensional y no pueden unirse al sustrato).\n\n📝 BLOQUE 3: Fisiología\n5. Ecuación de la fotosíntesis y de la respiración celular. ¿Dónde ocurre cada una?\n6. ¿Qué transporta el xilema y qué el floema? (Xilema: agua y sales; floema: azúcares).\n\n📝 BLOQUE 4: Genética\n7. Cruce: Planta de flores rojas (RR) con blancas (rr). F1: todas rosas (herencia intermedia). ¿Qué proporción fenotípica en F2? (1 roja : 2 rosas : 1 blanca). Realiza cuadro de Punnett.\n8. Si el color de ojos en humanos: marrón (M) domina sobre azul (m). Dos padres heterocigotos (Mm). ¿Probabilidad de hijo con ojos azules? (25%). Cuadro de Punnett.\n\n📝 BLOQUE 5: Ecología\n9. Construye una cadena alimenticia del mar peruano y señala los niveles tróficos. (Fitoplancton → Anchoveta → Bonito → Tiburón).\n10. Explica por qué una pirámide de energía nunca puede invertirse. (Porque la energía se pierde en cada nivel trófico, la cantidad disponible disminuye).\n\n⏱️ Tiempo: 90 min. ✅ Revisión en plenaria.`,
          5: `🔗 CORRELACIONES INTERNAS: Biología con Química y Física\n\n🧪 CON QUÍMICA:\n• Las biomoléculas son compuestos químicos orgánicos e inorgánicos.\n• Las enzimas funcionan como catalizadores (Química: cinética y energía de activación).\n• La fotosíntesis y la respiración son reacciones Redox.\n• El pH del suelo y del agua afecta la fisiología de los organismos.\n\n⚡ CON FÍSICA:\n• La ósmosis se relaciona con la presión osmótica (Física de fluidos).\n• La luz, como onda electromagnética, es captada por los pigmentos fotosintéticos (clorofila).\n• Las leyes de la termodinámica explican el flujo de energía en los ecosistemas (la energía no se crea, se transforma; y en cada transformación, parte se degrada en calor).\n• La difusión de gases en los alvéolos pulmonares se rige por leyes físicas de los gases (ley de Fick).\n\n🧩 ACTIVIDAD INTEGRADORA: "De la química a la vida". Construyen modelos 3D de biomoléculas con plastilina y palillos, y simulan la acción enzimática (tijeras que cortan cadenas de papel).`,
          6: `🌍 CORRELACIONES EXTERNAS: Biología en la salud, la agricultura y la conservación peruana\n\n🏥 SALUD:\n• La genética mendeliana explica enfermedades hereditarias como la fibrosis quística o la hemofilia.\n• La comprensión de la célula y el ADN ha permitido desarrollar vacunas (ARN mensajero) y pruebas de diagnóstico molecular.\n• La anemia en el Perú es un problema grave; entender la función de la hemoglobina (proteína con hierro) y la nutrición es clave para combatirla.\n\n🌾 AGRICULTURA Y BIODIVERSIDAD:\n• El Perú es centro de origen de cultivos como la papa y el maíz. La genética ayuda a conservar y mejorar variedades nativas.\n• La fisiología vegetal permite optimizar riego y fertilización.\n• La polinización por insectos y aves es una relación mutualista crucial para la agricultura.\n\n🐟 ECOLOGÍA MARINA:\n• El mar peruano es uno de los más productivos gracias al afloramiento costero (Corriente de Humboldt). La anchoveta es la base de la cadena trófica.\n• La sobreexplotación pesquera y el Fenómeno de El Niño afectan el ecosistema. Comprender las cadenas tróficas ayuda a una gestión sostenible.\n\n🧠 REFLEXIÓN FINAL: "Toda la vida está conectada: desde el ADN en tus células hasta el cóndor en los Andes. La biología nos enseña que somos parte de un sistema mayor y que cuidarlo es cuidar de nosotros mismos."`,
          7: `👥 MÓDULO DE PROYECTO GRUPAL: "Bioinvestigadores: de la célula al ecosistema"\n\n🎯 OBJETIVO: Cada equipo investigará a fondo un tema de Biología del Ciclo VI, elaborará un producto comunicativo (maqueta, video, póster, experimento) y lo presentará en una "Feria de la Vida".\n\n📋 FASES:\n1. ELECCIÓN DE TEMA Y EQUIPO (1 sesión)\n   - Célula 3D y transporte celular.\n   - Extracción de ADN de frutas (plátano/fresa) y explicación de la estructura.\n   - Herbario con plantas nativas y su fisiología.\n   - Cadenas tróficas del ecosistema peruano (maqueta).\n   - Genética en acción: simulación de cruzamientos con fichas y cálculo de probabilidades.\n\n2. INVESTIGACIÓN Y DISEÑO (1-2 sesiones)\n   - Búsqueda de información, preparación de materiales y ensayo de la explicación oral.\n\n3. FERIA DE LA VIDA (1 sesión)\n   - Stands interactivos. Los visitantes votan por el más didáctico.\n\n4. EVALUACIÓN Y CIERRE (1 sesión)\n   - Rúbrica: precisión científica (40%), creatividad (25%), comunicación oral (25%), trabajo colaborativo (10%).\n   - Reflexión: "La Biología no se memoriza, se comprende y se siente. ¿Qué te llevas hoy que cambiará tu manera de ver la vida?"`
        };

        const leccionExtensaFisVI = {
          0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 1° y 2° de secundaria las competencias físicas para describir y explicar el movimiento de los cuerpos (MRU y MRUV), las causas del movimiento (leyes de Newton), la energía mecánica y sus transformaciones, y los fenómenos térmicos (calor y temperatura), mediante la observación, experimentación y resolución de problemas, fomentando el pensamiento lógico-matemático y la comprensión del mundo físico.\n\n🎯 OBJETIVOS PARTICULARES:\n• Describir el movimiento rectilíneo uniforme (MRU) usando las magnitudes: posición, desplazamiento, velocidad, tiempo. Resolver problemas y graficar x vs t, v vs t.\n• Describir el movimiento rectilíneo uniformemente variado (MRUV) con aceleración constante. Aplicar las ecuaciones cinemáticas: v = v₀ + a·t, x = v₀·t + ½ a·t², v² = v₀² + 2a·x.\n• Enunciar y aplicar las tres leyes de Newton: inercia, principio fundamental (F = m·a) y acción-reacción.\n• Distinguir masa (kg) de peso (N) y calcular el peso como W = m·g (g = 9.8 m/s²).\n• Definir energía cinética (Ec = ½ m·v²) y energía potencial gravitatoria (Ep = m·g·h). Calcular energía mecánica total (Em = Ec + Ep) y analizar su conservación (sin fricción).\n• Diferenciar calor y temperatura. Explicar formas de transferencia de calor (conducción, convección, radiación). Medir temperatura en escalas Celsius, Fahrenheit y Kelvin, realizando conversiones.\n• Calcular la cantidad de calor absorbida o cedida: Q = m·c·ΔT (calor específico).\n• Interpretar fenómenos de dilatación térmica y cambios de estado.\n\n📌 NOCIONES PRINCIPALES:\n• Sistema de referencia, trayectoria, desplazamiento, velocidad media e instantánea, aceleración.\n• MRU: v = d/t, gráficas.\n• MRUV: Ecuaciones cinemáticas, gráficas v vs t.\n• Leyes de Newton, diagrama de cuerpo libre.\n• Trabajo, energía cinética, energía potencial, energía mecánica, conservación.\n• Temperatura, escalas termométricas, calor, calor específico, transferencia de calor.\n\n📌 NOCIONES SECUNDARIAS:\n• Fuerza de fricción estática y cinética.\n• Impulso y cantidad de movimiento (nociones básicas).\n• Dilatación lineal, superficial y volumétrica.\n• Cambios de estado y calor latente.\n\n🌍 INTERESES SOCIETALES:\n• La física explica desde el movimiento de los planetas hasta el funcionamiento de un automóvil o un ascensor.\n• Las leyes de Newton son fundamentales en la ingeniería y la seguridad vial (distancia de frenado, cinturón de seguridad).\n• La energía mecánica es la base de la generación hidroeléctrica en el Perú.\n• Comprender el calor y la temperatura es clave para la cocina, el diseño de viviendas y la lucha contra el cambio climático (efecto invernadero).`,
          1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Moviéndonos con la física"\n\n🧩 MATERIALES: Cronómetros, cintas métricas, carritos de juguete, rampas, libros para inclinar, pelotas de diferente masa, báscula, dinamómetro (si hay), globos, hilo, vasos, termómetros, hielo, agua caliente, cucharas de metal, madera y plástico, vela, vela pequeña flotante, plastilina, cronómetro.\n\n🎲 ESTACIONES:\n\nESTACIÓN 1: "Carrera MRU vs MRUV": Marcan una distancia de 10 m en el piso. Un estudiante camina a velocidad constante (MRU) mientras otro corre acelerando desde el reposo (MRUV). Los equipos miden tiempos cada 2 m y construyen tablas de x vs t. Identifican el tipo de movimiento según la regularidad de tiempos.\n\nESTACIÓN 2: "La inercia y el golpe": Colocan una moneda sobre una cartulina apoyada en un vaso. Al jalar rápido la cartulina, la moneda cae dentro del vaso (1ª ley de Newton). Con un carrito y plastilina, lo lanzan contra una pared y observan que la plastilina se aplasta (efecto de la fuerza).\n\nESTACIÓN 3: "Globo-cohete (acción y reacción)": Inflan un globo y lo sueltan sin amarrar. Observan cómo sale disparado. Relacionan con la 3ª ley: el aire sale hacia atrás, el globo se impulsa hacia adelante.\n\nESTACIÓN 4: "Sensores térmicos humanos": Preparan tres recipientes: agua fría (10°C), agua templada (25°C) y agua caliente (40°C). Meten una mano en agua fría y otra en caliente, luego ambas al templado. Discuten por qué una mano siente calor y otra frío (temperatura es objetiva; la sensación térmica no).\n\n💬 REFLEXIÓN: ¿Cómo describimos el movimiento? ¿De qué depende que un objeto acelere? ¿Es lo mismo calor que temperatura?`,
          2: `🧠 ACTIVIDAD INDUCTIVA: "De la experiencia a la ley"\n\n📊 OBSERVACIÓN GUIADA: LEY DE NEWTON F = m·a\nUsando un carrito sobre una superficie horizontal lisa, jalan con una fuerza constante (usando un dinamómetro) y miden la aceleración. Varían la masa del carrito (agregando pesas) y miden cómo cambia la aceleración. Construyen tabla F, m, a y verifican que F = m·a.\n\n📊 OBSERVACIÓN GUIADA: RELACIÓN ENTRE CALOR Y CAMBIO DE TEMPERATURA\nCalientan agua en un vaso (100 mL) con una vela y miden la temperatura cada minuto. Misma masa de agua, pero agregan más velas (más calor). Concluyen que ΔT depende de Q, m y del material (calor específico).\n\n📝 REGISTRO: Tablas de F vs a, gráfica, tabla Q vs ΔT, cálculo de calor específico del agua.`,
          3: `📐 TRANSMISIÓN CONCEPTUAL: Física de secundaria – Ciclo VI\n\n⚡ 1. CINEMÁTICA\n\n📏 CONCEPTOS BÁSICOS:\n• Sistema de referencia: punto desde el cual se observa el movimiento.\n• Posición, desplazamiento (Δx), velocidad media (v = Δx/Δt), aceleración (a = Δv/Δt).\n• Trayectoria: línea descrita por el móvil.\n\n📏 MRU (Movimiento Rectilíneo Uniforme):\nVelocidad constante (a = 0). Ecuación: x = x₀ + v·t. Gráfica v vs t: línea horizontal. Gráfica x vs t: línea recta con pendiente = v.\n\n📏 MRUV (Movimiento Rectilíneo Uniformemente Variado):\nAceleración constante (a ≠ 0). Ecuaciones:\n- v = v₀ + a·t\n- x = x₀ + v₀·t + ½ a·t²\n- v² = v₀² + 2a·(x - x₀)\nGráfica v vs t: línea recta con pendiente = a. Gráfica x vs t: parábola.\nCaída libre: caso MRUV con a = g = 9.8 m/s² (despreciando fricción del aire).\n\n⚖️ 2. DINÁMICA (LEYES DE NEWTON)\n\n📏 PRIMERA LEY (Inercia): Un cuerpo en reposo permanece en reposo, y uno en movimiento rectilíneo uniforme continúa así, a menos que una fuerza neta externa actúe sobre él.\n\n📏 SEGUNDA LEY (Principio fundamental): F_neta = m·a (La aceleración es directamente proporcional a la fuerza neta e inversamente proporcional a la masa). Unidad de fuerza: Newton (N) = kg·m/s².\n\n📏 TERCERA LEY (Acción y reacción): Si un cuerpo A ejerce una fuerza sobre B, B ejerce una fuerza igual en magnitud pero en sentido opuesto sobre A. Las fuerzas actúan sobre cuerpos distintos.\n\n📏 MASA vs. PESO:\nMasa (m): cantidad de materia, escalar, kg.\nPeso (W): fuerza gravitatoria sobre la masa, W = m·g, vectorial, N.\n\n📏 DIAGRAMA DE CUERPO LIBRE (DCL): Representar todas las fuerzas que actúan sobre un cuerpo. Fuerzas comunes: Normal (N), tensión (T), fricción (f), peso (W).\n\n🔋 3. ENERGÍA MECÁNICA\n\n📏 TRABAJO (W): W = F·d·cosθ. Se mide en Joules (J).\n\n📏 ENERGÍA CINÉTICA (Ec): Ec = ½ m·v². Energía que posee un cuerpo por su movimiento.\n📏 ENERGÍA POTENCIAL GRAVITATORIA (Ep): Ep = m·g·h. Energía que posee un cuerpo por su posición en un campo gravitatorio.\n📏 ENERGÍA MECÁNICA TOTAL: Em = Ec + Ep.\n\n📏 CONSERVACIÓN DE LA ENERGÍA MECÁNICA (si no hay fuerzas disipativas): Em_inicial = Em_final. La energía se transforma, no se crea ni se destruye.\n\n🌡️ 4. CALOR Y TEMPERATURA\n\n📏 TEMPERATURA: Medida de la energía cinética promedio de las partículas. Escalas:\n- Celsius (°C): 0°C fusión agua, 100°C ebullición.\n- Fahrenheit (°F): 32°F fusión, 212°F ebullición.\n- Kelvin (K): 0 K = -273.15°C (cero absoluto). K = °C + 273.\nConversiones: °F = (9/5)°C + 32; °C = 5/9(°F - 32).\n\n📏 CALOR (Q): Energía transferida debido a una diferencia de temperatura. Se mide en Joules (J) o calorías (cal). 1 cal = 4.184 J.\n\n📏 CALOR ESPECÍFICO (c): Cantidad de calor necesaria para elevar en 1°C la temperatura de 1 kg de sustancia. Ecuación: Q = m·c·ΔT.\n\n📏 TRANSFERENCIA DE CALOR:\n• CONDUCCIÓN: Transferencia por contacto directo (metales, buenos conductores; madera/plástico, aislantes).\n• CONVECCIÓN: Transferencia por movimiento de fluidos (agua hirviendo, vientos).\n• RADIACIÓN: Transferencia por ondas electromagnéticas (calor del Sol).\n\n📏 DILATACIÓN TÉRMICA: Aumento de dimensiones al calentar un cuerpo (lineal, superficial, volumétrica).\n\n⚠️ ERRORES COMUNES:\n• Confundir rapidez con velocidad (velocidad es vector).\n• Pensar que para que un cuerpo se mueva siempre se requiere una fuerza (1ª ley: el MRU no requiere fuerza neta).\n• Creer que el peso se mide en kg (se mide en Newtons).\n• Afirmar que "un cuerpo tiene calor" (el calor es energía en tránsito; los cuerpos tienen energía interna, no "calor").\n• Suponer que el hielo siempre está a 0°C (puede estar a temperaturas inferiores).`,
          4: `✏️ TRABAJOS DIRIGIDOS: Física Ciclo VI\n\n📝 BLOQUE 1: Cinemática\n1. Un auto viaja a 72 km/h. Convierte a m/s (20 m/s). Si mantiene esa velocidad durante 2 horas, ¿qué distancia recorre? (d = 20 m/s * 7200 s = 144,000 m = 144 km).\n2. Un móvil parte del reposo y acelera a 3 m/s² durante 8 s. Calcula: a) velocidad final (v = a·t = 24 m/s), b) distancia recorrida (½·3·8² = 96 m).\n3. Dibuja la gráfica v vs t de un MRUV que frena hasta detenerse.\n\n📝 BLOQUE 2: Leyes de Newton\n4. Calcula el peso de una persona de 60 kg: W = 60·9.8 = 588 N.\n5. Sobre un bloque de 10 kg se aplica una fuerza neta de 50 N. ¿Qué aceleración adquiere? a = F/m = 5 m/s².\n6. Identifica pares de acción-reacción: libro sobre mesa (libro empuja mesa hacia abajo, mesa empuja libro hacia arriba - Normal).\n\n📝 BLOQUE 3: Energía mecánica\n7. Un ciclista (80 kg) va a 10 m/s. Calcula su energía cinética: Ec = ½·80·10² = 4000 J.\n8. Una maceta de 2 kg está a 5 m de altura. Calcula su Ep: Ep = 2·9.8·5 = 98 J.\n9. Si la maceta cae, ¿con qué velocidad llega al suelo? (Conservación: Em = Ep_arriba = Ec_abajo → 98 = ½·2·v² → v²=98 → v≈9.9 m/s).\n\n📝 BLOQUE 4: Calor y temperatura\n10. Convierte: 37°C a °F (F = 9/5·37+32 = 98.6°F) y a Kelvin (310 K).\n11. ¿Cuántas calorías se necesitan para calentar 200 g de agua de 20°C a 80°C? c_agua = 1 cal/g°C; Q = m·c·ΔT = 200·1·60 = 12,000 cal = 12 kcal.\n12. ¿Por qué una cuchara metálica en una sopa caliente quema más que una de madera? (El metal conduce el calor mucho mejor).\n\n⏱️ Tiempo: 90 min. ✅ Revisión y resolución en pizarra.`,
          5: `🔗 CORRELACIONES INTERNAS: Física con Matemática y Química\n\n🧮 CON MATEMÁTICA:\n• Cinemática requiere manejo de ecuaciones lineales y cuadráticas, gráficas cartesianas, interpretación de pendiente.\n• Vectores: descomposición vectorial, suma y resta de vectores (para fuerzas).\n• Trigonometría: ángulo en el cálculo del trabajo (F·d·cosθ).\n\n🔬 CON QUÍMICA:\n• La teoría cinética molecular conecta temperatura con energía cinética de partículas.\n• Los cambios de estado (fusión, ebullición) involucran calor latente.\n• La electroquímica se conecta con la energía eléctrica, que se puede transformar en mecánica (motor).\n\n🧩 ACTIVIDAD INTEGRADORA: "Cálculo de la velocidad de un auto con datos experimentales y consumo de combustible". Miden distancia y tiempo de un auto de juguete, calculan v y a, estiman energía cinética y la relacionan con energía química (pila).`,
          6: `🌍 CORRELACIONES EXTERNAS: La física en el Perú y la vida diaria\n\n🏔️ ENERGÍA HIDROELÉCTRICA:\n• En Perú, centrales como el Mantaro o Cerro del Águila convierten la energía potencial gravitatoria del agua en energía eléctrica (transformación de energía mecánica).\n\n🚗 SEGURIDAD VIAL:\n• La distancia de frenado depende de la velocidad inicial y la aceleración de frenado (MRUV). El cinturón de seguridad aplica la primera ley de Newton: evita que el pasajero siga en movimiento por inercia en una frenada brusca.\n• Los límites de velocidad en carreteras se basan en principios físicos.\n\n🥘 COCINA:\n• La olla a presión aumenta la temperatura de ebullición del agua (mayor presión, mayor punto de ebullición).\n• El calor se transfiere por conducción y convección; elegimos ollas de metal (buen conductor).\n• La refrigeración extrae calor del interior (la segunda ley de la termodinámica).\n\n🌡️ CLIMA Y ARQUITECTURA:\n• En la sierra peruana, las casas de adobe mantienen el calor por su alta inercia térmica (absorben calor durante el día y lo liberan de noche).\n• La formación de brisas marinas (convección) explica el clima costero.\n\n🧠 REFLEXIÓN FINAL: "La física no es una ciencia abstracta; está en cada paso que das, en cada vehículo que se mueve, en cada rayo de sol que te calienta. Conocerla te permite entender y predecir el mundo."`,
          7: `👥 MÓDULO DE PROYECTO GRUPAL: "Física en movimiento"\n\n🎯 OBJETIVO: Los equipos aplicarán los conceptos de cinemática, dinámica, energía o calor en un proyecto experimental o de construcción.\n\n📋 FASES:\n1. ELECCIÓN (1 sesión)\n   - Cohete de agua (cinemática, dinámica, acción-reacción).\n   - Montaña rusa de canicas (energía cinética y potencial, conservación).\n   - Carrera de autos a fricción (MRU y MRUV, gráficas).\n   - Construcción de un termómetro casero (dilatación).\n   - Estudio del aislamiento térmico (conducción del calor).\n\n2. INVESTIGACIÓN Y CONSTRUCCIÓN (2 sesiones)\n3. DEMOSTRACIÓN EN FERIA (1 sesión)\n   - Medición de variables, comprobación de ecuaciones.\n4. EVALUACIÓN (1 sesión)\n   - Rúbrica: fundamento teórico correcto (40%), ejecución experimental (30%), presentación clara (20%), trabajo en equipo (10%).\n\n🎉 CIERRE: "Premio Newton Escolar". Reflexión final sobre el valor de la física para entender y transformar el mundo.`
        };

                    return `ACTIVIDAD DE DESCUBIERTA: "Explorando ${materia}"\n\n🧩 Se presentan situaciones problemáticas y materiales concretos para que los estudiantes exploren libremente los conceptos de ${materia}.\n🔍 Preguntas para la reflexión y registro de observaciones en el cuaderno de experiencias.`;

                case 3:
                    return `TRANSMISIÓN CONCEPTUAL: ${materia}\n\n📐 CONCEPTOS CLAVE:\n${conocimientos}\n\n📏 DEFINICIONES, PROPIEDADES Y EJEMPLOS DESARROLLADOS.\n⚠️ Errores comunes y estrategias para evitarlos.`;
                case 4:

                case 5:
                    return `CORRELACIONES INTERNAS: Conexión con otras materias del área\n\n🔗 ${materia} se relaciona con otras ramas de ${lesson.areaName}. Se presentan ejemplos de integración.`;
                case 6:
                    return `CORRELACIONES EXTERNAS: Aplicaciones en la vida real\n\n🌍 Se muestran aplicaciones de ${materia} en la vida cotidiana, la tecnología, el arte, la naturaleza.`;
                case 7:
                    return `MÓDULO DE PROYECTO GRUPAL: "Aplicando ${materia} en equipo"\n\n🎯 Los estudiantes diseñan y ejecutan un proyecto colaborativo que integre los conocimientos de ${materia}.\n📋 Fases: formación de equipos, elección del tema, planificación, ejecución, presentación y evaluación.`;
                default:
                    return '';
            }
        }

                    </div>
                    <div class="area-card metodo-highlight" onclick="navigateToLesson('metodo-ciclo-vi')">
                        <div class="icon">⚗️</div>
                        <h2>El Método Científico <span class="featured-badge">🌟 Destacado</span></h2>
                        <p class="count">${metodoCount} lecciones especializadas · Ciclos V, VI y VII</p>
                        <p style="font-size:0.78rem;color:#6b21a8;margin-top:0.4rem;">🔬 Contenido del PDF: experimentos, variables, sesgo, biología</p>
                    </div>
                </div>
                <div style="margin-top:1.5rem;padding:1.2rem;background:#fefce8;border-radius:12px;border:1px solid #eab308;font-size:0.85rem;color:#92400e;">
                    <strong>🌟 Lecciones extensas ya desarrolladas:</strong><br>
                    <strong>Ciclo III (1°-2° Primaria):</strong><br>
                    🧮 <strong>Números y Operaciones</strong> — contenido detallado + proyecto "La Tiendita Matemática".<br>
                    🧮 <strong>Geometría</strong> — figuras planas y cuerpos geométricos + proyecto "Museo de Formas Geométricas".<br>
                    🧮 <strong>Medición</strong> — longitud, masa y tiempo + proyecto "La Feria de las Medidas".<br>
                    🔬 <strong>Seres Vivos</strong> — cuerpo humano, animales, plantas y hábitos saludables + proyecto "Feria de la Salud y la Naturaleza".<br>
                    🔬 <strong>Materia y Energía</strong> — propiedades de materiales, luz y sonido + proyecto "Museo Interactivo de la Materia, la Luz y el Sonido".<br>
                    🔬 <strong>Tierra y Universo</strong> — día y noche, aire, agua, suelo y cambios atmosféricos + proyecto "Guardianes del Planeta".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo IV (3°-4° Primaria):</strong><br>
                    🧮 <strong>Números y Operaciones</strong> — naturales, fracciones, decimales y operaciones combinadas + proyecto "El Bazar del Saber".<br>
                    🧮 <strong>Geometría</strong> — ángulos, polígonos, perímetro y área de figuras planas + proyecto "Constructores de Figuras".<br>
                    🧮 <strong>Estadística</strong> — tablas de frecuencia, gráficos de barras y pictogramas + proyecto "Encuestadores Escolares".<br>
                    🔬 <strong>Seres Vivos</strong> — clasificación, cadenas alimenticias, ecosistemas peruanos + proyecto "Expedición Científica".<br>
                    🔬 <strong>Materia y Energía</strong> — estados de la materia, mezclas, fuerza y movimiento, energía renovable + proyecto "Feria Científica".<br>
                    🔬 <strong>Tierra y Universo</strong> — sistema solar, capas de la Tierra, ciclo del agua + proyecto "Planetario, Volcán y Destilador".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo V (5°-6° Primaria):</strong><br>
                    🧮 <strong>Números y Operaciones</strong> — decimales, fracciones, proporcionalidad y porcentajes + proyecto "Emprendedores Matemáticos".<br>
                    🧮 <strong>Álgebra</strong> — patrones y ecuaciones simples + proyecto "Máquina de Patrones y Escape Room".<br>
                    🧮 <strong>Geometría</strong> — áreas, volumen de prismas y circunferencia + proyecto "Ciudad Geométrica".<br>
                    🔬 <strong>Seres Vivos</strong> — la célula, sistemas del cuerpo humano, reproducción humana y biodiversidad + proyecto "Expedición Virtual".<br>
                    🔬 <strong>Materia y Energía</strong> — tabla periódica, reacciones químicas, electricidad y magnetismo + proyecto "Feria Científica".<br>
                    🔬 <strong>Tierra y Universo</strong> — placas tectónicas, fenómenos naturales, contaminación ambiental + proyecto "Simposio de Gestión de Riesgos".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo VI (1°-2° Secundaria):</strong><br>
                    🧮 <strong>Aritmética y Álgebra</strong> — números enteros, polinomios, ecuaciones, sistemas, inecuaciones + proyecto "Consultoría Matemática Juvenil".<br>
                    🧮 <strong>Geometría</strong> — triángulos, congruencia, semejanza, Pitágoras, áreas, volúmenes, trigonometría + proyecto "Misión: Medir lo Inaccesible".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo VI (1°-2° Secundaria) - Ciencia:</strong><br>
                    🔬 <strong>Química</strong> — estructura atómica, tabla periódica, enlaces, reacciones, compuestos inorgánicos + proyecto.<br>
                    🔬 <strong>Biología</strong> — citología, bioquímica, fisiología vegetal y animal, genética mendeliana, ecología + proyecto.<br>
                    🔬 <strong>Física</strong> — cinemática (MRU, MRUV), leyes de Newton, energía mecánica, calor y temperatura + proyecto.<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo VII (3°-5° Secundaria):</strong><br>
                    🧮 <strong>Álgebra y Funciones</strong> — números reales, funciones, progresiones, programación lineal + proyecto "Optimizadores S.A.".<br>
                    🧮 <strong>Geometría y Trigonometría</strong> — geometría analítica, identidades, ley de senos/cosenos + proyecto "Parque Temático Geométrico".<br>
                    🧮 <strong>Estadística y Probabilidad</strong> — descriptiva, inferencial, probabilidad condicional, binomial + proyecto "Estudio Estadístico Escolar".<br>
