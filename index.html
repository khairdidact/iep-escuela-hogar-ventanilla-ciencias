                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderArea(areaKey) {
            currentView = 'area';
            currentArea = areaKey;
            currentLessonId = null;
            const areaLessons = lessonsData.filter(l => l.area === areaKey);
            const areaName = areaLessons[0]?.areaName || 'Área';
            updateBreadcrumb([{ label: areaName, action: null, current: true }]);
            const groups = {};
            areaLessons.forEach(l => {
                const groupKey = `${l.nivel}|${l.ciclo}`;
                if (!groups[groupKey]) { groups[groupKey] = { nivel: l.nivel, ciclo: l.ciclo, lessons: [] }; }
                groups[groupKey].lessons.push(l);
            });
            const groupOrder = ['Primaria|Ciclo III', 'Primaria|Ciclo IV', 'Primaria|Ciclo V',
                'Secundaria|Ciclo VI', 'Secundaria|Ciclo VII'
            ];
            const sortedGroups = groupOrder.map(key => groups[key]).filter(g => g);
            let groupsHTML = '';
            sortedGroups.forEach(group => {
                const nivelClass = group.nivel.toLowerCase();
                groupsHTML += `
                <div class="level-group">
                    <div class="level-group-header">
                        <span class="level-badge ${nivelClass}">${group.nivel}</span>
                        <span class="ciclo-tag">${group.ciclo}</span>
                    </div>
                    <div class="lesson-grid">
                        ${group.lessons.map(l => {
                            const isMetodo = l.esMetodo ? ' metodo-card' : '';
                            const metodoIcon = l.esMetodo ? ' <span class="metodo-icon-small">🧪 MÉTODO</span>' : '';
                            return `
                            <div class="lesson-card${isMetodo}" onclick="navigateToLesson('${l.id}')">
                                <span class="lesson-title">${l.materia}${metodoIcon}</span>
                                <span class="lesson-meta">📐 ${l.grado}</span>
                                <span class="lesson-preview">${l.conocimientos}</span>
                                <span class="arrow">→</span>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            });
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <button class="btn-back" onclick="navigateHome()">← Volver al inicio</button>
                <h1 class="page-title">${areaName}</h1>
                <p class="page-subtitle">${areaLessons.length} lecciones organizadas por nivel y ciclo. Todas con contenido pedagógico completo.</p>
                ${groupsHTML}
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderLesson(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) { renderHome(); return; }
            currentView = 'lesson';
            currentLessonId = lessonId;
            currentArea = lesson.area;
            updateBreadcrumb([
                { label: lesson.areaName, action: () => navigateToArea(lesson.area), current: false },
                { label: lesson.materia + ' (' + lesson.grado + ')', action: null, current: true },
            ]);
            const nivelClass = lesson.nivel.toLowerCase();
            const isMetodo = lesson.esMetodo;
            const headerClass = isMetodo ? ' metodo-header' : '';
            let phasesHTML = '';
            phaseDefinitions.forEach(phase => {
                phasesHTML += `
                <div class="phase-item ${phase.cssClass}" id="phase-${phase.number}-${lesson.id}">
                    <div class="phase-header" onclick="togglePhase('phase-${phase.number}-${lesson.id}')">
                        <span class="phase-number">${phase.number}</span>
                        <span class="phase-title-text">
                            ${phase.title}
                            <span class="phase-subtitle">${phase.subtitle}</span>
                        </span>
                        <span class="phase-chevron">▾</span>
                    </div>
                    <div class="phase-body">
                        <textarea class="editable-area" id="editable-${phase.number}-${lesson.id}" placeholder="Contenido de la Fase ${phase.number}..." data-phase="${phase.number}" data-lesson="${lesson.id}"></textarea>
                    </div>
                </div>
                `;
            });
            const isExtensaCicloIII = (lessonId === 'mat-pri-num-iii' || lessonId === 'mat-pri-geo-iii' || lessonId === 'mat-pri-med-iii');
            const isExtensaCicloIIICiencia = (lessonId === 'ct-pri-sv-iii' || lessonId === 'ct-pri-me-iii' || lessonId === 'ct-pri-tu-iii');
            const isExtensaCicloIVMat = (lessonId === 'mat-pri-num-iv' || lessonId === 'mat-pri-geo-iv' || lessonId === 'mat-pri-est-iv');
            const isExtensaCicloIVCiencia = (lessonId === 'ct-pri-sv-iv' || lessonId === 'ct-pri-me-iv' || lessonId === 'ct-pri-tu-iv');
            const isExtensaCicloV = (lessonId === 'mat-pri-num-v' || lessonId === 'mat-pri-alg-v' || lessonId === 'mat-pri-geo-v');
            const isExtensaCicloVCiencia = (lessonId === 'ct-pri-sv-v' || lessonId === 'ct-pri-me-v' || lessonId === 'ct-pri-tu-v');
            const isExtensaSec = (lessonId === 'mat-sec-arit-vi' || lessonId === 'mat-sec-geo-vi' || lessonId === 'mat-sec-alg-vii' || lessonId === 'mat-sec-geotrig-vii' || lessonId === 'mat-sec-estprob-vii');
            const esExtensa = isExtensaCicloIII || isExtensaCicloIIICiencia || isExtensaCicloIVMat || isExtensaCicloIVCiencia || isExtensaCicloV || isExtensaCicloVCiencia || isExtensaSec || lessonId === 'ct-sec-quim-vi' || lessonId === 'ct-sec-bio-vi' || lessonId === 'ct-sec-fis-vi';
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <button class="btn-back" onclick="navigateToArea('${lesson.area}')">← Volver a ${lesson.areaName}</button>
                <div class="lesson-detail">
                    <div class="lesson-header-card${headerClass}">
                        <div class="meta-row">
                            <span class="level-badge ${nivelClass}">${lesson.nivel}</span>
                            <span>📐 ${lesson.grado}</span>
                            <span>🔄 ${lesson.ciclo}</span>
                            ${isMetodo ? '<span style="background:#8b5cf6;color:#fff;padding:0.2rem 0.7rem;border-radius:14px;font-size:0.75rem;font-weight:600;">🌟 LECCIÓN DESTACADA</span>' : ''}
                        </div>
                        <h1>${lesson.materia}</h1>
                        <span class="knowledge-tag">📘 ${lesson.conocimientos}</span>
                        ${esExtensa ? '<p style="margin-top:0.6rem;font-size:0.82rem;color:#eab308;">🌟 <strong>Lección extensa detallada:</strong> contenido ilustrado con ejemplos, ejercicios y proyecto completo.</p>' : ''}
                    </div>
                    <p style="color:#64748b;margin-bottom:1rem;font-size:0.8rem;">
                        📝 Expande cada fase para ver y editar su contenido.
                        <span style="font-size:0.7rem;color:#94a3b8;">(Cambios guardados automáticamente)</span>
                    </p>
                    <div class="phase-accordion">
                        ${phasesHTML}
                    </div>
                </div>
            `;
            restoreSavedContent(lessonId);
            if (lessonId === 'mat-pri-num-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumIII), 150);
            } else if (lessonId === 'mat-pri-geo-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoIII), 150);
            } else if (lessonId === 'mat-pri-med-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMedIII), 150);
            } else if (lessonId === 'ct-pri-sv-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVIII), 150);
            } else if (lessonId === 'ct-pri-me-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEIII), 150);
            } else if (lessonId === 'ct-pri-tu-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUIII), 150);
            } else if (lessonId === 'mat-pri-num-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumIV), 150);
            } else if (lessonId === 'mat-pri-geo-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoIV), 150);
            } else if (lessonId === 'mat-pri-est-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaEstIV), 150);
            } else if (lessonId === 'ct-pri-sv-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVIV), 150);
            } else if (lessonId === 'ct-pri-me-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEIV), 150);
            } else if (lessonId === 'ct-pri-tu-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUIV), 150);
            } else if (lessonId === 'mat-pri-num-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumV), 150);                
            } else if (lessonId === 'mat-pri-alg-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAlgV), 150);
            } else if (lessonId === 'mat-pri-geo-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoV), 150);
            } else if (lessonId === 'ct-pri-sv-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVV), 150);
            } else if (lessonId === 'ct-pri-me-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEV), 150);
            } else if (lessonId === 'ct-pri-tu-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUV), 150);
            } else if (lessonId === 'mat-sec-arit-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAritAlgVI), 150);
            } else if (lessonId === 'mat-sec-geo-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoVI), 150);
            } else if (lessonId === 'mat-sec-alg-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAlgFuncVII), 150);
            } else if (lessonId === 'mat-sec-geotrig-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeomTrigVII), 150);
            } else if (lessonId === 'mat-sec-estprob-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaEstProbVII), 150);
            } else if (lessonId === 'ct-sec-quim-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaQuimVI), 150);
            } else if (lessonId === 'ct-sec-bio-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaBioVI), 150);
            } else if (lessonId === 'ct-sec-fis-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaFisVI), 150);
            } else {
                setTimeout(() => applyAutoGeneratedContent(lessonId), 150);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyManualContent(lessonId, contentObj) {
            Object.keys(contentObj).forEach(phaseNum => {
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = contentObj[phaseNum]; localStorage.setItem(key, contentObj[phaseNum]); }
                }
            });
        }

        function applyAutoGeneratedContent(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) return;
            phaseDefinitions.forEach(phase => {
                const phaseNum = phase.number;
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const content = generateLessonContent(lesson, phaseNum);
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = content; localStorage.setItem(key, content); }
                }
            });
        }

        function togglePhase(phaseElementId) {
            const phaseItem = document.getElementById(phaseElementId);
            if (!phaseItem) return;
            phaseItem.classList.toggle('open');
            const ta = phaseItem.querySelector('.editable-area');
            if (ta) saveContent(ta);
        }

        function getStorageKey(lessonId, phaseNumber) { return `lesson-${lessonId}-phase-${phaseNumber}`; }
        function saveContent(textarea) { localStorage.setItem(getStorageKey(textarea.dataset.lesson, textarea.dataset.phase), textarea.value); }

        function restoreSavedContent(lessonId) {
            phaseDefinitions.forEach(phase => {
                const saved = localStorage.getItem(getStorageKey(lessonId, phase.number));
                if (saved) { const ta = document.getElementById(`editable-${phase.number}-${lessonId}`); if (ta) ta.value = saved; }
            });
        }

        let saveTimeout;
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('editable-area')) {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => saveContent(e.target), 500);
            }
        });
        document.addEventListener('blur', function(e) {
            if (e.target.classList.contains('editable-area')) saveContent(e.target);
        }, true);

        function navigateHome() { window.location.hash = ''; renderHome(); }
        function navigateToArea(areaKey) { window.location.hash = areaKey; renderArea(areaKey); }
        function navigateToLesson(lessonId) { window.location.hash = lessonId; renderLesson(lessonId); }

        function updateBreadcrumb(items) {
            const bc = document.getElementById('breadcrumb');
            let html = '<span onclick="navigateHome()">Inicio</span>';
            items.forEach(item => {
                html += ' <span class="sep">›</span> ';
                if (item.current) html += `<span class="current">${item.label}</span>`;
                else if (item.action) html += `<span onclick="(${item.action.toString()})()" style="cursor:pointer;">${item.label}</span>`;
                else html += `<span>${item.label}</span>`;
            });
            bc.innerHTML = html;
        }

        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.replace('#', '');
            if (!hash) renderHome();
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else if (lessonsData.some(l => l.id === hash)) renderLesson(hash);
        });

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                if (currentView === 'lesson') {
                    const allPhases = document.querySelectorAll('.phase-item');
                    const anyClosed = Array.from(allPhases).some(p => !p.classList.contains('open'));
                    allPhases.forEach(p => { if (anyClosed) p.classList.add('open'); else p.classList.remove('open'); });
                    document.querySelectorAll('.editable-area').forEach(ta => saveContent(ta));
                }
            }
        });

        function init() {
            const hash = window.location.hash.replace('#', '');
            if (hash && lessonsData.some(l => l.id === hash)) renderLesson(hash);
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else renderHome();
        }
        init();
        console.log('✅ Página de inicio restaurada: 3 bloques de área, Método Científico presente.');
        console.log('🧮 Matemática: 14 lecciones | 🔬 Ciencia y Tecnología: 15 lecciones | ⚗️ Método Científico: 3 lecciones.');
        console.log('🌟 26 lecciones extensas: 3 Matemática Ciclo III + 3 Ciencia Ciclo III + 3 Matemática Ciclo IV + 3 Ciencia Ciclo IV + 3 Matemática Ciclo V + 3 Ciencia Ciclo V + 2 Matemática Ciclo VI + 3 Ciencia Ciclo VI + 3 Matemática Ciclo VII.');
    </script>
</body>
</html>
