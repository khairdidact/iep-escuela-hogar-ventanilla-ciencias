        const leccionExtensaNumV = {
            0: `🎯 OBJETIVO GENERAL: Consolidar el dominio de las operaciones con números decimales y fracciones, y desarrollar la comprensión de la proporcionalidad y los porcentajes, aplicándolos en la resolución de problemas matemáticos y situaciones de la vida real, preparando a los estudiantes de 5° y 6° grado para la educación secundaria.\n\n🎯 OBJETIVOS PARTICULARES:\n• Realizar sumas, restas, multiplicaciones y divisiones con números decimales con precisión.\n• Sumar y restar fracciones heterogéneas utilizando el mínimo común múltiplo.\n• Multiplicar y dividir fracciones.\n• Interpretar y calcular razones y proporciones.\n• Resolver problemas de proporcionalidad directa e inversa mediante la regla de tres.\n• Calcular porcentajes y aplicarlos a situaciones de descuento, aumento e interés.\n• Expresar un porcentaje como fracción y decimal, y viceversa.\n\n📌 NOCIONES PRINCIPALES:\n• Número decimal, décima, centésima, milésima.\n• Fracción, fracción equivalente, fracción irreductible, mínimo común múltiplo (MCM).\n• Razón, proporción, constante de proporcionalidad.\n• Proporcionalidad directa e inversa. Regla de tres simple.\n• Porcentaje (%), tanto por ciento.\n\n📌 NOCIONES SECUNDARIAS:\n• Notación científica básica (potencias de 10 con exponente positivo y negativo).\n• Aproximación y redondeo de decimales.\n• Escalas (planos y mapas) como aplicación de la proporcionalidad.\n• Reparto proporcional.\n• Interés simple como aplicación del porcentaje.\n\n🌍 INTERESES SOCIETALES:\n• Los números decimales y los porcentajes son esenciales en la economía familiar: compras, descuentos, impuestos (IGV), cuentas bancarias.\n• Las fracciones aparecen en la cocina (recetas), la carpintería (medidas) y la música (compases).\n• La proporcionalidad explica fenómenos como la densidad de población, las escalas en mapas, la velocidad constante.\n• Comprender estos conceptos empodera a los estudiantes para tomar decisiones informadas como ciudadanos y consumidores.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "La Feria de Ofertas y Recetas"\n\n🧩 MATERIALES: Folletos de supermercado, recibos de compra reales, calculadoras simples, tazas y cucharas medidoras, balanza de cocina, etiquetas de productos con precios, tarjetas con recetas, billetes didácticos.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Comparando Precios con Decimales" - Se muestran varios productos similares con precios por kg o por unidad (ej: Manzana S/3.50 x kg, Naranja S/2.80 x kg, Plátano S/2.99 x kg). Los estudiantes deben:\n• Ordenar precios de menor a mayor.\n• Calcular cuánto cuestan 2.5 kg de cada fruta.\n• Comparar: ¿qué fruta es más barata por kg? ¿Conviene comprar por kg o por unidad?\n\nESTACIÓN 2: "Cocina Fraccionaria" - Con una receta sencilla (limonada, queque) que usa fracciones (1/2 taza de azúcar, 3/4 taza de leche, 1/4 kg de mantequilla). Deben:\n• Convertir todas las fracciones a decimales.\n• Calcular los ingredientes necesarios para el doble de porciones y para la mitad.\n• Sumar fracciones de ingredientes (ej: 1/2 + 3/4 de taza de líquido total).\n\nESTACIÓN 3: "Descuentos Mágicos" - Con etiquetas de ropa o tecnología con descuentos (10%, 25%, 50%, 70%). Calcular:\n• Precio final después del descuento.\n• ¿Cuánto dinero se ahorra?\n• ¿Qué descuento conviene más: 20% + 10% adicional o 30% directo? (No siempre es igual).\n\nESTACIÓN 4: "Velocidad y Proporciones" - Con cronómetro, miden cuánto tardan en recorrer 10 metros caminando, trotando. Calculan la velocidad (metros por segundo). Luego, usando proporcionalidad, calculan cuánto tardarían en recorrer 100 m, 1 km.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Dónde encontramos decimales y porcentajes? ¿Cómo ayuda la proporcionalidad a predecir resultados? ¿Qué relación hay entre fracciones, decimales y porcentajes?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "De lo concreto a la regla matemática"\n\n📊 OBSERVACIÓN GUIADA: Fracciones ↔ Decimales ↔ Porcentajes\nLa docente presenta una tabla incompleta y los estudiantes la completan observando patrones:\n\n| Representación gráfica (barra dividida) | Fracción | Decimal | Porcentaje |\n|---|---|---|---|\n| ████████░░ | 4/5 | 0.8 | 80% |\n| ██████░░░░ | 3/5 | 0.6 | 60% |\n| ████░░░░░░ | ? | ? | ? |\n| ██████████ | 10/10 | 1.0 | 100% |\n\nPaso 1: Los estudiantes dividen numerador entre denominador para obtener el decimal: 1/2 = 0.5, 1/4 = 0.25, 3/4 = 0.75.\nPaso 2: Multiplican el decimal por 100 para el porcentaje: 0.5 × 100 = 50%.\nConclusión guiada: "Para convertir una fracción a porcentaje, dividimos numerador entre denominador y multiplicamos por 100".\n\n📊 PROPORCIONALIDAD DIRECTA:\nCaso: Compro 3 kg de papa por S/6. ¿Cuánto pagaré por 5 kg? ¿Y por 1 kg?\nTabla:\n| kg | 1 | 2 | 3 | 4 | 5 | 10 |\n| S/ | 2 | 4 | 6 | 8 | 10 | 20 |\nObservación: Cada vez que los kg aumentan al doble, el precio también. La razón precio/kg es constante (2).\nConclusión: "Si dos magnitudes varían manteniendo constante el cociente entre ellas, son directamente proporcionales".\n\n📊 PROPORCIONALIDAD INVERSA:\nCaso: Si 4 obreros tardan 6 días en construir un muro, ¿cuánto tardarán 8 obreros?\nTabla:\n| Obreros | 1 | 2 | 4 | 8 |\n| Días | 24 | 12 | 6 | 3 |\nObservación: Al duplicar obreros, los días se reducen a la mitad. Producto constante: 1×24 = 2×12 = 4×6 = 8×3 = 24.\nConclusión: "Si el producto de dos magnitudes es constante, son inversamente proporcionales".\n\n📝 REGISTRO: Los estudiantes escriben sus propias definiciones y ejemplos en su cuaderno.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Operaciones con Decimales, Fracciones, Proporcionalidad y Porcentajes\n\n🔢 1. OPERACIONES CON NÚMEROS DECIMALES\n\n📏 SUMA Y RESTA DE DECIMALES:\nSe alinean las comas decimales verticalmente. Se añaden ceros para igualar cifras.\nEjemplo: 45.7 + 3.25\n  45.70\n+  3.25\n= 48.95\n\n📏 MULTIPLICACIÓN DE DECIMALES:\nSe multiplican como enteros y luego se cuenta el número total de cifras decimales en los factores. Esa es la cantidad de decimales del producto.\nEjemplo: 3.5 × 2.4 → 35 × 24 = 840 → 3.5 (1 decimal) × 2.4 (1 decimal) = 2 decimales → 8.40 = 8.4\n\n📏 DIVISIÓN DE DECIMALES:\nSe multiplica dividendo y divisor por la potencia de 10 necesaria para que el divisor sea entero.\nEjemplo: 7.5 ÷ 0.25 → (7.5 × 100) ÷ (0.25 × 100) = 750 ÷ 25 = 30\n\n📏 MULTIPLICACIÓN Y DIVISIÓN POR POTENCIAS DE 10:\n• Multiplicar por 10, 100, 1000: se mueve la coma a la derecha (1, 2, 3 lugares). Ej: 3.78 × 100 = 378.\n• Dividir entre 10, 100, 1000: se mueve la coma a la izquierda. Ej: 45.6 ÷ 10 = 4.56.\n\n🔢 2. OPERACIONES CON FRACCIONES\n\n📏 FRACCIONES EQUIVALENTES: Se obtienen multiplicando o dividiendo numerador y denominador por un mismo número. Ej: 1/2 = 2/4 = 4/8 = 50/100.\n\n📏 SUMA Y RESTA DE FRACCIONES:\n• Homogéneas: mismo denominador → sumar/restar numeradores. Ej: 3/8 + 2/8 = 5/8.\n• Heterogéneas: se busca el MCM de los denominadores, se convierten a fracciones equivalentes, luego se suman/restan.\nEj: 1/3 + 1/4 → MCM(3,4)=12 → 4/12 + 3/12 = 7/12.\n\n📏 MULTIPLICACIÓN: Se multiplican numeradores entre sí y denominadores entre sí. Ej: 2/3 × 4/5 = 8/15.\n📏 DIVISIÓN: Se multiplica en cruz (producto cruzado) o se multiplica por el inverso. Ej: 3/4 ÷ 2/5 = 3/4 × 5/2 = 15/8.\n\n🔢 3. RAZONES Y PROPORCIONES\n\n📏 RAZÓN: Comparación entre dos cantidades mediante división. Ej: en un aula hay 12 niñas y 18 niños → razón niñas/niños = 12/18 = 2/3.\n\n📏 PROPORCIÓN: Igualdad de dos razones. a/b = c/d. Propiedad fundamental: a×d = b×c (producto de extremos = producto de medios).\n\n🔢 4. PROPORCIONALIDAD DIRECTA E INVERSA\n\n📈 DIRECTA: Si A aumenta, B aumenta en la misma proporción. A/B = constante.\nRepresentación gráfica: línea recta que pasa por el origen.\nEjemplo: velocidad constante → distancia = velocidad × tiempo.\n\n📉 INVERSA: Si A aumenta, B disminuye en la misma proporción. A×B = constante.\nRepresentación gráfica: hipérbola.\nEjemplo: número de obreros y tiempo para terminar una obra.\n\n📏 REGLA DE TRES SIMPLE:\n• Directa: Si 5 lápices cuestan S/15, ¿cuánto cuestan 8 lápices?\n  5 → 15\n  8 → x  ⇒ x = (8×15)/5 = 24\n• Inversa: Si 6 obreros tardan 10 días, 15 obreros ¿cuánto tardan?\n  6 → 10\n  15 → x  ⇒ x = (6×10)/15 = 4 días.\n\n🔢 5. PORCENTAJES\n\n📏 DEFINICIÓN: Un porcentaje es una razón con denominador 100. 25% = 25/100 = 0.25.\n\n📏 CÁLCULO DE PORCENTAJE DE UNA CANTIDAD: a% de N = (a/100) × N.\nEj: 15% de 200 = (15/100)×200 = 30.\n\n📏 AUMENTOS Y DESCUENTOS:\n• Aumento del a%: Precio final = Precio inicial × (1 + a/100). Ej: Aumento 20% sobre S/50 → 50 × 1.20 = S/60.\n• Descuento del a%: Precio final = Precio inicial × (1 - a/100). Ej: Descuento 30% sobre S/50 → 50 × 0.70 = S/35.\n\n⚠️ ERRORES COMUNES:\n• Desalinear comas al sumar decimales.\n• No convertir a fracciones equivalentes antes de sumar fracciones heterogéneas.\n• Confundir proporcionalidad directa con inversa.\n• Sumar porcentajes de diferentes bases (ej: descuento 20% + 10% ≠ 30% sobre el mismo precio).`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Decimales\n1. Suma: 45.32 + 8.7 + 0.115 = (54.135)\n2. Resta: 200 - 67.89 = (132.11)\n3. Multiplica: 3.6 × 2.5 = (9.0); 0.75 × 4.2 = (3.15)\n4. Divide: 12.6 ÷ 0.3 = (42); 5.5 ÷ 0.25 = (22)\n5. Multiplica mentalmente: a) 3.456 × 10 = (34.56) b) 0.89 × 1000 = (890) c) 567 ÷ 100 = (5.67)\n6. Redondea a la décima: 4.38 → (4.4) ; 9.92 → (9.9)\n\n📝 BLOQUE 2: Fracciones\n7. Simplifica: 15/20 = (3/4); 28/42 = (2/3)\n8. Suma: 2/5 + 1/3 = (11/15); 3/8 + 5/6 = (29/24 = 1 5/24)\n9. Resta: 7/10 - 2/5 = (3/10); 3 - 5/8 = (19/8 = 2 3/8)\n10. Multiplica: 3/4 × 5/6 = (15/24 = 5/8); 2/3 × 9/10 = (18/30 = 3/5)\n11. Divide: 5/8 ÷ 3/4 = (20/24 = 5/6); 7/9 ÷ 2/3 = (21/18 = 7/6 = 1 1/6)\n\n📝 BLOQUE 3: Proporcionalidad\n12. Si 4 cuadernos cuestan S/24, ¿cuánto cuestan 7? (S/42)\n13. Un grifo llena un tanque en 12 horas. ¿Cuánto tardarán 3 grifos iguales? (4 horas)\n14. En 100 km un auto gasta 6 litros. ¿Cuánto gastará en 350 km? (21 litros)\n15. Si 8 albañiles tardan 15 días en construir una pared, ¿cuántos días tardarán 5 albañiles? (24 días) ¡Cuidado! Es inversa.\n\n📝 BLOQUE 4: Porcentajes\n16. Calcula: a) 25% de 400 = (100) b) 10% de 850 = (85) c) 75% de 200 = (150) d) 5% de 60 = (3)\n17. Una camisa cuesta S/80 y tiene 20% de descuento. ¿Cuánto pago? (S/64)\n18. Un sueldo de S/1500 aumenta 15%. ¿Cuál es el nuevo sueldo? (S/1725)\n19. Si pagué S/153 por un artículo con 15% de descuento ya aplicado, ¿cuál era el precio original? (S/180)\n20. ¿Qué porcentaje de 200 es 50? (25%)\n\n📝 BLOQUE 5: Problemas integrados\n21. Receta: 3/4 kg de harina, 1/2 kg de mantequilla, 1/4 kg de azúcar. ¿Cuánto pesa la mezcla total? (1.5 kg o 1 1/2 kg). Si quiero hacer 3 veces la receta, ¿cuánto necesito de cada ingrediente?\n22. Un televisor cuesta S/1200 + IGV (18%). ¿Precio final? (S/1416).\n23. En un mapa a escala 1:50000, 8 cm representan ¿cuántos km? (4 km).\n\n⏱️ Tiempo estimado: 60-90 min. ✅ Revisión en parejas.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Geometría, Álgebra y Estadística\n\n📐 CONEXIÓN CON GEOMETRÍA:\n• Cálculo de áreas con números decimales (base 3.5 cm, altura 2.4 cm).\n• Escalas: un plano a escala 1:50 implica proporcionalidad. Si 1 cm = 50 cm reales, 3.2 cm = 160 cm.\n• El número pi (π ≈ 3.1416...) es un decimal infinito no periódico.\n• Volumen de prismas: dimensiones con decimales.\n\n📏 CONEXIÓN CON ÁLGEBRA:\n• La proporción a/b = c/d lleva a ecuaciones: 3x = 24.\n• La regla de tres es una ecuación disfrazada: x = (a×c)/b.\n• Al representar porcentajes desconocidos: x% de 200 = 50 → (x/100)×200 = 50 → 2x = 50 → x = 25.\n\n📊 CONEXIÓN CON ESTADÍSTICA:\n• Gráficos circulares: cada sector es un porcentaje del total (100%).\n• Encuestas: "El 40% de los estudiantes prefiere fútbol" → 40/100 = 2/5.\n• Promedios con decimales.\n\n🧩 ACTIVIDAD INTEGRADORA: "Análisis de una encuesta escolar": Realizar una encuesta sobre un tema (deporte favorito), calcular frecuencias, convertir a fracciones, decimales y porcentajes, y representar en gráfico circular.\n\n💡 REFLEXIÓN: Los números racionales (fracciones y decimales) y los porcentajes son el lenguaje común de todas las ramas de las matemáticas. Sin ellos, no podríamos expresar medidas precisas ni comparar datos.`,
            6: `🌍 CORRELACIONES EXTERNAS: Números racionales y proporcionalidad en el mundo real\n\n🏪 ECONOMÍA Y FINANZAS:\n• El IGV en Perú es 18% (antes 19%). Cada compra incluye este impuesto.\n• Interés bancario: 3% anual sobre ahorros, 15% anual en préstamos.\n• Descuentos por temporada: "Hasta 70% off".\n• Tipo de cambio: S/3.75 por dólar.\n\n🍳 COCINA Y REPOSTERÍA:\n• Las recetas usan fracciones: 3/4 taza, 1/2 cucharadita.\n• Ajustar porciones: regla de tres para calcular ingredientes.\n• Temperatura del horno: Celsius y Fahrenheit (proporción lineal).\n\n🚗 TRANSPORTE:\n• Rendimiento: 40 km por galón. ¿Cuánto gasto en 250 km? (6.25 galones).\n• Velocidad = distancia / tiempo. Si recorro 180 km en 2.5 horas, mi velocidad media es 72 km/h.\n• Escalas en mapas: 1 cm = 10 km.\n\n⚕️ SALUD:\n• Dosis de medicamentos en mg por kg de peso (proporcionalidad directa).\n• Etiquetas nutricionales: % de valor diario recomendado.\n• IMC = peso / talla² (implica decimales y proporción).\n\n⚽ DEPORTES:\n• Porcentaje de efectividad en tiros al arco.\n• Estadísticas de jugadores: promedio de bateo, porcentaje de pases acertados.\n\n🧠 REFLEXIÓN FINAL: "Vivimos en un mundo de números racionales. Desde el 50% de probabilidad de lluvia hasta el 18% de IGV, comprender decimales, fracciones y porcentajes nos permite interpretar mejor la realidad y tomar decisiones informadas."\n\n🗣️ CITA: "La matemática es la ciencia del orden y la medida, de las bellas cadenas de razonamiento, todo simple y fácil." — René Descartes.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Emprendedores Matemáticos: Nuestra Tienda Virtual"\n\n🎯 OBJETIVO: Los estudiantes crearán un catálogo de productos, aplicando costos, descuentos, porcentajes, fracciones y proporcionalidad, simulando un negocio real.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ORGANIZACIÓN (1 sesión)\n• 5 equipos de 4-5 estudiantes.\n• Cada equipo elige un rubro: Ropa, Tecnología, Alimentos, Librería, Juguetería.\n• Se nombran roles: Gerente (coordina), Contador (cálculos), Diseñador (catálogo), Vendedor (presentación).\n\nFASE 2: CREACIÓN DEL CATÁLOGO (2 sesiones)\n• Cada equipo selecciona 10 productos con precios reales (investigación previa en folletos o internet).\n• Deben expresar precios en decimales (S/29.90, S/149.99).\n• Crean ofertas usando porcentajes (10%, 25%, 50% de descuento) y las expresan como fracción y decimal.\n• Calculan el precio final de cada producto con descuento.\n• Si ofrecen "2x1" o "lleve 3 pague 2", modelan con fracciones y proporciones.\n\nFASE 3: REGISTRO CONTABLE (1 sesión)\n• Simulan ventas a compañeros de otros equipos usando billetes didácticos.\n• Registran en una tabla: producto, cantidad, precio unitario, subtotal, descuento aplicado (%), IGV (18%), total.\n• Suman totales de ventas con decimales.\n• Calculan ganancia si el costo de compra fue 60% del precio de venta.\n\nFASE 4: ANÁLISIS Y ESTADÍSTICA (1 sesión)\n• ¿Qué producto se vendió más? Expresar como fracción del total de ventas.\n• ¿Qué porcentaje de descuento fue el más usado?\n• Calcular el ticket promedio (total ventas / número de transacciones).\n\nFASE 5: PRESENTACIÓN (1 sesión)\n• Cada equipo presenta su catálogo (formato físico o digital).\n• Explica al menos 3 cálculos realizados: un descuento, un cálculo con fracciones, una regla de tres.\n• Responde preguntas del público (compañeros y docente).\n\n🏆 EVALUACIÓN: Precisión en cálculos, uso correcto de decimales/porcentajes/fracciones, creatividad, trabajo en equipo, claridad en la presentación.\n🎉 CIERRE: Se entregan diplomas de "Emprendedor Matemático". El catálogo se expone en el mural escolar.`,

        const leccionExtensaAlgV = {
            0: `🎯 OBJETIVO GENERAL: Introducir a los estudiantes de 5° y 6° grado de primaria en el pensamiento algebraico, desarrollando la habilidad de reconocer, describir y generalizar patrones numéricos y geométricos, así como plantear y resolver ecuaciones simples de primer grado, sentando las bases para el álgebra formal de secundaria.\n\n🎯 OBJETIVOS PARTICULARES:\n• Identificar patrones en secuencias numéricas y geométricas.\n• Describir un patrón con lenguaje verbal y luego simbólico.\n• Traducir expresiones verbales a expresiones algebraicas sencillas.\n• Comprender el concepto de ecuación como una igualdad que contiene una incógnita.\n• Resolver ecuaciones simples de la forma x + a = b, ax = b, ax + b = c.\n• Aplicar ecuaciones para resolver problemas cotidianos.\n• Desarrollar la noción de variable como cantidad que puede cambiar.\n\n📌 NOCIONES PRINCIPALES:\n• Patrón, secuencia, regla de formación, término general.\n• Variable, constante, expresión algebraica, término, coeficiente.\n• Igualdad, ecuación, incógnita, solución de una ecuación.\n• Propiedades de la igualdad.\n• Transposición de términos.\n\n📌 NOCIONES SECUNDARIAS:\n• Uso del lenguaje simbólico para modelar situaciones.\n• Patrones crecientes y decrecientes.\n• Evaluación de expresiones algebraicas para valores dados.\n• Comprobación de la solución de una ecuación.\n• Iniciación a la representación gráfica de patrones en el plano cartesiano.\n\n🌍 INTERESES SOCIETALES:\n• El álgebra es el lenguaje de la ciencia y la tecnología: sin ella no habría computadoras, cohetes espaciales ni aplicaciones móviles.\n• Los patrones están en la naturaleza (sucesión de Fibonacci en los girasoles, conchas marinas) y en el arte (simetrías, ritmos).\n• Reconocer patrones ayuda a predecir y planificar: "Si ahorro S/10 cada semana, ¿cuánto tendré en 3 meses?".\n• El pensamiento algebraico desarrolla la abstracción, la lógica y la capacidad de resolver problemas.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Detectives de patrones y enigmas algebraicos"\n\n🧩 MATERIALES: Tarjetas con secuencias numéricas, bloques lógicos, fichas de colores, balanza de platos, pesas, dados, cadenas de papel (eslabones), cuadrículas, sobres con "mensajes secretos" (ecuaciones).\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Cadenas de patrones" - Los estudiantes construyen cadenas de papel con eslabones de colores siguiendo un patrón (rojo-rojo-azul, rojo-rojo-azul...). Responden: ¿De qué color será el eslabón 15? ¿Y el 20? ¿Cómo lo sabes sin contar?\n\nESTACIÓN 2: "Máquina de números" - Se simula una "máquina" que transforma números: entra 2, sale 7; entra 3, sale 9; entra 5, sale 13; entra 10, sale 23. ¿Cuál es la regla? (Multiplicar por 2 y sumar 3). Los estudiantes deben deducir la regla y predecir la salida para nuevos números.\n\nESTACIÓN 3: "La balanza en equilibrio" - Usando una balanza de platos, ponen un peso desconocido en el plato izquierdo y pesas de 5g, 10g, 20g en el derecho hasta equilibrar. Luego representan simbólicamente: x + 5 = 15, ¿cuánto vale x?\n\nESTACIÓN 4: "El enigma del sobre" - Reciben sobres con operaciones escondidas: "Pensé en un número, le sumé 8 y obtuve 20. ¿Qué número pensé?". Responden primero por tanteo, luego escriben la ecuación x + 8 = 20 y la resuelven.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Qué es un patrón? ¿Para qué sirve encontrar una regla? ¿Cómo se relaciona la balanza con una ecuación? ¿Qué es una incógnita?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "De los patrones a las ecuaciones"\n\n📊 OBSERVACIÓN GUIADA: PATRONES NUMÉRICOS\nSe presentan las siguientes secuencias:\n• Secuencia A: 2, 5, 8, 11, 14, ... (suma 3, regla: 3n - 1).\n• Secuencia B: 4, 8, 12, 16, 20, ... (suma 4, regla: 4n).\n• Secuencia C: 1, 4, 9, 16, 25, ... (cuadrados, regla: n²).\n\nPaso 1: Los estudiantes identifican cuánto se suma o multiplica en cada salto.\nPaso 2: Relacionan la posición (n=1, 2, 3...) con el valor del término.\nPaso 3: Formulan la regla con palabras: "multiplico la posición por 3 y resto 1".\nPaso 4: Escriben la expresión algebraica: T(n) = 3n - 1.\nConclusión guiada: "Un patrón puede expresarse con una fórmula algebraica que permite calcular cualquier término".\n\n📊 OBSERVACIÓN GUIADA: ECUACIONES CON BALANZA\nSe dibuja una balanza en la pizarra:\nLado izquierdo: una caja misteriosa (x) y 3 kg. Lado derecho: 12 kg. Equilibrada.\n\nPaso 1: Verbalizan: "Algo más 3 es igual a 12".\nPaso 2: Escriben: x + 3 = 12.\nPaso 3: Para hallar x, "quito 3 de ambos lados": x + 3 - 3 = 12 - 3 → x = 9.\n\nOtro caso: 2x = 10. Lado izquierdo: 2 cajas x. Lado derecho: 10 kg.\nDividen ambos lados entre 2: x = 5.\n\nConclusión: "Resolver una ecuación es encontrar el valor de la incógnita que mantiene la igualdad. Se pueden hacer las mismas operaciones en ambos lados sin romper el equilibrio".\n\n📝 REGISTRO: Los estudiantes crean sus propias secuencias y ecuaciones, y las comparten.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Patrones, Expresiones Algebraicas y Ecuaciones Simples\n\n🧩 1. PATRONES Y SECUENCIAS\n\nUn patrón es una secuencia que sigue una regla de formación. Los patrones pueden ser:\n\n📏 PATRONES NUMÉRICOS:\n• Crecientes: 6, 11, 16, 21, ... (suma 5 en cada paso).\n• Decrecientes: 50, 45, 40, 35, ... (resta 5 en cada paso).\n• Multiplicativos: 2, 6, 18, 54, ... (multiplica por 3 cada paso).\n\n📏 REGLA DE FORMACIÓN (TÉRMINO GENERAL):\nSirve para calcular cualquier término según su posición (n).\nEjemplo: 2, 5, 8, 11, 14, ... → El término general es 3n - 1.\nVerificación: n=1 → 3×1-1=2; n=2 → 3×2-1=5; n=3 → 3×3-1=8. ✅\n\n📏 PATRONES GEOMÉTRICOS:\nEjemplo: Construimos una torre con palitos. Para 1 cuadrado: 4 palitos; 2 cuadrados: 7 palitos; 3 cuadrados: 10 palitos.\nRegla: P = 3n + 1 (donde n es el número de cuadrados).\n\n🧩 2. EXPRESIONES ALGEBRAICAS\n\nUna expresión algebraica combina números y letras (variables) con operaciones matemáticas.\n\n📏 LENGUAJE COMÚN → LENGUAJE ALGEBRAICO:\n• Un número cualquiera → x\n• El doble de un número → 2x\n• El triple de un número más 5 → 3x + 5\n• La mitad de un número menos 3 → x/2 - 3\n• Un número aumentado en 7 → x + 7\n• El cuadrado de un número → x²\n\n📏 TÉRMINOS DE UNA EXPRESIÓN: En 3x + 2y - 7: 3x es un término, 2y es otro, -7 es el término constante. 3 y 2 son los coeficientes. x e y son las variables.\n\n🧩 3. ECUACIONES SIMPLES\n\nUna ecuación es una igualdad entre dos expresiones que contiene una o varias incógnitas.\n\n📏 ECUACIONES DE LA FORMA x + a = b:\nEj: x + 8 = 20 → restamos 8 en ambos lados → x = 12.\n\n📏 ECUACIONES DE LA FORMA ax = b:\nEj: 5x = 35 → dividimos ambos lados entre 5 → x = 7.\n\n📏 ECUACIONES DE LA FORMA ax + b = c:\nEj: 3x + 4 = 19 → restamos 4 → 3x = 15 → dividimos entre 3 → x = 5.\n\n📏 MÉTODO DE TRANSPOSICIÓN:\n• Lo que suma pasa restando.\n• Lo que resta pasa sumando.\n• Lo que multiplica pasa dividiendo.\n• Lo que divide pasa multiplicando.\n\n📏 COMPROBACIÓN: Siempre verificar la solución en la ecuación original.\nEj: 3x + 4 = 19 → si x=5 → 3(5)+4=15+4=19. ✅\n\n⚠️ ERRORES COMUNES:\n• No aplicar la misma operación en ambos lados.\n• Confundir el doble (2x) con el cuadrado (x²).\n• Al transponer, cambiar mal el signo.\n• No verificar la solución.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Patrones Numéricos\n1. Completa los siguientes 3 términos:\na) 3, 7, 11, 15, ___, ___, ___ (19, 23, 27)\nb) 64, 32, 16, 8, ___, ___, ___ (4, 2, 1)\nc) 1, 3, 6, 10, 15, ___, ___, ___ (21, 28, 36)\n\n2. Encuentra la regla de formación y escribe el término general:\na) 5, 10, 15, 20, ... → (5n)\nb) 4, 7, 10, 13, ... → (3n + 1)\nc) 2, 6, 10, 14, ... → (4n - 2)\n\n3. ¿Cuál es el término 25 de la secuencia 6, 11, 16, 21, ...? (6 + 24×5 = 126)\n\n📝 BLOQUE 2: Lenguaje Algebraico\n4. Traduce a expresión algebraica:\na) Un número más doce → (x + 12)\nb) El triple de un número menos 7 → (3x - 7)\nc) La mitad de la suma de un número y 8 → ((x+8)/2)\nd) El cuadrado de un número más el doble del mismo → (x² + 2x)\n\n5. Traduce a lenguaje común:\na) 2x - 5 → (El doble de un número menos 5)\nb) x/3 + 1 → (La tercera parte de un número más 1)\nc) (x+3)² → (El cuadrado de la suma de un número y 3)\n\n📝 BLOQUE 3: Resolución de Ecuaciones\n6. Resuelve:\na) x + 9 = 17  → x = (8)\nb) m - 5 = 12  → m = (17)\nc) 4y = 28  → y = (7)\nd) p/3 = 6  → p = (18)\ne) 2x + 5 = 13  → x = (4)\nf) 3a - 7 = 20  → a = (9)\ng) 5n + 3 = 2n + 15  → 3n = 12 → n = (4)\n\n📝 BLOQUE 4: Problemas con Ecuaciones\n7. Si al doble de un número le sumo 10, obtengo 34. ¿Cuál es el número? (2x+10=34 → x=12)\n8. La edad de Pedro es el triple de la de su hijo. Si juntos suman 48 años, ¿cuántos años tiene cada uno? (x+3x=48 → 4x=48 → hijo=12, Pedro=36)\n9. En un estacionamiento hay motos (2 ruedas) y autos (4 ruedas). Si hay 20 vehículos y 56 ruedas en total, ¿cuántas motos y cuántos autos hay? (m+a=20; 2m+4a=56 → m=12, a=8)\n10. Pienso en un número, lo multiplico por 5, le resto 8 y obtengo 27. ¿Qué número pensé? (5x-8=27 → 5x=35 → x=7)\n\n⏱️ Tiempo estimado: 60-75 min. ✅ Puesta en común y contraste de estrategias.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Aritmética, Geometría y Estadística\n\n🔢 CONEXIÓN CON ARITMÉTICA (NÚMEROS Y OPERACIONES):\n• Las ecuaciones se resuelven aplicando las operaciones inversas (suma ↔ resta, multiplicación ↔ división).\n• Los patrones numéricos refuerzan el cálculo mental y el concepto de múltiplo.\n• La proporcionalidad (vista en Números y Operaciones del Ciclo V) es una ecuación lineal simple: y = kx.\n\n📐 CONEXIÓN CON GEOMETRÍA:\n• Las fórmulas de área y perímetro son expresiones algebraicas: A = b×h (rectángulo), A = (b×h)/2 (triángulo), C = 2πr (circunferencia).\n• Al despejar una variable en una fórmula geométrica estamos resolviendo una ecuación. Ej: Si A = 60 cm² y b = 12 cm, ¿cuánto vale h? → 60 = 12×h → h = 5 cm.\n• Los patrones geométricos conectan visualmente con el álgebra.\n\n📊 CONEXIÓN CON ESTADÍSTICA:\n• La media aritmética (promedio) se expresa algebraicamente: x̄ = (x₁ + x₂ + ... + xₙ) / n.\n• Al interpolar o extrapolar datos en una tabla, se usa la regla de formación.\n\n🧩 ACTIVIDAD INTEGRADORA: "Fórmulas geométricas en acción": Dada una figura geométrica con dimensiones variables, escribir la fórmula del área como expresión algebraica y calcular valores para diferentes dimensiones.\n\n💡 REFLEXIÓN: El álgebra es el pegamento que une todas las ramas de las matemáticas. Lo que en aritmética es un caso particular, en álgebra se convierte en una regla general.`,
            6: `🌍 CORRELACIONES EXTERNAS: El álgebra en la vida cotidiana y la ciencia\n\n💻 TECNOLOGÍA Y PROGRAMACIÓN:\n• Los programas de computadora usan variables y expresiones algebraicas constantemente.\n• Un videojuego calcula posiciones con ecuaciones: posición = velocidad × tiempo.\n• La inteligencia artificial se basa en modelos algebraicos y estadísticos.\n\n🏪 FINANZAS PERSONALES:\n• Ahorro: "Si ahorro S/x cada semana, en y semanas tendré S/xy".\n• Tarifas: "El taxi cobra S/5 de banderazo más S/2 por km → Costo = 2x + 5".\n• Comparar planes de celular: Plan A: S/30 fijos + S/0.10 por minuto; Plan B: S/50 fijos. ¿Cuál conviene según los minutos? → 30 + 0.10x < 50 → x < 200 minutos.\n\n🔬 CIENCIA:\n• Leyes físicas: F = m×a (fuerza = masa × aceleración) es una ecuación algebraica.\n• Química: balancear ecuaciones químicas implica igualar átomos.\n• Biología: crecimiento poblacional modelado con patrones y ecuaciones.\n\n🎨 ARTE Y MÚSICA:\n• La escala musical sigue patrones de frecuencias (progresiones geométricas).\n• El diseño gráfico usa coordenadas y ecuaciones para curvas.\n• La arquitectura emplea proporciones algebraicas (número áureo φ = 1.618...).\n\n🧠 REFLEXIÓN FINAL: "El álgebra es el puente entre los números concretos y las ideas abstractas. Dominarla te permitirá resolver problemas que aún no existen, con herramientas que siempre tendrás: tu razonamiento."\n\n🗣️ CITA: "El álgebra es generosa: da más de lo que se le pide." — Jean le Rond d'Alembert.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Máquina de Patrones y Escape Room Algebraico"\n\n🎯 OBJETIVO: Diseñar y construir una "máquina" mecánica o digital que genere patrones, y crear un escape room con acertijos algebraicos para que otros equipos los resuelvan.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ORGANIZACIÓN (1 sesión)\n• 4 equipos. Cada equipo se especializa en un tipo de patrón: numérico, geométrico, de colores, funcional (máquina de operaciones).\n• Cada equipo creará 5 acertijos algebraicos con diferentes niveles de dificultad.\n\nFASE 2: DISEÑO DE LA MÁQUINA (2 sesiones)\n• EQUIPO NUMÉRICO: Crean una "rueda de patrones" que al girar muestra secuencias diferentes con su regla.\n• EQUIPO GEOMÉTRICO: Construyen con palitos o cartón una secuencia de figuras crecientes.\n• EQUIPO COLORES: Crean pulseras o collares con patrones de colores repetitivos.\n• EQUIPO FUNCIONAL: Fabrican una "máquina" de cartón con entrada y salida: metes un número, aplicas una operación secreta y sale otro.\n\nFASE 3: CREACIÓN DEL ESCAPE ROOM (1 sesión)\n• Cada equipo escribe 3 ecuaciones en sobres sellados numerados del 1 al 3 (fácil, medio, difícil).\n• El sobre 1 resuelto da una pista para el sobre 2, y así sucesivamente.\n• La respuesta final revela un "código secreto" (un número de 3 cifras) que abre una "caja del tesoro" (caja decorada con dulces o diplomas).\n\nFASE 4: ¡A JUGAR! (1 sesión)\n• Los equipos rotan: cada equipo visita la máquina y el escape room de otro equipo.\n• Intentan resolver los acertijos y abrir la caja del tesoro.\n• Registran tiempos y comparan estrategias.\n\nFASE 5: REFLEXIÓN Y CIERRE (1 sesión)\n• Plenaria: ¿Qué estrategia funcionó mejor para resolver ecuaciones? ¿Cómo identificaron los patrones? ¿Fue útil el trabajo en equipo?\n• Se comparten las reglas de formación que cada equipo creó.\n\n🏆 EVALUACIÓN: Creatividad en el diseño, corrección matemática de patrones y ecuaciones, trabajo en equipo, capacidad de resolver los acertijos de otros equipos.\n🎉 CIERRE: Diplomas de "Maestro del Álgebra" y de "Detective de Patrones". Exposición de las máquinas en el aula.`,

            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 5° y 6° grado de primaria la capacidad de calcular áreas de figuras planas (cuadrado, rectángulo, triángulo, rombo, trapecio y círculo), volúmenes de prismas y la longitud de la circunferencia, aplicando estas habilidades en la resolución de problemas prácticos y en la construcción de cuerpos geométricos, fortaleciendo su razonamiento espacial y su preparación para la secundaria.\n\n🎯 OBJETIVOS PARTICULARES:\n• Calcular el área del cuadrado, rectángulo, triángulo, rombo, trapecio y círculo.\n• Comprender y aplicar la fórmula A = π × r² para el área del círculo.\n• Calcular el perímetro de polígonos regulares e irregulares.\n• Conocer el número π ≈ 3.14 y su relación con la circunferencia.\n• Calcular la longitud de la circunferencia: C = 2 × π × r.\n• Calcular el volumen de prismas rectangulares y otros prismas rectos.\n• Resolver problemas que integren áreas, perímetros y volúmenes.\n\n📌 NOCIONES PRINCIPALES:\n• Área (superficie) y unidades de área: cm², m².\n• Perímetro: suma de las longitudes de los lados.\n• Fórmulas: A = l×l (cuadrado), A = b×h (rectángulo), A = (b×h)/2 (triángulo), A = (D×d)/2 (rombo), A = (B+b)×h/2 (trapecio), A = π×r² (círculo).\n• Circunferencia: C = 2πr = πd.\n• Volumen: V = largo × ancho × alto (prisma rectangular).\n• Número π (pi): constante que relaciona diámetro y circunferencia (≈ 3.1416).\n\n📌 NOCIONES SECUNDARIAS:\n• Descomposición de figuras para calcular áreas compuestas.\n• Relación entre perímetro y área.\n• Volumen de prismas con diferentes bases (triangular, pentagonal).\n• Unidades de volumen: cm³, m³. Equivalencia: 1 m³ = 1 000 000 cm³.\n• Capacidad: 1 litro = 1 dm³ = 1000 cm³.\n\n🌍 INTERESES SOCIETALES:\n• Calcular áreas es esencial en la construcción (cuánto material para pintar una pared), la agricultura (área de un terreno), la decoración (cuánta tela para un mantel).\n• El volumen se usa para diseñar envases, determinar la capacidad de una piscina o un tanque.\n• La circunferencia aparece en las ruedas, las tuberías, las latas de conserva. π es una constante universal que fascinó a culturas antiguas como los egipcios y los babilonios.\n• Estas habilidades son la puerta de entrada a la ingeniería, la arquitectura y el diseño.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Constructores y medidores"\n\n🧩 MATERIALES: Geoplanos y ligas, tangram, reglas, cintas métricas, compases, cartulinas, tijeras, cajas de diferentes tamaños, cilindros de cartón (tubos de papel), hilo, recipientes graduados, arena o arroz.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Geoplano de áreas" - Con geoplano y ligas, forman cuadrados, rectángulos y triángulos. Cuentan los cuadraditos interiores para hallar el área. Luego miden con regla los lados y verifican las fórmulas: ¿Coincide l×l con el conteo de cuadraditos?\n\nESTACIÓN 2: "En busca de π" - Con objetos circulares de diferentes tamaños (tapas, platos, CDs, latas), miden con un hilo la circunferencia (contorno) y con una regla el diámetro. Dividen circunferencia/diámetro para cada objeto. Descubren que el resultado siempre es aproximadamente 3.14.\n\nESTACIÓN 3: "Cajas, cajas, cajas" - Con cajas de zapatos, de fósforos, de regalo, miden largo, ancho y alto. Multiplican las tres dimensiones. Luego llenan la caja con cubitos de 1 cm³ (o con arena midiendo en recipiente graduado) para verificar el volumen.\n\nESTACIÓN 4: "Tangram y áreas" - Con las piezas del tangram, forman figuras y calculan el área de cada pieza y de la figura total. Comparan: ¿Cambia el área si cambio la forma? (No, si uso las mismas piezas).\n\n💬 REFLEXIÓN EN PLENARIA: ¿De dónde vienen las fórmulas de área? ¿Cuántas veces cabe el diámetro en la circunferencia? ¿Cómo se relaciona el volumen con el espacio que ocupa un cuerpo?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "De la cuadrícula a la fórmula general"\n\n📊 OBSERVACIÓN GUIADA: ÁREA DEL RECTÁNGULO Y EL TRIÁNGULO\n\nCaso 1: Rectángulo en cuadrícula (5 filas × 3 columnas).\n• Conteo directo: 15 cuadraditos.\n• Fórmula descubierta: 5 × 3 = 15 → A = base × altura.\n• Se prueban otros rectángulos y siempre funciona.\nConclusión: "El área del rectángulo se obtiene multiplicando la base por la altura".\n\nCaso 2: Triángulo rectángulo (mitad de un rectángulo).\n• En cuadrícula, un rectángulo de 6×4 = 24; su mitad (triángulo) ocupa 12 cuadraditos.\n• Fórmula: A = (base × altura) / 2.\n• Se extiende a triángulos no rectángulos: recortan y recomponen un rectángulo equivalente.\nConclusión: "El área de cualquier triángulo se calcula con (b×h)/2".\n\n📊 OBSERVACIÓN GUIADA: CIRCUNFERENCIA Y π\n\nSe miden 5 objetos circulares y se completa una tabla:\n| Objeto | Circunferencia (C) | Diámetro (d) | C ÷ d |\n|---|---|---|---|\n| Tapa de botella | 9.4 cm | 3.0 cm | 3.13 |\n| Plato pequeño | 47.1 cm | 15.0 cm | 3.14 |\n| Rueda de juguete | 25.1 cm | 8.0 cm | 3.14 |\n| ... | ... | ... | ≈3.14 |\n\nPaso 1: Los estudiantes notan que C ÷ d siempre da un número cercano a 3.14.\nPaso 2: Se concluye que C = π × d, o bien C = 2 × π × r.\nPaso 3: Para el área del círculo, se recorta un círculo en 8 sectores iguales y se reacomodan en forma de "rectángulo ondulado". La "base" es media circunferencia (π×r) y la "altura" es el radio (r). Conclusión: A = π × r × r = πr².\n\n📊 OBSERVACIÓN GUIADA: VOLUMEN DE PRISMAS\nCon cubitos de 1 cm³, llenan una caja de 5 cm × 3 cm × 2 cm. Capa 1: 5×3 = 15 cubitos. 2 capas: 15×2 = 30 cubitos. Conclusión: V = largo × ancho × alto.\n\n📝 REGISTRO: Cada estudiante escribe las fórmulas descubiertas y las verifica con un nuevo ejemplo.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Áreas, Perímetros, Circunferencia y Volumen de Prismas\n\n📏 1. PERÍMETRO\nEs la suma de las longitudes de los lados de una figura plana. Se mide en unidades lineales (cm, m, km).\n\nEjemplos:\n• Cuadrado de lado 5 cm: P = 4 × 5 = 20 cm.\n• Rectángulo de base 8 cm y altura 3 cm: P = 2×(8+3) = 22 cm.\n\n📐 2. ÁREA DE FIGURAS PLANAS\nEs la medida de la superficie que ocupa una figura. Se mide en unidades cuadradas (cm², m², km²).\n\n🔲 CUADRADO:\nÁrea = lado × lado = l²\nEj: l = 5 cm → A = 5² = 25 cm².\n\n🟦 RECTÁNGULO:\nÁrea = base × altura = b × h\nEj: b = 8 cm, h = 3 cm → A = 8×3 = 24 cm².\n\n🔺 TRIÁNGULO:\nÁrea = (base × altura) / 2 = (b × h) / 2\nEj: b = 10 cm, h = 4 cm → A = (10×4)/2 = 20 cm².\n\n🔸 ROMBO:\nÁrea = (Diagonal mayor × Diagonal menor) / 2 = (D × d) / 2\nEj: D = 8 cm, d = 6 cm → A = (8×6)/2 = 24 cm².\n\n🔻 TRAPECIO:\nÁrea = (Base mayor + Base menor) × altura / 2 = (B + b) × h / 2\nEj: B = 10 cm, b = 6 cm, h = 4 cm → A = (10+6)×4/2 = 32 cm².\n\n⭕ CÍRCULO:\nÁrea = π × radio² = π × r²\nπ (pi) ≈ 3.14 (o 3.1416 para mayor precisión).\nEj: r = 5 cm → A = 3.14 × 25 = 78.5 cm².\n\n🔵 3. LONGITUD DE LA CIRCUNFERENCIA\nEs el "perímetro" del círculo.\n\nLongitud de la circunferencia = 2 × π × radio = 2πr = π × diámetro = πd\nEj: r = 7 cm → C = 2 × 3.14 × 7 = 43.96 cm.\n\n🧊 4. VOLUMEN DE PRISMAS\nEl volumen mide el espacio que ocupa un cuerpo. Se mide en unidades cúbicas (cm³, m³).\n\n📦 PRISMA RECTANGULAR (ORTOEDRO):\nVolumen = largo × ancho × alto = l × a × h\nEj: l = 5 cm, a = 3 cm, h = 4 cm → V = 5×3×4 = 60 cm³.\n\n📐 PRISMA RECTO (CON CUALQUIER BASE):\nVolumen = Área de la base × altura = A_base × h\nEj: Prisma de base triangular (b=6 cm, h_base=4 cm, altura del prisma=10 cm).\nA_base = (6×4)/2 = 12 cm². V = 12 × 10 = 120 cm³.\n\n📏 EQUIVALENCIAS:\n1 m = 100 cm → 1 m² = 10,000 cm² → 1 m³ = 1,000,000 cm³.\nCapacidad: 1 litro = 1 dm³ = 1000 cm³.\n\n⚠️ ERRORES COMUNES:\n• Confundir perímetro con área.\n• Olvidar dividir entre 2 en el área del triángulo, rombo o trapecio.\n• Usar el diámetro en lugar del radio en las fórmulas del círculo.\n• Confundir unidades de área (cm²) con unidades de volumen (cm³).\n• Sumar dimensiones lineales para obtener volumen.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Perímetros\n1. Calcula el perímetro de:\na) Cuadrado de lado 9 cm. (36 cm)\nb) Rectángulo de 12 cm × 7 cm. (38 cm)\nc) Triángulo equilátero de lado 5 cm. (15 cm)\n\n📝 BLOQUE 2: Áreas de Figuras Planas\n2. Calcula el área de:\na) Cuadrado de lado 8 cm. (64 cm²)\nb) Rectángulo de base 15 m y altura 6 m. (90 m²)\nc) Triángulo de base 12 cm y altura 9 cm. (54 cm²)\nd) Rombo con diagonales de 14 cm y 8 cm. (56 cm²)\ne) Trapecio con bases 10 cm y 6 cm, altura 5 cm. (40 cm²)\nf) Círculo de radio 7 cm (usa π=3.14). (153.86 cm²)\n\n📝 BLOQUE 3: Circunferencia\n3. Calcula la longitud de la circunferencia de:\na) Radio 10 cm. (62.8 cm)\nb) Diámetro 12 cm. (37.68 cm)\nc) Una rueda de radio 35 cm. ¿Cuánto avanza en 100 vueltas? (219.8 m)\n\n📝 BLOQUE 4: Volumen de Prismas\n4. Calcula el volumen:\na) Caja de 20 cm × 10 cm × 5 cm. (1000 cm³ = 1 litro)\nb) Piscina de 8 m × 4 m × 1.5 m. (48 m³)\nc) Prisma de base cuadrada (lado 6 cm) y altura 15 cm. (540 cm³)\nd) Prisma de base triangular (b=8 cm, h_base=5 cm), altura del prisma=20 cm. (400 cm³)\n\n📝 BLOQUE 5: Problemas Integrados\n5. Un jardín rectangular de 20 m × 15 m tiene una fuente circular de radio 3 m. Calcula el área de pasto. (300 - 28.26 = 271.74 m²)\n6. Una lata cilíndrica (es un prisma de base circular) tiene radio 4 cm y altura 10 cm. Calcula: a) Área de la base (50.24 cm²). b) Volumen (502.4 cm³).\n7. Una pared de 4 m × 3 m se cubre con azulejos cuadrados de 20 cm de lado. ¿Cuántos azulejos se necesitan? (Pared=120,000 cm²; azulejo=400 cm² → 300 azulejos).\n8. Un cubo tiene 125 cm³ de volumen. ¿Cuál es la medida de su arista? (5 cm, porque 5×5×5=125).\n9. ¿Cuántos litros de agua caben en un tanque cilíndrico de radio 50 cm y altura 1.2 m? (942 litros aprox. → V=3.14×0.5²×1.2=0.942 m³=942 dm³).\n\n⏱️ Tiempo estimado: 70-90 min. ✅ Revisión grupal con explicación de procedimientos.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Números y Operaciones, Álgebra y Medición\n\n🔢 CONEXIÓN CON NÚMEROS Y OPERACIONES:\n• Todos los cálculos de área y volumen involucran operaciones con decimales y fracciones.\n• El número π es un decimal infinito no periódico. Al multiplicar con π, practican la multiplicación de decimales.\n• Escalas en planos: razón de semejanza y proporcionalidad entre áreas reales y dibujadas.\n\n📏 CONEXIÓN CON ÁLGEBRA:\n• Cada fórmula de área o volumen es una expresión algebraica: A = b×h, V = l×a×h.\n• Al despejar una variable en una fórmula (ej: ¿cuál es la altura si conozco el área y la base?) se resuelven ecuaciones.\n• El patrón de crecimiento del volumen de cubos de arista creciente es cúbico: 1³=1, 2³=8, 3³=27, 4³=64.\n\n📐 CONEXIÓN CON MEDICIÓN:\n• Las unidades de área (cm², m²) y volumen (cm³, m³) son extensiones de las unidades lineales.\n• Convertir unidades requiere multiplicar/dividir por 100 (área) o 1000 (volumen).\n• Relación entre capacidad y volumen: 1 litro = 1 dm³.\n\n🧩 ACTIVIDAD INTEGRADORA: "Diseña tu habitación ideal": Dibujar a escala el plano de una habitación con muebles. Calcular el área de cada mueble (rectángulos, círculos) y el área libre. Calcular el volumen de la habitación.\n\n💡 REFLEXIÓN: Área, perímetro y volumen están entrelazados con todas las demás ramas de las matemáticas. Son la aplicación concreta de los números y las fórmulas algebraicas.`,
            6: `🌍 CORRELACIONES EXTERNAS: Geometría práctica en la vida cotidiana y la ciencia\n\n🏠 CONSTRUCCIÓN Y ARQUITECTURA:\n• Calcular la cantidad de pintura necesaria para una pared (1 galón rinde ≈ 35 m²).\n• Determinar el volumen de concreto para el piso de una vereda.\n• Diseño de planos a escala.\n• Tejas para un techo: área total a cubrir.\n\n🏞️ AGRICULTURA:\n• Área de un terreno de cultivo: ¿cuántas semillas necesito? (1 semilla cada 30 cm²).\n• Volumen de agua en un reservorio cilíndrico.\n\n📦 INDUSTRIA Y EMBALAJE:\n• Diseño de cajas: ¿cuánto cartón necesito? (área superficial del prisma).\n• ¿Cuántos productos caben en una caja? (volumen).\n• Latas de conserva: el envase cilíndrico minimiza el material para un volumen dado.\n\n⚽ DEPORTES:\n• Cancha de fútbol: área de juego (estándar FIFA: 105 m × 68 m = 7140 m²).\n• Pista de atletismo: 400 m de perímetro. Cálculo de radios de curvas.\n• Balones esféricos: volumen de aire (esfera, en secundaria).\n\n🔬 CIENCIA Y TECNOLOGÍA:\n• La Tierra: circunferencia aproximada de 40,000 km. Eratóstenes la midió hace 2200 años.\n• Cálculo de dosis de medicamentos según el volumen corporal.\n• El diseño de motores (cilindros, pistones) usa geometría de volúmenes.\n\n🧠 REFLEXIÓN FINAL: "¿Cuánta agua bebes en un mes? ¿Cuánto espacio ocupa tu cuarto? ¿Qué distancia recorre la rueda de tu bicicleta en un pedaleo? La geometría responde estas preguntas y nos conecta con el espacio que habitamos."\n\n🗣️ CITA: "La geometría es el conocimiento de lo que siempre existe." — Platón.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Construye una Ciudad Geométrica"\n\n🎯 OBJETIVO: Diseñar y construir una maqueta a escala de una ciudad o vecindario utilizando cuerpos geométricos (prismas, prismas de base poligonal), calculando áreas y volúmenes de cada edificación, y presentando una "memoria técnica" con todos los cálculos.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: PLANIFICACIÓN (1 sesión)\n• 5 equipos. Cada equipo diseña un sector: Centro Comercial, Zona Residencial, Parque, Escuela, Estadio.\n• Dibujan un croquis a escala (ej: 1 cm = 2 m) del sector asignado.\n\nFASE 2: DISEÑO Y CÁLCULOS PREVIOS (2 sesiones)\n• Cada edificio será un prisma (rascacielos = prisma rectangular alto; casa = prisma bajo; piscina = prisma excavado).\n• El estadio tendrá un campo rectangular y una pista circular.\n• Calculan para cada elemento:\n  - Área de la base (el terreno que ocupa).\n  - Volumen (el espacio edificado).\n  - Perímetro o circunferencia.\n• Llevan un registro detallado: "Edificio A: base 3 cm × 2 cm → área real = 24 m²; altura = 15 m → volumen = 360 m³".\n\nFASE 3: CONSTRUCCIÓN DE LA MAQUETA (2-3 sesiones)\n• Usan cajas de cartón, tubos de papel, cartulinas.\n• Pintan y decoran.\n• Colocan etiquetas con los datos calculados.\n• Arman el vecindario completo sobre una base grande de cartón o madera.\n\nFASE 4: MEMORIA TÉCNICA (1 sesión)\n• Documento que recopila todos los cálculos del equipo.\n• Incluye una tabla con: nombre del elemento, figura geométrica, dimensiones, área de la base, volumen, otras observaciones.\n• Deben aparecer al menos: 1 cuadrado, 1 rectángulo, 1 círculo, 1 triángulo (como parte de algún diseño) y 1 prisma no rectangular (ej: casa con techo triangular).\n\nFASE 5: EXPOSICIÓN Y FERIA (1 sesión)\n• Presentan la maqueta al resto de la clase o a otros grados.\n• Explican el proceso de diseño y los cálculos realizados.\n• Responden preguntas: ¿Por qué ese edificio tiene más volumen? ¿Qué área total ocupa su sector?\n\n🏆 EVALUACIÓN: Precisión de los cálculos, calidad de la construcción, coherencia de la escala, trabajo en equipo, claridad de la memoria técnica.\n🎉 CIERRE: Inauguración de "Ventanilla Geométrica", la ciudad construida por los estudiantes. Diplomas de "Ingeniero Geométrico".`,

        const leccionExtensaAritAlgVI = {
            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 1° y 2° de secundaria las competencias fundamentales en aritmética y álgebra, abarcando el dominio de los números enteros y racionales, las operaciones con polinomios, la resolución de ecuaciones lineales y cuadráticas, sistemas de ecuaciones e inecuaciones, sentando las bases del pensamiento algebraico formal para los ciclos superiores.\n\n🎯 OBJETIVOS PARTICULARES:\n• Comprender y operar con números enteros (Z) y racionales (Q), aplicando correctamente las reglas de signos.\n• Identificar, clasificar y operar con polinomios: suma, resta, multiplicación y división.\n• Resolver ecuaciones lineales de primer grado con una y dos incógnitas.\n• Resolver ecuaciones cuadráticas por factorización, completando cuadrados y fórmula general.\n• Resolver sistemas de ecuaciones lineales 2x2 por los métodos de sustitución, igualación y reducción.\n• Plantear y resolver inecuaciones lineales, representando la solución gráfica y en notación de intervalos.\n• Aplicar estos conocimientos en la resolución de problemas contextualizados.\n\n📌 NOCIONES PRINCIPALES:\n• Números enteros (Z), valor absoluto, opuesto, regla de signos para suma, resta, multiplicación y división.\n• Números racionales (Q), fracciones equivalentes, simplificación, operaciones combinadas.\n• Polinomio, grado, coeficiente, término independiente, monomio, binomio, trinomio.\n• Operaciones con polinomios: suma algebraica, producto, cociente, productos notables (binomio al cuadrado, suma por diferencia).\n• Ecuación lineal (ax + b = c), ecuación cuadrática (ax² + bx + c = 0), discriminante (Δ = b² - 4ac).\n• Sistema de ecuaciones 2x2, métodos de resolución.\n• Inecuación lineal, intervalo, recta numérica, desigualdad.\n\n📌 NOCIONES SECUNDARIAS:\n• Propiedades de las operaciones en Z y Q.\n• Factorización: factor común, trinomio cuadrado perfecto, diferencia de cuadrados.\n• Fórmula general para ecuaciones cuadráticas.\n• Sistemas compatibles determinados, indeterminados e incompatibles.\n• Inecuaciones compuestas y con valor absoluto (iniciación).\n\n🌍 INTERESES SOCIETALES:\n• Los números negativos se usan en temperaturas bajo cero, deudas bancarias, altitudes bajo el nivel del mar.\n• Las ecuaciones modelan situaciones reales: reparto de gastos, cálculo de distancias y tiempos.\n• Las inecuaciones son la base de la optimización en economía, ingeniería y logística.\n• El álgebra es el lenguaje universal de la ciencia y la tecnología moderna.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "El Casino Matemático y el Laboratorio de Polinomios"\n\n🧩 MATERIALES: Tarjetas con operaciones, fichas de colores (rojo=negativo, azul=positivo), balanza numérica, Bloques de Dienes para polinomios, dados poliédricos, cronómetro.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "El termómetro humano" - Los estudiantes representan números enteros en una recta numérica dibujada en el piso. Avanzan (+) o retroceden (-) según tarjetas que sacan. Por ejemplo, salen de -3, sacan +5, llegan a +2. Registran el recorrido y la operación: (-3) + (+5) = +2.\n\nESTACIÓN 2: "Deudas y ahorros" - Simulan una cuenta bancaria con fichas azules (positivo/ahorro) y rojas (negativo/deuda). Realizan transacciones: "Deposito S/50" (+50), "Retiro S/80" (-80). Si tenían S/30, quedan con S/-50. Traducen a expresiones matemáticas.\n\nESTACIÓN 3: "Construyendo polinomios" - Con bloques algebraicos (Dienes o similar), los estudiantes ensamblan monomios. Un cuadrado grande = x², una barra = x, un cubo pequeño = 1. Construyen expresiones: 3x² + 2x - 5 y luego suman o restan visualmente con otras expresiones.\n\nESTACIÓN 4: "El enigma de las ecuaciones" - Se presentan balanzas numéricas con incógnitas. En un plato, 3 sobres "x" + 4 kg; en el otro, 19 kg. Deben hallar cuánto pesa cada sobre y luego traducir a la ecuación 3x + 4 = 19.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Cómo se representan las deudas en matemáticas? ¿Qué significa un polinomio en la vida real? ¿Cómo ayuda una ecuación a resolver un misterio?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "De la aritmética al álgebra"\n\n📊 OBSERVACIÓN GUIADA: REGLA DE SIGNOS EN ENTEROS\nSe presentan tarjetas con multiplicaciones en Z y los estudiantes completan una tabla:\n\n(+3) × (+4) = +12\n(+3) × (-4) = -12\n(-3) × (+4) = -12\n(-3) × (-4) = +12\n\nPaso 1: Comparan los signos de los factores y del producto.\nPaso 2: Formulan las reglas: "Signos iguales → producto positivo. Signos diferentes → producto negativo".\nConclusión guiada: "La regla de signos para la multiplicación también se aplica en la división y es consistente con la idea de pérdidas y ganancias".\n\n📊 OBSERVACIÓN GUIADA: PRODUCTOS NOTABLES\nSe presentan tres cuadrados formados por bloques algebraicos:\n\n(a + b)²: un cuadrado grande a², dos rectángulos ab, un cuadrado pequeño b². Total: a² + 2ab + b².\n(a - b)²: visualizan con bloques de colores lo que resulta: a² - 2ab + b².\n(a + b)(a - b): al recortar y reacomodar, descubren que queda a² - b².\n\nConclusión: "Los productos notables no se memorizan, se visualizan. La geometría respalda el álgebra".\n\n📊 OBSERVACIÓN GUIADA: ECUACIÓN CUADRÁTICA POR FACTORIZACIÓN\nCaso: x² + 5x + 6 = 0. Se buscan dos números que multiplicados den +6 y sumados den +5. Se prueban 1 y 6 (suma 7), 2 y 3 (suma 5). Entonces (x+2)(x+3)=0. Si el producto es 0, entonces x+2=0 o x+3=0. Soluciones: x=-2, x=-3.\n\n📝 REGISTRO: Cada estudiante formula sus propias conjeturas sobre la relación entre la factorización y las raíces de una ecuación cuadrática.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Aritmética y Álgebra — Ciclo VI\n\n🔢 1. NÚMEROS ENTEROS (Z)\n\nEl conjunto Z = {... -3, -2, -1, 0, +1, +2, +3...}\n\n📏 REGLA DE SIGNOS:\n• Suma: Signos iguales → se suman valores absolutos y se conserva el signo. Signos diferentes → se restan valores absolutos y se pone el signo del mayor.\n• Multiplicación/División: Signos iguales → +. Signos diferentes → -.\n\n🔢 2. NÚMEROS RACIONALES (Q)\n\nSon aquellos que se pueden expresar como fracción a/b, donde a y b son enteros, b ≠ 0.\n\n📏 OPERACIONES:\n• Suma y resta: MCM de denominadores. Convertir a fracciones equivalentes. Operar numeradores.\n• Multiplicación: Numerador × numerador, denominador × denominador.\n• División: Multiplicar por el inverso del divisor. (a/b) ÷ (c/d) = (a/b) × (d/c) = ad/bc.\n\n🧩 3. POLINOMIOS\n\nUn polinomio en una variable x es una expresión de la forma: aₙxⁿ + ... + a₂x² + a₁x + a₀, donde los coeficientes aᵢ son números reales y n es el grado.\n\n📏 OPERACIONES CON POLINOMIOS:\n• Suma/Resta: Agrupar términos semejantes (misma variable y exponente).\n• Multiplicación: Propiedad distributiva. (x+3)(x+2) = x² + 2x + 3x + 6 = x² + 5x + 6.\n• División: Algoritmo de división larga o Regla de Ruffini (divisor de la forma x-a).\n\n📏 PRODUCTOS NOTABLES:\n• (a + b)² = a² + 2ab + b²\n• (a - b)² = a² - 2ab + b²\n• (a + b)(a - b) = a² - b²\n• (x + a)(x + b) = x² + (a+b)x + ab\n\n🔢 4. ECUACIONES LINEALES\n\nForma general: ax + b = c, con a ≠ 0.\nResolución: Despejar x → x = (c - b)/a.\n\n📏 ECUACIONES CON FRACCIONES: Multiplicar ambos lados por el MCM de los denominadores para eliminar fracciones.\n\n🔢 5. ECUACIONES CUADRÁTICAS\n\nForma general: ax² + bx + c = 0, con a ≠ 0.\n\n📏 MÉTODOS DE RESOLUCIÓN:\n• Factorización: Si el trinomio es factorizable. Ej: x² - 5x + 6 = 0 → (x-2)(x-3)=0 → x=2, x=3.\n• Completar cuadrados: Transformar a (x + h)² = k.\n• Fórmula general: x = [-b ± √(b² - 4ac)] / 2a.\n• Discriminante Δ = b² - 4ac:\n  - Δ > 0 → 2 soluciones reales distintas.\n  - Δ = 0 → 1 solución real doble.\n  - Δ < 0 → sin soluciones reales (soluciones complejas).\n\n🔢 6. SISTEMAS DE ECUACIONES 2x2\n\nDos ecuaciones con dos incógnitas:\na₁x + b₁y = c₁\na₂x + b₂y = c₂\n\n📏 MÉTODOS:\n• Sustitución: Despejar una incógnita de una ecuación y sustituir en la otra.\n• Igualación: Despejar la misma incógnita de ambas ecuaciones e igualar.\n• Reducción (Eliminación): Multiplicar ecuaciones por números para que al sumarlas se elimine una incógnita.\n\n📏 CLASIFICACIÓN:\n• Compatible determinado: solución única.\n• Compatible indeterminado: infinitas soluciones (rectas coincidentes).\n• Incompatible: sin solución (rectas paralelas).\n\n🔢 7. INECUACIONES LINEALES\n\nUna inecuación es una desigualdad que contiene una incógnita: ax + b > c, ax + b < c, ax + b ≥ c, ax + b ≤ c.\n\n📏 RESOLUCIÓN: Similar a la ecuación, pero si se multiplica o divide por un número negativo, se invierte el signo de la desigualdad.\nEj: -2x > 8 → dividir entre -2 → x < -4.\n\n📏 REPRESENTACIÓN: En recta numérica (círculo abierto para < o >, cerrado para ≤ o ≥) y en notación de intervalos.\n\n⚠️ ERRORES COMUNES:\n• Olvidar la regla de signos en operaciones con enteros.\n• Confundir (a+b)² con a² + b². (No es igual).\n• Al resolver inecuaciones, no invertir la desigualdad al multiplicar/dividir por negativo.\n• En sistemas, no verificar la solución en ambas ecuaciones.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Números Enteros\n1. Calcula: a) (-8) + (+5) = (-3) b) (-12) - (-7) = (-5) c) (-4) × (-6) = (+24) d) (-30) ÷ (+5) = (-6)\n2. Resuelve: (-5 + 3) × [(-2) - (-8)] ÷ (-4) = (-2 × 6) ÷ (-4) = -12 ÷ (-4) = 3\n3. En una ciudad la temperatura a las 6 a.m. era de -5°C. Subió 12°C al mediodía y luego bajó 8°C. ¿Temperatura final? (-5+12-8 = -1°C)\n\n📝 BLOQUE 2: Números Racionales\n4. Simplifica: 18/24 = (3/4); 45/60 = (3/4)\n5. Opera: a) 2/3 + 5/6 - 1/4 = (8/12+10/12-3/12 = 15/12 = 5/4 = 1 1/4)\nb) 3/5 × 10/9 = (30/45 = 2/3)\nc) 4/7 ÷ 8/21 = (4/7 × 21/8 = 84/56 = 3/2 = 1.5)\n\n📝 BLOQUE 3: Polinomios\n6. Dados P(x) = 3x² - 2x + 5; Q(x) = x² + 4x - 3, calcula:\na) P(x) + Q(x) = (4x² + 2x + 2)\nb) P(x) - Q(x) = (2x² - 6x + 8)\nc) P(x) × 2 = (6x² - 4x + 10)\n7. Multiplica: (x+5)(x-3) = x² + 2x - 15\n8. Aplica productos notables:\na) (x+7)² = x² + 14x + 49\nb) (2x-3)² = 4x² - 12x + 9\nc) (x+4)(x-4) = x² - 16\n\n📝 BLOQUE 4: Ecuaciones\n9. Resuelve: a) 3x - 7 = 14 → 3x=21 → x=7\nb) 5(x-3) = 2x+9 → 5x-15=2x+9 → 3x=24 → x=8\nc) x/2 + x/3 = 10 → (3x+2x)/6=10 → 5x=60 → x=12\n10. Resuelve la ecuación cuadrática:\na) x² - 5x + 6 = 0 → (x-2)(x-3)=0 → x=2, x=3\nb) 2x² + 7x - 15 = 0 → Fórmula general: x=[-7±√(49+120)]/4=[-7±13]/4 → x=1.5, x=-5\n\n📝 BLOQUE 5: Sistemas de Ecuaciones\n11. Resuelve por sustitución: {x+y=10; x-y=4} → x=7, y=3\n12. Resuelve por reducción: {2x+3y=12; 4x-3y=6} → 6x=18 → x=3, y=2\n13. En una granja hay conejos y gallinas. Hay 35 cabezas y 94 patas. ¿Cuántas hay de cada? (c+g=35; 4c+2g=94 → c=12, g=23)\n\n📝 BLOQUE 6: Inecuaciones\n14. Resuelve y representa: a) 3x - 5 > 10 → 3x > 15 → x > 5\nb) -2x + 4 ≤ 12 → -2x ≤ 8 → x ≥ -4\nc) 5 - 3x < 2x + 20 → -5x < 15 → x > -3\n\n⏱️ Tiempo estimado: 90-120 min. ✅ Revisión en parejas y puesta en común.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Geometría, Estadística y Álgebra avanzada\n\n📐 CONEXIÓN CON GEOMETRÍA:\n• El teorema de Pitágoras (a² + b² = c²) es una ecuación cuadrática.\n• Las áreas de figuras planas se expresan con polinomios: A = (x+3)(x-2) = x² + x - 6.\n• Las fórmulas de congruencia y semejanza involucran razones y proporciones (números racionales).\n• Los sistemas de ecuaciones modelan intersecciones de rectas en el plano cartesiano.\n\n📏 CONEXIÓN CON ÁLGEBRA Y FUNCIONES (Ciclo VII):\n• Las ecuaciones cuadráticas son la base para estudiar funciones cuadráticas (parábolas).\n• Los polinomios son la puerta de entrada al análisis de funciones polinómicas.\n• Las inecuaciones lineales preparan para la programación lineal en Ciclo VII.\n\n📊 CONEXIÓN CON ESTADÍSTICA Y PROBABILIDAD:\n• Las proporciones y fracciones son esenciales para calcular probabilidades.\n• Las ecuaciones se usan para despejar incógnitas en fórmulas estadísticas.\n\n🧩 ACTIVIDAD INTEGRADORA: "Cálculo algebraico del área sombreada": Dada una figura compuesta, expresar el área de la región sombreada como un polinomio, factorizarlo y evaluarlo para valores específicos.\n\n💡 REFLEXIÓN: La aritmética y el álgebra del Ciclo VI son los cimientos sobre los que se construye toda la matemática superior: funciones, geometría analítica y cálculo.`,
            6: `🌍 CORRELACIONES EXTERNAS: Aritmética y álgebra en la vida real y la ciencia\n\n💻 INFORMÁTICA Y PROGRAMACIÓN:\n• Las variables en los lenguajes de programación funcionan exactamente como las variables algebraicas.\n• Los algoritmos usan ecuaciones y sistemas para resolver problemas de búsqueda, ordenamiento y optimización.\n• La encriptación de datos (criptografía) se basa en polinomios y aritmética modular.\n\n💰 ECONOMÍA Y FINANZAS:\n• Cálculo de intereses compuestos: es una función exponencial (preparación para Ciclo VII).\n• Punto de equilibrio: se igualan costos e ingresos → sistema de ecuaciones.\n• Optimización de ganancias: inecuaciones para determinar rangos de producción rentable.\n\n🔬 CIENCIA E INGENIERÍA:\n• Las trayectorias parabólicas (tiro de proyectil) se modelan con ecuaciones cuadráticas.\n• La ley de Ohm (V=IR) y otras leyes físicas son ecuaciones lineales.\n• Los circuitos eléctricos se analizan con sistemas de ecuaciones (leyes de Kirchhoff).\n\n🎨 ARTE Y DISEÑO:\n• Las proporciones y razones están presentes en la composición fotográfica (regla de tercios) y en la arquitectura (número áureo).\n• El diseño de videojuegos 3D usa álgebra lineal (vectores, matrices) que se fundamenta en estos conceptos.\n\n🧠 REFLEXIÓN FINAL: "El álgebra no es un conjunto de reglas abstractas; es el idioma con el que la naturaleza escribe sus leyes. Cada ecuación resuelta es un paso más hacia la comprensión del universo."\n\n🗣️ CITA: "El álgebra es la ofrenda intelectual que la humanidad ha hecho a la civilización." — Sridhara Acharya, matemático hindú del siglo IX.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Consultoría Matemática Juvenil"\n\n🎯 OBJETIVO: Crear una "empresa consultora" en el aula donde los estudiantes, organizados en equipos, resuelven problemas reales propuestos por el docente (y posiblemente por otros salones) usando aritmética, polinomios, ecuaciones, sistemas e inecuaciones, entregando un informe formal con la solución y su explicación.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ORGANIZACIÓN Y NOMBRAMIENTO (1 sesión)\n• 5 equipos (4-5 integrantes). Cada equipo elige un nombre de "consultora" (ej: "Algebraicos S.A.C.", "Ecuación Maestra", "Los Pitagóricos S.A.").\n• Roles: Director de proyecto (coordina), Analista matemático (resuelve), Redactor técnico (escribe el informe), Presentador (expone), Verificador (comprueba soluciones).\n\nFASE 2: RECEPCIÓN DE CASOS (1 sesión)\n• El docente entrega 5 "casos" a cada equipo. Los casos son problemas contextualizados de dificultad graduada:\n  - Caso 1 (Fácil): Reparto de herencia usando fracciones y ecuaciones lineales.\n  - Caso 2 (Medio): Cálculo de dimensiones óptimas de un terreno con ecuaciones cuadráticas.\n  - Caso 3 (Medio): Presupuesto escolar con números enteros e inecuaciones.\n  - Caso 4 (Difícil): Mezcla de productos (café, arroz) usando sistemas de ecuaciones.\n  - Caso 5 (Integrador): Análisis de ganancias de un negocio usando polinomios (costo, ingreso, ganancia).\n\nFASE 3: RESOLUCIÓN DE CASOS (3 sesiones)\n• Los equipos resuelven todos los casos. Usan diferentes estrategias: algebraica, gráfica, tabular.\n• Redactan un informe que incluye: planteamiento del problema, identificación de variables, modelo matemático (ecuación/sistema/inecuación), desarrollo paso a paso, solución, verificación y respuesta en lenguaje natural.\n• Preparan una presentación en papelógrafo o diapositivas.\n\nFASE 4: CONGRESO DE CONSULTORAS (1 sesión)\n• Cada equipo expone al menos 2 casos (el más fácil y el más difícil que resolvieron).\n• El docente y los compañeros hacen preguntas.\n• Se comparan las soluciones entre equipos (mismo caso puede tener diferentes abordajes).\n\nFASE 5: EVALUACIÓN Y CIERRE (1 sesión)\n• Rúbrica: corrección matemática (50%), claridad del informe (20%), exposición oral (20%), trabajo en equipo (10%).\n• Votación secreta para elegir la "Consultora del Año".\n\n🏆 EVALUACIÓN: Precisión matemática, calidad del informe, capacidad de comunicar el razonamiento, trabajo colaborativo.\n🎉 CIERRE: Entrega de diplomas de "Consultor Matemático Junior" y publicación de los mejores informes en el mural del colegio.`,
