        .phase-6 .phase-number { background: #e0e7ff; color: #3730a3; }
        .phase-7 .phase-number { background: #fce7f3; color: #831843; }

        .footer { text-align: center; padding: 1.5rem; color: var(--text-secondary); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 3rem; }
        @media (max-width: 768px) {

        const leccionExtensaNumIV = {
            0: `🎯 OBJETIVO GENERAL: Consolidar y ampliar las competencias numéricas de los estudiantes de 3° y 4° grado de primaria, incorporando el concepto de fracción y número decimal, y desarrollando la capacidad de resolver operaciones combinadas que integren suma, resta, multiplicación y división con números naturales, fracciones y decimales sencillos, en contextos cotidianos y matemáticos.\n\n🎯 OBJETIVOS PARTICULARES:\n• Leer, escribir y ordenar números naturales hasta la decena de millar (10 000).\n• Comprender el concepto de fracción como parte de un todo, como reparto y como cociente.\n• Representar fracciones gráficamente y en la recta numérica.\n• Comparar y ordenar fracciones con igual denominador.\n• Sumar y restar fracciones homogéneas (mismo denominador) en situaciones concretas.\n• Comprender el concepto de número decimal (décimos y centésimos) y su relación con las fracciones decimales.\n• Leer, escribir y comparar números decimales hasta los centésimos.\n• Sumar y restar números decimales alineando la coma decimal.\n• Aplicar la jerarquía de operaciones (multiplicación/división antes que suma/resta, paréntesis) en ejercicios combinados con números naturales.\n• Resolver problemas verbales que involucren operaciones combinadas, fracciones y decimales.\n\n📌 NOCIONES PRINCIPALES:\n• Número natural, valor posicional (unidad, decena, centena, unidad de millar, decena de millar).\n• Fracción: numerador, denominador, fracción propia, fracción igual a la unidad, fracciones homogéneas.\n• Número decimal: décimo (1/10), centésimo (1/100), coma decimal, parte entera y parte decimal.\n• Operaciones combinadas: paréntesis, multiplicación/división, suma/resta (PEMDAS simplificado).\n\n📌 NOCIONES SECUNDARIAS:\n• Fracciones equivalentes (noción intuitiva con gráficos).\n• Conversión de fracción decimal a número decimal y viceversa (décimos y centésimos).\n• Estimación y redondeo de números naturales.\n• Propiedades de las operaciones (distributiva de la multiplicación respecto de la suma).\n\n🌍 INTERESES SOCIETALES:\n• Las fracciones y decimales son esenciales en la cocina (1/2 kg de harina), las compras (descuentos de 0,25 céntimos), la medición (1,50 m de estatura).\n• Las operaciones combinadas permiten modelar situaciones reales como calcular el costo total de una compra con varios productos y descuentos.\n• Comprender estas herramientas numéricas fortalece la autonomía y la capacidad de análisis crítico.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Estaciones numéricas: fracciones y decimales en acción"\n\n🧩 MATERIALES: Tiras de fracciones (tiras de papel de igual longitud divididas en medios, tercios, cuartos, quintos, décimos), círculos fraccionarios de cartulina, billetes y monedas didácticas, envases con capacidades (1 litro, 1/2 litro, 1/4 litro), cintas métricas, reglas, tarjetas con operaciones combinadas, calculadora (opcional para verificar).\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\nESTACIÓN 1: "Reparte y fracciona" – Repartir equitativamente 3 tortillas entre 4 niños y expresar la porción como fracción (3/4). Cortar tiras de papel en partes iguales y etiquetar las fracciones resultantes.\nESTACIÓN 2: "La tienda de los decimales" – Productos con precios con decimales (S/ 2,50; S/ 1,75; S/ 0,90). Simular compras y calcular el total usando monedas y billetes. Registrar las sumas.\nESTACIÓN 3: "Operaciones combinadas con dados" – Lanzar dados para formar números y tarjetas con operaciones (+, -, ×, ÷) y paréntesis. Construir expresiones y competir por obtener el mayor resultado correcto.\nESTACIÓN 4: "Laboratorio de medidas" – Medir longitudes de objetos con regla y expresarlas en centímetros y milímetros (ej. 5 cm 7 mm = 5,7 cm). Sumar dos longitudes.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Cuándo usamos fracciones y cuándo decimales? ¿Qué significa 0,5 de algo? ¿Por qué importa el orden al hacer varias operaciones juntas?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Patrones en fracciones y decimales"\n\n📊 OBSERVACIÓN GUIADA – FRACCIONES:\nSe presentan varios ejemplos de repartos: 1 pizza entre 4 → 1/4 para cada uno; 2 pizzas entre 4 → 2/4 para cada uno (que es lo mismo que 1/2). Se guía a los niños a escribir la fracción como partes coloreadas de una figura dividida en partes iguales.\n• Conclusión 1: La fracción a/b significa que tomamos a partes de un total de b partes iguales.\n• Conclusión 2: Si el numerador y el denominador son iguales, la fracción vale 1 unidad entera (4/4 = 1).\n\n📊 OBSERVACIÓN GUIADA – DECIMALES:\nSe muestra una cuadrícula de 100 cuadraditos. Colorear 25 cuadraditos = 25/100 = 0,25 (se lee 25 centésimos). Colorear 10 cuadraditos = 10/100 = 1/10 = 0,1. Los niños reconocen que 0,1 = 0,10.\n• Conclusión: Los decimales representan fracciones con denominador 10, 100, etc. La primera cifra tras la coma son décimos; la segunda, centésimos.\n\n📊 OBSERVACIÓN GUIADA – OPERACIONES COMBINADAS:\nSe presentan ejercicios como:\nCaso A: 3 + 4 × 2 = ? Si se suma primero da 14, pero si se multiplica primero da 11. Discutir por qué el resultado correcto es 11 (acuerdo universal de jerarquía).\nCaso B: (3 + 4) × 2 = 14 (el paréntesis indica que la suma se hace primero).\n• Conclusión: Primero se resuelven los paréntesis, luego multiplicaciones/divisiones, y al final sumas/restas.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Números naturales, fracciones, decimales y operaciones combinadas\n\n🔢 1. NÚMEROS NATURALES HASTA 10 000\n• Lectura y escritura: 5 683 → cinco mil seiscientos ochenta y tres. Valor posicional: unidad, decena (10), centena (100), unidad de millar (1000), decena de millar (10 000).\n• Comparación: 3 450 > 2 980 (se compara primero la unidad de millar).\n\n🍕 2. FRACCIONES\n• Definición: Una fracción a/b indica partes iguales. a = numerador (partes que tomamos), b = denominador (partes totales).\n• Representación: gráfica (círculos, rectángulos), en recta numérica (dividir el segmento 0-1 en b partes iguales y tomar a).\n• Fracciones homogéneas: mismo denominador. Comparación: 2/5 < 4/5 (porque 2 < 4). Suma y resta: se suman/restan los numeradores y se mantiene el denominador. Ej: 1/8 + 3/8 = 4/8.\n• Fracción igual a la unidad: a/a = 1.\n\n💧 3. NÚMEROS DECIMALES\n• Décimos: primera cifra después de la coma. 0,1 = 1/10. Centésimos: segunda cifra. 0,01 = 1/100.\n• Lectura: 2,45 = dos enteros cuarenta y cinco centésimos.\n• Comparación: 1,25 > 1,19 (comparar enteros, luego décimos, luego centésimos).\n• Suma y resta: alinear la coma decimal y operar como con naturales. Ej: 3,20 + 1,45 = 4,65.\n\n⚙️ 4. OPERACIONES COMBINADAS\n• Jerarquía: 1° Paréntesis ( ), 2° Multiplicación y división (de izquierda a derecha), 3° Suma y resta (de izquierda a derecha).\n• Ejemplo: 10 + 3 × (8 – 5) ÷ 3 → paréntesis: (3) → 10 + 3 × 3 ÷ 3 → multiplicación/división izq-der: 3 × 3 = 9, luego 9 ÷ 3 = 3 → suma final: 10 + 3 = 13.\n\n⚠️ ERRORES COMUNES:\n• Sumar fracciones como si fueran enteros (1/2 + 1/3 ≠ 2/5). Solo se suman directamente si el denominador es igual.\n• Alinear mal los decimales al sumar (escribir 1,5 + 2,3 como 1,5 + 23).\n• Ignorar la jerarquía y operar de izquierda a derecha sin priorizar multiplicación/división.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de aplicación\n\n📝 BLOQUE 1: Numeración y valor posicional\n1. Escribe con letras: 7 032, 4 508, 9 060.\n2. Descompón: 6 345 = 6 UM + 3 C + 4 D + 5 U.\n3. Ordena de mayor a menor: 5 600; 5 060; 5 006; 6 500.\n\n📝 BLOQUE 2: Fracciones\n4. Escribe la fracción que representa la parte coloreada: (dibujos).\n5. Compara: 3/7 ___ 5/7; 1/2 ___ 1/4 (apoyarse en gráficos).\n6. Calcula: 2/9 + 5/9 = __; 7/10 – 3/10 = __.\n7. Representa 3/4 en una recta numérica (dividir el segmento 0-1 en 4 partes y marcar 3).\n\n📝 BLOQUE 3: Números decimales\n8. Escribe como decimal: a) 5/10 = __; b) 23/100 = __.\n9. Compara: 0,7 ___ 0,59; 1,08 ___ 1,10.\n10. Suma: 4,25 + 1,30 = __; Resta: 5,60 – 2,45 = __.\n\n📝 BLOQUE 4: Operaciones combinadas\n11. Calcula paso a paso:\na) 12 + 6 × 2 = __\nb) (20 – 5) × 3 = __\nc) 30 ÷ 5 + 8 × 2 = __\nd) 4 × (2 + 3) – 6 ÷ 2 = __\n\n📝 BLOQUE 5: Problemas\n12. Ana compró 2,50 kg de papas y 1,75 kg de camotes. ¿Cuántos kg compró en total?\n13. Un pastel se parte en 8 porciones iguales. Luis come 3/8 y María 2/8. ¿Qué fracción del pastel queda?\n14. En una tienda, un cuaderno cuesta S/ 3,50 y un lápiz S/ 1,20. Si compro 2 cuadernos y 1 lápiz, ¿cuánto gasto? (operación combinada: 2 × 3,50 + 1,20).\n\n⏱️ Tiempo: 45-60 min. ✅ Autoevaluación.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Geometría y Estadística\n\n📐 CONEXIÓN CON GEOMETRÍA:\n• Fracciones para dividir figuras planas en partes iguales (medios, cuartos, tercios).\n• Perímetro y área usan números decimales (ej: lado de 2,5 cm).\n• Ángulos como fracciones de una vuelta (90° = 1/4 de vuelta).\n\n📊 CONEXIÓN CON ESTADÍSTICA:\n• Los datos de encuestas se expresan a menudo como fracciones o decimales: "2 de cada 10 estudiantes prefieren el fútbol" = 2/10 = 0,2.\n• Interpretar gráficos de barras implica leer números decimales en los ejes.\n\n🧩 ACTIVIDAD INTEGRADORA: "Diseña tu bandera" – Crear una bandera rectangular dividida en franjas de colores según fracciones: 1/2 rojo, 1/4 azul, 1/4 verde. Medir el largo y ancho en cm con decimales (ej. 20,5 cm x 14,0 cm) y calcular el perímetro como suma de lados.\n\n💡 REFLEXIÓN: Los números naturales, las fracciones y los decimales son el lenguaje con que describimos cantidades en geometría y estadística.`,
            6: `🌍 CORRELACIONES EXTERNAS: Las fracciones y decimales en el mundo real\n\n🍳 EN LA COCINA: Las recetas utilizan 1/2 taza de azúcar, 0,75 kg de carne, 1,5 litros de agua. Ajustar recetas para más personas requiere multiplicar o sumar fracciones.\n🛒 EN LAS COMPRAS: Los precios llevan decimales (S/ 4,99); los descuentos del 50% equivalen a pagar 1/2 del precio. Calcular el vuelto implica restar decimales.\n⚽ EN LOS DEPORTES: Las estadísticas de un jugador (promedio de goles por partido) se expresan con decimales. Las fracciones de posesión de balón.\n⏱️ EN EL TIEMPO: Un cuarto de hora = 0,25 h = 15 min. Tres cuartos de hora = 0,75 h = 45 min.\n🎵 EN LA MÚSICA: Las figuras musicales (blanca = 1/2, negra = 1/4, corchea = 1/8) son fracciones de la redonda.\n\n🧠 REFLEXIÓN FINAL: "Comprender fracciones y decimales te da el poder de dividir el mundo en partes más pequeñas y entenderlo con precisión."\n🗣️ CITA: "Los números gobiernan el mundo." — Pitágoras.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "El Restaurante Matemático"\n\n🎯 OBJETIVO: Crear un restaurante de papel donde los estudiantes diseñen menús, tomen pedidos y calculen cuentas usando fracciones, decimales y operaciones combinadas.\n\n📋 FASES:\n1. ORGANIZACIÓN (1 sesión): 5 equipos: Cocineros (diseñan menú con precios), Meseros (toman pedidos), Cajeros (calculan cuentas), Clientes (hacen pedidos y verifican), Decoradores (ambientan el aula).\n2. DISEÑO DEL MENÚ (1 sesión): Platos con precios decimales (S/ 5,50, S/ 7,25, S/ 3,90) y porciones fraccionarias (1/2 porción, 1/4 de pizza).\n3. SIMULACIÓN (1-2 sesiones): Los clientes hacen pedidos usando expresiones como "Quiero 2 platos de S/ 5,50 y 1/2 porción de S/ 7,25". Los meseros anotan, los cajeros calculan el total con impuesto (10% = multiplicar por 0,10 o sumar la décima parte) y dan vuelto.\n4. REGISTRO Y CONTABILIDAD (1 sesión): Cada equipo registra las ventas totales en una tabla, calcula promedios y representa las preferencias con fracciones (ej. 3/8 de los clientes pidieron pizza).\n5. PRESENTACIÓN Y REFLEXIÓN (1 sesión): Exponen los resultados, comparten qué operaciones usaron más y cómo resolvieron las dificultades.\n\n🏆 EVALUACIÓN: Correcta aplicación de sumas/restas de decimales, manejo de fracciones, uso de jerarquía de operaciones, trabajo en equipo.\n🎉 CIERRE: "Cheque simbólico" al Restaurante Matemático y diplomas de "Chef Matemático".`,

        const leccionExtensaGeoIV = {
            0: `🎯 OBJETIVO GENERAL: Introducir a los estudiantes de 3° y 4° grado de primaria en el estudio sistemático de los ángulos y polígonos, desarrollando la capacidad de medir y clasificar ángulos, calcular perímetros de diversas figuras y comprender el concepto de área como medida de superficie, aplicando estos conocimientos en la resolución de problemas prácticos y en la exploración del entorno.\n\n🎯 OBJETIVOS PARTICULARES:\n• Identificar y nombrar los elementos de un ángulo: vértice y lados.\n• Clasificar ángulos en rectos (90°), agudos (<90°) y obtusos (>90° y <180°).\n• Utilizar el transportador para medir ángulos con precisión.\n• Reconocer y nombrar polígonos según su número de lados: triángulo (3 lados), cuadrilátero (4 lados), pentágono (5), hexágono (6).\n• Diferenciar polígonos regulares (lados y ángulos iguales) de irregulares.\n• Calcular el perímetro de cualquier polígono sumando las longitudes de sus lados.\n• Comprender el concepto de área como el número de unidades cuadradas que cubren una figura.\n• Deducir y aplicar las fórmulas de área para rectángulos y cuadrados: Área = base × altura.\n• Calcular el área de triángulos rectángulos como la mitad del área de un rectángulo (base × altura ÷ 2).\n• Resolver problemas que involucren perímetro y área en contextos cotidianos (terrenos, muros, habitaciones).\n\n📌 NOCIONES PRINCIPALES:\n• Ángulo: vértice, lados, medida en grados (°).\n• Transportador, grados.\n• Perímetro: suma de las longitudes de los lados de un polígono. Unidades lineales (cm, m).\n• Área: medida de superficie. Unidades cuadradas (cm², m²).\n• Base y altura. Fórmulas: rectángulo (b × h), cuadrado (lado × lado), triángulo rectángulo (b × h ÷ 2).\n\n📌 NOCIONES SECUNDARIAS:\n• Rectas paralelas y perpendiculares.\n• Clasificación de triángulos por sus lados (equilátero, isósceles, escaleno) y por sus ángulos (rectángulo, acutángulo, obtusángulo).\n• Perímetro de polígonos regulares = número de lados × longitud del lado.\n• Descomposición de figuras irregulares en rectángulos para calcular el área.\n\n🌍 INTERESES SOCIETALES:\n• Los ángulos están en todas partes: en la esquina de una cancha de fútbol (ángulo recto), en la inclinación de una rampa (ángulo agudo), en la abertura de una tijera.\n• El perímetro y el área son conceptos fundamentales en la construcción de viviendas, la agricultura (área de cultivo), la pintura de paredes (área para calcular pintura) y la confección de ropa.\n• La geometría desarrolla el pensamiento espacial y la capacidad de visualización.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Geómetras exploradores"\n\n🧩 MATERIALES: Transportadores escolares, reglas, hojas cuadriculadas, geoplanos con ligas, palitos de helado de diferentes longitudes, cartulinas recortadas en forma de polígonos, cintas métricas, objetos del aula con ángulos visibles (mesas, ventanas, puertas).\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\nESTACIÓN 1: "Caza de ángulos" – Con una escuadra o transportador buscar en el aula ángulos rectos, agudos y obtusos. Dibujarlos y clasificarlos.\nESTACIÓN 2: "Construye un polígono" – Con palitos de helado de distintos tamaños formar triángulos, cuadrados, rectángulos y pentágonos. Medir los lados y anotar el perímetro.\nESTACIÓN 3: "Midiendo superficies" – En papel cuadriculado, dibujar rectángulos de diferentes tamaños y contar los cuadraditos de 1 cm² para hallar el área. Luego comparar con el resultado de multiplicar base por altura.\nESTACIÓN 4: "Geoplano de formas" – Usando ligas en el geoplano, formar figuras con un área determinada (ej: 6 unidades cuadradas) y comparar perímetros.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Qué es un ángulo? ¿Todos los ángulos “abiertos” miden lo mismo? ¿El área y el perímetro siempre aumentan juntos? ¿Dónde usamos estas medidas fuera del colegio?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Reglas de ángulos y áreas"\n\n📊 OBSERVACIÓN GUIADA – ÁNGULOS:\nSe presentan tres relojes analógicos marcando diferentes horas: 3:00 (90°), 1:00 (ángulo agudo ≈30°), 10:10 (ángulo obtuso ≈115°). Los niños miden con transportador los ángulos formados por las agujas. Conclusión: Un ángulo recto mide exactamente 90°. Un ángulo menor de 90° es agudo, mayor de 90° y menor de 180° es obtuso.\n\n📊 OBSERVACIÓN GUIADA – PERÍMETRO:\nSe dibujan en la pizarra un cuadrado de 4 cm de lado y un rectángulo de 6 cm × 2 cm. Ambos tienen perímetro 16 cm, pero diferente forma. Conclusión: Figuras con el mismo perímetro pueden tener áreas distintas (se verificará luego).\n\n📊 OBSERVACIÓN GUIADA – ÁREA:\nCon geoplanos o cuadrícula, forman un rectángulo de 3 × 4 (12 cuadraditos) y un cuadrado de 3 × 3 (9 cuadraditos). Los niños cuentan y luego comprueban que se obtiene el mismo número multiplicando los lados. Para el triángulo rectángulo: dibujan un rectángulo de 4 × 3, trazan una diagonal y observan que el triángulo ocupa exactamente la mitad del área. Conclusión: Área del rectángulo = base × altura; área del triángulo rectángulo = (base × altura) ÷ 2.\n\n📝 REGISTRO: Ficha con definiciones y ejemplos dibujados.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Ángulos, polígonos, perímetro y área\n\n📏 1. ÁNGULOS\n• Definición: Un ángulo es la abertura formada por dos rayos (lados) que parten de un mismo punto (vértice).\n• Medición: Se utiliza el transportador, colocando el centro en el vértice y alineando un lado con 0°. La medida se lee en la escala.\n• Clasificación: Recto (90°), Agudo (<90° y >0°), Obtuso (>90° y <180°).\n\n🔷 2. POLÍGONOS\n• Figuras planas cerradas formadas por segmentos de recta (lados). Se nombran por su número de lados: triángulo (3), cuadrilátero (4), pentágono (5), hexágono (6), etc.\n• Polígono regular: todos sus lados y ángulos son iguales. Irregular: no cumple esa condición.\n• Elementos: lados, vértices, ángulos internos, diagonales.\n\n📏 3. PERÍMETRO\n• Es la medida del contorno de una figura. Se calcula sumando las longitudes de todos sus lados.\n• Para polígonos regulares: Perímetro = número de lados × medida de un lado.\n• Unidades: cm, m, km (unidades lineales).\n\n🔲 4. ÁREA\n• Es la medida de la superficie que ocupa una figura. Se mide en unidades cuadradas (cm², m²).\n• Fórmulas básicas:\n  - Cuadrado: A = lado × lado = l²\n  - Rectángulo: A = base × altura = b × h\n  - Triángulo rectángulo: A = (base × altura) ÷ 2 (Nota: en 4° grado se introduce para triángulos rectángulos; para otros triángulos se puede extender con la misma fórmula si se conoce la altura).\n• Estrategia para figuras compuestas: dividirlas en rectángulos y cuadrados, calcular cada área y sumar.\n\n⚠️ ERRORES COMUNES:\n• Confundir perímetro con área (contorno vs superficie).\n• Usar unidades incorrectas (cm para perímetro, cm² para área).\n• Al medir ángulos, leer la escala equivocada del transportador (interna vs externa).\n• Olvidar que el área del triángulo es la mitad del rectángulo, no igual.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de aplicación\n\n📝 BLOQUE 1: Ángulos\n1. Mide con transportador y clasifica: dibujos de ángulos de 45°, 90°, 120°, 15°.\n2. Dibuja un ángulo recto, uno agudo y uno obtuso. Indica su medida aproximada.\n3. ¿Cuánto mide el ángulo que forman las agujas del reloj a las 3:00? ¿Y a las 5:00? (Estimación).\n\n📝 BLOQUE 2: Polígonos y perímetros\n4. Nombra los polígonos: triángulo, cuadrado, rectángulo, pentágono, hexágono.\n5. Calcula el perímetro de: a) Triángulo equilátero de lado 6 cm. b) Rectángulo de 8 cm × 3 cm. c) Cuadrado de lado 5,5 cm.\n6. Un pentágono regular mide 4 cm por lado. ¿Cuál es su perímetro?\n\n📝 BLOQUE 3: Área\n7. Calcula el área de:\na) Cuadrado de lado 7 cm.\nb) Rectángulo de base 9 cm y altura 4 cm.\nc) Triángulo rectángulo de base 6 cm y altura 4 cm.\n8. Una hoja de papel mide 30 cm de largo y 20 cm de ancho. ¿Cuál es su área en cm²?\n\n📝 BLOQUE 4: Problemas integrados\n9. Una cancha de fútbol rectangular mide 100 m de largo y 60 m de ancho. Calcula su perímetro y su área.\n10. María quiere poner cinta alrededor de un marco rectangular de 25 cm por 30 cm. ¿Cuántos cm de cinta necesita? Si además forra el frente con papel, ¿cuánto papel (área) requiere?\n11. Un jardinero cerca un jardín triangular rectángulo con lados de 3 m, 4 m y 5 m. ¿Cuántos metros de cerca necesita? Si sembrará césped, ¿qué área debe cubrir? (Área: base 3 m, altura 4 m).\n\n⏱️ Tiempo: 50-65 min. ✅ Autoevaluación.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Números y Estadística\n\n🔢 CONEXIÓN CON NÚMEROS Y OPERACIONES:\n• Las fórmulas de perímetro y área implican suma, multiplicación y división. Se aplican operaciones combinadas.\n• Al medir lados y ángulos, se utilizan números decimales y fracciones (½ cm, 0,5 cm).\n• El cálculo de perímetros de polígonos regulares refuerza la multiplicación.\n\n📊 CONEXIÓN CON ESTADÍSTICA:\n• En un estudio de figuras favoritas, se pueden representar las frecuencias en gráficos de barras.\n• Comparar áreas de diferentes departamentos o países en tablas.\n\n🧩 ACTIVIDAD INTEGRADORA: "Construye tu robot geométrico" – Dibujar un robot formado únicamente por rectángulos, cuadrados y triángulos. Medir cada parte y calcular perímetro total y área total. Luego expresar los resultados en una tabla y graficar el porcentaje de área de cada figura.\n\n💡 REFLEXIÓN: La geometría necesita a los números para cuantificar, y la estadística para comparar.`,
            6: `🌍 CORRELACIONES EXTERNAS: Ángulos y áreas en la vida cotidiana\n\n🏠 EN LA CONSTRUCCIÓN Y DISEÑO:\n• Los planos de una casa muestran habitaciones rectangulares de las que se calcula el área para saber cuántos metros cuadrados de piso se necesitan.\n• Las rampas para discapacitados deben tener un ángulo de inclinación máximo (generalmente agudo, alrededor de 8°).\n• Los techos a dos aguas forman ángulos obtusos o agudos según el diseño.\n\n⚽ EN EL DEPORTE:\n• La cancha de fútbol tiene líneas perpendiculares (ángulo recto). Las trayectorias de los pases forman ángulos.\n• En básquet, el tablero y el aro forman un ángulo recto.\n\n🎨 EN EL ARTE Y LA NATURALEZA:\n• Las teselaciones de Escher usan polígonos que cubren el plano sin dejar huecos.\n• Los panales de abejas son hexágonos regulares, forma que maximiza el área con el menor perímetro.\n• Las hojas de muchas plantas presentan simetría y ángulos precisos (filotaxis).\n\n🧩 EN LA VIDA DIARIA:\n• Encuadrar un cuadro requiere que los ángulos de las esquinas sean rectos.\n• Calcular cuánta alfombra comprar para una habitación (área).\n\n🧠 REFLEXIÓN FINAL: "La geometría es el arte de medir la tierra; donde haya espacio, hay geometría."\n🗣️ CITA: "No hay rama de la matemática, por abstracta que sea, que no pueda aplicarse algún día a los fenómenos del mundo real." — Lobachevsky.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Arquitectos por un día: Diseñamos nuestro parque ideal"\n\n🎯 OBJETIVO: Diseñar el plano de un parque en una cartulina grande, integrando diferentes zonas geométricas (juegos infantiles, cancha deportiva, jardines, caminos) y calculando el perímetro y área de cada zona, además de verificar los ángulos en las intersecciones.\n\n📋 FASES:\n1. ORGANIZACIÓN (1 sesión): 5 equipos encargados de diferentes áreas del parque: Zona de juegos (columpios, toboganes), Cancha multiuso (rectángulo), Jardín central (triángulo o rectángulo), Caminos (rectángulos alargados), Zona de descanso (cuadrados o hexágonos).\n2. DISEÑO Y MEDICIÓN (2 sesiones): En papel cuadriculado tamaño pliego, dibujan el plano general del parque. Cada equipo delimita su zona, mide lados (usando escala: 1 cm = 1 m), calcula perímetro y área, y verifica que los ángulos de las esquinas sean rectos (usando escuadra).\n3. PRESUPUESTO SIMULADO (1 sesión): Se asignan precios por metro cuadrado de pasto, cemento, arena. Cada equipo calcula el costo de material para su zona usando el área calculada.\n4. MAQUETA O PRESENTACIÓN (1 sesión): Construyen una maqueta con materiales reciclados (cartón, palitos) o elaboran un afiche con los cálculos y el plano.\n5. EXPOSICIÓN (1 sesión): Presentan el parque, explican las formas elegidas, las áreas y los costos. Responden preguntas de sus compañeros.\n\n🏆 EVALUACIÓN: Precisión en las mediciones, correcta aplicación de fórmulas de perímetro y área, identificación de ángulos, trabajo colaborativo, creatividad.\n🎉 CIERRE: Votación para el "Mejor Parque" y diplomas de "Arquitecto Matemático".`,
        };

        const leccionExtensaEstIV = {
            0: `🎯 OBJETIVO GENERAL: Introducir a los estudiantes de 3° y 4° grado de primaria en los fundamentos de la estadística descriptiva, capacitándolos para recolectar, organizar y representar datos en tablas de frecuencia y gráficos de barras, así como para interpretar la información contenida en ellos, desarrollando habilidades de análisis y toma de decisiones basada en datos.\n\n🎯 OBJETIVOS PARTICULARES:\n• Comprender qué son los datos y la importancia de organizarlos.\n• Recolectar datos mediante encuestas sencillas y preguntas.\n• Construir tablas de conteo y tablas de frecuencia (absoluta).\n• Representar datos en gráficos de barras verticales y horizontales.\n• Leer e interpretar información de tablas y gráficos de barras (identificar la categoría con mayor/menor frecuencia, comparar frecuencias).\n• Identificar la moda (dato más frecuente) en un conjunto de datos.\n• Utilizar adecuadamente el título, los ejes y las etiquetas en un gráfico.\n• Resolver problemas que impliquen interpretar y construir representaciones estadísticas.\n\n📌 NOCIONES PRINCIPALES:\n• Dato, encuesta, población y muestra (nociones intuitivas).\n• Tabla de conteo, tabla de frecuencia absoluta.\n• Gráfico de barras: ejes (horizontal y vertical), escala, altura de la barra, título.\n• Moda: categoría o valor con mayor frecuencia.\n\n📌 NOCIONES SECUNDARIAS:\n• Diferencia entre variables cualitativas (color favorito, fruta preferida) y cuantitativas discretas (número de hermanos).\n• Pictograma (representación con dibujos) como introducción al gráfico de barras.\n• Comparación entre dos conjuntos de datos usando gráficos de barras dobles (solo interpretación en 4°).\n\n🌍 INTERESES SOCIETALES:\n• La estadística está presente en las noticias (intención de voto, preferencias deportivas), en la escuela (resultados de evaluaciones) y en el comercio (productos más vendidos).\n• Saber interpretar tablas y gráficos es una habilidad esencial para la ciudadanía informada: permite entender encuestas, reportes y tomar decisiones basadas en evidencia.\n• Fomenta el pensamiento crítico y la capacidad de argumentar con datos.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Pequeños estadísticos en acción"\n\n🧩 MATERIALES: Pizarra, tarjetas adhesivas (post-it), cartulinas, marcadores, dados, colección de tapitas de colores, hojas cuadriculadas, lápices de colores.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\nESTACIÓN 1: "El mural de preferencias" – Cada niño pega un post-it con su fruta favorita en una columna. Se forma un gráfico de barras viviente. Luego lo pasan a papel cuadriculado.\nESTACIÓN 2: "Dados estadísticos" – Lanzan un dado 20 veces y registran con palotes cada resultado en una tabla de conteo. Luego convierten a tabla de frecuencia y dibujan el gráfico de barras.\nESTACIÓN 3: "Encuesta a otros salones" – Diseñan una pregunta (ej: mascota preferida) y van a encuestar brevemente a otro salón con permiso. Recolectan los datos.\nESTACIÓN 4: "Interpretando gráficos" – Reciben gráficos de barras ya hechos (sobre sabores de helado, deportes, etc.) con preguntas: ¿Cuál es el más popular? ¿Cuál tiene 5 votos? ¿Cuántos más prefieren A que B?\n\n💬 REFLEXIÓN EN PLENARIA: ¿Por qué es útil organizar los datos en tablas? ¿Qué nos dice un gráfico de barras que no nos dice una lista de números?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Construyendo la regla estadística"\n\n📊 OBSERVACIÓN GUIADA – TABLA DE FRECUENCIA:\nA partir de los datos del dado o la fruta favorita, la maestra muestra cómo los palotes (conteo) se agrupan de 5 en 5 para facilitar el conteo. Luego se transforman en números (frecuencia). Preguntas: ¿Por qué usamos palotes? ¿Qué pasa si los datos son muchos?\nConclusión: Una tabla de frecuencia organiza los datos mostrando cuántas veces se repite cada valor.\n\n📊 OBSERVACIÓN GUIADA – GRÁFICO DE BARRAS:\nSe presentan varios gráficos de barras correctos e incorrectos (sin título, barras de distinto ancho, escala irregular). Los niños identifican los errores y establecen los elementos necesarios: título claro, ejes etiquetados, escala uniforme, barras del mismo ancho y separadas.\nConclusión: Un buen gráfico de barras debe ser claro, preciso y tener todos sus elementos.\n\n📊 OBSERVACIÓN GUIADA – MODA:\nCon los datos de la fruta favorita, se pregunta: ¿Qué fruta apareció más veces? Esa es la moda. Se contrasta con "la que menos veces apareció".\nConclusión: La moda es el dato que tiene la mayor frecuencia.\n\n📝 REGISTRO: Cada estudiante crea un mini póster con los 3 elementos clave: tabla de frecuencia, gráfico de barras y moda.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Estadística – Tablas y gráficos de barras\n\n📊 1. RECOLECCIÓN Y ORGANIZACIÓN DE DATOS\n• Dato: información que recolectamos (ej: color de ojos, puntaje en un juego).\n• Encuesta: conjunto de preguntas para obtener datos de un grupo.\n• Población: grupo total que queremos estudiar (ej: todos los estudiantes de 3°). Muestra: parte de la población que realmente encuestamos.\n\n📋 2. TABLA DE FRECUENCIA\n• Tabla de conteo: se registran marcas (palotes) por cada dato observado, agrupando de 5 en 5 (IIII).\n• Frecuencia absoluta: número total de veces que aparece cada categoría.\n• Ejemplo:\n  Color favorito | Conteo | Frecuencia\n  Rojo           | IIII   | 5\n  Azul           | III    | 3\n  Verde          | II     | 2\n\n📊 3. GRÁFICO DE BARRAS\n• Representación visual de la tabla de frecuencia.\n• Construcción:\n  1. Dibujar dos ejes perpendiculares.\n  2. Eje horizontal (X): categorías (colores, frutas, etc.).\n  3. Eje vertical (Y): frecuencias (números). Elegir una escala adecuada (de 1 en 1, de 2 en 2, etc.) según el valor máximo.\n  4. Dibujar barras rectangulares del mismo ancho, separadas, cuya altura corresponde a la frecuencia.\n  5. Colocar título general y etiquetas en los ejes.\n• Lectura: La barra más alta indica la moda. Podemos comparar: ¿cuántos más prefieren A que B?\n\n🔍 4. MODA\n• Es el valor o categoría con mayor frecuencia absoluta. Puede haber más de una moda si dos valores empatan en la frecuencia más alta.\n\n⚠️ ERRORES COMUNES:\n• Barras de diferente ancho (confunde visualmente).\n• Escala inadecuada (no empieza en 0, o los intervalos no son iguales).\n• Olvidar título o etiquetas de los ejes.\n• Confundir la frecuencia con el nombre de la categoría.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de aplicación\n\n📝 BLOQUE 1: Interpretación de tablas\n1. La tabla muestra los deportes favoritos de 20 niños:\n   Fútbol: 8, Básquet: 5, Natación: 4, Tenis: 3.\n   a) ¿Cuál es el deporte más popular? (moda)\n   b) ¿Cuál el menos practicado?\n   c) ¿Cuántos niños prefieren fútbol o básquet?\n\n📝 BLOQUE 2: Construcción de tabla y gráfico\n2. Encuesta en el aula: "¿Cómo vienes al colegio?" (Caminando, Bicicleta, Bus, Auto). Recolecta los datos de tus compañeros (mínimo 15). Completa la tabla de conteo y frecuencia. Dibuja el gráfico de barras en papel cuadriculado.\n\n📝 BLOQUE 3: Interpretación de gráficos de barras\n3. Observa el gráfico de barras (se dibuja en pizarra o ficha):\n   [Gráfico: Ventas de helados en una semana. Lunes: 10, Martes: 15, Miércoles: 20, Jueves: 10, Viernes: 25, Sábado: 30, Domingo: 25]\n   a) ¿Qué día se vendieron más helados?\n   b) ¿Qué día se vendieron 15 helados?\n   c) ¿Cuántos helados más se vendieron el sábado que el lunes?\n   d) ¿Qué días tuvieron la misma cantidad de ventas?\n\n📝 BLOQUE 4: Aplicación y análisis\n4. Inventa una pregunta de encuesta para tu familia (ej: programa de TV favorito). Recolecta al menos 10 respuestas, organiza en tabla de frecuencia y construye el gráfico de barras. Escribe dos conclusiones a partir del gráfico.\n\n⏱️ Tiempo: 45-55 min. ✅ Autoevaluación.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Números y Geometría\n\n🔢 CONEXIÓN CON NÚMEROS Y OPERACIONES:\n• Las frecuencias son números; al compararlas usamos sumas, restas y la noción de "cuántas veces más".\n• Al construir la tabla de frecuencia aplicamos conteo y organización numérica.\n• El análisis del gráfico puede involucrar operaciones combinadas: total de encuestados, diferencias, sumas de categorías.\n\n📐 CONEXIÓN CON GEOMETRÍA:\n• El gráfico de barras es una representación geométrica: las barras son rectángulos cuya altura es proporcional a la frecuencia (uso implícito de proporción).\n• La construcción de los ejes usa ángulos rectos y paralelismo.\n\n🧩 ACTIVIDAD INTEGRADORA: "Estadística de figuras" – Cada niño dibuja una figura geométrica en una tarjeta (triángulo, cuadrado, círculo). Se juntan todas y se clasifican. Construyen tabla de frecuencia y gráfico de barras de "Figuras favoritas del aula". Luego calculan el área total de todas las figuras de un tipo si se dieran dimensiones.\n\n💡 REFLEXIÓN: Los números dan sentido a los datos; la geometría les da forma visual.`,
            6: `🌍 CORRELACIONES EXTERNAS: Estadística en la vida diaria\n\n📺 EN LOS MEDIOS DE COMUNICACIÓN:\n• Los noticieros muestran gráficos de barras para comparar la intención de voto, el crecimiento económico o las medallas olímpicas por país.\n• Las aplicaciones meteorológicas usan gráficos de barras para mostrar la precipitación mensual.\n\n🏫 EN LA ESCUELA:\n• Las calificaciones del aula se pueden representar en gráficos para ver el rendimiento general.\n• La asistencia mensual se registra en tablas y se puede graficar.\n\n🛒 EN EL COMERCIO:\n• Las tiendas registran los productos más vendidos usando tablas y gráficos para decidir qué reponer.\n• Las encuestas de satisfacción de clientes se analizan estadísticamente.\n\n⚕️ EN LA SALUD:\n• Las gráficas de crecimiento infantil muestran la estatura y el peso según la edad con curvas basadas en estadísticas.\n• El número de casos de una enfermedad se reporta en gráficos de barras semanales.\n\n🧠 REFLEXIÓN FINAL: "Los datos sin organización son solo ruido; con la estadística se convierten en información poderosa para tomar decisiones."\n🗣️ CITA: "En Dios confiamos; los demás deben traer datos." — Atribuida a W. Edwards Deming.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Gran Encuesta Escolar: Conocemos nuestra comunidad"\n\n🎯 OBJETIVO: Realizar una encuesta a nivel de grado o escuela sobre un tema de interés (hábitos de lectura, uso de tecnología, preferencias alimenticias, etc.), aplicando todas las etapas del proceso estadístico: diseño, recolección, organización, representación e interpretación.\n\n📋 FASES:\n1. ORGANIZACIÓN (1 sesión): Formar 5 equipos. Cada equipo elige un tema de encuesta (con ayuda del docente). Diseñan la pregunta (máximo 4 opciones de respuesta).\n2. RECOLECCIÓN (1-2 sesiones): Cada equipo aplica la encuesta a un grupo asignado (otros salones, personal del colegio). Registran los datos en tablas de conteo.\n3. TABULACIÓN Y GRÁFICO (1 sesión): Convierten el conteo en tabla de frecuencia y dibujan un gráfico de barras a gran escala en papelógrafo, con todos los elementos (título, ejes, escala).\n4. ANÁLISIS Y CONCLUSIONES (1 sesión): Identifican la moda, comparan frecuencias, redactan 3 conclusiones basadas en los datos.\n5. FERIA ESTADÍSTICA (1 sesión): Exponen los papelógrafos en el patio o aula común. Cada equipo presenta sus hallazgos a los visitantes (otros cursos, padres).\n\n🏆 EVALUACIÓN: Claridad de la pregunta, correcta construcción de tabla y gráfico, precisión en el cálculo de frecuencias, profundidad de las conclusiones, exposición oral y trabajo en equipo.\n🎉 CIERRE: Diploma de "Estadístico Escolar" y publicación de los gráficos en el periódico mural.`,
        };

        // ═══════════════════════════════════════
        //  GENERADOR DE CONTENIDO AUTOMÁTICO
        // ═══════════════════════════════════════
        function generateLessonContent(lesson, phaseNumber) {
            const area = lesson.area;
            const materia = lesson.materia;
            const conocimientos = lesson.conocimientos;
            const ciclo = lesson.ciclo;
            const nivel = lesson.nivel;
            switch (phaseNumber) {
                case 0:
                    return `OBJETIVO GENERAL: Desarrollar competencias en ${materia} correspondientes al ${ciclo} de Educación ${nivel}.\n\nOBJETIVOS PARTICULARES:\n- Identificar los conceptos clave de ${materia}.\n- Aplicar los conocimientos en situaciones prácticas.\n- Resolver problemas utilizando estrategias adecuadas.\n\nNOCIONES PRINCIPALES: ${conocimientos}\nNOCIONES SECUNDARIAS: Vocabulario técnico, procedimientos, estrategias de verificación.\nINTERESES SOCIETALES: Relación con la vida cotidiana, el entorno natural y social.`;
                case 1:
                    return `ACTIVIDAD DE DESCUBIERTA: "Explorando ${materia}"\n\n🧩 Se presentan situaciones problemáticas y materiales concretos para que los estudiantes exploren libremente los conceptos de ${materia}.\n🔍 Preguntas para la reflexión y registro de observaciones en el cuaderno de experiencias.`;
                case 2:
                    return `ACTIVIDAD INDUCTIVA: "Del ejemplo concreto al concepto general"\n\n📊 Se presentan varios ejemplos de ${materia} para que los estudiantes identifiquen patrones, regularidades y formulen reglas generales.\n📝 Los estudiantes registran sus conclusiones en organizadores gráficos.`;
                case 3:
                    return `TRANSMISIÓN CONCEPTUAL: ${materia}\n\n📐 CONCEPTOS CLAVE:\n${conocimientos}\n\n📏 DEFINICIONES, PROPIEDADES Y EJEMPLOS DESARROLLADOS.\n⚠️ Errores comunes y estrategias para evitarlos.`;
                case 4:
                    return `TRABAJOS DIRIGIDOS: Ejercicios de ${materia}\n\n✏️ Ejercicios de identificación, aplicación directa, transferencia y argumentación.\n📝 Formato: Individual o en parejas. Tiempo estimado: 30-45 minutos.`;
                case 5:
                    return `CORRELACIONES INTERNAS: Conexión con otras materias del área\n\n🔗 ${materia} se relaciona con otras ramas de ${lesson.areaName}. Se presentan ejemplos de integración.`;
                case 6:
                    return `CORRELACIONES EXTERNAS: Aplicaciones en la vida real\n\n🌍 Se muestran aplicaciones de ${materia} en la vida cotidiana, la tecnología, el arte, la naturaleza.`;
                case 7:
                    return `MÓDULO DE PROYECTO GRUPAL: "Aplicando ${materia} en equipo"\n\n🎯 Los estudiantes diseñan y ejecutan un proyecto colaborativo que integre los conocimientos de ${materia}.\n📋 Fases: formación de equipos, elección del tema, planificación, ejecución, presentación y evaluación.`;
                default:
                    return '';
            }
        }

        function renderHome() {
            currentView = 'home';
            currentArea = null;
            currentLessonId = null;
            updateBreadcrumb([]);
            const main = document.getElementById('mainContent');
            const matCount = lessonsData.filter(l => l.area === 'matematica' && !l.esMetodo).length;
            const cieCount = lessonsData.filter(l => l.area === 'ciencia' && !l.esMetodo).length;
            const metodoCount = lessonsData.filter(l => l.esMetodo).length;
            main.innerHTML = `
                <h1 class="page-title">📚 Conocimientos Fundamentales</h1>
                <p class="page-subtitle">IEP Escuela Hogar Ventanilla · Educación Básica Regular · Selecciona un área para explorar las lecciones</p>
                <div class="area-cards">
                    <div class="area-card matematica" onclick="navigateToArea('matematica')">
                        <div class="icon">🧮</div>
                        <h2>Matemática</h2>
                        <p class="count">${matCount} lecciones · Primaria y Secundaria</p>
                        <p style="font-size:0.78rem;color:#64748b;margin-top:0.4rem;">Números, Geometría, Medición, Álgebra, Estadística</p>
                    </div>
                    <div class="area-card ciencia" onclick="navigateToArea('ciencia')">
                        <div class="icon">🔬</div>
                        <h2>Ciencia y Tecnología</h2>
                        <p class="count">${cieCount} lecciones · Primaria y Secundaria</p>
                        <p style="font-size:0.78rem;color:#64748b;margin-top:0.4rem;">Seres Vivos, Materia, Tierra, Química, Biología, Física</p>
                    </div>
                    <div class="area-card metodo-highlight" onclick="navigateToLesson('metodo-ciclo-vi')">
                        <div class="icon">⚗️</div>
                        <h2>El Método Científico <span class="featured-badge">🌟 Destacado</span></h2>
                        <p class="count">${metodoCount} lecciones especializadas · Ciclos V, VI y VII</p>
                        <p style="font-size:0.78rem;color:#6b21a8;margin-top:0.4rem;">🔬 Contenido del PDF: experimentos, variables, sesgo, biología</p>
                    </div>
                </div>
                <div style="margin-top:1.5rem;padding:1.2rem;background:#fefce8;border-radius:12px;border:1px solid #eab308;font-size:0.85rem;color:#92400e;">
                    <strong>🌟 Lecciones extensas ya desarrolladas (Ciclo III y ahora Ciclo IV):</strong><br>
                    🧮 <strong>Ciclo III (1°-2°)</strong>: Números y Operaciones · Geometría · Medición.<br>
                    🧮 <strong>Ciclo IV (3°-4°)</strong>: Números y Operaciones (fracciones, decimales, operaciones combinadas) · Geometría (ángulos, perímetro, área) · Estadística (tablas y gráficos de barras).<br>
                    <em>Haz clic en el área de Matemática y busca las lecciones correspondientes para acceder a ellas.</em>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderArea(areaKey) {
            currentView = 'area';
            currentArea = areaKey;
            currentLessonId = null;
            const areaLessons = lessonsData.filter(l => l.area === areaKey);
            const areaName = areaLessons[0]?.areaName || 'Área';
            updateBreadcrumb([{ label: areaName, action: null, current: true }]);
            const groups = {};
            areaLessons.forEach(l => {
                const groupKey = `${l.nivel}|${l.ciclo}`;
                if (!groups[groupKey]) { groups[groupKey] = { nivel: l.nivel, ciclo: l.ciclo, lessons: [] }; }
                groups[groupKey].lessons.push(l);
            });
            const groupOrder = ['Primaria|Ciclo III', 'Primaria|Ciclo IV', 'Primaria|Ciclo V', 'Secundaria|Ciclo VI', 'Secundaria|Ciclo VII'];
            const sortedGroups = groupOrder.map(key => groups[key]).filter(g => g);
            let groupsHTML = '';
            sortedGroups.forEach(group => {
                const nivelClass = group.nivel.toLowerCase();
                groupsHTML += `
                <div class="level-group">
                    <div class="level-group-header">
                        <span class="level-badge ${nivelClass}">${group.nivel}</span>
                        <span class="ciclo-tag">${group.ciclo}</span>
                    </div>
                    <div class="lesson-grid">
                        ${group.lessons.map(l => {
                            const isMetodo = l.esMetodo ? ' metodo-card' : '';
                            const metodoIcon = l.esMetodo ? ' <span class="metodo-icon-small">🧪 MÉTODO</span>' : '';
                            return `
                            <div class="lesson-card${isMetodo}" onclick="navigateToLesson('${l.id}')">
                                <span class="lesson-title">${l.materia}${metodoIcon}</span>
                                <span class="lesson-meta">📐 ${l.grado}</span>
                                <span class="lesson-preview">${l.conocimientos}</span>
                                <span class="arrow">→</span>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            });
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <button class="btn-back" onclick="navigateHome()">← Volver al inicio</button>
                <h1 class="page-title">${areaName}</h1>
                <p class="page-subtitle">${areaLessons.length} lecciones organizadas por nivel y ciclo. Todas con contenido pedagógico completo.</p>
                ${groupsHTML}
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderLesson(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) { renderHome(); return; }
            currentView = 'lesson';
            currentLessonId = lessonId;
            currentArea = lesson.area;
            updateBreadcrumb([
                { label: lesson.areaName, action: () => navigateToArea(lesson.area), current: false },
                { label: lesson.materia + ' (' + lesson.grado + ')', action: null, current: true },
            ]);
            const nivelClass = lesson.nivel.toLowerCase();
            const isMetodo = lesson.esMetodo;
            const headerClass = isMetodo ? ' metodo-header' : '';
            let phasesHTML = '';
            phaseDefinitions.forEach(phase => {
                phasesHTML += `
                <div class="phase-item ${phase.cssClass}" id="phase-${phase.number}-${lesson.id}">
                    <div class="phase-header" onclick="togglePhase('phase-${phase.number}-${lesson.id}')">
                        <span class="phase-number">${phase.number}</span>
                        <span class="phase-title-text">
                            ${phase.title}
                            <span class="phase-subtitle">${phase.subtitle}</span>
                        </span>
                        <span class="phase-chevron">▾</span>
                    </div>
                    <div class="phase-body">
                        <textarea class="editable-area" id="editable-${phase.number}-${lesson.id}" placeholder="Contenido de la Fase ${phase.number}..." data-phase="${phase.number}" data-lesson="${lesson.id}"></textarea>
                    </div>
                </div>
                `;
            });
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <button class="btn-back" onclick="navigateToArea('${lesson.area}')">← Volver a ${lesson.areaName}</button>
                <div class="lesson-detail">
                    <div class="lesson-header-card${headerClass}">
                        <div class="meta-row">
                            <span class="level-badge ${nivelClass}">${lesson.nivel}</span>
                            <span>📐 ${lesson.grado}</span>
                            <span>🔄 ${lesson.ciclo}</span>
                            ${isMetodo ? '<span style="background:#8b5cf6;color:#fff;padding:0.2rem 0.7rem;border-radius:14px;font-size:0.75rem;font-weight:600;">🌟 LECCIÓN DESTACADA</span>' : ''}
                        </div>
                        <h1>${lesson.materia}</h1>
                        <span class="knowledge-tag">📘 ${lesson.conocimientos}</span>
                        ${(lessonId==='mat-pri-num-iii'||lessonId==='mat-pri-geo-iii'||lessonId==='mat-pri-med-iii'||lessonId==='mat-pri-num-iv'||lessonId==='mat-pri-geo-iv'||lessonId==='mat-pri-est-iv') ? '<p style="margin-top:0.6rem;font-size:0.82rem;color:#eab308;">🌟 <strong>Lección extensa detallada:</strong> contenido ilustrado con ejemplos, ejercicios y proyecto completo.</p>' : ''}
                    </div>
                    <p style="color:#64748b;margin-bottom:1rem;font-size:0.8rem;">
                        📝 Expande cada fase para ver y editar su contenido.
                        <span style="font-size:0.7rem;color:#94a3b8;">(Cambios guardados automáticamente)</span>
                    </p>
                    <div class="phase-accordion">
                        ${phasesHTML}
                    </div>
                </div>
            `;
            restoreSavedContent(lessonId);
            // Aplicar contenido manual según lección
            if (lessonId === 'mat-pri-num-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumIII), 150);
            } else if (lessonId === 'mat-pri-geo-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoIII), 150);
            } else if (lessonId === 'mat-pri-med-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMedIII), 150);
            } else if (lessonId === 'mat-pri-num-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumIV), 150);
            } else if (lessonId === 'mat-pri-geo-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoIV), 150);
            } else if (lessonId === 'mat-pri-est-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaEstIV), 150);
            } else {
                setTimeout(() => applyAutoGeneratedContent(lessonId), 150);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyManualContent(lessonId, contentObj) {
            Object.keys(contentObj).forEach(phaseNum => {
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = contentObj[phaseNum];
                        localStorage.setItem(key, contentObj[phaseNum]); }
                }
            });
        }

        function applyAutoGeneratedContent(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) return;
            phaseDefinitions.forEach(phase => {
                const phaseNum = phase.number;
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const content = generateLessonContent(lesson, phaseNum);
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = content;
                        localStorage.setItem(key, content); }
                }
            });
        }

        function togglePhase(phaseElementId) {
            const phaseItem = document.getElementById(phaseElementId);
            if (!phaseItem) return;
            phaseItem.classList.toggle('open');
            const ta = phaseItem.querySelector('.editable-area');
            if (ta) saveContent(ta);
        }

        function getStorageKey(lessonId, phaseNumber) { return `lesson-${lessonId}-phase-${phaseNumber}`; }
        function saveContent(textarea) { localStorage.setItem(getStorageKey(textarea.dataset.lesson, textarea.dataset.phase), textarea.value); }

        function restoreSavedContent(lessonId) {
            phaseDefinitions.forEach(phase => {
                const saved = localStorage.getItem(getStorageKey(lessonId, phase.number));
                if (saved) { const ta = document.getElementById(`editable-${phase.number}-${lessonId}`);
                    if (ta) ta.value = saved; }
            });
        }

        let saveTimeout;
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('editable-area')) {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => saveContent(e.target), 500);
            }
        });
        document.addEventListener('blur', function(e) {
            if (e.target.classList.contains('editable-area')) saveContent(e.target);
        }, true);

        function navigateHome() { window.location.hash = '';
            renderHome(); }
        function navigateToArea(areaKey) { window.location.hash = areaKey;
            renderArea(areaKey); }
        function navigateToLesson(lessonId) { window.location.hash = lessonId;
            renderLesson(lessonId); }

        function updateBreadcrumb(items) {
            const bc = document.getElementById('breadcrumb');
            let html = '<span onclick="navigateHome()">Inicio</span>';
            items.forEach(item => {
                html += ' <span class="sep">›</span> ';
                if (item.current) html += `<span class="current">${item.label}</span>`;
                else if (item.action) html += `<span onclick="(${item.action.toString()})()" style="cursor:pointer;">${item.label}</span>`;
                else html += `<span>${item.label}</span>`;
            });
            bc.innerHTML = html;
        }

        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.replace('#', '');
            if (!hash) renderHome();
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else if (lessonsData.some(l => l.id === hash)) renderLesson(hash);
        });

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                if (currentView === 'lesson') {
                    const allPhases = document.querySelectorAll('.phase-item');
                    const anyClosed = Array.from(allPhases).some(p => !p.classList.contains('open'));
                    allPhases.forEach(p => { if (anyClosed) p.classList.add('open');
                        else p.classList.remove('open'); });
                    document.querySelectorAll('.editable-area').forEach(ta => saveContent(ta));
                }
            }
        });

        function init() {
            const hash = window.location.hash.replace('#', '');
            if (hash && lessonsData.some(l => l.id === hash)) renderLesson(hash);
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else renderHome();
        }
        init();
        console.log('✅ 6 lecciones extensas: 3 de Ciclo III + 3 de Ciclo IV (Números, Geometría, Estadística).');
        console.log('🧮 Matemática: 14 lecciones | 🔬 Ciencia y Tecnología: 15 lecciones | ⚗️ Método Científico: 3 lecciones.');
    </script>
</body>
</html>
