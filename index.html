<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conocimientos Fundamentales - IEP Escuela Hogar Ventanilla</title>
    <style>
        :root {
            --matematica: #2563eb;
            --matematica-light: #dbeafe;
            --matematica-dark: #1e40af;
            --ciencia: #16a34a;
            --ciencia-light: #dcfce7;
            --ciencia-dark: #15803d;
            --metodo: #8b5cf6;
            --metodo-light: #ede9fe;
            --metodo-dark: #6d28d9;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }
        .breadcrumb span {
            cursor: pointer;
            transition: color var(--transition);
        }
        .breadcrumb span:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
        .breadcrumb .sep {
            color: #cbd5e1;
            cursor: default;
        }
        .breadcrumb .current {
            font-weight: 600;
            color: var(--text);
            cursor: default;
        }
        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 80vh;
        }
        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--text);
        }
        .page-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .area-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .area-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 1.5rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .area-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .area-card.matematica {
            border-left: 5px solid var(--matematica);
        }
        .area-card.matematica:hover {
            border-color: var(--matematica);
            background: #fafbff;
        }
        .area-card.ciencia {
            border-left: 5px solid var(--ciencia);
        }
        .area-card.ciencia:hover {
            border-color: var(--ciencia);
            background: #fafdfb;
        }
        .area-card.metodo-highlight {
            border-left: 5px solid var(--metodo);
            background: linear-gradient(135deg, #faf5ff 0%, #ede9fe 100%);
            border: 2px solid var(--metodo);
        }
        .area-card.metodo-highlight:hover {
            border-color: var(--metodo-dark);
            background: linear-gradient(135deg, #f5f0ff 0%, #e0d9fc 100%);
        }
        .area-card .icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        .area-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }
        .area-card .count {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .area-card .featured-badge {
            display: inline-block;
            background: var(--metodo);
            color: #fff;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
        .level-group {
            margin-bottom: 2.5rem;
        }
        .level-group-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .level-badge {
            display: inline-block;
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .level-badge.primaria {
            background: #fef3c7;
            color: #92400e;
        }
        .level-badge.secundaria {
            background: #dbeafe;
            color: #1e40af;
        }
        .ciclo-tag {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.85rem;
        }
        .lesson-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1.25rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .lesson-card:hover {
            border-color: #6366f1;
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .lesson-card.metodo-card {
            border-left: 4px solid var(--metodo);
            background: #fdfbff;
        }
        .lesson-card.metodo-card:hover {
            border-color: var(--metodo);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
        }
        .lesson-card .lesson-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }
        .lesson-card .lesson-meta {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .lesson-card .lesson-preview {
            font-size: 0.8rem;
            color: #94a3b8;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .lesson-card .arrow {
            align-self: flex-end;
            color: #6366f1;
            font-weight: 700;
            transition: transform var(--transition);
        }
        .lesson-card:hover .arrow {
            transform: translateX(4px);
        }
        .metodo-icon-small {
            display: inline-block;
            background: var(--metodo-light);
            color: var(--metodo-dark);
            border-radius: 4px;
            padding: 0.15rem 0.4rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .lesson-detail {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .lesson-header-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        .lesson-header-card.metodo-header {
            border-left: 5px solid var(--metodo);
            background: linear-gradient(135deg, #fff 0%, #fdfbff 100%);
        }
        .lesson-header-card h1 {
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
        }
        .lesson-header-card .meta-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .lesson-header-card .knowledge-tag {
            display: inline-block;
            background: #f1f5f9;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.78rem;
            color: #475569;
            margin-top: 0.4rem;
        }
        .phase-accordion {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .phase-item {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .phase-item.open {
            border-color: #6366f1;
            box-shadow: var(--shadow-md);
        }
        .phase-header {
            padding: 0.85rem 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            user-select: none;
            transition: background var(--transition);
        }
        .phase-header:hover {
            background: #f8fafc;
        }
        .phase-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .phase-0 .phase-number {
            background: #fef3c7;
            color: #92400e;
        }
        .phase-1 .phase-number {
            background: #fce7f3;
            color: #9d174d;
        }
        .phase-2 .phase-number {
            background: #ede9fe;
            color: #5b21b6;
        }
        .phase-3 .phase-number {
            background: #dbeafe;
            color: #1e40af;
        }
        .phase-4 .phase-number {
            background: #dcfce7;
            color: #166534;
        }
        .phase-5 .phase-number {
            background: #ffedd5;
            color: #9a3412;
        }
        .phase-6 .phase-number {
            background: #e0e7ff;
            color: #3730a3;
        }
        .phase-7 .phase-number {
            background: #fce7f3;
            color: #831843;
        }
        .phase-title-text {
            flex: 1;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .phase-subtitle {
            font-weight: 400;
            font-size: 0.73rem;
            color: var(--text-secondary);
            display: block;
        }
        .phase-chevron {
            font-size: 1.1rem;
            color: #94a3b8;
            transition: transform var(--transition);
            flex-shrink: 0;
        }
        .phase-item.open .phase-chevron {
            transform: rotate(180deg);
            color: #6366f1;
        }
        .phase-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            padding: 0 1.1rem;
            border-top: 0px solid transparent;
        }
        .phase-item.open .phase-body {
            max-height: 2000px;
            padding: 0.85rem 1.1rem;
            border-top: 1px solid #e2e8f0;
        }
        .phase-body .editable-area {
            width: 100%;
            min-height: 80px;
            border: 1px dashed #d1d5db;
            border-radius: 6px;
            padding: 0.7rem;
            font-family: inherit;
            font-size: 0.85rem;
            resize: vertical;
            background: #fafafa;
            color: var(--text);
            line-height: 1.5;
        }
        .phase-body .editable-area:focus {
            outline: 2px solid #6366f1;
            border-color: transparent;
            background: #fff;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.9rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            transition: all var(--transition);
            margin-bottom: 1rem;
        }
        .btn-back:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: flex-start;
            }
            .main-container {
                padding: 1rem;
            }
            .area-cards {
                grid-template-columns: 1fr;
            }
            .lesson-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        const leccionExtensaMetodoV = {
            0: `🎯 OBJETIVO GENERAL: Introducir a los estudiantes de 5° y 6° de primaria en la comprensión y aplicación del Método Científico como herramienta sistemática para explorar, investigar y explicar fenómenos del mundo natural, fomentando la curiosidad, el pensamiento crítico y la rigurosidad en la observación y experimentación.\n\n🎯 OBJETIVOS PARTICULARES:\n• Identificar y nombrar correctamente los pasos del método científico: observación, pregunta, hipótesis, experimentación, análisis de resultados y conclusión.\n• Formular preguntas investigables a partir de observaciones cotidianas.\n• Redactar hipótesis claras utilizando el formato "Si... entonces... porque...".\n• Identificar las variables independiente, dependiente y controladas en un experimento sencillo.\n• Diseñar y ejecutar un experimento controlado, registrando datos de forma ordenada en tablas.\n• Analizar resultados experimentales para aceptar, rechazar o modificar la hipótesis inicial.\n• Comunicar los hallazgos de forma oral y escrita utilizando vocabulario científico básico.\n\n📌 NOCIONES PRINCIPALES:\n• Observación cualitativa (usa los sentidos, describe cualidades) y cuantitativa (usa instrumentos de medición, implica números).\n• Pregunta de investigación: debe ser clara, específica y comprobable mediante experimentación.\n• Hipótesis: explicación tentativa y comprobable. Formato "Si (hago esto)... entonces (pasará esto)... porque (razón científica)".\n• Variables: Independiente (la que el experimentador cambia a propósito), Dependiente (la que se mide para ver el efecto), Controladas (las que se mantienen iguales para que la comparación sea justa).\n• Grupo experimental y grupo control.\n• Datos, tablas, gráficos de barras.\n• Conclusión basada en evidencia.\n\n📌 NOCIONES SECUNDARIAS:\n• Diferencia entre inferencia y observación directa.\n• Importancia de la repetibilidad y la reproducibilidad.\n• Errores experimentales comunes y cómo minimizarlos.\n• Ética en la experimentación: no causar daño a seres vivos, honestidad en el registro de datos.\n\n🌍 INTERESES SOCIETALES:\n• El método científico es la base de todos los avances tecnológicos y médicos que mejoran nuestra vida (medicinas, vacunas, aparatos electrónicos, transporte).\n• Gracias a científicos que aplicaron el método, hoy entendemos enfermedades y podemos curarlas.\n• Los niños y niñas que aprenden el método científico desarrollan habilidades para resolver problemas en cualquier ámbito de su vida.\n• La ciencia peruana también aplica el método científico: investigadores estudian nuestra biodiversidad, nuestros recursos naturales y nuestros problemas de salud.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Detectives Científicos: El Misterio del Huevo Flotante"\n\n🧩 MATERIALES POR EQUIPO: 4 vasos transparentes, agua, sal de cocina, cuchara, 4 huevos frescos (de preferencia del mismo tamaño), cinta adhesiva, marcador, regla, hoja de registro.\n\n🎲 ESTACIONES (Rotación en 4 estaciones, 10 min cada una):\n\nESTACIÓN 1: "Observa y pregunta"\nLos estudiantes colocan un huevo en un vaso con agua pura y otro en un vaso con agua muy salada (preparada previamente con 5 cucharadas de sal). Observan atentamente: ¿Qué sucede? El huevo se hunde en agua pura y flota en agua salada. Pregunta guía: "¿Por qué el huevo flota en un vaso y en el otro no?". Animan a formular su propia pregunta de investigación: "¿Cuánta sal se necesita para que el huevo flote?" o "¿Afecta la cantidad de sal a si el huevo flota o se hunde?".\n\nESTACIÓN 2: "Hipotetiza"\nCada equipo escribe su hipótesis usando el formato aprendido: "Si añadimos más sal al agua, entonces el huevo flotará más alto, porque la sal hace que el agua sea más densa y empuje el huevo hacia arriba". Se discuten las hipótesis y se escriben en un cartel visible.\n\nESTACIÓN 3: "Experimenta y mide"\nLos estudiantes rotulan 4 vasos: 0 cucharadas, 2 cucharadas, 4 cucharadas, 6 cucharadas de sal. Llenan cada vaso con la misma cantidad de agua (200 mL medidos con probeta o vaso medidor). Añaden la sal correspondiente, agitan bien para disolver. Colocan cuidadosamente un huevo en cada vaso. Miden con la regla cuánto del huevo sobresale del agua (midiendo desde la superficie del agua hasta la punta más alta visible del huevo, o anotando si está completamente hundido, parcialmente flotante, o flotando totalmente). Registran en tabla.\n\nESTACIÓN 4: "Analiza y concluye"\nCon los datos registrados, los estudiantes dibujan un gráfico de barras simple (eje X: cucharadas de sal; eje Y: altura del huevo sobre el agua). Analizan: ¿Se cumple la hipótesis? ¿A partir de cuánta sal el huevo empieza a flotar? Redactan una conclusión basada en la evidencia.\n\n💬 REFLEXIÓN FINAL: ¿Qué pasos del método científico seguimos? ¿Todos los equipos obtuvieron los mismos resultados? ¿Por qué es importante medir y no solo mirar?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "De los experimentos a las reglas del método"\n\n📊 OBSERVACIÓN GUIADA 1: COMPARANDO EXPERIMENTOS\nSe entregan a los estudiantes fichas con descripciones de 4 experimentos sencillos (realizados por "científicos escolares" ficticios):\n- Experimento A: "Quería saber si las plantas crecen más con agua o con jugo. Regó una planta con agua y otra con jugo. Midió la altura cada semana."\n- Experimento B: "Observó que su gato siempre iba a la cocina cuando escuchaba el abrelatas. Preguntó: ¿reconoce el sonido? Puso el abrelatas en otra habitación y observó si el gato iba a la cocina o a donde sonaba."\n- Experimento C: "Quería saber qué pelota rebota más. Dejó caer una de fútbol y una de tenis desde la misma altura y midió cuánto rebotaban."\n- Experimento D: "Notó que el pan se enmohece más rápido en la cocina que en la refrigeradora. Preguntó: ¿la temperatura afecta el crecimiento de moho? Puso rebanadas de pan en dos bolsas, una en la cocina y otra en el refrigerador, y observó durante 5 días."\n\nLos estudiantes identifican para cada experimento: ¿Cuál fue la observación inicial? ¿Cuál fue la pregunta? ¿Cuál fue la hipótesis? ¿Cuál fue la variable independiente? ¿Y la dependiente? ¿Qué mantuvieron igual (control)? ¿Qué concluyeron?\n\n📊 OBSERVACIÓN GUIADA 2: ¿ES INVESTIGABLE?\nSe presenta una lista de preguntas. Los estudiantes clasifican cada una como "Investigable con experimento" o "No investigable con experimento":\n- ¿El azúcar se disuelve más rápido en agua caliente o fría? (SÍ)\n- ¿Cuál es el mejor sabor de helado? (NO, es subjetivo)\n- ¿Influye la cantidad de luz en el crecimiento de una planta de frijol? (SÍ)\n- ¿Existen los unicornios? (NO, no es comprobable)\n- ¿Los imanes atraen todos los metales? (SÍ)\nDeducen criterios para una buena pregunta científica: debe ser objetiva, comprobable mediante experimentación y medible.\n\n📝 REGISTRO: Mapa mental con los pasos del método científico y ejemplos de cada paso. Esquema de variables con dibujos.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: El Método Científico – Ciclo V\n\n🧪 ¿QUÉ ES EL MÉTODO CIENTÍFICO?\n\nEs un proceso organizado y sistemático que los científicos utilizan para investigar fenómenos, adquirir nuevos conocimientos, responder preguntas y resolver problemas. No es una receta rígida, sino una guía flexible que ayuda a pensar con lógica y evidencia.\n\n📏 LOS PASOS DEL MÉTODO CIENTÍFICO:\n\n1️⃣ OBSERVACIÓN\nEs el punto de partida. Usamos nuestros sentidos (vista, oído, tacto, olfato, gusto) e instrumentos (regla, balanza, termómetro, lupa) para examinar un fenómeno con atención.\n• Observación CUALITATIVA: describe cualidades, usa palabras. Ej: "El agua está turbia", "La planta tiene hojas amarillas".\n• Observación CUANTITATIVA: usa números y mediciones. Ej: "La planta mide 15 cm", "La temperatura del agua es 25°C".\n\n2️⃣ PREGUNTA DE INVESTIGACIÓN\nA partir de la observación surge una duda. La pregunta debe ser:\n• Clara: que se entienda fácilmente.\n• Específica: no demasiado amplia.\n• Comprobable: que se pueda responder con un experimento.\nEj: "¿Cómo afecta la cantidad de sal a la flotación de un huevo?" (Buena) vs. "¿Por qué flotan las cosas?" (Demasiado amplia).\n\n3️⃣ HIPÓTESIS\nEs una explicación tentativa, una posible respuesta a nuestra pregunta. Se escribe en formato "SI... ENTONCES... PORQUE...":\n• SI (hago este cambio en la variable independiente)...\n• ENTONCES (creo que pasará esto con la variable dependiente)...\n• PORQUE (doy una razón científica).\nEj: "SI añadimos más sal al agua, ENTONCES el huevo flotará más alto, PORQUE el agua salada es más densa que el agua pura y ejerce mayor empuje."\n\n4️⃣ EXPERIMENTACIÓN\nEs el momento de poner a prueba la hipótesis. Para que un experimento sea válido, debemos controlar las VARIABLES:\n• VARIABLE INDEPENDIENTE (V.I.): Es la que EL EXPERIMENTADOR CAMBIA a propósito. Es la "causa". En el ejemplo del huevo: la cantidad de sal (0, 2, 4, 6 cucharadas).\n• VARIABLE DEPENDIENTE (V.D.): Es la que SE MIDE para ver el efecto. Es el "efecto". En el ejemplo: la altura a la que flota el huevo.\n• VARIABLES CONTROLADAS (V.C.): Son las que SE MANTIENEN IGUALES para que la comparación sea justa. En el ejemplo: tipo de huevo, cantidad de agua (200 mL), tamaño del vaso, temperatura del agua.\n\nAdemás, es importante tener un GRUPO CONTROL (en nuestro ejemplo, el vaso con 0 cucharadas de sal) para comparar.\n\n5️⃣ ANÁLISIS DE RESULTADOS\nOrganizamos los datos en TABLAS y GRÁFICOS. Buscamos patrones, tendencias. ¿Qué nos dicen los números? ¿Aumenta la altura del huevo cuando aumenta la sal? ¿Hay algún resultado inesperado?\n\n6️⃣ CONCLUSIÓN\nRespondemos a la pregunta inicial basándonos en la EVIDENCIA (los datos).\n• Si los datos apoyan la hipótesis: "La hipótesis fue aceptada. Efectivamente, a mayor cantidad de sal, mayor altura de flotación."\n• Si los datos NO apoyan la hipótesis: "La hipótesis fue rechazada. Los resultados muestran que...". ¡Rechazar una hipótesis no es un fracaso! Es un aprendizaje que nos lleva a formular una nueva hipótesis mejor.\n\n⚠️ ERRORES COMUNES:\n• Creer que la hipótesis es una "adivinanza" sin fundamento. (Debe basarse en conocimientos previos).\n• Cambiar más de una variable a la vez durante el experimento. (Solo se cambia la V.I., las demás se controlan).\n• No medir con precisión o no registrar los datos inmediatamente (confiar en la memoria).\n• Pensar que "probar la hipótesis" significa que siempre debe ser aceptada.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Método Científico para pequeños científicos\n\n📝 BLOQUE 1: Identificando pasos\nLee la siguiente historia y responde:\n"María notó que el pan de la cocina se cubría de puntos verdes (moho) más rápido en verano que en invierno. Se preguntó: ¿La temperatura afecta la velocidad a la que crece el moho en el pan? Ella pensó: si pongo pan en un lugar cálido, entonces saldrá moho más rápido, porque el calor acelera el crecimiento de los hongos. Puso dos rebanadas de pan en bolsas separadas. Una la guardó en la refrigeradora (5°C) y otra la dejó en la cocina (28°C). Después de 7 días, observó y midió la cantidad de moho."\n1. ¿Cuál fue la OBSERVACIÓN de María? (El pan se enmohece más rápido en verano).\n2. ¿Cuál es la PREGUNTA DE INVESTIGACIÓN? (¿La temperatura afecta la velocidad a la que crece el moho?).\n3. Escribe la HIPÓTESIS de María. (Si pongo pan en un lugar cálido, entonces saldrá moho más rápido, porque el calor acelera el crecimiento de los hongos).\n4. ¿Cuál es la VARIABLE INDEPENDIENTE? (La temperatura: refrigeradora vs cocina).\n5. ¿Cuál es la VARIABLE DEPENDIENTE? (La cantidad de moho que crece).\n6. Menciona 3 VARIABLES CONTROLADAS que María debió mantener iguales. (Tipo de pan, tamaño de la rebanada, tipo de bolsa, tiempo de observación, humedad).\n\n📝 BLOQUE 2: Formulando hipótesis\nPara cada pregunta, escribe una hipótesis completa usando "Si... entonces... porque...":\n1. ¿El tipo de líquido (agua, jugo, leche) afecta la altura que alcanza una planta de frijol?\n   (Ej: Si riego las plantas con leche, entonces crecerán menos que con agua, porque la leche contiene sustancias que pueden dificultar la absorción de agua por las raíces).\n2. ¿Influye el color de la luz en la velocidad a la que se derrite un cubo de hielo?\n   (Ej: Si pongo el cubo de hielo bajo luz roja, entonces se derretirá más lento que bajo luz azul, porque los colores oscuros absorben más calor).\n3. ¿Los imanes más grandes atraen más clips metálicos?\n   (Ej: Si uso un imán más grande, entonces atraerá más clips, porque tiene un campo magnético más extenso).\n\n📝 BLOQUE 3: Diseñando un experimento\nDiseña un experimento para responder: "¿La cantidad de azúcar afecta la altura de la espuma que produce la levadura?"\n- Pregunta: (cópiala)\n- Hipótesis: (Si... entonces... porque...)\n- Variable Independiente: (cantidad de azúcar: 0, 1, 2, 3 cucharaditas)\n- Variable Dependiente: (altura de la espuma en cm)\n- 4 Variables Controladas: (cantidad de levadura, temperatura del agua, tipo de recipiente, tiempo de espera)\n- Procedimiento breve (3-5 pasos).\n\n⏱️ Tiempo: 45 min. ✅ Revisión y puesta en común.`,
            5: `🔗 CORRELACIONES INTERNAS: El Método Científico en Matemática y Ciencia\n\n🧮 CON MATEMÁTICA:\n• La medición es fundamental para obtener datos cuantitativos. El uso de reglas, balanzas, probetas y termómetros conecta directamente con la competencia de medición.\n• La organización de datos en tablas y la construcción de gráficos de barras (eje X, eje Y) son habilidades matemáticas aplicadas.\n• El cálculo de promedios, porcentajes y la interpretación de escalas numéricas son herramientas esenciales para analizar resultados experimentales.\n• Los patrones que se descubren en los experimentos (a más X, más Y) son relaciones funcionales básicas.\n\n🔬 CON SERES VIVOS:\n• Los experimentos de germinación, crecimiento de plantas, comportamiento de animales o acción de microorganismos (moho, levaduras) aplican el método científico a la biología.\n\n⚡ CON MATERIA Y ENERGÍA:\n• Las investigaciones sobre disolución, flotación, magnetismo, conductividad eléctrica, cambios de estado y reacciones químicas simples son contextos ideales para practicar el método.\n\n🌍 CON TIERRA Y UNIVERSO:\n• Los experimentos sobre erosión del suelo, filtración de agua, evaporación y ciclos naturales permiten aplicar el diseño experimental a fenómenos geológicos y atmosféricos.\n\n🧩 ACTIVIDAD INTEGRADORA: "Feria de las Preguntas": cada estudiante trae una pregunta investigable de cualquier área (matemática o ciencia) y diseña en una cartulina el esquema de investigación (pregunta, hipótesis, variables, posible experimento).`,
            6: `🌍 CORRELACIONES EXTERNAS: Científicos que cambiaron el mundo y la ciencia en el Perú\n\n👩‍🔬 CIENTÍFICOS QUE USARON EL MÉTODO CIENTÍFICO:\n• MARIE CURIE (1867-1934): Observó que el mineral pechblenda era más radiactivo que el uranio puro. Preguntó: ¿hay otros elementos radiactivos? Experimentó durante años y descubrió el polonio y el radio. Primera persona en ganar dos Premios Nobel.\n• ALEXANDER FLEMING (1881-1955): Observó que un hongo (Penicillium) había contaminado sus cultivos de bacterias y alrededor del hongo las bacterias no crecían. Preguntó: ¿produce el hongo una sustancia que mata bacterias? Experimentó y descubrió la penicilina, el primer antibiótico, que ha salvado millones de vidas.\n• LOUIS PASTEUR (1822-1895): Observó que el vino y la leche se agriaban. Preguntó: ¿son microorganismos los responsables? Mediante experimentos controlados demostró que los microbios causan la descomposición y desarrolló la pasteurización. También creó las primeras vacunas modernas.\n\n🇵🇪 CIENCIA EN EL PERÚ:\n• PEDRO PAULET (1874-1945): Científico peruano que diseñó y construyó el primer motor cohete de combustible líquido. Aplicó el método científico para la astronáutica.\n• MARÍA ROSTWOROWSKI (1915-2016): Aunque historiadora, aplicó rigor investigativo similar al método científico para estudiar las culturas prehispánicas peruanas, formulando hipótesis y contrastándolas con evidencia documental y arqueológica.\n• Hoy, científicos peruanos investigan la biodiversidad amazónica, los fenómenos climáticos como El Niño, nuevos tratamientos para enfermedades tropicales y la conservación de especies en peligro. Todos ellos usan el método científico.\n\n🧠 REFLEXIÓN: "Todos podemos ser científicos. La ciencia no es solo para genios con batas blancas: es una forma de pensar, de preguntar y de buscar respuestas con honestidad y evidencia."`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "I Feria de Jóvenes Científicos – Ciclo V"\n\n🎯 OBJETIVO: Cada equipo de 3-4 estudiantes seleccionará una pregunta de investigación, diseñará y ejecutará un experimento controlado siguiendo todos los pasos del método científico, y lo presentará en una feria científica escolar.\n\n📋 FASES:\n\n1. ELECCIÓN DE TEMA Y PREGUNTA (1 sesión)\n   - Lluvia de ideas: ¿Qué fenómenos de la vida cotidiana nos generan curiosidad?\n   - Ejemplos de preguntas investigables:\n     • "¿Influye el tipo de suelo (arena, tierra de jardín, arcilla) en la velocidad de filtración del agua?"\n     • "¿Los clavos envueltos en diferentes materiales (plástico, tela, papel aluminio) se oxidan a diferente velocidad?"\n     • "¿La temperatura del agua afecta el tiempo que tarda una pastilla efervescente en disolverse?"\n     • "¿Qué tipo de levadura (fresca, seca) produce más espuma en 10 minutos?"\n     • "¿El color de un recipiente afecta la velocidad a la que se enfría el agua caliente?"\n   - Cada equipo elige o formula su propia pregunta con la guía del docente.\n\n2. PLANIFICACIÓN DEL EXPERIMENTO (1 sesión)\n   - Redactan la hipótesis (formato Si... entonces... porque...).\n   - Identifican y escriben: V.I., V.D., V.C. (mínimo 3).\n   - Listan materiales necesarios (todos caseros y seguros).\n   - Diseñan el procedimiento paso a paso con cantidades exactas.\n   - Preparan la tabla de registro de datos (en blanco).\n\n3. EJECUCIÓN DEL EXPERIMENTO (1 sesión en clase o tarea en casa con registro fotográfico)\n   - Realizan el experimento como fue planeado.\n   - Registran cuidadosamente los datos en la tabla.\n   - Toman fotos o hacen dibujos de cada etapa.\n\n4. ANÁLISIS Y PREPARACIÓN DEL PÓSTER (1 sesión)\n   - Construyen un gráfico de barras con sus datos.\n   - Redactan la conclusión (¿Se acepta o rechaza la hipótesis? Basarse en los datos).\n   - Preparan un póster o trifoliado con secciones: Título, Pregunta, Hipótesis, Variables, Materiales, Procedimiento, Resultados (tabla + gráfico), Conclusión.\n\n5. FERIA Y PRESENTACIÓN (1 sesión)\n   - Stands en el aula o patio. Invitan a otros salones.\n   - Cada integrante del equipo explica una parte del proyecto.\n\n6. EVALUACIÓN Y CIERRE (1 sesión)\n   - Rúbrica: Aplicación correcta del método (40%), claridad y organización del póster (25%), comunicación oral (20%), trabajo en equipo (15%).\n   - Reflexión: "Hoy fuimos científicos. ¿Qué descubrimos sobre el mundo? ¿Y sobre nosotros mismos como investigadores?"`
        };

        const leccionExtensaMetodoVI = {
            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 1° y 2° de secundaria una comprensión sólida del Método Científico como proceso sistemático de indagación, enfatizando la formulación rigurosa de hipótesis, la identificación precisa de variables, el diseño experimental controlado, el análisis crítico de resultados y la comunicación científica, con aplicación al estudio de las características de los seres vivos y fenómenos del entorno.\n\n🎯 OBJETIVOS PARTICULARES:\n• Diferenciar claramente entre observación, inferencia y opinión, valorando la objetividad como pilar de la ciencia.\n• Formular preguntas de investigación delimitadas, relevantes y comprobables experimentalmente.\n• Redactar hipótesis fundamentadas utilizando el formato condicional y operacionalizando las variables.\n• Distinguir y operacionalizar los tres tipos de variables (independiente, dependiente, intervinientes/controladas) en experimentos de complejidad intermedia.\n• Diseñar experimentos con grupo control y grupo experimental, asegurando la validez interna mediante el control de variables extrañas.\n• Recoger, organizar, representar gráficamente e interpretar datos cuantitativos, incluyendo el cálculo de promedios y la identificación de tendencias.\n• Redactar conclusiones basadas en evidencia empírica, diferenciando entre resultados (lo que pasó) y conclusiones (lo que significan).\n• Identificar las características fundamentales de los seres vivos (organización celular, metabolismo, homeostasis, crecimiento, reproducción, irritabilidad, adaptación) como contexto de aplicación del método científico.\n\n📌 NOCIONES PRINCIPALES:\n• Método científico como proceso iterativo y no lineal.\n• Observación sistemática vs. casual. Instrumentos de observación y medición.\n• Hipótesis: característica de falsabilidad (debe poder ser puesta a prueba y potencialmente rechazada).\n• Variable independiente (manipulada), dependiente (medida), controladas (mantenidas constantes). Grupo control y grupo experimental.\n• Tamaño de la muestra y número de repeticiones (réplicas) para aumentar la confiabilidad.\n• Tablas de datos, gráficos de barras y de líneas. Promedio aritmético.\n• Conclusión: basada en evidencia. Diferencia entre correlación y causalidad (nivel introductorio).\n• Características de los seres vivos: organización celular, metabolismo, homeostasis, crecimiento, reproducción, irritabilidad, adaptación.\n\n📌 NOCIONES SECUNDARIAS:\n• Sesgo experimental: cómo las expectativas del experimentador pueden influir (efecto placebo, sesgo de confirmación).\n• Importancia de la reproducibilidad: otros científicos deben poder repetir el experimento y obtener resultados similares.\n• Ética científica: consentimiento informado, bienestar animal, honestidad intelectual.\n• Tipos de gráficos según el tipo de variable.\n\n🌍 INTERESES SOCIETALES:\n• El método científico es la herramienta que ha permitido combatir eficazmente las pandemias (desarrollo de vacunas, tratamientos y medidas de prevención basadas en evidencia).\n• La alfabetización científica permite a los ciudadanos tomar decisiones informadas sobre su salud, el ambiente y la tecnología.\n• Los grandes desafíos globales (cambio climático, seguridad alimentaria, energías limpias) requieren del pensamiento científico para ser abordados.\n• La investigación científica en el Perú contribuye al conocimiento de nuestra megadiversidad y a la solución de problemas nacionales.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "¿Está vivo? ¿Cómo lo sabes? — Aplicando el método a lo desconocido"\n\n🧩 MATERIALES POR EQUIPO: 5 frascos o vasos numerados del 1 al 5, semillas de frijol o lenteja, arena, piedras pequeñas, levadura seca, azúcar, agua tibia, globos, botella plástica pequeña, gelatina sin sabor preparada (simula tejido), termómetro, lupa, linterna, regla, cronómetro, tabla de registro.\n\n🎲 DESAFÍO: "Astronautas han traído 5 muestras de un planeta lejano. ¿Cuáles contienen seres vivos? Usen el método científico para averiguarlo."\n\nESTACIÓN 1: "Observa como un científico" (Muestras misteriosas)\n- Muestra 1: Semillas de frijol (parecen inertes, pero están vivas en estado latente).\n- Muestra 2: Arena con piedras pequeñas (inerte).\n- Muestra 3: Levadura seca + azúcar en agua tibia dentro de una botella con globo en la boca (el globo se infla por el CO₂ de la fermentación).\n- Muestra 4: Gelatina preparada (simula un trozo de tejido, pero es inerte).\n- Muestra 5: Una planta pequeña en un vaso con agua (claramente viva).\n\nLos estudiantes observan cada muestra con lupa, tocan (con guantes si se prefiere), anotan características cualitativas y cuantitativas. No saben qué es cada muestra. Anotan todo lo que perciben.\n\nESTACIÓN 2: "Pregunta e hipotetiza"\nPara cada muestra, formulan una pregunta: "¿Contiene esta muestra un ser vivo o material inerte?" Redactan hipótesis: "Si la muestra 1 contiene un ser vivo, entonces al ponerla en agua durante varios días mostrará crecimiento, porque los seres vivos crecen y se desarrollan."\n\nESTACIÓN 3: "Diseña un experimento para detectar vida"\nDiscuten: ¿Qué característica de los seres vivos podemos poner a prueba en el aula?\n- CRECIMIENTO: Colocar las semillas en algodón húmedo y observar durante la semana.\n- METABOLISMO: La levadura produce CO₂ (globo se infla) al consumir azúcar. La arena no produce gas.\n- IRRITABILIDAD: La planta (si es sensitiva como la mimosa) o la respuesta al tacto.\n- REPRODUCCIÓN: Observar si la levadura "crece" en cantidad de espuma.\nCada equipo elige una característica para diseñar su mini-experimento.\n\nESTACIÓN 4: "Ejecuta, mide y concluye"\nRealizan la prueba elegida. Miden: altura de la planta, circunferencia del globo, temperatura (¿genera calor la levadura?), cambios en textura/color. Registran datos. Concluyen para cada muestra: ¿Vivo o inerte? ¿Qué evidencia lo apoya?\n\n💬 REFLEXIÓN: ¿Fue fácil distinguir? ¿Qué característica fue más determinante? ¿Hay algo que no podamos clasificar fácilmente (como los virus, que se mencionan como curiosidad)?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Patrones en la investigación científica"\n\n📊 OBSERVACIÓN GUIADA 1: VARIABLES EN JUEGO\nSe entrega una tabla con los siguientes experimentos ya realizados (datos ficticios pero realistas):\n\nEXPERIMENTO A: "Efecto de la temperatura en la fermentación de levadura" (medida: altura de espuma en cm)\n| Temp (°C) | Espuma (cm) |\n| 10°C | 0.5 cm |\n| 20°C | 2.0 cm |\n| 30°C | 4.5 cm |\n| 40°C | 3.0 cm |\n| 50°C | 0.2 cm |\n\nPreguntas: ¿Cuál es la V.I.? (Temperatura). ¿V.D.? (Altura de espuma). ¿Qué patrón observas? (La espuma aumenta hasta 30°C y luego disminuye). ¿Hay una temperatura óptima? ¿Qué variables debieron controlarse? (Cantidad de levadura, azúcar, agua, tiempo).\n\nEXPERIMENTO B: "Efecto de diferentes colores de luz en el crecimiento de plantas de frijol" (medida: altura en cm a los 14 días)\n| Color de luz | Altura promedio (cm) |\n| Sin luz (oscuridad) | 5.0 cm (planta etiolada, amarilla) |\n| Luz blanca | 15.0 cm |\n| Luz roja | 13.0 cm |\n| Luz azul | 14.5 cm |\n| Luz verde | 7.0 cm |\n\nPreguntas: ¿V.I.? ¿V.D.? ¿Qué color parece menos efectivo? (Verde, las plantas reflejan la luz verde). ¿Es suficiente una sola planta por color? (No, se necesitan réplicas). ¿Cuál es el grupo control? (Luz blanca o sin luz).\n\n📊 OBSERVACIÓN GUIADA 2: CORRELACIÓN VS. CAUSALIDAD (INTRODUCTORIO)\nSe presenta un gráfico que muestra: "A mayor venta de helados, mayor número de ataques de tiburón en la playa". Los estudiantes discuten: ¿Comer helado atrae tiburones? No: la variable oculta es el CALOR (en verano, más gente va a la playa, compra helados y se mete al mar, por lo que hay más encuentros con tiburones). Esto introduce la diferencia entre CORRELACIÓN (dos cosas varían juntas) y CAUSALIDAD (una causa la otra).\n\n📝 REGISTRO: Organizador gráfico con los tipos de variables. Lista de criterios para distinguir una correlación de una relación causal.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: El Método Científico en Secundaria – Ciclo VI\n\n🧪 EL MÉTODO CIENTÍFICO COMO PROCESO\n\nEs una forma sistemática de explorar el mundo natural. No es una secuencia rígida, sino un ciclo que se repite: los resultados de un experimento generan nuevas preguntas. La ciencia es un proceso dinámico y colaborativo.\n\n📏 FASES DEL MÉTODO CIENTÍFICO (Detalladas):\n\n1️⃣ OBSERVACIÓN Y PLANTEAMIENTO DEL PROBLEMA\nLa ciencia comienza con la curiosidad. Una observación puede ser directa (con los sentidos) o indirecta (con instrumentos: microscopio, telescopio, sensores). La observación lleva a una PREGUNTA DE INVESTIGACIÓN. Una buena pregunta es:\n• DELIMITADA: acotada en espacio, tiempo y población.\n• RELEVANTE: su respuesta aporta conocimiento.\n• COMPROBABLE: puede ser respondida mediante la experimentación o la observación sistemática.\nEj: "¿Cómo afecta la concentración de sal (0%, 5%, 10%, 15%) en el agua al tiempo de germinación de semillas de lenteja (Lens culinaris) en condiciones de laboratorio durante 7 días?"\n\n2️⃣ HIPÓTESIS\nEs una respuesta tentativa a la pregunta, basada en conocimientos previos. Debe ser:\n• FALSABLE: Debe poder ser demostrada como falsa si la evidencia no la apoya. Si una hipótesis no puede ser refutada, no es científica.\n• OPERACIONALIZABLE: Las variables deben poder ser medidas o manipuladas.\nEj de hipótesis falsable: "Las semillas expuestas a concentraciones de sal superiores al 10% presentarán un tiempo de germinación significativamente mayor que las expuestas a 0%." (Si los datos muestran que germinan igual, la hipótesis es rechazada).\nEj de hipótesis NO falsable: "Las semillas tienen un espíritu vital que decide cuándo germinar." (No se puede poner a prueba).\n\n3️⃣ DISEÑO EXPERIMENTAL\nEs el plan detallado del experimento. Elementos clave:\n• VARIABLE INDEPENDIENTE (V.I.): La que el investigador manipula deliberadamente en diferentes niveles o tratamientos. En el ejemplo: Concentración de sal (4 niveles: 0%, 5%, 10%, 15%).\n• VARIABLE DEPENDIENTE (V.D.): La que se mide para evaluar el efecto de la V.I. Debe ser medible con instrumentos. En el ejemplo: Tiempo de germinación (días desde la siembra hasta la emergencia visible del brote).\n• VARIABLES CONTROLADAS (V.C.) O INTERVINIENTES: Factores que se mantienen constantes en todos los grupos para evitar que influyan en el resultado. En el ejemplo: tipo de semilla, número de semillas por grupo (mínimo 10 para tener datos confiables), tipo de sustrato (algodón), volumen de solución de riego, temperatura ambiente, horas de luz.\n• GRUPO CONTROL: El tratamiento que no recibe la V.I. o recibe el nivel "cero" de la V.I. Sirve como línea base para comparar. En el ejemplo: el tratamiento con 0% de sal.\n• GRUPOS EXPERIMENTALES: Los que reciben los diferentes niveles de la V.I. (5%, 10%, 15%).\n• RÉPLICAS: Número de veces que se repite cada tratamiento. Mínimo 3, idealmente más. A mayor número de réplicas, mayor confiabilidad estadística.\n\n4️⃣ EJECUCIÓN Y RECOLECCIÓN DE DATOS\nSe realiza el experimento siguiendo el diseño planeado. Los datos se registran inmediatamente en tablas organizadas. Es fundamental la precisión en las mediciones y la honestidad en el registro. No se descartan datos "porque no me gustan".\n\n5️⃣ ANÁLISIS DE DATOS\n• Los datos se organizan en tablas claras con título, unidades y número de réplicas.\n• Se calculan estadísticas descriptivas básicas: promedio (media aritmética) de cada tratamiento.\n• Se representan gráficamente: gráficos de barras (comparar tratamientos), gráficos de líneas (mostrar tendencias en el tiempo). Cada gráfico debe tener título, ejes rotulados con unidades, leyenda si aplica.\n• Se identifican tendencias: ¿Aumenta o disminuye la V.D. al aumentar la V.I.? ¿Hay un valor óptimo?\n\n6️⃣ CONCLUSIÓN\nResponde a la pregunta de investigación basándose exclusivamente en los datos obtenidos. Indica si la hipótesis fue apoyada o rechazada por la evidencia. Explica los resultados utilizando conceptos científicos. Reconoce limitaciones del experimento y sugiere mejoras o nuevas preguntas.\n\n📏 LAS CARACTERÍSTICAS DE LOS SERES VIVOS (Contexto de aplicación)\nPara aplicar el método científico, es útil enfocarnos en un tema: ¿qué define a un ser vivo?\n1. ORGANIZACIÓN CELULAR: Todos los seres vivos están formados por una o más células, la unidad básica de la vida.\n2. METABOLISMO: Realizan reacciones químicas para obtener y usar energía (respiración, fermentación, fotosíntesis).\n3. HOMEOSTASIS: Mantienen condiciones internas estables (temperatura, pH, concentración de agua).\n4. CRECIMIENTO Y DESARROLLO: Aumentan de tamaño y cambian de forma a lo largo de su ciclo de vida.\n5. REPRODUCCIÓN: Generan descendencia (sexual o asexual).\n6. IRRITABILIDAD (RESPUESTA A ESTÍMULOS): Reaccionan a cambios en el ambiente (luz, temperatura, tacto, sonido).\n7. ADAPTACIÓN Y EVOLUCIÓN: Las poblaciones cambian a lo largo de generaciones para adecuarse mejor a su entorno.\n\n⚠️ ERRORES COMUNES:\n• Confundir variable independiente con dependiente. Truco: La V.I. es la que YO cambio; la V.D. es lo que YO mido después.\n• No incluir grupo control, lo que impide saber si el efecto observado se debe realmente a la V.I.\n• Cambiar más de una variable a la vez sin darse cuenta.\n• No hacer suficientes repeticiones y sacar conclusiones precipitadas.\n• Pensar que "el experimento salió mal" si la hipótesis fue rechazada (al contrario: rechazar hipótesis es un resultado válido y valioso).`,
            4: `✏️ TRABAJOS DIRIGIDOS: Afianzando el Método Científico – Ciclo VI\n\n📝 BLOQUE 1: Identificando componentes experimentales\nLee el siguiente resumen experimental:\n"Un grupo de estudiantes quiso investigar si el tipo de música afecta la frecuencia cardíaca. Formularon la hipótesis: si se expone a una persona a música rock de alto volumen, entonces su frecuencia cardíaca aumentará más que con música clásica, porque el rock genera mayor excitación. Seleccionaron 20 voluntarios de 13 años. Midieron su frecuencia cardíaca en reposo durante 1 minuto (línea base). Luego, cada voluntario escuchó 5 minutos de música rock (tratamiento A) y, en otro día a la misma hora, 5 minutos de música clásica (tratamiento B). Midieron la frecuencia cardíaca inmediatamente después de cada audición."\n\nResponde:\n1. Pregunta de investigación: (¿El tipo de música afecta la frecuencia cardíaca en adolescentes de 13 años?)\n2. Hipótesis (formato Si... entonces... porque...): (Si se expone a música rock, entonces la frecuencia cardíaca será mayor que con música clásica, porque el rock genera una respuesta de alerta en el sistema nervioso).\n3. Variable Independiente: (Tipo de música: rock vs. clásica).\n4. Variable Dependiente: (Frecuencia cardíaca en pulsaciones por minuto).\n5. Variables Controladas (mínimo 4): (Mismos voluntarios, mismo tiempo de audición, mismo volumen, misma hora del día, misma posición del cuerpo, mismo instrumento de medición).\n6. ¿Cuál es el grupo control? (La medición en reposo sirve como línea base. También se puede considerar la música clásica como "control" si la hipótesis es que solo el rock aumenta las pulsaciones).\n7. ¿Por qué usaron a los mismos 20 voluntarios para ambos tratamientos y no 10 para cada uno? (Para reducir la variabilidad entre individuos; cada persona es su propio control).\n\n📝 BLOQUE 2: Características de los seres vivos\nClasifica las siguientes observaciones según la característica de los seres vivos que demuestran:\n1. Una bacteria se divide en dos bacterias idénticas. (REPRODUCCIÓN ASEXUAL).\n2. Un girasol gira su flor siguiendo la trayectoria del sol durante el día. (IRRITABILIDAD / RESPUESTA A ESTÍMULOS).\n3. Un colibrí consume néctar equivalente al doble de su peso corporal cada día para mantener su temperatura. (METABOLISMO / HOMEOSTASIS).\n4. Un renacuajo pierde la cola y desarrolla patas para convertirse en rana. (CRECIMIENTO Y DESARROLLO).\n5. Los cactus del desierto han desarrollado espinas en lugar de hojas para reducir la pérdida de agua. (ADAPTACIÓN).\n\n📝 BLOQUE 3: Diseña tu experimento\nPlantea un diseño experimental completo (siguiendo el formato pregunta-hipótesis-variables-materiales-procedimiento) para investigar: "¿El ejercicio físico afecta la capacidad de contener la respiración (apnea voluntaria)?" Incluye grupo control, al menos 2 condiciones experimentales y un mínimo de 5 réplicas.\n\n⏱️ Tiempo: 60 min. ✅ Discusión razonada en plenaria.`,
            5: `🔗 CORRELACIONES INTERNAS: El Método Científico como eje transversal en Ciencia y Tecnología\n\n🧬 CON BIOLOGÍA:\n• Todos los experimentos clásicos de la biología (Redi y la generación espontánea, Pasteur y los microbios, Mendel y la genética, Griffith y la transformación bacteriana) son aplicaciones magistrales del método científico.\n• La clasificación de los seres vivos (taxonomía) se basa en observación sistemática, comparación de características y formulación de hipótesis filogenéticas.\n• El estudio de la célula requirió observación con microscopio, preguntas sobre su función, experimentos para entender la ósmosis, la división celular, etc.\n\n⚗️ CON QUÍMICA:\n• La ley de conservación de la masa de Lavoisier se formuló tras meticulosos experimentos cuantitativos controlando todas las variables.\n• La tabla periódica de Mendeleiev es una hipótesis predictiva: predijo la existencia y propiedades de elementos aún no descubiertos. Cuando aparecieron, la hipótesis fue fuertemente apoyada.\n\n⚡ CON FÍSICA:\n• Galileo refutó la hipótesis aristotélica de que los objetos pesados caen más rápido mediante experimentos controlados (planos inclinados).\n• La ley de Ohm (V = I·R) se obtuvo experimentalmente: variando el voltaje (V.I.) y midiendo la corriente (V.D.) mientras se controlaba la resistencia y la temperatura.\n\n🧩 ACTIVIDAD INTEGRADORA: "Rediseñando experimentos históricos". En equipos, eligen un experimento clásico (Redi, Pasteur, Galileo) y lo explican con el formato moderno: pregunta, hipótesis, V.I., V.D., V.C., grupo control, conclusión. Lo presentan en un póster comparativo.`,
            6: `🌍 CORRELACIONES EXTERNAS: La ciencia que transforma la sociedad\n\n💊 MEDICINA BASADA EN EVIDENCIA:\n• Los ensayos clínicos aleatorizados (ECA) son la máxima expresión del método científico en medicina. Un grupo recibe el fármaco experimental y otro grupo control recibe un placebo (sustancia sin efecto). Ni los pacientes ni los médicos saben quién recibe qué (doble ciego) para evitar sesgos. Así se demostró la eficacia de las vacunas contra la COVID-19 en tiempo récord.\n\n🌱 AGRICULTURA CIENTÍFICA:\n• Los experimentos de fertilización de suelos (diferentes dosis de NPK, V.I.) midiendo el rendimiento del cultivo (V.D.) permiten optimizar la producción de alimentos de manera sostenible. En el Perú, la investigación agrícola ha desarrollado variedades mejoradas de papa, quinua y café adaptadas a diferentes regiones.\n\n🔬 CIENCIA FORENSE:\n• La criminalística aplica el método científico: observación de la escena, formulación de hipótesis sobre lo ocurrido, recolección y análisis de evidencias en el laboratorio (ADN, huellas, balística), y conclusión basada en la evidencia presentada en el juicio.\n\n🌐 CAMBIO CLIMÁTICO:\n• La hipótesis del calentamiento global antropogénico ha sido puesta a prueba durante décadas con datos de temperaturas globales, concentraciones de CO₂, modelos climáticos y múltiples líneas de evidencia independientes (derretimiento de glaciares, aumento del nivel del mar, acidificación oceánica). El consenso científico se basa en la acumulación abrumadora de evidencia.\n\n🧠 REFLEXIÓN: "El método científico no es propiedad exclusiva de los científicos: es una herramienta de pensamiento crítico que todo ciudadano puede usar para evaluar afirmaciones, detectar pseudociencias y tomar decisiones informadas en su vida diaria."`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Congreso Científico Juvenil – Ciclo VI"\n\n🎯 OBJETIVO: Cada equipo de 3-4 estudiantes diseñará, ejecutará y presentará un proyecto de investigación completo aplicando rigurosamente el método científico, relacionado con las características de los seres vivos o fenómenos biológicos, químicos o físicos de su entorno.\n\n📋 FASES:\n\n1. ELECCIÓN DEL TEMA Y FORMULACIÓN DEL PROYECTO (1 sesión)\n   - Áreas sugeridas:\n     • BIOLOGÍA: Efecto de diferentes tipos de agua (destilada, de caño, con vinagre, con bicarbonato) en la germinación.\n     • BIOLOGÍA: ¿La presencia de luz afecta la dirección del crecimiento de las plantas? (Fototropismo).\n     • QUÍMICA: ¿La temperatura del solvente afecta la cantidad de sal que puede disolverse?\n     • FÍSICA: ¿La longitud del péndulo afecta su período de oscilación?\n     • FÍSICA: ¿El ángulo de inclinación de un plano afecta la velocidad de un carrito?\n   - Cada equipo entrega una ficha de proyecto con: Título, Pregunta de investigación, Hipótesis formal (Si... entonces... porque...), Identificación de V.I. (con niveles), V.D. (cómo se medirá), V.C. (mínimo 5), Materiales, Procedimiento detallado, Diseño de tabla de vaciado de datos.\n\n2. EJECUCIÓN DEL EXPERIMENTO (2 sesiones o tarea supervisada)\n   - Realizan el experimento siguiendo su diseño.\n   - Registran datos en tablas. Toman fotos o videos como evidencia.\n   - Si es necesario, repiten el experimento para verificar consistencia.\n\n3. ANÁLISIS DE DATOS Y PREPARACIÓN DEL INFORME (1 sesión)\n   - Calculan promedios. Construyen gráficos (barras o líneas según corresponda).\n   - Redactan la sección de Resultados (solo descripción objetiva de lo observado y medido, sin interpretar).\n   - Redactan la Conclusión (interpretación: ¿se apoya o rechaza la hipótesis? ¿Por qué? ¿Qué limitaciones tuvo el experimento? ¿Qué nuevas preguntas surgen?).\n   - Preparan una presentación en PowerPoint o póster científico con las secciones canónicas: Introducción, Hipótesis, Métodos, Resultados, Conclusión.\n\n4. CONGRESO CIENTÍFICO (1 sesión)\n   - Simulación de un congreso real: cada equipo tiene 5 minutos para exponer y 3 minutos para preguntas del "comité evaluador" (docente y compañeros).\n   - Se valora la rigurosidad metodológica, la claridad expositiva y la capacidad de defender el trabajo ante preguntas.\n\n5. EVALUACIÓN (1 sesión)\n   - Rúbrica: Rigor del diseño experimental (30%), Calidad del análisis de datos (20%), Solidez de las conclusiones (20%), Comunicación oral y visual (20%), Trabajo colaborativo (10%).\n   - Reflexión final: "Hemos aplicado el mismo método que usan los científicos profesionales para generar conocimiento. La ciencia está a nuestro alcance."`
