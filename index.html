<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conocimientos Fundamentales - IEP Escuela Hogar Ventanilla</title>
    <style>
        :root {
            --matematica: #2563eb;
            --matematica-light: #dbeafe;
            --matematica-dark: #1e40af;
            --ciencia: #16a34a;
            --ciencia-light: #dcfce7;
            --ciencia-dark: #15803d;
            --metodo: #8b5cf6;
            --metodo-light: #ede9fe;
            --metodo-dark: #6d28d9;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }
        .breadcrumb span {
            cursor: pointer;
            transition: color var(--transition);
        }
        .breadcrumb span:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
        .breadcrumb .sep {
            color: #cbd5e1;
            cursor: default;
        }
        .breadcrumb .current {
            font-weight: 600;
            color: var(--text);
            cursor: default;
        }
        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 80vh;
        }
        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--text);
        }
        .page-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .area-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .area-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 1.5rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .area-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .area-card.matematica {
            border-left: 5px solid var(--matematica);
        }
        .area-card.matematica:hover {
            border-color: var(--matematica);
            background: #fafbff;
        }
        .area-card.ciencia {
            border-left: 5px solid var(--ciencia);
        }
        .area-card.ciencia:hover {
            border-color: var(--ciencia);
            background: #fafdfb;
        }
        .area-card.metodo-highlight {
            border-left: 5px solid var(--metodo);
            background: linear-gradient(135deg, #faf5ff 0%, #ede9fe 100%);
            border: 2px solid var(--metodo);
        }
        .area-card.metodo-highlight:hover {
            border-color: var(--metodo-dark);
            background: linear-gradient(135deg, #f5f0ff 0%, #e0d9fc 100%);
        }
        .area-card .icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        .area-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }
        .area-card .count {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .area-card .featured-badge {
            display: inline-block;
            background: var(--metodo);
            color: #fff;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
        .level-group {
            margin-bottom: 2.5rem;
        }
        .level-group-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .level-badge {
            display: inline-block;
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .level-badge.primaria {
            background: #fef3c7;
            color: #92400e;
        }
        .level-badge.secundaria {
            background: #dbeafe;
            color: #1e40af;
        }
        .ciclo-tag {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.85rem;
        }
        .lesson-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1.25rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .lesson-card:hover {
            border-color: #6366f1;
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .lesson-card.metodo-card {
            border-left: 4px solid var(--metodo);
            background: #fdfbff;
        }
        .lesson-card.metodo-card:hover {
            border-color: var(--metodo);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
        }
        .lesson-card .lesson-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }
        .lesson-card .lesson-meta {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .lesson-card .lesson-preview {
            font-size: 0.8rem;
            color: #94a3b8;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .lesson-card .arrow {
            align-self: flex-end;
            color: #6366f1;
            font-weight: 700;
            transition: transform var(--transition);
        }
        .lesson-card:hover .arrow {
            transform: translateX(4px);
        }
        .metodo-icon-small {
            display: inline-block;
            background: var(--metodo-light);
            color: var(--metodo-dark);
            border-radius: 4px;
            padding: 0.15rem 0.4rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .lesson-detail {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .lesson-header-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        .lesson-header-card.metodo-header {
            border-left: 5px solid var(--metodo);
            background: linear-gradient(135deg, #fff 0%, #fdfbff 100%);
        }
        .lesson-header-card h1 {
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
        }
        .lesson-header-card .meta-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .lesson-header-card .knowledge-tag {
            display: inline-block;
            background: #f1f5f9;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.78rem;
            color: #475569;
            margin-top: 0.4rem;
        }
        .phase-accordion {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .phase-item {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .phase-item.open {
            border-color: #6366f1;
            box-shadow: var(--shadow-md);
        }
        .phase-header {
            padding: 0.85rem 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            user-select: none;
            transition: background var(--transition);
        }
        .phase-header:hover {
            background: #f8fafc;
        }
        .phase-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .phase-0 .phase-number {
            background: #fef3c7;
            color: #92400e;
        }
        .phase-1 .phase-number {
            background: #fce7f3;
            color: #9d174d;
        }
        .phase-2 .phase-number {
            background: #ede9fe;
            color: #5b21b6;
        }
        .phase-3 .phase-number {
            background: #dbeafe;
            color: #1e40af;
        }
        .phase-4 .phase-number {
            background: #dcfce7;
            color: #166534;
        }
        .phase-5 .phase-number {
            background: #ffedd5;
            color: #9a3412;
        }
        .phase-6 .phase-number {
            background: #e0e7ff;
            color: #3730a3;
        }
        .phase-7 .phase-number {
            background: #fce7f3;
            color: #831843;
        }
        .phase-title-text {
            flex: 1;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .phase-subtitle {
            font-weight: 400;
            font-size: 0.73rem;
            color: var(--text-secondary);
            display: block;
        }
        .phase-chevron {
            font-size: 1.1rem;
            color: #94a3b8;
            transition: transform var(--transition);
            flex-shrink: 0;
        }
        .phase-item.open .phase-chevron {
            transform: rotate(180deg);
            color: #6366f1;
        }
        .phase-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            padding: 0 1.1rem;
            border-top: 0px solid transparent;
        }
        .phase-item.open .phase-body {
            max-height: 2000px;
            padding: 0.85rem 1.1rem;
            border-top: 1px solid #e2e8f0;
        }
        .phase-body .editable-area {
            width: 100%;
            min-height: 80px;
            border: 1px dashed #d1d5db;
            border-radius: 6px;
            padding: 0.7rem;
            font-family: inherit;
            font-size: 0.85rem;
            resize: vertical;
            background: #fafafa;
            color: var(--text);
            line-height: 1.5;
        }
        .phase-body .editable-area:focus {
            outline: 2px solid #6366f1;
            border-color: transparent;
            background: #fff;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.9rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            transition: all var(--transition);
            margin-bottom: 1rem;
        }
        .btn-back:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: flex-start;
            }
            .main-container {
                padding: 1rem;
            }
            .area-cards {
                grid-template-columns: 1fr;
            }
            .lesson-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        const leccionExtensaQuimVII = {
          0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 3° a 5° de secundaria las competencias científicas para comprender y aplicar los principios de la estequiometría, la química orgánica (hidrocarburos y compuestos oxigenados), las soluciones, el equilibrio químico y la electroquímica, integrando el razonamiento cuantitativo, la experimentación y la contextualización de la química en la industria y la vida cotidiana.\n\n🎯 OBJETIVOS PARTICULARES:\n• Realizar cálculos estequiométricos (mol-mol, masa-masa, volumen-volumen) usando la ecuación química balanceada, determinando reactivo limitante y en exceso, pureza de reactivos y rendimiento porcentual de una reacción.\n• Diferenciar y nombrar hidrocarburos alifáticos (alcanos, alquenos, alquinos) y aromáticos (benceno y derivados), utilizando la nomenclatura IUPAC.\n• Identificar los principales grupos funcionales oxigenados: alcoholes, aldehídos, cetonas, ácidos carboxílicos, éteres y ésteres, reconociendo sus propiedades y aplicaciones.\n• Preparar soluciones de concentración conocida (% m/m, % v/v, % m/v, molaridad M, molalidad m, fracción molar X) y realizar diluciones.\n• Explicar el equilibrio químico dinámico, escribir la expresión de la constante de equilibrio (Kc) y aplicar el principio de Le Chatelier para predecir desplazamientos.\n• Describir el funcionamiento de una celda galvánica (pila), calcular el potencial estándar de celda (E°) y relacionarlo con la espontaneidad de una reacción redox.\n• Explicar el proceso de electrólisis y su aplicación en la obtención y refinación de metales.\n\n📌 NOCIONES PRINCIPALES:\n• Masa molar, número de Avogadro, volumen molar en CNPT (22.4 L/mol).\n• Reactivo limitante, rendimiento teórico, real y porcentual.\n• Hidrocarburos: alcanos, alquenos, alquinos, aromáticos.\n• Grupos funcionales oxigenados: alcohol, aldehído, cetona, ácido carboxílico, éter, éster.\n• Soluciones: soluto, solvente, unidades de concentración, dilución (C₁V₁ = C₂V₂).\n• Equilibrio químico: Kc, principio de Le Chatelier.\n• Electroquímica: oxidación, reducción, agente oxidante, agente reductor, celda galvánica, electrólisis, potencial estándar de reducción.\n\n📌 NOCIONES SECUNDARIAS:\n• Estequiometría con gases (ecuación de estado PV=nRT).\n• Isomería estructural y geométrica en compuestos orgánicos.\n• Propiedades coligativas de las soluciones (nociones).\n• Relación entre energía libre de Gibbs y potencial de celda (ΔG° = -nFE°).\n\n🌍 INTERESES SOCIETALES:\n• La estequiometría es clave en la industria para optimizar recursos y minimizar desechos.\n• La química orgánica explica la composición de plásticos, combustibles, medicamentos y alimentos.\n• Las soluciones están en bebidas, sueros fisiológicos, fertilizantes líquidos y productos de limpieza.\n• La electroquímica permite obtener aluminio y cobre electrolítico de alta pureza, y es la base de baterías y celdas de combustible que mueven el mundo moderno.`,
          1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Química en todas partes: del laboratorio a la industria"\n\n🧩 MATERIALES: Balanza, probetas, vasos de precipitado, mechero o cocinilla, clavo de hierro, solución de sulfato de cobre (CuSO₄), láminas de zinc y cobre, limones o papas, multímetro (voltímetro), cables con pinzas caimán, sal (NaCl), agua, azúcar, alcohol, aceite, botellas plásticas, globos, pastillas efervescentes, modelos moleculares o plastilina y palillos, indicador de pH, jugo de repollo morado.\n\n🎲 ESTACIONES:\n\nESTACIÓN 1: "El reactivo que se acaba primero (limitante)": En frascos con vinagre (ácido acético), agregan diferentes masas de bicarbonato de sodio (NaHCO₃). Miden la altura de la espuma o inflan globos con el CO₂ producido. Comparan: más bicarbonato no siempre produce más gas si el vinagre se agota. Deducen intuitivamente el concepto de reactivo limitante.\n\nESTACIÓN 2: "Fábrica de olores (ésteres)": En tubos de ensayo, mezclan un ácido carboxílico (vinagre) con un alcohol (etanol) y una gota de ácido sulfúrico concentrado (máxima precaución, solo manipulado por el docente o con campana). Calientan suavemente al baño maría y huelen con cuidado: se forman ésteres de olor frutal (acetato de etilo, olor a manzana). Discuten la reacción de esterificación.\n\nESTACIÓN 3: "Pila de limón o papa": Insertan una lámina de zinc y una de cobre en un limón. Conectan los electrodos a un voltímetro y miden el voltaje (~0.9 V). Con varios limones en serie, encienden un LED. Discuten: ¿De dónde sale la electricidad? Reacción redox: Zn se oxida, Cu²⁺ (del medio ácido) se reduce.\n\nESTACIÓN 4: "Electrólisis del agua con sal": En un vaso con agua y sal, colocan dos puntas de cables conectados a una batería de 9V. Observan burbujas en ambos electrodos: H₂ en el cátodo (-) y Cl₂/O₂ en el ánodo (+). Discuten la descomposición eléctrica de la materia.\n\n💬 REFLEXIÓN: ¿Cómo predicen los químicos las cantidades exactas? ¿Por qué el limón genera electricidad? ¿Qué son los olores y sabores desde la química?`,
          2: `🧠 ACTIVIDAD INDUCTIVA: "Patrones cuantitativos y cualitativos"\n\n📊 OBSERVACIÓN GUIADA 1: ESTEQUIOMETRÍA CON DATOS REALES\nSe entrega una tabla con masas de reactivos y productos de una reacción sencilla (ej: 2Mg + O₂ → 2MgO) donde falta un dato. Los estudiantes calculan la masa de MgO producida a partir de diferentes masas de Mg, usando proporciones. Deductivamente formulan la regla: los coeficientes estequiométricos indican las proporciones en moles.\n\n📊 OBSERVACIÓN GUIADA 2: CLASIFICANDO COMPUESTOS ORGÁNICOS\nSe entregan tarjetas con fórmulas semidesarrolladas y los nombres de alcanos, alquenos, alquinos, alcoholes, aldehídos, cetonas, ácidos, éteres y ésteres. Los estudiantes los agrupan según: tipo de enlace (simple, doble, triple) y grupo funcional (OH, CHO, CO, COOH, O, COO). Deducen los sufijos característicos (-ano, -eno, -ino, -ol, -al, -ona, -oico, -ato).\n\n📊 OBSERVACIÓN GUIADA 3: DESPLAZAMIENTO DEL EQUILIBRIO\nEn un vaso con agua y almidón, agregan gotas de yodo (color azul intenso). Luego agregan tiosulfato de sodio: el color desaparece (el equilibrio se desplaza). Discuten: ¿Qué pasa si agrego más yodo? ¿Más tiosulfato? Principio de Le Chatelier en acción.\n\n📝 REGISTRO: Mapas conceptuales de grupos funcionales, tablas de cálculos estequiométricos, esquemas de pila.`,
          3: `📐 TRANSMISIÓN CONCEPTUAL: Química de secundaria – Ciclo VII\n\n⚖️ 1. ESTEQUIOMETRÍA\n\nLa estequiometría estudia las relaciones cuantitativas entre reactivos y productos en una reacción química. Se basa en la ley de conservación de la masa y en las proporciones fijas.\n\n📏 CONCEPTOS CLAVE:\n• MOL (n): cantidad de sustancia. 1 mol = 6.022×10²³ entidades (N_A).\n• MASA MOLAR (M): masa de 1 mol de sustancia (g/mol). Coincide numéricamente con la masa atómica o molecular.\n• VOLUMEN MOLAR NORMAL (CNPT, 0°C y 1 atm): 1 mol de cualquier gas ideal ocupa 22.4 L.\n\n📏 PASOS PARA RESOLVER PROBLEMAS ESTEQUIOMÉTRICOS:\n1. Escribir y balancear la ecuación química.\n2. Convertir las cantidades dadas a MOLES (n = masa / M).\n3. Usar la relación molar de la ecuación (coeficientes) para encontrar los moles de la sustancia deseada.\n4. Convertir los moles hallados a la unidad requerida (masa, volumen, número de partículas).\n\n📏 REACTIVO LIMITANTE (RL): Es el reactivo que se consume completamente primero y determina la cantidad máxima de producto (rendimiento teórico). El otro reactivo está en EXCESO.\n\n📏 PUREZA: Si un reactivo no es 100% puro, la masa real del reactivo activo es: m_activa = m_muestra × (%pureza/100).\n\n📏 RENDIMIENTO PORCENTUAL: %Rend = (rendimiento real / rendimiento teórico) × 100.\n\n🧪 2. QUÍMICA ORGÁNICA\n\nLa química orgánica estudia los compuestos del carbono (excepto CO, CO₂, carbonatos y cianuros, que son inorgánicos). El carbono forma 4 enlaces covalentes y puede concatenarse formando cadenas y anillos.\n\n📏 HIDROCARBUROS:\n- ALCANOS (CₙH₂ₙ₊₂): Enlaces simples. Sufijo -ano. Ej: metano CH₄, etano C₂H₆. Son combustibles (gas natural, gasolina).\n- ALQUENOS (CₙH₂ₙ): Al menos un doble enlace C=C. Sufijo -eno. Ej: eteno (etileno) C₂H₄, materia prima para plásticos.\n- ALQUINOS (CₙH₂ₙ₋₂): Al menos un triple enlace C≡C. Sufijo -ino. Ej: etino (acetileno) C₂H₂, usado en soldadura.\n- AROMÁTICOS: Anillo bencénico (C₆H₆) y derivados. Nomenclatura: orto, meta, para para disustituidos.\n\n📏 GRUPOS FUNCIONALES OXIGENADOS:\n- ALCOHOLES (R-OH): Grupo hidroxilo. Sufijo -ol. Ej: etanol C₂H₅OH (bebidas, antiséptico).\n- ALDEHÍDOS (R-CHO): Grupo carbonilo terminal. Sufijo -al. Ej: metanal (formaldehído) HCHO (conservante).\n- CETONAS (R-CO-R'): Grupo carbonilo no terminal. Sufijo -ona. Ej: propanona (acetona) CH₃COCH₃ (disolvente).\n- ÁCIDOS CARBOXÍLICOS (R-COOH): Grupo carboxilo. Sufijo -oico. Ej: ácido etanoico (acético) CH₃COOH (vinagre).\n- ÉTERES (R-O-R'): Oxígeno entre dos carbonos. Sufijo -éter (o nomenclatura como alcoxi). Ej: éter etílico C₂H₅OC₂H₅ (anestésico antiguo).\n- ÉSTERES (R-COO-R'): Derivados de ácido y alcohol. Sufijo -ato de alquilo. Ej: acetato de etilo, olores frutales.\n\n📏 ISOMERÍA: Compuestos con igual fórmula molecular pero diferente estructura. Estructural (cadena, posición, función) y estereoisomería (cis/trans).\n\n🧪 3. SOLUCIONES\n\nUna solución es una mezcla homogénea de soluto (menor proporción) y solvente (mayor proporción).\n\n📏 UNIDADES DE CONCENTRACIÓN:\n- % masa/masa: (masa soluto / masa solución) × 100.\n- % volumen/volumen: (volumen soluto / volumen solución) × 100.\n- % masa/volumen: (masa soluto (g) / volumen solución (mL)) × 100.\n- MOLARIDAD (M): moles de soluto / litros de solución. M = n/V(L).\n- MOLALIDAD (m): moles de soluto / kilogramos de solvente.\n- FRACCIÓN MOLAR (X): moles de soluto / moles totales.\n\n📏 DILUCIÓN: Proceso de disminuir la concentración agregando solvente. C₁V₁ = C₂V₂ (M₁V₁ = M₂V₂).\n\n⚖️ 4. EQUILIBRIO QUÍMICO\n\nEs el estado en que las velocidades de la reacción directa e inversa son iguales. Las concentraciones de reactivos y productos permanecen constantes (no necesariamente iguales).\n\n📏 CONSTANTE DE EQUILIBRIO (Kc): Para aA + bB ⇌ cC + dD, Kc = ([C]^c [D]^d) / ([A]^a [B]^b).\n- Kc >> 1: favorece productos.\n- Kc << 1: favorece reactivos.\n\n📏 PRINCIPIO DE LE CHATELIER: Si un sistema en equilibrio es perturbado (cambio de concentración, presión, temperatura), se desplaza para contrarrestar la perturbación.\n- ↑ [reactivo] → desplazamiento hacia productos.\n- ↑ T en reacción endotérmica → desplazamiento hacia productos.\n- ↑ P (↓ V) en gases → desplaza hacia el lado con menos moles gaseosos.\n\n⚡ 5. ELECTROQUÍMICA\n\nEstudia la interconversión de energía química y eléctrica mediante reacciones redox (transferencia de electrones).\n\n📏 CONCEPTOS REDOX:\n- OXIDACIÓN: Pérdida de electrones (aumenta el número de oxidación).\n- REDUCCIÓN: Ganancia de electrones (disminuye el número de oxidación).\n- AGENTE OXIDANTE: Se reduce (gana electrones).\n- AGENTE REDUCTOR: Se oxida (pierde electrones).\n\n📏 CELDAS GALVÁNICAS (PILAS):\nReacción redox espontánea genera corriente eléctrica. Dos semiceldas (ánodo: oxidación; cátodo: reducción) conectadas por un puente salino. El potencial estándar de celda: E°_celda = E°_cátodo - E°_ánodo (usando tabla de potenciales de reducción). Si E° > 0, la reacción es espontánea.\n\n📏 ELECTRÓLISIS:\nLa energía eléctrica fuerza una reacción química no espontánea. Se utiliza para descomponer compuestos (agua, NaCl fundido) y para refinar metales (cobre, aluminio). Leyes de Faraday relacionan la carga eléctrica con la cantidad de sustancia depositada.\n\n⚠️ ERRORES COMUNES:\n• No balancear antes de hacer cálculos estequiométricos.\n• Confundir molaridad con molalidad.\n• Olvidar que los coeficientes estequiométricos indican moles, no gramos directamente.\n• En Le Chatelier, pensar que los catalizadores desplazan el equilibrio (solo aceleran su llegada).\n• Invertir los signos de E° al calcular el potencial de celda.`,
          4: `✏️ TRABAJOS DIRIGIDOS: Química Ciclo VII\n\n📝 BLOQUE 1: Estequiometría\n1. La combustión del propano: C₃H₈ + 5O₂ → 3CO₂ + 4H₂O. Calcula:\n   a) Moles de CO₂ producidos al quemar 2 moles de C₃H₈. (6 moles)\n   b) Masa de O₂ necesaria para quemar 44 g de C₃H₈ (M=44 g/mol). (160 g O₂)\n\n2. Se mezclan 10 g de H₂ con 100 g de O₂ para producir agua: 2H₂ + O₂ → 2H₂O.\n   a) ¿Cuál es el reactivo limitante? (H₂, rinde 90 g H₂O; O₂ sobra)\n   b) ¿Qué masa de agua se produce? (90 g)\n\n3. Se hizo reaccionar 100 g de CaCO₃ del 85% de pureza con HCl. CaCO₃ + 2HCl → CaCl₂ + CO₂ + H₂O. Halla el volumen de CO₂ en CNPT. (85 g CaCO₃ puro → 0.85 mol → 0.85 mol CO₂ → 19.04 L)\n\n📝 BLOQUE 2: Química orgánica\n4. Nombra: CH₃-CH₂-CH₂-CH₃ (butano); CH₂=CH-CH₃ (propeno); CH₃-CH₂-OH (etanol); CH₃-COOH (ácido etanoico o acético); CH₃-CO-CH₃ (propanona o acetona).\n5. Escribe la fórmula de: 2-metilpentano, etino, metanal, acetato de metilo.\n6. ¿Qué grupo funcional tiene un olor frutal característico? (Éster).\n\n📝 BLOQUE 3: Soluciones\n7. Calcula la molaridad de una solución con 40 g de NaOH (M=40 g/mol) en 500 mL. (M = 1 mol / 0.5 L = 2 M).\n8. ¿Cuántos mL de HCl 12 M se necesitan para preparar 250 mL de HCl 0.5 M? (V₁ = (0.5×250)/12 = 10.4 mL).\n\n📝 BLOQUE 4: Equilibrio químico\n9. Escribe la expresión de Kc para: N₂(g) + 3H₂(g) ⇌ 2NH₃(g). (Kc = [NH₃]² / ([N₂][H₂]³)).\n10. Predice el desplazamiento si: a) Se añade más N₂ (→ productos). b) Se aumenta la presión (→ productos, 4 mol → 2 mol). c) Se eleva la T (reacción exotérmica, ← reactivos).\n\n📝 BLOQUE 5: Electroquímica\n11. Dados E°(Zn²⁺/Zn) = -0.76 V y E°(Cu²⁺/Cu) = +0.34 V. Calcula E° de la pila Zn/Zn²⁺ || Cu²⁺/Cu. (E° = 0.34 - (-0.76) = 1.10 V, espontánea).\n12. En la electrólisis del NaCl fundido, ¿qué se produce en el ánodo y en el cátodo? (Ánodo: Cl₂ gas; Cátodo: Na metálico).\n\n⏱️ Tiempo: 90 min. ✅ Revisión con discusión razonada.`,
          5: `🔗 CORRELACIONES INTERNAS: Química con Física y Biología\n\n⚡ CON FÍSICA:\n• La electroquímica conecta directamente con circuitos eléctricos y leyes de Ohm.\n• La termodinámica (ΔG, ΔH, ΔS) explica la espontaneidad de reacciones redox.\n• La ley de gases ideales (PV=nRT) se usa en cálculos estequiométricos con gases.\n\n🧬 CON BIOLOGÍA:\n• La química orgánica es la base de la bioquímica: los grupos funcionales están en carbohidratos, proteínas, lípidos y ácidos nucleicos.\n• El equilibrio químico es clave en sistemas buffer de la sangre (H₂CO₃/HCO₃⁻).\n• La electroquímica se aplica en la transmisión del impulso nervioso (bomba Na⁺/K⁺) y en la fotosíntesis (cadena transportadora de electrones).\n\n🧩 ACTIVIDAD INTEGRADORA: "Cálculos energéticos y de materiales para una pila casera". Diseñan una pila con materiales cotidianos, miden su voltaje y calculan la energía teórica usando ΔG° = -nFE°.`,
          6: `🌍 CORRELACIONES EXTERNAS: La química avanzada en la industria peruana y global\n\n⛏️ MINERÍA Y METALURGIA:\n• La electro-obtención del cobre (99.99% pureza) usa principios de electrólisis. Perú es el segundo productor mundial de cobre.\n• La refinación de oro y plata por electrodeposición es una aplicación directa de la electroquímica.\n\n🏭 INDUSTRIA PETROQUÍMICA:\n• Los hidrocarburos son la base de plásticos (polietileno, PVC), fibras sintéticas y combustibles. Comprender su química ayuda a desarrollar alternativas más limpias.\n• El gas natural peruano (metano) es una fuente de energía y materia prima para la industria.\n\n💊 SALUD Y ALIMENTOS:\n• La esterificación produce aromatizantes y saborizantes artificiales. Los ésteres dan olor a frutas.\n• Las soluciones fisiológicas (NaCl 0.9% m/v) y el suero glucosado (C₆H₁₂O₆ 5% m/v) salvan vidas y requieren preparación precisa.\n• El equilibrio ácido-base mantiene el pH sanguíneo. El principio de Le Chatelier explica cómo el cuerpo responde a cambios.\n\n🔋 ENERGÍA Y AMBIENTE:\n• Las baterías de iones de litio, celdas de combustible de hidrógeno y paneles solares dependen de la electroquímica.\n• La electrocoagulación se usa para tratamiento de aguas residuales.`,
          7: `👥 MÓDULO DE PROYECTO GRUPAL: "Feria 'Química en Acción – Ciclo VII'"\n\n🎯 OBJETIVO: Cada equipo elige un tema del curso, diseña un experimento o demostración, y elabora una explicación rigurosa integrando estequiometría, grupos funcionales, equilibrio o electroquímica.\n\n📋 FASES:\n1. ELECCIÓN DE TEMA Y PLANIFICACIÓN (1 sesión)\n   - Equipo A: "Reactivo limitante en acción": competencia para obtener la mayor cantidad de CO₂ a partir de vinagre y bicarbonato, calculando el combinación óptima.\n   - Equipo B: "Síntesis de un éster frutal": producción de acetato de isoamilo (olor a plátano) y explicación de la reacción.\n   - Equipo C: "Pila de frutas y vegetales": comparan voltaje de pilas de limón, papa, naranja. Miden con multímetro y conectan LED.\n   - Equipo D: "Electrólisis y galvanoplastia": bañan una moneda con cobre usando electrólisis de CuSO₄.\n   - Equipo E: "Equilibrio en colores": demuestran desplazamiento de equilibrio con iones complejos de cobalto o con indicadores ácido-base.\n\n2. INVESTIGACIÓN Y PREPARACIÓN (1-2 sesiones)\n   - Cálculos estequiométricos previos, diseño del cartel, práctica del experimento.\n\n3. FERIA Y PRESENTACIÓN (1 sesión)\n   - Stands interactivos. Invitan a otros salones.\n\n4. EVALUACIÓN Y CIERRE (1 sesión)\n   - Rúbrica: precisión conceptual y cálculo (40%), manejo experimental y seguridad (25%), comunicación científica (25%), colaboración (10%).\n   - Reflexión: "La química no es magia, es ciencia que transforma el mundo."`

        const leccionExtensaBioVII = {
          0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 3° a 5° de secundaria las competencias para comprender los procesos moleculares de la vida (biología molecular), la diversidad microbiana (microbiología), los mecanismos de defensa del organismo (inmunología), la anatomía y fisiología humana avanzada, la evolución como teoría unificadora y las aplicaciones de la biotecnología, promoviendo el pensamiento crítico, la indagación científica y la bioética.\n\n🎯 OBJETIVOS PARTICULARES:\n• Explicar la estructura del ADN, el proceso de replicación semiconservativa, la transcripción (síntesis de ARNm) y la traducción (síntesis de proteínas), incluyendo el código genético y el rol del ribosoma.\n• Describir las características de virus, bacterias, hongos y protistas, diferenciando su estructura, reproducción y roles ecológicos y patogénicos.\n• Explicar los mecanismos de la respuesta inmune innata (barreras, inflamación, fagocitosis) y adaptativa (linfocitos B y T, anticuerpos, memoria inmunológica, vacunas).\n• Analizar la anatomía y fisiología del sistema nervioso central y periférico, el arco reflejo, la transmisión sináptica y el sistema endocrino (glándulas, hormonas, mecanismos de regulación y homeostasis).\n• Sustentar la teoría de la evolución por selección natural con evidencias (registro fósil, anatomía comparada, embriología, biología molecular) y explicar mecanismos de especiación.\n• Comprender los fundamentos de la biotecnología moderna: tecnología del ADN recombinante, enzimas de restricción, vectores, PCR, CRISPR-Cas9, organismos genéticamente modificados (OGM), y reflexionar sobre sus implicancias éticas y sociales.\n\n📌 NOCIONES PRINCIPALES:\n• Estructura del ADN (doble hélice, A-T, C-G), replicación, transcripción, traducción, código genético.\n• Mutaciones génicas y cromosómicas.\n• Microbiología: virus (estructura, ciclo lítico/lisogénico), bacterias (estructura procariota, conjugación), hongos y protistas.\n• Inmunidad innata y adaptativa: macrófagos, linfocitos B/T, anticuerpos (IgG, IgM, etc.), vacunas, sueros.\n• Sistema nervioso: neurona, potencial de acción, sinapsis química, neurotransmisores (acetilcolina, dopamina, serotonina). Sistema endocrino: hipotálamo, hipófisis, tiroides, páncreas, suprarrenales, gónadas.\n• Evolución: selección natural, adaptación, especiación alopátrica y simpátrica.\n• Biotecnología: ADN recombinante, PCR, CRISPR, OGM, clonación.\n\n📌 NOCIONES SECUNDARIAS:\n• Epigenética.\n• Microbiota normal y su importancia.\n• Alergias e inmunodeficiencias (VIH/SIDA).\n• Filogenia molecular y árboles de la vida.\n• Bioética en biotecnología.\n\n🌍 INTERESES SOCIETALES:\n• La biología molecular explica enfermedades genéticas y permite el diagnóstico precoz y terapias génicas.\n• La microbiología ayuda a combatir enfermedades infecciosas, pero también a aprovechar microorganismos en la industria alimentaria y ambiental.\n• La inmunología salva millones de vidas con vacunas y tratamientos como anticuerpos monoclonales.\n• La evolución explica la biodiversidad peruana y la resistencia a antibióticos.\n• La biotecnología peruana desarrolla cultivos mejorados y aprovecha nuestra megadiversidad.`,
          1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Explorando lo invisible y lo asombroso"\n\n🧩 MATERIALES: Microscopios, láminas de bacterias (yogur, sarro dental), hongos (pan mohoso), protozoos (agua estancada), tinción de Gram (cristal violeta, safranina), modelos 3D de ADN (o construcción con plastilina y palillos), kits de extracción de ADN (detergente, sal, alcohol frío, frutilla/plátano), cronómetros, martillo de reflejos, linterna, tabla de Snellen (vista), diapasones, material de disección (corazón, ojo de res), placas de Petri con agar, hisopos, termómetro, pesas, balanza.\n\n🎲 ESTACIONES:\n\nESTACIÓN 1: "Extrayendo el libro de la vida": Trituran frutillas con detergente y sal, filtran y agregan alcohol frío. Observan el ADN precipitado como un filamento blanquecino. Discuten: ¿Dónde está y qué contiene?\n\nESTACIÓN 2: "El mundo microbiano": Preparan frotis de yogur (Lactobacillus) y sarro dental, tiñen con Gram y observan al microscopio. Dibujan y comparan bacterias Gram+ (moradas) y Gram- (rosadas). Observan hongos (moho del pan) y protozoos de agua estancada.\n\nESTACIÓN 3: "Simulación de la respuesta inmune": Juego de roles: unos estudiantes son patógenos (intentan tocar), otros son macrófagos (los atrapan), linfocitos B (lanzan pelotas-anticuerpos) y T (destruyen células infectadas). Dramatizan la memoria inmunológica.\n\nESTACIÓN 4: "Reflejos y sentidos": Evalúan reflejo rotuliano (martillo en rodilla), reflejo pupilar (luz) y tiempo de reacción (caída de regla). Discuten la diferencia entre acto reflejo (médula) y voluntario (cerebro).\n\n💬 REFLEXIÓN: ¿Cómo la información del ADN se convierte en proteínas? ¿Por qué no nos enfermamos siempre que entramos en contacto con gérmenes?`,
          2: `🧠 ACTIVIDAD INDUCTIVA: "De los datos a los grandes principios"\n\n📊 OBSERVACIÓN GUIADA 1: EL CÓDIGO GENÉTICO\nSe entrega una secuencia de ADN: TAC-GGA-CTA-CGA-TAA. Los estudiantes la transcriben a ARNm (AUG-CCU-GAU-GCU-AUU) y, usando una tabla del código genético, traducen a aminoácidos (Met-Pro-Asp-Ala-Ile). Deductivamente, reconocen que el código es universal y degenerado.\n\n📊 OBSERVACIÓN GUIADA 2: PATRONES EVOLUTIVOS\nSe muestran imágenes de extremidades anteriores de humano, murciélago, ballena, caballo. Los estudiantes identifican estructuras homólogas (mismo origen, distinta función). Se presentan secuencias de ADN similares entre chimpancé y humano (>98% idénticas). Deducción: antepasado común.\n\n📊 OBSERVACIÓN GUIADA 3: BIOTECNOLOGÍA EN IMÁGENES\nSe muestran fotos del antes y después de cultivos transgénicos (maíz Bt vs maíz convencional), insulina producida por bacterias recombinantes, ratones modificados con CRISPR. Los estudiantes discuten similitudes y diferencias con la selección artificial tradicional.\n\n📝 REGISTRO: Tablas de código genético, dibujos de estructuras homólogas, mapa mental de biotecnología.`,
          3: `📐 TRANSMISIÓN CONCEPTUAL: Biología de secundaria – Ciclo VII\n\n🧬 1. BIOLOGÍA MOLECULAR\n\n📏 EL ADN (Ácido Desoxirribonucleico):\nDoble hélice formada por nucleótidos (fosfato + desoxirribosa + base nitrogenada: Adenina-Timina, Citosina-Guanina). La información genética está en la secuencia de bases.\n\n📏 REPLICACIÓN (Duplicación del ADN):\nOcurre en la fase S del ciclo celular. Es semiconservativa (cada nueva molécula tiene una hebra original y una nueva). Enzimas principales: helicasa (abre la doble hélice), ADN polimerasa (sintetiza la nueva hebra).\n\n📏 TRANSCRIPCIÓN (Síntesis de ARN mensajero - ARNm):\nEn el núcleo, el ADN se transcribe a ARNm complementario (Uracilo en lugar de Timina). La ARN polimerasa copia la hebra molde de ADN.\n\n📏 TRADUCCIÓN (Síntesis de proteínas):\nEn los ribosomas (citoplasma/RER). El ARNm es leído en tripletes (codones). El ARNt (transferencia) lleva los aminoácidos correspondientes. El ribosoma cataliza la unión de aminoácidos formando una cadena polipeptídica. El código genético es universal, degenerado (varios codones para un mismo aminoácido) y no ambiguo.\n\n📏 MUTACIONES: Cambios en la secuencia de ADN. Génicas: sustitución, inserción, deleción. Cromosómicas: alteran la estructura o número (aneuploidías). Fuente de variabilidad y enfermedades.\n\n🦠 2. MICROBIOLOGÍA\n\n📏 VIRUS:\nNo son células. Compuestos por material genético (ADN o ARN) y cápside proteica. Parásitos intracelulares obligados. Ciclo lítico (destruye la célula) y lisogénico (integra su ADN al genoma huésped). Ej: VIH, influenza, COVID-19 (SARS-CoV-2), bacteriófagos.\n\n📏 BACTERIAS:\nProcariotas, unicelulares. Pared celular de peptidoglicano. Clasificación: forma (cocos, bacilos, espirilos), tinción de Gram (Gram+ pared gruesa, Gram- pared delgada con membrana externa). Reproducción asexual por fisión binaria. Pueden intercambiar ADN por conjugación, transformación, transducción. Importancia: descomposición, industria alimentaria (yogur, queso), patógenas (tuberculosis, cólera). Resistencia antibiótica: mecanismos de selección natural.\n\n📏 HONGOS:\nEucariotas, unicelulares (levaduras) o pluricelulares (mohos, setas). Pared de quitina. Nutrición heterótrofa por absorción. Importancia: descomponedores, alimentos (pan, cerveza), antibióticos (penicilina de Penicillium), patógenos (pie de atleta).\n\n📏 PROTISTAS:\nEucariotas unicelulares o coloniales. Protozoos (animales, móviles, ej: paramecio, ameba, plasmodio de la malaria) y algas unicelulares (autótrofas, fitoplancton).\n\n🛡️ 3. INMUNOLOGÍA\n\n📏 INMUNIDAD INNATA (inespecífica):\nBarreras físicas (piel, mucosas), químicas (lisozima, pH ácido) y celulares (macrófagos, neutrófilos, células NK). Respuesta inflamatoria.\n\n📏 INMUNIDAD ADAPTATIVA (específica):\n• Humoral: Linfocitos B → se diferencian en células plasmáticas → producen anticuerpos (inmunoglobulinas: IgM, IgG, IgA, IgE, IgD). Los anticuerpos neutralizan toxinas, opsonizan patógenos y activan complemento.\n• Celular: Linfocitos T citotóxicos (CD8+) destruyen células infectadas; Linfocitos T colaboradores (CD4+) activan a B y T citotóxicos.\n• Memoria inmunológica: tras la primera exposición, quedan linfocitos de memoria que responden más rápido y fuerte (base de las vacunas).\n\n📏 VACUNAS: Antígenos atenuados o fragmentos que estimulan la inmunidad adaptativa sin causar enfermedad (ej: polio, sarampión, COVID-19 ARNm). SUEROS: anticuerpos preformados (pasivos).\n\n📏 TRASTORNOS: Alergias (hipersensibilidad), inmunodeficiencias (SIDA por VIH).\n\n🧠 4. ANATOMÍA Y FISIOLOGÍA HUMANA AVANZADA\n\n📏 SISTEMA NERVIOSO:\n• Central (SNC): encéfalo (cerebro, cerebelo, tronco encefálico) y médula espinal.\n• Periférico (SNP): nervios y ganglios.\n• Neurona: cuerpo, dendritas, axón. Vaina de mielina (acelera la conducción).\n• Potencial de acción: despolarización (entrada Na⁺), repolarización (salida K⁺).\n• Sinapsis química: liberación de neurotransmisores (ej: dopamina, serotonina, acetilcolina, noradrenalina) al espacio sináptico.\n• Arco reflejo: respuesta involuntaria que no pasa por el cerebro (solo médula).\n\n📏 SISTEMA ENDOCRINO:\nGlándulas endocrinas secretan hormonas al torrente sanguíneo. Hipotálamo (control maestro) → hipófisis (TSH, ACTH, GH, etc.) → tiroides (T3/T4, metabolismo), páncreas (insulina/glucagón, glucosa en sangre), suprarrenales (adrenalina, cortisol), gónadas (testosterona, estrógenos). Homeostasis: mecanismo de retroalimentación negativa (ej: control de glucosa).\n\n🌿 5. EVOLUCIÓN\n\n📏 TEORÍA DE LA SELECCIÓN NATURAL (Darwin-Wallace):\nVariabilidad en la población + lucha por la existencia + supervivencia del más apto + reproducción diferencial = cambio en las frecuencias alélicas a lo largo del tiempo.\n\n📏 EVIDENCIAS:\n• Fósiles (transición, ej: Archaeopteryx).\n• Anatomía comparada (homólogas vs análogas).\n• Embriología (similitud en fases tempranas).\n• Biología molecular (ADN y proteínas similares en especies emparentadas).\n\n📏 ESPECIACIÓN: Proceso de formación de nuevas especies. Alopátrica (barrera geográfica) y simpátrica (sin barrera, por poliploidía o cambio de nicho).\n\n🧪 6. BIOTECNOLOGÍA\n\n📏 INGENIERÍA GENÉTICA:\nManipulación directa del ADN. Enzimas de restricción (cortan), ligasas (pegan), vectores (plásmidos, virus) transportan genes a células huésped. Ej: insulina humana producida por bacterias transgénicas.\n\n📏 PCR (Reacción en Cadena de la Polimerasa): Amplifica fragmentos de ADN. Usado en diagnóstico y forense.\n\n📏 CRISPR-Cas9: Herramienta de edición genética precisa. Potencial para curar enfermedades genéticas.\n\n📏 OGM (Organismos Genéticamente Modificados): Plantas resistentes a plagas (maíz Bt), arroz dorado (vitamina A). Debate: beneficios vs riesgos ecológicos y económicos.\n\n⚠️ ERRORES COMUNES:\n• Pensar que la evolución es un proceso dirigido a la perfección (no, actúa sobre variaciones existentes; no hay objetivo final).\n• Confundir virus con bacterias.\n• Creer que toda bacteria es dañina.\n• Asumir que la inmunidad natural es siempre mejor que la vacunación.\n• Pensar que el ser humano "no es un animal" (somos primates).`,
          4: `✏️ TRABAJOS DIRIGIDOS: Biología Ciclo VII\n\n📝 BLOQUE 1: Biología Molecular\n1. Dada la secuencia de ADN: ATG-CGT-ACA-TGA. Transcríbela a ARNm: (UAC-GCA-UGU-ACU). ¿Cuántos codones tiene? (4). Traduce a aminoácidos usando la tabla del código genético.\n2. ¿Qué pasaría si la timina (T) del primer codón ATG mutara a C (ACG)? (Cambia el aminoácido Met → Thr, mutación de sentido erróneo).\n\n📝 BLOQUE 2: Microbiología\n3. Relaciona: Lactobacillus (bacteria beneficiosa, yogur), Penicillium (hongo, antibiótico), VIH (virus, SIDA), Plasmodium (protozoo, malaria).\n4. ¿Por qué los antibióticos no funcionan contra los virus? (Bloquean procesos bacterianos como síntesis de pared celular; los virus usan la maquinaria de la célula huésped).\n\n📝 BLOQUE 3: Inmunología\n5. Diferencia entre inmunidad activa natural (enfermedad) y activa artificial (vacuna). Ambas generan memoria.\n6. ¿Qué células son atacadas por el VIH? (Linfocitos T CD4+). ¿Qué consecuencia tiene su disminución? (Inmunodeficiencia, infecciones oportunistas).\n\n📝 BLOQUE 4: Anatomía y Fisiología\n7. Explica el arco reflejo de retirada ante un pinchazo (neurona sensitiva → médula → interneurona → neurona motora → músculo).\n8. ¿Qué hormona reduce la glucosa en sangre? (Insulina, producida por las células beta del páncreas). ¿Y la que la aumenta? (Glucagón, células alfa).\n\n📝 BLOQUE 5: Evolución y Biotecnología\n9. ¿Por qué la resistencia bacteriana a antibióticos es un ejemplo de selección natural? (Variación preexistente, presión selectiva del antibiótico, supervivencia y reproducción de resistentes).\n10. Explica una aplicación de CRISPR-Cas9. (Edición de genes defectuosos). ¿Qué es un OGM? (Organismo al que se le ha insertado ADN de otra especie).\n\n⏱️ Tiempo: 90 min. ✅ Discusión en plenaria y puesta en común.`,
          5: `🔗 CORRELACIONES INTERNAS: Biología con Química, Física y Matemática\n\n🧪 CON QUÍMICA:\n• La estructura del ADN y las proteínas son conceptos de química orgánica y bioquímica.\n• La electroforesis separa fragmentos de ADN usando campos eléctricos (principios físicos y químicos).\n• El pH, la concentración de sales (soluciones) afectan la actividad enzimática en biología molecular.\n\n⚡ CON FÍSICA:\n• El potencial de acción de las neuronas es un fenómeno eléctrico (iones Na⁺/K⁺ a través de canales).\n• La centrifugación y la espectrofotometría son técnicas físicas aplicadas en biología molecular.\n• La presión osmótica es fundamental en microbiología (pared celular bacteriana).\n\n🧮 CON MATEMÁTICA:\n• Las frecuencias alélicas en genética de poblaciones (ecuación de Hardy-Weinberg).\n• Cálculo de tasas de mutación, crecimiento bacteriano (exponencial).\n• Estadística en ensayos biotecnológicos.\n\n🧩 ACTIVIDAD INTEGRADORA: "Modelo 3D del ADN y simulación de transcripción/traducción usando piezas móviles".`,
          6: `🌍 CORRELACIONES EXTERNAS: Biología avanzada en la sociedad peruana y global\n\n🏥 SALUD PÚBLICA:\n• La vacunación es la intervención que más vidas ha salvado tras el agua potable. La inmunología es la base.\n• El diagnóstico molecular (PCR) fue clave en la pandemia de COVID-19 y lo es para tuberculosis, dengue y otras enfermedades prevalentes en Perú.\n• La resistencia bacteriana es una amenaza global; entender la evolución es clave para combatirla.\n\n🌱 AGRICULTURA Y BIODIVERSIDAD:\n• Perú es centro de origen de papa, maíz, quinua. La biotecnología puede ayudar a conservar y mejorar variedades nativas sin perder biodiversidad.\n• El uso de biofertilizantes y microorganismos benéficos (rizobios, micorrizas) reduce la dependencia de agroquímicos.\n\n🧬 BIOTECNOLOGÍA PERUANA:\n• Investigadores peruanos usan biotecnología para mejorar cultivos y crear biofármacos.\n• La clonación y edición genética plantean desafíos éticos que requieren debate informado.\n\n🧠 NEUROCIENCIAS:\n• Comprender el sistema nervioso ayuda a abordar problemas de salud mental (depresión, ansiedad) y neurológicos.\n• Las drogas y adicciones actúan sobre los neurotransmisores (dopamina). La educación en neurociencia es prevención.\n\n🦠 PANDEMIAS Y SALUD GLOBAL:\n• La vigilancia genómica (secuenciación del virus) permite rastrear variantes. Perú ha participado activamente.\n\n🧠 REFLEXIÓN FINAL: "Desde las moléculas hasta los ecosistemas, la biología del siglo XXI nos da herramientas para entender y mejorar la vida. La ciencia sin ética es ciega; la ética sin ciencia es vacía."`,
          7: `👥 MÓDULO DE PROYECTO GRUPAL: "Bio-Cumbre Juvenil: Ciencia del siglo XXI"\n\n🎯 OBJETIVO: Los equipos investigarán un tema de vanguardia del curso, prepararán una presentación interactiva y la expondrán en una feria que simule una "cumbre científica".\n\n📋 FASES:\n1. ELECCIÓN DE TEMA (1 sesión)\n   - Equipo A: "Modelo de transcripción y traducción" (maqueta interactiva).\n   - Equipo B: "Museo de microbios" (cultivos bacterianos en agar, tinción de Gram, explicación de patógenos y benéficos).\n   - Equipo C: "Defensores del cuerpo" (juego de rol o video explicando la respuesta inmune y las vacunas).\n   - Equipo D: "Evolución en acción" (exposición con fósiles, estructuras homólogas, árboles filogenéticos).\n   - Equipo E: "Bio-debate: transgénicos y CRISPR" (investigación y debate con argumentos científicos y éticos).\n\n2. INVESTIGACIÓN Y PREPARACIÓN (1-2 sesiones)\n   - Búsqueda bibliográfica, diseño de materiales, ensayos.\n\n3. BIO-CUMBRE (1 sesión)\n   - Stands y ponencias cortas.\n\n4. EVALUACIÓN (1 sesión)\n   - Rúbrica: solidez científica (40%), creatividad y claridad (30%), trabajo en equipo (20%), reflexión ética (10%).\n   - Cierre: "La biología es la aventura de conocernos a nosotros mismos y al mundo vivo."`

        const leccionExtensaFisVII = {
          0: `🎯 OBJETIVO GENERAL: Dotar a los estudiantes de 3° a 5° de secundaria de los fundamentos de la estática, hidrostática, electromagnetismo, ondas, óptica y relatividad básica, desarrollando la capacidad de modelar fenómenos físicos con matemáticas, realizar experimentos y conectar la física con la tecnología moderna y el universo a gran escala.\n\n🎯 OBJETIVOS PARTICULARES:\n• Calcular torques y aplicar las condiciones de equilibrio estático (ΣF=0, Στ=0) para resolver problemas de cuerpos rígidos.\n• Aplicar el principio de Pascal y Arquímedes para explicar el funcionamiento de prensas hidráulicas y la flotación.\n• Calcular fuerzas eléctricas (ley de Coulomb) y campos eléctricos. Resolver circuitos de corriente continua (ley de Ohm) y circuitos mixtos.\n• Describir el campo magnético generado por una corriente (ley de Ampère) y la fuerza de Lorentz sobre cargas en movimiento. Explicar el principio de inducción electromagnética (ley de Faraday).\n• Clasificar ondas mecánicas y electromagnéticas, calcular frecuencia, longitud de onda y velocidad. Explicar fenómenos de interferencia y resonancia. Aplicar la ecuación del sonido.\n• Aplicar las leyes de la reflexión y refracción (ley de Snell). Construir diagramas de rayos para lentes y espejos, calcular aumento y posición de imágenes.\n• Enunciar los postulados de la relatividad especial y comprender fenómenos como la dilatación del tiempo, la contracción de la longitud y la equivalencia masa-energía (E=mc²).\n\n📌 NOCIONES PRINCIPALES:\n• Estática: torque, centro de masa, equilibrio, palancas.\n• Hidrostática: presión, densidad, principio de Pascal, principio de Arquímedes.\n• Electrostática: carga, ley de Coulomb, campo eléctrico, diferencia de potencial.\n• Circuitos: corriente, resistencia, ley de Ohm, potencia, reglas de Kirchhoff.\n• Magnetismo: campo magnético, fuerza de Lorentz, ley de Faraday-Lenz.\n• Ondas: velocidad, frecuencia, longitud de onda, reflexión, refracción, interferencia, efecto Doppler.\n• Óptica: ley de Snell, reflexión total interna, lentes, ecuación del fabricante de lentes, microscopio.\n• Relatividad: postulados de Einstein, dilatación temporal, E=mc².\n\n📌 NOCIONES SECUNDARIAS:\n• Centro de gravedad y estabilidad.\n• Tensión superficial y capilaridad.\n• Puente de Wheatstone, galvanómetro.\n• Ondas estacionarias, armónicos.\n• Difracción y polarización.\n• Transformaciones de Lorentz.\n\n🌍 INTERESES SOCIETALES:\n• La estática explica el diseño de puentes, edificios y grúas.\n• La hidrostática está en las represas, sistemas de frenos y flotación de barcos.\n• El electromagnetismo es la base de la generación, transmisión y uso de la energía eléctrica, motores y telecomunicaciones.\n• Las ondas y la óptica permiten la fibra óptica (internet), los lentes (corrección visual, telescopios) y el ultrasonido médico.\n• La relatividad corrige el GPS y explica la energía nuclear.`,
          1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Física del siglo XXI: de la palanca al universo"\n\n🧩 MATERIALES: Dinamómetros, soportes, reglas de 1 m, pesas, jeringas conectadas (prensa hidráulica casera), botellas con agua, globos, clips, plastilina, canicas, pilas, cables, bombillas, resistencias, brújulas, alambre de cobre esmaltado, imanes, vasos con agua, láser, lentes, espejos, prismas, resortes, cuerdas, cronómetros.\n\n🎲 ESTACIONES:\n\nESTACIÓN 1: "Equilibrio y palancas": Equilibran una regla con un punto de apoyo central (subibaja) y colocan pesas a distancias variables hasta equilibrar. Miden y verifican que F₁·d₁ = F₂·d₂. Discuten tipos de palancas (1°, 2°, 3° género).\n\nESTACIÓN 2: "Prensa hidráulica con jeringas": Conectan dos jeringas de diferente diámetro con una manguera flexible y agua. Empujan el émbolo pequeño y observan que levantan un peso grande en la jeringa grande (Principio de Pascal). Miden el factor de multiplicación de fuerza.\n\nESTACIÓN 3: "Electroimán casero": Enrollan alambre de cobre esmaltado alrededor de un clavo, conectan los extremos a una pila. El clavo atrae clips (electroimán). Desconectan y los clips caen. Invierten la polaridad y la brújula indica cambio de polo. Discuten la relación electricidad-magnetismo (Oersted).\n\nESTACIÓN 4: "La fibra óptica con botella": Hacen un agujero en una botella plástica con agua, por donde sale un chorro. Iluminan con un láser desde el lado opuesto. El haz de luz "se dobla" y sigue el chorro de agua (reflexión total interna). Discuten la fibra óptica.\n\n💬 REFLEXIÓN: ¿Por qué un objeto pequeño puede levantar uno grande? ¿Cómo se genera la electricidad que usamos? ¿Cómo viaja la luz por un cable de vidrio?`,
          2: `🧠 ACTIVIDAD INDUCTIVA: "De la observación a la ecuación"\n\n📊 OBSERVACIÓN GUIADA 1: LEY DE COULOMB CUALITATIVA\nFrotan globos con el cabello y miden la distancia a la que se repelen. Varían la cantidad de frotación (carga). Observan que a mayor carga, mayor repulsión; a mayor distancia, menor. Deductivamente: F ∝ q₁q₂ / r².\n\n📊 OBSERVACIÓN GUIADA 2: INDUCCIÓN ELECTROMAGNÉTICA\nConectan un LED a una bobina de muchas vueltas. Introducen y sacan rápidamente un imán de la bobina. El LED parpadea. Varían la velocidad del imán y el número de vueltas. Concluyen: el voltaje inducido depende de la velocidad de cambio del flujo magnético.\n\n📊 OBSERVACIÓN GUIADA 3: FORMACIÓN DE IMÁGENES\nUsan una lente convergente (lupa) para proyectar la imagen de una vela encendida sobre una pantalla. Miden la distancia del objeto y la imagen, y calculan la distancia focal aproximada con 1/f = 1/do + 1/di. Observan cuándo la imagen es real/invertida o virtual/derecha.\n\n📝 REGISTRO: Tablas de mediciones, gráficas de F vs 1/r², esquemas de circuitos y rayos de luz.`,
          3: `📐 TRANSMISIÓN CONCEPTUAL: Física avanzada – Ciclo VII\n\n⚖️ 1. ESTÁTICA DE CUERPOS RÍGIDOS\n\nEstudia las condiciones para que un cuerpo extenso permanezca en reposo.\n\n📏 EQUILIBRIO TRASLACIONAL: ΣF_x = 0, ΣF_y = 0.\n📏 EQUILIBRIO ROTACIONAL: Στ = 0. Torque (τ) = F·d·senθ, donde d es el brazo de palanca. Tiende a producir giro. Centro de masa (CM): punto donde se concentra toda la masa para efectos de traslación.\n\n📏 PALANCAS: Barra rígida que gira sobre un punto de apoyo. Tipos: 1° género (punto de apoyo entre fuerza y resistencia, ej: tijeras), 2° género (resistencia entre apoyo y fuerza, ej: carretilla), 3° género (fuerza entre apoyo y resistencia, ej: caña de pescar).\n\n💧 2. HIDROSTÁTICA\n\n📏 PRESIÓN (P): P = F/A (N/m² o Pascal). En un fluido a profundidad h: P = ρ·g·h + P_atm.\n\n📏 PRINCIPIO DE PASCAL: La presión aplicada a un fluido confinado se transmite íntegramente a todo el fluido. Prensa hidráulica: F₁/A₁ = F₂/A₂.\n\n📏 PRINCIPIO DE ARQUÍMEDES: Todo cuerpo sumergido en un fluido experimenta un empuje (E) igual al peso del volumen desalojado. E = ρ_fluido·V_sumergido·g. Flota si E ≥ Peso.\n\n⚡ 3. ELECTROMAGNETISMO\n\n📏 CARGA ELÉCTRICA (q): Propiedad fundamental. Unidad: Coulomb (C). Carga del electrón: -1.6×10⁻¹⁹ C.\n\n📏 LEY DE COULOMB: F = k |q₁ q₂| / r² (en el vacío, k ≈ 9×10⁹ N·m²/C²). Fuerza atractiva si cargas opuestas, repulsiva si iguales.\n\n📏 CAMPO ELÉCTRICO (E): E = F / q. Vector. Líneas de campo salen de + y entran a -.\n\n📏 CORRIENTE ELÉCTRICA (I): Flujo de cargas. I = Q/t, Amperio (A). VOLTAJE (V): trabajo por unidad de carga, Voltio (V).\n\n📏 LEY DE OHM: V = I·R. Resistencia (R) en Ohmios (Ω). Potencia eléctrica: P = V·I = I²R = V²/R.\n\n📏 CIRCUITOS: Serie (I igual, V se reparte, R_eq = ΣR); Paralelo (V igual, I se reparte, 1/R_eq = Σ1/R). Reglas de Kirchhoff: ΣI nodo = 0; ΣV malla = 0.\n\n📏 MAGNETISMO: Imanes, campo magnético B (Tesla). Una carga q moviéndose con velocidad v en un campo B experimenta una fuerza de Lorentz: F = q(v × B). Un conductor con corriente en B siente fuerza.\n\n📏 INDUCCIÓN ELECTROMAGNÉTICA (Faraday): Un flujo magnético variable a través de una bobina induce una fuerza electromotriz (fem). Ley de Lenz: la corriente inducida se opone al cambio que la generó. El transformador y el generador eléctrico se basan en este principio.\n\n〰️ 4. ONDAS\n\n📏 ONDA: Perturbación que transporta energía sin transportar materia. Mecánicas (necesitan medio, ej: sonido) y electromagnéticas (no necesitan medio, ej: luz).\n📏 PARÁMETROS: Velocidad (v), frecuencia (f, Hz), periodo (T = 1/f), longitud de onda (λ). v = λ·f.\n📏 FENÓMENOS: Reflexión, refracción, difracción, interferencia (constructiva/destructiva). Efecto Doppler: cambio en f por movimiento relativo fuente-observador.\n📏 SONIDO: Onda longitudinal mecánica. v ≈ 343 m/s en aire. Intensidad en decibeles (dB).\n\n🔭 5. ÓPTICA GEOMÉTRICA\n\n📏 REFLEXIÓN: θ_i = θ_r. Espejos planos y curvos (cóncavos/convexos).\n📏 REFRACCIÓN: Ley de Snell: n₁·senθ₁ = n₂·senθ₂. Índice de refracción n = c/v. Reflexión total interna cuando θ > θ_c (crítico).\n📏 LENTES DELGADAS: Convergentes (convexas, positivas) y divergentes (cóncavas, negativas). Ecuación: 1/f = 1/do + 1/di. Aumento: M = -di/do = hi/ho.\n📏 INSTRUMENTOS ÓPTICOS: Lupa, microscopio compuesto, telescopio.\n\n⚛️ 6. RELATIVIDAD ESPECIAL (BÁSICA)\n\n📏 POSTULADOS DE EINSTEIN (1905):\n1. Las leyes de la física son las mismas en todos los sistemas de referencia inerciales.\n2. La velocidad de la luz en el vacío (c ≈ 300,000 km/s) es la misma para todos los observadores inerciales, independientemente del movimiento de la fuente.\n\n📏 CONSECUENCIAS:\n• Dilatación del tiempo: Δt' = γ·Δt₀, donde γ = 1/√(1 - v²/c²). Un reloj en movimiento "atrasa" respecto al observador en reposo.\n• Contracción de la longitud.\n• Equivalencia masa-energía: E = mc². Pequeñas cantidades de masa equivalen a enormes cantidades de energía (base de la energía nuclear).\n\n⚠️ ERRORES COMUNES:\n• Confundir masa con peso en hidrostática (empuje depende del peso específico, no de la densidad del objeto).\n• Pensar que la corriente eléctrica "se gasta" en un circuito (se conserva, lo que se "gasta" es la energía).\n• Creer que el campo magnético solo existe con imanes permanentes (toda corriente genera campo magnético).\n• Afirmar que luz y sonido son iguales (son ondas de naturaleza distinta).\n• Suponer que la relatividad solo aplica a velocidades extremas (el GPS debe corregir efectos relativistas).`,
          4: `✏️ TRABAJOS DIRIGIDOS: Física Ciclo VII\n\n📝 BLOQUE 1: Estática e Hidrostática\n1. Una barra uniforme de 4 m y 100 N de peso se apoya a 1 m de un extremo. ¿Qué fuerza se debe aplicar en el extremo largo para equilibrarla? (Torque: F·3 = 100·1 → F = 33.3 N).\n2. Una prensa hidráulica tiene pistones de 10 cm² y 200 cm². Si aplico 50 N en el pequeño, ¿qué fuerza levanta el grande? (F = 1000 N).\n3. Un bloque de madera (densidad 600 kg/m³) flota en agua. ¿Qué porcentaje de su volumen está sumergido? (E = P → ρ_agua·V_s·g = ρ_madera·V·g → V_s/V = 600/1000 = 60%).\n\n📝 BLOQUE 2: Electromagnetismo\n4. Dos cargas de +3 μC están separadas 30 cm en el vacío. Calcula la fuerza entre ellas. (F = 9e9·(3e-6)²/(0.3)² = 0.9 N, repulsiva).\n5. Por un circuito en serie con R₁=2Ω, R₂=3Ω y V=10V, halla I, V₁ y V₂. (R_eq=5Ω, I=2A, V₁=4V, V₂=6V).\n6. Explica por qué un transformador solo funciona con corriente alterna. (Necesita flujo variable para inducir fem. CC produce campo constante, no induce).\n\n📝 BLOQUE 3: Ondas y Óptica\n7. Una onda en una cuerda tiene f=5 Hz y λ=0.8 m. Calcula su velocidad. (v=λ·f=4 m/s).\n8. La luz incide desde el aire (n=1) al agua (n=1.33) con ángulo de 30°. Calcula el ángulo de refracción. (senθ₂ = 1·sen30°/1.33 = 0.376 → θ₂ ≈ 22°).\n9. Un objeto está a 30 cm de una lente convergente de f=10 cm. ¿Dónde se forma la imagen y cuál es su aumento? (1/di = 1/10 - 1/30 = 2/30 → di=15 cm; M = -15/30 = -0.5, imagen real, invertida, menor).\n\n📝 BLOQUE 4: Relatividad\n10. Si una nave viaja a 0.8c, ¿cuál es el factor γ? (γ = 1/√(1-0.8²) = 1/0.6 = 1.667). Si un evento dura 10 s en la nave, ¿cuánto mide un observador en Tierra? (16.67 s, dilatación).\n\n⏱️ Tiempo: 90 min. ✅ Revisión con resolución y simulaciones.`,
          5: `🔗 CORRELACIONES INTERNAS: Física con Matemática, Química y Biología\n\n🧮 CON MATEMÁTICA:\n• Cálculo vectorial para campos eléctrico y magnético, fuerzas y torques.\n• Ecuaciones diferenciales básicas en la descripción de ondas y circuitos RC/RL.\n• Geometría y trigonometría en óptica y vectores de fuerzas.\n\n🧪 CON QUÍMICA:\n• La electroquímica se fundamenta en la relación entre corriente, carga y masa depositada (leyes de Faraday de la electrólisis).\n• Los espectros de emisión/absorción (óptica) son la base para identificar elementos químicos.\n• La energía de enlace nuclear (E=mc²) explica la estabilidad del núcleo atómico.\n\n🧬 CON BIOLOGÍA:\n• El potencial de acción neuronal es un fenómeno eléctrico que depende de canales iónicos.\n• La visión (óptica) se explica con la refracción en el cristalino y la formación de imágenes en la retina.\n• El ultrasonido es una onda mecánica usada en ecografías.\n\n🧩 ACTIVIDAD INTEGRADORA: "Construcción de un motor eléctrico sencillo con pila, imán, alambre; explicación del principio de Lorentz y Faraday."`,
          6: `🌍 CORRELACIONES EXTERNAS: La física en el Perú moderno y el cosmos\n\n🏗️ INGENIERÍA E INFRAESTRUCTURA:\n• La estática es clave en puentes y edificaciones sismorresistentes en Perú, país altamente sísmico.\n• La hidrostática se aplica en las represas hidroeléctricas del Mantaro y Cerro del Águila, y en sistemas de agua potable.\n\n⚡ ENERGÍA Y TELECOMUNICACIONES:\n• El sistema interconectado nacional depende del electromagnetismo (generación en centrales, transmisión en alta tensión, transformadores).\n• La fibra óptica (reflexión total interna) conecta al Perú con el mundo a través de cables submarinos.\n\n🏥 MEDICINA Y TECNOLOGÍA:\n• La resonancia magnética (RMN) usa campos magnéticos y ondas de radio para imágenes del cuerpo.\n• El láser (óptica y electromagnetismo) se usa en cirugía ocular, comunicaciones y lectores de código de barras.\n• Los rayos X son radiación electromagnética de alta frecuencia.\n\n🌌 EXPLORACIÓN ESPACIAL Y GPS:\n• El GPS requiere correcciones relativistas (dilatación del tiempo por velocidad del satélite y gravedad). Sin relatividad, el error sería de ~10 km/día.\n• La equivalencia masa-energía (E=mc²) explica cómo el Sol produce energía (fusión nuclear).\n\n🧠 REFLEXIÓN FINAL: "La física, desde las leyes de Newton hasta la relatividad de Einstein, es la columna vertebral de la tecnología que define el mundo actual. Conocerla es empoderarse."`,

        function generateLessonContent(lesson, phaseNumber) {
            const area = lesson.area;
            const materia = lesson.materia;
            const conocimientos = lesson.conocimientos;
            const ciclo = lesson.ciclo;
            const nivel = lesson.nivel;
            switch (phaseNumber) {
                case 0:
                    return `OBJETIVO GENERAL: Desarrollar competencias en ${materia} correspondientes al ${ciclo} de Educación ${nivel}.\n\nOBJETIVOS PARTICULARES:\n- Identificar los conceptos clave de ${materia}.\n- Aplicar los conocimientos en situaciones prácticas.\n- Resolver problemas utilizando estrategias adecuadas.\n\nNOCIONES PRINCIPALES: ${conocimientos}\nNOCIONES SECUNDARIAS: Vocabulario técnico, procedimientos, estrategias de verificación.\nINTERESES SOCIETALES: Relación con la vida cotidiana, el entorno natural y social.`;
                case 1:
                    return `ACTIVIDAD DE DESCUBIERTA: "Explorando ${materia}"\n\n🧩 Se presentan situaciones problemáticas y materiales concretos para que los estudiantes exploren libremente los conceptos de ${materia}.\n🔍 Preguntas para la reflexión y registro de observaciones en el cuaderno de experiencias.`;
                case 2:
                    return `ACTIVIDAD INDUCTIVA: "Del ejemplo concreto al concepto general"\n\n📊 Se presentan varios ejemplos de ${materia} para que los estudiantes identifiquen patrones, regularidades y formulen reglas generales.\n📝 Los estudiantes registran sus conclusiones en organizadores gráficos.`;
                case 3:
                    return `TRANSMISIÓN CONCEPTUAL: ${materia}\n\n📐 CONCEPTOS CLAVE:\n${conocimientos}\n\n📏 DEFINICIONES, PROPIEDADES Y EJEMPLOS DESARROLLADOS.\n⚠️ Errores comunes y estrategias para evitarlos.`;
                case 4:
                    return `TRABAJOS DIRIGIDOS: Ejercicios de ${materia}\n\n✏️ Ejercicios de identificación, aplicación directa, transferencia y argumentación.\n📝 Formato: Individual o en parejas. Tiempo estimado: 30-45 minutos.`;
                case 5:
                    return `CORRELACIONES INTERNAS: Conexión con otras materias del área\n\n🔗 ${materia} se relaciona con otras ramas de ${lesson.areaName}. Se presentan ejemplos de integración.`;
                case 6:
                    return `CORRELACIONES EXTERNAS: Aplicaciones en la vida real\n\n🌍 Se muestran aplicaciones de ${materia} en la vida cotidiana, la tecnología, el arte, la naturaleza.`;
                case 7:
                    return `MÓDULO DE PROYECTO GRUPAL: "Aplicando ${materia} en equipo"\n\n🎯 Los estudiantes diseñan y ejecutan un proyecto colaborativo que integre los conocimientos de ${materia}.\n📋 Fases: formación de equipos, elección del tema, planificación, ejecución, presentación y evaluación.`;
                default:
                    return '';
            }
        }

            } else if (lessonId === 'ct-pri-sv-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVV), 150);
            } else if (lessonId === 'ct-pri-me-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEV), 150);
            } else if (lessonId === 'ct-pri-tu-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUV), 150);
            } else if (lessonId === 'mat-sec-arit-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAritAlgVI), 150);
            } else if (lessonId === 'mat-sec-geo-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoVI), 150);
            } else if (lessonId === 'mat-sec-alg-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAlgFuncVII), 150);
            } else if (lessonId === 'mat-sec-geotrig-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeomTrigVII), 150);
            } else if (lessonId === 'mat-sec-estprob-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaEstProbVII), 150);
            } else if (lessonId === 'ct-sec-quim-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaQuimVI), 150);
            } else if (lessonId === 'ct-sec-bio-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaBioVI), 150);
            } else if (lessonId === 'ct-sec-fis-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaFisVI), 150);
            } else if (lessonId === 'ct-sec-quim-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaQuimVII), 150);
            } else if (lessonId === 'ct-sec-bio-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaBioVII), 150);
            } else if (lessonId === 'ct-sec-fis-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaFisVII), 150);
            } else {
                setTimeout(() => applyAutoGeneratedContent(lessonId), 150);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyManualContent(lessonId, contentObj) {
            Object.keys(contentObj).forEach(phaseNum => {
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = contentObj[phaseNum]; localStorage.setItem(key, contentObj[phaseNum]); }
                }
            });
        }

        function applyAutoGeneratedContent(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) return;
            phaseDefinitions.forEach(phase => {
                const phaseNum = phase.number;
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const content = generateLessonContent(lesson, phaseNum);
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = content; localStorage.setItem(key, content); }
                }
            });
        }

        function togglePhase(phaseElementId) {
            const phaseItem = document.getElementById(phaseElementId);
            if (!phaseItem) return;
            phaseItem.classList.toggle('open');
            const ta = phaseItem.querySelector('.editable-area');
            if (ta) saveContent(ta);
        }

        function getStorageKey(lessonId, phaseNumber) { return `lesson-${lessonId}-phase-${phaseNumber}`; }
        function saveContent(textarea) { localStorage.setItem(getStorageKey(textarea.dataset.lesson, textarea.dataset.phase), textarea.value); }

        function restoreSavedContent(lessonId) {
            phaseDefinitions.forEach(phase => {
                const saved = localStorage.getItem(getStorageKey(lessonId, phase.number));
                if (saved) { const ta = document.getElementById(`editable-${phase.number}-${lessonId}`); if (ta) ta.value = saved; }
            });
        }

        let saveTimeout;
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('editable-area')) {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => saveContent(e.target), 500);
            }
        });
        document.addEventListener('blur', function(e) {
            if (e.target.classList.contains('editable-area')) saveContent(e.target);
        }, true);

        function navigateHome() { window.location.hash = ''; renderHome(); }
        function navigateToArea(areaKey) { window.location.hash = areaKey; renderArea(areaKey); }
        function navigateToLesson(lessonId) { window.location.hash = lessonId; renderLesson(lessonId); }

        function updateBreadcrumb(items) {
            const bc = document.getElementById('breadcrumb');
            let html = '<span onclick="navigateHome()">Inicio</span>';
            items.forEach(item => {
                html += ' <span class="sep">›</span> ';
                if (item.current) html += `<span class="current">${item.label}</span>`;
                else if (item.action) html += `<span onclick="(${item.action.toString()})()" style="cursor:pointer;">${item.label}</span>`;
                else html += `<span>${item.label}</span>`;
            });
            bc.innerHTML = html;
        }

        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.replace('#', '');
            if (!hash) renderHome();
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else if (lessonsData.some(l => l.id === hash)) renderLesson(hash);
        });

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                if (currentView === 'lesson') {
                    const allPhases = document.querySelectorAll('.phase-item');
                    const anyClosed = Array.from(allPhases).some(p => !p.classList.contains('open'));
                    allPhases.forEach(p => { if (anyClosed) p.classList.add('open'); else p.classList.remove('open'); });
                    document.querySelectorAll('.editable-area').forEach(ta => saveContent(ta));
                }
            }
        });

        function init() {
            const hash = window.location.hash.replace('#', '');
            if (hash && lessonsData.some(l => l.id === hash)) renderLesson(hash);
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else renderHome();
        }
        init();
        console.log('✅ Página de inicio restaurada: 3 bloques de área, Método Científico presente.');
        console.log('🧮 Matemática: 14 lecciones | 🔬 Ciencia y Tecnología: 18 lecciones | ⚗️ Método Científico: 3 lecciones.');
        console.log('🌟 29 lecciones extensas: 3 Matemática Ciclo III + 3 Ciencia Ciclo III + 3 Matemática Ciclo IV + 3 Ciencia Ciclo IV + 3 Matemática Ciclo V + 3 Ciencia Ciclo V + 2 Matemática Ciclo VI + 3 Ciencia Ciclo VI + 3 Matemática Ciclo VII + 3 Ciencia Ciclo VII.');
    </script>
</body>
</html>
