        const leccionExtensaSVIV = {
            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 3° y 4° grado de primaria las competencias relacionadas con la clasificación de los seres vivos, la comprensión de las cadenas alimenticias y el conocimiento de los principales ecosistemas peruanos, fomentando la observación, el análisis comparativo y la valoración de la biodiversidad del Perú.\n\n🎯 OBJETIVOS PARTICULARES:\n• Clasificar a los seres vivos en los cinco reinos principales: Animal, Vegetal, Fungi (hongos), Protista y Monera (bacterias).\n• Reconocer las características fundamentales de cada reino.\n• Comprender los niveles de organización de los seres vivos: célula, tejido, órgano, sistema, organismo, población, comunidad, ecosistema.\n• Identificar los componentes de un ecosistema: factores bióticos (seres vivos) y factores abióticos (luz, agua, temperatura, suelo, aire).\n• Entender el flujo de energía en las cadenas alimenticias, identificando productores, consumidores (primarios, secundarios, terciarios) y descomponedores.\n• Construir cadenas y redes alimenticias sencillas a partir de organismos de ecosistemas peruanos.\n• Conocer los principales ecosistemas del Perú: el mar peruano, la costa desértica y los valles, la sierra y los Andes, la selva amazónica, los humedales y los manglares.\n• Describir las adaptaciones de plantas y animales a sus respectivos ecosistemas.\n• Valorar la megadiversidad peruana y la importancia de conservar los ecosistemas.\n\n📌 NOCIONES PRINCIPALES:\n• Los cinco reinos de los seres vivos y sus características.\n• Célula como unidad básica de la vida.\n• Niveles ecológicos: individuo, población, comunidad, ecosistema, bioma, biosfera.\n• Factores bióticos y abióticos.\n• Cadena alimenticia: productores (plantas y algas), consumidores (herbívoros, carnívoros, omnívoros), descomponedores (hongos y bacterias).\n• Red trófica: conjunto de cadenas interconectadas.\n• Ecosistemas peruanos: mar frío de la corriente de Humboldt, bosque seco ecuatorial, desierto costero, serranía esteparia, puna, páramo, selva alta (yunga), selva baja (bosque tropical amazónico), sabana de palmeras, humedales.\n\n📌 NOCIONES SECUNDARIAS:\n• Equilibrio ecológico y consecuencias de la extinción de una especie.\n• Adaptaciones: camuflaje, mimetismo, hibernación, migración.\n• Fotosíntesis y su rol como base de la cadena alimenticia.\n• Especies endémicas del Perú: gallito de las rocas, mono choro de cola amarilla, vicuña, cóndor andino.\n• Áreas Naturales Protegidas del Perú: Parques Nacionales, Reservas Nacionales, Santuarios Nacionales.\n\n🌍 INTERESES SOCIETALES:\n• El Perú es uno de los 17 países megadiversos del mundo; su biodiversidad es fuente de alimentos, medicinas, recursos genéticos y orgullo nacional.\n• Comprender las cadenas alimenticias ayuda a entender la importancia de cada ser vivo, por pequeño que parezca.\n• La pérdida de un eslabón en la cadena puede causar desequilibrios ecológicos graves.\n• La conservación de los ecosistemas nos asegura agua limpia, aire puro, alimentos y protección frente al cambio climático.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Exploradores de la Biodiversidad Peruana"\n\n🧩 MATERIALES: Láminas de los cinco reinos de seres vivos, fotografías de ecosistemas peruanos (mar, costa, sierra, selva), lupas, microscopio escolar (si está disponible), frascos con muestras de agua de charco, hongos frescos (champiñones, levadura), tarjetas con nombres de organismos, hilo o lana para tejer redes tróficas, mapas del Perú con regiones naturales.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Los cinco reinos en el aula" – En una mesa hay imágenes, objetos y seres vivos reales (una planta, un insecto en frasco, un champiñón fresco, una muestra de agua estancada con microorganismos, y una foto de bacterias). Los estudiantes los clasifican en cinco grupos usando tarjetas con los nombres de los reinos. Discuten por qué agruparon cada organismo donde lo hicieron.\n\nESTACIÓN 2: "El rompecabezas de la cadena alimenticia" – Se reparten tarjetas con nombres e imágenes de organismos: fitoplancton, anchoveta, caballa, lobo marino, ave guanera. Los estudiantes deben ordenarlas formando una cadena. Luego, con otras tarjetas (zorro andino, vizcacha, ichu, puma, cóndor) forman cadenas de la sierra. Reflexionan: ¿Quién se come a quién? ¿Qué pasa si eliminamos un eslabón?\n\nESTACIÓN 3: "El gran mapa de los ecosistemas peruanos" – Sobre un mapa mudo del Perú, los estudiantes pegan recortes de animales y plantas características de cada región: pelícano y lobo marino en la costa, vicuña y puya Raimondi en la sierra, delfín rosado y victoria regia en la selva. Dialogan: ¿Por qué estos seres vivos viven allí y no en otro lugar?\n\nESTACIÓN 4: "Tejiendo la red de la vida" – Los estudiantes se colocan en círculo. Cada uno recibe una tarjeta con un ser vivo o factor abiótico (sol, agua, suelo). Usando un ovillo de lana, se van pasando la lana entre quienes tienen una relación ecológica (el sol → la planta; la planta → el conejo; el conejo → el zorro; el zorro → el cóndor; los descomponedores → la planta). Forman una red que muestra la interdependencia. Si un estudiante suelta la lana (extinción de una especie), varios otros se ven afectados.\n\n💬 REFLEXIÓN EN PLENARIA: ¿En qué se diferencian los cinco reinos? ¿Todos los seres vivos dependen de otros? ¿Qué ecosistemas peruanos conocían y cuáles descubrieron hoy? ¿Por qué es importante proteger la biodiversidad del Perú?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "De los ejemplos a las reglas de la ecología"\n\n📊 OBSERVACIÓN GUIADA: CLASIFICACIÓN DE LOS SERES VIVOS\nLa maestra presenta una tabla con las características de los cinco reinos y los estudiantes proponen ejemplos peruanos.\n\n| Reino | Características | Ejemplos del Perú |\n|---|---|---|\n| Monera | Unicelulares, sin núcleo definido, microscópicos | Bacterias del suelo, cianobacterias del lago Titicaca |\n| Protista | Unicelulares o pluricelulares simples, con núcleo | Algas marinas, protozoos de charcos |\n| Fungi | Se alimentan absorbiendo nutrientes, no fotosintetizan | Hongos comestibles (callampas), moho del pan |\n| Vegetal | Pluricelulares, fotosintetizan, tienen clorofila | Árbol de la quina, orquídeas, papa, maíz |\n| Animal | Pluricelulares, se alimentan de otros seres vivos | Cóndor, vicuña, delfín rosado, mariposa morpho |\n\nConclusión guiada: "Los seres vivos se agrupan en cinco grandes reinos según su tipo de célula, número de células y forma de alimentación".\n\n📊 OBSERVACIÓN GUIADA: CADENA ALIMENTICIA\nCaso: Ecosistema marino peruano.\nSe presentan imágenes: Sol → Fitoplancton → Zooplancton → Anchoveta → Atún → Tiburón → Bacterias descomponedoras.\n\nPaso 1: Los estudiantes identifican quién produce su propio alimento (fitoplancton).\nPaso 2: Identifican quiénes se alimentan de otros (todos los demás animales).\nPaso 3: Identifican quiénes descomponen los restos (bacterias y hongos).\nPaso 4: Definen los niveles tróficos: Productores (hacen fotosíntesis), Consumidores primarios (herbívoros), Consumidores secundarios (carnívoros que comen herbívoros), Consumidores terciarios (superdepredadores), Descomponedores.\n\nConclusión: "En una cadena alimenticia, la energía fluye desde el sol, pasa por los productores y recorre los distintos niveles de consumidores, mientras los descomponedores reciclan la materia".\n\n📊 OBSERVACIÓN GUIADA: ECOSISTEMAS PERUANOS\nSe presentan cuatro imágenes representativas de ecosistemas peruanos y los estudiantes completan una tabla:\n\n| Ecosistema | Ubicación | Clima | Flora característica | Fauna característica |\n|---|---|---|---|---|\n| Mar frío de la Corriente de Humboldt | Costa | Templado, aguas frías | Fitoplancton, algas | Anchoveta, lobo marino, pingüino de Humboldt |\n| Bosque seco ecuatorial | Norte (Tumbes, Piura) | Cálido y seco | Algarrobo, sapote | Zorro de Sechura, pava aliblanca |\n| Puna | Sierra alta (>3800 m) | Frío, seco, mucho sol | Ichu, puya Raimondi | Vicuña, suri (ñandú andino) |\n| Selva baja (Amazonía) | Oriente | Cálido y húmedo | Caoba, cedro, victoria regia | Jaguar, delfín rosado, guacamayo |\n\nConclusión: "Cada ecosistema peruano tiene condiciones climáticas y geográficas particulares que determinan la flora y la fauna que puede vivir allí. No todos los seres vivos pueden vivir en cualquier lugar; están adaptados".\n\n📝 REGISTRO: Cada estudiante dibuja en su cuaderno un esquema de la cadena alimenticia del mar peruano y escribe las características de los cinco reinos con un ejemplo peruano cada uno.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Clasificación de los Seres Vivos, Cadenas Alimenticias y Ecosistemas Peruanos\n\n🌿 1. CLASIFICACIÓN DE LOS SERES VIVOS\n\nLos biólogos han clasificado a todos los seres vivos en cinco grandes reinos basándose en sus características celulares y modo de nutrición.\n\n📏 LOS CINCO REINOS:\n\n🔹 REINO MONERA:\n• Organismos unicelulares, sin núcleo definido (procariotas).\n• Son las bacterias y las cianobacterias (algas verdeazuladas).\n• Se encuentran en todas partes: suelo, agua, aire, dentro de otros seres vivos.\n• Algunas bacterias son beneficiosas (descomponedoras, flora intestinal); otras, patógenas (causan enfermedades).\n\n🔹 REINO PROTISTA:\n• Organismos unicelulares o pluricelulares simples, con núcleo definido (eucariotas).\n• Incluye a los protozoos (como la ameba y el paramecio) y a las algas unicelulares (como las diatomeas).\n• Las algas son importantes productoras de oxígeno en el mar y base de cadenas alimenticias acuáticas.\n\n🔹 REINO FUNGI (HONGOS):\n• Pueden ser unicelulares (levaduras) o pluricelulares (champiñones, mohos).\n• No realizan fotosíntesis; se alimentan absorbiendo nutrientes de materia orgánica en descomposición (son descomponedores) o parasitando.\n• Junto con las bacterias, reciclan la materia en los ecosistemas.\n\n🔹 REINO VEGETAL (PLANTAE):\n• Organismos pluricelulares que realizan fotosíntesis gracias a la clorofila.\n• Fabrican su propio alimento a partir de agua, dióxido de carbono y luz solar.\n• Son la base de la mayoría de las cadenas alimenticias terrestres.\n• Se clasifican en plantas sin flor (musgos, helechos) y plantas con flor (gimnospermas y angiospermas).\n\n🔹 REINO ANIMAL (ANIMALIA):\n• Organismos pluricelulares que se alimentan de otros seres vivos (herbívoros, carnívoros, omnívoros).\n• La mayoría puede desplazarse al menos en alguna etapa de su vida.\n• Se clasifican en invertebrados ( insectos, arácnidos, moluscos, crustáceos) y vertebrados (peces, anfibios, reptiles, aves, mamíferos).\n\n📏 NIVELES DE ORGANIZACIÓN ECOLÓGICA:\nCélula → Tejido → Órgano → Sistema → Organismo (individuo) → Población → Comunidad → Ecosistema → Bioma → Biosfera.\n\n🔗 2. CADENAS ALIMENTICIAS Y REDES TRÓFICAS\n\n📏 ¿QUÉ ES UNA CADENA ALIMENTICIA?\nEs una secuencia lineal que muestra quién se come a quién en un ecosistema, representando el flujo de energía y materia desde los productores hasta los descomponedores.\n\n📏 ESLABONES O NIVELES TRÓFICOS:\n\n🔹 PRODUCTORES (Autótrofos):\n• Fabrican su propio alimento mediante fotosíntesis (plantas, algas, fitoplancton) o quimiosíntesis (algunas bacterias).\n• Constituyen siempre el primer eslabón de la cadena. Sin ellos, no habría vida en la Tierra como la conocemos.\n\n🔹 CONSUMIDORES (Heterótrofos):\n• Primarios: Herbívoros. Se alimentan directamente de productores. Ej: conejo, vaca, zooplancton, anchoveta.\n• Secundarios: Carnívoros que se alimentan de herbívoros. Ej: zorro, sapo, caballa.\n• Terciarios: Superdepredadores. Se alimentan de carnívoros secundarios. Ej: puma, tiburón, cóndor.\n• Omnívoros: comen tanto productores como consumidores. Ej: ser humano, oso de anteojos.\n\n🔹 DESCOMPONEDORES (Saprófitos):\n• Bacterias y hongos.\n• Descomponen la materia orgánica muerta (hojas, animales muertos, excrementos) convirtiéndola en nutrientes minerales que las plantas pueden volver a usar.\n• Cierran el ciclo de la materia en los ecosistemas.\n\n📏 RED TRÓFICA:\nEn la naturaleza, un organismo puede ser alimento de varios depredadores y un depredador puede alimentarse de varias presas. Por eso, las cadenas se entrecruzan formando REDES TRÓFICAS, mucho más realistas que una sola cadena lineal.\n\n📏 FLUJO DE ENERGÍA:\nLa energía entra al ecosistema en forma de luz solar, es capturada por los productores (fotosíntesis) y fluye a través de los consumidores. En cada nivel trófico, una gran parte de la energía se pierde en forma de calor (respiración). Por eso las cadenas alimenticias rara vez tienen más de 5 eslabones: la energía disponible se reduce drásticamente en cada nivel.\n\n🌎 3. ECOSISTEMAS PERUANOS\n\nEl Perú es un país megadiverso porque alberga 84 de las 117 zonas de vida del planeta, gracias a la presencia de los Andes, las corrientes marinas, y su ubicación tropical. Los principales ecosistemas peruanos son:\n\n📏 EL MAR FRÍO DE LA CORRIENTE DE HUMBOLDT (Costa):\n• Aguas frías y ricas en nutrientes que ascienden desde el fondo (afloramiento costero).\n• Abundante fitoplancton y zooplancton.\n• Zona de reproducción de la anchoveta, base de la cadena alimenticia marina.\n• Fauna: lobo marino, pingüino de Humboldt, pelícano, guanay, delfín, ballena jorobada (de paso).\n• Importancia: produce la mayor biomasa marina del mundo y sostiene la industria pesquera peruana.\n\n📏 EL DESIERTO COSTERO Y LOS VALLES (Costa):\n• Franja árida entre el mar y los Andes, interrumpida por 53 ríos que forman valles fértiles.\n• Las lomas costeras (Lachay, Atiquipa) reverdecen en invierno con la humedad de la neblina.\n• Flora de lomas: amancae, tara, mito.\n• Fauna: zorro costeño, vizcacha, aves endémicas.\n\n📏 EL BOSQUE SECO ECUATORIAL (Tumbes, Piura, Lambayeque):\n• Clima tropical seco con lluvias en verano.\n• Flora: algarrobo, sapote, ceibo.\n• Fauna: pava aliblanca (redescubierta en 1977), zorro de Sechura, venado cola blanca.\n\n📏 LA SERRANÍA ESTEPARIA Y LA PUNA (Sierra):\n• Serranía esteparia: ladera occidental andina, semiárida, con cactáceas y arbustos.\n• Puna: altiplanicie sobre los 3800 m, con ichu, puya Raimondi (planta que puede vivir 100 años y florece una vez).\n• Fauna: vicuña, alpaca, llama, suri (avestruz andino), cóndor andino, zorro andino, vizcacha.\n\n📏 LA SELVA ALTA (YUNGA) Y LA SELVA BAJA (Amazonía):\n• Selva alta: flanco oriental de los Andes, nuboselva, alta biodiversidad. Gallito de las rocas, mono choro de cola amarilla, oso de anteojos, orquídeas.\n• Selva baja: llanura amazónica, bosque tropical más extenso del Perú. Árboles gigantes (caoba, cedro), ríos caudalosos. Jaguar, delfín rosado, guacamayo, anaconda, paiche, mariposa morpho azul.\n\n📏 LOS HUMEDALES Y MANGLARES:\n• Humedales de la costa (Pantanos de Villa, humedales de Ventanilla): refugio de aves migratorias.\n• Manglares de Tumbes (Santuario Nacional Los Manglares de Tumbes): bosque sobre agua salobre, con mangle rojo, concha negra, cocodrilo de Tumbes.\n\n⚠️ ERRORES COMUNES Y CÓMO EVITARLOS:\n• Confundir una cadena alimenticia con una red trófica. → La cadena es lineal; la red es el conjunto de cadenas interconectadas.\n• Creer que los descomponedores están "al final" de la cadena. → Están en todos los niveles, reciclando materia constantemente.\n• Pensar que todos los hongos y bacterias son malos. → La mayoría son descomponedores y beneficiosos.\n• Clasificar una ballena como pez. → Las ballenas son mamíferos, respiran aire y amamantan a sus crías.\n• Creer que el Perú tiene solo costa, sierra y selva. → Tiene muchos ecosistemas distintos dentro de esas regiones.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Clasificación de los Seres Vivos\n1. Relaciona cada reino con su característica principal:\nMonera → (Unicelulares, sin núcleo).\nProtista → (Unicelulares con núcleo, como las algas).\nFungi → (Se alimentan absorbiendo, como los hongos).\nVegetal → (Pluricelulares, hacen fotosíntesis).\nAnimal → (Pluricelulares, se alimentan de otros).\n\n2. ¿A qué reino pertenecen?\na) Una bacteria del yogurt. (Monera)\nb) Un champiñón. (Fungi)\nc) Una mariposa morpho azul. (Animal)\nd) Un alga marina microscópica. (Protista)\ne) Un helecho. (Vegetal)\n\n3. ¿Qué diferencia hay entre una célula procariota (bacteria) y una eucariota (animal o vegetal)? (La procariota no tiene núcleo definido; la eucariota sí).\n\n📝 BLOQUE 2: Cadenas Alimenticias\n4. Ordena la siguiente cadena alimenticia del ecosistema de puna:\n(Cóndor → Zorro andino → Vizcacha → Ichu → Sol)\nSolución: Sol → Ichu → Vizcacha → Zorro andino → Cóndor.\n\n5. Identifica el nivel trófico de cada organismo en esa cadena:\nIchu: Productor.\nVizcacha: Consumidor primario (herbívoro).\nZorro andino: Consumidor secundario (carnívoro).\nCóndor: Consumidor terciario (carroñero/superdepredador).\nSol: Fuente de energía.\n\n6. ¿Por qué el cóndor es un carroñero y no un cazador típico? (Porque se alimenta de animales muertos; sus patas no están adaptadas para cazar, sino para caminar, y usa corrientes térmicas para planear y localizar carroña).\n\n7. ¿Qué pasaría en un ecosistema si desaparecieran los descomponedores? (La materia orgánica muerta se acumularía, los nutrientes no se reciclarían y las plantas no podrían crecer adecuadamente).\n\n📝 BLOQUE 3: Ecosistemas Peruanos\n8. Une cada ecosistema con un animal representativo:\nMar frío de Humboldt → (Pingüino de Humboldt).\nBosque seco ecuatorial → (Pava aliblanca).\nPuna → (Vicuña).\nSelva baja → (Delfín rosado).\nManglares de Tumbes → (Concha negra).\n\n9. ¿Qué adaptación tiene el pingüino de Humboldt para vivir en la costa peruana? (Sus alas se han transformado en aletas para nadar, tiene una gruesa capa de grasa para soportar el frío de la corriente de Humboldt y plumas impermeables).\n\n10. Menciona 3 áreas naturales protegidas del Perú y el ecosistema que protegen.\n(Ejemplos: Parque Nacional del Manu – selva baja; Reserva Nacional de Paracas – mar frío y desierto costero; Parque Nacional Huascarán – puna y glaciares; Santuario Nacional Los Manglares de Tumbes – manglares).\n\n📝 BLOQUE 4: Problemas y Análisis\n11. En la selva amazónica, ¿por qué la tala de un gran árbol como la caoba puede afectar a toda la red trófica? (Porque el árbol proporciona alimento y refugio a insectos, aves, mamíferos y epífitas; al talarlo, esas especies pierden su hábitat y fuente de alimento, lo que afecta a sus depredadores y así sucesivamente).\n\n12. ¿Por qué el Perú es considerado un país megadiverso? (Porque en su territorio confluyen la corriente de Humboldt, la cordillera de los Andes y la cuenca amazónica, creando una enorme variedad de climas y hábitats que albergan una altísima diversidad de especies).\n\n📝 BLOQUE 5: Desafío Creativo\n13. Dibuja una red trófica que incluya al menos 8 seres vivos del ecosistema marino peruano. Usa flechas para indicar "es comido por". Incluye los descomponedores.\n14. Elige un ecosistema peruano y describe cómo sería un día en la vida de uno de sus animales característicos.\n\n⏱️ Tiempo estimado: 70-90 min. ✅ Revisión en parejas y puesta en común con mapas y láminas.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Materia y Energía, Tierra y Universo y Matemática\n\n🔬 CONEXIÓN CON MATERIA Y ENERGÍA:\n• La fotosíntesis (productores) es un proceso que transforma energía luminosa en energía química.\n• La cadena alimenticia representa el flujo de energía y el ciclo de la materia. Conexión directa con los estados de la materia y la conservación de la masa.\n• La descomposición es un cambio químico de la materia orgánica en inorgánica.\n\n🌍 CONEXIÓN CON TIERRA Y UNIVERSO:\n• El clima de cada ecosistema (temperatura, humedad, vientos) depende de la ubicación geográfica, la altitud, las corrientes marinas (Humboldt) y la latitud, temas de Tierra y Universo.\n• La biodiversidad de los ecosistemas también depende del tipo de suelo y de la disponibilidad de agua (ciclo del agua).\n• El Fenómeno del Niño (calentamiento del mar) afecta drásticamente las cadenas alimenticias marinas peruanas.\n\n🧮 CONEXIÓN CON MATEMÁTICA:\n• Clasificar y seriar seres vivos por características (pertenencia a conjuntos).\n• Construir tablas comparativas de los cinco reinos y de los ecosistemas con sus características.\n• Contar y graficar especies por ecosistema (noción de variable y frecuencia).\n• La pirámide trófica es una excelente introducción a los gráficos de barras apiladas.\n\n🧩 ACTIVIDAD INTEGRADORA: "Creación de un ecosistema en miniatura (terrario o acuario)": En un frasco de vidrio grande, los estudiantes crean un mini ecosistema con tierra, piedras, una pequeña planta y quizás un insecto. Observan durante semanas y registran cambios. Relacionan con factores bióticos y abióticos, la cadena alimenticia del frasco y la necesidad de equilibrio.\n\n💡 REFLEXIÓN: Todos los seres vivos estamos conectados en una gran red planetaria. Lo que sucede en el mar peruano afecta a las aves guaneras, cuyo guano fertiliza los suelos agrícolas, y así sucesivamente. La ecología nos enseña que todo está relacionado.`,
            6: `🌍 CORRELACIONES EXTERNAS: La biodiversidad y los ecosistemas en la vida real y la cultura\n\n🎣 PESCA Y ECONOMÍA PERUANA:\n• La anchoveta peruana es la especie de pez más capturada en el mundo. Sostiene la industria de harina de pescado.\n• El Fenómeno del Niño calienta el mar, la anchoveta migra o muere por falta de plancton, y toda la cadena colapsa: aves guaneras mueren de hambre, la pesca industrial se paraliza.\n\n🌾 AGRICULTURA Y ECOSISTEMAS:\n• Los valles costeros son ecosistemas transformados por el ser humano para la agricultura (arroz, caña de azúcar, espárragos, uvas).\n• La papa, domesticada en los Andes peruanos, es un ejemplo de cómo la biodiversidad andina alimenta al mundo.\n\n💊 MEDICINA Y BIODIVERSIDAD:\n• La quina (árbol de la escarapela peruana) produce quinina, usada para tratar la malaria.\n• Muchas plantas de la Amazonía tienen principios activos investigados para nuevos medicamentos.\n\n🎨 CULTURA Y BIODIVERSIDAD:\n• El gallito de las rocas es el ave nacional del Perú.\n• La vicuña aparece en el escudo nacional representando el reino animal.\n• Los antiguos peruanos (Moche, Nazca, Inca) representaban la fauna y flora en su cerámica, textiles y arquitectura.\n\n🏞️ ECOTURISMO:\n• El Parque Nacional del Manu es Reserva de Biosfera y Patrimonio de la Humanidad.\n• Muchas comunidades campesinas y nativas protegen ecosistemas y ofrecen turismo vivencial.\n\n🧠 REFLEXIÓN FINAL: "Conocer los ecosistemas peruanos es conocernos a nosotros mismos como país. Somos megadiversos no solo en naturaleza, sino en cultura, lenguas y tradiciones. Proteger un ecosistema es proteger una parte de nuestra identidad."\n\n🗣️ CITA: "En la naturaleza nada se crea, nada se destruye, todo se transforma." — Antoine Lavoisier (adaptado a la ecología).`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Expedición Científica: Ecosistemas del Perú en Miniatura"\n\n🎯 OBJETIVO: Cada equipo investigará a fondo un ecosistema peruano y construirá su maqueta detallada, presentando un "informe de expedición" con la clasificación de sus seres vivos, las cadenas alimenticias que lo conforman y una propuesta de conservación.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ORGANIZACIÓN Y ASIGNACIÓN (1 sesión)\n• 5 equipos, cada uno representa una expedición a un ecosistema peruano:\n  - Expedición "Corriente de Humboldt" (Mar frío)\n  - Expedición "Lomas y Desiertos" (Costa y lomas)\n  - Expedición "Puna" (Alta montaña andina)\n  - Expedición "Selva Alta" (Yunga y nuboselva)\n  - Expedición "Amazonía" (Selva baja)\n• Cada equipo nombra un Jefe de expedición, un Cartógrafo (dibuja el mapa), un Biólogo (clasifica los seres vivos), un Ecólogo (diseña cadenas y redes) y un Guardaparque (propone plan de conservación).\n\nFASE 2: INVESTIGACIÓN (1-2 sesiones)\n• Usando libros, internet (guiado) y láminas, investigan:\n  - Ubicación geográfica y mapa.\n  - Clima (temperatura, humedad, precipitaciones).\n  - Flora representativa (mínimo 5 especies).\n  - Fauna representativa (mínimo 5 especies).\n  - Tres cadenas alimenticias que se entrecrucen formando una red trófica.\n  - Clasificación de cada ser vivo en su reino y su nivel trófico.\n\nFASE 3: CONSTRUCCIÓN DE LA MAQUETA (2 sesiones)\n• Sobre una base de cartón de 50 cm × 40 cm, construyen el ecosistema en 3D:\n  - Relieve (montañas, valles, agua, arena) con papel maché o plastilina.\n  - Seres vivos en miniatura hechos de plastilina, cartulina o impresos y pegados en palitos.\n  - Flechas que indiquen la dirección de la cadena alimenticia (con hilo o lana).\n  - Etiquetas con el nombre de cada ser vivo y su nivel trófico.\n  - Leyenda indicando el reino al que pertenece cada organismo.\n\nFASE 4: INFORME DE EXPEDICIÓN (1 sesión)\n• Documento escrito que incluye:\n  - Portada con nombre y logo de la expedición.\n  - Mapa de ubicación del ecosistema en el Perú.\n  - Descripción del ecosistema (clima, relieve).\n  - Tabla de clasificación de los seres vivos (reino, nombre común, nombre científico si es posible, nivel trófico).\n  - Diagrama de la red trófica del ecosistema.\n  - Plan de conservación: ¿Qué amenazas enfrenta este ecosistema y qué podemos hacer para protegerlo?\n\nFASE 5: SIMPOSIO DE EXPEDICIONES (1 sesión)\n• Se montan las 5 maquetas en un espacio amplio (aula o patio).\n• Cada equipo expone su ecosistema como si fueran científicos ante un congreso.\n• Responden preguntas del "jurado" (docente y compañeros).\n• Los asistentes votan por la maqueta más realista, la mejor explicación y el plan de conservación más creativo.\n\n🏆 EVALUACIÓN: Correcta clasificación de los seres vivos, coherencia de las cadenas y redes tróficas, fidelidad al ecosistema real, calidad de la maqueta y el informe, trabajo en equipo y claridad de la exposición.\n🎉 CIERRE: Entrega de diplomas de "Expedicionario Científico". Las maquetas se exponen durante una semana en la biblioteca o el patio.`,
        };

        const leccionExtensaMEIV = {
            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 3° y 4° grado de primaria las competencias en materia y energía, profundizando en los estados de la materia y sus cambios, las mezclas y métodos de separación, los conceptos fundamentales de fuerza y movimiento, y el conocimiento de las fuentes de energía renovable, promoviendo la experimentación, la curiosidad científica y la conciencia ambiental.\n\n🎯 OBJETIVOS PARTICULARES:\n• Reconocer los tres estados de la materia (sólido, líquido y gaseoso) y sus propiedades fundamentales.\n• Comprender los cambios de estado: fusión, solidificación, evaporación, condensación, sublimación.\n• Diferenciar entre mezclas homogéneas (uniformes, como el agua salada) y mezclas heterogéneas (no uniformes, como la arena con piedras).\n• Aplicar métodos simples de separación: filtración, tamizado, decantación, evaporación y magnetismo.\n• Comprender qué es una fuerza y cómo puede modificar el estado de movimiento o la forma de un cuerpo.\n• Identificar tipos de fuerzas: gravedad (peso), fuerza de contacto (empuje, tracción, fricción) y fuerzas a distancia (magnetismo).\n• Comprender la diferencia entre masa y peso.\n• Conocer y diferenciar fuentes de energía: renovables (solar, eólica, hidráulica, geotérmica, biomasa) y no renovables (petróleo, carbón, gas natural).\n• Valorar la importancia de la energía renovable para el cuidado del medio ambiente.\n\n📌 NOCIONES PRINCIPALES:\n• Estados de la materia: sólido (forma fija, volumen fijo), líquido (forma variable, volumen fijo), gas (forma y volumen variables).\n• Cambios de estado: fusión, solidificación, evaporación/ebullición, condensación, sublimación (inversa).\n• Mezcla homogénea (disolución), mezcla heterogénea.\n• Métodos de separación: filtración, tamizado, decantación, evaporación, imantación.\n• Fuerza: definición, efectos (modificar el movimiento, deformar).\n• Tipos de fuerza: contacto (empuje, tracción, fricción/rozamiento), a distancia (gravedad, magnetismo).\n• Masa como cantidad de materia. Peso como fuerza de gravedad sobre la masa.\n• Energía: fuentes renovables y no renovables.\n\n📌 NOCIONES SECUNDARIAS:\n• Puntos de fusión y ebullición del agua (0°C y 100°C a nivel del mar).\n• Ciclo del agua como ejemplo de cambios de estado en la naturaleza.\n• Mezclas comunes: aire (mezcla de gases), agua de mar (mezcla de agua y sales), ensalada de frutas (mezcla heterogénea).\n• Fricción como fuerza que se opone al movimiento. Beneficios y perjuicios de la fricción.\n• Propiedades magnéticas: polos, atracción y repulsión.\n• Funcionamiento básico de un aerogenerador, un panel solar y una represa hidroeléctrica.\n\n🌍 INTERESES SOCIETALES:\n• Conocer los cambios de estado es fundamental para entender la cocina (hervir, congelar), los fenómenos meteorológicos (nubes, lluvia, nieve) y procesos industriales.\n• Separar mezclas es una actividad cotidiana y de gran importancia en la industria alimentaria, el tratamiento de aguas y la minería.\n• Las fuerzas y el movimiento explican por qué los objetos caen, cómo funcionan los vehículos y la importancia del rozamiento para caminar o frenar.\n• La energía es esencial para la sociedad moderna. Conocer las energías renovables conecta a los estudiantes con las soluciones al cambio climático y los problemas ambientales que enfrenta el Perú y el mundo.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Laboratorio de Materia, Mezclas y Fuerzas"\n\n🧩 MATERIALES: Cubos de hielo, termómetro, olla eléctrica o mechero (con supervisión), vasos, sal, arena, limaduras de hierro, imanes, filtros de café, embudos, coladores, recipientes, aceite, agua, dinamómetro (o liga para simularlo), balanza, carritos de juguete, planos inclinados, molinillo de viento, pequeña celda solar, brújula.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Cambios de estado en vivo" – Los estudiantes observan un cubo de hielo mientras se derrite en un plato y miden su temperatura. Luego calientan agua en un recipiente hasta que hierve y observan el vapor. Colocan una tapa fría sobre el vapor y ven cómo se condensa. Registran cada cambio: sólido (hielo) → líquido (agua) → gas (vapor) → líquido (condensado). Identifican las temperaturas de fusión (0°C) y ebullición (100°C).\n\nESTACIÓN 2: "Mezclas que separamos" – Tienen 4 frascos con mezclas diferentes: a) Arena y piedritas; b) Agua con arena; c) Agua con sal disuelta; d) Arena con limaduras de hierro. Con colador, filtro de café, imán y un plato al sol (o mechero para evaporar) deben elegir el método para separar cada mezcla y explicar por qué funciona.\n\nESTACIÓN 3: "Fuerzas en acción" – En un plano inclinado, dejan rodar un carrito. Miden cuánto avanza en una superficie lisa (mesa) vs. una superficie rugosa (lija, toalla). ¿Dónde hay más fricción? Luego con un imán, mueven un clip sin tocarlo (fuerza magnética a distancia). Con una liga estirada, miden la fuerza que se necesita para mover un libro (fuerza elástica).\n\nESTACIÓN 4: "Energías que se transforman" – Tienen un pequeño panel solar conectado a un motor o un foco. Lo exponen al sol o a una lámpara potente y observan que se enciende. Con un molinillo de viento, soplan y generan movimiento. Relacionan: la energía solar se transforma en eléctrica; la energía eólica (viento) se transforma en mecánica.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Puede el agua desaparecer? ¿Qué tipo de mezcla es más difícil de separar? ¿Qué pasaría si no hubiera fricción? ¿Por qué son importantes las energías renovables?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Del experimento a los conceptos científicos"\n\n📊 OBSERVACIÓN GUIADA: CAMBIOS DE ESTADO\nSe presenta al agua como protagonista. Los estudiantes registran en una tabla:\n\n| Situación | Temperatura (°C) | Estado | Cambio |\n|---|---|---|---|\n| Hielo recién sacado del congelador | -5°C | Sólido | — |\n| Hielo empezando a derretirse | 0°C | Sólido → Líquido | Fusión |\n| Agua líquida a temperatura ambiente | 25°C | Líquido | — |\n| Agua hirviendo | 100°C | Líquido → Gas | Ebullición/Evaporación |\n| Vapor tocando una superficie fría | — | Gas → Líquido | Condensación |\n\nConclusión guiada: "El agua cambia de estado al variar la temperatura. La fusión ocurre a 0°C y la ebullición a 100°C. Al enfriarse, el vapor se condensa y el agua líquida se solidifica".\n\n📊 OBSERVACIÓN GUIADA: MEZCLAS HOMOGÉNEAS vs. HETEROGÉNEAS\nSe presentan 6 vasos:\nA: Agua con sal (transparente, no se ven las partes).\nB: Agua con arena (se ve la arena en el fondo).\nC: Agua con aceite (dos capas visibles).\nD: Aire (mezcla de gases invisible).\nE: Ensalada de frutas (trozos visibles).\nF: Jugo de naranja (uniforme, no se ven partes).\n\nSe pregunta: ¿En cuáles puedo distinguir los componentes a simple vista? (B, C, E) → Mezclas heterogéneas. ¿En cuáles no? (A, D, F) → Mezclas homogéneas. Se introduce el concepto de disolución (sal en agua) y emulsión (agua y aceite).\n\n📊 OBSERVACIÓN GUIADA: PESO Y MASA\nUn astronauta en la Luna pesa 1/6 de lo que pesa en la Tierra porque la gravedad lunar es menor. Pero su masa es la misma. Se ilustra con una pesa de 1 kg en la balanza (masa: 1 kg) y un dinamómetro (peso: 9.8 N en la Tierra, 1.6 N en la Luna). Conclusión: "La masa es la cantidad de materia y no cambia. El peso es la fuerza con que la gravedad atrae esa masa y cambia según el planeta".\n\n📊 OBSERVACIÓN GUIADA: ENERGÍAS RENOVABLES vs. NO RENOVABLES\nSe completa una tabla entre todos:\n| Fuente de energía | ¿Se agota? | Renovable / No renovable | Ejemplo en el Perú |\n|---|---|---|---|\n| Sol | No | Renovable | Paneles solares en Arequipa |\n| Viento | No | Renovable | Parque eólico en Marcona (Ica) |\n| Agua (ríos) | No (se renueva con lluvia) | Renovable | Central hidroeléctrica del Mantaro |\n| Petróleo | Sí | No renovable | Lote petrolero en la selva (Loreto) |\n| Gas natural | Sí | No renovable | Gas de Camisea (Cusco) |\n| Carbón | Sí | No renovable | (Poco usado en Perú, importado) |\n\n📝 REGISTRO: Los estudiantes dibujan en su cuaderno el esquema del ciclo del agua con los cambios de estado involucrados, una tabla de tipos de mezclas con ejemplos cotidianos, y un esquema de las diferencias entre masa y peso.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Estados de la materia, Mezclas, Fuerza y Movimiento, Energía Renovable\n\n💧 1. LOS ESTADOS DE LA MATERIA Y SUS CAMBIOS\n\nLa materia puede presentarse en tres estados principales, dependiendo de la temperatura y la presión.\n\n📏 SÓLIDO:\n• Forma definida (no necesita un recipiente).\n• Volumen fijo (no se comprime fácilmente).\n• Sus partículas están muy juntas y vibran en posiciones fijas.\n• Ej: hielo, roca, hierro, madera.\n\n📏 LÍQUIDO:\n• Forma variable (toma la forma del recipiente que lo contiene).\n• Volumen fijo (no se comprime fácilmente).\n• Sus partículas están más separadas que en el sólido y pueden deslizarse unas sobre otras.\n• Ej: agua, aceite, mercurio.\n\n📏 GASEOSO:\n• Forma variable (se expande hasta llenar todo el recipiente).\n• Volumen variable (se puede comprimir).\n• Sus partículas están muy separadas y se mueven a gran velocidad.\n• Ej: aire, vapor de agua, gas natural.\n\n📏 CAMBIOS DE ESTADO (al variar la temperatura):\n• FUSIÓN: Sólido → Líquido. (Hielo se derrite a 0°C).\n• SOLIDIFICACIÓN: Líquido → Sólido. (Agua se congela a 0°C).\n• EVAPORACIÓN / EBULLICIÓN: Líquido → Gas. (Evaporación: lenta en la superficie, a cualquier temperatura. Ebullición: rápida en todo el líquido, a 100°C para el agua a nivel del mar).\n• CONDENSACIÓN: Gas → Líquido. (Vapor de agua en el aire al contacto con una superficie fría forma gotitas).\n• SUBLIMACIÓN: Sólido → Gas (sin pasar por líquido). Ej: hielo seco (CO₂ sólido), naftalina. Sublimación inversa: Gas → Sólido. Ej: formación de escarcha.\n\n📏 EN LA NATURALEZA: El CICLO DEL AGUA implica todos estos cambios: evaporación del mar, condensación en nubes, precipitación (lluvia/nieve), fusión del hielo, infiltración en el suelo.\n\n🧪 2. MEZCLAS Y MÉTODOS DE SEPARACIÓN\n\n📏 MEZCLA: Unión de dos o más sustancias sin que se combinen químicamente. Cada sustancia conserva sus propiedades.\n\n📏 HOMOGÉNEA (DISOLUCIÓN): No se distinguen sus componentes a simple vista. Ej: agua salada, aire, bronce (aleación de cobre y estaño).\n\n📏 HETEROGÉNEA: Se distinguen sus componentes a simple vista o con lupa. Ej: arena y piedras, ensalada, agua y aceite.\n\n📏 MÉTODOS DE SEPARACIÓN (físicos, sin alterar la naturaleza de las sustancias):\n• TAMIZADO: Separar sólidos de diferente tamaño usando un tamiz o colador. Ej: arena y piedritas.\n• FILTRACIÓN: Separar un sólido insoluble de un líquido usando un filtro. Ej: agua con arena. El sólido queda en el papel de filtro y el líquido pasa.\n• DECANTACIÓN: Separar un líquido de un sólido sedimentado, o dos líquidos inmiscibles (que no se mezclan), vertiendo con cuidado. Ej: agua y aceite.\n• EVAPORACIÓN: Separar un sólido disuelto en un líquido evaporando el líquido. Ej: obtener sal del agua de mar.\n• IMANTACIÓN (MAGNETISMO): Separar materiales magnéticos (hierro, níquel, cobalto) de otros usando un imán. Ej: limaduras de hierro mezcladas con arena.\n\n⚡ 3. FUERZA Y MOVIMIENTO\n\n📏 ¿QUÉ ES UNA FUERZA?\nUna fuerza es toda acción capaz de modificar el estado de reposo o de movimiento de un cuerpo (acelerarlo, frenarlo, cambiar su dirección) o de deformarlo (temporal o permanentemente). Se mide en newtons (N).\n\n📏 TIPOS DE FUERZAS:\n\n🔹 FUERZA DE CONTACTO: Se ejercen tocando el cuerpo.\n• EMPUJE: Fuerza hacia adelante.\n• TRACCIÓN: Fuerza hacia atrás o que estira.\n• FRICCIÓN (ROZAMIENTO): Fuerza que se opone al movimiento entre dos superficies en contacto. Depende de la rugosidad de las superficies y del peso del objeto.\n  Beneficios: nos permite caminar sin resbalar, los frenos de un auto funcionan por fricción.\n  Perjuicios: desgasta las máquinas, reduce la eficiencia (se pierde energía en forma de calor).\n\n🔹 FUERZAS A DISTANCIA: No necesitan contacto.\n• GRAVEDAD (PESO): Fuerza de atracción que ejerce la Tierra (o cualquier planeta) sobre los objetos. Nos mantiene pegados al suelo y hace que las cosas caigan. El peso se calcula: Peso (N) = Masa (kg) × Gravedad (g ≈ 9.8 m/s² en la Tierra).\n  Importante: La masa no cambia; el peso sí depende de la gravedad. Un libro de 1 kg pesa 9.8 N en la Tierra, pero solo 1.6 N en la Luna.\n• MAGNETISMO: Fuerza de atracción o repulsión entre imanes y materiales magnéticos. Todo imán tiene un polo Norte y un polo Sur. Polos iguales se repelen; polos diferentes se atraen. El campo magnético terrestre orienta las brújulas hacia el norte.\n\n☀️ 4. ENERGÍA Y FUENTES DE ENERGÍA\n\n📏 ¿QUÉ ES LA ENERGÍA?\nLa energía es la capacidad que tiene un sistema para producir cambios o realizar trabajo. Se mide en joules (J). La energía se transforma, se conserva, pero no se crea ni se destruye (Principio de Conservación de la Energía).\n\n📏 FUENTES NO RENOVABLES: Se encuentran en la naturaleza en cantidades limitadas. Su formación tardó millones de años y se consumen más rápido de lo que se regeneran.\n• PETRÓLEO: Combustible líquido del que se obtienen gasolina, diésel, plásticos, asfalto.\n• GAS NATURAL: Combustible gaseoso usado en cocinas, calefacción e industria. Perú posee las reservas de Camisea.\n• CARBÓN: Roca combustible. Muy contaminante. Perú casi no lo produce.\n\n📏 FUENTES RENOVABLES: Se regeneran naturalmente a un ritmo igual o superior a su consumo. Son inagotables a escala humana y menos contaminantes.\n• SOLAR: Proviene del Sol. Se capta con paneles fotovoltaicos (electricidad) o colectores térmicos (calor). El Perú tiene altísima radiación solar, especialmente en la sierra sur (Arequipa, Moquegua).\n• EÓLICA: Proviene del viento. Los aerogeneradores (molinos modernos) transforman la energía cinética del viento en electricidad. Perú tiene parques eólicos en Marcona (Ica) y Cupisnique (La Libertad).\n• HIDRÁULICA: Proviene del agua de los ríos y caídas de agua. Las centrales hidroeléctricas (como la del Mantaro) usan la fuerza del agua para mover turbinas y generar electricidad. Es la principal fuente de energía eléctrica en el Perú.\n• BIOMASA: Materia orgánica (leña, residuos agrícolas, estiércol) usada como combustible. Puede ser renovable si se maneja sosteniblemente.\n• GEOTÉRMICA: Calor interno de la Tierra. Perú tiene potencial en la región volcánica del sur (Arequipa, Moquegua, Tacna).\n\n⚠️ ERRORES COMUNES:\n• Creer que el vapor de agua es visible. → El vapor de agua puro es invisible. Lo que vemos al hervir agua es vapor condensándose en pequeñas gotitas (niebla).\n• Decir que "el agua desaparece cuando hierve". → No desaparece, se transforma en vapor de agua. La masa se conserva.\n• Creer que todas las mezclas se separan fácilmente. → Las disoluciones (agua y sal) requieren métodos como evaporación, no filtración.\n• No distinguir masa y peso. → La masa se mide en kg, el peso en newtons.\n• Pensar que todos los tipos de energía son renovables. → El gas y la gasolina no lo son.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Estados de la Materia\n1. Completa la tabla:\n| Sustancia | ¿Forma fija? | ¿Volumen fijo? | Estado |\n|---|---|---|---|\n| Gaseosa en un vaso | No | Sí (el vaso) | Líquido |\n| Aire dentro de un globo | No | No | Gas |\n| Una cuchara de metal | Sí | Sí | Sólido |\n\n2. Une cada cambio de estado:\nFusión → (Sólido a Líquido)\nEbullición → (Líquido a Gas)\nSolidificación → (Líquido a Sólido)\nCondensación → (Gas a Líquido)\nSublimación → (Sólido a Gas)\n\n3. Explica con el ciclo del agua: ¿Cómo llega el agua del mar a las nubes? (Se evapora por el calor del sol). ¿Cómo se forman las gotas de lluvia? (El vapor de agua en la atmósfera se condensa al enfriarse).\n\n📝 BLOQUE 2: Mezclas\n4. Clasifica como homogénea (H) o heterogénea (He):\na) Jugo de naranja colado (H)\nb) Leche con cereales (He)\nc) Acero (aleación de hierro y carbono) (H, a nivel macroscópico)\nd) Sopa de verduras (He)\ne) Aire limpio (H)\n\n5. ¿Qué método usarías para separar?\na) Arena de piedras → (Tamizado)\nb) Agua de una infusión de té (separar las hojas) → (Filtración)\nc) Agua y aceite → (Decantación)\nd) Sal del agua de mar → (Evaporación)\ne) Clips metálicos de arena → (Imantación)\n\n📝 BLOQUE 3: Fuerza y Movimiento\n6. ¿Qué fuerza hace que:\na) Una manzana caiga del árbol? (Gravedad).\nb) Un carrito se detenga al dejar de empujarlo? (Fricción/Rozamiento).\nc) Un clip sea atraído por un imán? (Magnetismo).\nd) Una liga estirada vuelva a su forma? (Fuerza elástica).\n\n7. Verdadero o falso:\na) La masa de un objeto es la misma en la Tierra y en la Luna. (Verdadero).\nb) El peso se mide en kilogramos. (Falso, se mide en newtons. Masa en kg).\nc) El rozamiento siempre es perjudicial. (Falso, sin rozamiento no podríamos caminar ni frenar).\nd) Las fuerzas solo pueden mover objetos, no deformarlos. (Falso, también pueden deformarlos, como al aplastar una lata).\n\n8. Si pesas 30 kg en la Tierra, ¿cuánto pesas en newtons? (Peso = 30 kg × 9.8 = 294 N aproximadamente). ¿Cuál sería tu masa en la Luna? (La misma, 30 kg).\n\n📝 BLOQUE 4: Energía\n9. Clasifica las fuentes de energía en renovables (R) y no renovables (NR):\nSol (R), Petróleo (NR), Viento (R), Gas natural (NR), Carbón (NR), Agua de una cascada (R), Biomasa (R).\n\n10. ¿Por qué es mejor usar energía renovable? (Porque no se agota, contamina menos y ayuda a combatir el cambio climático).\n\n11. Menciona un lugar en el Perú donde se use energía eólica. (Parque eólico de Marcona, Ica, o Cupisnique, La Libertad).\n\n📝 BLOQUE 5: Problemas Integrados\n12. Imagina un vaso con agua, arena y sal. Describe cómo separarías los tres componentes usando métodos vistos. (Primero, filtración para separar la arena. Luego, evaporación del agua filtrada para obtener la sal sólida).\n13. Explica por qué los astronautas en la Luna pueden saltar más alto que en la Tierra. (Porque la gravedad en la Luna es menor, por lo que su peso es menor; la masa es la misma pero la fuerza que los atrae al suelo es más débil).\n\n⏱️ Tiempo estimado: 70-90 min. ✅ Revisión con demostraciones prácticas de los métodos de separación.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Seres Vivos, Tierra y Universo y Matemática\n\n🔬 CONEXIÓN CON SERES VIVOS (Ciclo IV):\n• En los ecosistemas, la materia circula (ciclos biogeoquímicos) y la energía fluye (cadena alimenticia). Ambos conceptos están ligados a la conservación de la materia y la energía.\n• La fotosíntesis es una transformación de energía luminosa en energía química.\n• Muchos seres vivos tienen adaptaciones relacionadas con la fuerza y el movimiento (alas para volar, aletas para nadar patas para correr) y con la energía (animales de sangre fría toman energía del sol).\n\n🌍 CONEXIÓN CON TIERRA Y UNIVERSO (Ciclo IV):\n• El ciclo del agua es el gran ejemplo de cambios de estado a escala planetaria.\n• La energía solar que impulsa el ciclo del agua y los vientos es la misma fuente renovable que aprovechamos con paneles y aerogeneradores.\n• La geotermia está ligada a las capas internas de la Tierra y al vulcanismo del sur peruano.\n\n🧮 CONEXIÓN CON MATEMÁTICA:\n• Medir temperaturas de fusión y ebullición con termómetro (lectura de escalas, números negativos para bajo cero).\n• Pesar objetos en balanza (masa) y medir fuerzas con dinamómetro (newtons).\n• Calcular el peso con la fórmula P = m × g (multiplicación con decimales).\n• Comparar la altura alcanzada por un carrito en diferentes superficies (noción de variable dependiente e independiente).\n\n🧩 ACTIVIDAD INTEGRADORA: "Diseño de un sistema de riego por goteo con energía solar": Los estudiantes diseñan un pequeño sistema que bombee agua (energía hidráulica) usando una celda solar (energía solar → eléctrica) para regar una maceta. Integra cambios de estado (evaporación del agua del suelo), mezclas (agua con nutrientes) y fuerzas (la bomba empuja el agua).\n\n💡 REFLEXIÓN: La materia se transforma, la energía se conserva. Comprender esto es entender las reglas más fundamentales del universo. Somos energía del sol transformada en vida.`,
            6: `🌍 CORRELACIONES EXTERNAS: Materia, Mezclas, Fuerzas y Energía en la vida real y peruana\n\n🏭 INDUSTRIA Y MINERÍA EN EL PERÚ:\n• La flotación es un método para separar minerales valiosos (cobre, oro) de la ganga usando espuma. Es una aplicación compleja de mezclas y separación.\n• La refinación del petróleo (destilación fraccionada) separa los componentes del crudo por sus diferentes puntos de ebullición.\n• Para obtener sal en las salineras de Maras (Cusco) o Huacho se usa la evaporación solar del agua de manantiales salados.\n\n🚗 TRANSPORTE:\n• Los motores de combustión interna (gasolina, diésel) convierten energía química en energía mecánica (movimiento).\n• Los frenos usan la fricción para detener el vehículo.\n• Los autos eléctricos usan baterías que almacenan energía eléctrica (cargada de fuentes que pueden ser renovables o no).\n\n🏠 EN CASA:\n• La cocina a gas usa la combustión del gas natural (energía química → calor).\n• El refrigerador extrae calor del interior y lo libera al exterior (cambios de estado del refrigerante: evaporación y condensación).\n• Al cocinar, hervimos agua (ebullición), freímos (evaporación rápida del agua de los alimentos), congelamos (solidificación).\n\n🌿 MEDIO AMBIENTE Y SOSTENIBILIDAD:\n• El cambio climático se debe principalmente a la quema de combustibles fósiles (no renovables).\n• Perú tiene un enorme potencial para energías renovables aún no explotado en su totalidad.\n• La energía solar en las zonas rurales de la sierra sur puede llevar electricidad a comunidades que no están conectadas a la red nacional.\n\n🧠 REFLEXIÓN FINAL: "Entender cómo se comporta la materia y la energía nos permite usar los recursos del planeta de manera inteligente y sostenible. Cada vez que ahorras agua, apagas una luz o reciclas, estás aplicando estos principios para proteger el único hogar que tenemos."\n\n🗣️ CITA: "La energía no se crea ni se destruye, solo se transforma." — Principio de Conservación de la Energía.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Feria Científica de la Materia, la Fuerza y la Energía"\n\n🎯 OBJETIVO: Organizar una feria científica donde cada equipo diseñe y presente un experimento o demostración interactiva sobre estados de la materia, mezclas, fuerzas o energía renovable, explicando el principio científico a los visitantes.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ELECCIÓN DEL EXPERIMENTO (1 sesión)\n• 5 equipos temáticos:\n  - Equipo "Cambios de Estado": Experimento con hielo seco (sublimación) o con agua y sal para bajar el punto de congelación.\n  - Equipo "Separadores de Mezclas": Demostración de filtración, decantación e imantación con muestras reales.\n  - Equipo "Fuerzas Mágicas": Carrera de carritos en diferentes superficies para mostrar fricción; pesas en dinamómetro para mostrar peso.\n  - Equipo "Energía Solar": Cocina solar casera (caja con papel aluminio) que derrite un chocolate o calienta agua.\n  - Equipo "Energía Eólica": Molinillos de viento de papel que encienden un pequeño LED con un dinamo.\n\nFASE 2: INVESTIGACIÓN Y DISEÑO (1 sesión)\n• Cada equipo investiga el principio científico detrás de su experimento.\n• Preparan un cartel con título, materiales, procedimiento, explicación científica e ilustraciones.\n• Ensayan el experimento.\n\nFASE 3: LA FERIA (1 sesión)\n• Se invita a otros salones y padres de familia.\n• Los equipos realizan su demostración frente a grupos pequeños de visitantes que van rotando.\n• Explican el "por qué" del experimento con lenguaje claro.\n• Los visitantes pueden hacer preguntas.\n\nFASE 4: EVALUACIÓN Y CIERRE (1 sesión)\n• Los visitantes votaron por el experimento más impactante, el mejor explicado y el más creativo.\n• Plenaria: ¿Qué fue lo más difícil de explicar? ¿Qué aprendieron sobre ciencia al preparar la feria? ¿Cómo se sintieron siendo "científicos"?\n• Diplomas de "Científico de Feria".\n\n🏆 EVALUACIÓN: Corrección científica, claridad de la explicación, creatividad del experimento, calidad del cartel, trabajo en equipo.\n🎉 CIERRE: "La ciencia no se lee, se vive. La feria nos demostró que todos podemos ser científicos."`,

            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 3° y 4° grado de primaria las competencias relacionadas con el conocimiento del Sistema Solar, la estructura interna de la Tierra y el ciclo del agua, fomentando la observación astronómica, la comprensión de los fenómenos geológicos y la valoración del agua como recurso esencial para la vida.\n\n🎯 OBJETIVOS PARTICULARES:\n• Identificar los componentes del Sistema Solar: el Sol, los ocho planetas (Mercurio, Venus, Tierra, Marte, Júpiter, Saturno, Urano, Neptuno), los planetas enanos, los asteroides y los cometas.\n• Distinguir entre planetas rocosos (interiores) y planetas gaseosos (exteriores).\n• Comprender los movimientos de la Tierra: rotación (día y noche) y traslación (estaciones del año).\n• Describir la estructura interna de la Tierra: núcleo (interno y externo), manto (inferior y superior) y corteza (continental y oceánica).\n• Identificar las principales capas de la atmósfera terrestre.\n• Comprender el ciclo del agua (ciclo hidrológico) como un proceso continuo que conecta los océanos, la atmósfera, la tierra y los seres vivos.\n• Identificar las etapas del ciclo del agua: evaporación, transpiración, condensación, precipitación, infiltración, escorrentía.\n• Reconocer al Sol como el motor principal del ciclo del agua.\n• Valorar la importancia del agua dulce como recurso limitado y la necesidad de su conservación.\n\n📌 NOCIONES PRINCIPALES:\n• Sistema Solar: Sol (estrella), planetas (8), satélites naturales, cinturón de asteroides, cometas.\n• Planetas rocosos (Mercurio, Venus, Tierra, Marte) y gaseosos (Júpiter, Saturno, Urano, Neptuno).\n• Movimientos de la Tierra: rotación (24h → día y noche) y traslación (365 días → año, junto con la inclinación del eje produce las estaciones).\n• Capas de la Tierra: corteza (sólida, fina), manto (sólido pero con zonas semifluidas), núcleo externo (líquido), núcleo interno (sólido).\n• Ciclo del agua: evaporación, condensación, precipitación, infiltración, escorrentía, transpiración.\n\n📌 NOCIONES SECUNDARIAS:\n• La Luna y sus fases. Eclipses solares y lunares.\n• Placas tectónicas (la corteza terrestre está fragmentada y se mueve lentamente).\n• Volcanes y terremotos como manifestaciones de la energía interna de la Tierra.\n• Acuíferos y aguas subterráneas como reservas de agua dulce.\n• Contaminación del agua y acciones para su cuidado.\n\n🌍 INTERESES SOCIETALES:\n• Conocer el Sistema Solar alimenta la curiosidad por el universo y la exploración espacial.\n• Entender que la Tierra es un planeta dinámico, con un interior caliente y activo, explica la ocurrencia de terremotos y volcanes, fenómenos presentes en el Perú por estar en el Cinturón de Fuego del Pacífico.\n• El ciclo del agua es vital para el abastecimiento de agua potable. Comprenderlo es el primer paso para valorarla y usarla responsablemente.\n• El cambio climático está alterando el ciclo del agua; conocerlo permite entender las sequías, inundaciones y otros fenómenos extremos.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Viaje por el Sistema Solar, el interior de la Tierra y el viaje de una gota de agua"\n\n🧩 MATERIALES: Bolas de tecnopor o plastilina de diferentes tamaños para hacer los planetas, pinturas, hilo para colgarlos, linterna, globo terráqueo, huevo duro (para simular capas de la Tierra), plastilina de colores, recipiente transparente, film plástico, piedras pequeñas, agua, calor (lámpara o sol), mapas del Perú con zonas sísmicas y volcánicas.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Construye el Sistema Solar a escala" – Con bolas de tecnopor y plastilina, los estudiantes crean los ocho planetas respetando los tamaños relativos (aunque no las distancias, que son enormes). Pintan a Júpiter con sus franjas, Saturno con sus anillos, la Tierra azul y verde. Los cuelgan en orden desde el Sol. Discuten: ¿Cuáles son rocosos y cuáles gaseosos? ¿Dónde está el cinturón de asteroides?\n\nESTACIÓN 2: "El huevo terrestre" – Se pela un huevo duro y se corta por la mitad con cuidado. Los estudiantes observan: la cáscara delgada (corteza), la clara (manto) y la yema (núcleo). Con plastilina, modelan un corte de la Tierra con sus capas a escala, etiquetando núcleo interno (sólido, caliente), núcleo externo (líquido), manto (roca caliente y semifluida) y corteza (capa fina y rígida).\n\nESTACIÓN 3: "El ciclo del agua en un frasco" – En un recipiente transparente grande, colocan piedras y un poco de agua (simulando un lago). Cubren la abertura con film plástico y colocan una piedrita en el centro. Ponen el frasco al sol o bajo una lámpara. Al cabo de un rato, observan: el agua se evapora, se condensa en el plástico y las gotas "llueven" hacia el centro. Es un modelo en miniatura del ciclo del agua.\n\nESTACIÓN 4: "Localizando volcanes y terremotos en el Perú" – Sobre un mapa del Perú, marcan con alfileres de colores los principales volcanes activos (Ubinas, Misti, Sabancaya) y las zonas donde ocurren más terremotos (costa central y sur). Relacionan con el Cinturón de Fuego del Pacífico. Preguntan: ¿Por qué en el Perú tiembla tanto? (Porque la placa de Nazca se hunde bajo la placa Sudamericana).\n\n💬 REFLEXIÓN EN PLENARIA: ¿Qué planeta te gustaría visitar y por qué? ¿Cómo sabemos qué hay dentro de la Tierra si no podemos ir hasta el centro? ¿De dónde viene el agua que tomamos? ¿Por qué es importante cuidarla si parece que nunca se acaba?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Del modelo a la comprensión del cosmos y nuestro planeta"\n\n📊 OBSERVACIÓN GUIADA: COMPARANDO LOS PLANETAS\nLa docente prepara una tabla con los datos de los planetas y los estudiantes la completan con imágenes y características:\n\n| Planeta | Tipo | Distancia al Sol (millones de km) | Tamaño relativo | ¿Tiene anillos? | ¿Tiene lunas? | Curiosidad |\n|---|---|---|---|---|---|\n| Mercurio | Rocoso | 58 | Pequeño | No | 0 | El más cercano al Sol, sin atmósfera |\n| Venus | Rocoso | 108 | Similar a la Tierra | No | 0 | El más caliente por efecto invernadero |\n| Tierra | Rocoso | 150 | Mediano | No | 1 | Nuestro hogar, con agua líquida y vida |\n| Marte | Rocoso | 228 | Pequeño | No | 2 | El "planeta rojo", con el volcán más grande del sistema solar (Monte Olimpo) |\n| Júpiter | Gaseoso | 778 | Gigante | Sí | 95 | El más grande, Gran Mancha Roja |\n| Saturno | Gaseoso | 1430 | Gigante | Sí | 146 | Anillos espectaculares |\n| Urano | Gaseoso | 2870 | Gigante | Sí | 27 | Gira "acostado" |\n| Neptuno | Gaseoso | 4500 | Gigante | Sí | 16 | El más lejano, vientos más rápidos |\n\nConclusión guiada: "Los cuatro planetas más cercanos al Sol son rocosos, pequeños y densos. Los cuatro más lejanos son gigantes gaseosos, con anillos y muchas lunas".\n\n📊 OBSERVACIÓN GUIADA: CAPAS DE LA TIERRA\nSe dibuja un círculo concéntrico en la pizarra:\n| Capa | Subcapa | Espesor | Estado | Temperatura | Composición |\n|---|---|---|---|---|---|\n| Corteza | Continental/Oceánica | 5-70 km | Sólida | Ambiente | Rocas (granito, basalto) |\n| Manto | Superior/Inferior | 2900 km | Sólido (pero semifluido en zonas) | 1000-3700°C | Silicatos, magma |\n| Núcleo externo | — | 2200 km | Líquido | 4000-5000°C | Hierro y níquel fundidos |\n| Núcleo interno | — | 1200 km | Sólido | >5000°C | Hierro y níquel sólidos (por presión) |\n\nConclusión: "La Tierra es como un huevo gigante: cáscara fina (corteza), clara espesa (manto) y yema (núcleo). El núcleo externo líquido genera el campo magnético que nos protege".\n\n📊 OBSERVACIÓN GUIADA: CICLO DEL AGUA\nA partir del experimento del frasco, los estudiantes identifican las etapas y las relacionan con la naturaleza:\n• El calor del sol/lámpara evapora el agua → EVAPORACIÓN en el mar, ríos, lagos.\n• Las plantas también liberan vapor → TRANSPIRACIÓN.\n• El vapor sube y al encontrar el plástico frío se condensa → CONDENSACIÓN en la atmósfera formando nubes.\n• Las gotas crecen y caen → PRECIPITACIÓN (lluvia, nieve, granizo).\n• El agua que cae se filtra en el suelo → INFILTRACIÓN (va a las aguas subterráneas).\n• El agua que corre por la superficie → ESCORRENTÍA (forma ríos que vuelven al mar).\n\nConclusión: "El ciclo del agua es un proceso continuo movido por la energía del sol. El agua no se pierde, solo cambia de lugar y de estado".\n\n📝 REGISTRO: Los estudiantes dibujan en su cuaderno el Sistema Solar con los nombres de los planetas; un esquema de las capas de la Tierra con sus características; y un diagrama etiquetado del ciclo del agua.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: El Sistema Solar, las Capas de la Tierra y el Ciclo del Agua\n\n☀️ 1. EL SISTEMA SOLAR\n\nEl Sistema Solar está formado por el Sol (nuestra estrella) y todos los cuerpos que giran a su alrededor por la fuerza de gravedad.\n\n📏 EL SOL:\n• Es una estrella de tamaño mediano compuesta principalmente de hidrógeno y helio.\n• En su interior ocurren reacciones de fusión nuclear que liberan enormes cantidades de energía en forma de luz y calor.\n• Contiene el 99.86% de la masa de todo el Sistema Solar.\n \n📏 LOS OCHO PLANETAS (en orden desde el Sol):  \n\n🔹 PLANETAS ROCOSOS O INTERIORES (pequeños, densos, superficie sólida):\n• MERCURIO: El más pequeño y cercano al Sol. Sin atmósfera, temperaturas extremas (-180°C a 430°C). Cráteres como la Luna. No tiene lunas.\n• VENUS: Similar en tamaño a la Tierra. Su espesa atmósfera de CO₂ produce un intenso efecto invernadero, haciéndolo el planeta más caliente (460°C). Gira al revés. No tiene lunas.\n• TIERRA: El único planeta conocido con vida. Agua líquida en abundancia, atmósfera con oxígeno, temperatura moderada. Un satélite: la Luna.\n• MARTE: "Planeta rojo" por el óxido de hierro en su suelo. Tiene el volcán más grande del Sistema Solar (Monte Olimpo, 21 km de altura). Dos pequeñas lunas: Fobos y Deimos.\n\n🔹 PLANETAS GASEOSOS O EXTERIORES (gigantes, predominantemente gas y hielo):\n• JÚPITER: El más grande (1,300 Tierras cabrían en él). Tiene la Gran Mancha Roja, una tormenta más grande que la Tierra que dura siglos. 95 lunas conocidas (Ío, Europa, Ganimedes, Calisto son las galileanas).\n• SATURNO: Famoso por sus impresionantes anillos hechos de hielo y roca. Es el menos denso de todos; flotaría en agua. Tiene 146 lunas confirmadas, incluyendo Titán.\n• URANO: Gira "acostado" (su eje está casi horizontal). Es un gigante de hielo (metano en su atmósfera le da color azul verdoso). Tiene anillos tenues y 27 lunas.\n• NEPTUNO: El más lejano. Vientos más rápidos del Sistema Solar (2,100 km/h). Color azul intenso por el metano. 16 lunas, incluyendo Tritón.\n\n📏 OTROS CUERPOS:\n• Planetas enanos: Plutón (antes considerado noveno planeta), Ceres, Eris, Makemake, Haumea.\n• Cinturón de asteroides entre Marte y Júpiter.\n• Cometas: bolas de hielo y polvo que desarrollan cola al acercarse al Sol.\n\n📏 MOVIMIENTOS DE LA TIERRA:\n• ROTACIÓN: Giro sobre su propio eje. Dura 24 horas. Produce el día y la noche.\n• TRASLACIÓN: Giro alrededor del Sol. Dura 365 días y 6 horas (año), por eso cada 4 años hay año bisiesto. La inclinación del eje terrestre (23.5°) causa las estaciones.\n\n🌍 2. ESTRUCTURA INTERNA DE LA TIERRA\n\nLa Tierra no es una bola sólida uniforme; está formada por capas concéntricas con diferentes propiedades.\n\n📏 LAS CAPAS:\n\n🔹 CORTEZA:\n• La capa más externa y delgada (5-70 km).\n• Corteza continental: forma los continentes, espesor 30-70 km, compuesta de granito.\n• Corteza oceánica: bajo los océanos, espesor 5-10 km, compuesta de basalto.\n• Está fragmentada en PLACAS TECTÓNICAS que flotan sobre el manto y se mueven lentamente.\n\n🔹 MANTO:\n• Capa más gruesa (2,900 km).\n• Compuesto de rocas ricas en silicatos de hierro y magnesio.\n• Manto superior: incluye la astenosfera, una zona semifluida donde se genera el magma.\n• Manto inferior: sólido pero bajo enorme presión y temperatura.\n• La convección en el manto es el motor del movimiento de las placas.\n\n🔹 NÚCLEO:\n• Núcleo externo: líquido, compuesto de hierro y níquel fundidos. Su movimiento genera el campo magnético terrestre.\n• Núcleo interno: sólido a pesar de temperaturas superiores a 5000°C, debido a la presión extrema. Es una esfera de hierro y níquel del tamaño de la Luna.\n\n📏 FENÓMENOS GEOLÓGICOS EN EL PERÚ:\n• Perú está en el CINTURÓN DE FUEGO DEL PACÍFICO, zona de intensa actividad sísmica y volcánica.\n• La placa de Nazca (oceánica) se hunde (subduce) bajo la placa Sudamericana (continental), causando terremotos y formando la cordillera de los Andes.\n• Volcanes activos en Perú: Ubinas (Moquegua), Misti (Arequipa), Sabancaya (Arequipa), Huaynaputina (Moquegua, erupción en 1600 fue una de las más grandes de la historia).\n\n💧 3. EL CICLO DEL AGUA\n\nEl agua en la Tierra circula continuamente entre los océanos, la atmósfera, la tierra y los seres vivos. Este movimiento perpetuo se llama ciclo del agua o ciclo hidrológico.\n\n📏 ETAPAS PRINCIPALES:\n\n1. EVAPORACIÓN: El calor del Sol convierte el agua superficial (océanos, mares, ríos, lagos) en vapor de agua, que asciende a la atmósfera.\n2. TRANSPIRACIÓN: Las plantas absorben agua del suelo y la liberan en forma de vapor por sus hojas. Juntos se denomina evapotranspiración.\n3. CONDENSACIÓN: El vapor de agua asciende y al enfriarse forma pequeñas gotitas que se agrupan, formando nubes.\n4. PRECIPITACIÓN: Cuando las gotitas de agua en las nubes se hacen demasiado grandes y pesadas, caen por gravedad en forma de lluvia, nieve (en alturas) o granizo.\n5. INFILTRACIÓN: Parte del agua que cae se filtra a través del suelo y las rocas, recargando las aguas subterráneas o acuíferos.\n6. ESCORRENTÍA: El agua que no se infiltra fluye sobre la superficie formando arroyos, quebradas y ríos, que finalmente la devuelven al mar.\n\n📏 EL SOL COMO MOTOR:\nEl ciclo del agua no funcionaría sin la energía solar, que proporciona el calor necesario para la evaporación.\n\n📏 AGUA DULCE COMO RECURSO LIMITADO:\n• El 97.5% del agua de la Tierra es salada (océanos).\n• Solo el 2.5% es agua dulce, y de ese porcentaje, la mayor parte está congelada en glaciares y casquetes polares (≈68.7%), una gran parte es agua subterránea (≈30.1%), y solo un 0.3% se encuentra en ríos, lagos y humedales.\n• Por eso, el agua dulce accesible es un recurso escaso y valioso.\n\n⚠️ ERRORES COMUNES:\n• Creer que el Sol es un planeta. → Es una estrella.\n• Decir que hay 9 planetas. → Plutón fue reclasificado como planeta enano en 2006.\n• Pensar que el manto es un mar de lava líquida. → Es mayormente sólido, pero con zonas semifluidas.\n• Creer que el agua "nueva" llega del espacio. → La cantidad total de agua en la Tierra es casi constante; solo se recicla.\n• No distinguir el ciclo del agua del recorrido del agua potable (captación → tratamiento → distribución).`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: El Sistema Solar\n1. Escribe en orden los planetas desde el Sol: (Mercurio, Venus, Tierra, Marte, Júpiter, Saturno, Urano, Neptuno).\n2. ¿Cuál es la diferencia entre un planeta rocoso y uno gaseoso? Da 2 ejemplos de cada uno.\n(Rocosos: Mercurio, Venus, Tierra, Marte. Gaseosos: Júpiter, Saturno, Urano, Neptuno).\n3. ¿Por qué Plutón ya no se considera un planeta? (Porque es muy pequeño y no ha "limpiado" su órbita de otros objetos. Pertenece a la categoría de planetas enanos).\n4. Explica con tus palabras: ¿Qué causa el día y la noche? (La rotación de la Tierra). ¿Y las estaciones? (La inclinación del eje terrestre combinada con la traslación).\n\n📝 BLOQUE 2: Capas de la Tierra\n5. Dibuja y etiqueta las capas internas de la Tierra.\n6. Completa:\na) La capa más externa y delgada es la ________________ (corteza).\nb) La capa más caliente y central es el ________________ (núcleo interno).\nc) El manto está compuesto de ________________ (rocas silicatadas) y tiene zonas semifluidas.\nd) El campo magnético terrestre lo genera el ________________ (núcleo externo líquido).\n7. ¿Por qué hay terremotos en el Perú? (Porque la placa de Nazca choca y se hunde bajo la placa Sudamericana en la costa peruana, liberando energía en forma de sismos. El Perú está en el Cinturón de Fuego del Pacífico).\n\n📝 BLOQUE 3: El Ciclo del Agua\n8. Ordena las etapas del ciclo del agua: (1. Evaporación, 2. Condensación, 3. Precipitación, 4. Infiltración/Escorrentía).\n9. Relaciona:\nEvaporación → (Agua líquida se convierte en vapor).\nCondensación → (Vapor se convierte en gotitas formando nubes).\nPrecipitación → (Caída de agua en forma de lluvia, nieve o granizo).\nInfiltración → (Agua que penetra en el suelo y recarga acuíferos).\n\n10. Explica por qué el agua de los océanos es salada pero la lluvia es agua dulce. (Al evaporarse, el agua deja las sales. El vapor es agua pura. Al condensarse y precipitar, el agua es dulce).\n\n📝 BLOQUE 4: Problemas y Desafíos\n11. Si el Sol dejara de brillar, ¿qué pasaría con el ciclo del agua? (Se detendría la evaporación, no se formarían nubes, no habría precipitación, y el ciclo se interrumpiría. La vida en la Tierra se extinguiría).\n12. ¿Por qué los científicos dicen que el agua que tomamos hoy pudo haber sido bebida por un dinosaurio? (Porque el agua en la Tierra se recicla constantemente a través del ciclo hidrológico; las moléculas de agua han existido por millones de años y han pasado por incontables ciclos).\n13. Imagina que vives en una zona sin acceso a agua potable. ¿Cómo usarías una bolsa de plástico y una planta para obtener agua? (Envuelves ramas con hojas de la planta en la bolsa y la cierras. El sol evapora el agua de las hojas (transpiración) que se condensa en la bolsa y se puede recolectar. Es un destilador solar improvisado).\n\n⏱️ Tiempo estimado: 70-90 min. ✅ Corrección grupal con globo terráqueo y linterna para reforzar rotación/traslación.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Seres Vivos, Materia y Energía y Matemática\n\n🔬 CONEXIÓN CON SERES VIVOS (Ciclo IV):\n• Los ecosistemas dependen del ciclo del agua: determina la vegetación de una zona y, por tanto, la fauna.\n• Las plantas, a través de la transpiración, contribuyen activamente al ciclo del agua.\n• Los humedales, los manglares y los glaciares son componentes clave del ciclo del agua y hábitats de gran biodiversidad.\n\n🔬 CONEXIÓN CON MATERIA Y ENERGÍA (Ciclo IV):\n• El ciclo del agua es un gran ejemplo de cambios de estado de la materia a escala planetaria.\n• La energía solar es el motor del ciclo del agua, así como de los vientos (energía eólica) y las olas.\n• El interior caliente de la Tierra (energía geotérmica) es responsable del movimiento de las placas tectónicas.\n• La fuerza de gravedad explica por qué los planetas orbitan el Sol, por qué la Luna orbita la Tierra y por qué la lluvia cae al suelo.\n\n🧮 CONEXIÓN CON MATEMÁTICA:\n• Comparar tamaños relativos de los planetas (proporciones).\n• Utilizar escalas para representar el Sistema Solar (ej: 1 cm = 1,000 km).\n• Medir la cantidad de agua evaporada o precipitada en un experimento (ml).\n• Líneas de tiempo geológico (millones de años) para la formación de la Tierra y la deriva continental.\n\n🧩 ACTIVIDAD INTEGRADORA: "Meteorólogos y astrónomos en el aula": Durante una semana, los estudiantes registran la temperatura, la nubosidad y las precipitaciones (ciclo del agua en acción) y, al mismo tiempo, la fase de la Luna y los planetas visibles al amanecer o atardecer. Integran Tierra y Universo en un diario de observación.\n\n💡 REFLEXIÓN: La Tierra es un sistema complejo donde todo está conectado: el Sol mueve el agua y los vientos, el calor interno mueve los continentes, y toda esta dinámica crea los paisajes y climas que albergan la vida. Somos polvo de estrellas viviendo en un planeta maravilloso.`,
            6: `🌍 CORRELACIONES EXTERNAS: El Sistema Solar, la Tierra y el agua en la vida real\n\n🔭 ASTRONOMÍA EN EL PERÚ:\n• Las culturas preincas e incas fueron observadores del cielo. El observatorio de Chankillo (Casma, Ancash) es el más antiguo de América (siglo IV a.C.) y es Patrimonio de la Humanidad.\n• En el Cusco, los incas alinearon sus construcciones con los solsticios y equinoccios.\n• Hoy, el Perú tiene observatorios astronómicos modernos en Arequipa y Moquegua, aprovechando los cielos más limpios del mundo.\n\n🌋 TERREMOTOS Y VOLCANES:\n• El terremoto de 1970 en Áncash (el más destructivo en la historia del Perú) sepultó la ciudad de Yungay.\n• Los volcanes del sur (Misti, Ubinas) son monitoreados constantemente para prevenir desastres.\n• La energía geotérmica de estas zonas volcánicas podría ser una fuente renovable en el futuro.\n\n💧 AGUA Y VIDA COTIDIANA:\n• Lima es la segunda capital más grande del mundo ubicada en un desierto. Depende de los glaciares andinos que alimentan los ríos Rímac, Chillón y Lurín.\n• El cambio climático está derritiendo los glaciares andinos, amenazando el suministro de agua a largo plazo.\n• En muchas zonas rurales del Perú, las mujeres y los niños caminan horas para recoger agua. Cuidarla es un acto de justicia.\n\n🧑‍🚀 EXPLORACIÓN ESPACIAL PERUANA:\n• El Perú ha lanzado nanosatélites (Chasqui I, UAPSAT) construidos por universidades peruanas.\n• La Agencia Espacial del Perú (CONIDA) promueve la investigación espacial.\n\n🧠 REFLEXIÓN FINAL: "Somos la primera generación que sabe con certeza cómo funciona el Sistema Solar, el interior de la Tierra y el ciclo del agua. Con ese conocimiento viene una responsabilidad: proteger nuestro planeta, usar sabiamente sus recursos y explorar el universo con humildad y asombro."\n\n🗣️ CITA: "Mira a las estrellas y no a tus pies. Intenta dar sentido a lo que ves y pregúntate qué hace que el universo exista. Sé curioso." — Stephen Hawking.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Planetario, Volcán y Destilador: Tres proyectos para una Feria"\n\n🎯 OBJETIVO: Los estudiantes, divididos en equipos, construirán tres tipos de proyectos para una feria: un modelo del Sistema Solar en 3D, un modelo de volcán en erupción (que muestra el interior terrestre) y un destilador solar casero que demuestre el ciclo del agua. Cada equipo presentará su proyecto explicando los principios científicos.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ASIGNACIÓN DE PROYECTOS Y DISEÑO (1 sesión)\n• Equipo 1: "Sistema Solar en 3D": Construirán un móvil colgante del Sistema Solar con planetas a escala de tamaño (no de distancia). Incluirán etiquetas con el nombre, tipo de planeta, número de lunas y una curiosidad.\n• Equipo 2: "El Volcán de la Tierra": Construirán un volcán con papel maché o plastilina sobre una botella. Dentro de la botella, harán una "erupción" con bicarbonato, vinagre y colorante rojo (reacción química inocua que simula la lava, pero no es una reacción real de volcán; se deberá explicar la diferencia). En el exterior, pintarán las capas de la Tierra en un corte.\n• Equipo 3: "Destilador Solar": Construirán un destilador solar con un recipiente, agua salada, un vaso pequeño en el centro y film plástico. Lo expondrán al sol para obtener agua dulce. Explicarán cómo funciona y su relación con el ciclo del agua y como solución en zonas sin agua potable.\n\nFASE 2: CONSTRUCCIÓN Y PREPARACIÓN DE CARTELES (2 sesiones)\n• Construyen los proyectos.\n• Preparan un cartel científico con: título, materiales, procedimiento, explicación científica y aplicación en la vida real.\n\nFASE 3: ENSAYO (1 sesión)\n• Ensayan la explicación para los visitantes.\n• Prueban el proyecto para asegurarse de que funciona.\n\nFASE 4: FERIA "TIERRA Y UNIVERSO" (1 sesión)\n• Abren las puertas a otros salones y padres.\n• Los visitantes recorren los tres stands.\n• Los estudiantes explican cada proyecto.\n\nFASE 5: CIERRE Y REFLEXIÓN (1 sesión)\n• Plenaria: ¿Qué fue lo que más les sorprendió aprender? ¿Qué fue lo más difícil de construir? ¿Cómo se relacionan los tres proyectos (Sistema Solar, Tierra y Agua) en la vida real?\n• Diplomas de "Embajador de la Tierra y el Espacio".\n\n🏆 EVALUACIÓN: Fidelidad científica del modelo, claridad de la explicación, creatividad, trabajo en equipo.\n🎉 CIERRE: "Hoy no solo aprendimos sobre el universo y nuestro planeta; aprendimos que nosotros también podemos ser constructores y divulgadores de la ciencia."`,
