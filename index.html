const leccionExtensaNumIV = {
    0: `🎯 OBJETIVO GENERAL: Consolidar en los estudiantes de 3° y 4° grado de primaria el dominio de los números naturales, la comprensión del concepto de fracción y número decimal, así como la habilidad para resolver operaciones combinadas, desarrollando el razonamiento lógico-matemático y la capacidad de aplicar estos conocimientos en situaciones cotidianas y escolares.\n\n🎯 OBJETIVOS PARTICULARES:\n• Leer, escribir y ordenar números naturales hasta la decena de millar (99 999).\n• Comprender el concepto de fracción como parte de un todo, como reparto y como cociente.\n• Identificar y representar fracciones propias, impropias y equivalentes.\n• Sumar y restar fracciones homogéneas.\n• Reconocer los décimos y centésimos como expresiones decimales.\n• Convertir fracciones decimales a números decimales y viceversa.\n• Resolver operaciones combinadas de adición, sustracción, multiplicación y división con y sin paréntesis, respetando la jerarquía de operaciones.\n• Resolver problemas de la vida cotidiana que involucren números naturales, fracciones y decimales.\n\n📌 NOCIONES PRINCIPALES:\n• Número natural, valor posicional, decena de millar, unidad de millar.\n• Fracción, numerador, denominador, fracción propia, impropia, equivalente, número mixto.\n• Suma y resta de fracciones homogéneas.\n• Número decimal, décimo (0.1), centésimo (0.01).\n• Operaciones combinadas, jerarquía: paréntesis → multiplicación/división → adición/sustracción.\n\n📌 NOCIONES SECUNDARIAS:\n• Comparación de fracciones con igual denominador o igual numerador.\n• Fracciones en la recta numérica.\n• Amplificación y simplificación de fracciones.\n• Adición y sustracción de números decimales.\n• Propiedades de las operaciones (conmutativa, asociativa, distributiva).\n\n🌍 INTERESES SOCIETALES:\n• Las fracciones aparecen al repartir una pizza, una torta o una herencia; entenderlas permite actuar con equidad.\n• Los números decimales son esenciales en el manejo del dinero (céntimos) y en las medidas de longitud, peso y capacidad.\n• Saber resolver operaciones combinadas desarrolla el pensamiento ordenado, útil para cualquier situación donde se requiera seguir una secuencia lógica.`,
    1: `🔍 ACTIVIDAD DE DESCUBIERTA: "El Bazar Matemático"\n\n🧩 MATERIALES: Billetes y monedas didácticas, catálogos de productos con precios, regletas de fracciones, círculos fraccionados, cintas de papel para dividir, envases con medidas decimales, dados, tarjetas con operaciones.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Reparte y fracciona" – Con 3 tortas circulares de papel, los niños deben repartirlas equitativamente entre 4, 6 y 8 personas. Recortan y pegan las porciones. Registran la fracción que le toca a cada uno: 3/4, 3/6 = 1/2, 3/8. Descubren que 3/6 = 1/2 (fracciones equivalentes).\n\nESTACIÓN 2: "Precios con decimales" – Se muestran productos con precios como S/2.50, S/1.75, S/3.20. Con monedas didácticas, los niños representan cada precio usando monedas de 1 sol, 50 céntimos, 20 céntimos, 10 céntimos. Asocian S/0.50 = 50 céntimos = 50/100 de sol.\n\nESTACIÓN 3: "Operaciones encadenadas" – Con dados de 10 caras, cada equipo genera 3 números (ej: 8, 3, 5) y 2 operaciones (suma, multiplicación). Deben encontrar el resultado correcto y comparar con otros equipos. Discuten: ¿Dio lo mismo sumar primero y luego multiplicar? Introducción intuitiva a la jerarquía.\n\nESTACIÓN 4: "La cinta decimal" – Se entregan cintas de 1 metro divididas en 10 partes iguales (cada parte = 1 décimo = 0.1 m). Miden objetos del aula y expresan la medida como fracción y como decimal (ej: 3 décimos = 3/10 m = 0.3 m = 30 cm).\n\n💬 REFLEXIÓN EN PLENARIA: ¿Qué es más justo: repartir con fracciones o adivinar? ¿Dónde vemos decimales en la vida diaria? ¿Importa el orden de las operaciones?`,
    2: `🧠 ACTIVIDAD INDUCTIVA: "De la fracción al decimal y del desorden al orden"\n\n📊 OBSERVACIÓN GUIADA: FRACCIONES EQUIVALENTES\nLa docente muestra un rectángulo dividido en 2 partes (1/2 sombreada), otro dividido en 4 partes (2/4 sombreadas), otro en 8 partes (4/8 sombreadas). Los estudiantes comparan el área sombreada: en todos los casos es la misma superficie.\n\nPaso 1: Observan que 1/2 = 2/4 = 4/8. ¿Qué operación transforma 1/2 en 2/4? Multiplicar numerador y denominador por 2.\nPaso 2: También pueden simplificar: 4/8 → dividir ambos entre 4 → 1/2.\nConclusión guiada: "Dos fracciones son equivalentes si al multiplicar o dividir numerador y denominador por el mismo número, se obtiene la otra".\n\n📊 OBSERVACIÓN GUIADA: FRACCIÓN → DECIMAL\nSe completa una tabla:\n| Fracción | Denominador 10 | Denominador 100 | Decimal |\n|---|---|---|---|\n| 1/2 | 5/10 | 50/100 | 0.5 = 0.50 |\n| 1/4 | 2.5/10 → 25/100 | 25/100 | 0.25 |\n| 3/5 | 6/10 | 60/100 | 0.6 = 0.60 |\n\nConclusión: "Para convertir una fracción a decimal, buscamos una fracción equivalente con denominador 10 o 100. El número de ceros indica cuántos decimales tendrá".\n\n📊 OBSERVACIÓN GUIADA: JERARQUÍA DE OPERACIONES\nSe proponen dos problemas:\nCaso A: 3 + 4 × 2. Unos calculan (3+4)×2 = 14, otros 3+(4×2) = 11. ¿Cuál es correcto? Se representa con situaciones reales: "Compro 4 paquetes de galletas a S/2 cada uno y además pago S/3 de pasaje. Total: 4×2 + 3 = 11". Se concluye que la multiplicación tiene prioridad.\n\nCaso B: (3+4) × 2. Los paréntesis indican que primero se resuelve lo de adentro: 7×2 = 14.\n\nRegla descubierta: 1° Paréntesis, 2° Multiplicación/División, 3° Adición/Sustracción.\n\n📝 REGISTRO: Los estudiantes crean un organizador visual con ejemplos propios.`,
    3: `📐 TRANSMISIÓN CONCEPTUAL: Números Naturales, Fracciones, Decimales y Operaciones Combinadas\n\n🔢 1. NÚMEROS NATURALES HASTA 99 999\n\n📏 VALOR POSICIONAL:\n| DM (decena de millar) | UM (unidad de millar) | C (centena) | D (decena) | U (unidad) |\n|---|---|---|---|---|\n| 10 000 | 1 000 | 100 | 10 | 1 |\n\nEjemplo: 38 527 = 3 DM + 8 UM + 5 C + 2 D + 7 U = 30 000 + 8 000 + 500 + 20 + 7.\n\n📏 COMPARACIÓN Y ORDEN: Se compara primero la cantidad de cifras; si tienen igual número de cifras, se compara dígito por dígito desde la izquierda.\n\n🧩 2. FRACCIONES\n\n📏 CONCEPTO: Una fracción representa una o varias partes iguales de una unidad. a/b → a: numerador (partes que se toman), b: denominador (partes totales en que se divide la unidad).\n\n📏 TIPOS:\n• Propia: numerador < denominador (3/4, 2/5). Vale menos de 1.\n• Impropia: numerador > denominador (7/4, 9/5). Vale más de 1. Se puede expresar como número mixto: 7/4 = 1 3/4.\n• Igual a la unidad: numerador = denominador (5/5 = 1).\n• Equivalente: representan la misma cantidad (1/2 = 2/4 = 4/8).\n\n📏 SUMA Y RESTA DE FRACCIONES HOMOGÉNEAS (igual denominador):\nSe suman o restan los numeradores y se conserva el denominador.\nEj: 3/8 + 2/8 = 5/8 ; 7/10 – 4/10 = 3/10.\n\n📏 COMPARACIÓN:\n• Igual denominador: mayor es la que tiene mayor numerador (5/9 > 3/9).\n• Igual numerador: mayor es la que tiene menor denominador (3/4 > 3/7).\n\n📏 AMPLIFICACIÓN Y SIMPLIFICACIÓN:\n• Amplificar: multiplicar numerador y denominador por el mismo número (1/2 × 3/3 = 3/6).\n• Simplificar: dividir numerador y denominador entre un divisor común (6/8 ÷ 2/2 = 3/4).\n\n💹 3. NÚMEROS DECIMALES\n\n📏 DÉCIMOS Y CENTÉSIMOS:\n• 1 décimo = 1/10 = 0.1 (una cifra decimal).\n• 1 centésimo = 1/100 = 0.01 (dos cifras decimales).\n• 0.5 = 5/10 = 50/100 = 0.50.\n\n📏 LECTURA: 3.25 se lee "tres enteros y veinticinco centésimos" o "tres coma veinticinco".\n\n📏 CONVERSIÓN:\n• De fracción a decimal: buscar fracción equivalente con denominador 10, 100 o 1000. Ej: 3/5 = 6/10 = 0.6.\n• De decimal a fracción: 0.7 = 7/10; 0.03 = 3/100; 1.25 = 125/100 = 5/4.\n\n📏 SUMA Y RESTA DE DECIMALES: Se alinean las comas decimales y se opera como con naturales. Ej: 2.45 + 1.3 = 2.45 + 1.30 = 3.75.\n\n🔢 4. OPERACIONES COMBINADAS\n\n📏 JERARQUÍA (PEMDAS):\n1° Paréntesis (de adentro hacia afuera).\n2° Multiplicación y División (de izquierda a derecha).\n3° Adición y Sustracción (de izquierda a derecha).\n\n📏 EJEMPLOS:\n• 5 + 3 × 4 = 5 + 12 = 17 (no 8 × 4 = 32).\n• (5 + 3) × 4 = 8 × 4 = 32.\n• 20 – 6 ÷ 2 = 20 – 3 = 17.\n• 12 ÷ 3 + 4 × 2 = 4 + 8 = 12.\n• 8 + 2 × (5 – 3) = 8 + 2 × 2 = 8 + 4 = 12.\n\n📏 PROPIEDAD DISTRIBUTIVA: 3 × (4 + 5) = 3×4 + 3×5 = 12 + 15 = 27.\n\n⚠️ ERRORES COMUNES:\n• Operar siempre de izquierda a derecha sin respetar jerarquía.\n• Olvidar alinear la coma decimal al sumar/restar.\n• Sumar/restar fracciones con diferente denominador como si fueran homogéneas.\n• Confundir décimos con centésimos en la lectura de decimales.`,
    4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Números Naturales\n1. Escribe con cifras: a) Ocho mil setecientos treinta y dos. (8 732) b) Cincuenta y cuatro mil doscientos seis. (54 206)\n2. Descompón: 47 315 = (4 DM + 7 UM + 3 C + 1 D + 5 U = 40 000 + 7 000 + 300 + 10 + 5).\n3. Ordena de mayor a menor: 23 456; 23 546; 23 654; 32 456. (32 456 > 23 654 > 23 546 > 23 456).\n\n📝 BLOQUE 2: Fracciones\n4. Representa gráficamente: 3/5, 4/8, 2/3.\n5. ¿Son equivalentes? a) 2/5 y 4/10 (Sí, porque 2×2=4, 5×2=10). b) 3/8 y 6/16 (Sí). c) 1/3 y 2/5 (No).\n6. Simplifica: 8/12 = (2/3); 15/25 = (3/5); 20/30 = (2/3).\n7. Suma: a) 2/7 + 4/7 = (6/7). b) 5/9 + 3/9 = (8/9). c) 7/12 + 4/12 = (11/12).\n8. Resta: a) 7/8 – 3/8 = (4/8 = 1/2). b) 9/10 – 5/10 = (4/10 = 2/5). c) 1 – 3/8 = (8/8 – 3/8 = 5/8).\n9. Convierte a número mixto: 7/3 = (2 1/3); 11/4 = (2 3/4); 9/2 = (4 1/2).\n\n📝 BLOQUE 3: Decimales\n10. Escribe como decimal: a) 3/10 = (0.3). b) 45/100 = (0.45). c) 7/100 = (0.07).\n11. Escribe como fracción: a) 0.9 = (9/10). b) 0.25 = (25/100 = 1/4). c) 0.08 = (8/100 = 2/25).\n12. Suma: a) 3.4 + 2.15 = (5.55). b) 1.8 + 0.75 = (2.55). c) 5.2 + 4.38 = (9.58).\n13. Resta: a) 7.6 – 3.25 = (4.35). b) 8 – 5.7 = (2.3). c) 10.5 – 4.85 = (5.65).\n\n📝 BLOQUE 4: Operaciones Combinadas\n14. Resuelve: a) 7 + 5 × 3 = (7 + 15 = 22). b) 18 – 6 ÷ 3 = (18 – 2 = 16). c) 4 × 5 + 12 ÷ 3 = (20 + 4 = 24).\n15. Con paréntesis: a) (8 + 4) × 2 = (12 × 2 = 24). b) 5 × (10 – 6) = (5 × 4 = 20). c) (12 + 8) ÷ 4 = (20 ÷ 4 = 5).\n16. Complejos: a) 3 + 2 × (7 – 4) = (3 + 2 × 3 = 3 + 6 = 9). b) 20 ÷ (3 + 2) + 4 × 2 = (20 ÷ 5 + 8 = 4 + 8 = 12).\n\n📝 BLOQUE 5: Problemas\n17. Un pastel se divide en 8 porciones iguales. Juan come 3/8 y María 2/8. ¿Qué fracción queda? (3/8).\n18. De una cinta de 1 metro, Ana usa 0.35 m y Luis 0.4 m. ¿Cuántos metros quedan? (1 – 0.75 = 0.25 m = 25 cm).\n19. En la tienda, un cuaderno cuesta S/3.50 y un lápiz S/1.20. Si compro 2 cuadernos y 3 lápices, ¿cuánto pago? (2×3.50 + 3×1.20 = 7.00 + 3.60 = S/10.60).\n20. Pedro ahorró S/120; gasta la mitad en un libro y la cuarta parte en golosinas. ¿Cuánto le sobra? (120 – 60 – 30 = S/30).\n\n⏱️ Tiempo estimado: 70-90 min. ✅ Revisión en parejas y puesta en común.`,
    5: `🔗 CORRELACIONES INTERNAS: Conexión con Geometría, Medición y Estadística\n\n📐 CONEXIÓN CON GEOMETRÍA:\n• El perímetro de una figura se calcula sumando longitudes que pueden ser decimales (ej: lados de 3.5 cm y 4.2 cm).\n• El área de rectángulos: base × altura, ambos pueden ser números decimales.\n• Las fracciones representan partes de figuras geométricas divididas en partes iguales.\n\n📏 CONEXIÓN CON MEDICIÓN:\n• Las medidas de longitud (cm, m, km), masa (kg, g) y capacidad (litro, ml) se expresan frecuentemente con decimales.\n• Conversiones: 1.5 m = 150 cm; 0.750 kg = 750 g. Todo implica multiplicación/división por potencias de 10 y manejo de decimales.\n\n📊 CONEXIÓN CON ESTADÍSTICA:\n• Las tablas de frecuencia pueden incluir fracciones y porcentajes simples (50% = 1/2 = 0.5).\n• Al interpretar gráficos de barras, se comparan cantidades que pueden ser decimales.\n\n🧩 ACTIVIDAD INTEGRADORA: "Recetario Matemático": Elegir una receta sencilla (limonada, galletas), expresar los ingredientes en fracciones y decimales, calcular cantidades para el doble y la mitad de porciones, y calcular el costo total si cada ingrediente tiene un precio por kilo/litro.\n\n💡 REFLEXIÓN: Números naturales, fracciones y decimales no son mundos separados, sino formas diferentes de expresar cantidades. Todos se necesitan para leer el mundo con precisión.`,
    6: `🌍 CORRELACIONES EXTERNAS: Fracciones y decimales en la vida cotidiana\n\n🍳 EN LA COCINA:\n• Las recetas usan fracciones constantemente: 1/2 taza de leche, 3/4 de kilo de harina.\n• El temporizador del horno marca horas y décimas.\n\n💰 EN EL DINERO:\n• El sistema monetario peruano usa decimales: S/1.50, S/0.20. Cada sol tiene 100 céntimos.\n• Los descuentos del 25% equivalen a 1/4 del precio. "50% off" = mitad = 1/2.\n\n📏 EN LA CONSTRUCCIÓN Y CARPINTERÍA:\n• Las medidas de tablas, clavos, tuberías se expresan en pulgadas o centímetros con decimales.\n• Un carpintero divide una tabla en tercios, cuartos, quintos para hacer muebles.\n\n⚽ EN LOS DEPORTES:\n• Estadísticas de un jugador: promedio de goles, efectividad en pases (se expresan con decimales).\n• Tiempos parciales: 1:30.5 (un minuto, treinta segundos y cinco décimas).\n\n🧪 EN LA CIENCIA:\n• Medir el crecimiento de una planta: día 1 = 3.2 cm, día 7 = 8.5 cm. ¿Cuánto creció en promedio por día? Operaciones combinadas con decimales.\n\n🧠 REFLEXIÓN FINAL: "Las matemáticas que aprendes en 3° y 4° grado te acompañarán siempre: cuando cocines, compres, construyas o calcules tu presupuesto. Dominar fracciones y decimales es dominar la precisión."\n\n🗣️ CITA: "Las fracciones son el lenguaje con el que la naturaleza divide sus recursos." — Anónimo.`,
    7: `👥 MÓDULO DE PROYECTO GRUPAL: "El Bazar del Saber: Mini-Market Matemático"\n\n🎯 OBJETIVO: Simular un mercado escolar donde los estudiantes compren y vendan productos usando números naturales, fracciones y decimales, aplicando operaciones combinadas para llevar la contabilidad de su puesto.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ORGANIZACIÓN (1 sesión)\n• 5 equipos, cada uno administra un puesto: Frutería, Panadería, Librería, Juguetería, Golosinería.\n• Se designan roles: Gerente (coordina), Cajero (cálculos), Reponedor (inventario), Publicista (carteles con precios en fracciones y decimales).\n\nFASE 2: PREPARACIÓN DEL CATÁLOGO (1-2 sesiones)\n• Cada equipo selecciona 8 productos con precios que incluyan fracciones y decimales (ej: 1/2 kg de arroz = S/2.00; galleta S/0.50; chocolate S/1.25).\n• Crean carteles donde el precio se muestre en fracción (cuando sea posible) y en decimal. Ej: "Manzana → S/3.50 = S/3 1/2".\n\nFASE 3: SIMULACIÓN DE VENTAS (1 sesión)\n• Los equipos compran entre sí usando billetes y monedas didácticos.\n• Registran las compras y ventas en un "libro contable":\n  - Producto, cantidad, precio unitario, subtotal (multiplicación con decimales).\n  - Total de la compra (suma de subtotales).\n  - Vuelto (resta con decimales).\n• Cada cliente puede comprar productos fraccionados: "1/4 kg de fresas, 0.5 kg de pan".\n\nFASE 4: CIERRE DE CAJA Y BALANCE (1 sesión)\n• Calculan:\n  - Total de ventas (suma de todos los totales).\n  - Ganancia si el costo fue 2/3 del precio de venta (fracción).\n  - Producto más vendido y fracción que representa del total.\n• Analizan: ¿Qué puesto ganó más? ¿Qué porcentaje aproximado?\n\nFASE 5: FERIA Y EXPOSICIÓN (1 sesión)\n• Se invita a otros salones. Los equipos atienden al público real (con dinero didáctico).\n• Explican sus carteles y cómo calcularon precios con fracciones y decimales.\n\n🏆 EVALUACIÓN: Correcta aplicación de operaciones combinadas, manejo de decimales y fracciones simples, trabajo en equipo, presentación del puesto.\n🎉 CIERRE: Diplomas de "Comerciante Matemático". El puesto con mejores cuentas recibe el trofeo "Balanzas de Oro".`,
};

const leccionExtensaGeoIV = {
    0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 3° y 4° grado de primaria las competencias geométricas fundamentales relacionadas con los ángulos y los polígonos, incluyendo su clasificación, medición y el cálculo de perímetros y áreas de figuras planas, fomentando la observación, la precisión en la medición y la aplicación de estos conceptos en la resolución de problemas prácticos.\n\n🎯 OBJETIVOS PARTICULARES:\n• Identificar el ángulo como una abertura formada por dos rayos que parten de un mismo vértice.\n• Clasificar ángulos según su medida: recto (90°), agudo (<90°), obtuso (>90° y <180°), llano (180°).\n• Usar correctamente el transportador para medir y dibujar ángulos.\n• Identificar y clasificar polígonos según su número de lados: triángulo (3), cuadrilátero (4), pentágono (5), hexágono (6), heptágono (7), octágono (8), etc.\n• Reconocer los elementos de un polígono: lados, vértices, ángulos interiores, diagonales.\n• Calcular el perímetro de polígonos regulares e irregulares sumando las longitudes de todos sus lados.\n• Deducir y aplicar las fórmulas del área del cuadrado (lado × lado) y del rectángulo (base × altura).\n• Resolver problemas que involucren perímetros y áreas en contextos cotidianos.\n\n📌 NOCIONES PRINCIPALES:\n• Ángulo, vértice, lados de un ángulo, medida en grados (°).\n• Clasificación de ángulos: recto (90°), agudo, obtuso, llano (180°).\n• Transportador: uso para medir y trazar ángulos.\n• Polígono, lado, vértice, ángulo interior, diagonal.\n• Clasificación de polígonos por número de lados.\n• Perímetro: suma de longitudes de los lados. Unidades lineales (cm, m).\n• Área: medida de la superficie. Unidades cuadradas (cm², m²).\n• Fórmulas: A_cuadrado = l × l = l²; A_rectángulo = base × altura = b × h.\n\n📌 NOCIONES SECUNDARIAS:\n• Polígonos regulares (lados iguales) e irregulares.\n• Relación entre el número de lados y el número de diagonales de un polígono (nociones básicas: desde un vértice se pueden trazar n-3 diagonales).\n• Comparación de áreas y perímetros: figuras con igual área pueden tener diferente perímetro y viceversa.\n• Composición y descomposición de figuras para calcular áreas.\n\n🌍 INTERESES SOCIETALES:\n• Los ángulos están presentes en la arquitectura (inclinación de techos), el deporte (trayectoria de un balón), el arte (perspectiva).\n• Los polígonos son la base del diseño de señales de tránsito (octágono = PARE, triángulo invertido = CEDA EL PASO), mosaicos y vitrales.\n• El cálculo de perímetros y áreas es útil para construir cercas, enlosar pisos, pintar paredes y diseñar jardines.\n• Entender estas nociones geométricas desarrolla la capacidad de visualización espacial, fundamental para profesiones como arquitectura, ingeniería y diseño.`,
    1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Exploradores de ángulos, polígonos y medidas"\n\n🧩 MATERIALES: Transportador, regla, compás, palitos de helado, limpiapipas, geoplano y ligas, papel punteado isométrico, cartulina, tijeras, objetos cotidianos con ángulos (escuadra, abanico, tijeras abiertas).\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Cazadores de ángulos" – Los niños recorren el aula con un transportador y una hoja de registro. Deben encontrar y medir al menos un ángulo recto (esquina de un libro, marco de la ventana), uno agudo (punta de un lápiz, abertura pequeña de las tijeras) y uno obtuso (respaldo inclinado de una silla). Dibujan el objeto y el ángulo encontrado, y anotan su medida.\n\nESTACIÓN 2: "Construye polígonos con palitos" – Con palitos de helado de diferentes longitudes, construyen triángulos, cuadrados, rectángulos, pentágonos. Cuentan lados y vértices. Registran en una tabla: nombre, número de lados, número de vértices. Luego intentan construir figuras con palitos desiguales (polígonos irregulares).\n\nESTACIÓN 3: "Geoplano: del perímetro al área" – En un geoplano, representan un cuadrado de 3 × 3 unidades y un rectángulo de 5 × 2. Con una lana o hilo, miden el contorno (perímetro) y cuentan los cuadraditos interiores (área). Comparan: ¿el de mayor perímetro tiene siempre mayor área?\n\nESTACIÓN 4: "Tangram de áreas" – Usando las piezas del tangram, los estudiantes forman un cuadrado grande. Calculan el área total y luego determinan el área de cada pieza como fracción del cuadrado grande. Reorganizan las piezas para crear figuras diferentes y comprueban que el área total no cambia.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Qué es un ángulo y dónde los encontramos? ¿Todos los polígonos tienen el mismo número de lados y ángulos? ¿Qué mide el perímetro: el contorno o el interior? ¿Y el área?`,
    2: `🧠 ACTIVIDAD INDUCTIVA: "De la observación a la fórmula"\n\n📊 OBSERVACIÓN GUIADA: CLASIFICACIÓN DE ÁNGULOS\nSe dibujan en la pizarra 4 ángulos de diferentes aberturas. Los estudiantes los miden con transportador:\n• Ángulo A: 90° (esquina de una escuadra).\n• Ángulo B: 40° (más cerrado que el recto).\n• Ángulo C: 130° (más abierto que el recto pero menos que una línea recta).\n• Ángulo D: 180° (línea recta).\n\nPaso 1: Comparan cada uno con el ángulo recto (90°).\nPaso 2: Definen categorías: menor de 90° = agudo; exactamente 90° = recto; entre 90° y 180° = obtuso; 180° = llano.\nConclusión guiada: "La medida de un ángulo nos dice si es agudo, recto, obtuso o llano".\n\n📊 OBSERVACIÓN GUIADA: PERÍMETRO Y ÁREA DEL RECTÁNGULO\nSe presentan 3 rectángulos dibujados en cuadrícula:\n• Rectángulo 1: 4 cm × 3 cm → P = 4+3+4+3 = 14 cm. Área = 12 cuadraditos.\n• Rectángulo 2: 6 cm × 2 cm → P = 6+2+6+2 = 16 cm. Área = 12 cuadraditos.\n• Rectángulo 3: 12 cm × 1 cm → P = 12+1+12+1 = 26 cm. Área = 12 cuadraditos.\n\nPaso 1: Observan que los tres tienen igual área (12 cm²) pero perímetros muy diferentes.\nPaso 2: El rectángulo más "alargado" tiene mucho mayor perímetro. El más "compacto" (cuadrado 4×4 daría P=16, A=16; pero 4×3 es más cuadrado que 12×1) tiene menor perímetro.\nConclusión: "Figuras con igual área pueden tener distinto perímetro. El área mide la superficie; el perímetro mide el contorno".\n\n📊 OBSERVACIÓN GUIADA: FÓRMULA DEL ÁREA\nSe cuentan cuadraditos para varios rectángulos y se relaciona con las dimensiones:\n3×4 = 12 → 12 cuadraditos.\n5×2 = 10 → 10 cuadraditos.\n6×3 = 18 → 18 cuadraditos.\nConclusión: "El área de un rectángulo se obtiene multiplicando el largo por el ancho (base × altura)". Y como el cuadrado es un rectángulo especial con lados iguales: lado × lado = l².\n\n📝 REGISTRO: Cada estudiante escribe en su cuaderno las definiciones de ángulo recto, agudo, obtuso y llano, y las fórmulas de perímetro y área con un ejemplo propio.`,
    3: `📐 TRANSMISIÓN CONCEPTUAL: Ángulos, Polígonos, Perímetro y Área\n\n📐 1. ÁNGULOS\n\nUn ángulo es la abertura formada por dos rayos (lados) que parten de un mismo punto llamado vértice. Se mide en grados (°).\n\n📏 CLASIFICACIÓN SEGÚN SU MEDIDA:\n• Ángulo recto: mide exactamente 90°. Sus lados son perpendiculares. Se simboliza con un pequeño cuadrado en el vértice. Ej: esquina de una hoja, escuadra.\n• Ángulo agudo: mide menos de 90° (entre 0° y 89°). Ej: abertura pequeña de un compás, la punta de un lápiz afilado.\n• Ángulo obtuso: mide más de 90° pero menos de 180° (entre 91° y 179°). Ej: ángulo formado por las manecillas del reloj a las 4:00 (120°), el respaldo inclinado de una silla.\n• Ángulo llano: mide exactamente 180°. Forma una línea recta. Ej: un libro abierto completamente plano.\n\n📏 USO DEL TRANSPORTADOR:\n1. Colocar el centro del transportador sobre el vértice del ángulo.\n2. Alinear la línea base del transportador (0°) con uno de los lados del ángulo.\n3. Leer la medida en la escala donde el otro lado cruza el transportador.\nPara dibujar un ángulo: marcar el vértice, dibujar un lado, ubicar la medida deseada con el transportador, marcar un punto y unirlo con el vértice.\n\n🔺 2. POLÍGONOS\n\nUn polígono es una figura plana cerrada formada por segmentos de recta (lados) que se unen en los vértices.\n\n📏 ELEMENTOS:\n• Lados: segmentos que forman el contorno.\n• Vértices: puntos donde se unen dos lados.\n• Ángulos interiores: formados por dos lados consecutivos en el interior del polígono.\n• Diagonales: segmentos que unen dos vértices no consecutivos.\n\n📏 CLASIFICACIÓN POR NÚMERO DE LADOS:\n• 3 lados: Triángulo.\n• 4 lados: Cuadrilátero (cuadrado, rectángulo, rombo, trapecio, etc.).\n• 5 lados: Pentágono.\n• 6 lados: Hexágono.\n• 7 lados: Heptágono.\n• 8 lados: Octágono.\n• 9 lados: Nonágono.\n• 10 lados: Decágono.\n\n📏 POLÍGONOS REGULARES E IRREGULARES:\n• Regular: todos sus lados son iguales y todos sus ángulos interiores también. Ej: cuadrado, triángulo equilátero, pentágono regular.\n• Irregular: sus lados o ángulos no son todos iguales. Ej: rectángulo (ángulos iguales pero lados no todos iguales), triángulo escaleno.\n\n📏 3. PERÍMETRO\n\nEl perímetro es la suma de las longitudes de todos los lados de una figura. Se mide en unidades lineales: centímetros (cm), metros (m), kilómetros (km).\n\nEjemplos:\n• Cuadrado de lado 5 cm: P = 5 + 5 + 5 + 5 = 4 × 5 = 20 cm.\n• Rectángulo de base 8 cm y altura 3 cm: P = 8 + 3 + 8 + 3 = 2×(8+3) = 22 cm.\n• Triángulo de lados 6 cm, 4 cm y 5 cm: P = 6 + 4 + 5 = 15 cm.\n• Polígono irregular: sumar lado por lado, sin fórmula mágica.\n\n📏 4. ÁREA\n\nEl área es la medida de la superficie que ocupa una figura. Se mide en unidades cuadradas: centímetros cuadrados (cm²), metros cuadrados (m²).\n\n📏 FÓRMULAS BÁSICAS (Ciclo IV):\n• Cuadrado: Área = lado × lado = l².\n  Ej: l = 4 cm → A = 4 × 4 = 16 cm².\n• Rectángulo: Área = base × altura = b × h.\n  Ej: b = 7 cm, h = 4 cm → A = 7 × 4 = 28 cm².\n\n📏 RELACIÓN ENTRE PERÍMETRO Y ÁREA:\nNo se debe confundir: el perímetro es la medida del contorno; el área es la medida de la superficie. Dos figuras con igual área pueden tener distinto perímetro, y viceversa.\nEjemplo: Rectángulo de 10 cm × 2 cm: A = 20 cm², P = 24 cm. Cuadrado de lado √20 ≈ 4.47 cm: misma área, perímetro ≈ 17.9 cm. El rectángulo alargado tiene mayor perímetro.\n\n⚠️ ERRORES COMUNES:\n• Confundir perímetro con área y expresar área en cm en lugar de cm².\n• Medir ángulos desde el lado incorrecto del transportador (empezar desde 0 en el lado alineado).\n• Clasificar mal un ángulo de 89° o 91°: uno es agudo, el otro obtuso, aunque apenas se diferencien del recto.\n• Olvidar que un cuadrado es un tipo especial de rectángulo (con lados iguales).`,
    4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Ángulos\n1. Clasifica los siguientes ángulos según su medida: a) 45° (Agudo). b) 90° (Recto). c) 115° (Obtuso). d) 180° (Llano). e) 89° (Agudo). f) 91° (Obtuso).\n2. Mide con el transportador los ángulos dibujados en la hoja de ejercicios (el docente provee una hoja con 5 ángulos de diferentes medidas).\n3. Dibuja un ángulo de: a) 30° (agudo). b) 150° (obtuso). c) 90° (recto).\n4. Sin usar transportador, solo viendo la figura, estima si el ángulo A (45°) o el ángulo B (100°). Luego verifica con tu transportador.\n\n📝 BLOQUE 2: Polígonos\n5. Nombra cada polígono según su número de lados: a) 4 lados (Cuadrilátero). b) 6 lados (Hexágono). c) 8 lados (Octágono). d) 3 lados (Triángulo).\n6. ¿Cuántos lados, vértices y ángulos interiores tiene un pentágono? (5 lados, 5 vértices, 5 ángulos). ¿Y un heptágono? (7 de cada uno).\n7. Dibuja un octágono irregular y un hexágono regular. Señala sus diagonales.\n8. ¿Cuántas diagonales puedes trazar desde un vértice de un pentágono? (2). ¿Y de un hexágono? (3). Observa el patrón: n-3.\n\n📝 BLOQUE 3: Perímetro\n9. Calcula el perímetro de:\na) Cuadrado de lado 9 cm. (36 cm).\nb) Rectángulo de 12 cm × 5 cm. (34 cm).\nc) Triángulo de lados 8 cm, 6 cm y 10 cm. (24 cm).\nd) Pentágono regular de lado 7 m. (35 m).\ne) Un jardín rectangular de 20 m de largo y 15 m de ancho. (70 m).\n\n📝 BLOQUE 4: Área\n10. Calcula el área de:\na) Cuadrado de lado 7 cm. (49 cm²).\nb) Rectángulo de 9 cm × 6 cm. (54 cm²).\nc) Un terreno cuadrado de 25 m de lado. (625 m²).\nd) Una cancha rectangular de 18 m × 9 m. (162 m²).\n11. Averigua el lado de un cuadrado cuya área es 64 cm². (8 cm, porque 8×8=64).\n12. Un rectángulo tiene área de 72 cm² y su base mide 9 cm. ¿Cuánto mide su altura? (72 ÷ 9 = 8 cm).\n\n📝 BLOQUE 5: Problemas\n13. Una sala rectangular mide 6 m de largo y 4 m de ancho. ¿Cuántos metros de rodapié (zócalo) se necesitan? (Perímetro = 20 m). ¿Cuántos metros cuadrados de loseta para el piso? (Área = 24 m²).\n14. Una fotografía cuadrada tiene un perímetro de 36 cm. ¿Cuánto mide cada lado? (9 cm). ¿Cuál es su área? (81 cm²).\n15. Un granjero quiere cercar un terreno rectangular de 50 m × 30 m con 3 vueltas de alambre. ¿Cuántos metros de alambre necesita? (P = 160 m; 3 vueltas = 480 m).\n\n⏱️ Tiempo estimado: 70-90 min. ✅ Autoevaluación y coevaluación.`,
    5: `🔗 CORRELACIONES INTERNAS: Conexión con Números, Medición y Estadística\n\n🔢 CONEXIÓN CON NÚMEROS Y OPERACIONES:\n• El cálculo de perímetros implica sumas de números naturales y decimales.\n• El área del rectángulo se obtiene con una multiplicación; a veces los lados son decimales (3.5 cm × 4 cm).\n• La búsqueda de lados desconocidos requiere división: l = P ÷ 4, h = A ÷ b.\n• Los ángulos se miden en grados, que son números; los polígonos tienen tantos lados como ángulos, y la suma de ángulos interiores (que en Ciclo V se formalizará) ya se intuye.\n\n📏 CONEXIÓN CON MEDICIÓN:\n• Medir lados con regla y ángulos con transportador son las dos grandes habilidades de medición en geometría.\n• Convertir unidades de medida: si un lado está en cm y otro en m, se deben unificar antes de calcular perímetros o áreas.\n\n📊 CONEXIÓN CON ESTADÍSTICA:\n• Los resultados de encuestas pueden mostrarse en gráficos de barras, donde cada barra es un rectángulo. Su altura representa la frecuencia; su base es constante.\n• El área de cada barra es proporcional a la frecuencia (principio que se formaliza en estadística).\n\n🧩 ACTIVIDAD INTEGRADORA: "Planos de una habitación": Dibujar la planta de una habitación en papel cuadriculado, midiendo los lados reales con cinta métrica. Calcular el perímetro total y el área. Identificar ángulos rectos (esquinas).\n\n💡 REFLEXIÓN: La geometría no es solo dibujar figuras bonitas; es medir, calcular y razonar. Ángulos y polígonos están en cada rincón de nuestra vida; entenderlos nos da el poder de construir y diseñar.`,
    6: `🌍 CORRELACIONES EXTERNAS: Ángulos, polígonos y medidas en el mundo real\n\n🏗️ ARQUITECTURA Y CONSTRUCCIÓN:\n• Los planos de una casa están llenos de ángulos rectos y polígonos.\n• Los techos inclinados tienen ángulos agudos u obtusos calculados para que el agua de lluvia escurra bien.\n• La señal de PARE es un octágono regular; las señales de tránsito usan polígonos para ser reconocidas internacionalmente.\n\n🎨 ARTE Y DISEÑO:\n• Muchos mosaicos y vitrales están compuestos por polígonos regulares (teselados).\n• El cubismo (Picasso, Braque) descompone figuras en ángulos y polígonos.\n• Los mandalas incluyen círculos, pero también cuadrados, triángulos y octágonos.\n\n⚽ DEPORTES:\n• Las canchas son rectángulos de dimensiones reglamentarias (fútbol, básquet, vóley). Calcular su área y perímetro es una aplicación directa.\n• Las porterías forman ángulos rectos con el suelo.\n• En gimnasia artística y patinaje, las posiciones corporales describen ángulos (ej: split a 180°).\n\n🌳 NATURALEZA:\n• Los panales de abejas son hexágonos perfectos: es la forma que maximiza el área con el menor perímetro de cera.\n• La telaraña combina polígonos y ángulos con una precisión asombrosa.\n• Muchas flores tienen simetrías pentagonales o hexagonales.\n\n🧠 REFLEXIÓN FINAL: "Los ángulos inclinan el mundo; los polígonos lo forman. Desde un grano de arena hasta un rascacielos, la geometría es la arquitectura invisible de la realidad."\n\n🗣️ CITA: "La geometría es el arte de razonar bien sobre figuras mal dibujadas." — Henri Poincaré.`,
    7: `👥 MÓDULO DE PROYECTO GRUPAL: "Constructores de Figuras: Diseño de un Parque Infantil"\n\n🎯 OBJETIVO: Diseñar en equipo el plano a escala de un parque infantil, utilizando ángulos, polígonos, y calculando perímetros y áreas de cada zona de juego, presentando una maqueta o plano detallado con memoria de cálculos.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ORGANIZACIÓN Y LLUVIA DE IDEAS (1 sesión)\n• 5 equipos. Cada equipo diseña un sector del parque: Zona de Columpios, Área de Arenero, Cancha Deportiva, Jardín, Zona de Picnic.\n• Dibujan bocetos en papel cuadriculado, asegurándose de usar polígonos (rectángulos para canchas, triángulos para techos, octágonos para quioscos).\n\nFASE 2: DISEÑO A ESCALA Y CÁLCULOS (2 sesiones)\n• Escala sugerida: 1 cm = 2 m. Cada estructura debe tener dimensiones reales.\n• Calculan para cada elemento:\n  - Perímetro (para colocar cercas, bordes).\n  - Área (para saber cuánto pasto sintético, arena o loseta se necesita).\n  - Ángulos: los columpios deben balancearse en cierto ángulo, el tobogán tiene inclinación (ángulo agudo).\n• Registran todo en una tabla: Elemento, Forma/polígono, Dimensiones, Perímetro, Área.\n\nFASE 3: MEDICIÓN DE ÁNGULOS REALES (1 sesión)\n• Salen al patio real de la escuela. Con transportador y cinta métrica, miden ángulos de juegos existentes o de estructuras (esquinas de la cancha, inclinación de una rampa).\n• Comparan con el diseño de su parque ideal.\n\nFASE 4: MAQUETA O PLANO FINAL (1-2 sesiones)\n• Crean el plano final en cartulina grande, con todos los polígonos etiquetados (nombre, dimensiones, perímetro, área).\n• Opcional: Construyen elementos en 3D con cajas (prismas) para representar los juegos.\n\nFASE 5: EXPOSICIÓN (1 sesión)\n• Presentan el parque al resto de la clase.\n• Explican al menos 3 cálculos: "La cancha de fútbol mide 20 m × 12 m, su perímetro es 64 m y su área 240 m²."\n• Responden preguntas: ¿Por qué usaste un octágono para el quiosco? ¿Dónde hay un ángulo obtuso?\n\n🏆 EVALUACIÓN: Correcta identificación de polígonos, precisión en perímetros y áreas, uso adecuado de ángulos, creatividad, claridad en la presentación.\n🎉 CIERRE: Exposición "Parques para Ventanilla". Diplomas de "Arquitecto Geométrico".`,
};

const leccionExtensaEstIV = {
    0: `🎯 OBJETIVO GENERAL: Introducir a los estudiantes de 3° y 4° grado de primaria en los fundamentos de la estadística descriptiva, desarrollando la capacidad de recolectar, organizar, representar e interpretar datos mediante tablas de frecuencia y gráficos de barras, fomentando el pensamiento crítico y la habilidad de extraer conclusiones a partir de información cuantitativa.\n\n🎯 OBJETIVOS PARTICULARES:\n• Comprender qué son los datos y la necesidad de organizarlos para analizarlos.\n• Recolectar datos mediante encuestas sencillas y observación en el entorno escolar.\n• Construir tablas de frecuencia absoluta (conteo) y frecuencia relativa (nociones básicas).\n• Representar datos en gráficos de barras simples y dobles, así como en pictogramas.\n• Leer e interpretar información contenida en tablas de frecuencia, gráficos de barras y pictogramas.\n• Identificar la moda (dato más frecuente) y comparar frecuencias.\n• Formular preguntas que puedan responderse mediante el análisis de datos.\n• Valorar la importancia de la estadística en la vida cotidiana como herramienta para tomar decisiones.\n\n📌 NOCIONES PRINCIPALES:\n• Dato, variable, frecuencia.\n• Tabla de frecuencia: columnas de categoría, conteo y frecuencia absoluta.\n• Gráfico de barras simple: ejes, categorías, altura de la barra proporcional a la frecuencia.\n• Gráfico de barras doble: comparación de dos conjuntos de datos.\n• Pictograma: representación con dibujos o símbolos, cada uno con un valor asignado.\n• Moda: categoría con mayor frecuencia.\n• Interpretación de gráficos y tablas.\n\n📌 NOCIONES SECUNDARIAS:\n• Frecuencia relativa como fracción o razón simple ("3 de cada 10 prefieren fútbol").\n• Comparación entre gráficos de barras simples y dobles.\n• Análisis comparativo: "más que", "menos que", "la misma cantidad que".\n• Introducción a los gráficos circulares como representación de partes de un todo (aunque su construcción formal es posterior).\n\n🌍 INTERESES SOCIETALES:\n• La estadística está en todas partes: noticias, deportes, encuestas electorales, resultados escolares.\n• Saber leer un gráfico de barras permite interpretar la información sin ser engañado por presentaciones tendenciosas.\n• La capacidad de recolectar y organizar datos desarrolla el pensamiento lógico y la toma de decisiones basada en evidencia.\n• Muchos empleos del futuro (analista de datos, científico, periodista de investigación) requieren competencias estadísticas básicas.`,
    1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Encuestadores en acción"\n\n🧩 MATERIALES: Hojas de encuesta, tablero de conteo, papel milimetrado, reglas, colores, stickers, dados, fichas de colores, revistas con gráficos de barras, computadora con Excel (si es posible).\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "La gran encuesta del sabor" – Cada equipo encuesta a 20 compañeros sobre su sabor de helado favorito entre 5 opciones (chocolate, vainilla, fresa, lúcuma, maracuyá). Registran los votos en una tabla de conteo (palotes). Luego totalizan las frecuencias y dibujan un gráfico de barras simple en papel milimetrado.\n\nESTACIÓN 2: "Pictogramas vivientes" – Se reparten stickers de frutas (manzana, plátano, naranja, uva, fresa) entre los estudiantes del aula. Los del equipo deben contar cuántos stickers de cada fruta hay y representarlos en un pictograma, donde cada sticker dibujado equivale a 2 stickers reales (aprenden a usar una escala).\n\nESTACIÓN 3: "Gráficos de barras dobles" – Se entregan datos de dos cursos (3°A y 3°B) sobre su mascota preferida. Los estudiantes construyen un gráfico de barras dobles (una barra para 3°A y otra para 3°B en cada categoría). Comparan: ¿En qué curso hay más preferencia por los perros? ¿Y por los gatos?\n\nESTACIÓN 4: "Detectives de gráficos" – Se les entregan recortes de revistas o periódicos con gráficos de barras reales (resultados deportivos, preferencias musicales, etc.). Deben responder preguntas: ¿Cuál es la categoría más frecuente? ¿Cuál la menos? ¿Cuántos más prefieren A que B?\n\n💬 REFLEXIÓN EN PLENARIA: ¿Para qué sirve organizar datos en tablas? ¿Qué ventaja tiene un gráfico de barras frente a una lista de números? ¿En qué situaciones de la vida real se usan pictogramas?`,
    2: `🧠 ACTIVIDAD INDUCTIVA: "De los datos crudos a la tabla y el gráfico"\n\n📊 OBSERVACIÓN GUIADA: CONSTRUCCIÓN DE UNA TABLA DE FRECUENCIA\nLa docente presenta la siguiente situación: "En un aula de 30 estudiantes, estos son los deportes favoritos: fútbol, fútbol, vóley, fútbol, básquet, natación, fútbol, vóley, fútbol, básquet, fútbol, vóley, natación, fútbol, fútbol, básquet, vóley, natación, fútbol, fútbol, vóley, básquet, fútbol, fútbol, básquet, natación, vóley, fútbol, básquet, fútbol."\n\nPaso 1: Leer la lista así es muy difícil saber cuál es el más popular. Los estudiantes los agrupan usando conteo (palotes).\nPaso 2: Construyen la tabla:\n| Deporte | Conteo | Frecuencia |\n|---|---|---|\n| Fútbol | IIII IIII III | 13 |\n| Vóley | IIII I | 6 |\n| Básquet | IIII I | 6 |\n| Natación | IIII | 4 |\nTotal: 30.\n\nConclusión: "Una tabla de frecuencia organiza los datos para que sea fácil ver cuántas veces aparece cada categoría".\n\n📊 OBSERVACIÓN GUIADA: DEL TABLA AL GRÁFICO DE BARRAS\nUsando la tabla anterior, los estudiantes dibujan en papel milimetrado un gráfico de barras simples:\n• Eje horizontal: deportes.\n• Eje vertical: frecuencia (de 0 a 14).\n• Cada barra debe tener el mismo ancho y altura proporcional a la frecuencia.\n\nPreguntas guiadas: ¿Qué deporte tiene la barra más alta? (fútbol). ¿Cuál la más baja? (natación). ¿Cuántos estudiantes más prefieren fútbol que natación? (13 – 4 = 9).\n\n📊 OBSERVACIÓN GUIADA: PICTOGRAMA CON ESCALA\nSe presentan los mismos datos pero ahora cada ícono ⚽ representa 2 estudiantes. Entonces:\n• Fútbol: 13 estudiantes → 6 íconos y medio. Se discute cómo representar medios.\n• Vóley: 6 → 3 íconos. Básquet: 6 → 3 íconos. Natación: 4 → 2 íconos.\n\nConclusión: "En un pictograma, cada dibujo representa una cantidad fija. Es importante indicar la clave (leyenda) para saber cuánto vale cada símbolo".\n\n📝 REGISTRO: Los estudiantes dibujan sus propias tablas, gráficos y pictogramas en el cuaderno, anotando la importancia de cada tipo de representación.`,
    3: `📐 TRANSMISIÓN CONCEPTUAL: Tablas de Frecuencia, Gráficos de Barras y Pictogramas\n\n📊 1. ESTADÍSTICA: ¿QUÉ ES?\nLa Estadística es la ciencia que se encarga de recolectar, organizar, representar, analizar e interpretar datos para obtener conclusiones y tomar decisiones.\n\n📏 DATO Y VARIABLE:\n• Dato: cada una de las informaciones recolectadas (ej: "fútbol", "12 años", "1.40 m").\n• Variable: la característica que estamos estudiando (deporte favorito, edad, estatura).\n\n📊 2. TABLA DE FRECUENCIA\n\nEs una tabla donde se registran las categorías de una variable y la cantidad de veces que aparece cada una (frecuencia).\n\n📏 ELEMENTOS:\n• Categoría (o valor): cada opción de la variable (ej: sabores de helado).\n• Conteo: marcas de agrupación (palotes) que se hacen al contar.\n• Frecuencia absoluta (f): número total de veces que aparece cada categoría.\n\n📏 EJEMPLO:\nVariable: Color favorito en un aula de 25 estudiantes.\n| Color | Conteo | f |\n|---|---|---|\n| Rojo | IIII | 5 |\n| Azul | IIII IIII | 9 |\n| Verde | IIII I | 6 |\n| Amarillo | IIII | 4 |\n| Otros | I | 1 |\n| Total | | 25 |\n\n📏 FRECUENCIA RELATIVA (nociones básicas): "9 de cada 25 prefieren azul" o "9/25 del salón". No se calcula porcentaje aún, pero se siembra la idea.\n\n📊 3. GRÁFICO DE BARRAS SIMPLES\n\nEs una representación visual de los datos de una tabla de frecuencia. Cada barra rectangular representa la frecuencia de una categoría.\n\n📏 REGLAS:\n• Eje horizontal (X): categorías.\n• Eje vertical (Y): frecuencias (debe comenzar en 0).\n• Todas las barras tienen el mismo ancho (no se tocan entre sí).\n• La altura de cada barra es proporcional a la frecuencia que representa.\n• Incluir título y etiquetas en los ejes.\n\n📏 ¿CÓMO INTERPRETARLO?\n• La barra más alta indica la categoría con mayor frecuencia (la moda).\n• La diferencia de alturas muestra qué tan grande es la diferencia entre categorías.\n• El orden de las barras puede ser alfabético o por frecuencia.\n\n📊 4. GRÁFICO DE BARRAS DOBLES\n\nPermite comparar dos conjuntos de datos para las mismas categorías.\n\n📏 EJEMPLO: Preferencia de mascotas en 4°A y 4°B.\n| Mascota | 4°A | 4°B |\n|---|---|---|\n| Perro | 12 | 15 |\n| Gato | 8 | 6 |\n| Pez | 4 | 7 |\n| Ave | 3 | 2 |\n\nDos barras por categoría (una de cada color), con leyenda. Se comparan: ¿En cuál curso prefieren más los perros? ¿En cuál los gatos?\n\n📊 5. PICTOGRAMA\n\nEs un gráfico que usa dibujos o íconos para representar los datos. Cada ícono representa una cantidad fija (escala).\n\n📏 EJEMPLO: Preferencia de frutas.\n🍎 = 2 estudiantes.\nManzana: 8 estudiantes → 🍎🍎🍎🍎\nPlátano: 6 estudiantes → 🍎🍎🍎\nUva: 4 estudiantes → 🍎🍎\n\n📏 CLAVE: Es indispensable indicar cuánto vale cada ícono. Si un valor no es múltiplo exacto, se dibuja la mitad del ícono.\n\n📊 6. MODA\n\nEs la categoría que tiene mayor frecuencia absoluta, es decir, la que más se repite. En el ejemplo del color favorito, la moda es el azul (9 estudiantes). Puede haber más de una moda si hay empate.\n\n⚠️ ERRORES COMUNES:\n• Empezar el eje vertical en un número distinto de 0 (distorsiona la comparación visual).\n• Dibujar barras de diferente ancho o muy pegadas.\n• Olvidar escribir la clave en el pictograma y confundir al lector.\n• No verificar que la suma total de frecuencias coincida con el número total de datos.`,
    4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Tablas de Frecuencia\n1. Se preguntó a 20 estudiantes sobre su estación favorita: verano, invierno, verano, primavera, verano, verano, otoño, invierno, verano, primavera, verano, invierno, verano, otoño, primavera, verano, verano, invierno, primavera, verano.\nConstruye la tabla de frecuencia. (Verano: 10, Invierno: 4, Primavera: 4, Otoño: 2).\n2. ¿Cuál es la moda de la variable "estación favorita"? (Verano).\n3. Inventa una variable, recolecta datos de 15 compañeros y construye la tabla de frecuencia.\n\n📝 BLOQUE 2: Gráficos de Barras Simples\n4. Con los datos de la tabla del problema 1, dibuja un gráfico de barras en papel milimetrado. Usa escala: 1 cuadradito = 2 estudiantes.\n5. Según el gráfico: ¿Cuántos estudiantes prefieren verano más que otoño? (10 – 2 = 8). ¿Qué estaciones tienen igual preferencia? (Invierno y primavera, ambas con 4).\n\n📝 BLOQUE 3: Gráficos de Barras Dobles\n6. Se registraron los sabores de yogurt preferidos en dos salones:\n| Sabor | 4°A | 4°B |\n|---|---|---|\n| Fresa | 8 | 6 |\n| Durazno | 5 | 7 |\n| Vainilla | 3 | 4 |\n| Lucuma | 2 | 3 |\nDibuja el gráfico de barras dobles.\n7. Responde: a) ¿En qué salón prefieren más la fresa? (4°A). b) ¿Cuál es el sabor con menor diferencia entre ambos salones? (Lúcuma: 2 vs 3, diferencia 1).\n\n📝 BLOQUE 4: Pictogramas\n8. Se encuestó sobre el medio de transporte para llegar al colegio: Caminando: 14, Bicicleta: 10, Auto: 8, Bus: 18.\nRepresenta los datos en un pictograma donde 🚶/🚲/🚗/🚌 = 4 estudiantes.\n(Caminando: 3 íconos y medio; Bici: 2 y medio; Auto: 2; Bus: 4 y medio).\n9. ¿Cuántos estudiantes usan Bus o Auto? (18 + 8 = 26).\n\n📝 BLOQUE 5: Interpretación y Análisis\n10. Observa el siguiente gráfico de barras (el docente lo proyecta o lo entrega en papel):\n"Ventas semanales de un quiosco escolar". Lunes: S/50; Martes: S/35; Miércoles: S/60; Jueves: S/45; Viernes: S/80.\nResponde:\na) ¿Qué día se vendió más? (Viernes).\nb) ¿Qué día se vendió menos? (Martes).\nc) ¿Cuánto más se vendió el viernes que el martes? (80 – 35 = S/45).\nd) ¿Qué día superó los S/50? (Miércoles y viernes).\n\n⏱️ Tiempo estimado: 60-80 min. ✅ Revisión grupal.`,
    5: `🔗 CORRELACIONES INTERNAS: Conexión con Números y Operaciones, Geometría y Medición\n\n🔢 CONEXIÓN CON NÚMEROS Y OPERACIONES:\n• Construir tablas de frecuencia implica contar, sumar y a veces obtener fracciones simples ("3 de cada 10").\n• Al comparar frecuencias se usan restas ("¿cuántos más...?"), sumas ("¿cuántos en total...?") y nociones de multiplicación al establecer escalas en pictogramas.\n\n📐 CONEXIÓN CON GEOMETRÍA:\n• Las barras son rectángulos; su altura es proporcional a la frecuencia. Dibujarlas correctamente requiere medir longitudes en el eje vertical.\n• El gráfico de sectores circulares, que se verá después, conecta con ángulos y fracciones de círculo.\n\n📏 CONEXIÓN CON MEDICIÓN:\n• Al graficar en papel milimetrado, los estudiantes practican la medición de longitudes (altura de las barras) y la elección de escalas adecuadas.\n\n🧩 ACTIVIDAD INTEGRADORA: "Análisis de un dado cargado": Lanzar un dado muchas veces, registrar resultados, construir tabla, gráfico de barras y calcular la moda. Discutir: ¿es un dado justo? ¿Las frecuencias son similares?\n\n💡 REFLEXIÓN: La estadística une todas las áreas matemáticas. Sin números no hay frecuencias; sin geometría no hay gráficos; sin medición no hay escalas. Es la ciencia que da sentido a los datos.`,
    6: `🌍 CORRELACIONES EXTERNAS: Estadística y gráficos en la vida cotidiana\n\n📰 EN LOS MEDIOS DE COMUNICACIÓN:\n• Los periódicos y noticieros muestran gráficos de barras para comparar precios, resultados electorales, índices de delincuencia.\n• Es crucial saber leerlos críticamente: un gráfico con el eje vertical cortado puede hacer que una diferencia pequeña parezca enorme.\n\n⚽ EN LOS DEPORTES:\n• Estadísticas de fútbol: goles por jugador, posesión de balón, tiros al arco. Todo se muestra en tablas y gráficos de barras.\n• En los Juegos Olímpicos, el medallero se presenta con pictogramas de medallas y gráficos de barras por país.\n\n🏫 EN LA ESCUELA:\n• Las notas del aula se pueden organizar en tablas para ver cuántos estudiantes aprobaron, cuántos necesitan refuerzo, etc.\n• Encuestas sobre actividades para el Día del Logro: los resultados en gráficos de barras ayudan a decidir democráticamente.\n\n🏪 EN LOS NEGOCIOS:\n• Las empresas usan gráficos de barras para ver las ventas mensuales y decidir qué productos promocionar.\n• Un restaurante puede encuestar a sus clientes sobre su plato favorito y usar un pictograma para el menú.\n\n🧪 EN LA CIENCIA:\n• Los experimentos generan datos que se organizan en tablas y se grafican para ver patrones y sacar conclusiones.\n\n🧠 REFLEXIÓN FINAL: "Un dato sin organizar es ruido; una tabla lo ordena; un gráfico lo ilumina. La estadística es la linterna que enciende el significado escondido entre los números."\n\n🗣️ CITA: "No hay nada más práctico que una buena teoría estadística." — George Box.`,
    7: `👥 MÓDULO DE PROYECTO GRUPAL: "Encuestadores Escolares: Periódico Estadístico"\n\n🎯 OBJETIVO: Diseñar y ejecutar una encuesta sobre un tema de interés escolar, organizar los resultados en tablas de frecuencia, representarlos en gráficos de barras y pictogramas, y publicar un "periódico estadístico" mural con las conclusiones.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ELECCIÓN DEL TEMA Y DISEÑO DE LA ENCUESTA (1 sesión)\n• 5 equipos, cada uno elige un tema: Deporte favorito, Programa de TV preferido, Fruta que más gusta, Medio de transporte al colegio, Actividad favorita en el recreo.\n• Plantean la pregunta y las opciones de respuesta (4 a 6 categorías).\n• Diseñan una hoja de encuesta sencilla.\n\nFASE 2: RECOLECCIÓN DE DATOS (1 sesión)\n• Cada equipo encuesta al menos a 30 compañeros de diferentes grados (coordinado con la docente).\n• Anotan los resultados en una tabla de conteo.\n\nFASE 3: ORGANIZACIÓN Y REPRESENTACIÓN (2 sesiones)\n• Construyen la tabla de frecuencia absoluta.\n• Dibujan un gráfico de barras en papel milimetrado o cartulina (reglas, colores).\n• Crean un pictograma para los mismos datos, eligiendo un ícono adecuado y una escala (ej: cada ícono = 2 o 5 estudiantes).\n• Identifican la moda y redactan conclusiones simples.\n\nFASE 4: MONTAJE DEL PERIÓDICO MURAL (1 sesión)\n• En una cartulina grande, cada equipo pega su encuesta, tabla, gráfico de barras y pictograma.\n• Incluyen un título llamativo ("Los Datos Hablan", "Estadística en Acción").\n• Escriben sus conclusiones en lenguaje claro: "El fútbol es el deporte favorito con 15 votos de 30 encuestados. En segundo lugar está el vóley con 8 votos."\n\nFASE 5: EXPOSICIÓN (1 sesión)\n• Cada equipo presenta su sección del periódico al resto de la clase.\n• Los compañeros pueden hacer preguntas sobre los datos.\n• Se realiza una votación: "¿Cuál fue la representación más clara?", "¿Cuál fue el tema más interesante?"\n\n🏆 EVALUACIÓN: Correcta construcción de tablas, precisión en los gráficos, creatividad en el pictograma, claridad de las conclusiones, trabajo en equipo.\n🎉 CIERRE: El periódico mural se expone en el patio de la escuela. Diplomas de "Estadístico Junior".`,
};

        const leccionExtensaNumV = {
            0: `🎯 OBJETIVO GENERAL: Consolidar el dominio de las operaciones con números decimales y fracciones, y desarrollar la comprensión de la proporcionalidad y los porcentajes, aplicándolos en la resolución de problemas matemáticos y situaciones de la vida real, preparando a los estudiantes de 5° y 6° grado para la educación secundaria.\n\n🎯 OBJETIVOS PARTICULARES:\n• Realizar sumas, restas, multiplicaciones y divisiones con números decimales con precisión.\n• Sumar y restar fracciones heterogéneas utilizando el mínimo común múltiplo.\n• Multiplicar y dividir fracciones.\n• Interpretar y calcular razones y proporciones.\n• Resolver problemas de proporcionalidad directa e inversa mediante la regla de tres.\n• Calcular porcentajes y aplicarlos a situaciones de descuento, aumento e interés.\n• Expresar un porcentaje como fracción y decimal, y viceversa.\n\n📌 NOCIONES PRINCIPALES:\n• Número decimal, décima, centésima, milésima.\n• Fracción, fracción equivalente, fracción irreductible, mínimo común múltiplo (MCM).\n• Razón, proporción, constante de proporcionalidad.\n• Proporcionalidad directa e inversa. Regla de tres simple.\n• Porcentaje (%), tanto por ciento.\n\n📌 NOCIONES SECUNDARIAS:\n• Notación científica básica (potencias de 10 con exponente positivo y negativo).\n• Aproximación y redondeo de decimales.\n• Escalas (planos y mapas) como aplicación de la proporcionalidad.\n• Reparto proporcional.\n• Interés simple como aplicación del porcentaje.\n\n🌍 INTERESES SOCIETALES:\n• Los números decimales y los porcentajes son esenciales en la economía familiar: compras, descuentos, impuestos (IGV), cuentas bancarias.\n• Las fracciones aparecen en la cocina (recetas), la carpintería (medidas) y la música (compases).\n• La proporcionalidad explica fenómenos como la densidad de población, las escalas en mapas, la velocidad constante.\n• Comprender estos conceptos empodera a los estudiantes para tomar decisiones informadas como ciudadanos y consumidores.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "La Feria de Ofertas y Recetas"\n\n🧩 MATERIALES: Folletos de supermercado, recibos de compra reales, calculadoras simples, tazas y cucharas medidoras, balanza de cocina, etiquetas de productos con precios, tarjetas con recetas, billetes didácticos.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Comparando Precios con Decimales" - Se muestran varios productos similares con precios por kg o por unidad (ej: Manzana S/3.50 x kg, Naranja S/2.80 x kg, Plátano S/2.99 x kg). Los estudiantes deben:\n• Ordenar precios de menor a mayor.\n• Calcular cuánto cuestan 2.5 kg de cada fruta.\n• Comparar: ¿qué fruta es más barata por kg? ¿Conviene comprar por kg o por unidad?\n\nESTACIÓN 2: "Cocina Fraccionaria" - Con una receta sencilla (limonada, queque) que usa fracciones (1/2 taza de azúcar, 3/4 taza de leche, 1/4 kg de mantequilla). Deben:\n• Convertir todas las fracciones a decimales.\n• Calcular los ingredientes necesarios para el doble de porciones y para la mitad.\n• Sumar fracciones de ingredientes (ej: 1/2 + 3/4 de taza de líquido total).\n\nESTACIÓN 3: "Descuentos Mágicos" - Con etiquetas de ropa o tecnología con descuentos (10%, 25%, 50%, 70%). Calcular:\n• Precio final después del descuento.\n• ¿Cuánto dinero se ahorra?\n• ¿Qué descuento conviene más: 20% + 10% adicional o 30% directo? (No siempre es igual).\n\nESTACIÓN 4: "Velocidad y Proporciones" - Con cronómetro, miden cuánto tardan en recorrer 10 metros caminando, trotando. Calculan la velocidad (metros por segundo). Luego, usando proporcionalidad, calculan cuánto tardarían en recorrer 100 m, 1 km.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Dónde encontramos decimales y porcentajes? ¿Cómo ayuda la proporcionalidad a predecir resultados? ¿Qué relación hay entre fracciones, decimales y porcentajes?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "De lo concreto a la regla matemática"\n\n📊 OBSERVACIÓN GUIADA: Fracciones ↔ Decimales ↔ Porcentajes\nLa docente presenta una tabla incompleta y los estudiantes la completan observando patrones:\n\n| Representación gráfica (barra dividida) | Fracción | Decimal | Porcentaje |\n|---|---|---|---|\n| ████████░░ | 4/5 | 0.8 | 80% |\n| ██████░░░░ | 3/5 | 0.6 | 60% |\n| ████░░░░░░ | ? | ? | ? |\n| ██████████ | 10/10 | 1.0 | 100% |\n\nPaso 1: Los estudiantes dividen numerador entre denominador para obtener el decimal: 1/2 = 0.5, 1/4 = 0.25, 3/4 = 0.75.\nPaso 2: Multiplican el decimal por 100 para el porcentaje: 0.5 × 100 = 50%.\nConclusión guiada: "Para convertir una fracción a porcentaje, dividimos numerador entre denominador y multiplicamos por 100".\n\n📊 PROPORCIONALIDAD DIRECTA:\nCaso: Compro 3 kg de papa por S/6. ¿Cuánto pagaré por 5 kg? ¿Y por 1 kg?\nTabla:\n| kg | 1 | 2 | 3 | 4 | 5 | 10 |\n| S/ | 2 | 4 | 6 | 8 | 10 | 20 |\nObservación: Cada vez que los kg aumentan al doble, el precio también. La razón precio/kg es constante (2).\nConclusión: "Si dos magnitudes varían manteniendo constante el cociente entre ellas, son directamente proporcionales".\n\n📊 PROPORCIONALIDAD INVERSA:\nCaso: Si 4 obreros tardan 6 días en construir un muro, ¿cuánto tardarán 8 obreros?\nTabla:\n| Obreros | 1 | 2 | 4 | 8 |\n| Días | 24 | 12 | 6 | 3 |\nObservación: Al duplicar obreros, los días se reducen a la mitad. Producto constante: 1×24 = 2×12 = 4×6 = 8×3 = 24.\nConclusión: "Si el producto de dos magnitudes es constante, son inversamente proporcionales".\n\n📝 REGISTRO: Los estudiantes escriben sus propias definiciones y ejemplos en su cuaderno.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Operaciones con Decimales, Fracciones, Proporcionalidad y Porcentajes\n\n🔢 1. OPERACIONES CON NÚMEROS DECIMALES\n\n📏 SUMA Y RESTA DE DECIMALES:\nSe alinean las comas decimales verticalmente. Se añaden ceros para igualar cifras.\nEjemplo: 45.7 + 3.25\n  45.70\n+  3.25\n= 48.95\n\n📏 MULTIPLICACIÓN DE DECIMALES:\nSe multiplican como enteros y luego se cuenta el número total de cifras decimales en los factores. Esa es la cantidad de decimales del producto.\nEjemplo: 3.5 × 2.4 → 35 × 24 = 840 → 3.5 (1 decimal) × 2.4 (1 decimal) = 2 decimales → 8.40 = 8.4\n\n📏 DIVISIÓN DE DECIMALES:\nSe multiplica dividendo y divisor por la potencia de 10 necesaria para que el divisor sea entero.\nEjemplo: 7.5 ÷ 0.25 → (7.5 × 100) ÷ (0.25 × 100) = 750 ÷ 25 = 30\n\n📏 MULTIPLICACIÓN Y DIVISIÓN POR POTENCIAS DE 10:\n• Multiplicar por 10, 100, 1000: se mueve la coma a la derecha (1, 2, 3 lugares). Ej: 3.78 × 100 = 378.\n• Dividir entre 10, 100, 1000: se mueve la coma a la izquierda. Ej: 45.6 ÷ 10 = 4.56.\n\n🔢 2. OPERACIONES CON FRACCIONES\n\n📏 FRACCIONES EQUIVALENTES: Se obtienen multiplicando o dividiendo numerador y denominador por un mismo número. Ej: 1/2 = 2/4 = 4/8 = 50/100.\n\n📏 SUMA Y RESTA DE FRACCIONES:\n• Homogéneas: mismo denominador → sumar/restar numeradores. Ej: 3/8 + 2/8 = 5/8.\n• Heterogéneas: se busca el MCM de los denominadores, se convierten a fracciones equivalentes, luego se suman/restan.\nEj: 1/3 + 1/4 → MCM(3,4)=12 → 4/12 + 3/12 = 7/12.\n\n📏 MULTIPLICACIÓN: Se multiplican numeradores entre sí y denominadores entre sí. Ej: 2/3 × 4/5 = 8/15.\n📏 DIVISIÓN: Se multiplica en cruz (producto cruzado) o se multiplica por el inverso. Ej: 3/4 ÷ 2/5 = 3/4 × 5/2 = 15/8.\n\n🔢 3. RAZONES Y PROPORCIONES\n\n📏 RAZÓN: Comparación entre dos cantidades mediante división. Ej: en un aula hay 12 niñas y 18 niños → razón niñas/niños = 12/18 = 2/3.\n\n📏 PROPORCIÓN: Igualdad de dos razones. a/b = c/d. Propiedad fundamental: a×d = b×c (producto de extremos = producto de medios).\n\n🔢 4. PROPORCIONALIDAD DIRECTA E INVERSA\n\n📈 DIRECTA: Si A aumenta, B aumenta en la misma proporción. A/B = constante.\nRepresentación gráfica: línea recta que pasa por el origen.\nEjemplo: velocidad constante → distancia = velocidad × tiempo.\n\n📉 INVERSA: Si A aumenta, B disminuye en la misma proporción. A×B = constante.\nRepresentación gráfica: hipérbola.\nEjemplo: número de obreros y tiempo para terminar una obra.\n\n📏 REGLA DE TRES SIMPLE:\n• Directa: Si 5 lápices cuestan S/15, ¿cuánto cuestan 8 lápices?\n  5 → 15\n  8 → x  ⇒ x = (8×15)/5 = 24\n• Inversa: Si 6 obreros tardan 10 días, 15 obreros ¿cuánto tardan?\n  6 → 10\n  15 → x  ⇒ x = (6×10)/15 = 4 días.\n\n🔢 5. PORCENTAJES\n\n📏 DEFINICIÓN: Un porcentaje es una razón con denominador 100. 25% = 25/100 = 0.25.\n\n📏 CÁLCULO DE PORCENTAJE DE UNA CANTIDAD: a% de N = (a/100) × N.\nEj: 15% de 200 = (15/100)×200 = 30.\n\n📏 AUMENTOS Y DESCUENTOS:\n• Aumento del a%: Precio final = Precio inicial × (1 + a/100). Ej: Aumento 20% sobre S/50 → 50 × 1.20 = S/60.\n• Descuento del a%: Precio final = Precio inicial × (1 - a/100). Ej: Descuento 30% sobre S/50 → 50 × 0.70 = S/35.\n\n⚠️ ERRORES COMUNES:\n• Desalinear comas al sumar decimales.\n• No convertir a fracciones equivalentes antes de sumar fracciones heterogéneas.\n• Confundir proporcionalidad directa con inversa.\n• Sumar porcentajes de diferentes bases (ej: descuento 20% + 10% ≠ 30% sobre el mismo precio).`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Decimales\n1. Suma: 45.32 + 8.7 + 0.115 = (54.135)\n2. Resta: 200 - 67.89 = (132.11)\n3. Multiplica: 3.6 × 2.5 = (9.0); 0.75 × 4.2 = (3.15)\n4. Divide: 12.6 ÷ 0.3 = (42); 5.5 ÷ 0.25 = (22)\n5. Multiplica mentalmente: a) 3.456 × 10 = (34.56) b) 0.89 × 1000 = (890) c) 567 ÷ 100 = (5.67)\n6. Redondea a la décima: 4.38 → (4.4) ; 9.92 → (9.9)\n\n📝 BLOQUE 2: Fracciones\n7. Simplifica: 15/20 = (3/4); 28/42 = (2/3)\n8. Suma: 2/5 + 1/3 = (11/15); 3/8 + 5/6 = (29/24 = 1 5/24)\n9. Resta: 7/10 - 2/5 = (3/10); 3 - 5/8 = (19/8 = 2 3/8)\n10. Multiplica: 3/4 × 5/6 = (15/24 = 5/8); 2/3 × 9/10 = (18/30 = 3/5)\n11. Divide: 5/8 ÷ 3/4 = (20/24 = 5/6); 7/9 ÷ 2/3 = (21/18 = 7/6 = 1 1/6)\n\n📝 BLOQUE 3: Proporcionalidad\n12. Si 4 cuadernos cuestan S/24, ¿cuánto cuestan 7? (S/42)\n13. Un grifo llena un tanque en 12 horas. ¿Cuánto tardarán 3 grifos iguales? (4 horas)\n14. En 100 km un auto gasta 6 litros. ¿Cuánto gastará en 350 km? (21 litros)\n15. Si 8 albañiles tardan 15 días en construir una pared, ¿cuántos días tardarán 5 albañiles? (24 días) ¡Cuidado! Es inversa.\n\n📝 BLOQUE 4: Porcentajes\n16. Calcula: a) 25% de 400 = (100) b) 10% de 850 = (85) c) 75% de 200 = (150) d) 5% de 60 = (3)\n17. Una camisa cuesta S/80 y tiene 20% de descuento. ¿Cuánto pago? (S/64)\n18. Un sueldo de S/1500 aumenta 15%. ¿Cuál es el nuevo sueldo? (S/1725)\n19. Si pagué S/153 por un artículo con 15% de descuento ya aplicado, ¿cuál era el precio original? (S/180)\n20. ¿Qué porcentaje de 200 es 50? (25%)\n\n📝 BLOQUE 5: Problemas integrados\n21. Receta: 3/4 kg de harina, 1/2 kg de mantequilla, 1/4 kg de azúcar. ¿Cuánto pesa la mezcla total? (1.5 kg o 1 1/2 kg). Si quiero hacer 3 veces la receta, ¿cuánto necesito de cada ingrediente?\n22. Un televisor cuesta S/1200 + IGV (18%). ¿Precio final? (S/1416).\n23. En un mapa a escala 1:50000, 8 cm representan ¿cuántos km? (4 km).\n\n⏱️ Tiempo estimado: 60-90 min. ✅ Revisión en parejas.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Geometría, Álgebra y Estadística\n\n📐 CONEXIÓN CON GEOMETRÍA:\n• Cálculo de áreas con números decimales (base 3.5 cm, altura 2.4 cm).\n• Escalas: un plano a escala 1:50 implica proporcionalidad. Si 1 cm = 50 cm reales, 3.2 cm = 160 cm.\n• El número pi (π ≈ 3.1416...) es un decimal infinito no periódico.\n• Volumen de prismas: dimensiones con decimales.\n\n📏 CONEXIÓN CON ÁLGEBRA:\n• La proporción a/b = c/d lleva a ecuaciones: 3x = 24.\n• La regla de tres es una ecuación disfrazada: x = (a×c)/b.\n• Al representar porcentajes desconocidos: x% de 200 = 50 → (x/100)×200 = 50 → 2x = 50 → x = 25.\n\n📊 CONEXIÓN CON ESTADÍSTICA:\n• Gráficos circulares: cada sector es un porcentaje del total (100%).\n• Encuestas: "El 40% de los estudiantes prefiere fútbol" → 40/100 = 2/5.\n• Promedios con decimales.\n\n🧩 ACTIVIDAD INTEGRADORA: "Análisis de una encuesta escolar": Realizar una encuesta sobre un tema (deporte favorito), calcular frecuencias, convertir a fracciones, decimales y porcentajes, y representar en gráfico circular.\n\n💡 REFLEXIÓN: Los números racionales (fracciones y decimales) y los porcentajes son el lenguaje común de todas las ramas de las matemáticas. Sin ellos, no podríamos expresar medidas precisas ni comparar datos.`,
            6: `🌍 CORRELACIONES EXTERNAS: Números racionales y proporcionalidad en el mundo real\n\n🏪 ECONOMÍA Y FINANZAS:\n• El IGV en Perú es 18% (antes 19%). Cada compra incluye este impuesto.\n• Interés bancario: 3% anual sobre ahorros, 15% anual en préstamos.\n• Descuentos por temporada: "Hasta 70% off".\n• Tipo de cambio: S/3.75 por dólar.\n\n🍳 COCINA Y REPOSTERÍA:\n• Las recetas usan fracciones: 3/4 taza, 1/2 cucharadita.\n• Ajustar porciones: regla de tres para calcular ingredientes.\n• Temperatura del horno: Celsius y Fahrenheit (proporción lineal).\n\n🚗 TRANSPORTE:\n• Rendimiento: 40 km por galón. ¿Cuánto gasto en 250 km? (6.25 galones).\n• Velocidad = distancia / tiempo. Si recorro 180 km en 2.5 horas, mi velocidad media es 72 km/h.\n• Escalas en mapas: 1 cm = 10 km.\n\n⚕️ SALUD:\n• Dosis de medicamentos en mg por kg de peso (proporcionalidad directa).\n• Etiquetas nutricionales: % de valor diario recomendado.\n• IMC = peso / talla² (implica decimales y proporción).\n\n⚽ DEPORTES:\n• Porcentaje de efectividad en tiros al arco.\n• Estadísticas de jugadores: promedio de bateo, porcentaje de pases acertados.\n\n🧠 REFLEXIÓN FINAL: "Vivimos en un mundo de números racionales. Desde el 50% de probabilidad de lluvia hasta el 18% de IGV, comprender decimales, fracciones y porcentajes nos permite interpretar mejor la realidad y tomar decisiones informadas."\n\n🗣️ CITA: "La matemática es la ciencia del orden y la medida, de las bellas cadenas de razonamiento, todo simple y fácil." — René Descartes.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Emprendedores Matemáticos: Nuestra Tienda Virtual"\n\n🎯 OBJETIVO: Los estudiantes crearán un catálogo de productos, aplicando costos, descuentos, porcentajes, fracciones y proporcionalidad, simulando un negocio real.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ORGANIZACIÓN (1 sesión)\n• 5 equipos de 4-5 estudiantes.\n• Cada equipo elige un rubro: Ropa, Tecnología, Alimentos, Librería, Juguetería.\n• Se nombran roles: Gerente (coordina), Contador (cálculos), Diseñador (catálogo), Vendedor (presentación).\n\nFASE 2: CREACIÓN DEL CATÁLOGO (2 sesiones)\n• Cada equipo selecciona 10 productos con precios reales (investigación previa en folletos o internet).\n• Deben expresar precios en decimales (S/29.90, S/149.99).\n• Crean ofertas usando porcentajes (10%, 25%, 50% de descuento) y las expresan como fracción y decimal.\n• Calculan el precio final de cada producto con descuento.\n• Si ofrecen "2x1" o "lleve 3 pague 2", modelan con fracciones y proporciones.\n\nFASE 3: REGISTRO CONTABLE (1 sesión)\n• Simulan ventas a compañeros de otros equipos usando billetes didácticos.\n• Registran en una tabla: producto, cantidad, precio unitario, subtotal, descuento aplicado (%), IGV (18%), total.\n• Suman totales de ventas con decimales.\n• Calculan ganancia si el costo de compra fue 60% del precio de venta.\n\nFASE 4: ANÁLISIS Y ESTADÍSTICA (1 sesión)\n• ¿Qué producto se vendió más? Expresar como fracción del total de ventas.\n• ¿Qué porcentaje de descuento fue el más usado?\n• Calcular el ticket promedio (total ventas / número de transacciones).\n\nFASE 5: PRESENTACIÓN (1 sesión)\n• Cada equipo presenta su catálogo (formato físico o digital).\n• Explica al menos 3 cálculos realizados: un descuento, un cálculo con fracciones, una regla de tres.\n• Responde preguntas del público (compañeros y docente).\n\n🏆 EVALUACIÓN: Precisión en cálculos, uso correcto de decimales/porcentajes/fracciones, creatividad, trabajo en equipo, claridad en la presentación.\n🎉 CIERRE: Se entregan diplomas de "Emprendedor Matemático". El catálogo se expone en el mural escolar.`,
