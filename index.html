        const leccionExtensaMetodoVII = {
            0: `🎯 OBJETIVO GENERAL: Capacitar a los estudiantes de 3° a 5° de secundaria en la aplicación avanzada del Método Científico, con énfasis en el diseño experimental riguroso, la identificación y control de sesgos, la distinción crítica entre correlación y causalidad, el uso de pruebas estadísticas básicas para validar hipótesis, y la comunicación formal de resultados científicos, preparándolos para investigaciones preuniversitarias y para el ejercicio del pensamiento científico como ciudadanos críticos.\n\n🎯 OBJETIVOS PARTICULARES:\n• Diseñar experimentos controlando rigurosamente variables extrañas, incluyendo el uso de grupos control, aleatorización y técnicas de enmascaramiento (simple ciego, doble ciego).\n• Identificar y explicar diferentes tipos de sesgos en la investigación (sesgo de selección, sesgo de confirmación, efecto placebo, sesgo del experimentador, sesgo de publicación).\n• Operacionalizar variables abstractas definiéndolas en términos medibles, válidos y confiables.\n• Diferenciar claramente entre CORRELACIÓN (dos variables varían conjuntamente) y CAUSALIDAD (una variable produce el cambio en la otra), aplicando los criterios de causalidad (temporalidad, fuerza de asociación, dosis-respuesta, plausibilidad biológica).\n• Aplicar el contraste de hipótesis estadística básica (hipótesis nula H₀, hipótesis alternativa H₁, valor p, nivel de significancia α=0.05) para tomar decisiones basadas en datos.\n• Calcular e interpretar medidas de tendencia central (media, mediana) y dispersión (rango, desviación estándar muestral).\n• Redactar informes científicos completos siguiendo el formato IMRyD (Introducción, Métodos, Resultados y Discusión) con citación adecuada de fuentes.\n• Evaluar críticamente afirmaciones pseudocientíficas, noticias sobre estudios y publicidad engañosa aplicando los principios del método científico.\n\n📌 NOCIONES PRINCIPALES:\n• Diseño experimental: aleatorización, grupos control y experimentales, réplicas, técnicas de enmascaramiento.\n• Sesgos: de selección, de confirmación, efecto placebo, del experimentador, de publicación.\n• Correlación (coeficiente de correlación r de Pearson, nivel introductorio) vs. Causalidad. Criterios de Bradford Hill (selección).\n• Operacionalización de variables: definición conceptual vs. operacional.\n• Hipótesis nula (H₀: no hay efecto/diferencia) y alternativa (H₁: sí hay efecto/diferencia). Valor p y significancia estadística.\n• Error tipo I (falso positivo: rechazar H₀ cuando es verdadera) y Error tipo II (falso negativo: no rechazar H₀ cuando es falsa).\n• Estadística descriptiva: media, mediana, moda, rango, desviación estándar.\n• Formato IMRyD para informes científicos.\n\n📌 NOCIONES SECUNDARIAS:\n• Tamaño de muestra y poder estadístico (nociones introductorias).\n• Intervalos de confianza.\n• Meta-análisis y revisiones sistemáticas como cúspide de la evidencia científica.\n• Principios éticos de la investigación con seres humanos (Declaración de Helsinki).\n\n🌍 INTERESES SOCIETALES:\n• En la era de la desinformación y las "fake news", distinguir entre estudios científicos rigurosos y pseudociencia es una habilidad esencial para la ciudadanía.\n• Entender qué significa "científicamente comprobado" permite a los consumidores tomar decisiones informadas sobre productos de salud, alimentación y tecnología.\n• Los grandes debates sociales (vacunación, cambio climático, energía nuclear, organismos genéticamente modificados) requieren una comprensión de cómo se genera y valida el conocimiento científico.\n• La investigación de calidad en el Perú es fundamental para el desarrollo nacional; formar jóvenes con pensamiento científico riguroso es sembrar el futuro.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "El desafío de la verdad: Detectives de la Pseudociencia"\n\n🧩 MATERIALES: Dos productos "milagrosos" de venta comercial (ej: pulsera magnética "que mejora el equilibrio", agua "alcalina" que "cura enfermedades", o un video de "fantasmas captados en cámara"), cronómetros, cinta métrica, dinamómetro, monedas, dados, calculadora, computadora con acceso a internet (para buscar el estudio original si es posible).\n\n🎲 LA INVESTIGACIÓN:\n\nPARTE 1: "Analizando una afirmación extraordinaria"\nSe presenta a los estudiantes un producto o afirmación pseudocientífica. Por ejemplo: "Esta pulsera con imanes mejora el equilibrio y la fuerza en un 300%". Se muestran testimonios de usuarios satisfechos como "evidencia".\n\nLos estudiantes deben:\n1. Identificar la afirmación central que se hace sobre el producto.\n2. Preguntarse: ¿Es una afirmación comprobable? ¿Cómo se podría poner a prueba?\n3. Detectar posibles sesgos en los testimonios: ¿Son solo personas que ya creían en el producto? ¿Hay algún incentivo económico? ¿Dónde están las personas a las que no les funcionó?\n4. Diseñar un experimento controlado para poner a prueba la afirmación: ¿Cómo se asegurarían de que los participantes no sepan si están usando la pulsera real o una falsa (placebo)? ¿Qué medirían exactamente? ¿Cuántas personas necesitarían?\n\nPARTE 2: "Experimento rápido: La moneda 'mágica'"\nSe propone a los estudiantes: "¿Tienes mejor pulso en tu mano dominante o en la no dominante?"\nFormulan hipótesis. Luego realizan un mini-experimento:\n- Sostienen una regla entre los dedos índice y pulgar de la mano dominante, la sueltan y la atrapan lo más rápido posible. Miden la distancia de caída (reflejo). Repiten 10 veces.\n- Repiten con la mano no dominante.\n- Calculan promedios y comparan.\nPero... la mitad de los grupos empieza con la mano dominante y la otra mitad con la no dominante. ¿Por qué? (Para controlar el efecto del aprendizaje/practica: si todos empiezan con la dominante, la no dominante podría parecer peor solo porque se hizo primero). Esto introduce la importancia de la ALEATORIZACIÓN y el CONTROBALANCEO.\n\nPARTE 3: "Correlación espuria"\nSe presentan gráficos de correlaciones reales pero absurdas (ej: "Consumo de queso per cápita vs. Número de personas que mueren enredadas en sus sábanas", datos reales del sitio Spurious Correlations). Los estudiantes discuten: ¿Una causa la otra? ¿Qué variable oculta podría explicar ambas? Se introduce la frase: "Correlación no implica causalidad".\n\n💬 REFLEXIÓN: ¿Qué hace que un estudio sea confiable? ¿Por qué los testimonios personales no son evidencia científica suficiente?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Destilando la esencia del rigor científico"\n\n📊 OBSERVACIÓN GUIADA 1: DETECTANDO SESGOS\nSe presentan viñetas de investigaciones con defectos metodológicos. Los estudiantes identifican el sesgo:\n\nVIÑETA A: "Un estudio sobre un nuevo medicamento para la depresión seleccionó a sus participantes mediante un anuncio en Instagram dirigido a jóvenes de 18-25 años. Concluyó que el medicamento es efectivo en 'toda la población'."\n➡️ SESGO DE SELECCIÓN: la muestra no es representativa de toda la población (excluye a adultos mayores, personas sin acceso a redes sociales, etc.).\n\nVIÑETA B: "Un científico cree firmemente que el extracto de uña de gato cura el cáncer. En su experimento, él mismo administra el extracto al grupo experimental y un placebo al grupo control, y evalúa la reducción de tumores. Sabe qué grupo es cuál."\n➡️ SESGO DEL EXPERIMENTADOR: sus expectativas pueden influir inconscientemente en cómo evalúa los resultados. Debería ser un estudio DOBLE CIEGO.\n\nVIÑETA C: "Un laboratorio farmacéutico publica 5 estudios que muestran que su nuevo fármaco es efectivo. No publica los 3 estudios que no encontraron ningún efecto porque 'no son resultados interesantes'."\n➡️ SESGO DE PUBLICACIÓN: solo se hacen públicos los resultados positivos, distorsionando la percepción de la efectividad real del fármaco.\n\nVIÑETA D: "Pacientes que recibieron una pastilla de azúcar (placebo) reportaron una disminución del 30% en su dolor de cabeza."\n➡️ EFECTO PLACEBO: la creencia de recibir un tratamiento puede producir un efecto real. Por eso se necesitan grupos control con placebo.\n\n📊 OBSERVACIÓN GUIADA 2: CORRELACIÓN VS. CAUSALIDAD\nSe entrega una lista de pares de variables correlacionadas. Los estudiantes deben decidir si la relación es probablemente CAUSAL, probablemente CORRELACIÓN ESPURIA (por azar o variable oculta), o INCIERTA:\n\n1. "A mayor educación de los padres, mayor ingreso económico de los hijos adultos." (Probablemente CAUSAL parcial, pero hay variables ocultas: entorno socioeconómico, acceso a oportunidades).\n2. "En las ciudades donde hay más iglesias, hay más robos." (Variable oculta: TAMAÑO DE LA POBLACIÓN. Ciudades más grandes tienen más de todo).\n3. "Fumar cigarrillos y cáncer de pulmón." (CAUSAL: cumple temporalidad, dosis-respuesta, plausibilidad biológica).\n4. "Dormir con zapatos y despertar con dolor de cabeza." (Variable oculta: EMBRIAGUEZ. Las personas que se duermen con zapatos probablemente lo hacen por intoxicación alcohólica, que es la verdadera causa del dolor de cabeza).\n\n📝 REGISTRO: Mapa conceptual de tipos de sesgos con ejemplos. Tabla de criterios para distinguir correlación de causalidad.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Método Científico Avanzado – Ciclo VII\n\n🧪 DEL MÉTODO BÁSICO AL DISEÑO EXPERIMENTAL RIGUROSO\n\nEn el nivel avanzado, el método científico se aborda con la profundidad necesaria para producir conocimiento confiable, minimizando el error y el sesgo.\n\n📏 1. OPERACIONALIZACIÓN DE VARIABLES\n\nUna variable abstracta (ej: "inteligencia", "estrés", "crecimiento") debe definirse operacionalmente: cómo se va a MEDIR en el experimento concreto.\n• Definición conceptual: "El estrés es un estado de tensión física y emocional".\n• Definición operacional: "El estrés se medirá mediante el nivel de cortisol en saliva (μg/dL) y mediante la Escala de Estrés Percibido (EEP) con puntaje de 0 a 40".\nEsta precisión permite que otros investigadores repliquen el estudio.\n\n📏 2. CONTROL RIGUROSO DE SESGOS\n\n• SESGO DE SELECCIÓN: Ocurre cuando los grupos no son comparables desde el inicio. Solución: ALEATORIZACIÓN (asignar al azar los participantes a los grupos).\n• SESGO DE CONFIRMACIÓN: Tendencia a buscar, interpretar o recordar información que confirme nuestras creencias previas. Solución: Diseñar el experimento para intentar REFUTAR la hipótesis, no solo confirmarla. La hipótesis nula ayuda con esto.\n• SESGO DEL EXPERIMENTADOR (Efecto Rosenthal): Las expectativas del investigador influyen inconscientemente en los resultados. Solución: ESTUDIO DOBLE CIEGO (ni el participante ni el experimentador que interactúa directamente saben quién está en el grupo control y quién en el experimental).\n• EFECTO PLACEBO: La creencia de recibir un tratamiento produce un efecto real. Solución: GRUPO CONTROL CON PLACEBO idéntico en apariencia. ESTUDIO SIMPLE CIEGO (el participante no sabe a qué grupo pertenece).\n• SESGO DE PUBLICACIÓN: Los estudios con resultados positivos (que rechazan H₀) tienen más probabilidad de ser publicados. Solución: registrar los estudios antes de realizarlos (pre-registro) y publicar todos los resultados.\n\n📏 3. CORRELACIÓN VS. CAUSALIDAD (CRITERIOS DE BRADFORD HILL)\n\nCORRELACIÓN: Dos variables varían juntas (coeficiente de correlación r de Pearson, de -1 a +1). Una correlación, por fuerte que sea, NO implica necesariamente causalidad.\n\nPara inferir CAUSALIDAD, se requieren criterios como:\n1. TEMPORALIDAD: La causa debe preceder al efecto.\n2. FUERZA DE ASOCIACIÓN: A mayor correlación, más probable la causalidad (aunque no garantiza).\n3. RELACIÓN DOSIS-RESPUESTA: A mayor dosis de la causa, mayor efecto.\n4. PLAUSIBILIDAD BIOLÓGICA: Existe un mecanismo científico que explica la relación.\n5. CONSISTENCIA: Diferentes estudios en distintas poblaciones encuentran resultados similares.\n6. EXPERIMENTACIÓN: La modificación controlada de la causa produce cambios en el efecto (el estándar de oro).\n\n📏 4. CONTRASTE DE HIPÓTESIS ESTADÍSTICA\n\n• HIPÓTESIS NULA (H₀): Afirma que NO hay efecto, NO hay diferencia, NO hay relación. Es la que se somete a prueba. Ej: H₀: "La concentración de sal NO afecta el tiempo de germinación. Las medias de todos los grupos son iguales (μ₀% = μ₅% = μ₁₀% = μ₁₅%)".\n• HIPÓTESIS ALTERNATIVA (H₁): Afirma que SÍ hay efecto. Ej: H₁: "Al menos una de las medias es diferente. La concentración de sal SÍ afecta el tiempo de germinación".\n\nSe recogen datos y se calcula un estadístico de prueba que produce un VALOR p.\n• VALOR p: Probabilidad de obtener los resultados observados (o más extremos) si H₀ fuera verdadera. Si p es muy pequeño, es poco probable que H₀ sea cierta.\n• NIVEL DE SIGNIFICANCIA α (alfa): Umbral que establecemos (usualmente 0.05 o 5%). Si p < α, RECHAZAMOS H₀ y aceptamos H₁ (el resultado es estadísticamente significativo). Si p ≥ α, NO RECHAZAMOS H₀ (no tenemos suficiente evidencia para afirmar que hay efecto).\n\n⚠️ ERRORES:\n• ERROR TIPO I (α): Rechazar H₀ cuando es verdadera (falso positivo: creer que hay efecto cuando no lo hay).\n• ERROR TIPO II (β): No rechazar H₀ cuando es falsa (falso negativo: no detectar un efecto que sí existe).\n\n📏 5. FORMATO IMRyD PARA INFORMES CIENTÍFICOS\n\n• INTRODUCCIÓN: Antecedentes, pregunta de investigación, hipótesis y objetivos.\n• MÉTODOS: Diseño experimental, participantes/muestra, variables (operacionalización), procedimiento detallado, análisis estadístico planeado. (Debe ser tan detallado que otro investigador pueda replicar el estudio).\n• RESULTADOS: Hallazgos objetivos. Tablas y figuras con sus leyendas. Estadísticos descriptivos e inferenciales. NO se interpretan aquí.\n• DISCUSIÓN (y Conclusión): Interpretación de los resultados. ¿Se apoyó la hipótesis? Comparación con estudios previos. Limitaciones del estudio. Implicaciones y futuras investigaciones.\n\n⚠️ ERRORES COMUNES EN EL NIVEL AVANZADO:\n• Confundir "no rechazar H₀" con "H₀ es verdadera". (Solo decimos que no hay suficiente evidencia para rechazarla).\n• Interpretar un valor p como "la probabilidad de que H₀ sea cierta". (El valor p asume que H₀ es cierta y calcula la probabilidad de los datos, no al revés).\n• Usar la palabra "significativo" en el sentido cotidiano en lugar del sentido estadístico.\n• No considerar el tamaño del efecto: un resultado puede ser estadísticamente significativo pero prácticamente insignificante.\n• Asumir causalidad a partir de estudios observacionales sin experimentación controlada.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Método Científico Avanzado – Ciclo VII\n\n📝 BLOQUE 1: Identificando sesgos y fallos metodológicos\nLee el siguiente caso y responde:\n\n"Un nutricionista famoso afirma que su nueva dieta 'Detox 7 Días' elimina toxinas y produce una pérdida de peso promedio de 5 kg. Como evidencia, presenta los testimonios de 20 clientes que perdieron peso y se sintieron con más energía. Afirma que 'el 100% de los que siguieron la dieta vieron resultados'. No menciona cuántos clientes abandonaron la dieta, ni si se comparó con un grupo que hiciera otra dieta o ninguna."\n\n1. Identifica al menos 3 problemas metodológicos o sesgos en esta afirmación:\n   a) (Sesgo de selección: solo se presentan los casos exitosos; los que no perdieron peso o abandonaron no aparecen).\n   b) (Ausencia de grupo control: no sabemos si habrían perdido peso igual sin la dieta o con otra).\n   c) (No es doble ciego ni simple ciego: el efecto placebo y la sugestión pueden explicar parte del resultado).\n   d) (Falta de operacionalización: ¿cómo se midió 'eliminar toxinas'? Es un término vago y no medible).\n   e) (Tamaño de muestra pequeño y sin aleatorización).\n\n📝 BLOQUE 2: Correlación vs. Causalidad\nUn estudio encuentra una correlación positiva entre el número de horas que los niños ven televisión y su índice de masa corporal (IMC). La correlación es r = 0.45 (moderada) y el valor p < 0.01.\n\n1. ¿Significa esto que ver televisión CAUSA obesidad? Justifica usando al menos 3 criterios de causalidad.\n   (Respuesta: No necesariamente. Aunque hay temporalidad plausible, la correlación no implica causalidad. Podría haber variables ocultas: los niños que ven más TV podrían hacer menos ejercicio, tener padres con menos recursos/tiempo para actividades al aire libre, o comer más snacks mientras ven TV. Para establecer causalidad se necesitaría un experimento controlado donde se asigne aleatoriamente a niños a diferentes horas de TV y se controle la dieta y el ejercicio, lo cual es éticamente complejo. La correlación es una señal de alarma, no una prueba de causalidad).\n\n2. ¿Qué significa que p < 0.01 en este contexto?\n   (Significa: si asumimos que NO hay relación entre horas de TV e IMC en la población [H₀], la probabilidad de encontrar en una muestra una correlación tan fuerte o más fuerte que r = 0.45 por puro azar es menor al 1%. Por lo tanto, rechazamos H₀ y concluimos que la correlación es estadísticamente significativa. Pero insistimos: correlación significativa ≠ causalidad).\n\n📝 BLOQUE 3: Diseño experimental con control de sesgos\nDiseña un experimento para probar si la música de Mozart (vs. silencio vs. ruido blanco) mejora el rendimiento en una prueba de razonamiento espacial. Incluye:\n- Operacionalización de las variables.\n- Cómo harías la aleatorización.\n- Cómo implementarías el simple ciego o doble ciego.\n- Cuál sería la H₀ y la H₁.\n- Qué análisis estadístico básico propondrías.\n\n⏱️ Tiempo: 90 min. ✅ Discusión crítica y puesta en común.`,
            5: `🔗 CORRELACIONES INTERNAS: La estadística y la lógica al servicio de toda la ciencia\n\n🧮 CON MATEMÁTICA:\n• La estadística inferencial (contraste de hipótesis, valor p, intervalos de confianza) es el lenguaje matemático del método científico.\n• El cálculo de probabilidades permite cuantificar la incertidumbre en las conclusiones científicas.\n• Las funciones y gráficos (lineales, exponenciales, logarítmicos) modelan las relaciones entre variables.\n\n🧪 CON QUÍMICA:\n• La determinación de constantes físicas (constante de equilibrio Kc, constante de velocidad k) implica experimentos con múltiples repeticiones, control riguroso de temperatura y concentración, y análisis de regresión para encontrar la relación funcional.\n• Los métodos analíticos (espectrofotometría, titulación) requieren curvas de calibración y estimación del error experimental.\n\n🧬 CON BIOLOGÍA:\n• Los ensayos clínicos controlados aleatorizados (ECA) son el máximo exponente del diseño experimental riguroso.\n• La genética mendeliana se validó mediante el análisis estadístico de proporciones en grandes muestras de descendencia.\n• La epidemiología utiliza estudios de cohorte y de casos y controles para investigar asociaciones, siempre con la cautela de no confundir correlación con causalidad.\n\n⚡ CON FÍSICA:\n• La física es la ciencia que históricamente desarrolló el método experimental de mayor precisión: medición exacta, estimación de incertidumbres, propagación de errores y comparación con predicciones teóricas.\n\n🧩 ACTIVIDAD INTEGRADORA: "Meta-análisis de aula": Cada equipo busca un estudio sobre un mismo tema (ej: efecto de la cafeína en el tiempo de reacción), analiza críticamente su metodología y resultados. Luego, en conjunto, discuten la consistencia de la evidencia y las diferencias en los diseños. ¿Hay consenso científico?`,
            6: `🌍 CORRELACIONES EXTERNAS: Pensamiento crítico en la era de la información\n\n📰 CIENCIA Y MEDIOS DE COMUNICACIÓN:\nLos titulares sensacionalistas a menudo distorsionan los hallazgos científicos: "Estudio revela que el chocolate cura la depresión" (cuando el estudio original solo encontró una correlación débil en una muestra pequeña de ratones). Aprender a leer el estudio original (o al menos el abstract) y evaluar su calidad metodológica es una habilidad ciudadana esencial.\n\n💊 INDUSTRIA FARMACÉUTICA Y REGULACIÓN:\nLa exigencia de ensayos clínicos rigurosos, doble ciego, aleatorizados y con tamaños de muestra grandes para aprobar medicamentos es una conquista del método científico aplicado a la salud pública. Sin embargo, el sesgo de publicación y los conflictos de intereses económicos son desafíos constantes que requieren vigilancia.\n\n⚖️ SISTEMA JUDICIAL Y EVIDENCIA CIENTÍFICA:\nLa prueba de ADN, las huellas dactilares, la balística y la toxicología forense son aplicaciones del método científico en la administración de justicia. Pero también aquí hay riesgos de sesgos: un perito puede interpretar subjetivamente una evidencia ambigua. La ciencia forense avanza hacia estándares más rigurosos de validación y estimación de tasas de error.\n\n🌐 DESINFORMACIÓN Y REDES SOCIALES:\nEn la era de la post-verdad, las afirmaciones pseudocientíficas se viralizan más rápido que los desmentidos rigurosos. Saber evaluar fuentes (¿Es un artículo de una revista indexada con revisión por pares? ¿Es un blog anónimo? ¿Hay conflicto de intereses?), identificar sesgos y exigir evidencia antes de compartir información es una responsabilidad ética de todo ciudadano digital.\n\n🧠 REFLEXIÓN: "El método científico es la mejor herramienta que ha desarrollado la humanidad para distinguir lo que es verdad de lo que quisiéramos que fuera verdad. En un mundo inundado de información, el pensamiento crítico es nuestro salvavidas."`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Simposio de Investigación Científica Juvenil – Ciclo VII"\n\n🎯 OBJETIVO: Los equipos diseñarán, ejecutarán y presentarán un proyecto de investigación completo con diseño experimental riguroso, control de sesgos, análisis estadístico básico y presentación formal en formato IMRyD, simulando el proceso de una publicación científica.\n\n📋 FASES:\n\n1. FORMULACIÓN DEL PROYECTO Y REVISIÓN ÉTICA (1 sesión)\n   - Cada equipo (3-4 integrantes) propone un tema de investigación original o una réplica mejorada de un experimento clásico.\n   - Áreas sugeridas:\n     • ¿El tipo de música (clásica, rock, silencio) afecta la concentración medida con test de atención?\n     • ¿La privación de sueño (desvelarse vs dormir 8h) afecta el tiempo de reacción?\n     • ¿El color del envase influye en la percepción del sabor? (con bebidas idénticas en envases de colores diferentes, control simple ciego).\n     • ¿La pendiente de un plano inclinado afecta la aceleración de un móvil? (física, con múltiples réplicas y análisis de regresión).\n     • ¿La temperatura del agua afecta la velocidad de efervescencia de una pastilla? (química).\n   - Requisito indispensable: OPERACIONALIZACIÓN clara de todas las variables, ALEATORIZACIÓN en la asignación a grupos, y TÉCNICA DE ENMASCARAMIENTO (al menos simple ciego).\n   - Deben definir H₀ y H₁ explícitamente y planear qué prueba estadística usarán (t de Student para comparar dos grupos, o ANOVA de un factor si hay más de dos, con apoyo del docente o usando calculadoras online).\n   - El diseño experimental es revisado y aprobado por el docente ("comité de ética y metodología").\n\n2. EJECUCIÓN (1-2 sesiones o trabajo de campo)\n   - Realizan el experimento siguiendo estrictamente el protocolo aprobado.\n   - Registran datos brutos en tablas. Documentan cualquier incidente o desviación del protocolo.\n\n3. ANÁLISIS ESTADÍSTICO Y REDACCIÓN DEL ARTÍCULO (2 sesiones)\n   - Calculan media, mediana, desviación estándar para cada grupo.\n   - Aplican la prueba estadística elegida (con asistencia). Calculan el valor p.\n   - Construyen gráficos de alta calidad (barras con barras de error que representen ± 1 DE).\n   - Redactan el artículo en formato IMRyD completo.\n\n4. SIMPOSIO (1 sesión)\n   - Los equipos presentan sus trabajos en formato de ponencia (10 minutos) con diapositivas.\n   - Hay un turno de preguntas donde otros equipos y el docente evalúan críticamente la metodología, el análisis y las conclusiones.\n\n5. EVALUACIÓN FINAL Y REFLEXIÓN (1 sesión)\n   - Rúbrica detallada: Rigor metodológico y control de sesgos (30%), Correcta aplicación del análisis estadístico (25%), Calidad del artículo IMRyD (20%), Defensa oral y capacidad de responder críticas (15%), Trabajo en equipo y ética (10%).\n   - REFLEXIÓN FINAL: "Hoy hemos experimentado la ciencia como se hace en la vida real: con incertidumbre, con datos que no siempre son perfectos, con la necesidad de pensar críticamente cada paso. La ciencia no es un dogma, es un método. Y ese método nos pertenece a todos."`

        function generateLessonContent(lesson, phaseNumber) {
            const area = lesson.area;
            const materia = lesson.materia;
            const conocimientos = lesson.conocimientos;
            const ciclo = lesson.ciclo;
            const nivel = lesson.nivel;
            switch (phaseNumber) {
                case 0:
                    return `OBJETIVO GENERAL: Desarrollar competencias en ${materia} correspondientes al ${ciclo} de Educación ${nivel}.\n\nOBJETIVOS PARTICULARES:\n- Identificar los conceptos clave de ${materia}.\n- Aplicar los conocimientos en situaciones prácticas.\n- Resolver problemas utilizando estrategias adecuadas.\n\nNOCIONES PRINCIPALES: ${conocimientos}\nNOCIONES SECUNDARIAS: Vocabulario técnico, procedimientos, estrategias de verificación.\nINTERESES SOCIETALES: Relación con la vida cotidiana, el entorno natural y social.`;
                case 1:
                    return `ACTIVIDAD DE DESCUBIERTA: "Explorando ${materia}"\n\n🧩 Se presentan situaciones problemáticas y materiales concretos para que los estudiantes exploren libremente los conceptos de ${materia}.\n🔍 Preguntas para la reflexión y registro de observaciones en el cuaderno de experiencias.`;
                case 2:
                    return `ACTIVIDAD INDUCTIVA: "Del ejemplo concreto al concepto general"\n\n📊 Se presentan varios ejemplos de ${materia} para que los estudiantes identifiquen patrones, regularidades y formulen reglas generales.\n📝 Los estudiantes registran sus conclusiones en organizadores gráficos.`;
                case 3:
                    return `TRANSMISIÓN CONCEPTUAL: ${materia}\n\n📐 CONCEPTOS CLAVE:\n${conocimientos}\n\n📏 DEFINICIONES, PROPIEDADES Y EJEMPLOS DESARROLLADOS.\n⚠️ Errores comunes y estrategias para evitarlos.`;
                case 4:
                    return `TRABAJOS DIRIGIDOS: Ejercicios de ${materia}\n\n✏️ Ejercicios de identificación, aplicación directa, transferencia y argumentación.\n📝 Formato: Individual o en parejas. Tiempo estimado: 30-45 minutos.`;
                case 5:
                    return `CORRELACIONES INTERNAS: Conexión con otras materias del área\n\n🔗 ${materia} se relaciona con otras ramas de ${lesson.areaName}. Se presentan ejemplos de integración.`;
                case 6:
                    return `CORRELACIONES EXTERNAS: Aplicaciones en la vida real\n\n🌍 Se muestran aplicaciones de ${materia} en la vida cotidiana, la tecnología, el arte, la naturaleza.`;
                case 7:
                    return `MÓDULO DE PROYECTO GRUPAL: "Aplicando ${materia} en equipo"\n\n🎯 Los estudiantes diseñan y ejecutan un proyecto colaborativo que integre los conocimientos de ${materia}.\n📋 Fases: formación de equipos, elección del tema, planificación, ejecución, presentación y evaluación.`;
                default:
                    return '';
            }
        }

                    🔬 <strong>Física</strong> — estática, hidrostática, electromagnetismo, ondas, óptica, relatividad básica + proyecto.<br>
                    ⚗️ <strong>⚗️ El Método Científico Avanzado (Ciclo VII)</strong> — diseño experimental riguroso, sesgo, correlación vs. causalidad + Simposio de Investigación Científica Juvenil.<br>
                    <em style="display:block;margin-top:0.6rem;">Haz clic en cualquier tarjeta de área (Matemática, Ciencia o Método Científico) y busca las lecciones de cada ciclo para acceder a ellas. Las 32 lecciones tienen contenido extenso, detallado e ilustrado.</em>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderArea(areaKey) {
            currentView = 'area';
            currentArea = areaKey;
            currentLessonId = null;
            let areaLessons;
            let areaName;
            if (areaKey === 'metodo') {
                areaLessons = lessonsData.filter(l => l.esMetodo);
                areaName = '⚗️ El Método Científico';
            } else {
                areaLessons = lessonsData.filter(l => l.area === areaKey);
                areaName = areaLessons[0]?.areaName || 'Área';
            }
            updateBreadcrumb([{ label: areaName, action: null, current: true }]);
            const groups = {};
            areaLessons.forEach(l => {
                const groupKey = `${l.nivel}|${l.ciclo}`;
                if (!groups[groupKey]) { groups[groupKey] = { nivel: l.nivel, ciclo: l.ciclo, lessons: [] }; }
                groups[groupKey].lessons.push(l);
            });
            const groupOrder = ['Primaria|Ciclo III', 'Primaria|Ciclo IV', 'Primaria|Ciclo V',
                'Secundaria|Ciclo VI', 'Secundaria|Ciclo VII'
            ];
            const sortedGroups = groupOrder.map(key => groups[key]).filter(g => g);
            let groupsHTML = '';
            sortedGroups.forEach(group => {
                const nivelClass = group.nivel.toLowerCase();
                groupsHTML += `
                <div class="level-group">
                    <div class="level-group-header">
                        <span class="level-badge ${nivelClass}">${group.nivel}</span>
                        <span class="ciclo-tag">${group.ciclo}</span>
                    </div>
                    <div class="lesson-grid">
                        ${group.lessons.map(l => {
                            const isMetodo = l.esMetodo ? ' metodo-card' : '';
                            const metodoIcon = l.esMetodo ? ' <span class="metodo-icon-small">🧪 MÉTODO</span>' : '';
                            return `
                            <div class="lesson-card${isMetodo}" onclick="navigateToLesson('${l.id}')">
                                <span class="lesson-title">${l.materia}${metodoIcon}</span>
                                <span class="lesson-meta">📐 ${l.grado}</span>
                                <span class="lesson-preview">${l.conocimientos}</span>
                                <span class="arrow">→</span>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            });
            const main = document.getElementById('mainContent');
            const backAction = (areaKey === 'metodo') ? 'navigateHome()' : `navigateHome()`;
            const backLabel = (areaKey === 'metodo') ? 'Volver al inicio' : 'Volver al inicio';
            main.innerHTML = `
                <button class="btn-back" onclick="${backAction}">← ${backLabel}</button>
                <h1 class="page-title">${areaName}</h1>
                <p class="page-subtitle">${areaLessons.length} lecciones organizadas por nivel y ciclo. Todas con contenido pedagógico completo.</p>
                ${groupsHTML}
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderLesson(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) { renderHome(); return; }
            currentView = 'lesson';
            currentLessonId = lessonId;
            currentArea = lesson.area;
            const backTarget = lesson.esMetodo ? 'metodo' : lesson.area;
            const backLabel = lesson.esMetodo ? '⚗️ Método Científico' : lesson.areaName;
            updateBreadcrumb([
                { label: lesson.areaName, action: () => navigateToArea(backTarget), current: false },
                { label: lesson.materia + ' (' + lesson.grado + ')', action: null, current: true },
            ]);
            const nivelClass = lesson.nivel.toLowerCase();
            const isMetodo = lesson.esMetodo;
            const headerClass = isMetodo ? ' metodo-header' : '';
            let phasesHTML = '';
            phaseDefinitions.forEach(phase => {
                phasesHTML += `
                <div class="phase-item ${phase.cssClass}" id="phase-${phase.number}-${lesson.id}">
                    <div class="phase-header" onclick="togglePhase('phase-${phase.number}-${lesson.id}')">
                        <span class="phase-number">${phase.number}</span>
                        <span class="phase-title-text">
                            ${phase.title}
                            <span class="phase-subtitle">${phase.subtitle}</span>
                        </span>
                        <span class="phase-chevron">▾</span>
                    </div>
                    <div class="phase-body">
                        <textarea class="editable-area" id="editable-${phase.number}-${lesson.id}" placeholder="Contenido de la Fase ${phase.number}..." data-phase="${phase.number}" data-lesson="${lesson.id}"></textarea>
                    </div>
                </div>
                `;
            });
            const isExtensaCicloIII = (lessonId === 'mat-pri-num-iii' || lessonId === 'mat-pri-geo-iii' || lessonId === 'mat-pri-med-iii');
            const isExtensaCicloIIICiencia = (lessonId === 'ct-pri-sv-iii' || lessonId === 'ct-pri-me-iii' || lessonId === 'ct-pri-tu-iii');
            const isExtensaCicloIVMat = (lessonId === 'mat-pri-num-iv' || lessonId === 'mat-pri-geo-iv' || lessonId === 'mat-pri-est-iv');
            const isExtensaCicloIVCiencia = (lessonId === 'ct-pri-sv-iv' || lessonId === 'ct-pri-me-iv' || lessonId === 'ct-pri-tu-iv');
            const isExtensaCicloV = (lessonId === 'mat-pri-num-v' || lessonId === 'mat-pri-alg-v' || lessonId === 'mat-pri-geo-v');
            const isExtensaCicloVCiencia = (lessonId === 'ct-pri-sv-v' || lessonId === 'ct-pri-me-v' || lessonId === 'ct-pri-tu-v');
            const isExtensaSec = (lessonId === 'mat-sec-arit-vi' || lessonId === 'mat-sec-geo-vi' || lessonId === 'mat-sec-alg-vii' || lessonId === 'mat-sec-geotrig-vii' || lessonId === 'mat-sec-estprob-vii');
            const isExtensaMetodo = (lessonId === 'metodo-ciclo-v' || lessonId === 'metodo-ciclo-vi' || lessonId === 'metodo-ciclo-vii');
            const esExtensa = isExtensaCicloIII || isExtensaCicloIIICiencia || isExtensaCicloIVMat || isExtensaCicloIVCiencia || isExtensaCicloV || isExtensaCicloVCiencia || isExtensaSec || lessonId === 'ct-sec-quim-vi' || lessonId === 'ct-sec-bio-vi' || lessonId === 'ct-sec-fis-vi' || lessonId === 'ct-sec-quim-vii' || lessonId === 'ct-sec-bio-vii' || lessonId === 'ct-sec-fis-vii' || isExtensaMetodo;
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <button class="btn-back" onclick="navigateToArea('${backTarget}')">← Volver a ${backLabel}</button>
                <div class="lesson-detail">
                    <div class="lesson-header-card${headerClass}">
                        <div class="meta-row">
                            <span class="level-badge ${nivelClass}">${lesson.nivel}</span>
                            <span>📐 ${lesson.grado}</span>
                            <span>🔄 ${lesson.ciclo}</span>
                            ${isMetodo ? '<span style="background:#8b5cf6;color:#fff;padding:0.2rem 0.7rem;border-radius:14px;font-size:0.75rem;font-weight:600;">🌟 LECCIÓN DESTACADA</span>' : ''}
                        </div>
                        <h1>${lesson.materia}</h1>
                        <span class="knowledge-tag">📘 ${lesson.conocimientos}</span>
                        ${esExtensa ? '<p style="margin-top:0.6rem;font-size:0.82rem;color:#eab308;">🌟 <strong>Lección extensa detallada:</strong> contenido ilustrado con ejemplos, ejercicios y proyecto completo.</p>' : ''}
                    </div>
                    <p style="color:#64748b;margin-bottom:1rem;font-size:0.8rem;">
                        📝 Expande cada fase para ver y editar su contenido.
                        <span style="font-size:0.7rem;color:#94a3b8;">(Cambios guardados automáticamente)</span>
                    </p>
                    <div class="phase-accordion">
                        ${phasesHTML}
                    </div>
                </div>
            `;
            restoreSavedContent(lessonId);
            if (lessonId === 'mat-pri-num-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumIII), 150);
            } else if (lessonId === 'mat-pri-geo-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoIII), 150);
            } else if (lessonId === 'mat-pri-med-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMedIII), 150);
            } else if (lessonId === 'ct-pri-sv-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVIII), 150);
            } else if (lessonId === 'ct-pri-me-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEIII), 150);
            } else if (lessonId === 'ct-pri-tu-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUIII), 150);
            } else if (lessonId === 'mat-pri-num-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumIV), 150);
            } else if (lessonId === 'mat-pri-geo-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoIV), 150);
            } else if (lessonId === 'mat-pri-est-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaEstIV), 150);
            } else if (lessonId === 'ct-pri-sv-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVIV), 150);
            } else if (lessonId === 'ct-pri-me-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEIV), 150);
            } else if (lessonId === 'ct-pri-tu-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUIV), 150);
            } else if (lessonId === 'mat-pri-num-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumV), 150);
            } else if (lessonId === 'mat-pri-alg-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAlgV), 150);
            } else if (lessonId === 'mat-pri-geo-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoV), 150);
            } else if (lessonId === 'ct-pri-sv-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVV), 150);
            } else if (lessonId === 'ct-pri-me-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEV), 150);
            } else if (lessonId === 'ct-pri-tu-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUV), 150);
            } else if (lessonId === 'mat-sec-arit-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAritAlgVI), 150);
            } else if (lessonId === 'mat-sec-geo-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoVI), 150);
            } else if (lessonId === 'mat-sec-alg-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAlgFuncVII), 150);
            } else if (lessonId === 'mat-sec-geotrig-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeomTrigVII), 150);
            } else if (lessonId === 'mat-sec-estprob-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaEstProbVII), 150);
            } else if (lessonId === 'ct-sec-quim-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaQuimVI), 150);
            } else if (lessonId === 'ct-sec-bio-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaBioVI), 150);
            } else if (lessonId === 'ct-sec-fis-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaFisVI), 150);
            } else if (lessonId === 'ct-sec-quim-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaQuimVII), 150);
            } else if (lessonId === 'ct-sec-bio-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaBioVII), 150);
            } else if (lessonId === 'ct-sec-fis-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaFisVII), 150);
            } else if (lessonId === 'metodo-ciclo-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMetodoV), 150);
            } else if (lessonId === 'metodo-ciclo-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMetodoVI), 150);
            } else if (lessonId === 'metodo-ciclo-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMetodoVII), 150);
            } else {
                setTimeout(() => applyAutoGeneratedContent(lessonId), 150);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyManualContent(lessonId, contentObj) {
            Object.keys(contentObj).forEach(phaseNum => {
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = contentObj[phaseNum]; localStorage.setItem(key, contentObj[phaseNum]); }
                }
            });
        }

        function applyAutoGeneratedContent(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) return;
            phaseDefinitions.forEach(phase => {
                const phaseNum = phase.number;
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const content = generateLessonContent(lesson, phaseNum);
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = content; localStorage.setItem(key, content); }
                }
            });
        }

        function togglePhase(phaseElementId) {
            const phaseItem = document.getElementById(phaseElementId);
            if (!phaseItem) return;
            phaseItem.classList.toggle('open');
            const ta = phaseItem.querySelector('.editable-area');
            if (ta) saveContent(ta);
        }

        function getStorageKey(lessonId, phaseNumber) { return `lesson-${lessonId}-phase-${phaseNumber}`; }
        function saveContent(textarea) { localStorage.setItem(getStorageKey(textarea.dataset.lesson, textarea.dataset.phase), textarea.value); }

        function restoreSavedContent(lessonId) {
            phaseDefinitions.forEach(phase => {
                const saved = localStorage.getItem(getStorageKey(lessonId, phase.number));
                if (saved) { const ta = document.getElementById(`editable-${phase.number}-${lessonId}`); if (ta) ta.value = saved; }
            });
        }

        let saveTimeout;
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('editable-area')) {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => saveContent(e.target), 500);
            }
        });
        document.addEventListener('blur', function(e) {
            if (e.target.classList.contains('editable-area')) saveContent(e.target);
        }, true);

        function navigateHome() { window.location.hash = ''; renderHome(); }
        function navigateToArea(areaKey) { window.location.hash = areaKey; renderArea(areaKey); }
        function navigateToLesson(lessonId) { window.location.hash = lessonId; renderLesson(lessonId); }

        function updateBreadcrumb(items) {
            const bc = document.getElementById('breadcrumb');
            let html = '<span onclick="navigateHome()">Inicio</span>';
            items.forEach(item => {
                html += ' <span class="sep">›</span> ';
                if (item.current) html += `<span class="current">${item.label}</span>`;
                else if (item.action) html += `<span onclick="(${item.action.toString()})()" style="cursor:pointer;">${item.label}</span>`;
                else html += `<span>${item.label}</span>`;
            });
            bc.innerHTML = html;
        }

        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.replace('#', '');
            if (!hash) renderHome();
            else if (hash === 'matematica' || hash === 'ciencia' || hash === 'metodo') renderArea(hash);
            else if (lessonsData.some(l => l.id === hash)) renderLesson(hash);
        });

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                if (currentView === 'lesson') {
                    const allPhases = document.querySelectorAll('.phase-item');
                    const anyClosed = Array.from(allPhases).some(p => !p.classList.contains('open'));
                    allPhases.forEach(p => { if (anyClosed) p.classList.add('open'); else p.classList.remove('open'); });
                    document.querySelectorAll('.editable-area').forEach(ta => saveContent(ta));
                }
            }
        });

        function init() {
            const hash = window.location.hash.replace('#', '');
            if (hash && lessonsData.some(l => l.id === hash)) renderLesson(hash);
            else if (hash === 'matematica' || hash === 'ciencia' || hash === 'metodo') renderArea(hash);
            else renderHome();
        }
        init();
        console.log('✅ Página de inicio con 3 bloques de área: Matemática, Ciencia y Tecnología, y Método Científico.');
        console.log('🧮 Matemática: 14 lecciones | 🔬 Ciencia y Tecnología: 18 lecciones | ⚗️ Método Científico: 3 lecciones.');
        console.log('🌟 Las 32 lecciones son EXTENSAS: contenido detallado, ilustrado, con ejemplos, ejercicios y proyecto completo.');
        console.log('📚 Método Científico Ciclo V: pasos del método, variables, experimentos sencillos — "I Feria de Jóvenes Científicos".');
        console.log('🔬 Método Científico Ciclo VI: observación, hipótesis, experimentación, seres vivos — "Congreso Científico Juvenil".');
        console.log('⚗️ Método Científico Ciclo VII: diseño experimental riguroso, sesgos, correlación vs. causalidad — "Simposio de Investigación Científica Juvenil".');
        console.log('💡 Haz clic en la tarjeta "El Método Científico" para ver las 3 lecciones especializadas.');
    </script>
</body>
