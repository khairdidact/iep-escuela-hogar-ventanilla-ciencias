    <style>
        :root {

            --ciencia: #16a34a; --ciencia-light: #dcfce7; --ciencia-dark: #15803d;
            --metodo: #8b5cf6; --metodo-light: #ede9fe; --metodo-dark: #6d28d9;

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }
        .header { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 2rem; position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); background:rgba(255,255,255,0.92); }

        .logo { font-size:1.2rem; font-weight:700; color:var(--text); display:flex; align-items:center; gap:0.5rem; cursor:pointer; user-select:none; }
        .logo-icon { width:38px; height:38px; border-radius:var(--radius-sm); background:linear-gradient(135deg,#6366f1,#3b82f6); display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.2rem; }
        .breadcrumb { display:flex; align-items:center; gap:0.4rem; font-size:0.9rem; color:var(--text-secondary); flex-wrap:wrap; }
        .breadcrumb span { cursor:pointer; transition:color var(--transition); }
        .breadcrumb span:hover { color:#3b82f6; text-decoration:underline; }
        .breadcrumb .sep { color:#cbd5e1; cursor:default; }
        .breadcrumb .current { font-weight:600; color:var(--text); cursor:default; }
        .main-container { max-width:1300px; margin:0 auto; padding:2rem; min-height:80vh; }
        .page-title { font-size:1.6rem; font-weight:700; margin-bottom:0.25rem; color:var(--text); }
        .page-subtitle { color:var(--text-secondary); margin-bottom:2rem; font-size:0.95rem; }
        .area-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1.5rem; margin-bottom:2rem; }
        .area-card { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); padding:2rem 1.5rem; cursor:pointer; transition:all var(--transition); box-shadow:var(--shadow); position:relative; overflow:hidden; }
        .area-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); }
        .area-card.matematica { border-left:5px solid var(--matematica); }
        .area-card.matematica:hover { border-color:var(--matematica); background:#fafbff; }
        .area-card.ciencia { border-left:5px solid var(--ciencia); }
        .area-card.ciencia:hover { border-color:var(--ciencia); background:#fafdfb; }
        .area-card.metodo-highlight { border-left:5px solid var(--metodo); background:linear-gradient(135deg,#faf5ff 0%,#ede9fe 100%); border:2px solid var(--metodo); }
        .area-card.metodo-highlight:hover { border-color:var(--metodo-dark); background:linear-gradient(135deg,#f5f0ff 0%,#e0d9fc 100%); }
        .area-card .icon { font-size:2.5rem; margin-bottom:0.75rem; }
        .area-card h2 { font-size:1.3rem; font-weight:700; margin-bottom:0.35rem; }
        .area-card .count { color:var(--text-secondary); font-size:0.85rem; }
        .area-card .featured-badge { display:inline-block; background:var(--metodo); color:#fff; padding:0.2rem 0.6rem; border-radius:12px; font-size:0.7rem; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; margin-left:0.5rem; vertical-align:middle; }
        .level-group { margin-bottom:2.5rem; }

        .level-badge.primaria { background:#fef3c7; color:#92400e; }
        .level-badge.secundaria { background:#dbeafe; color:#1e40af; }
        .ciclo-tag { font-size:0.8rem; color:var(--text-secondary); font-weight:500; }
        .lesson-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:0.85rem; }
        .lesson-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:1.25rem; cursor:pointer; transition:all var(--transition); box-shadow:var(--shadow); display:flex; flex-direction:column; gap:0.4rem; }
        .lesson-card:hover { border-color:#6366f1; box-shadow:var(--shadow-md); transform:translateY(-2px); }
        .lesson-card.metodo-card { border-left:4px solid var(--metodo); background:#fdfbff; }
        .lesson-card.metodo-card:hover { border-color:var(--metodo); box-shadow:0 0 0 3px rgba(139,92,246,0.12); }
        .lesson-card .lesson-title { font-weight:700; font-size:1rem; color:var(--text); }
        .lesson-card .lesson-meta { font-size:0.78rem; color:var(--text-secondary); display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }

        .lesson-header-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:1.5rem; margin-bottom:1.5rem; box-shadow:var(--shadow); }

        .phase-item.open { border-color:#6366f1; box-shadow:var(--shadow-md); }
        .phase-header { padding:0.85rem 1.1rem; cursor:pointer; display:flex; align-items:center; gap:0.6rem; user-select:none; transition:background var(--transition); }
        .phase-header:hover { background:#f8fafc; }
        .phase-number { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.8rem; flex-shrink:0; }
        .phase-0 .phase-number{background:#fef3c7;color:#92400e;} .phase-1 .phase-number{background:#fce7f3;color:#9d174d;}
        .phase-2 .phase-number{background:#ede9fe;color:#5b21b6;} .phase-3 .phase-number{background:#dbeafe;color:#1e40af;}
        .phase-4 .phase-number{background:#dcfce7;color:#166534;} .phase-5 .phase-number{background:#ffedd5;color:#9a3412;}
        .phase-6 .phase-number{background:#e0e7ff;color:#3730a3;} .phase-7 .phase-number{background:#fce7f3;color:#831843;}
        .phase-title-text { flex:1; font-weight:600; font-size:0.9rem; }
        .phase-subtitle { font-weight:400; font-size:0.73rem; color:var(--text-secondary); display:block; }
        .phase-chevron { font-size:1.1rem; color:#94a3b8; transition:transform var(--transition); flex-shrink:0; }
        .phase-item.open .phase-chevron { transform:rotate(180deg); color:#6366f1; }
        .phase-body { max-height:0; overflow:hidden; transition:max-height 0.4s ease, padding 0.3s ease; padding:0 1.1rem; border-top:0px solid transparent; }
        .phase-item.open .phase-body { max-height:2000px; padding:0.85rem 1.1rem; border-top:1px solid #e2e8f0; }
        .phase-body .editable-area { width:100%; min-height:80px; border:1px dashed #d1d5db; border-radius:6px; padding:0.7rem; font-family:inherit; font-size:0.85rem; resize:vertical; background:#fafafa; color:var(--text); line-height:1.5; }
        .phase-body .editable-area:focus { outline:2px solid #6366f1; border-color:transparent; background:#fff; }
        .btn-back { display:inline-flex; align-items:center; gap:0.4rem; padding:0.45rem 0.9rem; border-radius:20px; border:1.5px solid var(--border); background:var(--surface); cursor:pointer; font-size:0.8rem; font-weight:500; color:var(--text); transition:all var(--transition); margin-bottom:1rem; }
        .btn-back:hover { background:#f1f5f9; border-color:#cbd5e1; }
        .footer { text-align:center; padding:1.5rem; color:var(--text-secondary); font-size:0.8rem; border-top:1px solid var(--border); margin-top:3rem; }
        @media(max-width:768px){ .header-inner{flex-direction:column;align-items:flex-start;} .main-container{padding:1rem;} .area-cards{grid-template-columns:1fr;} .lesson-grid{grid-template-columns:1fr;} }
    </style>
</head>

        const leccionExtensaMedIII = {
            0: `🎯 OBJETIVO GENERAL:
Iniciar a los estudiantes de 1° y 2° grado de primaria en el concepto de medición, abordando tres magnitudes fundamentales: longitud (centímetros y metros), masa (kilogramos) y tiempo (días y horas). Se busca que los niños comprendan la necesidad de medir, conozcan y utilicen unidades de medida convencionales y no convencionales, y desarrollen habilidades de estimación, comparación y registro de mediciones en contextos significativos.

🎯 OBJETIVOS PARTICULARES:
• Comprender qué es medir: comparar una cantidad con una unidad de referencia.
• Medir longitudes utilizando unidades no convencionales (palmas, pasos, clips) y convencionales (centímetros, metros).
• Estimar y comparar la masa de objetos del entorno usando las manos, balanzas simples y kilogramos.
• Identificar y secuenciar actividades que se realizan en diferentes momentos del día, usando horas y días.
• Leer y registrar horas en punto y medias horas en relojes analógicos y digitales.
• Reconocer la relación entre días y horas (1 día = 24 horas).
• Utilizar correctamente el vocabulario relacionado con la medición: centímetro, metro, kilogramo, día, hora, reloj, balanza, regla, cinta métrica.

📌 NOCIONES PRINCIPALES:
• Medir: comparar con una unidad.
• Longitud: centímetro (cm) y metro (m). 1 m = 100 cm.
• Masa: kilogramo (kg).
• Tiempo: día, hora. Reloj analógico y digital. Hora en punto y media hora.
• Instrumentos de medición: regla, cinta métrica, metro, balanza, reloj, calendario.

📌 NOCIONES SECUNDARIAS:
• Unidades no convencionales: palmos, pasos, clips, lápices, bolitas (para comparar masas).
• Estimación antes de medir: "¿Cuántos clips medirá este lápiz? ¿Más o menos de 10?"
• Comparación directa: "Este libro es más pesado que este cuaderno".
• Noción de capacidad (litro) solo como introducción informal.
• Secuencia temporal: mañana, tarde, noche; ayer, hoy, mañana.

🌍 INTERESES SOCIETALES:
• La medición es esencial para la vida diaria: medimos distancias al ir al colegio, pesamos los alimentos al comprar, organizamos nuestro tiempo con el reloj y el calendario.
• Comprender las mediciones ayuda a los niños a ser más autónomos (saber cuándo es la hora de entrada, entender las tallas de ropa, colaborar en recetas de cocina).
• La metrología (ciencia de las mediciones) es la base de la ciencia, la tecnología, el comercio y las comunicaciones. Desde pequeños, los niños deben valorar la precisión y la estandarización.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Pequeños medidores"

🧩 MATERIALES:
• Cintas de colores, lanas, cordones de diferentes longitudes.
• Reglas de 20 o 30 cm, cintas métricas de 1 metro (una por grupo).
• Clips grandes (todos iguales), palmos dibujados en cartulina, pasos marcados en el suelo.
• Balanza de platillos o balanza casera (percha y dos bolsas).
• Bolsitas con diferentes cantidades de arroz, piedritas, algodón (algunas de 1 kg exacto).
• Un reloj grande de agujas (manipulable) y relojes digitales.
• Tarjetas con imágenes de rutinas diarias: despertarse, desayunar, almorzar, jugar, cenar, dormir.

🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos, 10-12 minutos por estación):

ESTACIÓN 1: "Midiendo longitudes con el cuerpo"
Los niños miden el largo de la mesa, el ancho de la puerta, la altura de un compañero usando:
• Palmas de la mano (palmo): ¿Cuántas palmas mide el largo de tu mesa?
• Pasos: ¿Cuántos pasos hay desde la pared hasta la ventana?
• Dedos: ¿Cuántos dedos mide el ancho de tu libro?
Registran en una tabla: Objeto | Unidad | Medida. Comparan: ¿Todos obtuvimos el mismo número de palmos? ¿Por qué no? (Porque las manos son de diferente tamaño). Conclusión: necesitamos una unidad que sea igual para todos.

ESTACIÓN 2: "El taller del centímetro"
Usan reglas para medir en centímetros:
• Miden un lápiz, una goma, su dedo índice.
• Descubren que 1 metro = 100 centímetros usando la cinta métrica extendida en el suelo.
• Juego: "Encuentra un objeto que mida aproximadamente: 5 cm, 10 cm, 20 cm, 1 metro."
Dibujan los objetos y anotan su medida.

ESTACIÓN 3: "Adivina cuál pesa más" (Masa)
Tienen 5 bolsitas cerradas (A, B, C, D, E) con diferentes materiales: algodón, arroz, piedras, plumas, una de 1 kg exacto.
• Sostienen una bolsa en cada mano y comparan: "La bolsa A es más pesada que la B".
• Ordenan las bolsas de la más liviana a la más pesada usando solo sus manos (estimación).
• Usan la balanza de platillos: colocan una bolsa en cada lado. La que baja es la más pesada. Si quedan al mismo nivel, pesan igual.
• Descubren cuál es la bolsa de 1 kg (la que equilibra con una pesa de 1 kg o la que han calibrado previamente).

ESTACIÓN 4: "El reloj de la jornada"
Con un reloj grande de agujas, la maestra pregunta:
• "Señala las 8 en punto" (hora de entrada).
• "Señala las 10 y media" (hora del recreo).
• "Señala la 1 en punto" (hora de salida).
Los niños mueven las agujas y asocian cada hora con una tarjeta de rutina diaria.
Luego ordenan tarjetas de rutinas en una línea de tiempo: mañana (despertar, desayunar, ir al cole), tarde (almorzar, jugar), noche (cenar, dormir).
Reflexionan: ¿Cuántas horas tiene un día? (24 horas). ¿Qué hace la aguja corta? (marca la hora). ¿Y la larga? (marca los minutos). Si la larga está en el 12, es "en punto". Si está en el 6, es "y media".

💬 REFLEXIÓN EN PLENARIA:
• ¿Por qué es importante tener unidades iguales para todos (centímetro, metro, kilogramo)?
• ¿En qué situaciones de la vida usamos la medición?
• ¿Qué pasaría si no tuviéramos relojes ni calendarios?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Del palmo al centímetro, de la mano a la balanza"

📊 OBSERVACIÓN GUIADA: La maestra guía a los niños para que, a partir de los datos recogidos en las estaciones, descubran patrones y reglas.

CASO 1: LONGITUD – NECESIDAD DE UNIDADES ESTÁNDAR
Se comparan en la pizarra las mediciones de la mesa hechas por 4 niños con sus palmas:
• Juan: 8 palmos
• María: 10 palmos
• Luis: 9 palmos
• Ana: 11 palmos
Preguntas:
- ¿Por qué todos midieron diferente si la mesa es la misma? (Porque sus manos son de diferente tamaño).
- ¿Qué podríamos usar para que todos obtengamos el mismo número? (Una regla, un objeto igual para todos).
Conclusión: "Para medir y que todos tengan el mismo resultado, debemos usar una unidad estándar: el centímetro (cm) y el metro (m)."

Se muestra: 1 metro = 100 centímetros. Medimos la mesa con el metro: 120 cm (o 1 metro y 20 cm).

CASO 2: MASA – COMPARACIÓN Y UNIDAD ESTÁNDAR
Se presentan tres pares de objetos:
• Un globo inflado vs. una piedra pequeña (la piedra pesa más aunque el globo es más grande).
• Una bolsa de algodón grande vs. una bolsa de arroz pequeña (el arroz pesa más aunque ocupa menos).
• Dos bolsas de arroz idénticas que se equilibran en la balanza.
Preguntas:
- ¿Siempre el objeto más grande es el más pesado? (No, a veces un objeto pequeño puede pesar más).
- ¿Cómo podemos saber exactamente cuánto pesa algo? (Usando una balanza y una unidad: el kilogramo).
Conclusión: "La masa no depende del tamaño. Usamos el kilogramo (kg) para saber cuánta materia tiene un objeto."

CASO 3: TIEMPO – SECUENCIA Y MEDICIÓN
Se mezclan tarjetas de rutinas diarias sin orden.
Preguntas:
- ¿Qué hacemos primero: desayunar o almorzar? ¿Qué va después de cenar?
- Si me despierto a las 7 de la mañana y me duermo a las 8 de la noche, ¿cuántas horas estoy despierto? (Conteo en la recta numérica o con los dedos: aproximadamente 13 horas).
- Un día completo tiene 24 horas. ¿Cuántas horas son de día y cuántas de noche? (Depende, pero en promedio 12 y 12).
Conclusión: "El día se divide en 24 horas. El reloj nos ayuda a saber qué hora es y a organizar nuestras actividades."

📝 REGISTRO: Cada estudiante dibuja en su cuaderno:

• Una balanza equilibrada con una pesa de 1 kg y un objeto que pese 1 kg.
• Un reloj marcando su hora favorita del día, escribiendo debajo: "Son las ___ en punto" o "Son las ___ y media".`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Medición de Longitud, Masa y Tiempo

📏 1. LONGITUD: CENTÍMETROS Y METROS
Medir longitud es averiguar qué tan largo, ancho o alto es un objeto, o qué distancia hay entre dos puntos.
• El centímetro (cm) es una unidad pequeña. Se usa para medir objetos como un lápiz, un libro, el ancho de una mano.
• El metro (m) es una unidad mayor. 1 metro equivale a 100 centímetros (1 m = 100 cm).
• Instrumentos: regla (hasta 30 cm), cinta métrica o metro de carpintero (hasta varios metros).

🏠 ¿Cuándo usamos cada unidad?
• En centímetros medimos: el largo de un dedo, el ancho de un cuaderno, la altura de un vaso.
• En metros medimos: el largo del aula, la altura de una puerta, la distancia del salón al patio.

🔍 Relación: Si un lápiz mide 15 cm y una mesa mide 120 cm, podemos decir que la mesa mide 1 metro y 20 cm.
• 100 cm = 1 m
• 200 cm = 2 m
• 150 cm = 1 m y 50 cm

⚖️ 2. MASA: KILOGRAMOS
La masa es la cantidad de materia que tiene un objeto. A menudo decimos "peso", pero científicamente hablamos de masa.
• El kilogramo (kg) es la unidad principal de masa.
• 1 kilogramo equivale a 1000 gramos (en este ciclo no profundizamos en gramos, pero se puede mencionar).
• Instrumento: balanza. Puede ser de platillos (compara masas) o digital (muestra el número).

🏠 ¿Cuándo pesamos?
• Al comprar frutas y verduras en el mercado.
• Al cocinar (medio kilo de harina, 1 kg de azúcar).
• Al pesarnos en la balanza del doctor.

💡 Dato curioso: Un litro de agua (una botella grande) tiene una masa de exactamente 1 kilogramo. Podemos sentir cuánto es 1 kg sosteniendo una botella llena de agua.

⏰ 3. TIEMPO: DÍAS Y HORAS
El tiempo es la magnitud que nos permite ordenar los sucesos y saber cuánto duran.
• Un día es el tiempo que tarda la Tierra en dar una vuelta completa sobre sí misma. Tiene 24 horas.
• La hora es una unidad de tiempo. Un día tiene 24 horas.
• Instrumentos: reloj analógico (de agujas), reloj digital, calendario.

🕐 LECTURA DEL RELOJ ANALÓGICO:
• La aguja corta marca la hora. La aguja larga marca los minutos.
• Cuando la aguja larga está en el 12, decimos "en punto". Ej: "Son las 8 en punto".
• Cuando la aguja larga está en el 6, decimos "y media". La aguja corta está entre dos números. Ej: "Son las 3 y media" (la corta está entre el 3 y el 4).
• Relación: 1 hora = 60 minutos. 1 día = 24 horas.

🗓️ ORGANIZACIÓN DEL DÍA:
• Mañana (AM): desde que nos despertamos hasta el mediodía.
• Tarde (PM): desde el mediodía hasta que oscurece.
• Noche (PM): desde que oscurece hasta que nos dormimos.

⚠️ ERRORES COMUNES Y CÓMO EVITARLOS:
• Usar la palabra "peso" por "masa". → En primaria podemos usar indistintamente, pero el profesor puede introducir "masa" como término más preciso.
• Medir comenzando desde el borde de la regla sin alinear el cero. → Enseñar a poner el 0 justo en un extremo.
• Confundir la aguja horaria y el minutero. → Juego repetitivo de señalar horas en el reloj grande.
• Decir "son las 3 y 30" en vez de "las 3 y media". → Practicar ambas formas, pero en este ciclo preferimos "y media".
• Creer que un objeto más grande siempre es más pesado. → Recordar el experimento del globo y la piedra.`,

            5: `🔗 CORRELACIONES INTERNAS: Conexión con Números, Operaciones y Geometría

🔢 CONEXIÓN CON NÚMEROS Y OPERACIONES:
• Medir implica obtener un número (la medida) que representa la cantidad de unidades.
• Al sumar o restar longitudes, masas o tiempos, aplicamos las operaciones aprendidas. Ej: "Un listón mide 45 cm y otro 30 cm. ¿Cuánto miden juntos?" (45 + 30 = 75 cm).
• Al repartir una longitud en partes iguales usamos división. Ej: "Un hilo de 20 cm se corta en 4 partes iguales. ¿Cuánto mide cada parte?" (20 ÷ 4 = 5 cm).
• La comparación de medidas ("mayor que", "menor que") usa la recta numérica y los símbolos >, <.

📐 CONEXIÓN CON GEOMETRÍA:
• Al medir los lados de figuras planas (cuadrado, rectángulo), las longitudes nos dicen si es cuadrado (todos lados iguales) o rectángulo (dos lados largos, dos cortos).
• El perímetro es la suma de las longitudes de los lados de una figura. Medimos y sumamos.
• En cuerpos geométricos podemos medir aristas (lados de las caras).
• Ejemplo integrador: "Dibuja un cuadrado de 5 cm de lado. Mide sus lados. Suma los cuatro lados. ¿Cuánto es el perímetro?" (5+5+5+5 = 20 cm).

🧩 ACTIVIDAD INTEGRADORA:
"Cada equipo recibe una caja (prisma rectangular). Deben medir con regla todas sus aristas (largo, ancho, alto). Luego calculan cuánta cinta necesitarían para rodear la caja como un regalo (sumando cuatro largos, cuatro anchos y cuatro altos). Registran sus medidas y cálculos."

💡 REFLEXIÓN INTERDISCIPLINARIA:
La medición es el puente entre la geometría (formas), los números (cantidades) y las operaciones (cálculos). Medir nos permite describir el mundo con precisión.`,
            6: `🌍 CORRELACIONES EXTERNAS: La medición en la vida cotidiana y en el mundo

🏪 EN EL MERCADO Y LA COCINA:
• Compramos frutas por kilogramos: "1 kg de manzanas, ½ kg de fresas".
• En las recetas medimos ingredientes: "200 g de harina" (introducción al gramo), "1 litro de leche".
• Medimos el tiempo de cocción: "Hervir por 20 minutos".

👷 EN LAS PROFESIONES:
• Un sastre o modista mide con centímetros la tela y las dimensiones del cuerpo para confeccionar ropa.
• Un carpintero o albañil mide con metros la madera, los terrenos, las habitaciones.
• Un médico pesa al paciente en kilogramos y mide su altura en centímetros.
• Los pilotos y conductores miden distancias en kilómetros (muchos metros).
• Los deportistas miden tiempos: "corrió 100 metros en 12 segundos".

⏰ ORGANIZACIÓN DE LA VIDA:
• El reloj y el calendario organizan nuestra sociedad: horarios de trabajo, de clases, de transporte.
• Las estaciones del año, los meses, las semanas son unidades de tiempo mayores que aprenderán después.
• Saber leer la hora nos hace puntuales y responsables.

🌏 CURIOSIDADES:
• En la antigüedad, se medía con partes del cuerpo: el codo egipcio, el pie romano, la yarda inglesa. Por eso, cada civilización tenía medidas diferentes.
• El metro se creó durante la Revolución Francesa para unificar las medidas. Originalmente era la diezmillonésima parte del cuadrante del meridiano terrestre.
• Hoy existe el Sistema Internacional de Unidades (SI) que todos los países (casi todos) usan.

🧠 REFLEXIÓN FINAL:
"Medir es ponerle números al mundo. Gracias a la medición, podemos construir casas que no se caigan, preparar recetas que salgan ricas, llegar a tiempo a los lugares y entender fenómenos naturales. ¡Cada vez que usas una regla, un reloj o una balanza, estás haciendo ciencia!"

🗣️ CITA INSPIRADORA:

            7: `👥 MÓDULO DE PROYECTO GRUPAL: "La Feria de las Medidas"

🎯 OBJETIVO:
Organizar una feria en el aula con diferentes estaciones de medición, donde cada equipo sea responsable de una magnitud (longitud, masa o tiempo) y prepare actividades para que sus compañeros midan, estimen y registren.

📋 FASES DEL PROYECTO:

FASE 1: ORGANIZACIÓN (1 sesión)
• Formar 6 equipos (aproximadamente 4-5 niños por equipo):
  - Equipo "Regla Mágica" (longitud con centímetros)
  - Equipo "Metro Aventurero" (longitud con metros)
  - Equipo "Balanza Justa" (masa)
  - Equipo "Reloj Saltarín" (horas en punto)
  - Equipo "Media Hora Loca" (horas y media)
  - Equipo "Tiempo Ordenado" (secuencia del día)
• Cada equipo recibe la tarea de diseñar dos actividades o juegos para su estación.

FASE 2: DISEÑO DE ESTACIONES (2 sesiones)
Cada equipo prepara los materiales y las instrucciones de su estación. Ejemplos:
• Regla Mágica: "Adivina y mide" - Se muestran 5 objetos, los visitantes estiman cuántos cm miden, luego miden y anotan la diferencia. Gana quien más se acerque.
• Metro Aventurero: "El salto del canguro" - Los visitantes saltan desde una marca y se mide la distancia del salto en metros y centímetros.
• Balanza Justa: "¿Más o menos de 1 kg?" - Tienen objetos variados, los visitantes los clasifican en "Más de 1 kg", "Menos de 1 kg", "Exactamente 1 kg" usando una balanza de platillos.
• Reloj Saltarín: "Forma la hora" - Con un reloj grande de cartón y agujas móviles, un niño dice una hora en punto y el visitante debe colocarla.
• Media Hora Loca: Similar pero con horas y media.
• Tiempo Ordenado: "La carrera de las rutinas" - Tienen tarjetas de rutinas, los visitantes deben ordenarlas en menos de 1 minuto.

FASE 3: PREPARACIÓN DE MATERIALES (1 sesión)
• Carteles con los nombres de las estaciones, instrucciones, fichas de registro.
• Construcción de instrumentos: relojes de cartón, balanzas con perchas, colección de objetos para medir y pesar.

FASE 4: LA FERIA (2 sesiones)
• Se montan las 6 estaciones en el aula o en el patio.
• La mitad de los equipos atiende sus estaciones; la otra mitad recorre las estaciones con una "Libreta de Medición" donde registra sus resultados.
• Luego intercambian roles.

FASE 5: CIERRE Y EVALUACIÓN (1 sesión)
• Cada equipo comparte cuántos visitantes pasaron por su estación, qué actividad gustó más, qué aprendieron.
• Se entregan medallas simbólicas: "Mejor Medidor de Longitudes", "Mejor Estimador de Masas", "Señor Puntualidad".
• Se reflexiona: ¿Qué fue más difícil: medir longitud, masa o tiempo? ¿Por qué? ¿Para qué nos sirve lo aprendido?

🏆 EVALUACIÓN:
• Participación activa y colaboración en el equipo.
• Correcta preparación y explicación de las actividades.
• Precisión en las mediciones y registros.
• Respeto por los materiales y los compañeros.

🎉 CIERRE:
Se publica en el mural del aula un "Diploma de Pequeños Medidores" con los nombres de todos los participantes, y se comparten fotos de la feria con las familias.`,

        // ═══════════════════════════════════════
        //  GENERADOR DE CONTENIDO AUTOMÁTICO
        // ═══════════════════════════════════════
        function generateLessonContent(lesson, phaseNumber) {
            const area = lesson.area;
            const materia = lesson.materia;
            const conocimientos = lesson.conocimientos;
            const ciclo = lesson.ciclo;
            const nivel = lesson.nivel;
            switch (phaseNumber) {
                case 0: return `OBJETIVO GENERAL: Desarrollar competencias en ${materia} correspondientes al ${ciclo} de Educación ${nivel}.\n\nOBJETIVOS PARTICULARES:\n- Identificar los conceptos clave de ${materia}.\n- Aplicar los conocimientos en situaciones prácticas.\n- Resolver problemas utilizando estrategias adecuadas.\n\nNOCIONES PRINCIPALES: ${conocimientos}\nNOCIONES SECUNDARIAS: Vocabulario técnico, procedimientos, estrategias de verificación.\nINTERESES SOCIETALES: Relación con la vida cotidiana, el entorno natural y social.`;
                case 1: return `ACTIVIDAD DE DESCUBIERTA: "Explorando ${materia}"\n\n🧩 Se presentan situaciones problemáticas y materiales concretos para que los estudiantes exploren libremente los conceptos de ${materia}.\n🔍 Preguntas para la reflexión y registro de observaciones en el cuaderno de experiencias.`;
                case 2: return `ACTIVIDAD INDUCTIVA: "Del ejemplo concreto al concepto general"\n\n📊 Se presentan varios ejemplos de ${materia} para que los estudiantes identifiquen patrones, regularidades y formulen reglas generales.\n📝 Los estudiantes registran sus conclusiones en organizadores gráficos.`;
                case 3: return `TRANSMISIÓN CONCEPTUAL: ${materia}\n\n📐 CONCEPTOS CLAVE:\n${conocimientos}\n\n📏 DEFINICIONES, PROPIEDADES Y EJEMPLOS DESARROLLADOS.\n⚠️ Errores comunes y estrategias para evitarlos.`;
                case 4: return `TRABAJOS DIRIGIDOS: Ejercicios de ${materia}\n\n✏️ Ejercicios de identificación, aplicación directa, transferencia y argumentación.\n📝 Formato: Individual o en parejas. Tiempo estimado: 30-45 minutos.`;
                case 5: return `CORRELACIONES INTERNAS: Conexión con otras materias del área\n\n🔗 ${materia} se relaciona con otras ramas de ${lesson.areaName}. Se presentan ejemplos de integración.`;
                case 6: return `CORRELACIONES EXTERNAS: Aplicaciones en la vida real\n\n🌍 Se muestran aplicaciones de ${materia} en la vida cotidiana, la tecnología, el arte, la naturaleza.`;
                case 7: return `MÓDULO DE PROYECTO GRUPAL: "Aplicando ${materia} en equipo"\n\n🎯 Los estudiantes diseñan y ejecutan un proyecto colaborativo que integre los conocimientos de ${materia}.\n📋 Fases: formación de equipos, elección del tema, planificación, ejecución, presentación y evaluación.`;
                default: return '';
            }
        }

        // ═══════════════════════════════════════
        //  STATE & RENDER
        // ═══════════════════════════════════════
        let currentView = 'home', currentArea = null, currentLessonId = null;

        function renderHome() {
            currentView = 'home'; currentArea = null; currentLessonId = null;
            updateBreadcrumb([]);
            const main = document.getElementById('mainContent');
            const matCount = lessonsData.filter(l => l.area === 'matematica' && !l.esMetodo).length;
            const cieCount = lessonsData.filter(l => l.area === 'ciencia' && !l.esMetodo).length;
            const metodoCount = lessonsData.filter(l => l.esMetodo).length;
            main.innerHTML = `
                <h1 class="page-title">📚 Conocimientos Fundamentales</h1>
                <p class="page-subtitle">IEP Escuela Hogar Ventanilla · Educación Básica Regular · Selecciona un área para explorar las lecciones</p>
                <div class="area-cards">
                    <div class="area-card matematica" onclick="navigateToArea('matematica')">
                        <div class="icon">🧮</div>
                        <h2>Matemática</h2>
                        <p class="count">${matCount} lecciones · Primaria y Secundaria</p>
                        <p style="font-size:0.78rem;color:#64748b;margin-top:0.4rem;">Números, Geometría, Medición, Álgebra, Estadística</p>
                    </div>
                    <div class="area-card ciencia" onclick="navigateToArea('ciencia')">
                        <div class="icon">🔬</div>
                        <h2>Ciencia y Tecnología</h2>
                        <p class="count">${cieCount} lecciones · Primaria y Secundaria</p>
                        <p style="font-size:0.78rem;color:#64748b;margin-top:0.4rem;">Seres Vivos, Materia, Tierra, Química, Biología, Física</p>
                    </div>
                    <div class="area-card metodo-highlight" onclick="navigateToLesson('metodo-ciclo-vi')">
                        <div class="icon">⚗️</div>
                        <h2>El Método Científico <span class="featured-badge">🌟 Destacado</span></h2>
                        <p class="count">${metodoCount} lecciones especializadas · Ciclos V, VI y VII</p>
                        <p style="font-size:0.78rem;color:#6b21a8;margin-top:0.4rem;">🔬 Contenido del PDF: experimentos, variables, sesgo, biología</p>
                    </div>
                </div>
                <div style="margin-top:1.5rem;padding:1.2rem;background:#fefce8;border-radius:12px;border:1px solid #eab308;font-size:0.85rem;color:#92400e;">
                    <strong>🌟 Lecciones extensas ya desarrolladas (Ciclo III - Primaria 1°-2°):</strong><br>
                    🧮 <strong>Números y Operaciones</strong> — contenido detallado con proyecto "La Tiendita Matemática".<br>
                    🧮 <strong>Geometría</strong> — figuras planas, cuerpos geométricos, proyecto "Museo de Formas Geométricas".<br>
                    🧮 <strong>Medición</strong> — longitud (cm/m), masa (kg), tiempo (días/horas), proyecto "La Feria de las Medidas".<br>
                    <em>Haz clic en el área de Matemática y busca las lecciones de Ciclo III para acceder a ellas.</em>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderArea(areaKey) {
            currentView = 'area'; currentArea = areaKey; currentLessonId = null;
            const areaLessons = lessonsData.filter(l => l.area === areaKey);
            const areaName = areaLessons[0]?.areaName || 'Área';
            updateBreadcrumb([{ label: areaName, action: null, current: true }]);
            const groups = {};
            areaLessons.forEach(l => {
                const groupKey = `${l.nivel}|${l.ciclo}`;
                if (!groups[groupKey]) { groups[groupKey] = { nivel: l.nivel, ciclo: l.ciclo, lessons: [] }; }
                groups[groupKey].lessons.push(l);
            });
            const groupOrder = ['Primaria|Ciclo III', 'Primaria|Ciclo IV', 'Primaria|Ciclo V', 'Secundaria|Ciclo VI', 'Secundaria|Ciclo VII'];
            const sortedGroups = groupOrder.map(key => groups[key]).filter(g => g);
            let groupsHTML = '';
            sortedGroups.forEach(group => {
                const nivelClass = group.nivel.toLowerCase();
                groupsHTML += `
                <div class="level-group">
                    <div class="level-group-header">
                        <span class="level-badge ${nivelClass}">${group.nivel}</span>
                        <span class="ciclo-tag">${group.ciclo}</span>
                    </div>
                    <div class="lesson-grid">
                        ${group.lessons.map(l => {
                            const isMetodo = l.esMetodo ? ' metodo-card' : '';
                            const metodoIcon = l.esMetodo ? ' <span class="metodo-icon-small">🧪 MÉTODO</span>' : '';
                            return `
                            <div class="lesson-card${isMetodo}" onclick="navigateToLesson('${l.id}')">
                                <span class="lesson-title">${l.materia}${metodoIcon}</span>
                                <span class="lesson-meta">📐 ${l.grado}</span>
                                <span class="lesson-preview">${l.conocimientos}</span>
                                <span class="arrow">→</span>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            });
            main.innerHTML = `
                <button class="btn-back" onclick="navigateHome()">← Volver al inicio</button>
                <h1 class="page-title">${areaName}</h1>
                <p class="page-subtitle">${areaLessons.length} lecciones organizadas por nivel y ciclo. Todas con contenido pedagógico completo.</p>
                ${groupsHTML}
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderLesson(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) { renderHome(); return; }
            currentView = 'lesson'; currentLessonId = lessonId; currentArea = lesson.area;
            updateBreadcrumb([
                { label: lesson.areaName, action: () => navigateToArea(lesson.area), current: false },
                { label: lesson.materia + ' (' + lesson.grado + ')', action: null, current: true },
            ]);
            const nivelClass = lesson.nivel.toLowerCase();
            const isMetodo = lesson.esMetodo;
            const headerClass = isMetodo ? ' metodo-header' : '';
            let phasesHTML = '';
            phaseDefinitions.forEach(phase => {
                phasesHTML += `
                <div class="phase-item ${phase.cssClass}" id="phase-${phase.number}-${lesson.id}">
                    <div class="phase-header" onclick="togglePhase('phase-${phase.number}-${lesson.id}')">
                        <span class="phase-number">${phase.number}</span>
                        <span class="phase-title-text">${phase.title}<span class="phase-subtitle">${phase.subtitle}</span></span>
                        <span class="phase-chevron">▾</span>
                    </div>
                    <div class="phase-body">
                        <textarea class="editable-area" id="editable-${phase.number}-${lesson.id}" placeholder="Contenido de la Fase ${phase.number}..." data-phase="${phase.number}" data-lesson="${lesson.id}"></textarea>
                    </div>
                </div>`;
            });
            main.innerHTML = `
                <button class="btn-back" onclick="navigateToArea('${lesson.area}')">← Volver a ${lesson.areaName}</button>
                <div class="lesson-detail">
                    <div class="lesson-header-card${headerClass}">
                        <div class="meta-row">
                            <span class="level-badge ${nivelClass}">${lesson.nivel}</span>
                            <span>📐 ${lesson.grado}</span>
                            <span>🔄 ${lesson.ciclo}</span>
                            ${isMetodo ? '<span style="background:#8b5cf6;color:#fff;padding:0.2rem 0.7rem;border-radius:14px;font-size:0.75rem;font-weight:600;">🌟 LECCIÓN DESTACADA</span>' : ''}
                        </div>
                        <h1>${lesson.materia}</h1>
                        <span class="knowledge-tag">📘 ${lesson.conocimientos}</span>
                        ${(lessonId==='mat-pri-num-iii'||lessonId==='mat-pri-geo-iii'||lessonId==='mat-pri-med-iii') ? '<p style="margin-top:0.6rem;font-size:0.82rem;color:#eab308;">🌟 <strong>Lección extensa detallada:</strong> contenido ilustrado con ejemplos, ejercicios y proyecto completo.</p>' : ''}
                    </div>
                    <p style="color:#64748b;margin-bottom:1rem;font-size:0.8rem;">📝 Expande cada fase para ver y editar su contenido. <span style="font-size:0.7rem;color:#94a3b8;">(Cambios guardados automáticamente)</span></p>
                    <div class="phase-accordion">${phasesHTML}</div>
                </div>
            `;
            restoreSavedContent(lessonId);
            if (lessonId === 'mat-pri-num-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumIII), 150);
            } else if (lessonId === 'mat-pri-geo-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoIII), 150);
            } else if (lessonId === 'mat-pri-med-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMedIII), 150);
            } else {
                setTimeout(() => applyAutoGeneratedContent(lessonId), 150);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyManualContent(lessonId, contentObj) {
            Object.keys(contentObj).forEach(phaseNum => {
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = contentObj[phaseNum]; localStorage.setItem(key, contentObj[phaseNum]); }
                }
            });
        }
        function applyAutoGeneratedContent(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) return;
            phaseDefinitions.forEach(phase => {
                const phaseNum = phase.number;
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const content = generateLessonContent(lesson, phaseNum);
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = content; localStorage.setItem(key, content); }
                }
            });
        }

        function togglePhase(phaseElementId) {
            const phaseItem = document.getElementById(phaseElementId);
            if (!phaseItem) return;
            phaseItem.classList.toggle('open');
            const ta = phaseItem.querySelector('.editable-area');
            if (ta) saveContent(ta);
        }
        function getStorageKey(lessonId, phaseNumber) { return `lesson-${lessonId}-phase-${phaseNumber}`; }
        function saveContent(textarea) { localStorage.setItem(getStorageKey(textarea.dataset.lesson, textarea.dataset.phase), textarea.value); }
        function restoreSavedContent(lessonId) {
            phaseDefinitions.forEach(phase => {
                const saved = localStorage.getItem(getStorageKey(lessonId, phase.number));
                if (saved) { const ta = document.getElementById(`editable-${phase.number}-${lessonId}`); if (ta) ta.value = saved; }
            });
        }
        let saveTimeout;
        document.addEventListener('input', function(e) { if (e.target.classList.contains('editable-area')) { clearTimeout(saveTimeout); saveTimeout = setTimeout(() => saveContent(e.target), 500); } });
        document.addEventListener('blur', function(e) { if (e.target.classList.contains('editable-area')) saveContent(e.target); }, true);

        function navigateHome() { window.location.hash = ''; renderHome(); }
        function navigateToArea(areaKey) { window.location.hash = areaKey; renderArea(areaKey); }
        function navigateToLesson(lessonId) { window.location.hash = lessonId; renderLesson(lessonId); }
        function updateBreadcrumb(items) {
            const bc = document.getElementById('breadcrumb');
            let html = '<span onclick="navigateHome()">Inicio</span>';
            items.forEach(item => {
                html += ' <span class="sep">›</span> ';
                if (item.current) html += `<span class="current">${item.label}</span>`;
                else if (item.action) html += `<span onclick="(${item.action.toString()})()" style="cursor:pointer;">${item.label}</span>`;
                else html += `<span>${item.label}</span>`;
            });
            bc.innerHTML = html;
        }
        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.replace('#', '');
            if (!hash) renderHome();
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else if (lessonsData.some(l => l.id === hash)) renderLesson(hash);
        });
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                if (currentView === 'lesson') {
                    const allPhases = document.querySelectorAll('.phase-item');
                    const anyClosed = Array.from(allPhases).some(p => !p.classList.contains('open'));
                    allPhases.forEach(p => { if (anyClosed) p.classList.add('open'); else p.classList.remove('open'); });
                    document.querySelectorAll('.editable-area').forEach(ta => saveContent(ta));
                }
            }
        });

        function init() {
            const hash = window.location.hash.replace('#', '');
            if (hash && lessonsData.some(l => l.id === hash)) renderLesson(hash);
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else renderHome();
        }
        init();
        console.log('✅ Página de inicio restaurada: 3 bloques de área, Método Científico presente.');
        console.log('🧮 Matemática: 14 lecciones | 🔬 Ciencia y Tecnología: 15 lecciones | ⚗️ Método Científico: 3 lecciones.');
        console.log('🌟 Lecciones extensas: Números, Geometría y Medición (Ciclo III) desarrolladas.');
    </script>
