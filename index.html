            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 5° y 6° grado de primaria las competencias científicas relacionadas con la dinámica de la corteza terrestre (placas tectónicas), la comprensión de los fenómenos naturales (sismos, tsunamis, erupciones volcánicas, fenómeno de El Niño) y la problemática de la contaminación ambiental (aire, agua, suelo y cambio climático), fomentando la gestión del riesgo de desastres y la conciencia ambiental para la sostenibilidad.\n\n🎯 OBJETIVOS PARTICULARES:\n• Comprender que la litosfera terrestre está fragmentada en placas tectónicas que se mueven lentamente debido a las corrientes de convección del manto.\n• Identificar los tipos de bordes de placa: divergentes (separación), convergentes (choque) y transformantes (deslizamiento lateral).\n• Relacionar la actividad sísmica y volcánica con los bordes de placa, especialmente en el Cinturón de Fuego del Pacífico.\n• Explicar cómo se produce un terremoto (liberación de energía acumulada), un tsunami y una erupción volcánica.\n• Describir el Fenómeno de El Niño y sus impactos en el Perú.\n• Identificar las principales fuentes de contaminación del aire, el agua y el suelo en el Perú.\n• Comprender el efecto invernadero, el calentamiento global y el cambio climático, diferenciándolos y reconociendo sus causas y consecuencias.\n• Proponer acciones de prevención, mitigación y adaptación frente a los fenómenos naturales y la contaminación ambiental.\n\n📌 NOCIONES PRINCIPALES:\n• Placa tectónica, litosfera, astenosfera, corriente de convección.\n• Borde divergente (rift, dorsal oceánica), borde convergente (subducción, cordilleras), borde transformante (fallas).\n• Terremoto (sismo): hipocentro, epicentro, ondas sísmicas (P, S), magnitud (escala de Richter), intensidad (escala de Mercalli).\n• Tsunami: origen sísmico en el fondo marino, propagación, impacto costero.\n• Volcán: magma, lava, cráter, chimenea, erupción efusiva y explosiva.\n• Fenómeno de El Niño (ENOS: El Niño-Oscilación del Sur).\n• Contaminación ambiental: aire (gases, material particulado), agua (residuos, relaves, plásticos), suelo (pesticidas, basura, deforestación).\n• Efecto invernadero (natural y acentuado), gases de efecto invernadero (GEI): CO₂, CH₄, vapor de agua.\n• Calentamiento global y cambio climático.\n\n📌 NOCIONES SECUNDARIAS:\n• Placa de Nazca y placa Sudamericana: su interacción como causante de los terremotos y la formación de los Andes peruanos.\n• Principales terremotos en la historia del Perú (1970 en Áncash, 2007 en Pisco/Ica).\n• Principales volcanes peruanos: Ubinas, Misti, Sabancaya, Coropuna.\n• El ciclo del carbono y su alteración por la quema de combustibles fósiles.\n• Protocolo de Kyoto, Acuerdo de París.\n• Las 3R: Reducir, Reutilizar, Reciclar. Economía circular.\n\n🌍 INTERESES SOCIETALES:\n• El Perú está ubicado en una de las zonas sísmicas más activas del planeta (Cinturón de Fuego del Pacífico). Comprender la tectónica de placas es vital para la cultura de prevención y la gestión del riesgo de desastres.\n• El Fenómeno de El Niño impacta la economía peruana (pesca, agricultura, infraestructura) y la salud pública (dengue, cólera).\n• La contaminación ambiental es un problema urgente en las ciudades peruanas (Lima es una de las más contaminadas de Latinoamérica). La educación ambiental desde la escuela es clave para el desarrollo sostenible.\n• El cambio climático es el mayor desafío global de nuestra generación; sus efectos ya se sienten en el Perú (derretimiento de glaciares, pérdida de biodiversidad, estrés hídrico).`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Detectives de la Tierra, los desastres y el ambiente"\n\n🧩 MATERIALES: Rompecabezas de las placas tectónicas (mapa impreso recortado), galletas o pan para simular placas, plastilina, vinagre y bicarbonato para un mini volcán, noticias reales sobre terremotos y El Niño en el Perú, frascos con muestras de agua contaminada vs. limpia, semillas, tierra, papel pH, termómetro, envases de plástico, cartulinas.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Rompecabezas de la Tierra" – Los estudiantes arman un mapamundi con las principales placas tectónicas (Placa de Nazca, Placa Sudamericana, Placa del Pacífico, Placa Africana, etc.). Sobre el mapa, marcan con alfileres de colores los epicentros de los últimos terremotos (usando datos de una hoja proporcionada). ¿Qué observan? ¡La mayoría se concentran en los bordes de placa! Descubren visualmente la relación entre placas y sismos.\n\nESTACIÓN 2: "Simulando un sismo y un tsunami" – Con dos trozos de galleta flotando sobre miel o yogur (que simula la astenosfera), los estudiantes empujan las "placas" entre sí. Cuando una se desliza bruscamente sobre la otra, sienten la vibración (sismo). En una bandeja con agua, dejan caer una piedra y observan las ondas circulares (simulación de tsunami). ¿Qué pasa con las olas al llegar al borde de la bandeja (costa)? (Aumentan de altura).\n\nESTACIÓN 3: "ANALIZANDO AGUAS" – Tienen 4 frascos: a) Agua de caño (limpia), b) Agua con tierra (sedimentos), c) Agua con aceite y detergente (contaminación industrial/doméstica), d) Agua de un charco verdoso (eutrofización). Miden el pH con papel indicador. Describen el olor, color y transparencia. Reflexionan: ¿Cuál de estas aguas se puede beber? ¿Cómo afecta cada tipo de contaminación a los seres vivos?\n\nESTACIÓN 4: "El termómetro global" – Con dos cajas de cartón forradas: una con papel blanco y otra con papel negro. Ambas tienen un termómetro en su interior y se exponen a la luz solar (o una lámpara potente). Miden la temperatura cada 2 minutos durante 10 minutos. La caja negra se calienta mucho más. Relacionan con el efecto invernadero: la superficie oscura (suelo, océano) absorbe más calor; los gases de efecto invernadero "atrapan" ese calor.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Por qué tiembla tanto en el Perú? ¿Qué relación tienen los volcanes con las placas tectónicas? ¿De dónde viene la contaminación que vemos en nuestros ríos y mares? ¿Por qué está aumentando la temperatura de la Tierra?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "De las evidencias a los modelos explicativos"\n\n📊 OBSERVACIÓN GUIADA: BORDES DE PLACA Y FENÓMENOS ASOCIADOS\nSe presenta una tabla con imágenes de distintos lugares del mundo y los estudiantes asocian cada imagen con el tipo de borde y el fenómeno:\n\n| Lugar / Imagen | ¿Qué placas interactúan? | Tipo de borde | ¿Qué fenómeno geológico lo acompaña? |\n|---|---|---|---|\n| Cordillera de los Andes | Placa de Nazca (oceánica) se hunde bajo Placa Sudamericana (continental) | Convergente (subducción) | Terremotos profundos, volcanes, formación de montañas |\n| Dorsal Mesoatlántica (Islandia) | Placa Norteamericana y Placa Euroasiática se separan | Divergente | Volcanes efusivos, formación de nueva corteza oceánica |\n| Falla de San Andrés (California) | Placa del Pacífico y Placa Norteamericana se deslizan lateralmente | Transformante | Terremotos superficiales, sin volcanismo |\n\nPaso 1: Los estudiantes identifican que en el Perú (borde convergente) ocurren sismos profundos y hay cadena volcánica.\nPaso 2: Relacionan la magnitud de los sismos con la energía acumulada: a mayor fricción atascada por más tiempo, mayor liberación de energía.\nConclusión guiada: "Los fenómenos geológicos como sismos y volcanes no están distribuidos al azar: se concentran en los bordes de las placas tectónicas. El tipo de borde determina el tipo de fenómeno".\n\n📊 OBSERVACIÓN GUIADA: CONTAMINACIÓN Y CAMBIO CLIMÁTICO\nSe muestra un gráfico de la concentración de CO₂ atmosférico en los últimos 150 años (desde la Revolución Industrial). La curva se dispara a partir de 1950.\n\nTambién se muestra un gráfico del aumento de la temperatura media global en el mismo período.\n\nPaso 1: Los estudiantes notan la correlación: a mayor CO₂, mayor temperatura.\nPaso 2: Discuten las causas: quema de combustibles fósiles (carbón, petróleo, gas), deforestación (menos árboles que absorban CO₂), ganadería intensiva (metano), uso de aerosoles (CFC, aunque ya prohibidos en su mayoría).\nPaso 3: La docente introduce la distinción entre EFECTO INVERNADERO (fenómeno natural y necesario, sin él la Tierra sería un congelador a -18°C) y CALENTAMIENTO GLOBAL (aumento acelerado de la temperatura por la acción humana que intensifica el efecto invernadero).\nConclusión: "El efecto invernadero es bueno y necesario; el problema es la intensificación causada por los gases que emitimos, que produce un calentamiento global más rápido de lo que los ecosistemas pueden soportar".\n\n📝 REGISTRO: Cada estudiante dibuja en su cuaderno un esquema con los tres tipos de bordes de placa y un ejemplo de cada uno, y un diagrama del efecto invernadero.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Placas Tectónicas, Fenómenos Naturales y Contaminación Ambiental\n\n🌍 1. PLACAS TECTÓNICAS\n\n📏 ESTRUCTURA INTERNA DE LA TIERRA (recordatorio): Núcleo interno (sólido), núcleo externo (líquido), manto (roca semifluida en la astenosfera, sólida en el resto), corteza (litosfera).\n\n📏 LA TEORÍA DE LA TECTÓNICA DE PLACAS:\nLa litosfera (corteza + parte superior del manto) NO es una capa continua, sino que está fragmentada en enormes piezas llamadas PLACAS TECTÓNICAS, que "flotan" sobre la astenosfera semifluida y se mueven lentamente (unos cuantos centímetros por año, como el crecimiento de las uñas) arrastradas por las corrientes de convección del manto.\n\n📏 TIPOS DE BORDES DE PLACA:\n\n🔹 BORDE DIVERGENTE (separación):\nLas placas se alejan entre sí. El magma asciende, se enfría y forma nueva corteza.\n• Ejemplos: Dorsal Mesoatlántica (en el fondo del océano Atlántico), el Rift de África Oriental.\n• Fenómenos: volcanismo efusivo (no explosivo), creación de corteza oceánica, terremotos leves.\n\n🔹 BORDE CONVERGENTE (choque):\nLas placas colisionan. Hay tres subtipos según el tipo de corteza:\na) Oceánica - Continental: La placa oceánica (más densa) se hunde (SUBDUCCIÓN) bajo la continental. Se forma una fosa oceánica y una cadena montañosa/volcánica en el continente. Ej: Placa de Nazca bajo la Placa Sudamericana → Cordillera de los Andes y Fosa de Perú-Chile.\nb) Oceánica - Oceánica: Una placa oceánica subduce bajo otra. Se forma un arco de islas volcánicas. Ej: Archipiélago de Japón, Islas Aleutianas.\nc) Continental - Continental: Ninguna subduce; chocan y se pliegan formando grandes cordilleras. Ej: Choque de la Placa Índica con la Euroasiática → Cordillera del Himalaya (Monte Everest).\n\n🔹 BORDE TRANSFORMANTE (deslizamiento lateral):\nLas placas se deslizan horizontalmente una junto a la otra. No se crea ni se destruye corteza. La fricción acumula tensión que se libera en forma de terremotos.\n• Ej: Falla de San Andrés (California, EE.UU.).\n\n📏 EL CINTURÓN DE FUEGO DEL PACÍFICO:\nEs una herradura de intensa actividad sísmica y volcánica que rodea el océano Pacífico. El Perú forma parte de este cinturón porque la Placa de Nazca subduce bajo la Placa Sudamericana a lo largo de toda la costa peruana.\n\n⚡ 2. FENÓMENOS NATURALES\n\n📏 TERREMOTO (SISMO):\nSacudida brusca de la corteza terrestre causada por la liberación repentina de energía acumulada en una falla o en un borde de placa.\n• HIPOCENTRO (FOCO): Punto en el interior de la Tierra donde se origina el sismo.\n• EPICENTRO: Punto en la superficie terrestre directamente sobre el hipocentro. Allí la intensidad es mayor.\n• ONDAS SÍSMICAS: P (primarias, las más rápidas), S (secundarias, no viajan por líquidos), superficiales (las que causan los daños).\n• MAGNITUD (Escala de Richter): Mide la energía liberada. Cada punto de aumento equivale a 32 veces más energía. Un sismo de 7.0 es 32 veces más potente que uno de 6.0.\n• INTENSIDAD (Escala de Mercalli): Mide los efectos/destrucción en un lugar. Varía de I (no sentido) a XII (destrucción total).\n\n📏 TSUNAMI (Maremoto):\nSerie de olas gigantes causadas generalmente por un terremoto submarino que desplaza verticalmente el fondo marino. En alta mar, las olas son bajas (menos de 1 m) y viajan a gran velocidad (hasta 800 km/h). Al llegar a la costa, la profundidad disminuye, la ola se frena y su altura aumenta considerablemente (hasta 30 m en casos extremos), inundando las zonas costeras.\n\n📏 ERUPCIÓN VOLCÁNICA:\nSalida de magma (roca fundida) del interior de la Tierra a la superficie.\n• MAGMA: Roca fundida bajo la superficie.\n• LAVA: Magma que sale a la superficie.\n• Materiales expulsados: lava, gases (vapor de agua, CO₂, SO₂, etc.), piroclastos (bombas, lapilli, ceniza).\n• Tipos de erupción: Efusiva (lava fluida, Hawái) y Explosiva (mucha ceniza y gases, volcanes andinos).\n• Volcanes peruanos activos: Ubinas (Moquegua), Sabancaya (Arequipa), Misti (Arequipa).\n\n📏 FENÓMENO DE EL NIÑO (ENOS: El Niño-Oscilación del Sur):\nCalentamiento anómalo de las aguas superficiales del océano Pacífico ecuatorial central y oriental.\n• En condiciones normales, los vientos alisios empujan el agua cálida hacia el oeste (Indonesia, Australia) y frente a la costa peruana asciende agua fría (afloramiento costero, rica en nutrientes).\n• Durante El Niño, los vientos alisios se debilitan, el agua cálida se acumula frente a Perú y Ecuador, el afloramiento se suprime, la pesca (anchoveta) colapsa, y se producen lluvias torrenciales en la costa norte peruana (Tumbes, Piura, Lambayeque, La Libertad) y sequías en la sierra sur.\n• Impactos en Perú: Inundaciones, huaicos, destrucción de viviendas y vías, proliferación de mosquitos (dengue), pero también reverdecimiento de lomas y recarga de acuíferos.\n\n♻️ 3. CONTAMINACIÓN AMBIENTAL\n\n📏 CONTAMINACIÓN DEL AIRE:\n• Fuentes: quema de combustibles fósiles (transporte, industrias), quema de basura y bosques, emisiones volcánicas.\n• Principales contaminantes: CO₂ (dióxido de carbono), CO (monóxido de carbono, tóxico), SO₂ (dióxido de azufre, lluvia ácida), NOₓ (óxidos de nitrógeno), material particulado (PM2.5 y PM10, partículas finas que dañan los pulmones), ozono troposférico (O₃, contaminante a nivel del suelo).\n• Consecuencias: Problemas respiratorios (asma, bronquitis), lluvia ácida (daña bosques, cultivos, monumentos), incremento del efecto invernadero.\n\n📏 CONTAMINACIÓN DEL AGUA:\n• Fuentes: Aguas residuales domésticas (desagües) sin tratar, residuos industriales (relaves mineros, químicos), derrames de petróleo, basura plástica, pesticidas de la agricultura.\n• Consecuencias: Enfermedades (cólera, tifoidea, diarreas), muerte de peces y otras especies acuáticas, eutrofización (exceso de nutrientes que genera proliferación de algas y muerte por falta de oxígeno), agua no apta para consumo humano.\n• En el Perú: El río Rímac (que abastece a Lima) tiene altos niveles de contaminación por relaves mineros y desagües. El lago Titicaca también recibe contaminación urbana y minera.\n\n📏 CONTAMINACIÓN DEL SUELO:\n• Fuentes: Uso excesivo de fertilizantes y pesticidas en la agricultura, residuos sólidos (basura), especialmente plásticos que tardan cientos de años en degradarse, minería ilegal (mercurio en la Amazonía), derrames de petróleo.\n• Consecuencias: Pérdida de fertilidad del suelo, contaminación de alimentos, daño a los organismos del suelo (lombrices, bacterias benéficas), desertificación.\n\n📏 CAMBIO CLIMÁTICO:\n• EFECTO INVERNADERO (natural): La atmósfera retiene parte del calor que la Tierra emite al espacio, manteniendo una temperatura promedio de 15°C (sin él, sería -18°C). Los principales GEI naturales son: vapor de agua (H₂O), dióxido de carbono (CO₂), metano (CH₄) y óxido nitroso (N₂O).\n• EFECTO INVERNADERO ACENTUADO (antropogénico): La actividad humana ha incrementado las concentraciones de GEI a niveles sin precedentes en la historia humana. La concentración de CO₂ ha pasado de ~280 ppm (era preindustrial) a más de 420 ppm en la actualidad.\n• CALENTAMIENTO GLOBAL: Es el aumento observado en la temperatura promedio del planeta (aproximadamente 1.1°C desde la era preindustrial).\n• CAMBIO CLIMÁTICO: Incluye el calentamiento global y todas las alteraciones que produce en el clima: derretimiento de glaciares (los glaciares andinos han perdido más del 40% de su superficie desde 1970), aumento del nivel del mar, eventos climáticos extremos más frecuentes (sequías, inundaciones, olas de calor), acidificación de los océanos (por absorción de CO₂).\n\n📏 ACCIONES PARA EL CUIDADO AMBIENTAL:\n• Las 3R: Reducir (consumir menos, evitar plásticos de un solo uso), Reutilizar (dar nueva vida a objetos), Reciclar (transformar residuos en nuevos productos).\n• Medidas de adaptación y mitigación frente al cambio climático: sembrar árboles (absorben CO₂), usar energías renovables, transporte sostenible (bicicleta, transporte público), ahorro de agua y energía.\n\n⚠️ ERRORES COMUNES:\n• Decir que la "falla tectónica" de San Andrés es un borde convergente. → Es transformante.\n• Creer que magnitud e intensidad son lo mismo. → Magnitud mide energía; intensidad mide daños.\n• Pensar que el calentamiento global implica que todos los lugares se calientan por igual. → Altera patrones climáticos, algunos lugares pueden incluso enfriarse.\n• Confundir tiempo atmosférico (lluvia de hoy) con clima (promedio de lluvias en 30 años).\n• Creer que el plástico se descompone rápido. → Puede tardar 100 a 500 años dependiendo del tipo.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de aplicación\n\n📝 BLOQUE 1: Placas Tectónicas\n1. Une con flechas:\nBorde divergente → (Las placas se separan, se forma nueva corteza).\nBorde convergente → (Las placas chocan, una subduce bajo la otra).\nBorde transformante → (Las placas se deslizan lateralmente).\n\n2. ¿Qué tipo de borde de placa existe en la costa del Perú? ¿Qué placas interactúan? (Borde convergente de subducción. La Placa de Nazca (oceánica) subduce bajo la Placa Sudamericana (continental)).\n\n3. ¿Por qué el Perú está en el Cinturón de Fuego del Pacífico? (Porque se ubica en el límite convergente entre dos placas en el océano Pacífico, lo que genera intensa actividad sísmica y volcánica).\n\n📝 BLOQUE 2: Fenómenos Naturales\n4. Define: Hipocentro, Epicentro, Magnitud, Intensidad.\n5. Explica por qué un tsunami puede tener olas de solo 1 metro en alta mar, pero de 10 metros o más al llegar a la costa. (Porque la velocidad disminuye al reducirse la profundidad y la energía de la ola se comprime, aumentando su altura).\n6. ¿Cuál es la diferencia entre magma y lava? (Magma: roca fundida bajo la superficie; Lava: magma que sale al exterior).\n7. Describe los impactos del Fenómeno de El Niño en la costa norte del Perú. (Lluvias torrenciales, inundaciones, huaicos, colapso de la pesca de anchoveta, pero también reverdecimiento de lomas y recarga de acuíferos).\n\n📝 BLOQUE 3: Contaminación Ambiental\n8. Relaciona:\nQuema de gasolina → (Contaminación del aire - CO₂, CO, NOₓ).\nRelaves mineros en ríos → (Contaminación del agua - metales pesados).\nUso excesivo de pesticidas → (Contaminación del suelo - productos químicos).\nAerosoles con CFC (antiguamente) → (Destrucción de la capa de ozono).\n\n9. Menciona dos consecuencias del cambio climático que ya se observan en el Perú. (Derretimiento de glaciares andinos, estrés hídrico en la costa, eventos El Niño más intensos, pérdida de biodiversidad, etc.).\n\n10. ¿Por qué el efecto invernadero es bueno, pero se ha vuelto un problema? (Es bueno porque mantiene la temperatura de la Tierra habitable. El problema es la intensificación por el exceso de GEI emitidos por el ser humano, que provoca un calentamiento global acelerado con graves consecuencias).\n\n📝 BLOQUE 4: Problemas y Soluciones\n11. ¿Qué significan las 3R? Da un ejemplo de cada una en tu vida diaria.\n12. Imagina que eres el alcalde de una ciudad costera peruana con riesgo de tsunami. ¿Qué medidas propondrías para proteger a la población? (Sistema de alerta temprana, señalización de rutas de evacuación, educación a la población, construcción de barreras verdes, etc.).\n\n📝 BLOQUE 5: Caso práctico\n13. Un río de tu comunidad tiene agua turbia, mal olor y espuma blanca. ¿Qué tipo de contaminación podría tener? (Contaminación por aguas residuales domésticas, posiblemente con detergentes y materia orgánica). ¿Qué pruebas harías para confirmarlo? (Medir pH, olor, color, transparencia, presencia de microorganismos). ¿Qué acción ciudadana podrías emprender? (Reportar a la autoridad ambiental, organizar una campaña de limpieza y sensibilización).\n\n⏱️ Tiempo estimado: 80-100 min. ✅ Puesta en común y debate sobre acciones locales.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Seres Vivos, Materia y Energía y Matemática\n\n🔬 CONEXIÓN CON SERES VIVOS:\n• La contaminación del agua, aire y suelo impacta directamente en la biodiversidad: especies mueren o migran, se alteran las cadenas alimenticias.\n• El cambio climático modifica los hábitats: los glaciares andinos que se derriten dejan sin agua a especies de la puna como la vicuña y el suri.\n• El Fenómeno de El Niño altera la cadena trófica marina: sin afloramiento costero, el plancton escasea, la anchoveta migra o muere, y las aves guaneras y lobos marinos se ven afectados.\n\n🔬 CONEXIÓN CON MATERIA Y ENERGÍA:\n• Las erupciones volcánicas implican cambios de estado (magma líquido → lava sólida al enfriarse) y reacciones químicas (gases como SO₂ reaccionan con el vapor de agua formando lluvia ácida).\n• La contaminación atmosférica es una mezcla de gases y partículas (materia). Las reacciones de combustión (Materia y Energía, Ciclo V) son la principal fuente de contaminación del aire.\n• El efecto invernadero es un fenómeno energético: la radiación solar (energía luminosa) entra, calienta la Tierra, que emite radiación infrarroja (calor), la cual es parcialmente atrapada por los GEI.\n\n🧮 CONEXIÓN CON MATEMÁTICA:\n• Escalas de magnitud sísmica (logarítmica): un sismo de 8.0 es 10^(8-6) = 100 veces más potente en amplitud de onda y aproximadamente 32 veces más en energía liberada que uno de 6.0.\n• Gráficos de concentración de CO₂ a lo largo del tiempo: interpretación de gráficos de línea.\n• Cálculo de velocidades de propagación de tsunamis (v = √(g·h), donde g=9.8 m/s² y h es la profundidad del océano, ≈4000 m → v ≈ 200 m/s ≈ 720 km/h).\n• Porcentajes: pérdida de superficie glaciar en los Andes peruanos (más del 40% desde 1970).\n\n🧩 ACTIVIDAD INTEGRADORA: "Simulacro de sismo y cálculo de tiempos de llegada de un tsunami": Realizar un simulacro escolar de sismo. Luego, usando un mapa de la costa local, calcular el tiempo que tardaría un tsunami en llegar a la playa si se origina a 100 km mar adentro (t = d/v; si v ≈ 720 km/h, t ≈ 8 minutos). Reflexionar sobre la importancia de la evacuación inmediata.\n\n💡 REFLEXIÓN: La Tierra es un sistema dinámico y vivo. Los mismos procesos que construyeron los Andes y que fertilizan el mar peruano pueden causar desastres si no los entendemos y respetamos. La ciencia nos da el conocimiento para prevenir y proteger.`,
            6: `🌍 CORRELACIONES EXTERNAS: Placas tectónicas, fenómenos naturales y contaminación en el Perú y el mundo\n\n🏚️ GESTIÓN DEL RIESGO DE DESASTRES:\n• El Perú cuenta con el INDECI (Instituto Nacional de Defensa Civil) y el IGP (Instituto Geofísico del Perú), que monitorean sismos y volcanes las 24 horas y emiten alertas.\n• La Gran Parada Sísmica Nacional se realiza cada año en simulacros escolares y familiares.\n• Los terremotos de 1970 en Áncash (aproximadamente 70,000 fallecidos y la desaparición de la ciudad de Yungay por un aluvión del Huascarán) y de 2007 en Pisco (595 fallecidos, miles de heridos y damnificados) recuerdan la importancia de la prevención.\n• Las normas de construcción sismorresistente son obligatorias en el Perú.\n\n🌊 FENÓMENO DE EL NIÑO:\n• El Niño Costero de 2017 causó inundaciones, huaicos y más de 100 fallecidos en el Perú. La prevención incluye limpieza de cauces y sistemas de alerta temprana.\n• El Niño Global afecta a todo el planeta: sequías en Australia e Indonesia, lluvias en California, alteraciones en los mercados de alimentos.\n\n🏭 MINERÍA Y CONTAMINACIÓN EN EL PERÚ:\n• La minería es una actividad económica clave, pero su práctica informal e ilegal deja graves pasivos ambientales: ríos contaminados con mercurio en Madre de Dios, relaves en los ríos de la sierra central.\n• La Oroya (Junín) ha sido considerada una de las ciudades más contaminadas del mundo por las emisiones de plomo y dióxido de azufre de su fundición.\n\n🏙️ CONTAMINACIÓN URBANA:\n• Lima supera frecuentemente los límites recomendados por la OMS para material particulado (PM2.5). La principal fuente es el parque automotor antiguo y la baja calidad de los combustibles.\n• La gestión de los residuos sólidos es un desafío: solo se recicla una fracción mínima de la basura generada; la mayor parte va a rellenos sanitarios o, peor aún, a botaderos informales.\n\n🌱 SOLUCIONES Y ESPERANZA:\n• Áreas Naturales Protegidas: ya cubren cerca del 18% del territorio peruano.\n• Programas de reforestación y restauración de ecosistemas.\n• Energías renovables en crecimiento: parques eólicos (Marcona, Cupisnique) y solares (Moquegua, Arequipa).\n• Jóvenes activistas ambientales y proyectos escolares de ciencia ciudadana.\n\n🧠 REFLEXIÓN FINAL: "La Tierra no nos necesita para sobrevivir; nosotros necesitamos de ella. La ciencia nos ha mostrado cómo funciona el planeta y cómo nuestras acciones lo están afectando. Ahora, depende de nosotros, como generación, usar ese conocimiento para vivir en armonía con la naturaleza y no contra ella."\n\n🗣️ CITA: "Vivimos en la Tierra como si tuviéramos otra a la que ir." — Jane Goodall. Y también: "No heredamos la Tierra de nuestros ancestros, la tomamos prestada de nuestros hijos." — Proverbio indígena.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Simposio: Gestión de Riesgos y Sostenibilidad en mi Región"\n\n🎯 OBJETIVO: Los estudiantes investigarán un fenómeno natural o un problema ambiental que afecte a su región (o a una región del Perú), y prepararán un plan de prevención, mitigación o adaptación, presentándolo en un simposio escolar con propuestas concretas.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: SELECCIÓN DEL TEMA Y REGIÓN (1 sesión)\n• 5 equipos. Cada equipo elige un tema asociado a una región peruana:\n  - Equipo "Costa Norte": Fenómeno de El Niño e inundaciones en Piura.\n  - Equipo "Costa Sur": Tsunamis y terremotos en Ica/Arequipa.\n  - Equipo "Sierra": Erupciones volcánicas y huaicos en Arequipa/Moquegua.\n  - Equipo "Selva": Contaminación por minería ilegal (mercurio) en Madre de Dios.\n  - Equipo "Lima Metropolitana": Contaminación del aire y gestión de residuos sólidos.\n\nFASE 2: INVESTIGACIÓN (1-2 sesiones)\n• Investigan:\n  - Causas científicas del fenómeno/problema.\n  - Impactos históricos y actuales en esa región.\n  - Medidas de prevención/mitigación existentes (INDECI, MINAM, municipalidades).\n  - Propuestas innovadoras del equipo.\n• Recopilan datos, mapas, gráficos, noticias.\n\nFASE 3: ELABORACIÓN DEL PLAN (1 sesión)\n• Diseñan un "Plan de Acción" que contenga:\n  1. Diagnóstico: explicación científica del problema.\n  2. Objetivos: ¿Qué se quiere lograr?\n  3. Acciones concretas: ¿Qué, quién, cómo, cuándo?\n  4. Presupuesto básico estimado (en soles).\n  5. Campaña de comunicación: ¿Cómo educar a la población? (Afiche, cuña radial, video, etc.).\n\nFASE 4: SIMPOSIO (1 sesión)\n• Se organizan como un congreso científico.\n• Cada equipo expone su investigación y plan en una presentación de 8 minutos.\n• Tras cada presentación, hay 5 minutos de preguntas del "comité de expertos" (docente y compañeros).\n• Se evalúa la solidez científica, la viabilidad de las propuestas y la calidad comunicativa.\n\nFASE 5: COMPROMISOS Y CIERRE (1 sesión)\n• Cada equipo ajusta su plan con las sugerencias recibidas.\n• Se elabora un mural escolar con las propuestas de todos los equipos.\n• Se invita a los estudiantes a firmar un "Pacto de Ciudadanía Ambiental" con compromisos personales.\n\n🏆 EVALUACIÓN: Rigor científico (40%), creatividad y viabilidad de las propuestas (30%), claridad expositiva (20%), trabajo colaborativo (10%).\n🎉 CIERRE: Entrega de diplomas de "Guardianes de la Tierra". Mensaje final: "La Tierra no nos necesita, nosotros la necesitamos a ella. Actuemos hoy."`,

                    return `ACTIVIDAD DE DESCUBIERTA: "Explorando ${materia}"\n\n🧩 Se presentan situaciones problemáticas y materiales concretos para que los estudiantes exploren libremente los conceptos de ${materia}.\n🔍 Preguntas para la reflexión y registro de observaciones en el cuaderno de experiencias.`;

                case 5:

                <div style="margin-top:1.5rem;padding:1.2rem;background:#fefce8;border-radius:12px;border:1px solid #eab308;font-size:0.85rem;color:#92400e;">
                    <strong>🌟 Lecciones extensas ya desarrolladas:</strong><br>
                    <strong>Ciclo III (1°-2° Primaria):</strong><br>
                    🧮 <strong>Números y Operaciones</strong> — contenido detallado + proyecto "La Tiendita Matemática".<br>
                    🧮 <strong>Geometría</strong> — figuras planas y cuerpos geométricos + proyecto "Museo de Formas Geométricas".<br>
                    🧮 <strong>Medición</strong> — longitud, masa y tiempo + proyecto "La Feria de las Medidas".<br>
                    🔬 <strong>Seres Vivos</strong> — cuerpo humano, animales, plantas y hábitos saludables + proyecto "Feria de la Salud y la Naturaleza".<br>
                    🔬 <strong>Materia y Energía</strong> — propiedades de materiales, luz y sonido + proyecto "Museo Interactivo de la Materia, la Luz y el Sonido".<br>
                    🔬 <strong>Tierra y Universo</strong> — día y noche, aire, agua, suelo y cambios atmosféricos + proyecto "Guardianes del Planeta".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo IV (3°-4° Primaria):</strong><br>
                    🧮 <strong>Números y Operaciones</strong> — naturales, fracciones, decimales y operaciones combinadas + proyecto "El Bazar del Saber".<br>
                    🧮 <strong>Geometría</strong> — ángulos, polígonos, perímetro y área de figuras planas + proyecto "Constructores de Figuras".<br>
                    🧮 <strong>Estadística</strong> — tablas de frecuencia, gráficos de barras y pictogramas + proyecto "Encuestadores Escolares".<br>
                    🔬 <strong>Seres Vivos</strong> — clasificación, cadenas alimenticias, ecosistemas peruanos + proyecto "Expedición Científica".<br>
                    🔬 <strong>Materia y Energía</strong> — estados de la materia, mezclas, fuerza y movimiento, energía renovable + proyecto "Feria Científica".<br>
                    🔬 <strong>Tierra y Universo</strong> — sistema solar, capas de la Tierra, ciclo del agua + proyecto "Planetario, Volcán y Destilador".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo V (5°-6° Primaria):</strong><br>
                    🧮 <strong>Números y Operaciones</strong> — decimales, fracciones, proporcionalidad y porcentajes + proyecto "Emprendedores Matemáticos".<br>
                    🧮 <strong>Álgebra</strong> — patrones y ecuaciones simples + proyecto "Máquina de Patrones y Escape Room".<br>
                    🧮 <strong>Geometría</strong> — áreas, volumen de prismas y circunferencia + proyecto "Ciudad Geométrica".<br>
                    🔬 <strong>Seres Vivos</strong> — la célula, sistemas del cuerpo humano, reproducción humana y biodiversidad + proyecto "Expedición Virtual".<br>
                    🔬 <strong>Materia y Energía</strong> — tabla periódica, reacciones químicas, electricidad y magnetismo + proyecto "Feria Científica".<br>
                    🔬 <strong>Tierra y Universo</strong> — placas tectónicas, fenómenos naturales, contaminación ambiental + proyecto "Simposio de Gestión de Riesgos".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo VI (1°-2° Secundaria):</strong><br>
                    🧮 <strong>Aritmética y Álgebra</strong> — números enteros, polinomios, ecuaciones, sistemas, inecuaciones + proyecto "Consultoría Matemática Juvenil".<br>
                    🧮 <strong>Geometría</strong> — triángulos, congruencia, semejanza, Pitágoras, áreas, volúmenes, trigonometría + proyecto "Misión: Medir lo Inaccesible".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo VII (3°-5° Secundaria):</strong><br>
                    🧮 <strong>Álgebra y Funciones</strong> — números reales, funciones, progresiones, programación lineal + proyecto "Optimizadores S.A.".<br>
                    🧮 <strong>Geometría y Trigonometría</strong> — geometría analítica, identidades, ley de senos/cosenos + proyecto "Parque Temático Geométrico".<br>
                    🧮 <strong>Estadística y Probabilidad</strong> — descriptiva, inferencial, probabilidad condicional, binomial + proyecto "Estudio Estadístico Escolar".<br>
                    <em>Haz clic en el área de Matemática o Ciencia y Tecnología y busca las lecciones de cada ciclo para acceder a ellas.</em>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderArea(areaKey) {
            currentView = 'area';
            currentArea = areaKey;
            currentLessonId = null;
            const areaLessons = lessonsData.filter(l => l.area === areaKey);
            const areaName = areaLessons[0]?.areaName || 'Área';
            updateBreadcrumb([{ label: areaName, action: null, current: true }]);
            const groups = {};
            areaLessons.forEach(l => {
                const groupKey = `${l.nivel}|${l.ciclo}`;
                if (!groups[groupKey]) { groups[groupKey] = { nivel: l.nivel, ciclo: l.ciclo, lessons: [] }; }
                groups[groupKey].lessons.push(l);
            });
            const groupOrder = ['Primaria|Ciclo III', 'Primaria|Ciclo IV', 'Primaria|Ciclo V',
                'Secundaria|Ciclo VI', 'Secundaria|Ciclo VII'
            ];
            const sortedGroups = groupOrder.map(key => groups[key]).filter(g => g);
            let groupsHTML = '';
            sortedGroups.forEach(group => {
                const nivelClass = group.nivel.toLowerCase();
                groupsHTML += `
                <div class="level-group">
                    <div class="level-group-header">
                        <span class="level-badge ${nivelClass}">${group.nivel}</span>
                        <span class="ciclo-tag">${group.ciclo}</span>
                    </div>
                    <div class="lesson-grid">
                        ${group.lessons.map(l => {
                            const isMetodo = l.esMetodo ? ' metodo-card' : '';
                            const metodoIcon = l.esMetodo ? ' <span class="metodo-icon-small">🧪 MÉTODO</span>' : '';
                            return `
                            <div class="lesson-card${isMetodo}" onclick="navigateToLesson('${l.id}')">
                                <span class="lesson-title">${l.materia}${metodoIcon}</span>
                                <span class="lesson-meta">📐 ${l.grado}</span>
                                <span class="lesson-preview">${l.conocimientos}</span>
                                <span class="arrow">→</span>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            });
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <button class="btn-back" onclick="navigateHome()">← Volver al inicio</button>
                <h1 class="page-title">${areaName}</h1>
                <p class="page-subtitle">${areaLessons.length} lecciones organizadas por nivel y ciclo. Todas con contenido pedagógico completo.</p>
                ${groupsHTML}
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderLesson(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) { renderHome(); return; }
            currentView = 'lesson';
            currentLessonId = lessonId;
            currentArea = lesson.area;
            updateBreadcrumb([
                { label: lesson.areaName, action: () => navigateToArea(lesson.area), current: false },
                { label: lesson.materia + ' (' + lesson.grado + ')', action: null, current: true },
            ]);
            const nivelClass = lesson.nivel.toLowerCase();
            const isMetodo = lesson.esMetodo;
            const headerClass = isMetodo ? ' metodo-header' : '';
            let phasesHTML = '';
            phaseDefinitions.forEach(phase => {
                phasesHTML += `
                <div class="phase-item ${phase.cssClass}" id="phase-${phase.number}-${lesson.id}">
                    <div class="phase-header" onclick="togglePhase('phase-${phase.number}-${lesson.id}')">
                        <span class="phase-number">${phase.number}</span>
                        <span class="phase-title-text">
                            ${phase.title}
                            <span class="phase-subtitle">${phase.subtitle}</span>
                        </span>
                        <span class="phase-chevron">▾</span>
                    </div>
                    <div class="phase-body">
                        <textarea class="editable-area" id="editable-${phase.number}-${lesson.id}" placeholder="Contenido de la Fase ${phase.number}..." data-phase="${phase.number}" data-lesson="${lesson.id}"></textarea>
                    </div>
                </div>
                `;
            });
            const isExtensaCicloIII = (lessonId === 'mat-pri-num-iii' || lessonId === 'mat-pri-geo-iii' || lessonId === 'mat-pri-med-iii');
            const isExtensaCicloIIICiencia = (lessonId === 'ct-pri-sv-iii' || lessonId === 'ct-pri-me-iii' || lessonId === 'ct-pri-tu-iii');
            const isExtensaCicloIVMat = (lessonId === 'mat-pri-num-iv' || lessonId === 'mat-pri-geo-iv' || lessonId === 'mat-pri-est-iv');
            const isExtensaCicloIVCiencia = (lessonId === 'ct-pri-sv-iv' || lessonId === 'ct-pri-me-iv' || lessonId === 'ct-pri-tu-iv');
            const isExtensaCicloV = (lessonId === 'mat-pri-num-v' || lessonId === 'mat-pri-alg-v' || lessonId === 'mat-pri-geo-v');
            const isExtensaCicloVCiencia = (lessonId === 'ct-pri-sv-v' || lessonId === 'ct-pri-me-v' || lessonId === 'ct-pri-tu-v');
            const isExtensaSec = (lessonId === 'mat-sec-arit-vi' || lessonId === 'mat-sec-geo-vi' || lessonId === 'mat-sec-alg-vii' || lessonId === 'mat-sec-geotrig-vii' || lessonId === 'mat-sec-estprob-vii');
            const esExtensa = isExtensaCicloIII || isExtensaCicloIIICiencia || isExtensaCicloIVMat || isExtensaCicloIVCiencia || isExtensaCicloV || isExtensaCicloVCiencia || isExtensaSec;
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <button class="btn-back" onclick="navigateToArea('${lesson.area}')">← Volver a ${lesson.areaName}</button>
                <div class="lesson-detail">
                    <div class="lesson-header-card${headerClass}">
                        <div class="meta-row">
                            <span class="level-badge ${nivelClass}">${lesson.nivel}</span>
                            <span>📐 ${lesson.grado}</span>
                            <span>🔄 ${lesson.ciclo}</span>
                            ${isMetodo ? '<span style="background:#8b5cf6;color:#fff;padding:0.2rem 0.7rem;border-radius:14px;font-size:0.75rem;font-weight:600;">🌟 LECCIÓN DESTACADA</span>' : ''}
                        </div>
                        <h1>${lesson.materia}</h1>
                        <span class="knowledge-tag">📘 ${lesson.conocimientos}</span>
                        ${esExtensa ? '<p style="margin-top:0.6rem;font-size:0.82rem;color:#eab308;">🌟 <strong>Lección extensa detallada:</strong> contenido ilustrado con ejemplos, ejercicios y proyecto completo.</p>' : ''}
                    </div>
                    <p style="color:#64748b;margin-bottom:1rem;font-size:0.8rem;">
                        📝 Expande cada fase para ver y editar su contenido.
                        <span style="font-size:0.7rem;color:#94a3b8;">(Cambios guardados automáticamente)</span>
                    </p>
                    <div class="phase-accordion">
                        ${phasesHTML}
                    </div>
                </div>
            `;
            restoreSavedContent(lessonId);
            if (lessonId === 'mat-pri-num-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumIII), 150);
            } else if (lessonId === 'mat-pri-geo-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoIII), 150);
            } else if (lessonId === 'mat-pri-med-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMedIII), 150);
            } else if (lessonId === 'ct-pri-sv-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVIII), 150);
            } else if (lessonId === 'ct-pri-me-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEIII), 150);
            } else if (lessonId === 'ct-pri-tu-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUIII), 150);
            } else if (lessonId === 'mat-pri-num-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumIV), 150);
            } else if (lessonId === 'mat-pri-geo-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoIV), 150);
            } else if (lessonId === 'mat-pri-est-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaEstIV), 150);
            } else if (lessonId === 'ct-pri-sv-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVIV), 150);
            } else if (lessonId === 'ct-pri-me-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEIV), 150);
            } else if (lessonId === 'ct-pri-tu-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUIV), 150);
            } else if (lessonId === 'mat-pri-num-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumV), 150);                
            } else if (lessonId === 'mat-pri-alg-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAlgV), 150);
            } else if (lessonId === 'mat-pri-geo-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoV), 150);
            } else if (lessonId === 'ct-pri-sv-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVV), 150);
            } else if (lessonId === 'ct-pri-me-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEV), 150);
            } else if (lessonId === 'ct-pri-tu-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUV), 150);
            } else if (lessonId === 'mat-sec-arit-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAritAlgVI), 150);
            } else if (lessonId === 'mat-sec-geo-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoVI), 150);
            } else if (lessonId === 'mat-sec-alg-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAlgFuncVII), 150);
            } else if (lessonId === 'mat-sec-geotrig-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeomTrigVII), 150);
            } else if (lessonId === 'mat-sec-estprob-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaEstProbVII), 150);
            } else {
                setTimeout(() => applyAutoGeneratedContent(lessonId), 150);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyManualContent(lessonId, contentObj) {
            Object.keys(contentObj).forEach(phaseNum => {
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = contentObj[phaseNum]; localStorage.setItem(key, contentObj[phaseNum]); }
                }
            });
        }

        function applyAutoGeneratedContent(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) return;
            phaseDefinitions.forEach(phase => {
                const phaseNum = phase.number;
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const content = generateLessonContent(lesson, phaseNum);
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = content; localStorage.setItem(key, content); }
                }
            });
        }

        function togglePhase(phaseElementId) {
            const phaseItem = document.getElementById(phaseElementId);
            if (!phaseItem) return;
            phaseItem.classList.toggle('open');
            const ta = phaseItem.querySelector('.editable-area');
            if (ta) saveContent(ta);
        }

        function getStorageKey(lessonId, phaseNumber) { return `lesson-${lessonId}-phase-${phaseNumber}`; }
        function saveContent(textarea) { localStorage.setItem(getStorageKey(textarea.dataset.lesson, textarea.dataset.phase), textarea.value); }

        function restoreSavedContent(lessonId) {
            phaseDefinitions.forEach(phase => {
                const saved = localStorage.getItem(getStorageKey(lessonId, phase.number));
                if (saved) { const ta = document.getElementById(`editable-${phase.number}-${lessonId}`); if (ta) ta.value = saved; }
            });
        }

        let saveTimeout;
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('editable-area')) {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => saveContent(e.target), 500);
            }
        });
        document.addEventListener('blur', function(e) {
            if (e.target.classList.contains('editable-area')) saveContent(e.target);
        }, true);

        function navigateHome() { window.location.hash = ''; renderHome(); }
        function navigateToArea(areaKey) { window.location.hash = areaKey; renderArea(areaKey); }
        function navigateToLesson(lessonId) { window.location.hash = lessonId; renderLesson(lessonId); }

        function updateBreadcrumb(items) {
            const bc = document.getElementById('breadcrumb');
            let html = '<span onclick="navigateHome()">Inicio</span>';
            items.forEach(item => {
                html += ' <span class="sep">›</span> ';
                if (item.current) html += `<span class="current">${item.label}</span>`;
                else if (item.action) html += `<span onclick="(${item.action.toString()})()" style="cursor:pointer;">${item.label}</span>`;
                else html += `<span>${item.label}</span>`;
            });
            bc.innerHTML = html;
        }

        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.replace('#', '');
            if (!hash) renderHome();
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else if (lessonsData.some(l => l.id === hash)) renderLesson(hash);
        });

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                if (currentView === 'lesson') {
                    const allPhases = document.querySelectorAll('.phase-item');
                    const anyClosed = Array.from(allPhases).some(p => !p.classList.contains('open'));
                    allPhases.forEach(p => { if (anyClosed) p.classList.add('open'); else p.classList.remove('open'); });
                    document.querySelectorAll('.editable-area').forEach(ta => saveContent(ta));
                }
            }
        });

        function init() {
            const hash = window.location.hash.replace('#', '');
            if (hash && lessonsData.some(l => l.id === hash)) renderLesson(hash);
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else renderHome();
        }
        init();
        console.log('✅ Página de inicio restaurada: 3 bloques de área, Método Científico presente.');
        console.log('🧮 Matemática: 14 lecciones | 🔬 Ciencia y Tecnología: 15 lecciones | ⚗️ Método Científico: 3 lecciones.');
        console.log('🌟 26 lecciones extensas: 3 Matemática Ciclo III + 3 Ciencia Ciclo III + 3 Matemática Ciclo IV + 3 Ciencia Ciclo IV + 3 Matemática Ciclo V + 3 Ciencia Ciclo V + 2 Matemática Ciclo VI + 3 Matemática Ciclo VII.');
    </script>
</body>
</html>
