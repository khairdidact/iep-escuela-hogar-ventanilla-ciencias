<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conocimientos Fundamentales - IEP Escuela Hogar Ventanilla</title>
    <style>
        :root {
            --matematica: #2563eb;
            --matematica-light: #dbeafe;
            --matematica-dark: #1e40af;
            --ciencia: #16a34a;
            --ciencia-light: #dcfce7;
            --ciencia-dark: #15803d;
            --metodo: #8b5cf6;
            --metodo-light: #ede9fe;
            --metodo-dark: #6d28d9;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }
        .breadcrumb span {
            cursor: pointer;
            transition: color var(--transition);
        }
        .breadcrumb span:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
        .breadcrumb .sep {
            color: #cbd5e1;
            cursor: default;
        }
        .breadcrumb .current {
            font-weight: 600;
            color: var(--text);
            cursor: default;
        }
        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 80vh;
        }
        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--text);
        }
        .page-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .area-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .area-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 1.5rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .area-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .area-card.matematica {
            border-left: 5px solid var(--matematica);
        }
        .area-card.matematica:hover {
            border-color: var(--matematica);
            background: #fafbff;
        }
        .area-card.ciencia {
            border-left: 5px solid var(--ciencia);
        }
        .area-card.ciencia:hover {
            border-color: var(--ciencia);
            background: #fafdfb;
        }
        .area-card.metodo-highlight {
            border-left: 5px solid var(--metodo);
            background: linear-gradient(135deg, #faf5ff 0%, #ede9fe 100%);
            border: 2px solid var(--metodo);
        }
        .area-card.metodo-highlight:hover {
            border-color: var(--metodo-dark);
            background: linear-gradient(135deg, #f5f0ff 0%, #e0d9fc 100%);
        }
        .area-card .icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        .area-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }
        .area-card .count {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .area-card .featured-badge {
            display: inline-block;
            background: var(--metodo);
            color: #fff;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
        .level-group {
            margin-bottom: 2.5rem;
        }
        .level-group-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .level-badge {
            display: inline-block;
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .level-badge.primaria {
            background: #fef3c7;
            color: #92400e;
        }
        .level-badge.secundaria {
            background: #dbeafe;
            color: #1e40af;
        }
        .ciclo-tag {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.85rem;
        }
        .lesson-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1.25rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .lesson-card:hover {
            border-color: #6366f1;
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .lesson-card.metodo-card {
            border-left: 4px solid var(--metodo);
            background: #fdfbff;
        }
        .lesson-card.metodo-card:hover {
            border-color: var(--metodo);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
        }
        .lesson-card .lesson-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }
        .lesson-card .lesson-meta {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .lesson-card .lesson-preview {
            font-size: 0.8rem;
            color: #94a3b8;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .lesson-card .arrow {
            align-self: flex-end;
            color: #6366f1;
            font-weight: 700;
            transition: transform var(--transition);
        }
        .lesson-card:hover .arrow {
            transform: translateX(4px);
        }
        .metodo-icon-small {
            display: inline-block;
            background: var(--metodo-light);
            color: var(--metodo-dark);
            border-radius: 4px;
            padding: 0.15rem 0.4rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .lesson-detail {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .lesson-header-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        .lesson-header-card.metodo-header {
            border-left: 5px solid var(--metodo);
            background: linear-gradient(135deg, #fff 0%, #fdfbff 100%);
        }
        .lesson-header-card h1 {
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
        }
        .lesson-header-card .meta-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .lesson-header-card .knowledge-tag {
            display: inline-block;
            background: #f1f5f9;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.78rem;
            color: #475569;
            margin-top: 0.4rem;
        }
        .phase-accordion {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .phase-item {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .phase-item.open {
            border-color: #6366f1;
            box-shadow: var(--shadow-md);
        }
        .phase-header {
            padding: 0.85rem 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            user-select: none;
            transition: background var(--transition);
        }
        .phase-header:hover {
            background: #f8fafc;
        }
        .phase-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .phase-0 .phase-number {
            background: #fef3c7;
            color: #92400e;
        }
        .phase-1 .phase-number {
            background: #fce7f3;
            color: #9d174d;
        }
        .phase-2 .phase-number {
            background: #ede9fe;
            color: #5b21b6;
        }
        .phase-3 .phase-number {
            background: #dbeafe;
            color: #1e40af;
        }
        .phase-4 .phase-number {
            background: #dcfce7;
            color: #166534;
        }
        .phase-5 .phase-number {
            background: #ffedd5;
            color: #9a3412;
        }
        .phase-6 .phase-number {
            background: #e0e7ff;
            color: #3730a3;
        }
        .phase-7 .phase-number {
            background: #fce7f3;
            color: #831843;
        }
        .phase-title-text {
            flex: 1;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .phase-subtitle {
            font-weight: 400;
            font-size: 0.73rem;
            color: var(--text-secondary);
            display: block;
        }
        .phase-chevron {
            font-size: 1.1rem;
            color: #94a3b8;
            transition: transform var(--transition);
            flex-shrink: 0;
        }
        .phase-item.open .phase-chevron {
            transform: rotate(180deg);
            color: #6366f1;
        }
        .phase-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            padding: 0 1.1rem;
            border-top: 0px solid transparent;
        }
        .phase-item.open .phase-body {
            max-height: 2000px;
            padding: 0.85rem 1.1rem;
            border-top: 1px solid #e2e8f0;
        }
        .phase-body .editable-area {
            width: 100%;
            min-height: 80px;
            border: 1px dashed #d1d5db;
            border-radius: 6px;
            padding: 0.7rem;
            font-family: inherit;
            font-size: 0.85rem;
            resize: vertical;
            background: #fafafa;
            color: var(--text);
            line-height: 1.5;
        }
        .phase-body .editable-area:focus {
            outline: 2px solid #6366f1;
            border-color: transparent;
            background: #fff;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.9rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            transition: all var(--transition);
            margin-bottom: 1rem;
        }
        .btn-back:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: flex-start;
            }
            .main-container {
                padding: 1rem;
            }
            .area-cards {
                grid-template-columns: 1fr;
            }
            .lesson-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 5° y 6° grado de primaria las competencias científicas referidas a la estructura y funcionamiento celular, la organización de los sistemas del cuerpo humano, la comprensión de la reproducción humana y la valoración de la biodiversidad, fomentando el pensamiento crítico, la indagación y el cuidado de la salud y el ambiente.\n\n🎯 OBJETIVOS PARTICULARES:\n• Identificar la célula como unidad básica, estructural y funcional de todos los seres vivos.\n• Diferenciar entre célula procariota y eucariota, así como entre célula animal y vegetal, reconociendo los organelos principales (membrana, citoplasma, núcleo, mitocondrias, cloroplastos, pared celular).\n• Describir la organización pluricelular: célula → tejido → órgano → sistema → organismo.\n• Reconocer los principales sistemas del cuerpo humano (digestivo, respiratorio, circulatorio, excretor, nervioso, locomotor y endocrino) y sus funciones fundamentales.\n• Comprender los cambios físicos, fisiológicos y emocionales durante la pubertad y la adolescencia.\n• Describir de manera científica y respetuosa los aparatos reproductores masculino y femenino, el proceso de fecundación, el desarrollo embrionario y el nacimiento.\n• Valorar la biodiversidad en los niveles genético, de especies y de ecosistemas, con énfasis en la megadiversidad del Perú.\n• Identificar las principales amenazas a la biodiversidad peruana y proponer acciones para su conservación.\n\n📌 NOCIONES PRINCIPALES:\n• Célula, organelo, membrana, citoplasma, núcleo, ADN.\n• Célula procariota (bacteria), célula eucariota (animal y vegetal).\n• Niveles de organización biológica.\n• Sistemas del cuerpo humano: digestivo, respiratorio, circulatorio, excretor, nervioso, locomotor (óseo-muscular), endocrino.\n• Pubertad, caracteres sexuales primarios y secundarios.\n• Aparato reproductor: masculino (testículos, conductos deferentes, pene) y femenino (ovarios, trompas de Falopio, útero, vagina).\n• Fecundación, cigoto, embrión, feto, gestación, parto.\n• Biodiversidad: genética, de especies, de ecosistemas.\n• Perú megadiverso: razones de su alta biodiversidad. Especies endémicas. Amenazas y conservación.\n\n📌 NOCIONES SECUNDARIAS:\n• Metabolismo celular básico: respiración celular (mitocondria) y fotosíntesis (cloroplasto).\n• División celular: mitosis (crecimiento y reparación) y meiosis (formación de gametos).\n• Ciclo menstrual.\n• Métodos anticonceptivos y prevención de ITS (nociones básicas adaptadas a la edad, con enfoque en salud y valores).\n• Áreas Naturales Protegidas del Perú (ANP): Parques Nacionales, Reservas Nacionales, Santuarios.\n• Convenios internacionales sobre biodiversidad (CBD, CITES).\n\n🌍 INTERESES SOCIETALES:\n• Conocer cómo funciona nuestro cuerpo nos ayuda a tomar decisiones responsables sobre nuestra salud y alimentación.\n• La reproducción humana es un proceso natural que debe ser entendido con respeto y responsabilidad, previniendo embarazos adolescentes e infecciones.\n• El Perú es uno de los países más biodiversos del mundo; esta riqueza es fuente de alimentos, medicinas y orgullo nacional, pero está amenazada por actividades humanas.\n• Comprender la biodiversidad y su importancia es el primer paso para actuar como ciudadanos comprometidos con la conservación del planeta.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Exploradores de la vida microscópica, el cuerpo humano y la biodiversidad"\n\n🧩 MATERIALES: Microscopio (si está disponible), láminas preparadas de células animales y vegetales, cebolla, lugol, hisopos, portas y cubreobjetos, plastilina de colores para modelar células, torso humano desmontable, láminas de sistemas, espejos, cinta métrica, cronómetro, alcohol en gel, algodón, fichas de biodiversidad peruana, mapas del Perú con ecorregiones.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "El mundo oculto de las células" – Los estudiantes preparan una muestra de cebolla (epidermis) y la tiñen con lugol para observarla al microscopio. Identifican la pared celular, el citoplasma y el núcleo. También toman una muestra de la parte interna de la mejilla con un hisopo, la tiñen y la observan. Comparan la forma geométrica de la célula vegetal con la forma irregular de la animal. Dibujan ambas y etiquetan las partes visibles.\n\nESTACIÓN 2: "Viaje al interior del cuerpo" – Con el torso humano desmontable, los estudiantes ubican los órganos principales de los sistemas digestivo, respiratorio, circulatorio y excretor. Con un estetoscopio (si se cuenta con uno), escuchan sus latidos cardíacos en reposo y después de saltar 30 veces. Miden su frecuencia respiratoria en reposo y tras el ejercicio. Relacionan la aceleración con la necesidad de oxígeno de los músculos.\n\nESTACIÓN 3: "El museo de la biodiversidad peruana" – Se exponen fichas ilustradas de la biodiversidad peruana: cóndor andino, gallito de las rocas, vicuña, mono choro de cola amarilla, delfín rosado, paiche, orquídeas, puya Raimondi, árbol de la quina, papa nativa (mostrando la diversidad de variedades). Los estudiantes clasifican las fichas según el nivel de biodiversidad: genética (variedades de papa), de especies (animales emblemáticos) y de ecosistemas (selva baja, puna, mar frío). Las ubican en un mapa del Perú.\n\nESTACIÓN 4: "Los cambios en la adolescencia" – Mediante tarjetas anónimas en un buzón, los estudiantes escriben preguntas sobre los cambios que experimentan o han observado en la pubertad (voz, estatura, acné, emociones). La docente las lee en voz alta sin identificar al autor y en plenaria se responden con información científica y respetuosa.\n\n💬 REFLEXIÓN EN PLENARIA: ¿En qué se parecen y en qué se diferencian las células animales y vegetales? ¿Cómo se relacionan los sistemas del cuerpo para que podamos correr? ¿Por qué el Perú es considerado megadiverso? ¿Qué cambios de la pubertad son comunes a todos los seres humanos?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "De la observación a los conceptos científicos"\n\n📊 OBSERVACIÓN GUIADA: COMPARACIÓN DE CÉLULAS\nSe presentan tres dibujos grandes o esquemas: una bacteria (procariota), una célula animal y una célula vegetal. Los estudiantes completan una tabla comparativa:\n\n| Característica | Bacteria | Célula Animal | Célula Vegetal |\n|---|---|---|---|\n| ¿Tiene núcleo definido? | No | Sí | Sí |\n| ¿Tiene membrana celular? | Sí | Sí | Sí |\n| ¿Tiene pared celular? | Sí (de peptidoglucano) | No | Sí (de celulosa) |\n| ¿Tiene mitocondrias? | No | Sí | Sí |\n| ¿Tiene cloroplastos? | No (algunas hacen fotosíntesis con otros pigmentos) | No | Sí |\n| ¿Unicelular o pluricelular? | Unicelular | Pluricelular | Pluricelular |\n\nConclusión guiada: "Todas las células comparten tres elementos: membrana, citoplasma y material genético (ADN). Las células eucariotas tienen núcleo definido y organelos membranosos; las procariotas, no. La célula vegetal se distingue por tener pared celular y cloroplastos".\n\n📊 OBSERVACIÓN GUIADA: SISTEMAS QUE COOPERAN\nSe propone la actividad de "correr 100 metros". Los estudiantes deben identificar qué sistemas corporales intervienen y cómo se interrelacionan:\n\n| Acción | Sistema(s) involucrado(s) | Función |\n|---|---|---|\n| Ver la pista y escuchar la señal de salida | Nervioso (sentidos) | Recibe estímulos y envía órdenes |\n| Mover las piernas | Locomotor (músculos y huesos) | Ejecuta el movimiento |\n| Aumentar el ritmo cardíaco y respiratorio | Circulatorio y Respiratorio | Lleva oxígeno y nutrientes a los músculos |\n| Producir energía en las células | Digestivo (nutrientes) + Respiratorio (O₂) | Las mitocondrias realizan la respiración celular |\n| Sudar para regular la temperatura | Excretor (piel) | Elimina agua y sales, enfría el cuerpo |\n\nConclusión: "Los sistemas del cuerpo no funcionan de manera aislada; trabajan en conjunto para mantener la homeostasis (equilibrio interno). Ningún sistema es más importante que otro".\n\n📊 OBSERVACIÓN GUIADA: BIODIVERSIDAD EN CIFRAS\nSe presenta una tabla con datos de biodiversidad de varios países. Los estudiantes comparan y sacan conclusiones:\n\n| País | Aves | Mamíferos | Plantas con flor |\n|---|---|---|---|\n| Perú | 1,879 | 559 | ~25,000 |\n| Brasil | 1,919 | 701 | ~56,000 |\n| Colombia | 2,034 | 543 | ~30,500 |\n| Ecuador | 1,622 | 420 | ~17,000 |\n\nObservan que Perú, a pesar de no ser el más extenso, figura entre los cinco países con mayor biodiversidad del mundo. ¿Por qué? Porque en su territorio confluyen los Andes, la Amazonía, el mar frío de Humboldt y diversos climas.\nConclusión: "La megadiversidad peruana es producto de su ubicación geográfica, su variedad de altitudes y climas, y su historia evolutiva".\n\n📝 REGISTRO: Cada estudiante dibuja en su cuaderno un esquema de la célula animal y vegetal con sus organelos principales, y un mapa conceptual de la relación entre los sistemas del cuerpo humano durante el ejercicio físico.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: La Célula, los Sistemas del Cuerpo Humano, la Reproducción Humana y la Biodiversidad\n\n🔬 1. LA CÉLULA: UNIDAD BÁSICA DE LA VIDA\n\nLa célula es la unidad estructural y funcional más pequeña de los seres vivos. Todos los organismos están formados por una (unicelulares, como bacterias y protozoos) o muchas células (pluricelulares, como animales y plantas).\n\n📏 TIPOS DE CÉLULAS:\n\n🔹 CÉLULA PROCARIOTA:\n• Sin núcleo definido (el ADN está disperso en el citoplasma).\n• Sin organelos membranosos (mitocondrias, cloroplastos, retículo endoplasmático, etc.).\n• Pertenecen al Reino Monera: bacterias y cianobacterias.\n• Generalmente son las células más pequeñas y simples.\n\n🔹 CÉLULA EUCARIOTA:\n• Poseen núcleo definido (el ADN está encerrado en una membrana nuclear).\n• Tienen organelos membranosos que realizan funciones específicas.\n• Pertenecen a los Reinos Protista, Fungi, Vegetal y Animal.\n\n📏 CÉLULA ANIMAL vs. CÉLULA VEGETAL:\n| Organelo / Estructura | Célula Animal | Célula Vegetal | Función |\n|---|---|---|---|\n| Membrana celular | Sí | Sí | Controla la entrada y salida de sustancias |\n| Citoplasma | Sí | Sí | Medio donde ocurren reacciones químicas |\n| Núcleo | Sí | Sí | Contiene el ADN, controla la célula |\n| Mitocondrias | Sí | Sí | Realizan la respiración celular (producen energía: ATP) |\n| Cloroplastos | No | Sí | Realizan la fotosíntesis (convierten luz solar en alimento) |\n| Pared celular | No | Sí (de celulosa) | Da soporte y protección rígida |\n| Vacuolas | Pequeñas o ausentes | Grandes (vacuola central) | Almacenan agua y nutrientes |\n| Centriolos | Sí | No (excepto en musgos y helechos) | Participan en la división celular |\n\n📏 ORGANELOS PRINCIPALES Y SUS FUNCIONES:\n• Membrana celular: "La aduana" de la célula. Permeabilidad selectiva.\n• Núcleo: "El centro de control". Contiene el ADN (material genético).\n• Mitocondrias: "Las centrales energéticas". Realizan la respiración celular: Glucosa + O₂ → CO₂ + H₂O + Energía (ATP).\n• Cloroplastos (solo en vegetales y algas): "Las cocinas solares". Realizan la fotosíntesis: CO₂ + H₂O + Luz solar → Glucosa + O₂.\n• Ribosomas: Fabrican proteínas.\n• Retículo endoplasmático (liso y rugoso): Síntesis y transporte de proteínas y lípidos.\n• Aparato de Golgi: "El centro de empaque": modifica, empaca y distribuye proteínas.\n• Lisosomas: "El sistema de limpieza": contienen enzimas digestivas.\n\n📏 DIVISIÓN CELULAR:\n• MITOSIS: Una célula madre (diploide) origina dos células hijas idénticas (diploides). Sirve para el crecimiento, la reparación de tejidos y la reproducción asexual.\n• MEIOSIS: Una célula madre (diploide) origina cuatro células hijas con la mitad de cromosomas (haploides). Ocurre en los órganos reproductores y produce los gametos (óvulos y espermatozoides).\n\n🧍 2. LOS SISTEMAS DEL CUERPO HUMANO\n\nEl cuerpo humano está organizado en niveles: Célula → Tejido → Órgano → Sistema → Organismo.\n\n📏 SISTEMA DIGESTIVO:\nÓrganos: Boca (dientes, lengua, saliva), faringe, esófago, estómago, intestino delgado, intestino grueso, recto, ano. Glándulas anexas: saliva, hígado (bilis), páncreas.\nFunción: Transforma los alimentos en nutrientes (digestión mecánica y química), los absorbe y elimina los desechos no digeridos.\n\n📏 SISTEMA RESPIRATORIO:\nÓrganos: Fosas nasales, faringe, laringe, tráquea, bronquios, pulmones (bronquiolos, alvéolos).\nFunción: Intercambio de gases: toma O₂ del aire (inspiración) y elimina CO₂ (espiración). El O₂ pasa a la sangre en los alvéolos pulmonares.\n\n📏 SISTEMA CIRCULATORIO:\nÓrganos: Corazón (4 cavidades: 2 aurículas, 2 ventrículos), vasos sanguíneos (arterias, venas, capilares), sangre.\nFunción: Transporta oxígeno, nutrientes, hormonas y desechos por todo el cuerpo. La sangre circula en dos circuitos: pulmonar (corazón-pulmones) y sistémico (corazón-cuerpo).\n\n📏 SISTEMA EXCRETOR (URINARIO):\nÓrganos: Riñones, uréteres, vejiga urinaria, uretra.\nFunción: Filtra la sangre, elimina desechos nitrogenados (urea), regula el agua y las sales del cuerpo, produciendo la orina.\n\n📏 SISTEMA NERVIOSO:\nÓrganos: Encéfalo (cerebro, cerebelo, bulbo raquídeo), médula espinal, nervios.\nFunción: Recibe estímulos del entorno (sentidos), los procesa, elabora respuestas y coordina todas las funciones del cuerpo. El cerebro es el centro del pensamiento, la memoria y las emociones.\n\n📏 SISTEMA LOCOMOTOR (ÓSEO-MUSCULAR):\nÓrganos: Huesos (206 en el adulto), articulaciones, ligamentos, músculos, tendones.\nFunción: Sostén del cuerpo, protección de órganos internos (cráneo, costillas), movimiento voluntario e involuntario. El esqueleto también produce células sanguíneas (médula ósea).\n\n📏 SISTEMA ENDOCRINO:\nGlándulas: Hipófisis, tiroides, páncreas, suprarrenales, ovarios/testículos.\nFunción: Produce hormonas que regulan el crecimiento, el metabolismo, la reproducción y el estado de ánimo.\n\n🫀 3. REPRODUCCIÓN HUMANA\n\nLa reproducción humana es sexual: requiere la unión de un gameto masculino (espermatozoide) y uno femenino (óvulo) para formar un nuevo ser genéticamente único.\n\n📏 CAMBIOS EN LA PUBERTAD:\nLa pubertad es el período de transición entre la niñez y la adultez, gobernado por las hormonas (testosterona en varones, estrógenos y progesterona en mujeres). Comienza entre los 9 y 13 años en niñas, y entre los 10 y 14 años en niños.\n\nCambios en mujeres: Crecimiento de mamas, ensanchamiento de caderas, aparición de vello púbico y axilar, primera menstruación (menarquia).\n\nCambios en varones: Cambio de voz (se vuelve más grave), desarrollo muscular, aparición de vello facial, púbico y axilar, crecimiento del pene y testículos, primeras eyaculaciones.\n\nCambios comunes: Crecimiento rápido (estirón), acné por mayor producción de sebo, desarrollo de caracteres sexuales secundarios, cambios emocionales.\n\n📏 APARATO REPRODUCTOR MASCULINO:\n• Testículos: Producen espermatozoides (en los túbulos seminíferos) y testosterona.\n• Epidídimo: Almacena los espermatozoides.\n• Conductos deferentes: Transportan los espermatozoides.\n• Vesículas seminales y próstata: Producen el semen (líquido que nutre y transporta los espermatozoides).\n• Pene: Órgano copulador. La uretra conduce el semen y también la orina.\n\n📏 APARATO REPRODUCTOR FEMENINO:\n• Ovarios: Producen óvulos (uno por cada ciclo menstrual, aprox. cada 28 días) y hormonas (estrógenos, progesterona).\n• Trompas de Falopio (oviductos): Conducen el óvulo hacia el útero. Lugar donde ocurre la fecundación si hay espermatozoides.\n• Útero (matriz): Cavidad muscular donde se implanta y desarrolla el embrión/feto durante el embarazo.\n• Vagina: Conducto que comunica el útero con el exterior, recibe el pene durante la relación sexual y forma parte del canal del parto.\n\n📏 FECUNDACIÓN, EMBARAZO Y PARTO:\n1. Un espermatozoide penetra un óvulo en la trompa de Falopio → se forma el CIGOTO (primera célula del nuevo ser, con 46 cromosomas: 23 de cada progenitor).\n2. El cigoto se divide por mitosis y forma el embrión mientras viaja al útero.\n3. El embrión se implanta en el endometrio (capa interna del útero) y comienza a desarrollarse.\n4. Se forma la placenta (intercambio de nutrientes, oxígeno y desechos entre la madre y el feto sin mezclar sangres) y el cordón umbilical.\n5. A partir del tercer mes, el embrión pasa a llamarse FETO. La gestación humana dura aproximadamente 40 semanas (9 meses).\n6. El parto: Contracciones uterinas dilatan el cuello del útero, el bebé sale por la vagina (parto vaginal) o, en algunos casos, se realiza una cesárea.\n\n📏 SALUD REPRODUCTIVA:\n• Ciclo menstrual: preparación mensual del útero para un posible embarazo. Si no hay fecundación, el endometrio se desprende: menstruación.\n• Higiene íntima adecuada.\n• Prevención de infecciones de transmisión sexual (ITS).\n• Planificación familiar y métodos anticonceptivos (concepto general, se profundiza en secundaria).\n\n🌎 4. BIODIVERSIDAD\n\nLa biodiversidad o diversidad biológica es la variedad de vida en la Tierra. Se estudia en tres niveles:\n\n📏 NIVELES DE BIODIVERSIDAD:\n• DIVERSIDAD GENÉTICA: Variedad de genes dentro de una misma especie. Ej: hay miles de variedades de papa en los Andes peruanos, cada una con genes ligeramente distintos que les confieren resistencia a diferentes plagas o climas.\n• DIVERSIDAD DE ESPECIES: Variedad de especies en un área determinada. Ej: en el Parque Nacional del Manu se han registrado más de 1000 especies de aves.\n• DIVERSIDAD DE ECOSISTEMAS: Variedad de hábitats, comunidades y procesos ecológicos. Ej: en el Perú tenemos mar frío, desierto costero, bosque seco ecuatorial, puna, selva alta, selva baja, manglares, humedales.\n\n📏 ¿POR QUÉ EL PERÚ ES UN PAÍS MEGADIVERSO?\n1. Ubicación geográfica: Zona tropical, cerca de la línea ecuatorial, donde la energía solar es abundante.\n2. La Cordillera de los Andes: Crea una enorme variedad de altitudes (0 m en la costa hasta 6,768 m en el Huascarán) y, por tanto, de climas y microclimas.\n3. La Corriente de Humboldt: Enfría el mar peruano y genera afloramiento de nutrientes, haciendo del mar peruano uno de los más productivos del mundo.\n4. La Cuenca Amazónica: Alberga la mayor extensión de bosque tropical del Perú, con una riqueza biológica excepcional.\n5. Confluencia de corrientes marinas: La Corriente del Niño (cálida) y la de Humboldt (fría) crean condiciones únicas en el norte.\n\n📏 ESPECIES ENDÉMICAS DEL PERÚ (solo existen aquí):\n• Gallito de las rocas (Rupicola peruvianus): Ave nacional.\n• Mono choro de cola amarilla (Lagothrix flavicauda): Endémico de los bosques nublados de Amazonas y San Martín.\n• Pava aliblanca (Penelope albipennis): Redescubierta en 1977 en Lambayeque.\n• Cortarrama peruana (Phytotoma raimondii): Ave de los bosques secos del norte.\n• Varias especies de orquídeas, cactus y anfibios solo existen en el Perú.\n\n📏 AMENAZAS A LA BIODIVERSIDAD PERUANA:\n• Deforestación: Tala ilegal y agricultura migratoria en la Amazonía.\n• Minería ilegal: Destruye suelos, contamina ríos con mercurio.\n• Contaminación: Residuos urbanos, relaves mineros, derrames de petróleo.\n• Sobreexplotación: Pesca excesiva, caza furtiva, tráfico ilegal de especies.\n• Cambio climático: Aumenta las temperaturas, altera los ciclos de lluvia, derrite los glaciares andinos.\n• Especies invasoras: Introducidas por el ser humano, compiten con las nativas.\n\n📏 CONSERVACIÓN:\n• Áreas Naturales Protegidas (ANP): El SINANPE (Sistema Nacional de Áreas Naturales Protegidas por el Estado) protege más de 75 áreas, cubriendo cerca del 18% del territorio peruano.\n• Ejemplos: Parque Nacional del Manu (Madre de Dios/Cusco), Reserva Nacional de Paracas (Ica), Santuario Nacional Los Manglares de Tumbes, Parque Nacional Huascarán (Áncash).\n• Acciones individuales: No comprar animales silvestres, no arrojar basura al ambiente, sembrar plantas nativas, ahorrar agua y energía.\n\n⚠️ ERRORES COMUNES:\n• Creer que todas las células tienen núcleo (las bacterias no).\n• Decir que las plantas respiran solo de día (respiran día y noche; la fotosíntesis sí requiere luz).\n• Confundir el sistema digestivo con el excretor.\n• Asociar la reproducción humana solo con el acto sexual; es un proceso biológico mucho más amplio que incluye fecundación, desarrollo y nacimiento.\n• Pensar que solo la selva tiene biodiversidad (la costa y la sierra también, aunque en menor magnitud).`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de aplicación\n\n📝 BLOQUE 1: La Célula\n1. Relaciona con flechas:\nMembrana celular → (Controla entrada y salida de sustancias).\nNúcleo → (Contiene el ADN).\nMitocondria → (Respiración celular, produce energía).\nCloroplasto → (Fotosíntesis, solo en células vegetales).\nPared celular → (Soporte rígido, solo en vegetales).\n\n2. Completa la tabla:\n| Propiedad | Célula Animal | Célula Vegetal | Procariota |\n|---|---|---|---|\n| Núcleo definido | Sí | Sí | No |\n| Pared celular | No | Sí (celulosa) | Sí (peptidoglucano) |\n| Cloroplastos | No | Sí | No (algunas cianobacterias tienen pigmentos) |\n\n3. Dibuja una célula animal y una vegetal, etiqueta 4 organelos en cada una.\n\n📝 BLOQUE 2: Sistemas del Cuerpo Humano\n4. Indica qué sistema principal interviene en cada acción:\na) Respirar aire → (Sistema respiratorio).\nb) Digerir un pan con queso → (Sistema digestivo).\nc) Levantar una mochila → (Sistema locomotor, muscular y óseo).\nd) Bombear sangre → (Sistema circulatorio).\ne) Producir orina → (Sistema excretor/urinario).\nf) Sentir sed → (Sistema nervioso).\ng) Crecer durante la pubertad → (Sistema endocrino).\n\n5. Explica con tus palabras: ¿Cómo se relacionan el sistema respiratorio y el circulatorio? (El sistema respiratorio toma O₂ del aire y lo pasa a la sangre en los alvéolos; el sistema circulatorio transporta ese O₂ a todas las células del cuerpo y recoge el CO₂ para llevarlo de vuelta a los pulmones).\n\n📝 BLOQUE 3: Reproducción Humana\n6. Verdadero o Falso (corrige si es falso):\na) La fecundación ocurre generalmente en las trompas de Falopio. (V)\nb) El cigoto contiene 23 cromosomas. (Falso, contiene 46: 23 del padre y 23 de la madre).\nc) La gestación humana dura 9 semanas. (Falso, dura aproximadamente 40 semanas; 9 meses).\nd) Los testículos producen espermatozoides y testosterona. (V)\ne) El ciclo menstrual ocurre cada 28 días aproximadamente y prepara el útero para un posible embarazo. (V)\n\n7. Menciona tres cambios que ocurren durante la pubertad en varones y tres en mujeres.\n\n8. ¿Por qué es importante hablar de reproducción humana con respeto y basarse en información científica? (Para tomar decisiones responsables sobre nuestra salud, evitar embarazos no deseados y prevenir ITS; el respeto es fundamental porque se trata de un tema personal y delicado).\n\n📝 BLOQUE 4: Biodiversidad\n9. Define los tres niveles de biodiversidad y da un ejemplo peruano de cada uno.\n\n10. ¿Por qué el Perú es considerado uno de los 17 países megadiversos del mundo? Menciona al menos tres razones.\n\n11. Escribe el nombre de tres especies endémicas del Perú y tres Áreas Naturales Protegidas.\n\n12. Menciona dos amenazas a la biodiversidad peruana y una acción que podrías realizar para ayudar a conservarla.\n\n📝 BLOQUE 5: Problemas integrados\n13. Imagina que eres un glóbulo rojo viajando por el cuerpo. Describe tu viaje desde que sales del corazón, vas a un músculo de la pierna, entregas oxígeno, recoges CO₂, vuelves al corazón y de ahí a los pulmones. (Debe mencionar las cavidades correctas del corazón y los circuitos pulmonar y sistémico).\n\n14. Si en un área protegida viven 50 cóndores y cada uno necesita 2 km² para alimentarse, ¿cuántos km² de hábitat necesitan en total? (100 km²). Si la deforestación reduce el hábitat a 80 km², ¿qué puede ocurrir? (Competencia, estrés, posible disminución de la población).\n\n⏱️ Tiempo estimado: 90-120 min. ✅ Revisión guiada y puesta en común.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Materia y Energía, Tierra y Universo y Matemática\n\n🔬 CONEXIÓN CON MATERIA Y ENERGÍA:\n• La fotosíntesis (cloroplastos) y la respiración celular (mitocondrias) son procesos químicos donde la materia se transforma y la energía cambia de forma.\n• Los elementos de la tabla periódica (C, H, O, N, P, S) forman las biomoléculas: carbohidratos, lípidos, proteínas y ácidos nucleicos.\n• Las reacciones químicas que ocurren en la digestión son catalizadas por enzimas.\n• La electricidad del sistema nervioso es una señal electroquímica (impulso nervioso).\n\n🌍 CONEXIÓN CON TIERRA Y UNIVERSO:\n• Los ecosistemas donde viven las especies de nuestra biodiversidad están determinados por el clima, el relieve y la geología (placas tectónicas que forman los Andes).\n• La contaminación ambiental (Tierra y Universo, Ciclo V) impacta directamente la biodiversidad: el derretimiento de glaciares por el cambio climático afecta a los ecosistemas de puna.\n• La Corriente de Humboldt (Tierra y Universo) es responsable de la riqueza del mar peruano (biodiversidad marina).\n\n🧮 CONEXIÓN CON MATEMÁTICA:\n• Cálculo de la duración de la gestación (40 semanas = 280 días) y del ciclo menstrual (28 días en promedio).\n• Índices de biodiversidad: comparar número de especies en diferentes áreas mediante proporciones y gráficos de barras.\n• Porcentaje del territorio peruano protegido por ANP (aproximadamente 18%).\n• Construcción de tablas y gráficos comparativos de biodiversidad entre países.\n\n🧩 ACTIVIDAD INTEGRADORA: "La feria de la célula gigante": Construir una célula animal o vegetal tridimensional con materiales reciclados (plastilina, tecnopor, gelatina como citoplasma) donde cada organelo esté etiquetado con su nombre y función.\n\n💡 REFLEXIÓN: Entender la célula es entendernos a nosotros mismos. Somos una comunidad de billones de células trabajando en armonía. Y somos parte de una comunidad planetaria de millones de especies que compartimos este único hogar.`,
            6: `🌍 CORRELACIONES EXTERNAS: La célula, la reproducción y la biodiversidad en la vida real\n\n🏥 MEDICINA Y SALUD:\n• Las vacunas entrenan a nuestro sistema inmunológico (células especializadas) para defendernos de virus y bacterias.\n• El cáncer ocurre cuando las células pierden el control de su división (mitosis descontrolada).\n• La ecografía (ultrasonido) permite ver al feto sin dañarlo, usando ondas sonoras.\n• Entender la pubertad y el ciclo menstrual ayuda a identificar señales de alerta y a buscar ayuda médica si es necesario.\n\n🌾 AGRICULTURA Y ALIMENTACIÓN:\n• Toda la comida que llega a nuestra mesa proviene de células vegetales o animales.\n• La conservación de semillas nativas (papas, quinuas, maíces) preserva la diversidad genética, clave para la seguridad alimentaria futura.\n• El Perú es centro de origen y domesticación de cultivos mundialmente importantes (papa, tomate, ají, frijol).\n\n💊 FARMACOLOGÍA:\n• Muchos medicamentos tienen su origen en moléculas descubiertas en plantas y animales de la biodiversidad peruana. Ej: la quinina (del árbol de la quina) contra la malaria.\n• La aspirina se derivó inicialmente de la corteza del sauce.\n\n🎨 CULTURA E IDENTIDAD:\n• El gallito de las rocas es el ave nacional del Perú; la vicuña aparece en el escudo patrio.\n• Las culturas preincas e incas representaban células vegetales y animales en su arte textil y cerámico, aunque no las conocieran con ese nombre, valoraban profundamente la biodiversidad.\n• El Día de la Diversidad Biológica se celebra cada 22 de mayo.\n\n🧠 REFLEXIÓN FINAL: "Cada célula de tu cuerpo es el resultado de 3,800 millones de años de evolución. Eres parte de una historia que comenzó en los océanos primitivos y que hoy se despliega en los bosques, mares y montañas del Perú. Conocer tu cuerpo y la biodiversidad de tu país es el primer paso para cuidarte y cuidar tu entorno."\n\n🗣️ CITA: "En la naturaleza nada existe solo. Todo está conectado." — Rachel Carson.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Expedición Virtual por la Biodiversidad y el Cuerpo Humano"\n\n🎯 OBJETIVO: Los equipos crearán un "museo virtual" o una feria presencial con stands dedicados a la célula, un sistema del cuerpo humano, la reproducción humana y un ecosistema peruano, integrando los conocimientos de las tres grandes unidades de la lección y difundiendo su importancia a la comunidad educativa.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: FORMACIÓN DE EQUIPOS Y ASIGNACIÓN (1 sesión)\n• 5 equipos. Cada equipo elige dos temas para combinar en su stand:\n  - Equipo A: "Célula Animal + Sistema Nervioso".\n  - Equipo B: "Célula Vegetal + Sistema Digestivo".\n  - Equipo C: "Reproducción Humana + Sistema Endocrino".\n  - Equipo D: "Biodiversidad de la Costa + Sistema Respiratorio".\n  - Equipo E: "Biodiversidad de la Selva + Sistema Circulatorio".\n\nFASE 2: INVESTIGACIÓN Y CREACIÓN DE CONTENIDOS (2 sesiones)\n• Investigan en libros e internet (guiado).\n• Elaboran un guion para su stand.\n• Construyen modelos 3D (célula con plastilina/tecnopor, sistema con cartón, etc.).\n• Preparan un tríptico o afiche informativo con los conceptos clave y curiosidades.\n• Diseñan un juego o actividad interactiva para los visitantes:\n  - "Arma la célula" (rompecabezas de organelos).\n  - "Ruta de los alimentos" (recorrido por el sistema digestivo).\n  - "Preguntas y respuestas sobre pubertad" (juego de memoria).\n  - "¿Cuánto sabes de biodiversidad peruana?" (ruleta de preguntas).\n\nFASE 3: MONTAJE DE LA FERIA O MUSEO (1 sesión)\n• Distribuyen los stands en el aula o patio.\n• Decoran con globos, carteles y modelos.\n\nFASE 4: FERIA "LA VIDA EN TODAS SUS FORMAS" (1 sesión)\n• Se invita a padres, otros salones y docentes.\n• Los equipos explican sus stands por turnos, responden preguntas y guían las actividades interactivas.\n• Se entrega una "cartilla de visita" a cada asistente para que selle en cada stand y participe en un sorteo de un "kit científico" (lupa, semillas, etc.).\n\nFASE 5: EVALUACIÓN Y CIERRE (1 sesión)\n• Se evalúa la corrección científica, la creatividad, la claridad de la explicación, el trabajo en equipo y la calidad del material elaborado.\n• Plenaria: ¿Qué fue lo más interesante que aprendieron? ¿Qué fue lo más difícil de explicar? ¿Qué se llevan para su vida diaria?\n\n🏆 EVALUACIÓN: Rúbrica con indicadores de: contenido científico (40%), creatividad y diseño (20%), claridad expositiva (20%), trabajo colaborativo (20%).\n🎉 CIERRE: Entrega de diplomas de "Embajador de la Vida". Foto grupal. El aula se convierte en un mural recordatorio de la diversidad peruana.`,

            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 5° y 6° grado de primaria las competencias científicas relacionadas con la estructura de la materia, la tabla periódica de los elementos básicos, las reacciones químicas simples y los fenómenos de electricidad y magnetismo, fomentando la experimentación segura, el pensamiento lógico y la comprensión de cómo estos principios rigen el mundo tecnológico que nos rodea.\n\n🎯 OBJETIVOS PARTICULARES:\n• Comprender que toda la materia está formada por átomos, constituidos por protones, neutrones y electrones.\n• Reconocer el símbolo químico y algunas propiedades de los primeros 20 elementos de la tabla periódica.\n• Identificar los grupos principales de la tabla periódica: metales, no metales y gases nobles, y sus propiedades generales.\n• Describir qué es una reacción química y diferenciarla de un cambio físico.\n• Identificar reacciones químicas simples en la vida cotidiana: combustión, oxidación, fermentación.\n• Comprender la naturaleza eléctrica de la materia: carga eléctrica, corriente eléctrica, conductores y aislantes.\n• Construir circuitos eléctricos simples en serie y en paralelo, interpretando su funcionamiento.\n• Conocer las propiedades de los imanes, el campo magnético terrestre y la construcción de un electroimán.\n• Relacionar electricidad y magnetismo como dos aspectos del electromagnetismo.\n\n📌 NOCIONES PRINCIPALES:\n• Átomo, protón (+), neutrón (sin carga), electrón (-), número atómico, número másico.\n• Elemento químico, símbolo, tabla periódica (grupos, periodos). Metales, no metales, metaloides, gases nobles.\n• Molécula, enlace químico (nociones básicas: compartición o transferencia de electrones).\n• Cambio físico vs. cambio químico (reacción química). Reactivos, productos.\n• Tipos de reacciones químicas: síntesis, descomposición, combustión, oxidación.\n• Carga eléctrica, corriente eléctrica (amperios), voltaje (voltios), resistencia (ohmios).\n• Circuito eléctrico: fuente (pila/batería), conductores (cables), interruptor, receptor (foco, motor).\n• Circuitos en serie y en paralelo.\n• Imán: polos norte y sur, atracción y repulsión. Campo magnético.\n• Electroimán: relación entre corriente eléctrica y campo magnético.\n\n📌 NOCIONES SECUNDARIAS:\n• Modelo atómico de Bohr (niveles de energía, hasta 2, 8, 8 electrones para los primeros elementos).\n• Valencia y formación de iones (pérdida o ganancia de electrones para completar el octeto).\n• Ley de conservación de la masa (Lavoisier): "en una reacción química, la masa total de los reactivos es igual a la masa total de los productos".\n• Breve historia del descubrimiento de la electricidad (Franklin, Volta, Faraday).\n• Aplicaciones del electromagnetismo: motor eléctrico, dinamo, transformador, timbre eléctrico.\n• Medidas de seguridad al trabajar con electricidad y al manipular sustancias químicas.\n\n🌍 INTERESES SOCIETALES:\n• La tabla periódica es el "alfabeto" de la química. Organiza todos los elementos que conforman el universo, desde el hierro de nuestra sangre hasta el silicio de las computadoras.\n• Las reacciones químicas están presentes en la cocción de los alimentos, la digestión, la obtención de energía (combustibles), la fabricación de plásticos y medicinas.\n• La electricidad es la base de la sociedad moderna: iluminación, telecomunicaciones, electrodomésticos, industria.\n• El magnetismo es esencial en dispositivos de almacenamiento (discos duros), altavoces, motores y generadores.\n• El Perú tiene riqueza mineral (cobre, oro, plata, zinc) que se extrae y procesa mediante reacciones químicas y se transporta usando electricidad.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Laboratorio de Química, Electricidad y Magnetismo"\n\n🧩 MATERIALES: Modelos atómicos de bolas y palitos, plastilina de colores, papel periódico mural de la tabla periódica, fichas de elementos químicos, vinagre, bicarbonato de sodio, globos, botellas pequeñas, limón (o papa), monedas de cobre, clavos de zinc, cables con pinzas caimán, focos LED, pilas AA, interruptores, brújulas, imanes de barra y herradura, limaduras de hierro, alambre de cobre esmaltado, clips metálicos.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Construye tu átomo" – Con plastilina de colores (protones=rojo, neutrones=azul, electrones=amarillo), los estudiantes representan los primeros 10 elementos (H, He, Li, Be, B, C, N, O, F, Ne) sobre un dibujo del modelo de Bohr con niveles de energía. Cuentan el número de protones (número atómico) y colocan los electrones en los niveles correspondientes.\n\nESTACIÓN 2: "Reacciones burbujeantes" – En un vaso con vinagre, agregan una cucharadita de bicarbonato de sodio. Observan la efervescencia. Preguntan: ¿Es un cambio físico o químico? (Químico, porque se forman nuevas sustancias: acetato de sodio, agua y dióxido de carbono). Capturan el CO₂ inflando un globo colocado en la boca del frasco. ¿Por qué se infla el globo? (El gas producido ocupa más volumen).\n\nESTACIÓN 3: "Circuitos de papel" – Con cinta de cobre adhesiva, un LED y una pila de botón, construyen un circuito simple en una cartulina. Dibujan previamente el recorrido de la electricidad. Luego, añaden un interruptor casero (un clip que cierra el circuito al presionarlo). Encienden y apagan el LED. Reflexionan: ¿Qué camino sigue la electricidad? ¿Qué materiales son conductores y cuáles aislantes? (Prueban con goma, papel, aluminio).\n\nESTACIÓN 4: "La fuerza invisible del magnetismo" – Esparcen limaduras de hierro sobre un papel y colocan un imán debajo. Las limaduras se alinean dibujando las líneas del campo magnético. Acercan dos imanes: ¿Qué sucede si enfrentan polos iguales? (se repelen). ¿Y si son diferentes? (se atraen). Luego, construyen un electroimán enrollando alambre de cobre esmaltado alrededor de un clavo grande y conectándolo a una pila. ¿Atrae clips el clavo ahora? (Sí, mientras circule corriente).\n\n💬 REFLEXIÓN EN PLENARIA: ¿Cómo se organizan los electrones en un átomo? ¿Cómo sabemos si ocurrió una reacción química? ¿Qué diferencia hay entre un circuito en serie y uno en paralelo? ¿Qué tienen en común la electricidad y el magnetismo?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Patrones en la tabla periódica y en los circuitos"\n\n📊 OBSERVACIÓN GUIADA: LA TABLA PERIÓDICA\nSe presenta una tabla periódica simplificada con los primeros 20 elementos. Los estudiantes la colorean según categorías: metales (azul), no metales (amarillo), metaloides (verde) y gases nobles (rojo).\n\nObservan las posiciones:\n• Grupo 1 (H, Li, Na, K): todos metales blandos y muy reactivos. Forman iones +1.\n• Grupo 2 (Be, Mg, Ca): metales menos reactivos que el grupo 1. Forman iones +2.\n• Grupo 17 (F, Cl, Br, I): halógenos, no metales muy reactivos. Forman iones -1.\n• Grupo 18 (He, Ne, Ar, Kr): gases nobles, inertes (no reaccionan). Capa de valencia completa (2 o 8 electrones).\n\nPaso 1: Los estudiantes verifican que los elementos de un mismo grupo tienen comportamientos químicos similares.\nPaso 2: Relacionan la reactividad con los electrones de valencia: los elementos buscan completar 8 electrones en su última capa (regla del octeto).\nConclusión guiada: "La tabla periódica está organizada de tal manera que los elementos con propiedades químicas similares quedan en la misma columna (grupo) porque tienen el mismo número de electrones en su capa más externa".\n\n📊 OBSERVACIÓN GUIADA: CIRCUITOS EN SERIE Y PARALELO\nSe construyen dos circuitos con 2 focos LED y una pila:\n\nCircuito en SERIE:\n[+] ——— [LED 1] ——— [LED 2] ——— [-] (un solo camino).\nAl desenroscar un LED, ambos se apagan.\n\nCircuito en PARALELO:\n[+] ─┬── [LED 1] ──┬── [-]\n     └── [LED 2] ──┘\nAl desenroscar un LED, el otro sigue encendido.\n\nConclusión: "En un circuito en serie, todos los elementos comparten la misma corriente; si uno falla, el circuito se abre. En un circuito en paralelo, cada elemento tiene su propio camino; si uno falla, los demás siguen funcionando. Las instalaciones eléctricas de casas y colegios usan circuitos en paralelo".\n\n📊 OBSERVACIÓN GUIADA: ELECTROIMÁN Y MOTOR SIMPLE\nCon la bobina alrededor del clavo y la pila, observan que si desconectan la pila, el clavo deja de ser un imán. Si aumentan las vueltas de alambre, atrae más clips (campo magnético más intenso).\nConclusión: "Una corriente eléctrica genera un campo magnético a su alrededor. Esto se aprovecha en los electroimanes, motores, generadores y timbres".\n\n📝 REGISTRO: Cada estudiante elabora un mapa conceptual que relacione ÁTOMO → TABLA PERIÓDICA → ELEMENTO → REACCIÓN QUÍMICA, y otro que relacione CARGA ELÉCTRICA → CORRIENTE → CIRCUITO → ELECTROIMÁN.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Tabla Periódica, Reacciones Químicas, Electricidad y Magnetismo\n\n⚛️ 1. EL ÁTOMO Y LA TABLA PERIÓDICA\n\nToda la materia está formada por átomos. Un átomo es la unidad más pequeña de un elemento químico que conserva sus propiedades.\n\n📏 PARTÍCULAS SUBATÓMICAS:\n• PROTÓN (p⁺): Carga positiva (+1). Masa ≈ 1 uma. Se encuentra en el núcleo.\n• NEUTRÓN (n⁰): Sin carga (0). Masa ≈ 1 uma. Se encuentra en el núcleo.\n• ELECTRÓN (e⁻): Carga negativa (-1). Masa muy pequeña (≈ 1/1836 uma). Gira alrededor del núcleo en niveles de energía.\n\nUn átomo es eléctricamente neutro porque tiene igual número de protones (+) que de electrones (-).\n\n📏 NÚMERO ATÓMICO (Z): Cantidad de protones en el núcleo. Identifica al elemento.\nNÚMERO MÁSICO (A): Suma de protones + neutrones.\n\n📏 MODELO DE BOHR (simplificado): Los electrones se distribuyen en capas o niveles de energía alrededor del núcleo:\n• Capa 1 (K): máximo 2 electrones.\n• Capa 2 (L): máximo 8 electrones.\n• Capa 3 (M): máximo 8 electrones (para los primeros 20 elementos).\n\nEjemplo: Sodio (Na, Z=11): 2 electrones en capa 1, 8 en capa 2, 1 en capa 3. Ese último electrón (electrón de valencia) es el que participa en las reacciones químicas.\n\n📏 LA TABLA PERIÓDICA:\nEs un ordenamiento de todos los elementos químicos conocidos (118) en filas (períodos) y columnas (grupos) según su número atómico creciente y sus propiedades periódicas.\n\n• PERÍODO: Fila horizontal. El número de período indica cuántas capas de electrones tiene el átomo.\n• GRUPO: Columna vertical. Los elementos de un mismo grupo tienen el mismo número de electrones de valencia y, por tanto, propiedades químicas similares.\n\n📏 PRINCIPALES GRUPOS (FAMILIAS):\n• Grupo 1 (IA): Metales alcalinos (Li, Na, K...). Muy reactivos. Blandos. 1 electrón de valencia. Forman iones +1.\n• Grupo 2 (IIA): Metales alcalinotérreos (Be, Mg, Ca...). Reactivos. 2 electrones de valencia. Forman iones +2.\n• Grupo 17 (VIIA): Halógenos (F, Cl, Br, I). No metales muy reactivos. 7 electrones de valencia. Forman iones -1.\n• Grupo 18 (VIIIA): Gases nobles (He, Ne, Ar, Kr). Inertes (no reaccionan). Tienen 8 electrones de valencia (excepto He, que tiene 2), configuración estable.\n\n📏 METALES, NO METALES Y METALOIDES:\n• Metales: Buenos conductores de calor y electricidad, brillo metálico, maleables, dúctiles. Se ubican a la izquierda y centro de la tabla (Fe, Cu, Au, Ag, Al, Na, etc.).\n• No metales: Malos conductores, quebradizos, variados estados (O₂ gas, C sólido como grafito/diamante, Br líquido). A la derecha (O, N, C, S, Cl).\n• Metaloides: Propiedades intermedias (Si, Ge, As).\n\n🧪 2. REACCIONES QUÍMICAS\n\nUn cambio físico NO altera la naturaleza de la sustancia (ej: romper un papel, derretir hielo).\nUn cambio químico o REACCIÓN QUÍMICA SÍ altera la naturaleza de las sustancias: los enlaces entre átomos se rompen y se forman nuevos enlaces, dando lugar a nuevas sustancias (productos) diferentes a las iniciales (reactivos).\n\n📏 EVIDENCIAS DE UNA REACCIÓN QUÍMICA:\n• Cambio de color (ej: clavo de hierro se oxida y se vuelve marrón).\n• Desprendimiento de gas (burbujas, efervescencia).\n• Formación de un precipitado (sólido que se deposita en el fondo).\n• Cambio de temperatura (reacción exotérmica: libera calor; reacción endotérmica: absorbe calor, se enfría).\n• Emisión de luz (combustión).\n\n📏 TIPOS DE REACCIONES SIMPLES:\n• SÍNTESIS (combinación): A + B → AB. Ej: 2H₂ + O₂ → 2H₂O.\n• DESCOMPOSICIÓN: AB → A + B. Ej: 2H₂O → (electrólisis) 2H₂ + O₂.\n• COMBUSTIÓN: Sustancia (combustible) + O₂ → CO₂ + H₂O + energía (calor y luz). Ej: CH₄ + 2O₂ → CO₂ + 2H₂O (quema de gas natural).\n• OXIDACIÓN: Sustancia (generalmente un metal) + O₂ → óxido. Ej: 4Fe + 3O₂ → 2Fe₂O₃ (herrumbre).\n\n📏 LEY DE CONSERVACIÓN DE LA MASA (Lavoisier): En una reacción química, la masa total de los reactivos es igual a la masa total de los productos. "Nada se crea, nada se destruye, todo se transforma". Esto implica que las ecuaciones químicas deben estar balanceadas (mismo número de átomos de cada tipo a ambos lados).\n\n⚡ 3. ELECTRICIDAD\n\n📏 CARGA ELÉCTRICA:\nPropiedad de la materia. Puede ser positiva (+) o negativa (-). Cargas del mismo signo se repelen; cargas de signo opuesto se atraen.\n• Frotamiento: Al frotar un globo con el cabello, el globo gana electrones (carga negativa) y atrae pequeños papeles.\n\n📏 CORRIENTE ELÉCTRICA (I):\nFlujo ordenado de electrones a través de un material conductor. Se mide en amperios (A).\nPara que haya corriente se necesita: una fuente de voltaje (pila), un camino cerrado (circuito) y una carga (foco, motor).\n\n📏 VOLTAJE (V): Diferencia de potencial eléctrico que impulsa a los electrones. Es la "presión eléctrica". Se mide en voltios (V). Una pila AA proporciona 1.5 V.\n\n📏 RESISTENCIA (R): Oposición al paso de la corriente. Depende del material, longitud y grosor del conductor. Se mide en ohmios (Ω).\n\n📏 LEY DE OHM: V = I × R. (El voltaje es igual a la corriente multiplicada por la resistencia).\n\n📏 CONDUCTORES Y AISLANTES:\n• Conductores: Permiten el paso de la corriente (metales: cobre, aluminio, plata, oro; grafito; agua con sales).\n• Aislantes: No permiten el paso de la corriente (plástico, vidrio, madera seca, goma, cerámica).\n\n📏 CIRCUITO ELÉCTRICO:\nConjunto de elementos conectados para que circule la corriente. Componentes básicos:\n• Fuente (pila, batería, enchufe).\n• Conductores (cables).\n• Interruptor (abre/cierra el circuito).\n• Receptor (foco, motor, timbre).\n\n📏 CIRCUITO EN SERIE: La corriente circula por un único camino. Los receptores comparten el voltaje. Si un receptor falla, se interrumpe todo el circuito.\n\n📏 CIRCUITO EN PARALELO: La corriente se divide por varios caminos. Cada receptor tiene el mismo voltaje de la fuente. Si un receptor falla, los demás siguen funcionando.\n\n🧲 4. MAGNETISMO\n\n📏 IMÁN: Cuerpo que atrae objetos de hierro, níquel y cobalto. Tiene dos polos: NORTE (N) y SUR (S).\n• Polos iguales se REPELEN (N-N, S-S).\n• Polos diferentes se ATRAEN (N-S).\n\n📏 CAMPO MAGNÉTICO: Región del espacio donde actúa la fuerza magnética. Se representa con líneas de fuerza que van del polo N al polo S por fuera del imán. La Tierra se comporta como un gigantesco imán cuyo polo sur magnético está cerca del polo norte geográfico (por eso la brújula apunta al norte).\n\n📏 ELECTROIMÁN: Dispositivo que genera un campo magnético cuando circula corriente eléctrica por una bobina (solenoide) enrollada alrededor de un núcleo de hierro.\n• Aplicaciones: timbre eléctrico, relé, grúas magnéticas (para mover chatarra), motores eléctricos.\n\n📏 RELACIÓN ELECTRICIDAD-MAGNETISMO:\n• Una corriente eléctrica genera un campo magnético (Oersted, 1820). → Electroimán.\n• Un campo magnético variable induce una corriente eléctrica en un conductor (Faraday, 1831). → Generador eléctrico, dinamo.\n\n⚠️ ERRORES COMUNES:\n• Creer que el átomo es macizo como una bolita. → Es mayormente espacio vacío con un núcleo diminuto.\n• Pensar que todos los elementos son naturales. → Hay elementos sintéticos (Tecnecio, Plutonio, etc.).\n• Decir que en una combustión "la materia se quema y desaparece". → Se transforma en CO₂ y H₂O, que son gases invisibles.\n• En electricidad, conectar el foco directamente a los dos polos de la pila sin resistencia puede quemar el foco o sobrecalentar el cable (cortocircuito).\n• Creer que un imán atrae cualquier metal. → Solo atrae hierro, níquel, cobalto y sus aleaciones. No atrae cobre, aluminio, plata u oro.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de aplicación\n\n📝 BLOQUE 1: Tabla Periódica\n1. Completa la tabla:\n| Elemento | Símbolo | Z | Electrones K | L | M | Grupo | ¿Metal o No Metal? |\n|---|---|---|---|---|---|---|---|\n| Hidrógeno | H | 1 | 1 | - | - | I (IA) | No metal |\n| Carbono | C | 6 | 2 | 4 | - | IV (IVA) | No metal |\n| Sodio | Na | 11 | 2 | 8 | 1 | I (IA) | Metal |\n| Aluminio | Al | 13 | 2 | 8 | 3 | III (IIIA) | Metal |\n| Cloro | Cl | 17 | 2 | 8 | 7 | VII (VIIA) | No metal |\n| Argón | Ar | 18 | 2 | 8 | 8 | VIII (VIIIA) | Gas noble (No metal) |\n\n2. ¿Qué tienen en común los elementos del grupo 18 (gases nobles)? (Capa de valencia completa, 8 electrones excepto He que tiene 2. Son inertes).\n\n3. ¿Por qué el sodio (Na) y el potasio (K) están en el mismo grupo? (Ambos tienen 1 electrón de valencia, son metales alcalinos, blandos y muy reactivos).\n\n📝 BLOQUE 2: Reacciones Químicas\n4. Indica si es cambio físico (F) o químico (Q):\na) Derretir mantequilla (F).\nb) Quemar una vela (Q).\nc) Disolver azúcar en agua (F).\nd) Oxidación de un clavo (Q).\ne) Cortar una manzana y que se oscurezca (Q).\n\n5. Escribe la reacción de combustión del metano (CH₄): CH₄ + 2O₂ → CO₂ + 2H₂O. Cuenta los átomos a ambos lados y verifica que esté balanceada.\n\n6. Al mezclar vinagre (ácido acético) y bicarbonato de sodio, se produce acetato de sodio + agua + dióxido de carbono. ¿Qué gas infla el globo? (El dióxido de carbono, CO₂).\n\n📝 BLOQUE 3: Electricidad\n7. Dibuja un circuito en serie con una pila, un interruptor y dos focos. ¿Qué sucede si abro el interruptor? ¿Y si desenrosco un foco?\n\n8. Dibuja un circuito en paralelo con los mismos componentes. ¿Qué sucede si desenrosco un foco? (El otro sigue encendido).\n\n9. ¿Por qué los cables eléctricos están recubiertos de plástico? (El plástico es aislante y evita que nos electrocutemos al tocar el cable. Además, previene cortocircuitos).\n\n10. Si tenemos una pila de 9V y un foco con resistencia de 3Ω, ¿qué corriente circula? (I = V/R = 9/3 = 3 A).\n\n📝 BLOQUE 4: Magnetismo\n11. ¿Qué sucede si enfrentas el polo norte de un imán con el polo sur de otro? (Se atraen). ¿Y si enfrentas norte con norte? (Se repelen).\n\n12. Explica qué es un electroimán y cómo se construye. (Es un dispositivo que genera magnetismo al pasar corriente por una bobina enrollada alrededor de un núcleo de hierro).\n\n13. ¿Por qué una brújula siempre apunta al norte? (Porque la Tierra actúa como un gran imán con su polo sur magnético cerca del polo norte geográfico, atrayendo el polo norte de la aguja de la brújula).\n\n📝 BLOQUE 5: Problemas integrados\n14. En la electrólisis del agua (H₂O), se separa en hidrógeno (H₂) y oxígeno (O₂). Escribe y balancea la ecuación: 2H₂O → 2H₂ + O₂.\n15. Un motor eléctrico convierte energía ______ en energía ______. (Eléctrica en mecánica). Un generador convierte energía ______ en energía ______. (Mecánica en eléctrica).\n\n⏱️ Tiempo estimado: 80-100 min. ✅ Revisión con experimentos demostrativos si es posible.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Seres Vivos, Tierra y Universo y Matemática\n\n🔬 CONEXIÓN CON SERES VIVOS:\n• Los elementos químicos de la tabla periódica forman las biomoléculas (CHONPS: Carbono, Hidrógeno, Oxígeno, Nitrógeno, Fósforo, Azufre) que constituyen los seres vivos.\n• La respiración celular y la fotosíntesis son reacciones químicas: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + energía (respiración); 6CO₂ + 6H₂O + luz → C₆H₁₂O₆ + 6O₂ (fotosíntesis).\n• El impulso nervioso es una señal electroquímica: intercambio de iones de sodio (Na⁺) y potasio (K⁺) a través de la membrana neuronal.\n\n🌍 CONEXIÓN CON TIERRA Y UNIVERSO:\n• La contaminación ambiental implica reacciones químicas: la lluvia ácida se forma cuando los óxidos de nitrógeno (NOₓ) y dióxido de azufre (SO₂) reaccionan con el agua de la atmósfera.\n• El magnetismo terrestre protege a la Tierra (y a los seres vivos) del viento solar y las partículas cósmicas.\n• La electricidad atmosférica es responsable de los rayos (descargas eléctricas) durante las tormentas.\n\n🧮 CONEXIÓN CON MATEMÁTICA:\n• Cálculo del número de neutrones: N = A - Z.\n• Balanceo de ecuaciones químicas: contar átomos y aplicar factor de multiplicación.\n• Ley de Ohm: V = I × R. Cálculo de corriente, voltaje y resistencia usando álgebra básica.\n• Circuitos en serie: R_total = R₁ + R₂. Circuitos en paralelo: 1/R_total = 1/R₁ + 1/R₂ (nociones simples).\n\n🧩 ACTIVIDAD INTEGRADORA: "Pilas caseras": Construir una pila con limón (o papa), una moneda de cobre y un clavo de zinc. Conectar varias en serie y encender un LED. Integra química (reacción redox), electricidad (voltaje, corriente) y matemática (suma de voltajes en serie).\n\n💡 REFLEXIÓN: La química, la electricidad y el magnetismo no son ciencias separadas: son manifestaciones de un mismo universo de átomos y energía. Todo lo que ves, tocas y usas está gobernado por estas interacciones.`,
            6: `🌍 CORRELACIONES EXTERNAS: La tabla periódica, las reacciones químicas y el electromagnetismo en la vida real\n\n🏭 INDUSTRIA Y MINERÍA EN EL PERÚ:\n• El Perú es el segundo productor mundial de cobre. El cobre (Cu, Z=29) se usa en cables eléctricos por su alta conductividad.\n• La refinación de minerales (oro, plata, zinc) implica reacciones químicas de oxidación-reducción y electrólisis.\n• La siderurgia (obtención de acero a partir de hierro) usa altos hornos donde ocurre la reducción del óxido de hierro con carbono.\n\n🔋 TECNOLOGÍA Y ENERGÍA:\n• Las baterías (pilas) convierten energía química en eléctrica. Las baterías recargables de litio (Li, Z=3) alimentan celulares, laptops y autos eléctricos.\n• Los paneles solares convierten luz (energía luminosa) en electricidad usando silicio (Si, Z=14), un metaloide.\n• Los generadores de las centrales hidroeléctricas (como El Mantaro) funcionan gracias al principio de inducción electromagnética de Faraday: el movimiento de una turbina (energía mecánica) dentro de un campo magnético induce corriente eléctrica.\n\n🏠 EN CASA:\n• La cocina a gas: combustión del gas natural (metano, CH₄).\n• El refrigerador: el motor-compresor funciona con electricidad; el gas refrigerante sufre cambios de estado.\n• La lavadora: motor eléctrico que convierte electricidad en movimiento.\n• El microondas: ondas electromagnéticas (no son sonido ni calor) agitan las moléculas de agua del alimento, calentándolo.\n\n⚕️ SALUD:\n• El yodo (I, Z=53) es un elemento esencial para la glándula tiroides. La sal yodada previene el bocio.\n• El calcio (Ca, Z=20) forma huesos y dientes; el hierro (Fe, Z=26) forma la hemoglobina que transporta oxígeno en la sangre.\n• La resonancia magnética (RM) usa potentes campos magnéticos y ondas de radio para obtener imágenes del interior del cuerpo, sin radiación ionizante.\n\n🧠 REFLEXIÓN FINAL: "Desde el oxígeno que respiras hasta el cobre que lleva electricidad a tu casa, la tabla periódica es el catálogo de los ladrillos con los que se construye el universo. Conocer la química, la electricidad y el magnetismo es leer el manual de instrucciones de la realidad."\n\n🗣️ CITA: "La ciencia es magia que funciona." — Kurt Vonnegut. Y podríamos añadir: "La química es la cocina de la naturaleza."`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Feria Científica: Química, Electricidad y Magnetismo en Acción"\n\n🎯 OBJETIVO: Organizar una feria científica en el aula donde cada equipo presente un experimento o demostración interactiva que integre química, electricidad o magnetismo, explicando los principios científicos detrás.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ELECCIÓN DEL EXPERIMENTO Y DISEÑO (1 sesión)\n• 5 equipos, cada uno elige un proyecto diferente:\n  - Equipo "Volcán Químico": Erupción con bicarbonato y vinagre, o con peróxido de hidrógeno y levadura (descomposición catalítica). Explican la reacción química y por qué es espumosa.\n  - Equipo "Pila de Limones": Conectan varias pilas de limón en serie y encienden un LED. Explican la reacción redox y la transformación de energía química en eléctrica.\n  - Equipo "Electroimán Poderoso": Enrollan alambre de cobre en un clavo y muestran cómo atrae clips al conectar la pila. Explican la relación electricidad-magnetismo y sus aplicaciones.\n  - Equipo "Circuito de Preguntas": Crean un tablero de preguntas y respuestas con circuitos: al unir la pregunta correcta con la respuesta, se enciende un foco. Aplican circuito en serie y conductividad.\n  - Equipo "Tinta Invisible y Mensajes Químicos": Escriben con jugo de limón en papel; al calentarlo (reacción de oxidación), el mensaje se revela. También usan fenolftaleína casera (de repollo morado) para identificar ácidos y bases.\n\nFASE 2: INVESTIGACIÓN Y PREPARACIÓN DE MATERIALES (1 sesión)\n• Cada equipo investiga la teoría y prepara un cartel con: título, materiales, procedimiento, explicación científica y aplicación en la vida real.\n• Ensayan el experimento.\n\nFASE 3: LA FERIA (1 sesión)\n• Se invita a otros salones, padres y docentes.\n• Los equipos realizan su demostración frente a grupos de visitantes, explicando con lenguaje claro y respondiendo preguntas.\n\nFASE 4: EVALUACIÓN Y CIERRE (1 sesión)\n• Los visitantes votan por el experimento más impactante, el mejor explicado y el más creativo.\n• Plenaria: ¿Qué aprendieron al preparar el experimento? ¿Qué fue lo más difícil?\n• Diplomas temáticos: "Maestro de la Química", "Ingeniero Eléctrico Junior", "Mago del Magnetismo".\n\n🏆 EVALUACIÓN: Base científica correcta (40%), claridad de la explicación (30%), creatividad (20%), trabajo en equipo (10%).\n🎉 CIERRE: Los experimentos se documentan en video o fotos y se comparten en la web del colegio. "La ciencia que se comparte es la ciencia que perdura."`,
