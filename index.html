        const leccionExtensaSVIII = {
            0: `🎯 OBJETIVO GENERAL: Introducir a los estudiantes de 1° y 2° grado de primaria en el conocimiento de los seres vivos, el cuerpo humano, los animales y las plantas de su entorno, así como en la adopción de hábitos saludables, despertando su curiosidad por el mundo natural y sentando las bases para el cuidado de su salud y del medio ambiente.\n\n🎯 OBJETIVOS PARTICULARES:\n• Identificar las partes principales del cuerpo humano (cabeza, tronco, extremidades) y sus funciones básicas.\n• Reconocer los órganos de los sentidos y su función.\n• Diferenciar entre seres vivos (nacen, crecen, se alimentan, se reproducen, mueren) y materia inerte.\n• Identificar animales comunes del entorno peruano: domésticos, de granja, silvestres.\n• Clasificar animales según su alimentación (herbívoros, carnívoros, omnívoros), su desplazamiento (caminan, vuelan, nadan) o su cobertura corporal (pelos, plumas, escamas).\n• Reconocer las partes principales de una planta (raíz, tallo, hojas, flores, frutos) y su función.\n• Comprender qué necesitan las plantas para vivir (agua, luz solar, aire, suelo).\n• Adoptar hábitos de higiene personal (lavado de manos, cepillado dental, baño diario).\n• Reconocer la importancia de una alimentación balanceada y de la actividad física.\n• Valorar el cuidado del medio ambiente como parte de una vida saludable.\n\n📌 NOCIONES PRINCIPALES:\n• Cuerpo humano: cabeza (cara, ojos, nariz, boca, orejas), tronco (pecho, espalda, abdomen), extremidades (brazos, piernas).\n• Órganos de los sentidos: vista (ojos), oído (orejas), olfato (nariz), gusto (lengua), tacto (piel).\n• Ser vivo: organismo que nace, crece, se alimenta, se reproduce y muere.\n• Animales: domésticos, de granja, silvestres. Clasificación por alimentación: herbívoros, carnívoros, omnívoros.\n• Partes de la planta: raíz, tallo, hojas, flores, frutos.\n• Necesidades de las plantas: agua, luz solar, aire, suelo (nutrientes).\n• Hábitos saludables: higiene personal, alimentación balanceada, ejercicio físico, descanso adecuado.\n\n📌 NOCIONES SECUNDARIAS:\n• Ciclo de vida de una planta (semilla → germinación → crecimiento → floración → fructificación).\n• Ciclo de vida de algunos animales (huevo → larva/cría → adulto).\n• La importancia de los animales y plantas para los seres humanos (alimentación, vestido, compañía, oxígeno).\n• Prevención de enfermedades comunes: lavado de manos, vacunación, visita al médico.\n• Alimentos nutritivos vs. alimentos poco saludables ("chatarra").\n\n🌍 INTERESES SOCIETALES:\n• Conocer el propio cuerpo ayuda a los niños a desarrollar autonomía en su cuidado personal y a comunicar molestias o síntomas a los adultos.\n• Comprender el mundo de los seres vivos fomenta el respeto por la naturaleza, la fauna y la flora del Perú, un país megadiverso.\n• Los hábitos saludables adquiridos en la infancia previenen enfermedades a lo largo de toda la vida: obesidad, caries, infecciones.\n• Saber de dónde provienen los alimentos (plantas, animales) conecta a los niños con el trabajo agrícola y ganadero.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Exploradores de la vida"\n\n🧩 MATERIALES: Espejos, fichas del cuerpo humano, láminas de animales, plantas reales en macetas, semillas, lupas, vendas para tapar los ojos, objetos con diferentes olores (café, limón, canela), alimentos para degustar (galleta salada, azúcar, limón), algodón, plumas, lija, frutas y verduras variadas.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Conociendo mi cuerpo" – Los niños se miran en un espejo e identifican las partes de su cuerpo: cabeza (con ojos, nariz, boca, orejas), tronco, brazos y piernas. En parejas, uno señala una parte del cuerpo del compañero y este debe nombrarla. Luego completan un rompecabezas del cuerpo humano con piezas grandes.\n\nESTACIÓN 2: "El laboratorio de los sentidos" – Se organizan en subestaciones para experimentar con cada sentido:\n• Vista (ojos): Observan láminas de paisajes e identifican colores y formas.\n• Oído (orejas): Con los ojos vendados, identifican sonidos grabados (agua corriendo, perro ladrando, campana, llanto, risa).\n• Olfato (nariz): Huelen frascos opacos con café, limón, canela, ajo, sin ver el contenido y adivinan.\n• Gusto (lengua): Degustan con los ojos cerrados pequeñas muestras de azúcar (dulce), sal (salado), limón (ácido) e identifican el sabor.\n• Tacto (piel): Tocan dentro de una "caja misteriosa" objetos de diferentes texturas: algodón (suave), lija (áspero), piedra (duro), plastilina (blando).\n\nESTACIÓN 3: "Animales de mi Perú" – Se exponen láminas con animales del entorno peruano: perro, gato, gallina, vaca, llama, cóndor, mono, delfín rosado, anchoveta. Los niños los clasifican según tengan pelos, plumas o escamas; según caminen, vuelen o naden; y según lo que comen (con ayuda de la maestra). Arman un mural colectivo.\n\nESTACIÓN 4: "Las plantas tienen vida" – Cada niño recibe una semilla (frejol, lenteja), un vasito con algodón húmedo y coloca la semilla. La maestra explica que dentro de unos días germinará. También observan con lupa las partes de una planta en maceta (raíz, tallo, hojas) y riegan la planta del aula.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Cuáles son las partes más importantes de tu cuerpo? ¿Para qué sirve cada sentido? ¿En qué se parecen y en qué se diferencian los animales que vimos? ¿Las plantas están vivas? ¿Cómo lo sabes? ¿Qué haces para mantenerte sano?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Descubriendo las reglas de los seres vivos"\n\n📊 OBSERVACIÓN GUIADA: SERES VIVOS VS. MATERIA INERTE\nLa maestra presenta dos columnas en la pizarra. En la columna A coloca dibujos o fotos de: un perro, una planta, un niño, un pez. En la columna B: una piedra, un lápiz, una silla, un carrito de juguete.\n\nPaso 1: Preguntas: ¿El perro come? (Sí). ¿La piedra come? (No). ¿La planta crece? (Sí). ¿El lápiz crece? (No). ¿El niño se mueve por sí mismo? (Sí). ¿La silla se mueve por sí misma? (No).\nPaso 2: Los niños descubren que los de la columna A nacen, crecen, se alimentan, respiran, se reproducen y mueren. Los de la columna B no.\nConclusión guiada: "Los seres vivos son aquellos que nacen, crecen, se alimentan, respiran, se reproducen y mueren. La materia inerte no hace ninguna de estas cosas."\n\n📊 OBSERVACIÓN GUIADA: PARTES DE LAS PLANTAS\nSe presentan 5 tipos de plantas comunes en el Perú: una rosa, una planta de tomate, un geranio, un helecho y una hierbabuena. Los niños observan que todas tienen raíz (aunque a veces no se vea porque está bajo tierra), tallo, hojas; y algunas tienen flores y frutos.\n\nPaso 1: Los niños dibujan una de las plantas y señalan cada parte.\nPaso 2: La maestra pregunta: ¿Por dónde toma agua la planta? (por la raíz). ¿Por dónde respira? (por las hojas). ¿De qué color son las hojas? (verdes). ¿Por qué? (Porque tienen clorofila, que les ayuda a fabricar su alimento con la luz del sol).\nConclusión guiada: "Las plantas tienen raíz (absorbe agua y nutrientes), tallo (sostiene y transporta), hojas (fabrican el alimento), flores (reproducción) y frutos (protegen las semillas)."\n\n📊 OBSERVACIÓN GUIADA: HÁBITOS SALUDABLES\nLa maestra presenta tarjetas con imágenes. Los niños las clasifican en "Hábito Saludable" o "No Saludable":\n• Lavarse las manos antes de comer (Saludable).\n• Comer solo golosinas (No saludable).\n• Cepillarse los dientes 3 veces al día (Saludable).\n• No hacer ejercicio (No saludable).\n• Dormir 8-10 horas (Saludable).\n• Comer frutas y verduras (Saludable).\n\nPaso 1: Los niños explican por qué cada hábito es bueno o malo.\nPaso 2: La maestra introduce la noción de germen o microbio: "Los gérmenes son seres vivos diminutos que no vemos pero que pueden enfermarnos. Lavarnos las manos elimina a estos gérmenes."\nConclusión: "Para mantenernos sanos debemos tener buena higiene, alimentarnos bien, hacer ejercicio y dormir lo suficiente."\n\n📝 REGISTRO: Cada estudiante dibuja en su cuaderno un ser vivo (animal o planta), señala sus partes principales y escribe 3 hábitos saludables que practica.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: El Cuerpo Humano, los Seres Vivos (Animales y Plantas) y los Hábitos Saludables\n\n🧍 1. EL CUERPO HUMANO\n\nNuestro cuerpo está formado por:\n\n📏 PARTES PRINCIPALES:\n• CABEZA: Contiene el cerebro (que nos permite pensar y ordenar a nuestro cuerpo) y la cara.\n• TRONCO: Une la cabeza con las extremidades. En su interior están el corazón (bombea sangre), los pulmones (respiran) y el estómago (digiere alimentos).\n• EXTREMIDADES SUPERIORES (BRAZOS): Sirven para agarrar, lanzar, escribir, abrazar.\n• EXTREMIDADES INFERIORES (PIERNAS): Sirven para caminar, correr, saltar.\n\n👁️ LOS 5 SENTIDOS Y SUS ÓRGANOS:\n• VISTA → OJOS: Nos permiten ver colores, formas, tamaños, distancias.\n• OÍDO → OREJAS (OÍDOS): Captan sonidos (música, voces, ruidos).\n• OLFATO → NARIZ: Percibe olores agradables (flores, comida) y desagradables (basura, humo).\n• GUSTO → LENGUA: Identifica sabores: dulce, salado, ácido, amargo.\n• TACTO → PIEL: Siente texturas (suave, áspero), temperatura (frío, calor), presión y dolor.\n\n🦴 HUESOS Y MÚSCULOS (nociones básicas):\n• Los huesos son duros y forman el esqueleto. Sostienen el cuerpo y protegen los órganos internos (el cráneo protege el cerebro; las costillas, al corazón y pulmones).\n• Los músculos son blandos y elásticos. Se estiran y encogen para producir movimiento. Tenemos músculos en los brazos, piernas, abdomen y cara (¡para sonreír!).\n\n🐾 2. LOS ANIMALES\n\nSon seres vivos que se alimentan de otros seres vivos (plantas u otros animales) y la mayoría pueden desplazarse por sí mismos.\n\n📏 CLASIFICACIÓN SEGÚN SU ALIMENTACIÓN:\n• HERBÍVOROS: Comen solo plantas. Ej: conejo, vaca, llama, cuy, caballo, oruga.\n• CARNÍVOROS: Comen carne (otros animales). Ej: león, cóndor, tiburón, araña, gato.\n• OMNÍVOROS: Comen plantas y carne. Ej: ser humano, perro, gallina, chancho, oso.\n\n📏 CLASIFICACIÓN SEGÚN SU DESPLAZAMIENTO:\n• CAMINAN/CORREN: perro, gato, caballo, avestruz.\n• VUELAN: cóndor, paloma, mariposa, abeja.\n• NADAN: pez, delfín, ballena, anchoveta.\n• REPTAN: serpiente, lagartija, caracol.\n\n📏 CLASIFICACIÓN SEGÚN SU COBERTURA CORPORAL:\n• PELOS: perro, gato, vaca, oso.\n• PLUMAS: gallina, pato, cóndor, pingüino.\n• ESCAMAS: pez, serpiente, cocodrilo.\n• PIEL DESNUDA: rana, sapo, delfín.\n\n📏 ANIMALES DE NUESTRO ENTORNO (PERÚ):\n• Costa: pelícano, lobo marino, anchoveta, delfín, cangrejo.\n• Sierra: llama, alpaca, vicuña, cóndor, vizcacha, puma.\n• Selva: mono, guacamayo, delfín rosado, jaguar, mariposa morpho azul.\n\n🌱 3. LAS PLANTAS\n\nSon seres vivos que fabrican su propio alimento usando agua, luz solar y aire (fotosíntesis). Tienen partes especializadas:\n\n📏 PARTES DE LA PLANTA:\n• RAÍZ: Generalmente bajo tierra. Absorbe agua y nutrientes del suelo. Fija la planta al suelo.\n• TALLO: Sostiene hojas, flores y frutos. Transporta agua y nutrientes (como una tubería).\n• HOJAS: Fabrican el alimento de la planta (fotosíntesis). Son verdes por la clorofila.\n• FLORES: Producen semillas para dar origen a nuevas plantas. Atraen insectos polinizadores.\n• FRUTOS: Protegen las semillas. Muchos sirven de alimento para animales y humanos.\n\n📏 NECESIDADES DE LAS PLANTAS:\n• AGUA: Absorbida por la raíz.\n• LUZ SOLAR: Captada por las hojas para hacer la fotosíntesis.\n• AIRE (DIÓXIDO DE CARBONO): Las hojas lo toman del aire.\n• SUELO (NUTRIENTES): Proporciona minerales necesarios para crecer.\n\n📏 CICLO DE VIDA DE UNA PLANTA:\nSemilla → Germinación (aparece la raíz) → Crecimiento (tallo y hojas) → Floración → Fructificación → Semilla.\n\n🍎 4. HÁBITOS SALUDABLES\n\nSon acciones que realizamos a diario para mantener nuestro cuerpo y mente sanos.\n\n📏 HIGIENE PERSONAL:\n• Lavarse las manos con agua y jabón antes de comer, después de ir al baño y después de jugar. (Elimina gérmenes que causan enfermedades).\n• Cepillarse los dientes después de cada comida (evita caries).\n• Bañarse diariamente con agua y jabón.\n• Cortarse las uñas y mantenerlas limpias.\n• Usar ropa limpia.\n\n📏 ALIMENTACIÓN SALUDABLE:\n• Comer variedad de alimentos: frutas, verduras, cereales, carnes, lácteos, menestras.\n• Evitar comer muchas golosinas, frituras, gaseosas (comida "chatarra").\n• Tomar suficiente agua (6-8 vasos al día).\n• Masticar bien los alimentos y comer despacio.\n\n📏 EJERCICIO FÍSICO Y DESCANSO:\n• Jugar al aire libre, correr, saltar, bailar, andar en bicicleta (al menos 1 hora al día).\n• Dormir de 8 a 10 horas cada noche.\n• Tener horarios regulares para comer, estudiar, jugar y dormir.\n\n📏 SALUD EMOCIONAL:\n• Expresar sentimientos: alegría, tristeza, enojo con palabras.\n• Hablar con adultos de confianza cuando algo nos preocupa.\n• Compartir y jugar con amigos.\n\n⚠️ ERRORES COMUNES Y CÓMO EVITARLOS:\n• Confundir un ser vivo con un objeto que se mueve con pilas (un robot no es ser vivo porque no crece, no se alimenta, no nace ni muere).\n• Creer que todas las plantas tienen flores (helechos y musgos no tienen flores).\n• Pensar que "solo las frutas son saludables" sin balancear con proteínas y cereales.\n• Olvidar que los gérmenes existen aunque no los veamos; solo los vemos con microscopio.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: El Cuerpo Humano\n1. Escribe el nombre de las partes del cuerpo donde corresponde:\n(Dibujo de un niño). Señalar: cabeza, tronco, brazo, pierna.\n2. Une con una flecha:\nOjos → Vista\nOrejas → Oído\nNariz → Olfato\nLengua → Gusto\nPiel → Tacto\n3. ¿Qué sentido usarías para...?\na) Leer un libro (vista)\nb) Escuchar música (oído)\nc) Sentir el frío del helado (tacto)\nd) Oler una flor (olfato)\ne) Probar la miel (gusto)\n4. Dibuja tu cuerpo y señala 5 partes.\n\n📝 BLOQUE 2: Seres Vivos y Animales\n5. Marca con ✔ los seres vivos y con ✗ los que no lo son:\nPerro (✔) – Piedra (✗) – Árbol (✔) – Carro (✗) – Mariposa (✔) – Muñeca (✗)\n6. Clasifica los siguientes animales según su alimentación:\nVaca (Herbívoro), León (Carnívoro), Gallina (Omnívoro), Cuy (Herbívoro), Perro (Omnívoro), Tiburón (Carnívoro).\n7. Completa:\na) Los animales que tienen plumas son las ______ (aves).\nb) Los animales que tienen escamas son los ______ (peces, reptiles).\nc) Los animales que maman cuando son crías se llaman ______ (mamíferos).\n8. Nombra 3 animales de la costa, 3 de la sierra y 3 de la selva del Perú.\n\n📝 BLOQUE 3: Las Plantas\n9. Escribe las partes de la planta:\n(Dibujo de planta con raíz, tallo, hojas, flor y fruto).\n10. Completa las oraciones:\na) La raíz absorbe ______ y nutrientes. (agua)\nb) El tallo sostiene a la planta y transporta ______. (agua y nutrientes)\nc) Las hojas fabrican el ______ de la planta. (alimento)\nd) Las flores producen ______. (semillas)\ne) El fruto protege las ______. (semillas)\n11. ¿Qué necesita una planta para vivir? (Agua, luz solar, aire, suelo).\n12. Ordena el ciclo de vida de una planta:\nSemilla → (Germinación) → (Crecimiento) → (Floración) → (Fructificación).\n\n📝 BLOQUE 4: Hábitos Saludables\n13. Escribe 3 hábitos de higiene personal.\n(Ej: lavarse las manos, cepillarse los dientes, bañarse).\n14. Dibuja un plato saludable con alimentos de verdad.\n15. ¿Cuántas horas debe dormir un niño de tu edad? (8 a 10 horas).\n16. Verdadero o Falso:\na) Las golosinas son el alimento más saludable (F)\nb) Debo lavarme las manos antes de comer (V)\nc) Hacer ejercicio solo una vez al mes es suficiente (F)\nd) Las frutas y verduras nos ayudan a crecer sanos (V)\ne) No hace falta cepillarse los dientes (F)\n\n📝 BLOQUE 5: Problemas y Casos\n17. Juana tiene un perro y una planta de tomate. ¿En qué se parecen? (Ambos son seres vivos: nacen, crecen, se alimentan, se reproducen, mueren). ¿En qué se diferencian? (El perro se desplaza, la planta no; el perro come otros seres vivos, la planta fabrica su alimento).\n18. ¿Por qué si no riegas una planta se marchita? (Porque necesita agua para vivir y fabricar su alimento).\n19. Un niño come muchas golosinas y no se cepilla los dientes. ¿Qué puede pasar? (Tendrá caries y dolor de muelas).\n\n⏱️ Tiempo: 60-80 min. ✅ Revisión en parejas y puesta en común.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Materia y Energía, Tierra y Universo y Matemática\n\n🔬 CONEXIÓN CON MATERIA Y ENERGÍA:\n• Los sentidos captan estímulos del entorno: la luz (vista), el sonido (oído), las partículas olorosas (olfato), las sustancias químicas (gusto), la presión y temperatura (tacto). Todo esto se relaciona con la energía y la materia.\n• La fotosíntesis de las plantas es un proceso que usa energía luminosa para transformar agua y dióxido de carbono en alimento y oxígeno. Es un puente perfecto entre seres vivos y materia/energía.\n• Los alimentos que consumimos contienen nutrientes que nuestro cuerpo transforma en energía.\n\n🌍 CONEXIÓN CON TIERRA Y UNIVERSO:\n• Las plantas dependen del suelo (Tierra) para obtener nutrientes y agua.\n• Los animales dependen de las plantas y del agua del planeta.\n• El ciclo del día y la noche influye en los ritmos de sueño y vigilia de los seres vivos.\n• Muchos animales tienen hábitos diurnos (gallina, perro) o nocturnos (búho, murciélago).\n\n🧮 CONEXIÓN CON MATEMÁTICA:\n• Contar animales en una lámina, clasificar y hacer tablas de conteo.\n• Medir el crecimiento de una planta (en centímetros) a lo largo del tiempo.\n• Crear gráficos de barras simples con los hábitos saludables que practica el aula.\n\n🧩 ACTIVIDAD INTEGRADORA: "Diario de un ser vivo": Cada niño adopta una planta (puede ser la semilla que sembró) y durante 2 semanas registra: ¿cuánto creció? (medir con regla), ¿cuántas hojas nuevas tiene?, ¿cada cuánto la riega? Dibuja la planta cada semana. Al final, expone su diario.\n\n💡 REFLEXIÓN: Los seres vivos y el entorno están conectados. Los animales necesitan plantas, las plantas necesitan el suelo y el sol. Todo forma parte de un gran sistema llamado naturaleza.`,
            6: `🌍 CORRELACIONES EXTERNAS: Los seres vivos y la salud en la vida cotidiana\n\n🏥 EN LA MEDICINA Y LA SALUD:\n• Los médicos y enfermeras revisan el cuerpo humano: miden la estatura, el peso, escuchan los latidos del corazón.\n• Los dentistas nos ayudan a cuidar los dientes.\n• Las vacunas nos protegen de enfermedades graves entrenando a nuestro cuerpo para defenderse de virus y bacterias.\n• Los hábitos de higiene como lavarse las manos previenen diarreas, gripes y otras infecciones.\n\n🌾 EN LA AGRICULTURA Y LA ALIMENTACIÓN:\n• Los agricultores siembran y cosechan las frutas, verduras y cereales que llegan a nuestra mesa.\n• En el Perú cultivamos papa, maíz, quinua, arroz, café, cacao, frutas diversas.\n• Conocer de dónde vienen los alimentos nos hace valorar el trabajo del campo.\n\n🐾 EN EL CUIDADO DE LOS ANIMALES:\n• Las mascotas (perros, gatos, cuyes) necesitan alimentación, agua, refugio y cariño.\n• Los veterinarios curan a los animales enfermos.\n• La fauna silvestre debe ser respetada en su hábitat natural; no debemos capturar animales salvajes.\n\n🌳 EN LA CONSERVACIÓN DEL MEDIO AMBIENTE:\n• Las plantas producen el oxígeno que respiramos.\n• Los bosques (Amazonía peruana) son el pulmón del planeta.\n• Tirar basura en las calles contamina el suelo y el agua, dañando a plantas y animales.\n• Pequeñas acciones ayudan: sembrar un árbol, no arrojar basura, cuidar el agua.\n\n🏫 EN LA ESCUELA Y LA FAMILIA:\n• La lonchera saludable incluye una fruta, un sándwich y agua, en vez de golosinas y gaseosas.\n• Jugar en el recreo es ejercicio físico y ayuda a concentrarse mejor en clases.\n• Compartir con compañeros fortalece la salud emocional.\n\n🧠 REFLEXIÓN FINAL: "Tu cuerpo es tu casa. Si lo cuidas con buena alimentación, higiene y ejercicio, te acompañará fuerte y sano toda la vida. Los animales y las plantas son tus vecinos en este planeta: conócelos, respétalos y protégelos."\n\n🗣️ CITA: "La salud es la mayor riqueza." — Proverbio popular.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Feria de la Salud y la Naturaleza"\n\n🎯 OBJETIVO: Organizar una feria en el aula donde los niños expongan lo aprendido sobre el cuerpo humano, los animales, las plantas y los hábitos saludables mediante stands interactivos para sus compañeros y familias.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ORGANIZACIÓN (1 sesión)\n• 5 equipos con identidad propia:\n  - Equipo "Cuerpo Humano": expertos en las partes del cuerpo y los sentidos.\n  - Equipo "Animales del Perú": expertos en fauna peruana.\n  - Equipo "Mundo Vegetal": expertos en plantas y su cuidado.\n  - Equipo "Vida Saludable": expertos en higiene y alimentación.\n  - Equipo "Eco-Guardianes": expertos en cuidado del medio ambiente.\n\nFASE 2: PREPARACIÓN DE STANDS (2 sesiones)\n• EQUIPO CUERPO HUMANO: Elaboran un muñeco articulado de cartón tamaño niño con partes etiquetadas. Juego: "Pon el sentido correcto" (tarjetas con situaciones y los visitantes colocan el sentido que usarían).\n• EQUIPO ANIMALES DEL PERÚ: Crean un mural "Animales de mi Perú" con recortes, dibujos y datos curiosos. Juego: "Adivina qué animal soy" (mímica o pistas).\n• EQUIPO MUNDO VEGETAL: Exhiben las plantitas que sembraron durante el curso con carteles que indican la fecha de siembra y cuidados. Juego: "Arma la planta" (rompecabezas de las partes).\n• EQUIPO VIDA SALUDABLE: Preparan un "Plato Saludable" gigante con alimentos de juguete o recortes, clasificándolos por grupos. Juego: "Semáforo de alimentos" (verde=saludable, amarillo=moderado, rojo=evitar).\n• EQUIPO ECO-GUARDIANES: Muestran en un cartel las "3R" (Reducir, Reutilizar, Reciclar) con ejemplos. Juego: "Clasifica la basura" (mini tachos de colores para papel, plástico, orgánico).\n\nFASE 3: ENSAYO (1 sesión)\n• Cada equipo ensaya su explicación para los visitantes.\n• Prueban sus juegos con compañeros de otros equipos.\n\nFASE 4: LA FERIA (1 sesión)\n• Se invita a otros salones y, si es posible, a padres de familia.\n• Los equipos atienden sus stands por turnos (la mitad del equipo expone mientras la otra mitad visita otros stands, y luego rotan).\n• Los visitantes reciben un "Pasaporte de la Feria" que se sella en cada stand visitado. Al completar 5 sellos, reciben una fruta de premio (manzana, mandarina).\n\nFASE 5: REFLEXIÓN Y CIERRE (1 sesión)\n• Plenaria: ¿Qué fue lo que más les gustó? ¿Qué aprendieron de los otros equipos? ¿Cómo se sintieron siendo "expertos"?\n• Cada niño escribe o dibuja en su cuaderno un compromiso personal: "Yo me comprometo a... (lavarme las manos, comer más frutas, cuidar una planta, etc.)".\n• Entrega de diplomas de "Explorador de la Vida".\n\n🏆 EVALUACIÓN: Conocimiento del tema, claridad al explicar, creatividad en el stand, trabajo en equipo, actitud de servicio.\n🎉 CIERRE: Los stands quedan expuestos una semana en el aula. Se toma una foto grupal con el lema: "¡Cuidamos nuestro cuerpo y nuestro planeta!"`,
        };

        const leccionExtensaMEIII = {
            0: `🎯 OBJETIVO GENERAL: Introducir a los estudiantes de 1° y 2° grado de primaria en el conocimiento de la materia y la energía, explorando las propiedades básicas de los materiales a través de sus sentidos, y descubriendo fenómenos fundamentales como la luz y el sonido, desarrollando la observación, la experimentación y la curiosidad científica.\n\n🎯 OBJETIVOS PARTICULARES:\n• Reconocer que todo lo que nos rodea está hecho de materia.\n• Identificar y comparar propiedades básicas de los materiales: color, forma, tamaño, textura (suave, áspero, liso, rugoso), dureza (duro, blando), flexibilidad (flexible, rígido) y transparencia (transparente, translúcido, opaco).\n• Clasificar materiales según su origen: naturales (madera, piedra, algodón) y artificiales (plástico, vidrio, papel procesado).\n• Comprender que la luz es una forma de energía que nos permite ver los objetos.\n• Diferenciar objetos que emiten luz propia (fuentes luminosas naturales como el sol, artificiales como una linterna) de aquellos que solo la reflejan.\n• Experimentar con la formación de sombras y comprender que se producen cuando un objeto bloquea la luz.\n• Comprender que el sonido es una forma de energía que se produce por vibraciones y viaja por el aire hasta nuestros oídos.\n• Diferenciar sonidos según su intensidad (fuerte/suave), tono (agudo/grave) y duración (largo/corto).\n\n📌 NOCIONES PRINCIPALES:\n• Materia: todo aquello que ocupa un lugar en el espacio y tiene masa.\n• Propiedades de los materiales: color, forma, textura, dureza, flexibilidad, transparencia.\n• Materiales naturales vs. artificiales.\n• Luz: fuente luminosa, reflexión, sombra.\n• Sonido: vibración, propagación por el aire, intensidad (fuerte/suave), tono (agudo/grave).\n\n📌 NOCIONES SECUNDARIAS:\n• Estados de la materia: sólido, líquido, gas (nociones muy básicas: el agua puede ser hielo, agua líquida o vapor).\n• Materiales conductores y aislantes del calor (tocado simple: metal frío, madera menos fría).\n• El arcoíris como descomposición de la luz blanca.\n• Eco como reflexión del sonido.\n• Cualidades del sonido: timbre (diferencia entre la voz de mamá y la de papá).\n\n🌍 INTERESES SOCIETALES:\n• Los materiales que usamos a diario (ropa, útiles escolares, muebles) tienen propiedades específicas que los hacen útiles para diferentes fines.\n• Entender la luz y el sonido permite a los niños comprender fenómenos cotidianos: ¿por qué vemos nuestra imagen en un espejo?, ¿por qué se forma un arcoíris?, ¿cómo funciona un teléfono de vasitos?\n• La ciencia de los materiales y la energía es la base de la tecnología moderna: desde los lentes que corrigen la visión hasta los audífonos, los celulares y los focos LED.\n• La curiosidad por cómo funcionan las cosas es el primer paso hacia el pensamiento científico e ingenieril.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Laboratorio de materia, luz y sonido"\n\n🧩 MATERIALES: Bolsa con objetos de diferentes materiales (madera, plástico, metal, tela, vidrio, esponja, piedra, papel, cartón, goma), linternas, espejos, papel celofán de colores, vasos de plástico e hilo para teléfono casero, ligas de diferentes grosores, cajas de cartón para "cámara oscura", botellas con diferentes niveles de agua, xilófono o instrumentos musicales sencillos.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Toca, mira y clasifica" - En una mesa hay 15 objetos de diferentes materiales. Los niños los tocan y observan con lupas. Los clasifican libremente según criterios que ellos decidan: "los que son suaves", "los que son duros", "los que son transparentes", "los que brillan", "los que se doblan". Registran sus clasificaciones con dibujos en una tabla. Luego la maestra pregunta: ¿De qué material está hecho cada uno? ¿Es natural o lo fabricó el ser humano?\n\nESTACIÓN 2: "Jugando con la luz y las sombras" - Con una linterna y una pared blanca, los niños experimentan:\n• Iluminan objetos opacos (muñeco de plástico, libro) y ven la sombra.\n• Iluminan objetos transparentes (vaso de vidrio, papel celofán) y ven que pasa la luz.\n• Interponen su mano entre la linterna y la pared: cambian la distancia y ven cómo cambia el tamaño de la sombra.\n• Con papel celofán de colores (rojo, azul, amarillo), iluminan y ven que la luz se tiñe de ese color.\n• Usan un espejo para reflejar la luz de la linterna hacia otro punto de la pared. Descubren que la luz "rebota".\n\nESTACIÓN 3: "Sonidos por todas partes" - Los niños exploran cómo producir sonidos:\n• Golpean suavemente una mesa con los nudillos, con un lápiz, con la palma abierta. ¿Suena igual?\n• Estiran una liga entre dos dedos y la hacen vibrar. ¿Cómo cambia el sonido si la estiran más (más agudo) o menos (más grave)?\n• Tienen 3 botellas con diferentes niveles de agua. Soplan por la boca de la botella. ¿Cuál produce el sonido más agudo? (La que tiene más agua, porque la columna de aire es más corta).\n• Fabrican un "teléfono de vasitos": dos vasos de plástico unidos por un hilo tenso. Uno habla, el otro escucha. ¿Por qué se escucha? (La vibración de la voz viaja por el hilo).\n\nESTACIÓN 4: "¿Sólido, líquido o gas?" - Se muestran tres recipientes: uno con un cubo de hielo (sólido), otro con agua (líquido), y una bolsa inflada (gas: aire). Describen las diferencias: el hielo tiene forma fija, el agua toma la forma del recipiente, el aire no se ve pero infla la bolsa. Tocan el hielo y predicen: ¿qué pasará si lo dejamos fuera del congelador? (Se derretirá y será agua líquida).\n\n💬 REFLEXIÓN EN PLENARIA: ¿De qué están hechas las cosas que usamos? ¿Por qué unos objetos dejan pasar la luz y otros no? ¿Cómo viaja el sonido hasta nuestros oídos? ¿Qué fue lo más sorprendente que descubrieron hoy?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Patrones de la materia y la energía"\n\n📊 OBSERVACIÓN GUIADA: PROPIEDADES DE LOS MATERIALES\nLa maestra presenta una tabla vacía en la pizarra y 6 objetos: un clip metálico, una goma de borrar, un vaso de vidrio, un trozo de tela, una cuchara de madera y una bolsa plástica.\n\nLos niños ayudan a completar la tabla:\n| Objeto | Material | ¿Duro o blando? | ¿Transparente? | ¿Se dobla sin romperse? | ¿Natural o artificial? |\n|---|---|---|---|---|---|\n| Clip | Metal (acero) | Duro | No | Sí (flexible) | Artificial |\n| Goma | Caucho | Blando | No | Sí | Artificial |\n| Vaso | Vidrio | Duro | Sí | No (rígido, se quiebra) | Artificial |\n| Tela | Algodón | Blando | No | Sí | Natural |\n| Cuchara | Madera | Duro | No | No (rígida) | Natural |\n| Bolsa | Plástico | Blando | Translúcido | Sí | Artificial |\n\nConclusión guiada: "Cada material tiene propiedades (dureza, flexibilidad, transparencia) que lo hacen útil para diferentes usos. Unos vienen de la naturaleza (madera, algodón) y otros los fabrica el ser humano (plástico, vidrio)."\n\n📊 OBSERVACIÓN GUIADA: LUZ Y SOMBRAS\nSe hacen 3 experimentos y los niños observan y registran:\n\nEXPERIMENTO A: La linterna y el libro (opaco). La luz no pasa. Se forma una sombra nítida.\nEXPERIMENTO B: La linterna y el vidrio (transparente). La luz pasa casi toda. Casi no hay sombra.\nEXPERIMENTO C: La linterna y el papel de seda (translúcido). Pasa algo de luz. La sombra es borrosa.\n\nPaso 1: Los niños clasifican más objetos como opacos, transparentes o translúcidos.\nPaso 2: Se pregunta: ¿Cuándo se forma una sombra? Respuesta guiada: "Cuando un objeto opaco bloquea el camino de la luz."\nPaso 3: Se aleja y acerca la linterna: "Cuando el objeto está más cerca de la luz, ¿la sombra es más grande o más pequeña?" (Más grande).\nConclusión: "La luz viaja en línea recta y al encontrar un obstáculo opaco se produce una sombra. Los objetos pueden ser opacos, transparentes o translúcidos según cuánta luz dejen pasar."\n\n📊 OBSERVACIÓN GUIADA: SONIDO Y VIBRACIÓN\nEXPERIMENTO A: Colocar granos de arroz sobre un tambor o una mesa. Golpear suavemente cerca. Los granos saltan. Conclusión: "El sonido se produce por vibraciones. Cuando algo vibra, el aire a su alrededor también vibra y esa vibración llega a nuestros oídos."\n\nEXPERIMENTO B: Ligas de diferente grosor. Estirar y hacer sonar. La liga fina produce un sonido más agudo; la liga gruesa, uno más grave. Conclusión: "Los objetos delgados y tensos vibran más rápido y producen sonidos agudos. Los gruesos y flojos vibran más lento y producen sonidos graves."\n\n📝 REGISTRO: Los niños dibujan en su cuaderno un experimento de luz y uno de sonido, y escriben con sus palabras lo que aprendieron.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Propiedades de los Materiales, Luz y Sonido\n\n🧱 1. LA MATERIA Y LOS MATERIALES\n\nLa materia es todo lo que ocupa un lugar en el espacio y tiene masa. Todo lo que podemos ver, tocar, oler está hecho de materia.\n\n📏 PROPIEDADES DE LOS MATERIALES:\n• COLOR: Rojo, azul, verde, etc. Lo percibimos con la vista.\n• FORMA: Circular, cuadrada, irregular.\n• TAMAÑO: Grande, mediano, pequeño.\n• TEXTURA: Suave (algodón), áspero (lija), liso (vidrio), rugoso (piedra). La percibimos con el tacto.\n• DUREZA: Duro (piedra, metal) si no se raya fácilmente; blando (esponja, plasticina) si se deforma con facilidad.\n• FLEXIBILIDAD: Flexible (goma, tela, plástico delgado) si se dobla sin romperse; rígido (vidrio, madera gruesa) si no se dobla o se quiebra al intentarlo.\n• TRANSPARENCIA:\n  - TRANSPARENTE: Deja pasar la luz y se ve nítidamente a través (vidrio, agua limpia).\n  - TRANSLÚCIDO: Deja pasar algo de luz pero no se ve nítidamente (papel de seda, vidrio esmerilado).\n  - OPACO: No deja pasar la luz (madera, metal, cartón).\n\n📏 ORIGEN DE LOS MATERIALES:\n• NATURALES: Se obtienen directamente de la naturaleza. Ej: madera (de los árboles), piedra (del suelo), algodón (de la planta de algodón), lana (de la oveja), cuero (de animales), arena, arcilla.\n• ARTIFICIALES: Son fabricados por el ser humano a partir de materiales naturales mediante procesos industriales. Ej: plástico (derivado del petróleo), vidrio (de arena fundida), papel (de pulpa de madera), acero (de hierro y carbono).\n\n📏 ESTADOS DE LA MATERIA (nociones básicas):\n• SÓLIDO: Tiene forma y volumen fijos. Ej: piedra, libro, hielo.\n• LÍQUIDO: Tiene volumen fijo pero toma la forma del recipiente. Ej: agua, leche, jugo.\n• GAS: No tiene forma ni volumen fijos; tiende a expandirse. Ej: aire, vapor de agua, gas de cocina (que huele para detectarlo).\n\n💡 2. LA LUZ\n\nLa luz es una forma de energía que nos permite ver los objetos. Viaja en línea recta a gran velocidad (300,000 km por segundo).\n\n📏 FUENTES LUMINOSAS:\n• NATURALES: El Sol (principal fuente de luz y calor para la Tierra), las estrellas, el fuego, algunos seres vivos (luciérnagas).\n• ARTIFICIALES: Creadas por el ser humano: foco, linterna, vela, pantalla del televisor/celular, letrero de neón.\n\n📏 OBJETOS ILUMINADOS: La mayoría de los objetos no emiten luz propia; reflejan la luz que reciben de una fuente luminosa. La Luna no tiene luz propia; refleja la luz del Sol.\n\n📏 REFLEXIÓN DE LA LUZ: Cuando la luz choca con una superficie lisa y brillante (espejo, agua quieta), rebota y cambia de dirección. Por eso vemos nuestra imagen reflejada.\n\n📏 SOMBRAS: Se forman cuando un objeto opaco se interpone en el camino de la luz. Como la luz viaja en línea recta, no puede rodear el objeto, y detrás de él se produce una zona oscura: la sombra.\n\n📏 DESCOMPOSICIÓN DE LA LUZ: La luz blanca (del Sol) está formada por la mezcla de luces de 7 colores: rojo, naranja, amarillo, verde, azul, añil y violeta. Cuando la luz del Sol atraviesa gotas de agua en el cielo después de la lluvia, se descompone y vemos un ARCOÍRIS.\n\n🔊 3. EL SONIDO\n\nEl sonido es otra forma de energía que se produce cuando algo vibra.\n\n📏 ¿CÓMO SE PRODUCE?\nCuando un objeto vibra (por ejemplo, la cuerda de una guitarra al ser pulsada), las partículas de aire que están a su alrededor también vibran. Esta vibración se transmite por el aire en forma de ondas hasta llegar a nuestros oídos. Dentro del oído, el tímpano vibra y el cerebro interpreta esa vibración como sonido.\n\n📏 CUALIDADES DEL SONIDO:\n• INTENSIDAD: Sonidos FUERTES (grito, motor de avión, tambor golpeado fuerte) y SUAVES (susurro, hoja al caer, reloj).\n• TONO O ALTURA: Sonidos AGUDOS (pito, silbato, campanita, voz de niño) y GRAVES (tambor grande, voz de adulto, rugido de león).\n• DURACIÓN: Sonidos LARGOS (sirena de ambulancia, campanada de iglesia) y CORTOS (aplauso, golpe seco, clic).\n• TIMBRE: Es lo que nos permite distinguir dos sonidos del mismo tono e intensidad producidos por diferentes fuentes. Por eso diferenciamos la voz de mamá de la de papá, o un piano de una flauta.\n\n📏 PROPAGACIÓN DEL SONIDO: El sonido viaja por el aire, pero también puede viajar por el agua (los buzos escuchan sonidos bajo el agua) y por los sólidos (si golpeas una mesa con la oreja pegada a ella, se escucha más fuerte porque la madera transmite mejor el sonido que el aire). En el espacio exterior el sonido NO viaja porque no hay aire.\n\n⚠️ ERRORES COMUNES Y CÓMO EVITARLOS:\n• Creer que la Luna emite su propia luz. → La Luna refleja la luz del Sol.\n• Pensar que el sonido solo viaja por el aire. → También viaja por líquidos y sólidos.\n• Creer que el color es una propiedad que "tienen" los objetos por sí mismos. → El color que vemos depende de la luz que el objeto refleja. Un plátano se ve amarillo porque refleja la luz amarilla y absorbe las demás.\n• No distinguir entre transparente y translúcido. → Si se ve claramente a través, es transparente; si se ve borroso, es translúcido.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Propiedades de los Materiales\n1. Usa tus sentidos y describe estos objetos:\na) Una piedra: (dura, áspera, opaca, pesada, de color gris).\nb) Un trozo de algodón: (blando, suave, opaco, liviano, blanco).\nc) Un vaso de vidrio: (duro, liso, transparente, frágil).\n2. Clasifica según origen (Natural o Artificial):\nMadera (N), Plástico (A), Piedra (N), Papel (A), Lana (N), Vidrio (A), Algodón (N), Metal (A/N - se obtiene de minerales naturales pero requiere proceso).\n3. ¿Qué propiedad usarías para...?\na) Un paraguas (impermeable - que no pasa el agua).\nb) Una ventana (transparente).\nc) Una almohada (blanda, suave).\nd) Un martillo (duro, pesado, rígido).\n\n📝 BLOQUE 2: Luz\n4. Di si estas fuentes de luz son Naturales o Artificiales:\nSol (N), Linterna (A), Luciérnaga (N), Foco (A), Estrella (N), Vela (A).\n5. ¿Qué tipo de objeto es...?\nVidrio (Transparente), Cartón (Opaco), Papel manteca (Translúcido), Madera (Opaco), Agua limpia (Transparente), Plástico de botella de leche (Translúcido).\n6. Si iluminas un balón con una linterna, ¿se forma sombra? (Sí, porque es opaco). ¿Y si iluminas una ventana? (No, porque es transparente).\n7. Dibuja la sombra de un árbol cuando el sol está a la izquierda. (La sombra se proyecta hacia la derecha).\n\n📝 BLOQUE 3: Sonido\n8. Clasifica los sonidos en Fuerte (F) o Suave (S):\nExplosión (F), Susurro (S), Tambor (F), Hoja cayendo (S), Motor de avión (F).\n9. Clasifica los sonidos en Agudo (A) o Grave (G):\nPito (A), Tambor grande (G), Silbato (A), Voz de señor (G), Campanita (A), Rugido de león (G).\n10. ¿Por qué en el espacio exterior no se escuchan sonidos? (Porque no hay aire ni otro medio para que las vibraciones viajen).\n11. ¿Cómo funciona el teléfono de vasitos? (La voz hace vibrar el fondo del vaso, la vibración viaja por el hilo tenso y llega al otro vaso, que vibra y reproduce el sonido).\n\n📝 BLOQUE 4: Experimentos mentales\n12. Tienes dos cajas cerradas. Una contiene una campanita de metal y la otra un borrador. Agitas ambas. ¿Cómo sabes cuál es cuál sin abrirlas? (La de la campanita suena; la del borrador no, o suena muy apagado).\n13. Si pones un lápiz dentro de un vaso con agua y lo miras de lado, ¿se ve recto o quebrado? (Parece quebrado porque la luz cambia de dirección al pasar del agua al aire. Esto se llama refracción).\n14. Explica por qué no debes mirar directamente al Sol. (Su luz es tan intensa que puede dañar los ojos permanentemente; además emite radiación ultravioleta).\n\n⏱️ Tiempo: 60-80 min. ✅ Revisión entre todos, aclarando dudas.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Seres Vivos, Tierra y Universo y Matemática\n\n🔬 CONEXIÓN CON SERES VIVOS:\n• Los órganos de los sentidos (vista, oído, tacto) son los instrumentos biológicos que nos permiten percibir las propiedades de los materiales, la luz y el sonido.\n• Muchos animales tienen adaptaciones sorprendentes relacionadas con la luz y el sonido: los murciélagos usan ultrasonidos (ecolocalización); los búhos ven en la oscuridad; los camaleones cambian de color.\n• Las plantas detectan la luz y crecen hacia ella (fototropismo).\n• Los colores de las flores atraen a insectos polinizadores: es una estrategia de supervivencia basada en la luz.\n\n🌍 CONEXIÓN CON TIERRA Y UNIVERSO:\n• El Sol es la fuente de luz natural más importante para la Tierra; sin él no habría vida ni ciclo del agua.\n• El día y la noche dependen de la luz solar.\n• El viento (aire en movimiento) transporta sonidos.\n• Los relámpagos son luz (descarga eléctrica) y los truenos son sonido. Como la luz viaja más rápido, primero vemos el relámpago y luego escuchamos el trueno.\n\n🧮 CONEXIÓN CON MATEMÁTICA:\n• Clasificar y agrupar objetos según sus propiedades (conjuntos).\n• Crear patrones con sonidos: fuerte-suave-fuerte-suave (patrón AB).\n• Medir sombras a diferentes horas del día y registrar longitudes (noción de medida).\n• Contar cuántos objetos transparentes, translúcidos y opacos hay en el aula.\n\n🧩 ACTIVIDAD INTEGRADORA: "El semáforo sensorial": Los niños crean un cartel clasificador usando los tres colores del semáforo. En el círculo rojo pegan objetos opacos, en el amarillo translúcidos y en el verde transparentes. Explican por qué cada objeto va en ese color.\n\n💡 REFLEXIÓN: Los mismos ojos que ven los colores, los oídos que escuchan la música y las manos que tocan las texturas son las herramientas con las que exploramos el universo. La ciencia comienza con los sentidos.`,
            6: `🌍 CORRELACIONES EXTERNAS: La materia, la luz y el sonido en la vida cotidiana y la tecnología\n\n🏠 EN CASA:\n• ¿Por qué las ollas son de metal? (Porque el metal conduce bien el calor). ¿Y por qué sus mangos son de plástico o madera? (Porque son aislantes y no queman las manos).\n• Los espejos nos permiten vernos y decorar la casa.\n• Las cortinas translúcidas dejan pasar algo de luz sin que nos vean desde afuera.\n• El microondas usa ondas electromagnéticas (otro tipo de luz que no vemos) para calentar los alimentos.\n\n🎵 EN LA MÚSICA Y EL ARTE:\n• Los instrumentos musicales producen sonido por vibración: cuerdas (guitarra, violín), percusión (tambor, maracas), viento (flauta, trompeta).\n• Los pintores mezclan colores (luz reflejada) para crear obras de arte.\n• El cine y la televisión usan luces de colores para contar historias.\n\n👓 EN LA TECNOLOGÍA:\n• Los lentes y lupas usan la refracción de la luz para aumentar imágenes.\n• Las cámaras fotográficas capturan la luz reflejada por los objetos y la guardan como imagen.\n• Los audífonos convierten señales eléctricas en sonido.\n• Los teléfonos celulares transmiten la voz transformándola en ondas electromagnéticas (luz invisible).\n\n🔬 EN LA CIENCIA Y LA MEDICINA:\n• Los rayos X son un tipo de luz invisible que permite ver los huesos dentro del cuerpo.\n• Las ecografías usan ultrasonido (sonido de frecuencia tan alta que no lo oímos) para ver al bebé dentro de la mamá.\n• Los estetoscopios amplifican los sonidos del corazón y los pulmones para que el médico los escuche mejor.\n\n🧠 REFLEXIÓN FINAL: "Vivimos rodeados de materia y energía. Desde el lápiz que tomas hasta la luz que te permite leer y el sonido de la campana del recreo, todo es materia y energía. Aprender a observarlas, medirlas y comprenderlas es el primer paso para convertirte en científico."\n\n🗣️ CITA: "Nada se pierde, nada se crea, todo se transforma." — Antoine Lavoisier (sobre la materia). Y podríamos añadir: "La energía tampoco se crea ni se destruye, solo cambia de forma." — Principio de conservación de la energía.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Museo Interactivo de la Materia, la Luz y el Sonido"\n\n🎯 OBJETIVO: Crear un museo en el aula con exhibiciones interactivas donde los visitantes puedan experimentar con las propiedades de los materiales, la luz y el sonido.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ORGANIZACIÓN (1 sesión)\n• 5 equipos especializados:\n  - Equipo "Texturas y Materiales": explora la clasificación de objetos por sus propiedades y origen.\n  - Equipo "Sombras Chinescas": explora la formación de sombras con un teatrín.\n  - Equipo "Arcoíris y Colores": explora la descomposición de la luz con prismas y agua.\n  - Equipo "Instrumentos Musicales Reciclados": explora la producción de sonidos con materiales reciclados.\n  - Equipo "Teléfonos y Vibraciones": explora la transmisión del sonido por diferentes medios.\n\nFASE 2: DISEÑO Y CONSTRUCCIÓN (2-3 sesiones)\n• EQUIPO TEXTURAS Y MATERIALES: Crean un "Panel de las 100 texturas" pegando sobre cartón trozos de diferentes materiales etiquetados (lija, terciopelo, plástico de burbujas, cartón corrugado, etc.). Juego: "Adivina la textura con los ojos vendados".\n• EQUIPO SOMBRAS CHINESCAS: Construyen un teatrín con una caja de cartón, papel seda blanco como pantalla y una linterna. Recortan siluetas de cartulina negra (animales, personas) y montan una pequeña obra de sombras para los visitantes.\n• EQUIPO ARCOÍRIS Y COLORES: Consiguen un prisma de vidrio o usan un CD para descomponer la luz blanca. Crean "discos de Newton" (círculo de cartón pintado con los 7 colores del arcoíris; al girarlo rápido, se ve blanco).\n• EQUIPO INSTRUMENTOS MUSICALES RECICLADOS: Fabrican una "orquesta reciclada": maracas con botellas y arroz, tambor con lata y globo, guitarra con caja y ligas, flauta con pajillas de diferentes largos. Ensayan una melodía sencilla.\n• EQUIPO TELÉFONOS Y VIBRACIONES: Fabrican teléfonos de vasitos de diferentes tamaños y materiales (plástico, tecnopor, cartón). Prueban cuál transmite mejor el sonido. Hacen un experimento: ¿funciona si el hilo está flojo? (No, debe estar tenso). ¿Y si el hilo es de lana en vez de pabilo? (La lana absorbe más vibración).\n\nFASE 3: MONTAJE Y ENSAYO (1 sesión)\n• Cada equipo monta su exhibición en una mesa del aula.\n• Preparan un cartel con el nombre de la exhibición, los materiales usados y una explicación sencilla.\n• Ensayan cómo guiar a los visitantes y responder preguntas.\n\nFASE 4: MUSEO ABIERTO (1 sesión)\n• Invitan a padres y otros salones.\n• Los visitantes rotan libremente por las 5 estaciones.\n• Cada equipo atiende su estación, explica el fenómeno y ayuda a los visitantes a experimentar.\n• Los visitantes llenan una breve "encuesta" dibujando una carita feliz en la estación que más les gustó.\n\nFASE 5: CIERRE Y REFLEXIÓN (1 sesión)\n• Recuento de visitantes y estación más votada (noción de estadística y gráfico de barras).\n• Plenaria: ¿Qué exhibición fue la más visitada? ¿Qué aprendieron al explicar los experimentos? ¿Qué mejorarían?\n• Diplomas de "Científico Junior".\n\n🏆 EVALUACIÓN: Calidad de la exhibición, claridad de las explicaciones, trabajo en equipo, creatividad, manejo de los conceptos científicos.\n🎉 CIERRE: El museo se deja montado una semana para que otros grados lo visiten. "Museo Interactivo de la Materia, la Luz y el Sonido - IEP Escuela Hogar Ventanilla".`,
        };

        const leccionExtensaTUIII = {
            0: `🎯 OBJETIVO GENERAL: Introducir a los estudiantes de 1° y 2° grado de primaria en el conocimiento de la Tierra y el Universo, explorando los fenómenos del día y la noche, los elementos de la naturaleza (aire, agua y suelo), y los cambios atmosféricos básicos, desarrollando la observación del entorno y la conciencia ambiental desde edades tempranas.\n\n🎯 OBJETIVOS PARTICULARES:\n• Comprender que la Tierra gira sobre su propio eje, lo que origina el día (cuando el Sol ilumina nuestra parte de la Tierra) y la noche (cuando nuestra parte queda en oscuridad).\n• Reconocer al Sol como una estrella que nos proporciona luz y calor.\n• Identificar los tres elementos fundamentales de la naturaleza: aire, agua y suelo.\n• Comprender la importancia del aire para los seres vivos (respiración).\n• Identificar fuentes de agua: ríos, lagos, mar, lluvia, y reconocer la importancia del agua para la vida.\n• Reconocer que el suelo es la capa superficial de la Tierra donde crecen las plantas y viven muchos organismos.\n• Diferenciar los cambios atmosféricos: soleado, nublado, lluvioso, ventoso, tormentoso.\n• Describir las características generales de las estaciones del año en el Perú (verano, invierno, con nociones de otoño y primavera).\n• Valorar el cuidado del aire, el agua y el suelo, evitando su contaminación.\n\n📌 NOCIONES PRINCIPALES:\n• El día y la noche: la Tierra gira (rotación).\n• El Sol: estrella, fuente de luz y calor.\n• Aire: mezcla de gases, invisible pero presente. Viento: aire en movimiento.\n• Agua: líquido esencial para la vida. Estados del agua (sólido, líquido, gas). Ciclo del agua (nociones muy básicas).\n• Suelo: capa de la Tierra donde se sostienen las plantas. Contiene arena, arcilla, piedras y materia orgánica.\n• Cambios atmosféricos: soleado, nublado, lluvia, viento, tormenta, arcoíris.\n\n📌 NOCIONES SECUNDARIAS:\n• Los puntos cardinales: por dónde sale el Sol (Este) y por dónde se pone (Oeste).\n• Fases de la Luna: Luna llena, cuarto menguante, Luna nueva, cuarto creciente.\n• Tipos de nubes: cumulus (algodón), stratus (capa gris), cirrus (plumas altas).\n• Contaminación del aire (humo de fábricas y autos), del agua (basura, desagües) y del suelo (residuos sólidos).\n• Acciones sencillas para cuidar el planeta: cerrar el caño, no tirar basura, sembrar una planta.\n\n🌍 INTERESES SOCIETALES:\n• Comprender el día y la noche ayuda a los niños a organizar su rutina diaria: actividades diurnas y descanso nocturno.\n• El agua es un recurso cada vez más escaso; aprender a valorarla y no desperdiciarla es una prioridad global, especialmente en zonas como Ventanilla, cercana al mar pero con problemas de acceso al agua potable.\n• El aire limpio es fundamental para la salud respiratoria; entender qué lo contamina ayuda a tomar conciencia.\n• Observar el cielo, las nubes y los astros ha fascinado a la humanidad desde siempre y es el inicio del pensamiento astronómico.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Exploradores del cielo y la tierra"\n\n🧩 MATERIALES: Globo terráqueo, linterna (para simular el Sol), frascos con muestras de suelo (arena, tierra de jardín, arcilla), vasos transparentes, agua, piedras, filtros de café, molinillos de viento, botellas con spray para simular lluvia, termómetro simple, veleta casera, láminas de tipos de nubes.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Simulando el día y la noche" – En un cuarto oscurecido, un niño sostiene una linterna (el Sol) y otro hace girar lentamente el globo terráqueo. Observan que cuando el Perú está iluminado, es de día; cuando gira y queda en la sombra, es de noche. Comprenden que es el movimiento de rotación de la Tierra (24 horas) el que causa el día y la noche.\n\nESTACIÓN 2: "Descubriendo el aire" – Los niños realizan varios experimentos para comprobar que el aire existe aunque no lo veamos:\n• Agitan un abanico o un cuaderno frente a su cara: sienten el viento.\n• Inflan una bolsa de plástico y la cierran: "atrapan" aire.\n• Soplan con una pajilla en un vaso con agua: ven burbujas (el aire desplaza el agua).\n• Hacen girar un molinillo de viento: el viento (aire en movimiento) es capaz de mover objetos.\n\nESTACIÓN 3: "El suelo bajo nuestros pies" – En una mesa hay 3 bandejas con diferentes tipos de suelo: arena de playa, tierra negra de jardín y arcilla roja. Los niños los observan con lupa, los tocan con las manos, los huelen. Describen el color, la textura y si están húmedos o secos. Luego ponen un poco de cada tipo en un vaso con agua y agitan: ¿cuál se disuelve más rápido? (La arcilla enturbia el agua; la arena se va al fondo).\n\nESTACIÓN 4: "Meteorólogos por un día" – Se prepara un rincón con láminas de diferentes estados del tiempo (soleado, nublado, lluvia, tormenta, arcoíris). Los niños:\n• Observan por la ventana y describen cómo está el día.\n• Colocan un cartel con el dibujo correspondiente.\n• Miden la temperatura con un termómetro simple (si hace frío o calor).\n• Con una veleta casera observan la dirección del viento.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Por qué hay día y noche? ¿Cómo sabemos que existe el aire si no lo vemos? ¿Todos los suelos son iguales? ¿Cómo está el día hoy? ¿Qué pasaría si no tuviéramos agua?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Del experimento a la comprensión del mundo"\n\n📊 OBSERVACIÓN GUIADA: EL DÍA Y LA NOCHE\nLa maestra coloca un reloj de cartulina con las 24 horas marcadas. Pregunta: ¿A qué hora sale el sol aproximadamente? (6 a.m.). ¿A qué hora se pone? (6 p.m.). Los niños cuentan: desde que sale hasta que se pone hay 12 horas de luz (día). Desde que se pone hasta que vuelve a salir hay 12 horas de oscuridad (noche).\n\nCon el globo terráqueo y la linterna, se marca una calcomanía en el Perú. Los niños observan:\n• Cuando el Perú está frente a la linterna: es de día. El Perú recibe luz y calor.\n• La maestra gira el globo: el Perú pasa a la parte trasera (sin luz): es de noche.\n• Conclusión guiada: "La Tierra gira como un trompo sobre su propio eje. Tarda 24 horas en dar una vuelta completa. Mientras una mitad de la Tierra está iluminada (día), la otra está a oscuras (noche)."\n\n📊 OBSERVACIÓN GUIADA: EL AGUA Y SUS ESTADOS\nLa maestra muestra tres imágenes o hace una demostración:\n• Un vaso con agua líquida (la que bebemos).\n• Un cubo de hielo (agua sólida, fría).\n• El vapor que sale de una taza de agua caliente o de una pava (agua en estado gaseoso).\n\nPreguntas: ¿Qué es el hielo? (Agua congelada). ¿Qué es el vapor? (Agua convertida en gas por el calor). ¿De dónde viene el agua que tomamos? (De los ríos, de la lluvia, del deshielo de los nevados).\nConclusión guiada: "El agua puede encontrarse en tres estados: sólido (hielo, nieve), líquido (ríos, mar, lluvia) y gaseoso (vapor de agua, nubes). El agua no desaparece; se transforma y viaja por el planeta: es el ciclo del agua."\n\n📊 OBSERVACIÓN GUIADA: EL SUELO Y SUS COMPONENTES\nSe hace un experimento de sedimentación: en un frasco transparente con agua se echa una mezcla de suelo de jardín, arena y piedritas. Se agita y se deja reposar.\n\nDespués de 10-15 minutos, los niños observan capas:\n• En el fondo: piedritas y arena gruesa.\n• En el medio: arena fina y limo.\n• Arriba: arcilla y restos de plantas (materia orgánica).\n• Flotando en la superficie: pequeñas hojas, raicillas.\nConclusión guiada: "El suelo no es solo 'tierra'; está formado por diferentes materiales: piedras, arena, arcilla y restos de seres vivos. Es la capa donde crecen las plantas y viven muchos animalitos (lombrices, hormigas)."\n\n📝 REGISTRO: Cada niño dibuja en su cuaderno el experimento del día y la noche con el globo y la linterna. Escribe (o dicta a la maestra) una frase que resuma lo aprendido: "La Tierra gira y por eso hay día y noche."`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: El Día y la Noche, el Aire, el Agua, el Suelo y los Cambios Atmosféricos\n\n🌍 1. EL DÍA Y LA NOCHE\n\nLa Tierra en que vivimos es un planeta que gira constantemente sobre su propio eje imaginario, como un trompo o una peonza. Este movimiento se llama ROTACIÓN y tarda 24 horas en dar una vuelta completa.\n\n📏 ¿QUÉ PRODUCE LA ROTACIÓN?\n• La mitad de la Tierra que está frente al Sol recibe luz y calor: es de DÍA.\n• La otra mitad está en la oscuridad: es de NOCHE.\n• Como la Tierra gira, el día y la noche se van alternando continuamente.\n\n☀️ EL SOL: Es la estrella más cercana a la Tierra. Es una gigantesca esfera de gas caliente que emite luz y calor. Sin el Sol, la Tierra sería un planeta oscuro y helado, sin vida.\n\n🌙 LA LUNA: Es el satélite natural de la Tierra. No tiene luz propia; refleja la luz del Sol. Sus fases (llena, menguante, nueva, creciente) se deben a la posición relativa entre el Sol, la Luna y la Tierra.\n\n💨 2. EL AIRE\n\nEl aire es una mezcla invisible de gases que rodea la Tierra formando la atmósfera.\n\n📏 COMPOSICIÓN DEL AIRE (simplificada):\n• Nitrógeno (el gas más abundante).\n• Oxígeno (el gas que necesitamos para respirar).\n• Dióxido de carbono (lo usan las plantas para hacer la fotosíntesis).\n• Vapor de agua.\n\n📏 CARACTERÍSTICAS DEL AIRE:\n• Es invisible, inodoro (no huele) e insípido (no tiene sabor).\n• Ocupa espacio (por eso una bolsa inflada se vuelve redonda).\n• Se mueve: el aire en movimiento se llama VIENTO.\n• Es esencial para la respiración de los seres vivos (animales y plantas).\n\n💧 3. EL AGUA\n\nEl agua es un líquido transparente, sin olor ni sabor, esencial para la vida. Cubre la mayor parte de la superficie terrestre (mares y océanos).\n\n📏 ¿DÓNDE ENCONTRAMOS AGUA?\n• EN LOS OCEÁNOS Y MARES: Es agua salada. Representa la mayor cantidad de agua del planeta, pero no se puede beber directamente.\n• EN LOS RÍOS, LAGOS Y LAGUNAS: Es agua dulce. Es la que usamos para beber, cocinar y regar.\n• EN LAS NUBES Y LA LLUVIA: El agua se evapora del mar y de los ríos con el calor del Sol, sube como vapor, forma nubes, y luego cae como lluvia (o nieve en las montañas altas). Este viaje constante se llama CICLO DEL AGUA.\n\n📏 ESTADOS DEL AGUA:\n• SÓLIDO: Hielo (a temperaturas bajo 0°C) y nieve.\n• LÍQUIDO: Agua que bebemos, ríos, mar.\n• GASEOSO: Vapor de agua (invisible, en el aire).\n\n📏 IMPORTANCIA DEL AGUA:\n• Para beber y mantenernos hidratados.\n• Para la higiene personal (bañarse, lavarse las manos).\n• Para cocinar los alimentos.\n• Para regar las plantas.\n• Para el aseo del hogar.\n• Los animales también necesitan agua.\n\n🪨 4. EL SUELO\n\nEl suelo es la capa más superficial de la corteza terrestre. Es donde pisamos, donde construimos nuestras casas y, sobre todo, donde crecen las plantas que nos alimentan.\n\n📏 COMPOSICIÓN DEL SUELO:\n• ARENA: Partículas gruesas y sueltas. Suelo arenoso (playa, desierto).\n• ARCILLA: Partículas muy finas y compactas. Suelo arcilloso (retiene mucha agua).\n• LIMO: Partículas de tamaño intermedio.\n• MATERIA ORGÁNICA (HUMUS): Restos de plantas y animales en descomposición. Aporta nutrientes. Un suelo oscuro suele ser rico en materia orgánica.\n• PIEDRAS Y ROCAS: Fragmentos de diferentes tamaños.\n\n📏 IMPORTANCIA DEL SUELO:\n• Sostiene y nutre a las plantas.\n• Es el hábitat de muchos seres vivos (lombrices, insectos, hongos, bacterias).\n• Filtra y almacena agua subterránea.\n\n📏 CONTAMINACIÓN DEL SUELO: Tirar basura, plásticos, pilas o productos químicos contamina el suelo y lo daña.\n\n☀️🌧️ 5. LOS CAMBIOS ATMOSFÉRICOS (EL TIEMPO Y EL CLIMA)\n\nEl tiempo atmosférico es el estado de la atmósfera en un lugar y momento determinados.\n\n📏 ELEMENTOS DEL TIEMPO:\n• TEMPERATURA: ¿Hace calor o hace frío? Se mide con el termómetro (grados Celsius, °C).\n• PRECIPITACIÓN: Agua que cae de las nubes: lluvia, llovizna, granizo, nieve.\n• VIENTO: Aire en movimiento. Puede ser brisa suave, viento moderado o viento fuerte.\n• NUBOSIDAD: Día soleado (sin nubes o pocas nubes), parcialmente nublado (sol y nubes), nublado (cubierto).\n\n📏 FENÓMENOS ATMOSFÉRICOS:\n• DÍA SOLEADO: El sol brilla sin nubes.\n• DÍA NUBLADO: Las nubes cubren total o parcialmente el cielo.\n• LLUVIA: Caída de gotas de agua de las nubes.\n• TORMENTA ELÉCTRICA: Lluvia fuerte acompañada de relámpagos (luz) y truenos (sonido).\n• ARCOÍRIS: Aparece cuando llueve y sale el sol al mismo tiempo. La luz blanca se descompone en 7 colores.\n• GRANIZO: Caída de pequeñas bolas de hielo.\n\n📏 ESTACIONES DEL AÑO (EN EL PERÚ):\n• VERANO (diciembre-marzo): Hace más calor, días más largos. En la sierra y selva es temporada de lluvias.\n• OTOÑO (marzo-junio): El calor empieza a disminuir.\n• INVIERNO (junio-septiembre): Hace más frío, días más cortos. En la costa hay neblina y garúa (llovizna fina).\n• PRIMAVERA (septiembre-diciembre): Clima templado, florecen muchas plantas.\n⚠️ En la costa peruana no hay estaciones tan marcadas como en otros países; no cae nieve en la costa.\n\n⚠️ ERRORES COMUNES Y CÓMO EVITARLOS:\n• Creer que el Sol se mueve alrededor de la Tierra. → Es la Tierra la que gira sobre sí misma y alrededor del Sol.\n• Decir que el aire "no es nada" o "está vacío". → El aire es materia: ocupa espacio y tiene masa.\n• Pensar que toda el agua del planeta se puede beber. → Solo una pequeñísima parte es agua dulce accesible.\n• No distinguir entre tiempo atmosférico (hoy está soleado) y clima (Lima tiene clima desértico y húmedo).`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: El Día y la Noche\n1. Completa:\na) La _____ (Tierra) gira sobre su propio eje.\nb) El movimiento de la Tierra que produce el día y la noche se llama _____ (rotación).\nc) La Tierra tarda _____ horas en dar una vuelta completa. (24).\nd) Cuando el Sol ilumina nuestra parte de la Tierra es de _____ (día).\ne) Cuando nuestra parte de la Tierra está en la sombra es de _____ (noche).\n2. Dibuja la Tierra, el Sol (con rayos) y una flecha que indique hacia dónde gira.\n3. ¿El Sol es una estrella o un planeta? (Una estrella). ¿Y la Luna? (Un satélite natural).\n\n📝 BLOQUE 2: El Aire\n4. ¿Verdadero o Falso?\na) El aire se puede ver (F)\nb) El aire ocupa espacio (V)\nc) Los seres vivos necesitan oxígeno del aire para respirar (V)\nd) El viento es aire que se mueve (V)\ne) El aire no existe porque no se ve (F)\n5. Nombra dos formas de comprobar que el aire existe.\n(Ej: inflar una bolsa, ver las hojas de un árbol moverse, sentir el viento en la cara).\n\n📝 BLOQUE 3: El Agua\n6. Completa las oraciones:\na) El agua de los mares y océanos es _____ (salada).\nb) El agua de los ríos y lagos es _____ (dulce).\nc) El agua que bebemos debe ser agua _____ (dulce y potable, limpia).\n7. Une los estados del agua:\nHielo → Sólido\nAgua del caño → Líquido\nVapor de la pava → Gaseoso\n8. Explica con tus palabras por qué es importante el agua.\n\n📝 BLOQUE 4: El Suelo\n9. ¿De qué está formado el suelo? Nombra al menos 3 componentes.\n(Arena, arcilla, piedras, restos de plantas/humus).\n10. ¿Para qué sirve el suelo?\na) Para que crezcan las ______ (plantas).\nb) Para que vivan ______ (animales como lombrices y hormigas).\nc) Para ______ nuestras casas (construir).\n11. Dibuja las 3 capas que se forman cuando mezclas suelo con agua y lo dejas reposar.\n\n📝 BLOQUE 5: Cambios Atmosféricos\n12. Dibuja el símbolo que representa:\nSoleado (☀️), Nublado (☁️), Lluvioso (🌧️), Tormenta (⛈️).\n13. ¿Qué instrumento usamos para medir la temperatura? (Termómetro).\n14. ¿Cómo se llama el agua que cae de las nubes? (Lluvia).\n15. ¿Qué estación del año es la más calurosa en el Perú? (Verano). ¿Y la más fría? (Invierno).\n16. Describe cómo está el tiempo hoy: ________________________________.\n\n📝 BLOQUE 6: Cuidado del Planeta\n17. Escribe 3 cosas que puedes hacer para cuidar el agua, el aire y el suelo.\n(Ej: cerrar el caño al cepillarme, no tirar basura al suelo, no quemar basura).\n\n⏱️ Tiempo: 50-70 min. ✅ Revisión grupal con discusión.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Seres Vivos, Materia y Energía y Matemática\n\n🔬 CONEXIÓN CON SERES VIVOS:\n• El día y la noche influyen en los ritmos de vida de plantas y animales: hay animales diurnos (mariposa, gallina, perro) y nocturnos (búho, murciélago, luciérnaga).\n• Las plantas necesitan luz solar (día) para hacer la fotosíntesis y producir su alimento.\n• El agua y el suelo son fundamentales para la vida vegetal y animal.\n• La contaminación del aire, agua y suelo afecta directamente la salud de todos los seres vivos.\n\n🔬 CONEXIÓN CON MATERIA Y ENERGÍA:\n• El aire, el agua y el suelo son materia en diferentes estados.\n• El Sol es la principal fuente de energía para la Tierra (luz y calor).\n• El viento (aire en movimiento) tiene energía y puede mover objetos (molinos, veleros).\n• El ciclo del agua implica cambios de estado (evaporación, condensación).\n\n🧮 CONEXIÓN CON MATEMÁTICA:\n• Contar los días soleados, nublados y lluviosos del mes y construir un gráfico de barras.\n• Medir la temperatura cada día a la misma hora y anotarla en una tabla.\n• Registrar la hora de salida y puesta del sol y calcular cuántas horas de luz hay.\n• Relacionar con la medición del tiempo: 24 horas = 1 día; 7 días = 1 semana.\n\n🧩 ACTIVIDAD INTEGRADORA: "Calendario Meteorológico Mensual": Cada día, un estudiante responsable (el "meteorólogo de turno") observa el cielo y registra en un calendario grande: el tipo de día (soleado, nublado, lluvia), la temperatura aproximada (calor, templado, frío) y la dirección del viento. Al final del mes, cuentan y grafican.\n\n💡 REFLEXIÓN: La Tierra es nuestra casa. El aire que respiramos, el agua que bebemos y el suelo que nos alimenta son regalos que debemos cuidar. Conocer cómo funciona nuestro planeta es el primer paso para protegerlo.`,
            6: `🌍 CORRELACIONES EXTERNAS: La Tierra y el Universo en la vida cotidiana\n\n⏰ EN LA VIDA DIARIA:\n• Organizamos nuestras actividades según el día y la noche: estudiar y trabajar de día, dormir de noche.\n• Los gallos cantan al amanecer; muchas flores se abren de día y se cierran de noche.\n• Consultamos el pronóstico del tiempo para decidir cómo vestirnos o si llevar paraguas.\n\n🌾 EN LA AGRICULTURA:\n• Los agricultores dependen de las lluvias para sus cultivos. En la sierra, la temporada de lluvias determina cuándo sembrar y cosechar.\n• El tipo de suelo influye en lo que se puede cultivar (papa en suelo andino, arroz en suelos inundables de la costa y selva).\n• La rotación de cultivos evita que el suelo se "canse" y pierda nutrientes.\n\n🏗️ EN LA CONSTRUCCIÓN:\n• Antes de construir una casa, se estudia el tipo de suelo para asegurar que sea firme.\n• Las ventanas se orientan según la trayectoria del Sol para aprovechar la luz natural.\n• En zonas lluviosas, los techos tienen inclinación para que el agua escurra.\n\n🔭 EN LA ASTRONOMÍA Y LA EXPLORACIÓN ESPACIAL:\n• Gracias a que entendemos el movimiento de la Tierra y otros planetas, podemos enviar satélites y naves al espacio.\n• Los observatorios astronómicos (como el de Arequipa, en el Perú) estudian las estrellas y galaxias.\n• El Perú tiene cielos muy limpios en la sierra y en el desierto, ideales para la astronomía.\n\n🌎 EN LA CONSERVACIÓN DEL MEDIO AMBIENTE:\n• Cuidar el agua: una ducha de 5 minutos gasta unos 40 litros; cerrar el caño mientras nos enjabonamos ahorra mucha agua.\n• Cuidar el aire: los árboles purifican el aire; por eso es importante sembrar árboles y no quemar basura.\n• Cuidar el suelo: recoger la basura y no usar pesticidas tóxicos evita que el suelo se contamine y pierda fertilidad.\n\n🧠 REFLEXIÓN FINAL: "Somos polvo de estrellas", dijo el astrónomo Carl Sagan. Los átomos que forman nuestro cuerpo se crearon en el interior de estrellas que explotaron hace miles de millones de años. Somos parte del universo. Cuidar la Tierra es cuidar nuestro único hogar en la inmensidad del cosmos.\n\n🗣️ CITA: "La Tierra no nos pertenece; nosotros pertenecemos a la Tierra." — Jefe Seattle (adaptación).`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Guardianes del Planeta: Campaña de Cuidado del Aire, Agua y Suelo"\n\n🎯 OBJETIVO: Desarrollar y ejecutar una campaña escolar de sensibilización sobre el cuidado del aire, el agua y el suelo, aplicando los conocimientos adquiridos y promoviendo hábitos responsables en toda la comunidad educativa.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ORGANIZACIÓN (1 sesión)\n• 4 equipos y un comité organizador:\n  - Equipo "Defensores del Agua"\n  - Equipo "Vigilantes del Aire"\n  - Equipo "Cuidadores del Suelo"\n  - Equipo "Embajadores del Día y la Noche"\n  - Comité de Comunicaciones: elaboran un megáfono de cartulina para anunciar la campaña.\n\nFASE 2: INVESTIGACIÓN Y PROPUESTAS (1 sesión)\n• Cada equipo investiga con ayuda de la maestra y de láminas:\n  - DEFENSORES DEL AGUA: ¿Cómo llega el agua a nuestra escuela? ¿Se desperdicia? Proponen acciones: cerrar bien los caños, no jugar con el agua del baño.\n  - VIGILANTES DEL AIRE: ¿Hay algo que contamine el aire en la escuela o el barrio (quema de basura, mucho polvo)? Proponen: sembrar una planta en la escuela para purificar el aire.\n  - CUIDADORES DEL SUELO: ¿Hay basura en el patio? ¿Hay área verde? Proponen: limpiar el patio de la escuela y colocar tachos para reciclar.\n  - EMBAJADORES DEL DÍA Y LA NOCHE: Preparan una presentación breve con globo terráqueo y linterna para explicar a los más pequeños por qué hay día y noche.\n\nFASE 3: CREACIÓN DE MATERIALES DE CAMPAÑA (2 sesiones)\n• Cada equipo elabora afiches con dibujos y frases cortas:\n  - "¡Cierra el caño, el agua se acaba!"\n  - "¡No quemes basura, cuida el aire!"\n  - "¡La basura en el tacho, no en el suelo!"\n  - "¡El Sol nos da luz y calor, cuidemos nuestro planeta!"\n• El Comité de Comunicaciones prepara un "periódico mural" con los afiches en un lugar visible de la escuela.\n\nFASE 4: EJECUCIÓN DE LA CAMPAÑA (1 sesión)\n• Los equipos recorren otros salones (con permiso de la maestra) y presentan sus mensajes en 3 minutos.\n• Los Defensores del Agua hacen una demostración: cuentan cuántas gotas caen de un caño mal cerrado en 1 minuto y calculan cuánta agua se desperdicia en un día.\n• Los Cuidadores del Suelo dirigen una breve jornada de limpieza en el patio con los más pequeños.\n• Los Vigilantes del Aire enseñan a hacer un molinillo de viento para sentir el aire.\n\nFASE 5: EVALUACIÓN Y CIERRE (1 sesión)\n• Plenaria: ¿Cuántos salones visitaron? ¿Qué mensaje caló más? ¿Notaron cambios en la escuela (caños mejor cerrados, menos basura)?\n• Cada equipo escribe un "compromiso de guardián": "Yo, (nombre), me comprometo a...".\n• Se pegan los compromisos en un árbol de papel en el aula: "El árbol de los Guardianes del Planeta".\n\n🏆 EVALUACIÓN: Impacto de la campaña, creatividad en los materiales, trabajo en equipo, claridad del mensaje, participación de todos.\n🎉 CIERRE: Entrega de medallas (de cartulina y cinta) con la insignia: "Guardián del Planeta".\nFrase final: "¡Pequeñas acciones, grandes cambios!"`,
        };
