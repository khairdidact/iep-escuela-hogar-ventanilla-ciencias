        const leccionExtensaEstProbVII = {
            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 3° a 5° de secundaria las competencias en estadística descriptiva e inferencial básica y en probabilidad, abarcando el cálculo de medidas de tendencia central y dispersión, la interpretación de gráficos estadísticos, la probabilidad condicional, las técnicas de conteo (permutaciones y combinaciones) y la distribución binomial, consolidando la alfabetización estadística necesaria para la toma de decisiones informadas en un mundo lleno de datos.\n\n🎯 OBJETIVOS PARTICULARES:\n• Calcular e interpretar medidas de tendencia central (media, mediana, moda) y de dispersión (rango, varianza, desviación estándar) para datos agrupados y no agrupados.\n• Construir e interpretar tablas de frecuencias e histogramas, polígonos de frecuencia, gráficos de barras, circulares y de caja (box-plot).\n• Comprender el concepto de probabilidad como frecuencia relativa a largo plazo y aplicar la regla de Laplace.\n• Aplicar las reglas de probabilidad: adición, multiplicación, probabilidad condicional y teorema de Bayes.\n• Utilizar técnicas de conteo: principio de multiplicación, permutaciones (con y sin repetición) y combinaciones.\n• Identificar y aplicar la distribución binomial para experimentos discretos con dos resultados posibles.\n• Interpretar el significado de los intervalos de confianza y el margen de error en contextos cotidianos (encuestas, estudios).\n\n📌 NOCIONES PRINCIPALES:\n• Población, muestra, variable (cualitativa, cuantitativa discreta, cuantitativa continua).\n• Tabla de frecuencias: frecuencia absoluta, relativa, acumulada.\n• Medidas de tendencia central: media (x̄ = Σxᵢ/n), mediana, moda.\n• Medidas de dispersión: rango, varianza (σ² = Σ(xᵢ-x̄)²/n), desviación estándar (σ = √varianza).\n• Probabilidad: P(A) = n(A)/n(S). Probabilidad condicional: P(A|B) = P(A∩B)/P(B).\n• Principio de multiplicación, permutaciones: nPr = n!/(n-r)!, combinaciones: nCr = n!/[r!(n-r)!].\n• Distribución binomial: X ~ B(n, p). P(X=k) = C(n,k) · p^k · (1-p)^(n-k).\n\n📌 NOCIONES SECUNDARIAS:\n• Coeficiente de variación (CV = σ/x̄ × 100%). Percentiles y cuartiles.\n• Diagrama de caja y bigotes (box-plot).\n• Probabilidad total y teorema de Bayes.\n• Permutaciones circulares y con elementos idénticos.\n• Aproximación normal a la binomial (n grande). Noción de intervalo de confianza.\n\n🌍 INTERESES SOCIETALES:\n• La estadística está presente en todas las noticias: encuestas electorales, índices económicos, efectividad de vacunas.\n• La probabilidad permite evaluar riesgos: en seguros, inversiones, diagnósticos médicos.\n• Las técnicas de conteo son la base de la criptografía y la seguridad informática (contraseñas).\n• Comprender la estadística es una habilidad ciudadana esencial para no ser manipulado por gráficos engañosos o afirmaciones sin respaldo.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Laboratorio de Datos y Azar"\n\n🧩 MATERIALES: Dados de diferentes caras, monedas, barajas de cartas, calculadoras, computadoras con Excel/Google Sheets, periódicos con gráficos estadísticos, fichas de colores, urna, canicas.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Encuestadores escolares" - Cada equipo diseña una pregunta breve para encuestar a 20 compañeros (ej: "¿Cuántas horas duermes?"). Recolectan datos, los organizan en una tabla de frecuencias, calculan media, mediana y moda, y dibujan un histograma rápido en papel milimetrado.\n\nESTACIÓN 2: "La ley de los grandes números" - Lanzan una moneda 10 veces y anotan la proporción de caras. ¿Salió 0.5 exacto? Luego la lanzan 50 veces. ¿Se acerca más a 0.5? Luego simulan 1000 lanzamientos en Excel. Observan que la frecuencia relativa se estabiliza en 0.5. Descubren el concepto de probabilidad como límite de frecuencias.\n\nESTACIÓN 3: "El problema de Monty Hall" (simplificado) - Con tres vasos y una bolita escondida, simulan el famoso problema. Un estudiante elige un vaso, el "presentador" destapa uno vacío y ofrece cambiar. Anotan cuántas veces ganan si cambian vs. si no cambian. Descubren que cambiar duplica la probabilidad de ganar (2/3 vs 1/3).\n\nESTACIÓN 4: "Combinaciones de sabores" - En una heladería simulada, tienen 5 sabores y deben elegir 3 para un sundae. ¿Cuántas combinaciones diferentes hay? Usan fichas de colores para listar sistemáticamente. Descubren C(5,3) = 10. Luego, si importa el orden (cono de 3 bolas con sabores sin repetir), ¿cuántas? P(5,3) = 60.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Para qué sirven los promedios? ¿Es lo mismo media que mediana? ¿Qué significa "probabilidad" en la vida real? ¿Cómo se cuentan las posibilidades sin olvidar ninguna?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "De los datos a las fórmulas"\n\n📊 OBSERVACIÓN GUIADA: MEDIA vs MEDIANA\nSe presenta el salario mensual (en soles) de 9 empleados de una microempresa:\n1200, 1200, 1300, 1400, 1500, 1500, 1500, 1600, 4500\n\n• Media: x̄ = (1200+1200+1300+1400+1500+1500+1500+1600+4500)/9 = 15700/9 ≈ 1744.44\n• Mediana: el quinto valor ordenado = 1500.\n• El último valor (4500) es el salario del gerente, un valor atípico. La media se ve muy afectada (1744), pero la mediana (1500) refleja mejor lo que gana un empleado "típico".\nConclusión guiada: "La mediana es resistente a valores atípicos (outliers). La media es sensible a ellos. Ambas son necesarias".\n\n📊 OBSERVACIÓN GUIADA: PROBABILIDAD CONDICIONAL\nSe presentan los resultados de una prueba médica en una población de 1000 personas:\n| | Enfermo (E) | Sano (¬E) | Total |\n|---|---|---|---|\n| Test Positivo (+) | 45 | 50 | 95 |\n| Test Negativo (-) | 5 | 900 | 905 |\n| Total | 50 | 950 | 1000 |\n\nLos estudiantes calculan:\n• P(E) = 50/1000 = 5% (prevalencia).\n• P(+|E) = 45/50 = 90% (sensibilidad: probabilidad de positivo dado enfermo).\n• P(E|+) = 45/95 ≈ 47.4% (probabilidad de estar realmente enfermo si el test dio positivo. ¡Sorpresa! No es 90%).\n\nConclusión: "La probabilidad condicional puede ser muy distinta de la probabilidad simple. No confundir P(A|B) con P(B|A)".\n\n📊 OBSERVACIÓN GUIADA: DISTRIBUCIÓN BINOMIAL\nSe lanza una moneda justa 3 veces. Se cuenta el número de caras (k=0,1,2,3). Se listan todos los resultados posibles (2³=8):\n0 caras: 1 (SSS). 1 cara: 3 (CSS, SCS, SSC). 2 caras: 3 (CCS, CSC, SCC). 3 caras: 1 (CCC).\nProbabilidades: P(X=0)=1/8, P(X=1)=3/8, P(X=2)=3/8, P(X=3)=1/8.\n\nObservan que P(X=k) = C(3,k) × (0.5)^k × (0.5)^(3-k).\nConclusión: "En un experimento binomial con n ensayos, la probabilidad de k éxitos es C(n,k)·p^k·(1-p)^(n-k)".\n\n📝 REGISTRO: Cada estudiante escribe las fórmulas descubiertas con sus propias palabras y las contrasta con la definición formal.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Estadística Descriptiva e Inferencial, Probabilidad Condicional y Técnicas de Conteo\n\n📊 1. ESTADÍSTICA DESCRIPTIVA\n\n📏 TABLA DE FRECUENCIAS:\n• f_i: frecuencia absoluta (número de veces que aparece el valor x_i).\n• h_i = f_i/n: frecuencia relativa (proporción).\n• F_i: frecuencia absoluta acumulada.\n• H_i: frecuencia relativa acumulada.\n\n📏 MEDIDAS DE TENDENCIA CENTRAL:\n• Media (x̄): x̄ = (Σ xᵢ·fᵢ) / n (para datos agrupados, usar marca de clase).\n• Mediana (Me): valor central que divide los datos en dos mitades iguales.\n• Moda (Mo): valor con mayor frecuencia.\n\n📏 MEDIDAS DE DISPERSIÓN:\n• Rango: R = X_max - X_min.\n• Varianza: σ² = Σ(xᵢ - x̄)²·fᵢ / n.\n• Desviación estándar: σ = √(varianza).\n• Coeficiente de variación: CV = (σ / x̄) × 100%.\n\n📏 GRÁFICOS:\n• Histograma (datos agrupados en intervalos).\n• Polígono de frecuencias.\n• Gráfico circular (sectores).\n• Diagrama de caja y bigotes (box-plot): muestra mínimo, Q1, mediana, Q3, máximo.\n\n🎲 2. PROBABILIDAD\n\n📏 DEFINICIÓN CLÁSICA (Laplace): P(A) = (casos favorables) / (casos posibles), si todos son equiprobables.\n\n📏 PROBABILIDAD COMO FRECUENCIA RELATIVA: P(A) ≈ f_A / n cuando n → ∞.\n\n📏 REGLAS:\n• Regla de adición: P(A ∪ B) = P(A) + P(B) - P(A ∩ B).\n• Sucesos mutuamente excluyentes: P(A ∪ B) = P(A) + P(B).\n• Regla de multiplicación: P(A ∩ B) = P(A) · P(B|A) = P(B) · P(A|B).\n• Sucesos independientes: P(A ∩ B) = P(A) · P(B). P(A|B) = P(A).\n\n📏 PROBABILIDAD CONDICIONAL: P(A|B) = P(A ∩ B) / P(B), con P(B) > 0.\n\n📏 TEOREMA DE LA PROBABILIDAD TOTAL: Si B₁, B₂, ..., Bₙ es una partición de S, entonces P(A) = Σ P(A|Bᵢ)·P(Bᵢ).\n\n📏 TEOREMA DE BAYES: P(Bᵢ|A) = [P(A|Bᵢ)·P(Bᵢ)] / [Σ P(A|Bⱼ)·P(Bⱼ)].\n\n🔢 3. TÉCNICAS DE CONTEO\n\n📏 PRINCIPIO DE MULTIPLICACIÓN: Si una tarea se realiza en k etapas con n₁, n₂, ..., nₖ opciones, el total es n₁ × n₂ × ... × nₖ.\n\n📏 PERMUTACIONES (importa el orden):\n• Sin repetición: P(n,r) = n! / (n-r)!\n• Con repetición: nʳ.\n• Circulares: (n-1)!\n• Con elementos idénticos: n! / (n₁! · n₂! ...)\n\n📏 COMBINACIONES (no importa el orden): C(n,r) = n! / [r!(n-r)!] = (n choose r).\n\n🎯 4. DISTRIBUCIÓN BINOMIAL\n\nSea X ~ B(n, p), donde n = número de ensayos, p = probabilidad de éxito en cada ensayo.\n\n📏 FUNCIÓN DE PROBABILIDAD: P(X = k) = C(n,k) · p^k · (1-p)^(n-k), para k = 0, 1, 2, ..., n.\n\n📏 MEDIA: μ = n·p. DESVIACIÓN ESTÁNDAR: σ = √[n·p·(1-p)].\n\n📏 CONDICIONES: Ensayos independientes, dos resultados posibles, probabilidad constante.\n\n⚠️ ERRORES COMUNES:\n• Usar la media cuando hay outliers sin considerar la mediana.\n• Confundir P(A|B) con P(B|A).\n• En combinatoria, no distinguir si importa el orden (permutación) o no (combinación).\n• Olvidar que en la binomial se requiere independencia entre ensayos.\n• Interpretar un intervalo de confianza como "el 95% de probabilidad de que el parámetro esté dentro", cuando es "el 95% de los intervalos construidos así contendrán el parámetro".`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Estadística Descriptiva\n1. Notas: 12, 14, 11, 16, 14, 13, 18, 14, 15, 13. Calcula: media, mediana y moda. (Media: 140/10=14; Mediana: 14; Moda: 14).\n2. Calcula varianza y desviación estándar de: 5, 7, 9, 11. (x̄=8; σ²=(9+1+1+9)/4=5; σ=√5≈2.236).\n3. Agrupa en intervalos las edades de 20 personas: [10-14), [14-18), etc. Construye tabla de frecuencias e histograma.\n\n📝 BLOQUE 2: Probabilidad Básica\n4. Se lanza un dado justo. P(número par) = 3/6 = 1/2.\n5. Se extrae una carta de una baraja de 52. P(as o rey) = 8/52 = 2/13.\n6. En una urna hay 5 bolas rojas y 3 azules. Se extraen 2 sin reposición. P(las dos rojas) = (5/8)×(4/7)=20/56=5/14.\n\n📝 BLOQUE 3: Probabilidad Condicional y Bayes\n7. El 60% de los estudiantes son mujeres. El 70% de mujeres aprobó, y el 50% de hombres aprobó. Si un estudiante aprobó, ¿probabilidad de que sea mujer?\nP(A|M)=0.7, P(A|H)=0.5, P(M)=0.6, P(H)=0.4.\nP(A)=0.7×0.6+0.5×0.4=0.42+0.20=0.62.\nP(M|A)=P(A|M)P(M)/P(A)=0.42/0.62≈0.677. (≈67.7%).\n\n8. Una prueba de VIH tiene 99% de sensibilidad y 98% de especificidad. Prevalencia: 0.5%. ¿P(VIH|+)?\nP(+|E)=0.99, P(-|¬E)=0.98 → P(+|¬E)=0.02. P(E)=0.005.\nP(+)=0.99×0.005+0.02×0.995=0.00495+0.0199=0.02485.\nP(E|+)=0.00495/0.02485≈0.199 (≈19.9%). ¡Sorpresa!\n\n📝 BLOQUE 4: Técnicas de Conteo\n9. ¿Cuántas contraseñas de 4 dígitos sin repetir se pueden formar con dígitos 0-9? P(10,4)=10×9×8×7=5040.\n10. ¿De cuántas maneras se pueden sentar 6 personas en una mesa circular? (6-1)!=120.\n11. ¿Cuántas combinaciones de pizza de 3 ingredientes hay si hay 8 disponibles? C(8,3)=56.\n12. ¿Cuántas palabras (con o sin sentido) se pueden formar ordenando las letras de "MOMENTO"? 8!/(2!2!)=10080.\n\n📝 BLOQUE 5: Distribución Binomial\n13. Se lanza un dado 4 veces. X = número de veces que sale 6. p=1/6. P(X=2) = C(4,2)×(1/6)²×(5/6)² = 6×(1/36)×(25/36)=150/1296≈0.1157.\n14. Un examen tiene 10 preguntas con 4 opciones cada una (solo una correcta). Si un alumno contesta al azar, ¿P(aprobar con 6 o más aciertos)? X~B(10,0.25). Calcúlalo con calculadora (P≈0.0197).\n15. En una fábrica, el 5% de productos es defectuoso. En una muestra de 20, ¿P(exactamente 2 defectuosos)? C(20,2)×0.05²×0.95¹⁸=190×0.0025×0.397=0.1887.\n\n⏱️ Tiempo estimado: 100-120 min. ✅ Resolución en grupo con debate sobre interpretaciones.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Álgebra, Funciones y Geometría\n\n📏 CONEXIÓN CON ÁLGEBRA Y FUNCIONES:\n• La media y la desviación estándar son expresiones algebraicas que involucran sumatorias.\n• La distribución binomial es una función de probabilidad discreta descrita algebraicamente.\n• El teorema de Bayes es una fórmula algebraica que involucra fracciones y proporcionalidad.\n• Al graficar la distribución binomial para n grande, se aproxima a una campana (función exponencial cuadrática).\n\n📐 CONEXIÓN CON GEOMETRÍA:\n• El gráfico circular (torta) usa áreas de sectores proporcionales a las frecuencias.\n• El histograma y el box-plot implican escalas, barras y rectángulos (áreas).\n• La probabilidad geométrica: si un punto se lanza al azar sobre una región, P = Área favorable / Área total.\n\n📊 CONEXIÓN CON ANÁLISIS:\n• La estadística inferencial (intervalos de confianza, tests de hipótesis) usa funciones de probabilidad derivadas de la binomial y la normal.\n• El análisis de varianza (ANOVA) y la regresión usan sumas de cuadrados que recuerdan a la varianza.\n\n🧩 ACTIVIDAD INTEGRADORA: "Análisis completo de un dataset escolar": Tomar datos reales de notas, asistencias, horas de estudio. Calcular medidas descriptivas, construir gráficos, determinar probabilidades condicionales (ej: P(aprobar | estudiar > 3h)).\n\n💡 REFLEXIÓN: La estadística y la probabilidad son el corazón de la ciencia de datos. Sin ellas, el álgebra y la geometría serían solo formas; con ellas, adquieren significado y poder predictivo.`,
            6: `🌍 CORRELACIONES EXTERNAS: Estadística y probabilidad en el mundo real\n\n📊 MEDIOS DE COMUNICACIÓN Y ENCUESTAS:\n• Toda encuesta electoral reporta un "margen de error del ±3% con 95% de confianza". Esto se basa en la distribución normal (derivada de la binomial).\n• Los gráficos de barras comparando países, empresas o deportistas son omnipresentes. Saber leer la escala y detectar gráficos engañosos es una habilidad ciudadana.\n• Noticias sobre eficacia de vacunas: "Eficacia del 95%" significa que la probabilidad de contraer la enfermedad en el grupo vacunado fue un 95% menor que en el grupo placebo.\n\n💊 MEDICINA Y SALUD PÚBLICA:\n• Los ensayos clínicos aleatorizados son experimentos binomiales (éxito: curación; fracaso: no curación).\n• La probabilidad condicional es crucial para interpretar tests diagnósticos (mamografías, pruebas de COVID).\n• Las curvas de supervivencia (Kaplan-Meier) son aplicaciones de probabilidad.\n\n📈 FINANZAS Y SEGUROS:\n• Las primas de seguros se calculan usando probabilidad: P(siniestro) × costo del siniestro + margen.\n• El riesgo de una inversión se mide con la desviación estándar de los retornos (volatilidad).\n• Los modelos de riesgo crediticio usan probabilidad de default.\n\n🎰 JUEGOS DE AZAR Y APUESTAS:\n• La probabilidad explica por qué "la casa siempre gana": los juegos de casino están diseñados con una ventaja matemática pequeña pero segura.\n• La combinatoria permite calcular el número de combinaciones posibles en la lotería y la probabilidad ínfima de ganar.\n\n🤖 INTELIGENCIA ARTIFICIAL Y MACHINE LEARNING:\n• El clasificador Naive Bayes se basa directamente en el teorema de Bayes.\n• Las redes neuronales se entrenan minimizando una función de pérdida basada en la probabilidad.\n\n🧠 REFLEXIÓN FINAL: "Vivimos en la era de los datos. Cada like, cada compra, cada búsqueda genera información. Saber interpretar datos y probabilidades no solo te hace mejor estudiante, te hace un ciudadano más libre, menos manipulable y con mayor capacidad de decisión."\n\n🗣️ CITA: "El azar no es más que la medida de nuestra ignorancia." — Henri Poincaré.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Estudio Estadístico Escolar Completo"\n\n🎯 OBJETIVO: Cada equipo de estudiantes diseñará y ejecutará un estudio estadístico completo sobre un tema de interés escolar, recolectando datos reales, realizando un análisis descriptivo, calculando probabilidades relevantes y presentando los resultados en un informe profesional con visualizaciones, conclusiones y recomendaciones.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: ELECCIÓN DEL TEMA Y DISEÑO DEL ESTUDIO (1 sesión)\n• 5 equipos. Eligen un tema: "Hábitos de estudio", "Uso de redes sociales", "Preferencias alimenticias", "Práctica deportiva", "Estrés académico".\n• Definen la población y la muestra (mínimo 50 encuestados).\n• Diseñan un cuestionario con 5-8 preguntas que generen variables cuantitativas y cualitativas.\n• Plantean hipótesis iniciales (ej: "Los estudiantes que duermen más de 8 horas tienen mejor promedio").\n\nFASE 2: RECOLECCIÓN DE DATOS (1-2 sesiones)\n• Aplican la encuesta (papel o Google Forms) a estudiantes de diferentes grados (autorizado por el docente).\n• Tabulan los datos en una hoja de cálculo.\n• Verifican que no haya errores de captura.\n\nFASE 3: ANÁLISIS ESTADÍSTICO (2 sesiones)\n• Construyen tablas de frecuencia para todas las variables.\n• Calculan medidas de tendencia central y dispersión para las variables cuantitativas.\n• Elaboran gráficos: histogramas, gráficos de barras, circulares y box-plots (pueden usar Excel, GeoGebra o Python si saben).\n• Cruzan variables: calculan probabilidades condicionales. Ej: P(promedio > 15 | duermen > 8h).\n• Realizan una prueba binomial: "Si el 60% de estudiantes dice que usa redes sociales más de 3h/día, ¿es estadísticamente significativo?" (calculan valor-p con aproximación normal o usando software).\n\nFASE 4: INFORME CIENTÍFICO (1 sesión)\n• Redactan un informe que incluye:\n  - Introducción (objetivos e hipótesis).\n  - Metodología (muestra, instrumento, procedimiento).\n  - Resultados (tablas, gráficos, medidas).\n  - Análisis de probabilidades.\n  - Conclusiones (¿se confirman las hipótesis?).\n  - Recomendaciones.\n\nFASE 5: SIMPOSIO DE ESTADÍSTICA (1 sesión)\n• Cada equipo expone su estudio al resto de la clase.\n• Se coloca un "póster" (papelógrafo) con los gráficos clave.\n• Responden preguntas y defienden sus conclusiones.\n• Los compañeros actúan como "revisores pares" y llenan una rúbrica de evaluación.\n\n🏆 EVALUACIÓN: Rigor en el diseño y ejecución, correcto cálculo e interpretación de medidas, pertinencia de gráficos, profundidad del análisis de probabilidad, calidad del informe y exposición.\n🎉 CIERRE: Publicación de los mejores informes en el periódico mural escolar o la página web del colegio. Diplomas de "Científico de Datos Escolar".`,
        };

        // ═══════════════════════════════════════
        //  GENERADOR DE CONTENIDO AUTOMÁTICO
        // ═══════════════════════════════════════
        function generateLessonContent(lesson, phaseNumber) {
            const area = lesson.area;
            const materia = lesson.materia;
            const conocimientos = lesson.conocimientos;
            const ciclo = lesson.ciclo;
            const nivel = lesson.nivel;
            switch (phaseNumber) {
                case 0:
                    return `OBJETIVO GENERAL: Desarrollar competencias en ${materia} correspondientes al ${ciclo} de Educación ${nivel}.\n\nOBJETIVOS PARTICULARES:\n- Identificar los conceptos clave de ${materia}.\n- Aplicar los conocimientos en situaciones prácticas.\n- Resolver problemas utilizando estrategias adecuadas.\n\nNOCIONES PRINCIPALES: ${conocimientos}\nNOCIONES SECUNDARIAS: Vocabulario técnico, procedimientos, estrategias de verificación.\nINTERESES SOCIETALES: Relación con la vida cotidiana, el entorno natural y social.`;
                case 1:
                    return `ACTIVIDAD DE DESCUBIERTA: "Explorando ${materia}"\n\n🧩 Se presentan situaciones problemáticas y materiales concretos para que los estudiantes exploren libremente los conceptos de ${materia}.\n🔍 Preguntas para la reflexión y registro de observaciones en el cuaderno de experiencias.`;
                case 2:
                    return `ACTIVIDAD INDUCTIVA: "Del ejemplo concreto al concepto general"\n\n📊 Se presentan varios ejemplos de ${materia} para que los estudiantes identifiquen patrones, regularidades y formulen reglas generales.\n📝 Los estudiantes registran sus conclusiones en organizadores gráficos.`;
                case 3:
                    return `TRANSMISIÓN CONCEPTUAL: ${materia}\n\n📐 CONCEPTOS CLAVE:\n${conocimientos}\n\n📏 DEFINICIONES, PROPIEDADES Y EJEMPLOS DESARROLLADOS.\n⚠️ Errores comunes y estrategias para evitarlos.`;
                case 4:
                    return `TRABAJOS DIRIGIDOS: Ejercicios de ${materia}\n\n✏️ Ejercicios de identificación, aplicación directa, transferencia y argumentación.\n📝 Formato: Individual o en parejas. Tiempo estimado: 30-45 minutos.`;
                case 5:
                    return `CORRELACIONES INTERNAS: Conexión con otras materias del área\n\n🔗 ${materia} se relaciona con otras ramas de ${lesson.areaName}. Se presentan ejemplos de integración.`;
                case 6:
                    return `CORRELACIONES EXTERNAS: Aplicaciones en la vida real\n\n🌍 Se muestran aplicaciones de ${materia} en la vida cotidiana, la tecnología, el arte, la naturaleza.`;
                case 7:
                    return `MÓDULO DE PROYECTO GRUPAL: "Aplicando ${materia} en equipo"\n\n🎯 Los estudiantes diseñan y ejecutan un proyecto colaborativo que integre los conocimientos de ${materia}.\n📋 Fases: formación de equipos, elección del tema, planificación, ejecución, presentación y evaluación.`;
                default:
                    return '';
            }
        }

        // ═══════════════════════════════════════
        //  STATE & RENDER
        // ═══════════════════════════════════════
        let currentView = 'home';
        let currentArea = null;
        let currentLessonId = null;

        function renderHome() {
            currentView = 'home';
            currentArea = null;
            currentLessonId = null;
            updateBreadcrumb([]);
            const main = document.getElementById('mainContent');
            const matCount = lessonsData.filter(l => l.area === 'matematica' && !l.esMetodo).length;
            const cieCount = lessonsData.filter(l => l.area === 'ciencia' && !l.esMetodo).length;
            const metodoCount = lessonsData.filter(l => l.esMetodo).length;
            main.innerHTML = `
                <h1 class="page-title">📚 Conocimientos Fundamentales</h1>
                <p class="page-subtitle">IEP Escuela Hogar Ventanilla · Educación Básica Regular · Selecciona un área para explorar las lecciones</p>
                <div class="area-cards">
                    <div class="area-card matematica" onclick="navigateToArea('matematica')">
                        <div class="icon">🧮</div>
                        <h2>Matemática</h2>
                        <p class="count">${matCount} lecciones · Primaria y Secundaria</p>
                        <p style="font-size:0.78rem;color:#64748b;margin-top:0.4rem;">Números, Geometría, Medición, Álgebra, Estadística, Funciones, Trigonometría</p>
                    </div>
                    <div class="area-card ciencia" onclick="navigateToArea('ciencia')">
                        <div class="icon">🔬</div>
                        <h2>Ciencia y Tecnología</h2>
                        <p class="count">${cieCount} lecciones · Primaria y Secundaria</p>
                        <p style="font-size:0.78rem;color:#64748b;margin-top:0.4rem;">Seres Vivos, Materia, Tierra, Química, Biología, Física</p>
                    </div>
                    <div class="area-card metodo-highlight" onclick="navigateToLesson('metodo-ciclo-vi')">
                        <div class="icon">⚗️</div>
                        <h2>El Método Científico <span class="featured-badge">🌟 Destacado</span></h2>
                        <p class="count">${metodoCount} lecciones especializadas · Ciclos V, VI y VII</p>
                        <p style="font-size:0.78rem;color:#6b21a8;margin-top:0.4rem;">🔬 Contenido del PDF: experimentos, variables, sesgo, biología</p>
                    </div>
                </div>
                <div style="margin-top:1.5rem;padding:1.2rem;background:#fefce8;border-radius:12px;border:1px solid #eab308;font-size:0.85rem;color:#92400e;">
                    <strong>🌟 Lecciones extensas ya desarrolladas:</strong><br>
                    <strong>Ciclo III (1°-2° Primaria):</strong><br>
                    🧮 <strong>Números y Operaciones</strong> — contenido detallado + proyecto "La Tiendita Matemática".<br>
                    🧮 <strong>Geometría</strong> — figuras planas y cuerpos geométricos + proyecto "Museo de Formas Geométricas".<br>
                    🧮 <strong>Medición</strong> — longitud, masa y tiempo + proyecto "La Feria de las Medidas".<br>
                    🔬 <strong>Seres Vivos</strong> — cuerpo humano, animales, plantas y hábitos saludables + proyecto "Feria de la Salud y la Naturaleza".<br>
                    🔬 <strong>Materia y Energía</strong> — propiedades de materiales, luz y sonido + proyecto "Museo Interactivo de la Materia, la Luz y el Sonido".<br>
                    🔬 <strong>Tierra y Universo</strong> — día y noche, aire, agua, suelo y cambios atmosféricos + proyecto "Guardianes del Planeta".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo IV (3°-4° Primaria):</strong><br>
                    🧮 <strong>Números y Operaciones</strong> — naturales, fracciones, decimales y operaciones combinadas + proyecto "El Bazar del Saber".<br>
                    🧮 <strong>Geometría</strong> — ángulos, polígonos, perímetro y área de figuras planas + proyecto "Constructores de Figuras".<br>
                    🧮 <strong>Estadística</strong> — tablas de frecuencia, gráficos de barras y pictogramas + proyecto "Encuestadores Escolares".<br>
                    🔬 <strong>Seres Vivos</strong> — clasificación, cadenas alimenticias, ecosistemas peruanos + proyecto "Expedición Científica".<br>
                    🔬 <strong>Materia y Energía</strong> — estados de la materia, mezclas, fuerza y movimiento, energía renovable + proyecto "Feria Científica".<br>
                    🔬 <strong>Tierra y Universo</strong> — sistema solar, capas de la Tierra, ciclo del agua + proyecto "Planetario, Volcán y Destilador".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo V (5°-6° Primaria):</strong><br>
                    🧮 <strong>Números y Operaciones</strong> — decimales, fracciones, proporcionalidad y porcentajes + proyecto "Emprendedores Matemáticos".<br>
                    🧮 <strong>Álgebra</strong> — patrones y ecuaciones simples + proyecto "Máquina de Patrones y Escape Room".<br>
                    🧮 <strong>Geometría</strong> — áreas, volumen de prismas y circunferencia + proyecto "Ciudad Geométrica".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo VI (1°-2° Secundaria):</strong><br>
                    🧮 <strong>Aritmética y Álgebra</strong> — números enteros, polinomios, ecuaciones, sistemas, inecuaciones + proyecto "Consultoría Matemática Juvenil".<br>
                    🧮 <strong>Geometría</strong> — triángulos, congruencia, semejanza, Pitágoras, áreas, volúmenes, trigonometría + proyecto "Misión: Medir lo Inaccesible".<br>
                    <strong style="display:block;margin-top:0.6rem;">Ciclo VII (3°-5° Secundaria):</strong><br>
                    🧮 <strong>Álgebra y Funciones</strong> — números reales, funciones, progresiones, programación lineal + proyecto "Optimizadores S.A.".<br>
                    🧮 <strong>Geometría y Trigonometría</strong> — geometría analítica, identidades, ley de senos/cosenos + proyecto "Parque Temático Geométrico".<br>
                    🧮 <strong>Estadística y Probabilidad</strong> — descriptiva, inferencial, probabilidad condicional, binomial + proyecto "Estudio Estadístico Escolar".<br>
                    <em>Haz clic en el área de Matemática o Ciencia y Tecnología y busca las lecciones de cada ciclo para acceder a ellas.</em>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderArea(areaKey) {
            currentView = 'area';
            currentArea = areaKey;
            currentLessonId = null;
            const areaLessons = lessonsData.filter(l => l.area === areaKey);
            const areaName = areaLessons[0]?.areaName || 'Área';
            updateBreadcrumb([{ label: areaName, action: null, current: true }]);
            const groups = {};
            areaLessons.forEach(l => {
                const groupKey = `${l.nivel}|${l.ciclo}`;
                if (!groups[groupKey]) { groups[groupKey] = { nivel: l.nivel, ciclo: l.ciclo,
                    lessons: [] }; }
                groups[groupKey].lessons.push(l);
            });
            const groupOrder = ['Primaria|Ciclo III', 'Primaria|Ciclo IV', 'Primaria|Ciclo V',
                'Secundaria|Ciclo VI', 'Secundaria|Ciclo VII'
            ];
            const sortedGroups = groupOrder.map(key => groups[key]).filter(g => g);
            let groupsHTML = '';
            sortedGroups.forEach(group => {
                const nivelClass = group.nivel.toLowerCase();
                groupsHTML += `
                <div class="level-group">
                    <div class="level-group-header">
                        <span class="level-badge ${nivelClass}">${group.nivel}</span>
                        <span class="ciclo-tag">${group.ciclo}</span>
                    </div>
                    <div class="lesson-grid">
                        ${group.lessons.map(l => {
                            const isMetodo = l.esMetodo ? ' metodo-card' : '';
                            const metodoIcon = l.esMetodo ? ' <span class="metodo-icon-small">🧪 MÉTODO</span>' : '';
                            return `
                            <div class="lesson-card${isMetodo}" onclick="navigateToLesson('${l.id}')">
                                <span class="lesson-title">${l.materia}${metodoIcon}</span>
                                <span class="lesson-meta">📐 ${l.grado}</span>
                                <span class="lesson-preview">${l.conocimientos}</span>
                                <span class="arrow">→</span>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            });
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <button class="btn-back" onclick="navigateHome()">← Volver al inicio</button>
                <h1 class="page-title">${areaName}</h1>
                <p class="page-subtitle">${areaLessons.length} lecciones organizadas por nivel y ciclo. Todas con contenido pedagógico completo.</p>
                ${groupsHTML}
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderLesson(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) { renderHome(); return; }
            currentView = 'lesson';
            currentLessonId = lessonId;
            currentArea = lesson.area;
            updateBreadcrumb([
                { label: lesson.areaName, action: () => navigateToArea(lesson.area), current: false },
                { label: lesson.materia + ' (' + lesson.grado + ')', action: null, current: true },
            ]);
            const nivelClass = lesson.nivel.toLowerCase();
            const isMetodo = lesson.esMetodo;
            const headerClass = isMetodo ? ' metodo-header' : '';
            let phasesHTML = '';
            phaseDefinitions.forEach(phase => {
                phasesHTML += `
                <div class="phase-item ${phase.cssClass}" id="phase-${phase.number}-${lesson.id}">
                    <div class="phase-header" onclick="togglePhase('phase-${phase.number}-${lesson.id}')">
                        <span class="phase-number">${phase.number}</span>
                        <span class="phase-title-text">
                            ${phase.title}
                            <span class="phase-subtitle">${phase.subtitle}</span>
                        </span>
                        <span class="phase-chevron">▾</span>
                    </div>
                    <div class="phase-body">
                        <textarea class="editable-area" id="editable-${phase.number}-${lesson.id}" placeholder="Contenido de la Fase ${phase.number}..." data-phase="${phase.number}" data-lesson="${lesson.id}"></textarea>
                    </div>
                </div>
                `;
            });
            const isExtensaCicloIII = (lessonId === 'mat-pri-num-iii' || lessonId === 'mat-pri-geo-iii' || lessonId === 'mat-pri-med-iii');
            const isExtensaCicloIIICiencia = (lessonId === 'ct-pri-sv-iii' || lessonId === 'ct-pri-me-iii' || lessonId === 'ct-pri-tu-iii');
            const isExtensaCicloIVMat = (lessonId === 'mat-pri-num-iv' || lessonId === 'mat-pri-geo-iv' || lessonId === 'mat-pri-est-iv');
            const isExtensaCicloIVCiencia = (lessonId === 'ct-pri-sv-iv' || lessonId === 'ct-pri-me-iv' || lessonId === 'ct-pri-tu-iv');
            const isExtensaCicloV = (lessonId === 'mat-pri-num-v' || lessonId === 'mat-pri-alg-v' || lessonId === 'mat-pri-geo-v');
            const isExtensaSec = (lessonId === 'mat-sec-arit-vi' || lessonId === 'mat-sec-geo-vi' || lessonId === 'mat-sec-alg-vii' || lessonId === 'mat-sec-geotrig-vii' || lessonId === 'mat-sec-estprob-vii');
            const esExtensa = isExtensaCicloIII || isExtensaCicloIIICiencia || isExtensaCicloIVMat || isExtensaCicloIVCiencia || isExtensaCicloV || isExtensaSec;
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <button class="btn-back" onclick="navigateToArea('${lesson.area}')">← Volver a ${lesson.areaName}</button>
                <div class="lesson-detail">
                    <div class="lesson-header-card${headerClass}">
                        <div class="meta-row">
                            <span class="level-badge ${nivelClass}">${lesson.nivel}</span>
                            <span>📐 ${lesson.grado}</span>
                            <span>🔄 ${lesson.ciclo}</span>
                            ${isMetodo ? '<span style="background:#8b5cf6;color:#fff;padding:0.2rem 0.7rem;border-radius:14px;font-size:0.75rem;font-weight:600;">🌟 LECCIÓN DESTACADA</span>' : ''}
                        </div>
                        <h1>${lesson.materia}</h1>
                        <span class="knowledge-tag">📘 ${lesson.conocimientos}</span>
                        ${esExtensa ? '<p style="margin-top:0.6rem;font-size:0.82rem;color:#eab308;">🌟 <strong>Lección extensa detallada:</strong> contenido ilustrado con ejemplos, ejercicios y proyecto completo.</p>' : ''}
                    </div>
                    <p style="color:#64748b;margin-bottom:1rem;font-size:0.8rem;">
                        📝 Expande cada fase para ver y editar su contenido.
                        <span style="font-size:0.7rem;color:#94a3b8;">(Cambios guardados automáticamente)</span>
                    </p>
                    <div class="phase-accordion">
                        ${phasesHTML}
                    </div>
                </div>
            `;
            restoreSavedContent(lessonId);
            if (lessonId === 'mat-pri-num-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumIII), 150);
            } else if (lessonId === 'mat-pri-geo-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoIII), 150);
            } else if (lessonId === 'mat-pri-med-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMedIII), 150);
            } else if (lessonId === 'ct-pri-sv-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVIII), 150);
            } else if (lessonId === 'ct-pri-me-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEIII), 150);
            } else if (lessonId === 'ct-pri-tu-iii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUIII), 150);
            } else if (lessonId === 'mat-pri-num-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumIV), 150);
            } else if (lessonId === 'mat-pri-geo-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoIV), 150);
            } else if (lessonId === 'mat-pri-est-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaEstIV), 150);
            } else if (lessonId === 'ct-pri-sv-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaSVIV), 150);
            } else if (lessonId === 'ct-pri-me-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaMEIV), 150);
            } else if (lessonId === 'ct-pri-tu-iv') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaTUIV), 150);
            } else if (lessonId === 'mat-pri-num-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaNumV), 150);                
            } else if (lessonId === 'mat-pri-alg-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAlgV), 150);
            } else if (lessonId === 'mat-pri-geo-v') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoV), 150);
            } else if (lessonId === 'mat-sec-arit-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAritAlgVI), 150);
            } else if (lessonId === 'mat-sec-geo-vi') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeoVI), 150);
            } else if (lessonId === 'mat-sec-alg-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaAlgFuncVII), 150);
            } else if (lessonId === 'mat-sec-geotrig-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaGeomTrigVII), 150);
            } else if (lessonId === 'mat-sec-estprob-vii') {
                setTimeout(() => applyManualContent(lessonId, leccionExtensaEstProbVII), 150);
            } else {
                setTimeout(() => applyAutoGeneratedContent(lessonId), 150);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyManualContent(lessonId, contentObj) {
            Object.keys(contentObj).forEach(phaseNum => {
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = contentObj[phaseNum];
                        localStorage.setItem(key, contentObj[phaseNum]); }
                }
            });
        }

        function applyAutoGeneratedContent(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) return;
            phaseDefinitions.forEach(phase => {
                const phaseNum = phase.number;
                const key = getStorageKey(lessonId, phaseNum);
                if (!localStorage.getItem(key)) {
                    const content = generateLessonContent(lesson, phaseNum);
                    const ta = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (ta) { ta.value = content;
                        localStorage.setItem(key, content); }
                }
            });
        }

        function togglePhase(phaseElementId) {
            const phaseItem = document.getElementById(phaseElementId);
            if (!phaseItem) return;
            phaseItem.classList.toggle('open');
            const ta = phaseItem.querySelector('.editable-area');
            if (ta) saveContent(ta);
        }

        function getStorageKey(lessonId, phaseNumber) { return `lesson-${lessonId}-phase-${phaseNumber}`; }
        function saveContent(textarea) { localStorage.setItem(getStorageKey(textarea.dataset.lesson, textarea.dataset
                .phase), textarea.value); }

        function restoreSavedContent(lessonId) {
            phaseDefinitions.forEach(phase => {
                const saved = localStorage.getItem(getStorageKey(lessonId, phase.number));
                if (saved) { const ta = document.getElementById(`editable-${phase.number}-${lessonId}`);
                    if (ta) ta.value = saved; }
            });
        }

        let saveTimeout;
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('editable-area')) {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => saveContent(e.target), 500);
            }
        });
        document.addEventListener('blur', function(e) {
            if (e.target.classList.contains('editable-area')) saveContent(e.target);
        }, true);

        function navigateHome() { window.location.hash = '';
            renderHome(); }

        function navigateToArea(areaKey) { window.location.hash = areaKey;
            renderArea(areaKey); }

        function navigateToLesson(lessonId) { window.location.hash = lessonId;
            renderLesson(lessonId); }

        function updateBreadcrumb(items) {
            const bc = document.getElementById('breadcrumb');
            let html = '<span onclick="navigateHome()">Inicio</span>';
            items.forEach(item => {
                html += ' <span class="sep">›</span> ';
                if (item.current) html += `<span class="current">${item.label}</span>`;
                else if (item.action) html +=
                    `<span onclick="(${item.action.toString()})()" style="cursor:pointer;">${item.label}</span>`;
                else html += `<span>${item.label}</span>`;
            });
            bc.innerHTML = html;
        }

        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.replace('#', '');
            if (!hash) renderHome();
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else if (lessonsData.some(l => l.id === hash)) renderLesson(hash);
        });

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                if (currentView === 'lesson') {
                    const allPhases = document.querySelectorAll('.phase-item');
                    const anyClosed = Array.from(allPhases).some(p => !p.classList.contains('open'));
                    allPhases.forEach(p => { if (anyClosed) p.classList.add('open');
                        else p.classList.remove('open'); });
                    document.querySelectorAll('.editable-area').forEach(ta => saveContent(ta));
                }
            }
        });

        function init() {
            const hash = window.location.hash.replace('#', '');
            if (hash && lessonsData.some(l => l.id === hash)) renderLesson(hash);
            else if (hash === 'matematica' || hash === 'ciencia') renderArea(hash);
            else renderHome();
        }
        init();
        console.log('✅ Página de inicio restaurada: 3 bloques de área, Método Científico presente.');
        console.log('🧮 Matemática: 14 lecciones | 🔬 Ciencia y Tecnología: 15 lecciones | ⚗️ Método Científico: 3 lecciones.');
        console.log('🌟 20 lecciones extensas: 3 Matemática Ciclo III + 3 Ciencia Ciclo III + 3 Matemática Ciclo IV + 3 Ciencia Ciclo IV + 3 Matemática Ciclo V + 2 Matemática Ciclo VI + 3 Matemática Ciclo VII.');
    </script>
</body>
</html>
