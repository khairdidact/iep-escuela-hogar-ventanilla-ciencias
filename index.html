<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conocimientos Fundamentales - Plataforma de Lecciones Completas</title>
    <style>
        :root {
            --matematica: #2563eb;
            --matematica-light: #dbeafe;
            --matematica-dark: #1e40af;
            --ciencia: #16a34a;
            --ciencia-light: #dcfce7;
            --ciencia-dark: #15803d;
            --metodo: #8b5cf6;
            --metodo-light: #ede9fe;
            --metodo-dark: #6d28d9;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .logo {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }
        .breadcrumb span {
            cursor: pointer;
            transition: color var(--transition);
        }
        .breadcrumb span:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
        .breadcrumb .sep {
            color: #cbd5e1;
            cursor: default;
        }
        .breadcrumb .sep:hover {
            text-decoration: none;
            color: #cbd5e1;
        }
        .breadcrumb .current {
            font-weight: 600;
            color: var(--text);
            cursor: default;
        }
        .breadcrumb .current:hover {
            text-decoration: none;
            color: var(--text);
        }

        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 80vh;
        }
        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--text);
        }
        .page-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .area-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1.5rem;
        }
        .area-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 1.75rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .area-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .area-card.matematica {
            border-left: 5px solid var(--matematica);
        }
        .area-card.matematica:hover {
            border-color: var(--matematica);
            background: #fafbff;
        }
        .area-card.ciencia {
            border-left: 5px solid var(--ciencia);
        }
        .area-card.ciencia:hover {
            border-color: var(--ciencia);
            background: #fafdfb;
        }
        .area-card.metodo-highlight {
            border-left: 5px solid var(--metodo);
            background: linear-gradient(135deg, #faf5ff 0%, #ede9fe 100%);
            border-color: var(--metodo);
        }
        .area-card.metodo-highlight:hover {
            border-color: var(--metodo-dark);
            background: linear-gradient(135deg, #f5f0ff 0%, #e0d9fc 100%);
        }
        .area-card .icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        .area-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }
        .area-card .count {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .area-card .accent-dot {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .area-card.matematica .accent-dot {
            background: var(--matematica);
        }
        .area-card.ciencia .accent-dot {
            background: var(--ciencia);
        }
        .area-card.metodo-highlight .accent-dot {
            background: var(--metodo);
        }
        .featured-badge {
            display: inline-block;
            background: var(--metodo);
            color: #fff;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        .level-group {
            margin-bottom: 2.5rem;
        }
        .level-group-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .level-badge {
            display: inline-block;
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .level-badge.primaria {
            background: #fef3c7;
            color: #92400e;
        }
        .level-badge.secundaria {
            background: #dbeafe;
            color: #1e40af;
        }
        .ciclo-tag {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.85rem;
        }
        .lesson-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1.25rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .lesson-card:hover {
            border-color: #6366f1;
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .lesson-card.metodo-card {
            border-left: 4px solid var(--metodo);
            background: #fdfbff;
        }
        .lesson-card.metodo-card:hover {
            border-color: var(--metodo);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
        }
        .lesson-card .lesson-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }
        .lesson-card .lesson-meta {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .lesson-card .lesson-preview {
            font-size: 0.8rem;
            color: #94a3b8;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .lesson-card .arrow {
            align-self: flex-end;
            color: #6366f1;
            font-weight: 700;
            transition: transform var(--transition);
        }
        .lesson-card:hover .arrow {
            transform: translateX(4px);
        }
        .metodo-icon-small {
            display: inline-block;
            background: var(--metodo-light);
            color: var(--metodo-dark);
            border-radius: 4px;
            padding: 0.15rem 0.4rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .lesson-detail {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .lesson-header-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        .lesson-header-card.metodo-header {
            border-left: 5px solid var(--metodo);
            background: linear-gradient(135deg, #fff 0%, #fdfbff 100%);
        }
        .lesson-header-card h1 {
            font-size: 1.5rem;
            margin-bottom: 0.35rem;
        }
        .lesson-header-card .meta-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }
        .lesson-header-card .knowledge-tag {
            display: inline-block;
            background: #f1f5f9;
            padding: 0.3rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #475569;
            margin-top: 0.5rem;
        }
        .phase-accordion {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .phase-item {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .phase-item.open {
            border-color: #6366f1;
            box-shadow: var(--shadow-md);
        }
        .phase-header {
            padding: 1rem 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            transition: background var(--transition);
            gap: 0.75rem;
        }
        .phase-header:hover {
            background: #f8fafc;
        }
        .phase-number {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .phase-0 .phase-number {
            background: #fef3c7;
            color: #92400e;
        }
        .phase-1 .phase-number {
            background: #fce7f3;
            color: #9d174d;
        }
        .phase-2 .phase-number {
            background: #ede9fe;
            color: #5b21b6;
        }
        .phase-3 .phase-number {
            background: #dbeafe;
            color: #1e40af;
        }
        .phase-4 .phase-number {
            background: #dcfce7;
            color: #166534;
        }
        .phase-5 .phase-number {
            background: #ffedd5;
            color: #9a3412;
        }
        .phase-6 .phase-number {
            background: #e0e7ff;
            color: #3730a3;
        }
        .phase-7 .phase-number {
            background: #fce7f3;
            color: #831843;
        }
        .phase-title-text {
            flex: 1;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .phase-subtitle {
            font-weight: 400;
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: block;
        }
        .phase-chevron {
            font-size: 1.2rem;
            color: #94a3b8;
            transition: transform var(--transition);
            flex-shrink: 0;
        }
        .phase-item.open .phase-chevron {
            transform: rotate(180deg);
            color: #6366f1;
        }
        .phase-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            padding: 0 1.25rem;
            border-top: 0px solid transparent;
        }
        .phase-item.open .phase-body {
            max-height: 900px;
            padding: 1rem 1.25rem;
            border-top: 1px solid #e2e8f0;
        }
        .phase-body .editable-area {
            width: 100%;
            min-height: 80px;
            border: 1px dashed #d1d5db;
            border-radius: 6px;
            padding: 0.75rem;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            background: #fafafa;
            color: var(--text);
            line-height: 1.5;
        }
        .phase-body .editable-area:focus {
            outline: 2px solid #6366f1;
            border-color: transparent;
            background: #fff;
        }
        .phase-body .placeholder-hint {
            font-size: 0.78rem;
            color: #a1a1aa;
            margin-bottom: 0.4rem;
            font-style: italic;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
            transition: all var(--transition);
            margin-bottom: 1.25rem;
        }
        .btn-back:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .btn-save-hint {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-left: 0.5rem;
            font-style: italic;
        }
        .footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        .ilustracion-box {
            background: #fefce8;
            border: 1px dashed #eab308;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            font-size: 0.85rem;
            color: #854d0e;
        }
        .ilustracion-box strong {
            color: #92400e;
        }
        .ejemplo-box {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            font-size: 0.85rem;
            color: #166534;
        }
        .ejemplo-box strong {
            color: #14532d;
        }
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: flex-start;
            }
            .main-container {
                padding: 1rem;
            }
            .area-cards {
                grid-template-columns: 1fr;
            }
            .lesson-grid {
                grid-template-columns: 1fr;
            }
            .lesson-header-card h1 {
                font-size: 1.2rem;
            }
            .phase-header {
                padding: 0.75rem 1rem;
            }
            .phase-body {
                padding: 0 1rem;
            }
            .phase-item.open .phase-body {
                padding: 0.75rem 1rem;
            }
        }
    </style>
</head>

                setTimeout(() => applyAutoGeneratedContent(lessonId), 150);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyMetodoPrecontent(lessonId) {
            const precontent = metodoPrecontent[lessonId];
            if (!precontent) return;
            Object.keys(precontent).forEach(phaseNum => {
                const key = getStorageKey(lessonId, phaseNum);
                const existing = localStorage.getItem(key);
                if (!existing || existing.trim() === '') {
                    const textarea = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (textarea) {
                        textarea.value = precontent[phaseNum];
                        localStorage.setItem(key, precontent[phaseNum]);
                    }
                }
            });
        }

        function applyAutoGeneratedContent(lessonId) {
            const lesson = lessonsData.find(l => l.id === lessonId);
            if (!lesson) return;
            phaseDefinitions.forEach(phase => {
                const phaseNum = phase.number;
                const key = getStorageKey(lessonId, phaseNum);
                const existing = localStorage.getItem(key);
                if (!existing || existing.trim() === '') {
                    const content = generateLessonContent(lesson, phaseNum);
                    const textarea = document.getElementById(`editable-${phaseNum}-${lessonId}`);
                    if (textarea) {
                        textarea.value = content;
                        localStorage.setItem(key, content);
                    }
                }
            });
        }

        function togglePhase(phaseElementId) {
            const phaseItem = document.getElementById(phaseElementId);
            if (!phaseItem) return;
            phaseItem.classList.toggle('open');
            const textarea = phaseItem.querySelector('.editable-area');
            if (textarea) { saveContent(textarea); }
        }

        function getStorageKey(lessonId, phaseNumber) {
            return `lesson-${lessonId}-phase-${phaseNumber}`;
        }
        function saveContent(textarea) {
            const lessonId = textarea.dataset.lesson;
            const phaseNumber = textarea.dataset.phase;
            const key = getStorageKey(lessonId, phaseNumber);
            localStorage.setItem(key, textarea.value);
        }
        function restoreSavedContent(lessonId) {
            phaseDefinitions.forEach(phase => {
                const key = getStorageKey(lessonId, phase.number);
                const saved = localStorage.getItem(key);
                if (saved) {
                    const textarea = document.getElementById(`editable-${phase.number}-${lessonId}`);
                    if (textarea) { textarea.value = saved; }
                }
            });
        }
        let saveTimeout;
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('editable-area')) {
                clearTimeout(saveTimeout);
                const textarea = e.target;
                saveTimeout = setTimeout(() => { saveContent(textarea); }, 500);
            }
        });
        document.addEventListener('blur', function(e) {
            if (e.target.classList.contains('editable-area')) { saveContent(e.target); }
        }, true);

        function navigateHome() { window.location.hash = '';
            renderHome(); }
        function navigateToArea(areaKey) { window.location.hash = areaKey;
            renderArea(areaKey); }
        function navigateToLesson(lessonId) { window.location.hash = lessonId;
            renderLesson(lessonId); }

        function updateBreadcrumb(items) {
            const bc = document.getElementById('breadcrumb');
            let html = '<span onclick="navigateHome()">Inicio</span>';
            items.forEach(item => {
                html += ' <span class="sep">›</span> ';
                if (item.current) { html +=
                    `<span class="current">${item.label}</span>`; } else if (item.action) { html +=
                        `<span onclick="(${item.action.toString()})()" style="cursor:pointer;">${item.label}</span>`; } else { html +=
                    `<span>${item.label}</span>`; }
            });
            bc.innerHTML = html;
        }

        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.replace('#', '');
            if (!hash) { renderHome(); } else if (hash === 'matematica' || hash === 'ciencia') { renderArea(
                hash); } else if (lessonsData.some(l => l.id === hash)) { renderLesson(hash); }
        });
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                if (currentView === 'lesson') {
                    const allPhases = document.querySelectorAll('.phase-item');
                    const anyClosed = Array.from(allPhases).some(p => !p.classList.contains('open'));
                    allPhases.forEach(p => { if (anyClosed) { p.classList.add('open'); } else { p.classList
                                .remove('open'); } });
                    document.querySelectorAll('.editable-area').forEach(ta => saveContent(ta));
                }
            }
        });

        function init() {
            const hash = window.location.hash.replace('#', '');
            if (hash && lessonsData.some(l => l.id === hash)) { renderLesson(hash); } else if (hash ===
                'matematica' || hash === 'ciencia') { renderArea(hash); } else { renderHome(); }
        }
        init();
        console.log('📚 Plataforma completa. Todas las lecciones tienen contenido pedagógico.');
        console.log('   🧮 Matemática: 14 lecciones con contenido generado.');
        console.log('   🔬 Ciencia y Tecnología: 18 lecciones con contenido generado.');
        console.log('   ⚗️ Método Científico: 3 lecciones con contenido del PDF.');
        console.log('   ✏️ Todo el contenido es editable y se guarda automáticamente.');
    </script>
</body>
</html>
