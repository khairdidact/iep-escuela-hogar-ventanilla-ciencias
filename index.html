        const leccionExtensaGeoVI = {
            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 1° y 2° de secundaria las competencias geométricas fundamentales, abarcando el estudio de los triángulos, la congruencia y semejanza, el teorema de Pitágoras, el cálculo de áreas y volúmenes, y la introducción a las razones trigonométricas, consolidando el razonamiento espacial y deductivo necesario para la geometría analítica y la trigonometría avanzada de los ciclos superiores.\n\n🎯 OBJETIVOS PARTICULARES:\n• Clasificar triángulos según sus lados (equilátero, isósceles, escaleno) y según sus ángulos (acutángulo, rectángulo, obtusángulo).\n• Identificar las rectas y puntos notables en el triángulo: mediatrices (circuncentro), bisectrices (incentro), medianas (baricentro), alturas (ortocentro).\n• Aplicar los criterios de congruencia de triángulos: LLL, LAL, ALA, ALA'.\n• Aplicar los criterios de semejanza de triángulos: LLL, LAL, AA.\n• Enunciar, demostrar y aplicar el Teorema de Pitágoras y su recíproco.\n• Calcular áreas de figuras planas compuestas y volúmenes de prismas, pirámides y cilindros.\n• Comprender y aplicar las razones trigonométricas seno, coseno y tangente en triángulos rectángulos.\n\n📌 NOCIONES PRINCIPALES:\n• Triángulo, clasificación, propiedades angulares (suma de ángulos internos = 180°).\n• Rectas notables: mediatriz, bisectriz, mediana, altura. Puntos notables: circuncentro, incentro, baricentro, ortocentro.\n• Congruencia de triángulos: LLL (lado-lado-lado), LAL (lado-ángulo-lado), ALA (ángulo-lado-ángulo).\n• Semejanza de triángulos: LLL (lados proporcionales), LAL (dos lados proporcionales y ángulo comprendido igual), AA (dos ángulos iguales).\n• Teorema de Pitágoras: a² + b² = c² (c es la hipotenusa).\n• Áreas: triángulo, cuadriláteros, círculo, figuras compuestas.\n• Volúmenes: prisma (V = A_base × h), pirámide (V = A_base × h / 3), cilindro (V = πr²h).\n• Razones trigonométricas: sen θ = cateto opuesto / hipotenusa, cos θ = cateto adyacente / hipotenusa, tan θ = cateto opuesto / cateto adyacente.\n\n📌 NOCIONES SECUNDARIAS:\n• Teorema de Tales. Proporcionalidad de segmentos.\n• Relaciones métricas en el triángulo rectángulo.\n• Área superficial de prismas y pirámides.\n• Triángulos notables: 30°-60°-90° y 45°-45°-90°.\n• Resolución de triángulos rectángulos.\n\n🌍 INTERESES SOCIETALES:\n• La geometría de triángulos es la base de la arquitectura: la rigidez del triángulo se usa en puentes, techos y torres.\n• El teorema de Pitágoras es una de las herramientas matemáticas más utilizadas en construcción, navegación y cartografía.\n• Las razones trigonométricas permiten medir alturas inaccesibles (montañas, edificios) y distancias astronómicas.\n• La semejanza explica cómo funcionan las escalas en mapas, maquetas y planos arquitectónicos.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Geómetras en acción"\n\n🧩 MATERIALES: Palitos de diferentes longitudes, transportador, compás, regla, hilo, papel milimetrado, cartulina, tijeras, espejo, cinta métrica, clinómetro casero (transportador + pajilla + hilo + pesa).\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Construye el triángulo imposible" - Se entregan palitos de 4 cm, 5 cm y 13 cm. ¿Pueden formar un triángulo? (No, porque 4+5=9 < 13). ¿Qué condición deben cumplir tres segmentos para formar un triángulo? (La suma de dos lados cualesquiera debe ser mayor que el tercero → desigualdad triangular).\n\nESTACIÓN 2: "El misterio de la sombra" - En el patio, miden la sombra de un poste y la sombra de un palo de altura conocida. Aplican semejanza: altura del poste / altura del palo = sombra del poste / sombra del palo. Calculan la altura del poste sin medirla directamente.\n\nESTACIÓN 3: "Pitágoras en el geoplano" - En un geoplano, forman un triángulo rectángulo con catetos 3 y 4. Miden la hipotenusa: ¿cuánto da? (5). Construyen los cuadrados sobre cada lado con ligas y cuentan los cuadraditos: 9 + 16 = 25. ¡Se cumple!\n\nESTACIÓN 4: "Clinómetro trigonométrico" - Con un clinómetro casero, miden el ángulo de elevación hasta la cima de un edificio o árbol. Miden la distancia horizontal desde el punto de observación hasta la base. Luego calculan la altura usando tan θ = altura / distancia.\n\n💬 REFLEXIÓN EN PLENARIA: ¿Por qué el triángulo es la figura más estable? ¿Cómo medir lo inalcanzable? ¿Qué relación hay entre semejanza y trigonometría?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Del experimento a la propiedad general"\n\n📊 OBSERVACIÓN GUIADA: CONGRUENCIA DE TRIÁNGULOS\nSe entregan 5 triángulos recortados en cartulina numerados. Los estudiantes los superponen y comparan.\n\nCaso 1: Los triángulos A y B tienen los mismos 3 lados (6 cm, 8 cm, 10 cm). Al superponerlos coinciden perfectamente. Conclusión: "Si dos triángulos tienen los tres lados iguales, son congruentes (LLL)".\n\nCaso 2: Los triángulos C y D tienen dos lados iguales (5 cm y 7 cm) y el ángulo entre ellos también es igual (60°). Superpuestos, coinciden. Conclusión: "Dos lados y el ángulo comprendido determinan un triángulo único (LAL)".\n\nCaso 3: Los triángulos E y F tienen dos ángulos iguales (45° y 70°) y el lado entre ellos igual (8 cm). Superpuestos, coinciden. Conclusión: "Dos ángulos y el lado entre ellos determinan un triángulo único (ALA)".\n\n📊 OBSERVACIÓN GUIADA: TEOREMA DE PITÁGORAS\nSe miden 5 triángulos rectángulos y se completa una tabla:\n| Triángulo | Cateto a | Cateto b | Hipotenusa c | a² | b² | a²+b² | c² |\n|---|---|---|---|---|---|---|---|\n| 1 | 3 | 4 | 5 | 9 | 16 | 25 | 25 |\n| 2 | 5 | 12 | 13 | 25 | 144 | 169 | 169 |\n| 3 | 6 | 8 | 10 | 36 | 64 | 100 | 100 |\n\nConclusión guiada: "En todo triángulo rectángulo, el cuadrado de la hipotenusa es igual a la suma de los cuadrados de los catetos".\n\n📊 OBSERVACIÓN GUIADA: RAZONES TRIGONOMÉTRICAS\nCon un triángulo rectángulo de catetos 3 y 4, hipotenusa 5, y ángulo agudo θ opuesto al cateto 3:\n\n• sen θ = 3/5 = 0.6\n• cos θ = 4/5 = 0.8\n• tan θ = 3/4 = 0.75\n\nSe construyen triángulos semejantes duplicando los lados (6, 8, 10) y se comprueba que las razones se mantienen: sen θ = 6/10 = 0.6, cos θ = 8/10 = 0.8, tan θ = 6/8 = 0.75.\nConclusión: "Las razones trigonométricas dependen solo del ángulo, no del tamaño del triángulo. Se mantienen constantes en triángulos semejantes".\n\n📝 REGISTRO: Los estudiantes escriben las conclusiones en su cuaderno y formulan sus propias definiciones.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Triángulos, Congruencia, Semejanza, Pitágoras, Áreas, Volúmenes y Trigonometría\n\n🔺 1. CLASIFICACIÓN DE TRIÁNGULOS\n\n📏 POR LADOS:\n• Equilátero: 3 lados iguales, 3 ángulos de 60°.\n• Isósceles: 2 lados iguales, 2 ángulos iguales.\n• Escaleno: 3 lados diferentes, 3 ángulos diferentes.\n\n📏 POR ÁNGULOS:\n• Acutángulo: 3 ángulos agudos (< 90°).\n• Rectángulo: 1 ángulo recto (90°). Hipotenusa y catetos.\n• Obtusángulo: 1 ángulo obtuso (> 90°).\n\n📏 PROPIEDAD FUNDAMENTAL: La suma de los ángulos internos de cualquier triángulo es 180°.\n\n📏 DESIGUALDAD TRIANGULAR: a + b > c, a + c > b, b + c > a.\n\n📏 RECTAS Y PUNTOS NOTABLES:\n• Mediatriz: perpendicular en el punto medio de cada lado → Circuncentro (centro de la circunferencia circunscrita).\n• Bisectriz: divide cada ángulo en dos iguales → Incentro (centro de la circunferencia inscrita).\n• Mediana: segmento desde un vértice al punto medio del lado opuesto → Baricentro (centro de gravedad, divide la mediana en razón 2:1).\n• Altura: perpendicular desde un vértice al lado opuesto → Ortocentro.\n\n🔺 2. CONGRUENCIA DE TRIÁNGULOS\nDos triángulos son congruentes si tienen igual forma y tamaño (se pueden superponer). Criterios:\n• LLL (Lado-Lado-Lado): Los 3 lados correspondientes son iguales.\n• LAL (Lado-Ángulo-Lado): 2 lados y el ángulo comprendido entre ellos son iguales.\n• ALA (Ángulo-Lado-Ángulo): 2 ángulos y el lado comprendido entre ellos son iguales.\n• ALA' o AAL: 2 ángulos y un lado no comprendido son iguales.\n\n🔺 3. SEMEJANZA DE TRIÁNGULOS\nDos triángulos son semejantes si tienen la misma forma (ángulos iguales) pero diferente tamaño (lados proporcionales). Criterios:\n• LLL proporcionales: Los 3 lados son proporcionales.\n• LAL proporcional: 2 lados proporcionales y el ángulo comprendido igual.\n• AA (Ángulo-Ángulo): 2 ángulos iguales (el tercero también lo será).\n\n📏 TEOREMA DE TALES: Si varias rectas paralelas son cortadas por dos transversales, los segmentos determinados son proporcionales.\n\n🔺 4. TEOREMA DE PITÁGORAS\nEn todo triángulo rectángulo: a² + b² = c², donde c es la hipotenusa.\n\n📏 RECÍPROCO: Si en un triángulo se cumple a² + b² = c², entonces el triángulo es rectángulo.\n\n📏 TRÍOS PITAGÓRICOS: 3-4-5, 5-12-13, 7-24-25, 8-15-17, y sus múltiplos.\n\n📐 5. ÁREAS Y VOLÚMENES\n\n📏 ÁREA DE FIGURAS PLANAS:\n• Triángulo: A = (b × h) / 2. También: Fórmula de Herón: A = √[s(s-a)(s-b)(s-c)], con s = (a+b+c)/2.\n• Cuadrado: A = l². Rectángulo: A = b × h. Rombo: A = (D × d)/2. Trapecio: A = (B+b) × h / 2. Círculo: A = πr².\n\n📏 VOLUMEN DE CUERPOS:\n• Prisma: V = A_base × altura.\n• Pirámide: V = A_base × altura / 3.\n• Cilindro: V = πr²h.\n• Cono: V = πr²h / 3.\n• Esfera: V = (4/3)πr³.\n\n📐 6. RAZONES TRIGONOMÉTRICAS\n\nDado un triángulo rectángulo con ángulo agudo θ:\n• sen θ = cateto opuesto / hipotenusa\n• cos θ = cateto adyacente / hipotenusa\n• tan θ = cateto opuesto / cateto adyacente = sen θ / cos θ\n\n📏 TRIÁNGULOS NOTABLES:\n• 30°-60°-90°: Lados proporcionales a 1 : √3 : 2.\n  sen 30°=1/2, cos 30°=√3/2, tan 30°=1/√3.\n  sen 60°=√3/2, cos 60°=1/2, tan 60°=√3.\n• 45°-45°-90°: Lados proporcionales a 1 : 1 : √2.\n  sen 45°=cos 45°=1/√2=√2/2, tan 45°=1.\n\n⚠️ ERRORES COMUNES:\n• Confundir los catetos con la hipotenusa al aplicar Pitágoras.\n• Aplicar criterios de congruencia/semejanza sin verificar que los lados/ángulos se correspondan.\n• Usar la calculadora en modo radianes en lugar de grados.\n• Olvidar dividir entre 2 el área del triángulo o entre 3 el volumen de pirámide/cono.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Triángulos - Clasificación y Propiedades\n1. ¿Es posible construir un triángulo con lados de 4 cm, 7 cm y 2 cm? Justifica. (No, 4+2=6 < 7).\n2. Dos ángulos de un triángulo miden 55° y 70°. ¿Cuánto mide el tercero? ¿Qué tipo de triángulo es? (55°, acutángulo).\n3. En un triángulo isósceles, el ángulo desigual mide 40°. ¿Cuánto miden los otros dos? (70° cada uno).\n\n📝 BLOQUE 2: Congruencia y Semejanza\n4. ¿Son congruentes dos triángulos con lados: a) 5, 7, 9 y b) 5, 7, 9? (Sí, por LLL).\n5. Dos triángulos tienen ángulos de 50° y 60°, y el lado entre ellos mide 8 cm en ambos. ¿Son congruentes? (Sí, por ALA).\n6. La sombra de un árbol mide 12 m y la sombra de un palo de 1.5 m (vertical) mide 2 m. ¿Altura del árbol? (1.5/2 = h/12 → h = 9 m).\n\n📝 BLOQUE 3: Teorema de Pitágoras\n7. Calcula la hipotenusa de un triángulo rectángulo con catetos 9 cm y 12 cm. (c²=81+144=225, c=15 cm).\n8. Un cateto mide 8 cm y la hipotenusa 17 cm. ¿Cuánto mide el otro cateto? (b²=289-64=225, b=15 cm).\n9. ¿Es rectángulo un triángulo de lados 7, 24 y 25? (7²+24²=49+576=625=25². Sí, es rectángulo).\n10. Una escalera de 10 m se apoya en una pared. Su pie está a 6 m de la base. ¿A qué altura llega? (h²=100-36=64, h=8 m).\n\n📝 BLOQUE 4: Áreas y Volúmenes\n11. Calcula el área de un triángulo de base 14 cm y altura 9 cm. (63 cm²).\n12. Área de un triángulo equilátero de lado 6 cm (usa fórmula: A=(√3/4)l²). (A=(√3/4)×36=9√3≈15.59 cm²).\n13. Volumen de un prisma de base rectangular (5 cm × 3 cm) y altura 10 cm. (150 cm³).\n14. Volumen de una pirámide cuadrangular de base 6 cm × 6 cm y altura 9 cm. (V=(36×9)/3=108 cm³).\n\n📝 BLOQUE 5: Trigonometría\n15. En un triángulo rectángulo, el cateto opuesto a θ mide 6 y la hipotenusa 10. Calcula sen θ, cos θ, tan θ. (sen=0.6, cos=0.8, tan=0.75).\n16. Si sen θ = 0.5, ¿cuánto mide θ? (30°).\n17. Desde un punto a 50 m de la base de un edificio, el ángulo de elevación a la cima es de 40°. Si tan 40° ≈ 0.839, ¿altura del edificio? (h=50×0.839=41.95 m).\n18. Un avión despega con un ángulo de elevación de 15°. Si recorre 2 km en línea recta, ¿qué altura alcanza? (sen 15°≈0.259, h=2000×0.259=518 m).\n\n⏱️ Tiempo estimado: 90-120 min. ✅ Revisión grupal con énfasis en el procedimiento.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Aritmética, Álgebra y Trigonometría avanzada\n\n🔢 CONEXIÓN CON ARITMÉTICA Y ÁLGEBRA:\n• El teorema de Pitágoras implica resolver ecuaciones cuadráticas: x² = 169 → x = 13.\n• Las proporciones de semejanza son ecuaciones racionales.\n• Al calcular áreas y volúmenes, se aplican operaciones con decimales y fracciones.\n• Los productos notables aparecen al desarrollar (a+b)² = a² + 2ab + b², que es geométricamente el área de un cuadrado de lado (a+b).\n\n📏 CONEXIÓN CON GEOMETRÍA Y TRIGONOMETRÍA (Ciclo VII):\n• Congruencia y semejanza son la base para la geometría analítica: la distancia entre dos puntos usa Pitágoras.\n• Las razones trigonométricas se extienden a la circunferencia unitaria en Ciclo VII.\n• Los volúmenes de revolución (cono, esfera) se estudian en Cálculo, pero el volumen de prismas y pirámides es su antesala.\n\n📊 CONEXIÓN CON ESTADÍSTICA:\n• Gráficos de sectores circulares: el área de cada sector es proporcional a la frecuencia (semejanza de razones).\n• En estadística descriptiva, las escalas en los gráficos son aplicaciones de proporcionalidad geométrica.\n\n🧩 ACTIVIDAD INTEGRADORA: "Trigonometría sin calculadora": Construir una tabla de seno, coseno y tangente para los ángulos 0°, 30°, 45°, 60° y 90° usando triángulos notables y deducir los valores exactos con radicales.\n\n💡 REFLEXIÓN: La geometría del Ciclo VI une lo visual con lo algebraico. Medir, comparar, deducir y demostrar son habilidades que trascienden las matemáticas.`,
            6: `🌍 CORRELACIONES EXTERNAS: La geometría en el mundo real\n\n🏗️ ARQUITECTURA E INGENIERÍA CIVIL:\n• La estructura triangular es la más estable: puentes colgantes, grúas, torres de alta tensión.\n• Pitágoras en la construcción: asegurar ángulos rectos en cimientos (método 3-4-5 desde el antiguo Egipto).\n• Las pirámides de Egipto: volumen y proporciones basados en triángulos y razones.\n\n🧭 NAVEGACIÓN Y CARTOGRAFÍA:\n• La trigonometría permite calcular la posición de un barco midiendo ángulos entre estrellas y el horizonte.\n• GPS: trilateración basada en distancias (Pitágoras en 3 dimensiones).\n• Mapas: la proyección de Mercator usa semejanza y proporcionalidad.\n\n🔭 ASTRONOMÍA:\n• Aristarco de Samos (s. III a.C.) midió la distancia Tierra-Luna usando geometría de triángulos y sombras durante un eclipse.\n• Eratóstenes midió la circunferencia terrestre con un palo, su sombra y semejanza de triángulos.\n• Paralaje estelar: medir distancias a estrellas cercanas usando trigonometría.\n\n🎨 ARTE Y DISEÑO:\n• La perspectiva en el dibujo usa puntos de fuga y triángulos semejantes.\n• El número áureo (φ) y la proporción divina en el arte clásico y renacentista.\n• Diseño de logotipos con figuras geométricas y proporciones exactas.\n\n⚽ DEPORTES:\n• La trayectoria de un balón en un tiro libre (parábola) se analiza con trigonometría.\n• En golf, la distancia del drive depende del ángulo de salida.\n\n🧠 REFLEXIÓN FINAL: "Desde medir un terreno hasta calcular la distancia a las estrellas, la geometría y la trigonometría nos permiten dominar el espacio y comprender el cosmos. Todo empezó con un triángulo."\n\n🗣️ CITA: "No hay entrada real a la geometría." — Inscripción en la Academia de Platón. Y Euclides añadiría: "No hay camino real a la geometría, pero todo camino en la geometría empieza con un triángulo."`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Misión: Medir lo Inaccesible"\n\n🎯 OBJETIVO: Los estudiantes, organizados en equipos, aplicarán los conceptos de semejanza, Pitágoras y trigonometría para medir alturas y distancias inaccesibles en su entorno escolar (edificios, árboles, postes, ancho del patio), presentando un informe detallado con los métodos, cálculos y resultados.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: PLANIFICACIÓN Y ASIGNACIÓN (1 sesión)\n• 5 equipos con roles: Capitán (coordina), Geómetra (toma medidas), Trigónomo (cálculos trigonométricos), Cartógrafo (dibuja croquis), Redactor (elabora el informe).\n• Cada equipo recibe la misión de medir 3 objetivos con tres métodos diferentes:\n  - Método A: Semejanza de triángulos (usando sombras o espejo).\n  - Método B: Teorema de Pitágoras (si se puede formar un triángulo rectángulo).\n  - Método C: Trigonometría (usando clinómetro y cinta métrica).\n\nFASE 2: CONSTRUCCIÓN DE INSTRUMENTOS (1 sesión)\n• Fabrican un clinómetro casero (transportador de 360°, pajilla para visar, hilo con pesa en el centro).\n• Preparan una cinta métrica larga (o la construyen con hilo y marcas cada metro).\n• Preparan un espejo plano para el método de reflexión (semejanza con espejo).\n\nFASE 3: TRABAJO DE CAMPO (2 sesiones)\n• En el patio del colegio y exteriores autorizados, realizan las mediciones:\n  - Altura del asta de la bandera.\n  - Altura del edificio principal.\n  - Ancho de la cancha de fútbol desde un punto donde no se puede cruzar.\n• Registran meticulosamente: ángulos medidos, distancias horizontales, sombras (con hora exacta), croquis de la situación.\n• Realizan al menos 3 mediciones de cada objetivo para promediar y reducir errores.\n\nFASE 4: CÁLCULOS Y COMPROBACIÓN (1 sesión)\n• Aplican los tres métodos para cada objetivo.\n• Comparan los resultados obtenidos con diferentes métodos: ¿Son consistentes? ¿Cuál parece más preciso?\n• Calculan el error porcentual entre métodos.\n• Preparan tablas y gráficos comparativos.\n\nFASE 5: INFORME FINAL Y PRESENTACIÓN (1 sesión)\n• Elaboran un informe formal que incluye:\n  - Introducción y objetivos.\n  - Materiales e instrumentos (con fotos).\n  - Métodos utilizados (con esquemas y fórmulas).\n  - Datos recolectados (tablas).\n  - Cálculos detallados.\n  - Resultados y comparación.\n  - Conclusiones y recomendaciones.\n• Exposición oral de 5 minutos por equipo.\n\n🏆 EVALUACIÓN: Precisión de las mediciones (comparadas entre equipos), correcta aplicación de los métodos, calidad del informe, creatividad en la presentación, trabajo colaborativo.\n🎉 CIERRE: Se publican los resultados en un mural: "Las Matemáticas Miden el Mundo". El equipo con mediciones más precisas recibe el diploma de "Topógrafo Matemático".`,
        };

        const leccionExtensaAlgFuncVII = {
            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 3° a 5° de secundaria las competencias avanzadas en álgebra y funciones, abarcando los números reales, las funciones lineales, cuadráticas, exponenciales y logarítmicas, las progresiones aritméticas y geométricas, y la programación lineal, consolidando el pensamiento abstracto necesario para los estudios superiores en ciencias, ingeniería y economía.\n\n🎯 OBJETIVOS PARTICULARES:\n• Comprender el conjunto de números reales (R), sus operaciones y propiedades, incluyendo la recta real y las desigualdades.\n• Graficar e interpretar funciones lineales y cuadráticas, identificando dominio, rango, interceptos, vértice y eje de simetría.\n• Modelar situaciones de crecimiento y decrecimiento con funciones exponenciales y logarítmicas.\n• Resolver ecuaciones exponenciales y logarítmicas aplicando propiedades.\n• Identificar y calcular términos en progresiones aritméticas (PA) y geométricas (PG), incluyendo suma de términos e interés compuesto.\n• Formular y resolver problemas de programación lineal con dos variables, utilizando el método gráfico para optimizar funciones objetivo.\n\n📌 NOCIONES PRINCIPALES:\n• Números reales, irracionales, propiedades de los radicales, racionalización.\n• Función: definición, dominio, rango, gráfica. Función lineal (f(x)=mx+b), función cuadrática (f(x)=ax²+bx+c).\n• Función exponencial (f(x)=a·bˣ), función logarítmica (f(x)=log_b x), propiedades de los logaritmos.\n• Progresión aritmética (término general: a_n = a₁ + (n-1)d; suma: S_n = n(a₁+a_n)/2).\n• Progresión geométrica (término general: a_n = a₁·rⁿ⁻¹; suma finita: S_n = a₁(1-rⁿ)/(1-r); suma infinita: S = a₁/(1-r) si |r|<1).\n• Programación lineal: región factible, vértices, función objetivo, optimización.\n\n📌 NOCIONES SECUNDARIAS:\n• Funciones definidas por tramos. Función valor absoluto.\n• Traslaciones y reflexiones de funciones.\n• Ecuaciones exponenciales y logarítmicas. Modelos de crecimiento poblacional.\n• Interés compuesto como aplicación de progresiones geométricas.\n• Análisis de sensibilidad en programación lineal (nociones básicas).\n\n🌍 INTERESES SOCIETALES:\n• Las funciones modelan fenómenos reales: crecimiento poblacional (exponencial), depreciación de bienes, propagación de virus.\n• La programación lineal optimiza recursos en empresas: maximizar ganancias, minimizar costos, planificar producción.\n• Las progresiones son la base de las finanzas: interés simple (PA) e interés compuesto (PG).\n• Comprender los números reales y las funciones es fundamental para cualquier carrera STEM.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Modelando el mundo con funciones"\n\n🧩 MATERIALES: Computadoras o tablets con GeoGebra/Desmos, calculadoras científicas, dados, fichas, papel milimetrado, reglas, cronómetros, recipientes con agua caliente (para enfriamiento), datos reales de población.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Carrera de funciones lineales" - Con un coche de juguete a velocidad constante, miden distancia cada 2 segundos. Tabla de valores. Grafican en papel milimetrado. ¿Qué forma tiene la gráfica? (Línea recta). Hallan la pendiente (velocidad) y la ecuación de la recta.\n\nESTACIÓN 2: "El salto parabólico" - Lanzan una pelota y filman en cámara lenta con un celular. Miden la altura en diferentes instantes. Grafican tiempo vs. altura. ¿Qué forma resulta? (Parábola). Identifican el vértice (altura máxima), los interceptos (cuándo sale y cuándo cae).\n\nESTACIÓN 3: "Crecimiento exponencial de bacterias" (simulación) - Comienzan con 1 "bacteria" (ficha). Se duplica cada minuto. Tabla: 0 min → 1, 1 min → 2, 2 min → 4, 3 min → 8... Grafican. ¿Cuántas bacterias habrá en 1 hora? (2^60 ≈ 1.15×10^18). ¡Es exponencial!\n\nESTACIÓN 4: "Logaritmos y pH" - Miden el pH de diferentes líquidos (agua, limón, leche, jabón) con papel tornasol. El pH es una escala logarítmica: pH = -log[H⁺]. Calculan la concentración de iones de hidrógeno: [H⁺] = 10^(-pH).\n\n💬 REFLEXIÓN EN PLENARIA: ¿Qué modela mejor el crecimiento: una línea recta o una curva? ¿Por qué la escala de pH usa logaritmos? ¿Cómo se relacionan las funciones con el mundo real?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "Patrones que se convierten en funciones"\n\n📊 OBSERVACIÓN GUIADA: FUNCIÓN CUADRÁTICA\nSe presenta el área de un rectángulo cuyo perímetro es fijo (24 m). Se calcula el área para diferentes bases:\n\n| Base (x) | Altura (12-x) | Área A(x)=x(12-x) |\n|---|---|---|\n| 1 | 11 | 11 |\n| 2 | 10 | 20 |\n| 3 | 9 | 27 |\n| 4 | 8 | 32 |\n| 5 | 7 | 35 |\n| 6 | 6 | 36 |\n| 7 | 5 | 35 |\n| 8 | 4 | 32 |\n\nLos estudiantes grafican y observan: el área crece, llega a un máximo (36 m² cuando base=6, un cuadrado) y luego decrece. La gráfica es una parábola cóncava hacia abajo. El vértice (6, 36) es el punto óptimo.\nConclusión: "La función cuadrática A(x)=-x²+12x modela esta situación y su vértice indica el máximo".\n\n📊 OBSERVACIÓN GUIADA: PROGRESIONES\n\nProgresión Aritmética: Salario inicial S/1000, aumento de S/150 cada año.\nAño 1: 1000; Año 2: 1150; Año 3: 1300... Cada término se obtiene sumando una constante (d=150).\nGráfica: puntos alineados (función lineal discreta).\n\nProgresión Geométrica: Inversión de S/1000 al 10% de interés compuesto anual.\nAño 1: 1100; Año 2: 1210; Año 3: 1331... Cada término se obtiene multiplicando por una constante (r=1.10).\nGráfica: curva creciente (función exponencial discreta).\n\nConclusión: "En una PA, la diferencia es constante. En una PG, el cociente (razón) es constante".\n\n📊 OBSERVACIÓN GUIADA: PROGRAMACIÓN LINEAL\nSe plantea: "Un taller fabrica mesas (ganancia S/80) y sillas (ganancia S/50). Cada mesa usa 4 m de madera y 2 h de trabajo. Cada silla usa 2 m de madera y 1 h de trabajo. Se dispone de 80 m de madera y 36 h de trabajo. ¿Cuántas mesas y sillas maximizan la ganancia?"\n\nLos estudiantes grafican las restricciones (inecuaciones), identifican la región factible, hallan los vértices y evalúan la función ganancia en cada uno. Descubren que el máximo está en un vértice.\nConclusión: "En programación lineal, la solución óptima siempre está en un vértice de la región factible".\n\n📝 REGISTRO: Los estudiantes escriben sus propias conclusiones sobre la relación entre las progresiones y las funciones lineales/exponenciales.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Álgebra y Funciones — Ciclo VII\n\n🔢 1. NÚMEROS REALES (R)\n\nR incluye Racionales (Q) e Irracionales (I). Todo número real corresponde a un punto en la recta real.\n\n📏 PROPIEDADES DE RADICALES:\n• √(a·b) = √a · √b; √(a/b) = √a / √b (b≠0).\n• Racionalización: Eliminar radicales del denominador.\n  Ej: 1/√2 = √2/2; 1/(√a+√b) = (√a-√b)/(a-b).\n\n📏 INTERVALOS EN R: (a,b) abierto, [a,b] cerrado, [a,b) semiabierto, (a,∞) infinito.\n\n📈 2. FUNCIONES\n\nUna función f: A → B asigna a cada elemento de A (dominio) un único elemento de B (codominio). Notación: y = f(x).\n\n📏 FUNCIÓN LINEAL: f(x) = mx + b\n• m = pendiente (tasa de cambio). b = ordenada al origen.\n• Gráfica: línea recta. Si m>0, creciente; m<0, decreciente; m=0, constante.\n• Rectas paralelas: misma pendiente. Rectas perpendiculares: m₁·m₂ = -1.\n\n📏 FUNCIÓN CUADRÁTICA: f(x) = ax² + bx + c (a≠0)\n• Gráfica: parábola. Si a>0, cóncava hacia arriba (mínimo). Si a<0, cóncava hacia abajo (máximo).\n• Vértice: x_v = -b/(2a); y_v = f(x_v).\n• Discriminante: Δ = b² - 4ac. Raíces (interceptos en x): x = [-b ± √Δ]/(2a).\n• Eje de simetría: x = -b/(2a).\n\n📈 3. FUNCIONES EXPONENCIALES\n\nf(x) = a · bˣ, con a≠0, b>0, b≠1.\n• Si b>1, la función es creciente (crecimiento).\n• Si 0<b<1, la función es decreciente (decrecimiento).\n• Modela crecimiento poblacional, interés compuesto, desintegración radiactiva.\n\n📏 PROPIEDADES DE POTENCIAS:\nbᵐ · bⁿ = bᵐ⁺ⁿ; bᵐ / bⁿ = bᵐ⁻ⁿ; (bᵐ)ⁿ = bᵐⁿ; b⁰ = 1; b⁻ⁿ = 1/bⁿ.\n\n📉 4. FUNCIONES LOGARÍTMICAS\n\nf(x) = log_b x, donde b>0, b≠1, x>0. Es la función inversa de la exponencial: log_b x = y ⇔ bʸ = x.\n\n📏 PROPIEDADES DE LOGARITMOS:\n• log_b (x·y) = log_b x + log_b y\n• log_b (x/y) = log_b x - log_b y\n• log_b (xⁿ) = n·log_b x\n• log_b 1 = 0; log_b b = 1\n• Cambio de base: log_a x = (log_b x) / (log_b a)\n\n📏 ECUACIONES EXPONENCIALES Y LOGARÍTMICAS:\n• Exponencial: 2ˣ = 32 → x = log₂ 32 = 5.\n• Logarítmica: log₂ (x-1) = 3 → x-1 = 2³ = 8 → x = 9.\n\n🔢 5. PROGRESIONES\n\n📏 PROGRESIÓN ARITMÉTICA (PA): Sucesión donde la diferencia entre términos consecutivos es constante (d).\n• Término general: a_n = a₁ + (n-1)d\n• Suma de n primeros términos: S_n = n(a₁ + a_n)/2\n• Interés simple como PA.\n\n📏 PROGRESIÓN GEOMÉTRICA (PG): Sucesión donde el cociente entre términos consecutivos es constante (r).\n• Término general: a_n = a₁ · rⁿ⁻¹\n• Suma de n primeros términos (si r≠1): S_n = a₁(1 - rⁿ)/(1 - r)\n• Suma infinita (si |r|<1): S∞ = a₁/(1 - r)\n• Interés compuesto como PG: M = C(1+i)ⁿ.\n\n📊 6. PROGRAMACIÓN LINEAL\n\nTécnica para optimizar (maximizar o minimizar) una función lineal sujeta a restricciones lineales (inecuaciones).\n\n📏 PASOS DEL MÉTODO GRÁFICO:\n1. Definir variables (x, y ≥ 0).\n2. Expresar restricciones como inecuaciones lineales.\n3. Graficar la región factible (intersección de todas las inecuaciones).\n4. Determinar los vértices de la región factible.\n5. Evaluar la función objetivo en cada vértice.\n6. El valor óptimo es el mayor (si maximizamos) o el menor (si minimizamos).\n\n⚠️ ERRORES COMUNES:\n• En funciones cuadráticas, olvidar que el vértice es un punto (x, y) y dar solo x.\n• Confundir las propiedades de logaritmos: log(x+y) ≠ log x + log y.\n• En progresiones, confundir d (diferencia en PA) con r (razón en PG).\n• En programación lineal, no considerar todos los vértices o equivocarse en el sentido de la desigualdad.`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Números Reales\n1. Simplifica: √72 = 6√2; √(50) - √(18) = 5√2 - 3√2 = 2√2.\n2. Racionaliza: 5/√3 = 5√3/3; 2/(√5-1) = 2(√5+1)/4 = (√5+1)/2.\n3. Representa en la recta real: x ∈ [-2, 5); x ∈ (-∞, 3].\n\n📝 BLOQUE 2: Funciones Lineales y Cuadráticas\n4. Grafica y = 2x - 3. Pendiente=2, ordenada=-3.\n5. Halla la ecuación de la recta que pasa por (2,5) y tiene pendiente 3. (y-5=3(x-2) → y=3x-1).\n6. Para f(x) = x² - 6x + 5:\na) Vértice: x_v=3, y_v=-4. Vértice (3,-4).\nb) Raíces: (x-1)(x-5)=0 → x=1, x=5.\nc) Gráfica: parábola cóncava hacia arriba.\n7. Una pelota se lanza y su altura es h(t) = -5t² + 20t + 1. ¿Altura máxima? t=2s, h(2)=21m. ¿Cuándo cae al suelo? -5t²+20t+1=0 → t≈4.05s.\n\n📝 BLOQUE 3: Funciones Exponenciales y Logarítmicas\n8. Resuelve: 3^(x+2) = 27 → 3^(x+2) = 3³ → x+2=3 → x=1.\n9. Resuelve: log₃(x-2) = 2 → x-2 = 9 → x=11.\n10. Una población se duplica cada 5 años. Si hay 1000 ahora, ¿cuántos en 20 años? P=1000·2^(20/5)=1000·16=16000.\n11. Simplifica: log₂ 8 + log₂ 4 - log₂ 2 = 3 + 2 - 1 = 4.\n\n📝 BLOQUE 4: Progresiones\n12. En una PA, a₁=3 y d=4. Calcula a₁₀ y S₁₀. (a₁₀=3+9·4=39; S₁₀=10(3+39)/2=210).\n13. En una PG, a₁=2 y r=3. Calcula a₅ y S₅. (a₅=2·3⁴=162; S₅=2(1-243)/(1-3)=2(-242)/(-2)=242).\n14. Suma infinita: 1 + 1/2 + 1/4 + 1/8 + ... = 1/(1-1/2)=2.\n15. Se invierte S/5000 al 8% anual compuesto. ¿Monto en 3 años? M=5000(1.08)³=5000·1.2597=S/6298.56.\n\n📝 BLOQUE 5: Programación Lineal\n16. Maximizar Z = 3x + 5y sujeta a:\nx + 2y ≤ 8\n3x + y ≤ 12\nx ≥ 0, y ≥ 0\nVértices: (0,0): Z=0; (4,0): Z=12; (0,4): Z=20; (2,3): Z=3(2)+5(3)=21. Máximo en (2,3): Z=21.\n\n17. Una fábrica produce dos tipos de mochilas: A (ganancia S/15) y B (ganancia S/25). Cada mochila A requiere 2h de costura y 1h de acabado. Cada B requiere 3h de costura y 2h de acabado. Se dispone de 60h de costura y 40h de acabado por semana. ¿Cuántas mochilas de cada tipo maximizan la ganancia? (Plantear y resolver por método gráfico).\n\n⏱️ Tiempo estimado: 100-130 min. ✅ Revisión en grupo.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Geometría, Trigonometría y Estadística\n\n📐 CONEXIÓN CON GEOMETRÍA Y TRIGONOMETRÍA:\n• Las funciones trigonométricas seno, coseno y tangente son funciones analizadas en álgebra: dominio, rango, periodicidad, gráficas.\n• La distancia entre dos puntos en geometría analítica se basa en números reales y radicales.\n• Las ecuaciones de la circunferencia (x-h)²+(y-k)²=r² y otras cónicas son funciones (relaciones) cuadráticas.\n• La resolución de triángulos oblicuángulos con ley de senos y cosenos implica ecuaciones exponenciales/logarítmicas en contextos avanzados.\n\n📏 CONEXIÓN CON ESTADÍSTICA Y PROBABILIDAD:\n• La campana de Gauss (distribución normal) es una función exponencial: f(x) = (1/σ√(2π)) e^(-(x-μ)²/2σ²).\n• El crecimiento exponencial de datos se "linealiza" usando logaritmos (papel semilogarítmico).\n• Las progresiones modelan escenarios de probabilidad (ej: probabilidad geométrica en juegos repetidos).\n• La regresión lineal (estadística) es una aplicación de funciones lineales.\n\n🧩 ACTIVIDAD INTEGRADORA: "Ajuste de curvas": Dado un conjunto de datos reales (ej: casos de COVID por día), probar un modelo exponencial, uno logarítmico y uno lineal. Decidir cuál ajusta mejor usando el coeficiente de determinación R² (con calculadora/software).\n\n💡 REFLEXIÓN: Las funciones son el núcleo de las matemáticas superiores. Unificar álgebra, geometría y estadística bajo el concepto de función permite modelar la complejidad.`,
            6: `🌍 CORRELACIONES EXTERNAS: Funciones y progresiones en el mundo real\n\n💹 ECONOMÍA Y FINANZAS:\n• Interés compuesto (PG): el dinero crece exponencialmente. Regla del 72: años para duplicar = 72 / tasa %.\n• Depreciación lineal (PA): un activo pierde valor constante cada año.\n• Función de oferta y demanda: equilibrio de mercado (intersección de funciones lineales).\n• Programación lineal: optimización de carteras de inversión.\n\n🦠 BIOLOGÍA Y MEDICINA:\n• Crecimiento bacteriano exponencial: N(t) = N₀ · e^(kt).\n• Desintegración radiactiva (vida media): M(t) = M₀ · (1/2)^(t/T).\n• Escala de Richter (terremotos): escala logarítmica base 10. Cada punto es 10 veces más potente.\n• Escala de decibeles (sonido): también logarítmica.\n\n💻 TECNOLOGÍA Y COMPUTACIÓN:\n• Complejidad algorítmica: O(log n), O(n), O(n²), O(2ⁿ) son funciones que describen eficiencia.\n• La compresión de archivos (JPEG, MP3) usa transformadas basadas en funciones.\n• La inteligencia artificial y el machine learning se basan en funciones de activación (sigmoide, ReLU).\n\n🔭 ASTRONOMÍA Y FÍSICA:\n• La ley de enfriamiento de Newton es una función exponencial: T(t)=T_amb+(T₀-T_amb)e^(-kt).\n• La luminosidad de las estrellas (magnitud) es logarítmica.\n• La trayectoria de proyectiles (parábola) y órbitas planetarias (elipses, parábolas, hipérbolas) son funciones cuadráticas y cónicas.\n\n🧠 REFLEXIÓN FINAL: "El mundo no es lineal. Entender funciones exponenciales es entender pandemias, intereses bancarios y crecimiento poblacional. Entender logaritmos es entender terremotos y sonidos. Las matemáticas del Ciclo VII son la lente para ver el mundo en su verdadera escala."\n\n🗣️ CITA: "La función más hermosa del universo es aquella que describe su crecimiento." — Adaptación libre inspirada en Euler.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Optimizadores S.A.: Asesoría en Programación Lineal"\n\n🎯 OBJETIVO: Los estudiantes, en equipos, simularán ser una consultora que resuelve problemas reales de optimización usando programación lineal, presentando un portafolio con al menos 3 casos resueltos, incluyendo el modelo matemático, la solución gráfica (y computacional si es posible) y un análisis de sensibilidad básico.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: INVESTIGACIÓN Y SELECCIÓN DE CASOS (1 sesión)\n• 5 equipos. Cada equipo busca o recibe del docente 3 casos de optimización en diferentes contextos:\n  - Caso 1: Producción industrial (maximizar ganancias con recursos limitados).\n  - Caso 2: Dieta alimenticia (minimizar costo cumpliendo requerimientos nutricionales).\n  - Caso 3: Transporte y logística (minimizar costos de envío).\n• Los casos pueden ser reales (adaptados de noticias o empresas locales) o hipotéticos bien contextualizados.\n\nFASE 2: MODELAMIENTO MATEMÁTICO (2 sesiones)\n• Para cada caso:\n  - Definen variables de decisión.\n  - Expresan las restricciones como inecuaciones lineales.\n  - Definen la función objetivo.\n  - Grafican la región factible en papel milimetrado y en GeoGebra/Desmos.\n  - Determinan los vértices y el valor óptimo.\n\nFASE 3: ANÁLISIS DE SENSIBILIDAD Y REFLEXIÓN (1 sesión)\n• ¿Qué pasa si aumenta/disminuye un recurso? (precio sombra).\n• ¿Qué pasa si cambia la ganancia de un producto?\n• ¿Cuál es el recurso más crítico (cuello de botella)?\n• Simulan cambios en los parámetros y observan cómo se desplaza la solución.\n\nFASE 4: ELABORACIÓN DEL PORTAFOLIO (1 sesión)\n• Documento formal que incluye:\n  - Portada y resumen ejecutivo.\n  - Cada caso: introducción, modelo matemático, gráfica de la región factible, solución, interpretación en lenguaje natural.\n  - Sección de análisis de sensibilidad.\n  - Conclusiones y recomendaciones.\n\nFASE 5: PRESENTACIÓN AL "COMITÉ EJECUTIVO" (1 sesión)\n• Cada equipo expone como si presentara a la gerencia de una empresa.\n• Deben defender sus recomendaciones basándose en los resultados matemáticos.\n• El "comité" (docente y compañeros) hace preguntas y evalúa.\n\n🏆 EVALUACIÓN: Correcto modelamiento matemático, precisión en la solución gráfica, profundidad del análisis de sensibilidad, calidad del portafolio, claridad y profesionalismo en la presentación.\n🎉 CIERRE: Se otorgan diplomas de "Consultor en Investigación de Operaciones". El mejor portafolio se imprime y se expone.`,

            0: `🎯 OBJETIVO GENERAL: Desarrollar en los estudiantes de 3° a 5° de secundaria las competencias en geometría analítica y trigonometría avanzada, abarcando el estudio de la recta, la circunferencia y la parábola en el plano cartesiano, así como la ampliación de las funciones trigonométricas a cualquier ángulo, identidades trigonométricas y resolución de triángulos oblicuángulos, consolidando las herramientas matemáticas necesarias para el cálculo y la física universitaria.\n\n🎯 OBJETIVOS PARTICULARES:\n• Aplicar los conceptos de distancia entre dos puntos, punto medio y pendiente en el plano cartesiano.\n• Obtener e interpretar las ecuaciones de la recta en sus diversas formas: punto-pendiente, pendiente-ordenada al origen, general y simétrica.\n• Determinar la ecuación de la circunferencia con centro en el origen y fuera del origen, identificando centro y radio.\n• Reconocer y graficar la parábola como lugar geométrico, obteniendo sus elementos: vértice, foco, directriz y eje de simetría.\n• Extender las funciones trigonométricas a ángulos en posición normal, usando la circunferencia unitaria.\n• Aplicar identidades trigonométricas fundamentales (pitagóricas, recíprocas, de cociente, suma y diferencia, ángulo doble y mitad).\n• Resolver triángulos oblicuángulos usando la ley de senos y la ley de cosenos.\n\n📌 NOCIONES PRINCIPALES:\n• Plano cartesiano: distancia entre dos puntos, punto medio, pendiente de un segmento.\n• Ecuación de la recta: y - y₁ = m(x - x₁); y = mx + b; Ax + By + C = 0; x/a + y/b = 1.\n• Ecuación de la circunferencia: (x - h)² + (y - k)² = r². Ecuación general: x² + y² + Dx + Ey + F = 0.\n• Parábola: lugares geométricos. Ecuaciones: x² = 4py (vertical), y² = 4px (horizontal). Elementos: vértice V(h,k), foco F, directriz, lado recto.\n• Circunferencia unitaria y funciones trigonométricas para cualquier ángulo.\n• Identidades trigonométricas. Ley de senos: a/sen A = b/sen B = c/sen C = 2R. Ley de cosenos: a² = b² + c² - 2bc cos A.\n\n📌 NOCIONES SECUNDARIAS:\n• Posiciones relativas entre rectas: paralelismo, perpendicularidad, intersección, ángulo entre rectas.\n• Posiciones relativas entre recta y circunferencia: secante, tangente, exterior.\n• Ecuación de la elipse como extensión de la circunferencia.\n• Ecuaciones trigonométricas. Funciones trigonométricas inversas.\n• Aplicaciones a la navegación marítima y aérea (rumbos, distancias).\n\n🌍 INTERESES SOCIETALES:\n• La geometría analítica unifica el álgebra y la geometría: cada figura tiene una ecuación. Esto es la base del diseño asistido por computadora (CAD) usado en ingeniería, arquitectura y animación.\n• Las parábolas aparecen en los faros de autos, antenas satelitales y puentes colgantes.\n• La trigonometría avanzada es esencial en topografía, navegación GPS, astronomía y física ondulatoria.\n• Las identidades trigonométricas simplifican cálculos en ingeniería eléctrica (corriente alterna) y acústica.`,
            1: `🔍 ACTIVIDAD DE DESCUBIERTA: "Cazadores de curvas y ángulos"\n\n🧩 MATERIALES: Papel milimetrado, reglas, compás, hilo, chinches, cartulina, GeoGebra/Desmos, transportador circular, calculadora científica.\n\n🎲 ESTACIONES DE EXPLORACIÓN (rotación por equipos):\n\nESTACIÓN 1: "Construye una parábola con hilo" - En una cartulina, trazan una recta horizontal (directriz) y marcan un punto F arriba de ella (foco). Con un chinche en F, un hilo y una escuadra que se desliza sobre la directriz, dibujan puntos equidistantes del foco y la directriz. Descubren que la curva formada es una parábola. Miden: ¿Qué relación hay entre las coordenadas de los puntos?\n\nESTACIÓN 2: "Circunferencia en el plano" - Con GeoGebra, colocan un punto C(2,3) y un radio variable. Observan la ecuación: (x-2)²+(y-3)²=r². Mueven C y ven cómo cambia la ecuación. Luego colocan puntos P(x,y) que satisfacen x²+y²+6x-4y-12=0. ¿Qué figura resulta? (Una circunferencia). Hallan centro y radio completando cuadrados.\n\nESTACIÓN 3: "La circunferencia unitaria y los ángulos" - Sobre un círculo de radio 1 dibujado en cartulina, marcan ángulos cada 15°. Para cada ángulo, miden las coordenadas (coseno, seno) del punto en la circunferencia. Completan una tabla y verifican con la calculadora. Descubren que cos²θ + sen²θ = 1 siempre.\n\nESTACIÓN 4: "Ley de senos con geoplano circular" - Con palitos y un transportador, construyen un triángulo oblicuángulo. Miden lados y ángulos. Luego calculan a/senA, b/senB, c/senC. ¿Son iguales? (Sí, son iguales al diámetro de la circunferencia circunscrita).\n\n💬 REFLEXIÓN EN PLENARIA: ¿Qué ventaja tiene describir figuras con ecuaciones? ¿Por qué es útil la circunferencia unitaria? ¿Dónde se aplica la ley de senos?`,
            2: `🧠 ACTIVIDAD INDUCTIVA: "De la geometría sintética a la analítica"\n\n📊 OBSERVACIÓN GUIADA: LA RECTA\nSe presentan 5 pares de puntos y se pide a los estudiantes que calculen la pendiente, luego escriban la ecuación punto-pendiente y la grafiquen:\n\n(0,2) y (3,6) → m=4/3 → y-2=(4/3)(x-0) → y=(4/3)x+2.\n(1,1) y (4,7) → m=6/3=2 → y-1=2(x-1) → y=2x-1.\n(-2,5) y (2,1) → m=-4/4=-1 → y-5=-1(x+2) → y=-x+3.\n\nLos estudiantes observan:\n• Si m>0, la recta sube (creciente).\n• Si m<0, la recta baja (decreciente).\n• Si m=0, la recta es horizontal.\n• Si la recta es vertical, la pendiente no está definida (x = constante).\nConclusión: "La pendiente mide la inclinación de la recta: m = Δy/Δx".\n\n📊 OBSERVACIÓN GUIADA: IDENTIDADES TRIGONOMÉTRICAS\nUsando la circunferencia unitaria y el teorema de Pitágoras:\nPara cualquier punto (cos θ, sen θ) sobre la circunferencia x² + y² = 1, se cumple cos²θ + sen²θ = 1.\n\nDividiendo entre cos²θ: 1 + tan²θ = sec²θ.\nDividiendo entre sen²θ: 1 + cot²θ = csc²θ.\n\nLuego, usando geometría en el plano, se deduce:\nsen(α+β) = sen α cos β + cos α sen β\ncos(α+β) = cos α cos β - sen α sen β\ntan(α+β) = (tan α + tan β) / (1 - tan α tan β)\n\n📝 REGISTRO: Cada estudiante verifica las identidades con ángulos concretos (ej: 30° y 45°) usando la calculadora.`,
            3: `📐 TRANSMISIÓN CONCEPTUAL: Geometría Analítica y Trigonometría Avanzada\n\n📏 1. GEOMETRÍA ANALÍTICA\n\n🔹 DISTANCIA ENTRE DOS PUNTOS: d = √[(x₂ - x₁)² + (y₂ - y₁)²] (Teorema de Pitágoras).\n🔹 PUNTO MEDIO: M = ((x₁+x₂)/2, (y₁+y₂)/2).\n🔹 PENDIENTE: m = (y₂ - y₁)/(x₂ - x₁).\n\n📏 LA RECTA:\n• Punto-pendiente: y - y₁ = m(x - x₁).\n• Pendiente-ordenada: y = mx + b.\n• Ecuación general: Ax + By + C = 0.\n• Ecuación simétrica (canónica): x/a + y/b = 1 (a: intercepto en x, b: intercepto en y).\n\n📏 POSICIONES RELATIVAS:\n• Paralelas: m₁ = m₂ (y B₁/A₁ = B₂/A₂ en forma general).\n• Perpendiculares: m₁ · m₂ = -1 (o A₁A₂ + B₁B₂ = 0).\n• Ángulo entre rectas: tan θ = |(m₂ - m₁)/(1 + m₁m₂)|.\n\n📏 LA CIRCUNFERENCIA:\n• Ecuación ordinaria: (x - h)² + (y - k)² = r², con centro C(h,k) y radio r.\n• Ecuación general: x² + y² + Dx + Ey + F = 0, donde h = -D/2, k = -E/2, r² = h² + k² - F.\n• Condición para que sea circunferencia: r² > 0.\n\n📏 LA PARÁBOLA:\n• Definición: Lugar geométrico de puntos que equidistan de un punto fijo (foco) y una recta fija (directriz).\n• Parábola con vértice en el origen, eje vertical: x² = 4py. Foco (0,p), directriz y = -p.\n• Parábola con vértice en el origen, eje horizontal: y² = 4px. Foco (p,0), directriz x = -p.\n• Vértice en V(h,k):\n  - Eje vertical: (x - h)² = 4p(y - k). Si p>0, abre hacia arriba; p<0, hacia abajo.\n  - Eje horizontal: (y - k)² = 4p(x - h). Si p>0, abre a la derecha; p<0, a la izquierda.\n• Lado recto: |4p|.\n\n📐 2. TRIGONOMETRÍA AVANZADA\n\n📏 ÁNGULOS EN POSICIÓN NORMAL Y CIRCUNFERENCIA UNITARIA:\n• Un ángulo en posición normal tiene su vértice en el origen y su lado inicial en el semieje positivo x.\n• Circunferencia unitaria: x² + y² = 1. Para un ángulo θ, el punto sobre la circunferencia es (cos θ, sen θ).\n• Signos en los cuadrantes:\n  - I: todas positivas.\n  - II: sen positivo, cos y tan negativos.\n  - III: tan positiva, sen y cos negativos.\n  - IV: cos positiva, sen y tan negativos.\n\n📏 IDENTIDADES TRIGONOMÉTRICAS FUNDAMENTALES:\n• Pitagóricas: sen²θ + cos²θ = 1; 1 + tan²θ = sec²θ; 1 + cot²θ = csc²θ.\n• Recíprocas: csc θ = 1/sen θ; sec θ = 1/cos θ; cot θ = 1/tan θ.\n• De cociente: tan θ = sen θ / cos θ; cot θ = cos θ / sen θ.\n• Suma y diferencia:\n  sen(α±β) = sen α cos β ± cos α sen β\n  cos(α±β) = cos α cos β ∓ sen α sen β\n  tan(α±β) = (tan α ± tan β)/(1 ∓ tan α tan β)\n• Ángulo doble: sen 2θ = 2 sen θ cos θ; cos 2θ = cos²θ - sen²θ = 2cos²θ - 1 = 1 - 2sen²θ; tan 2θ = 2 tan θ/(1 - tan²θ).\n• Ángulo mitad: sen(θ/2) = ±√[(1 - cos θ)/2]; cos(θ/2) = ±√[(1 + cos θ)/2].\n\n📏 RESOLUCIÓN DE TRIÁNGULOS OBLICUÁNGULOS:\n• Ley de senos: a/sen A = b/sen B = c/sen C = 2R (R: circunradio). Se usa si se conocen: dos ángulos y un lado (ALA) o dos lados y un ángulo opuesto (LLA).\n• Ley de cosenos: a² = b² + c² - 2bc cos A. Se usa si se conocen: dos lados y el ángulo comprendido (LAL) o los tres lados (LLL).\n\n⚠️ ERRORES COMUNES:\n• Confundir el signo de p en la parábola (abre hacia el lado positivo o negativo del eje).\n• En la circunferencia, olvidar completar cuadrados correctamente para encontrar centro y radio.\n• Aplicar mal la ley de senos en el caso ambiguo (LLA puede tener 0, 1 o 2 soluciones).\n• Usar identidades sin verificar el cuadrante del ángulo (signos de seno y coseno).`,
            4: `✏️ TRABAJOS DIRIGIDOS: Ejercicios de Aplicación\n\n📝 BLOQUE 1: Recta\n1. Distancia entre A(2,-1) y B(6,2): d=√(16+9)=√25=5.\n2. Pendiente: A(-3,4) a B(5,-2). m=(-2-4)/(5+3)=-6/8=-3/4.\n3. Ecuación de la recta que pasa por (1,3) con m=-2: y-3=-2(x-1) → y=-2x+5.\n4. ¿Son paralelas o perpendiculares? L1: y=3x-5, L2: y=3x+2 (Paralelas, m=3 ambas). L3: y=(-1/3)x+7 (Perpendicular a L1, 3×(-1/3)=-1).\n5. Intersección de y=2x-3 e y=-x+6: 2x-3=-x+6 → 3x=9 → x=3, y=3. P(3,3).\n\n📝 BLOQUE 2: Circunferencia\n6. Ecuación de la circunferencia con centro (4,-2) y radio 5: (x-4)²+(y+2)²=25.\n7. Halla centro y radio de: x²+y²-6x+8y-11=0. Completa cuadrados: (x²-6x+9)+(y²+8y+16)=11+9+16 → (x-3)²+(y+4)²=36. Centro (3,-4), r=6.\n8. ¿El punto (2,3) está dentro, sobre o fuera de la circunferencia (x-1)²+(y-2)²=4? Distancia al centro: d=√(1²+1²)=√2≈1.41 < 2. Está dentro.\n\n📝 BLOQUE 3: Parábola\n9. Dada x² = 12y, identifica: 4p=12 → p=3. Vértice (0,0), Foco (0,3), Directriz y=-3, abre hacia arriba.\n10. Ecuación de la parábola con vértice (2,-3) y foco (2,0). Eje vertical, p=3 (hacia arriba): (x-2)²=12(y+3).\n11. Dada (y-1)²=-8(x+2), identifica: 4p=-8 → p=-2. Vértice (-2,1), Foco (-4,1), Directriz x=0, abre a la izquierda.\n\n📝 BLOQUE 4: Identidades Trigonométricas\n12. Verifica: sen²θ + cos²θ = 1 para θ=30° (sen=1/2, cos=√3/2 → 1/4+3/4=1).\n13. Simplifica: (sen x + cos x)² = sen²x + 2sen x cos x + cos²x = 1 + 2sen x cos x = 1 + sen 2x.\n14. Si tan θ = 3/4 y θ está en III, halla sen θ y cos θ. (En III, ambos negativos: sen=-3/5, cos=-4/5).\n15. Calcula sen 75° usando suma de ángulos: sen(45°+30°)=sen45°cos30°+cos45°sen30°=(√2/2)(√3/2)+(√2/2)(1/2)=√2(√3+1)/4.\n\n📝 BLOQUE 5: Ley de Senos y Cosenos\n16. Resuelve el triángulo: A=40°, B=60°, a=10 cm.\nC=80°. Por ley de senos: b=(10 sen 60°)/sen 40°=(10×0.866)/0.643≈13.47 cm. c=(10 sen 80°)/sen 40°=(10×0.985)/0.643≈15.32 cm.\n17. Resuelve: a=7, b=9, C=50° (LAL). Ley de cosenos: c²=49+81-2×7×9×cos50°=130-126×0.643=130-81.0=49 → c=7. Luego ley de senos para ángulos.\n18. Un barco sale de un puerto, navega 20 km al este y luego 15 km al norte. Halla la distancia directa y el rumbo (ángulo) desde el puerto. (d=√(400+225)=25 km; tan θ=15/20 → θ≈36.87° al norte del este).\n\n⏱️ Tiempo estimado: 90-120 min. ✅ Corrección detallada.`,
            5: `🔗 CORRELACIONES INTERNAS: Conexión con Álgebra, Funciones y Estadística\n\n📏 CONEXIÓN CON ÁLGEBRA Y FUNCIONES:\n• La ecuación de la recta es una función lineal. La ecuación de la parábola (x²=4py) es una función cuadrática en x o en y.\n• Las intersecciones entre curvas son sistemas de ecuaciones: recta y circunferencia → sistema no lineal.\n• Las identidades trigonométricas son igualdades algebraicas; su demostración usa álgebra.\n• La circunferencia unitaria permite definir las funciones seno y coseno para todo número real, ampliándolas a funciones periódicas.\n\n📐 CONEXIÓN CON GEOMETRÍA (Ciclo VI):\n• La ley de cosenos generaliza el teorema de Pitágoras (cos 90°=0 → a²=b²+c²).\n• La ley de senos se relaciona con la circunferencia circunscrita (R).\n• Las identidades trigonométricas se demuestran usando relaciones geométricas en el triángulo y la circunferencia.\n\n📊 CONEXIÓN CON ESTADÍSTICA:\n• En estadística bivariada, la recta de regresión (mínimos cuadrados) es una aplicación de la ecuación de la recta.\n• Algunas distribuciones de probabilidad tienen funciones trigonométricas en su formulación (ej: distribución de Cauchy).\n\n🧩 ACTIVIDAD INTEGRADORA: "Cónicas con GeoGebra": Construir las 4 cónicas (circunferencia, elipse, parábola, hipérbola) en GeoGebra a partir de su definición como lugar geométrico, no solo de su ecuación. Luego modificar parámetros y observar cómo cambian.\n\n💡 REFLEXIÓN: La geometría analítica y la trigonometría son el puente perfecto entre el álgebra abstracta y el mundo visual. Lo que se toca y se ve, se puede escribir en forma de ecuación.`,
            6: `🌍 CORRELACIONES EXTERNAS: Geometría analítica y trigonometría en el mundo real\n\n🛰️ TECNOLOGÍA ESPACIAL Y TELECOMUNICACIONES:\n• Las antenas parabólicas captan ondas que llegan paralelas al eje y las concentran en el foco (receptor).\n• Los telescopios reflectores (Hubble, James Webb) usan espejos parabólicos.\n• Las órbitas de satélites son elipses y parábolas (si la velocidad es la de escape).\n• El GPS calcula posiciones usando trilateración (intersección de circunferencias en 3D).\n\n🏗️ ARQUITECTURA E INGENIERÍA:\n• Puentes colgantes: el cable principal forma una parábola.\n• Arcos parabólicos en puentes y presas distribuyen el peso de manera óptima.\n• Diseño de reflectores (faros de auto) con superficie parabólica para dirigir la luz.\n• Cálculo de estructuras trianguladas (cerchas) usando ley de senos y cosenos.\n\n🧭 NAVEGACIÓN:\n• Un barco o avión traza su rumbo usando vectores (ángulos y distancias) y aplica ley de senos/cosenos para corregir la deriva por viento o corriente.\n• Los antiguos navegantes polinesios usaban las estrellas y triangulación para cruzar el Pacífico.\n\n🎵 MÚSICA Y SONIDO:\n• Las ondas sonoras son funciones trigonométricas (senoidales).\n• La afinación musical se basa en proporciones logarítmicas y trigonométricas.\n• Los sintetizadores generan sonidos sumando ondas senoidales (series de Fourier, en Cálculo).\n\n🧠 REFLEXIÓN FINAL: "Si miras a tu alrededor, verás parábolas en los puentes y antenas, circunferencias en las ruedas y relojes, y triángulos en cada estructura estable. La geometría analítica y la trigonometría te dan las ecuaciones para diseñar, construir y navegar este mundo."\n\n🗣️ CITA: "La matemática es el alfabeto con el cual Dios ha escrito el universo." — Galileo Galilei.`,
            7: `👥 MÓDULO DE PROYECTO GRUPAL: "Diseño de un Parque Temático Geométrico"\n\n🎯 OBJETIVO: Los estudiantes diseñarán en equipos un parque temático donde cada atracción esté modelada por una figura geométrica (recta, circunferencia, parábola) y sus dimensiones se calculen usando trigonometría y geometría analítica. Presentarán planos a escala, ecuaciones de cada elemento y un análisis de seguridad basado en distancias.\n\n📋 FASES DEL PROYECTO:\n\nFASE 1: CONCEPTUALIZACIÓN (1 sesión)\n• 5 equipos creativos. Cada equipo elige un tema para su parque: "Parque Acuático Trigonométrico", "Montaña Rusa de las Cónicas", "Feria de las Circunferencias", "Jardín de las Espirales y Parábolas".\n• Bocetan ideas de atracciones asignando a cada una una base geométrica.\n\nFASE 2: DISEÑO MATEMÁTICO (2 sesiones)\n• Plano cartesiano a escala (1 unidad = 5 metros, por ejemplo).\n• Cada atracción debe tener su ecuación:\n  - Pista recta: ecuación de la recta.\n  - Fuente circular: ecuación de la circunferencia.\n  - Techo parabólico de un escenario: ecuación de la parábola.\n  - Rampa con ángulo: cálculo de pendiente y ángulo de inclinación.\n• Verifican intersecciones: si dos atracciones están muy cerca (distancia entre sus centros), calculan la distancia mínima para seguridad.\n• Calculan longitudes de cables, áreas de superficies, etc., usando trigonometría.\n\nFASE 3: CONSTRUCCIÓN DE LA MAQUETA (2-3 sesiones)\n• Maqueta física o digital (GeoGebra 3D, SketchUp o cartón).\n• Elementos etiquetados con su ecuación correspondiente.\n• Tabla resumen: Nombre de la atracción, figura geométrica, ecuación, parámetros relevantes.\n\nFASE 4: INFORME TÉCNICO (1 sesión)\n• Documento que incluye:\n  - Descripción del parque.\n  - Plano general con coordenadas.\n  - Ficha técnica de cada atracción: ecuación, elementos (vértice, foco, centro, radio), dimensiones reales.\n  - Cálculos de seguridad (distancias entre atracciones, ángulos de inclinación).\n  - Presupuesto básico (longitud de materiales, área de pintura, etc.).\n\nFASE 5: FERIA DE PARQUES (1 sesión)\n• Exposición de maquetas y planos.\n• Cada equipo presenta su parque a "inversionistas" (docentes y compañeros).\n• Defienden por qué su diseño es el más atractivo y seguro.\n\n🏆 EVALUACIÓN: Correcta aplicación de la geometría analítica y trigonometría, coherencia entre ecuaciones y diseño, precisión en cálculos, creatividad, calidad de la maqueta/informe.\n🎉 CIERRE: Premiación: "Mejor Diseño Geométrico", "Mejor Aplicación Trigonométrica", "Parque Más Creativo". Exposición en la feria de ciencias escolar.`,
